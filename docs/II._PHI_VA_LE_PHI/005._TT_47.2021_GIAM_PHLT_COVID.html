Bi&#7875;u tr&ecirc;n:</span></p>

<p class=MsoNormal style='margin-bottom:6.0pt;text-align:justify;text-indent:
36.0pt'><span lang=NL style='font-size:14.0pt;&#7901;ng h&#7907;p xe &ocirc; t&ocirc; chuy&#7875;n t&#7915;
kh&ocirc;ng kinh doanh v&#7853;n t&#7843;i sang kinh doanh v&#7853;n t&#7843;i
trong th&#7901;i gian c&oacute; hi&#7879;u l&#7921;c c&#7911;a Th&ocirc;ng
t&#432; n&agrave;y th&igrave; th&#7901;i &#273;i&#7875;m &aacute;p d&#7909;ng
m&#7913;c ph&iacute; theo quy &#273;&#7883;nh t&#7841;i Th&ocirc;ng t&#432;
n&agrave;y t&iacute;nh t&#7915; ng&agrave;y xe &ocirc; t&ocirc;
&#273;&#432;&#7907;c ghi nh&#7853;n trong Ch&#432;&#417;ng tr&igrave;nh
qu&#7843;n l&yacute; ki&#7875;m &#273;&#7883;nh c&#7911;a C&#7909;c
&#272;&#259;ng ki&#7875;m Vi&#7879;t Nam l&agrave; xe &ocirc; t&ocirc; kinh
doanh v&#7853;n t&#7843;i. </span></p>

<p class=MsoNormal style='margin-bottom:6.0pt;text-align:justify;text-indent:
36.0pt'><span lang=NL style='font-size:14.0pt;&#7901;ng h&#7907;p xe &ocirc; t&ocirc; &#273;&atilde;
&#273;&#432;&#7907;c n&#7897;p ph&iacute; theo m&#7913;c ph&iacute; quy
&#273;&#7883;nh t&#7841;i Th&ocirc;ng t&#432; s&#7889; 293/2016/TT-BTC cho
kho&#7843;ng th&#7901;i gian c&oacute; hi&#7879;u l&#7921;c c&#7911;a
Th&ocirc;ng t&#432; n&agrave;y, ch&#7911; xe s&#7869; &#273;&#432;&#7907;c
b&ugrave; tr&#7915; s&#7889; ti&#7873;n ph&iacute; ch&ecirc;nh l&#7879;ch
gi&#7919;a m&#7913;c ph&iacute; theo quy &#273;&#7883;nh t&#7841;i Th&ocirc;ng
t&#432; s&#7889; 293/2016/TT-BTC v&#7899;i m&#7913;c ph&iacute; theo quy
&#273;&#7883;nh t&#7841;i Th&ocirc;ng t&#432; n&agrave;y v&agrave;o s&#7889;
ph&iacute; ph&#7843;i n&#7897;p c&#7911;a chu k&#7923; ti&#7871;p theo. &#272;&#417;n
v&#7883; &#273;&#259;ng ki&#7875;m ch&#7883;u tr&aacute;ch nhi&#7879;m t&iacute;nh
b&ugrave; tr&#7915; ti&#7873;n ph&iacute; cho ch&#7911; xe v&agrave;o chu
k&#7923; ti&#7871;p theo.</span></p>

<p class=MsoNormal style='margin-bottom:6.0pt;text-align:justify;text-indent:
36.0pt'><span lang=NL style='font-size:14.0pt;c Th&ocirc;ng t&#432; &#273;&#432;&#7907;c quy &#273;&#7883;nh
d&#7851;n chi&#7871;u trong Bi&#7875;u n&ecirc;u tr&ecirc;n g&#7885;i chung
l&agrave; c&aacute;c Th&ocirc;ng t&#432; g&#7889;c.</span></p>

<p class=MsoNormal style='margin-bottom:6.0pt;text-align:justify;text-indent:
36.0pt'><span lang=NL style='font-size:14.0pt;
t&#7915; ng&agrave;y 01 th&aacute;ng 01 n&#259;m 2022 tr&#7903; &#273;i,
m&#7913;c thu c&aacute;c kho&#7843;n ph&iacute;, l&#7879; ph&iacute; quy
&#273;&#7883;nh t&#7841;i Bi&#7875;u n&ecirc;u tr&ecirc;n th&#7921;c hi&#7879;n
theo quy &#273;&#7883;nh t&#7841;i c&aacute;c Th&ocirc;ng t&#432; g&#7889;c
v&agrave; c&aacute;c Th&ocirc;ng t&#432; s&#7917;a &#273;&#7893;i, b&#7893;
sung ho&#7863;c thay th&#7871; (n&#7871;u c&oacute;). </span></p>

<p class=MsoNormal style='margin-bottom:6.0pt;text-align:justify;text-indent:
36.0pt'><span lang=NL style='font-size:14.0pt;i m&#7913;c thu c&aacute;c kho&#7843;n ph&iacute;, l&#7879;
ph&iacute; quy &#273;&#7883;nh trong Bi&#7875;u tr&ecirc;n, c&aacute;c
n&#7897;i dung v&#7873;: Ph&#7841;m vi &#273;i&#7873;u ch&#7881;nh,
&#273;&#7889;i t&#432;&#7907;ng &aacute;p d&#7909;ng; t&#7893; ch&#7913;c thu
ph&iacute;, l&#7879; ph&iacute;; c&aacute;c tr&#432;&#7901;ng h&#7907;p
mi&#7877;n, kh&ocirc;ng ph&#7843;i n&#7897;p ph&iacute;, l&#7879; ph&iacute;;

s&#7917; d&#7909;ng ph&iacute;, l&#7879; ph&iacute;; ch&#7913;ng t&#7915; thu,
c&ocirc;ng khai ch&#7871; &#273;&#7897; thu ph&iacute;, l&#7879; ph&iacute;
v&agrave; c&aacute;c n&#7897;i dung kh&aacute;c li&ecirc;n quan kh&ocirc;ng quy
&#273;&#7883;nh t&#7841;i Th&ocirc;ng t&#432; n&agrave;y th&#7921;c hi&#7879;n
theo quy &#273;&#7883;nh t&#7841;i c&aacute;c Th&ocirc;ng t&#432; g&#7889;c;
Lu&#7853;t Qu&#7843;n l&yacute; thu&#7871; v&agrave; Ngh&#7883; &#273;&#7883;nh
s&#7889; 126/2020/N&#272;-CP ng&agrave;y 19 th&aacute;ng 10 n&#259;m 2020
c&#7911;a Ch&iacute;nh ph&#7911; quy &#273;&#7883;nh chi ti&#7871;t thi
h&agrave;nh m&#7897;t s&#7889; &#273;i&#7873;u c&#7911;a Lu&#7853;t Qu&#7843;n
l&yacute; thu&#7871;.</span></p>

<p class=MsoNormal style='margin-bottom:6.0pt;text-align:justify;text-indent:
36.0pt'><b><span lang=NL style='font-size:14.0pt;i&#7873;u
2. Hi&#7879;u l&#7921;c thi h&agrave;nh</span></b></p>

<p class=MsoNormal style='margin-bottom:6.0pt;text-align:justify;text-indent:
36.0pt'><span lang=NL style='font-size:14.0pt;ng t&#432; n&agrave;y c&oacute; hi&#7879;u l&#7921;c thi h&agrave;nh

<p class=MsoNormal style='margin-bottom:6.0pt;text-align:justify;text-indent:

style='font-size:14.0pt; tr&igrave;nh
