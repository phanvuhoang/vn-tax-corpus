li&#7879;u, t&agrave;i li&#7879;u kh&aacute;c li&ecirc;n quan &#273;&#7871;n
vi&#7879;c <a name="cumtu_3">khai th&aacute;c, s&#7917; d&#7909;ng t&agrave;i
nguy&ecirc;n n&#432;&#7899;c, x&#7843; n&#432;&#7899;c th&#7843;i v&agrave;o
ngu&#7891;n n&#432;&#7899;c</a>.</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span lang=VI
style='font-size:14.0pt; quan t&#7893;
ch&#7913;c l&#7845;y &yacute; ki&#7871;n:</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span lang=VI
style='font-size:14.0pt;y ban nh&acirc;n
d&acirc;n c&#7845;p huy&#7879;n, n&#417;i ngu&#7891;n n&#432;&#7899;c n&#7897;i
t&#7881;nh ch&#7843;y qua, t&#7893; ch&#7913;c l&#7845;y &yacute; ki&#7871;n
&#273;&#7889;i v&#7899;i c&ocirc;ng tr&igrave;nh khai th&aacute;c, s&#7917;
d&#7909;ng ngu&#7891;n n&#432;&#7899;c n&#7897;i t&#7881;nh, x&#7843;
n&#432;&#7899;c th&#7843;i v&agrave;o ngu&#7891;n n&#432;&#7899;c n&#7897;i
t&#7881;nh quy &#273;&#7883;nh t&#7841;i &#272;i&#7875;m a, c v&agrave;
&#272;i&#7875;m d Kho&#7843;n 1 &#272;i&#7873;u n&agrave;y;</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span lang=VI
style='font-size:14.0pt;y ban nh&acirc;n
d&acirc;n c&#7845;p t&#7881;nh, n&#417;i ngu&#7891;n n&#432;&#7899;c li&ecirc;n
t&#7881;nh ch&#7843;y qua, t&#7893; ch&#7913;c l&#7845;y &yacute; ki&#7871;n
&#273;&#7889;i v&#7899;i c&ocirc;ng tr&igrave;nh <a name="cumtu_18">khai
th&aacute;c, s&#7917; d&#7909;ng ngu&#7891;n n&#432;&#7899;c li&ecirc;n
t&#7881;nh, x&#7843; n&#432;&#7899;c th&#7843;i v&agrave;o ngu&#7891;n
n&#432;&#7899;c li&ecirc;n t&#7881;nh</a> quy &#273;&#7883;nh t&#7841;i
&#272;i&#7875;m a, c v&agrave; &#272;i&#7875;m d Kho&#7843;n 1 &#272;i&#7873;u
n&agrave;y;</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span lang=VI
style='font-size:14.0pt;y ban nh&acirc;n d&acirc;n
c&#7845;p huy&#7879;n, n&#417;i c&oacute; ngu&#7891;n n&#432;&#7899;c n&#7897;i
t&#7881;nh b&#7883; chuy&#7875;n n&#432;&#7899;c, t&#7893; ch&#7913;c l&#7845;y
&yacute; ki&#7871;n &#273;&#7889;i v&#7899;i c&ocirc;ng tr&igrave;nh
chuy&#7875;n n&#432;&#7899;c t&#7915; ngu&#7891;n n&#432;&#7899;c n&#7897;i
t&#7881;nh;</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span lang=VI
style='font-size:14.0pt;y ban nh&acirc;n
d&acirc;n c&#7845;p t&#7881;nh, n&#417;i c&oacute; ngu&#7891;n n&#432;&#7899;c
li&ecirc;n t&#7881;nh b&#7883; chuy&#7875;n n&#432;&#7899;c ch&#7843;y qua,
t&#7893; ch&#7913;c l&#7845;y &yacute; ki&#7871;n &#273;&#7889;i v&#7899;i
c&ocirc;ng tr&igrave;nh chuy&#7875;n n&#432;&#7899;c t&#7915; ngu&#7891;n
n&#432;&#7899;c li&ecirc;n t&#7881;nh;</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span lang=VI
style='font-size:14.0pt;) &#7910;y ban nh&acirc;n
d&acirc;n c&#7845;p huy&#7879;n, n&#417;i d&#7921; ki&#7871;n b&#7889;
tr&iacute; c&ocirc;ng tr&igrave;nh khai th&aacute;c n&#432;&#7899;c
d&#432;&#7899;i &#273;&#7845;t, t&#7893; ch&#7913;c l&#7845;y &yacute;
ki&#7871;n &#273;&#7889;i v&#7899;i c&ocirc;ng tr&igrave;nh khai th&aacute;c,
s&#7917; d&#7909;ng n&#432;&#7899;c d&#432;&#7899;i &#273;&#7845;t quy
&#273;&#7883;nh t&#7841;i &#272;i&#7875;m &#273; Kho&#7843;n 1 &#272;i&#7873;u
n&agrave;y.</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span lang=VI
style='font-size:14.0pt;nh t&#7921;
l&#7845;y &yacute; ki&#7871;n:</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span lang=VI
style='font-size:14.0pt; d&#7921; &aacute;n
g&#7917;i c&aacute;c t&agrave;i li&#7879;u, n&#7897;i dung quy &#273;&#7883;nh
t&#7841;i Kho&#7843;n 3 &#272;i&#7873;u n&agrave;y &#273;&#7871;n &#7910;y ban
nh&acirc;n d&acirc;n c&#7845;p huy&#7879;n v&agrave; Ph&ograve;ng T&agrave;i
nguy&ecirc;n v&agrave; M&ocirc;i tr&#432;&#7901;ng c&#7845;p huy&#7879;n,
&#273;&#7889;i v&#7899;i tr&#432;&#7901;ng h&#7907;p c&#417; quan t&#7893;
ch&#7913;c l&#7845;y &yacute; ki&#7871;n l&agrave; &#7910;y ban nh&acirc;n
d&acirc;n c&#7845;p huy&#7879;n ho&#7863;c &#273;&#7871;n &#7910;y ban
nh&acirc;n d&acirc;n c&#7845;p t&#7881;nh v&agrave; S&#7903; T&agrave;i
nguy&ecirc;n v&agrave; M&ocirc;i tr&#432;&#7901;ng, &#273;&#7889;i v&#7899;i
tr&#432;&#7901;ng h&#7907;p c&#417; quan t&#7893; ch&#7913;c l&#7845;y &yacute;
ki&#7871;n l&agrave; &#7910;y ban nh&acirc;n d&acirc;n c&#7845;p t&#7881;nh;</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span lang=VI
style='font-size:14.0pt;&#7901;ng h&#7907;p
c&#417; quan t&#7893; ch&#7913;c l&#7845;y &yacute; ki&#7871;n l&agrave;
&#7910;y ban nh&acirc;n d&acirc;n c&#7845;p huy&#7879;n, trong th&#7901;i
h&#7841;n ba m&#432;&#417;i (30) ng&agrave;y l&agrave;m vi&#7879;c, k&#7875;
t&#7915; ng&agrave;y nh&#7853;n &#273;&#432;&#7907;c &#273;&#7873; ngh&#7883;
xin &yacute; ki&#7871;n c&#7911;a ch&#7911; d&#7921; &aacute;n, Ph&ograve;ng
T&agrave;i nguy&ecirc;n v&agrave; M&ocirc;i tr&#432;&#7901;ng c&#7845;p
huy&#7879;n c&oacute; tr&aacute;ch nhi&#7879;m gi&uacute;p &#7910;y ban
nh&acirc;n d&acirc;n c&#7845;p huy&#7879;n t&#7893; ch&#7913;c c&aacute;c
bu&#7893;i l&agrave;m vi&#7879;c, cu&#7897;c h&#7885;p v&#7899;i c&aacute;c
c&#417; quan, t&#7893; ch&#7913;c, c&aacute; nh&acirc;n c&oacute; li&ecirc;n
quan &#273;&#7875; cho &yacute; ki&#7871;n v&#7873; c&ocirc;ng tr&igrave;nh
d&#7921; ki&#7871;n x&acirc;y d&#7921;ng ho&#7863;c &#273;&#7889;i tho&#7841;i
tr&#7921;c ti&#7871;p v&#7899;i ch&#7911; d&#7921; &aacute;n; t&#7893;ng
h&#7907;p &yacute; ki&#7871;n tr&igrave;nh &#7910;y ban nh&acirc;n d&acirc;n
c&#7845;p huy&#7879;n g&#7917;i cho ch&#7911; d&#7921; &aacute;n;</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span lang=VI
style='font-size:14.0pt;&#7901;ng h&#7907;p
c&#417; quan t&#7893; ch&#7913;c l&#7845;y &yacute; ki&#7871;n l&agrave;
&#7910;y ban nh&acirc;n d&acirc;n c&#7845;p t&#7881;nh, trong th&#7901;i
h&#7841;n b&#7889;n m&#432;&#417;i (40) ng&agrave;y l&agrave;m vi&#7879;c, k&#7875;
t&#7915; ng&agrave;y nh&#7853;n &#273;&#432;&#7907;c &#273;&#7873; ngh&#7883;
xin &yacute; ki&#7871;n c&#7911;a ch&#7911; d&#7921; &aacute;n, S&#7903;
T&agrave;i nguy&ecirc;n v&agrave; M&ocirc;i tr&#432;&#7901;ng c&oacute;
tr&aacute;ch nhi&#7879;m gi&uacute;p &#7910;y ban nh&acirc;n d&acirc;n
c&#7845;p t&#7881;nh t&#7893; ch&#7913;c c&aacute;c bu&#7893;i l&agrave;m
vi&#7879;c, cu&#7897;c h&#7885;p ho&#7863;c &#273;&#7889;i tho&#7841;i
tr&#7921;c ti&#7871;p v&#7899;i c&aacute;c c&#417; quan, t&#7893; ch&#7913;c,
c&aacute; nh&acirc;n c&oacute; li&ecirc;n quan &#273;&#7875; cho &yacute;
ki&#7871;n v&#7873; c&ocirc;ng tr&igrave;nh d&#7921; ki&#7871;n x&acirc;y d&#7921;ng;
t&#7893;ng h&#7907;p &yacute; ki&#7871;n tr&igrave;nh &#7910;y ban nh&acirc;n
d&acirc;n c&#7845;p t&#7881;nh g&#7917;i cho ch&#7911; d&#7921; &aacute;n;</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span lang=VI
style='font-size:14.0pt;i c&aacute;c
n&#7897;i dung th&ocirc;ng tin quy &#273;&#7883;nh t&#7841;i Kho&#7843;n 3
&#272;i&#7873;u n&agrave;y, ch&#7911; d&#7921; &aacute;n c&oacute; tr&aacute;ch
nhi&#7879;m cung c&#7845;p b&#7893; sung c&aacute;c s&#7889; li&#7879;u,
b&aacute;o c&aacute;o, th&ocirc;ng tin v&#7873; d&#7921; &aacute;n n&#7871;u
c&aacute;c c&#417; quan quy &#273;&#7883;nh t&#7841;i Kho&#7843;n 4
&#272;i&#7873;u n&agrave;y c&oacute; y&ecirc;u c&#7847;u v&agrave; tr&#7921;c
ti&#7871;p b&aacute;o c&aacute;o, thuy&#7871;t minh, gi&#7843;i tr&igrave;nh
t&#7841;i c&aacute;c cu&#7897;c h&#7885;p l&#7845;y &yacute; ki&#7871;n
&#273;&#7875; l&agrave;m r&otilde; c&aacute;c v&#7845;n &#273;&#7873;
li&ecirc;n quan &#273;&#7871;n d&#7921; &aacute;n.</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span lang=VI
style='font-size:14.0pt; d&#7921; &aacute;n
c&oacute; tr&aacute;ch nhi&#7879;m t&#7893;ng h&#7907;p, ti&#7871;p thu,
gi&#7843;i tr&igrave;nh c&aacute;c &yacute; ki&#7871;n g&oacute;p &yacute;.
V&#259;n b&#7843;n g&oacute;p &yacute; v&agrave; t&#7893;ng h&#7907;p ti&#7871;p
thu, gi&#7843;i tr&igrave;nh l&agrave; th&agrave;nh ph&#7847;n c&#7911;a
h&#7891; s&#417; d&#7921; &aacute;n khi tr&igrave;nh c&#7845;p c&oacute;
th&#7849;m quy&#7873;n th&#7849;m &#273;&#7883;nh, ph&ecirc; duy&#7879;t
v&agrave; ph&#7843;i &#273;&#432;&#7907;c g&#7917;i k&egrave;m theo h&#7891;
s&#417; &#273;&#7873; ngh&#7883; c&#7845;p gi&#7845;y ph&eacute;p t&agrave;i
nguy&ecirc;n n&#432;&#7899;c.</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span lang=VI
style='font-size:14.0pt;c l&#7845;y &yacute;
ki&#7871;n ho&#7863;c th&ocirc;ng b&aacute;o tr&#432;&#7899;c khi l&#7853;p
d&#7921; &aacute;n &#273;&#7889;i v&#7899;i c&aacute;c d&#7921; &aacute;n
&#273;&#7847;u t&#432; quy &#273;&#7883;nh t&#7841;i <a name="dc_2">Kho&#7843;n
2, Kho&#7843;n 3 &#272;i&#7873;u 6 c&#7911;a Lu&#7853;t t&agrave;i nguy&ecirc;n
n&#432;&#7899;c</a> &#273;&#432;&#7907;c th&#7921;c hi&#7879;n nh&#432; sau:</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span lang=VI
style='font-size:14.0pt;&#7889;i v&#7899;i
d&#7921; &aacute;n c&oacute; chuy&#7875;n n&#432;&#7899;c t&#7915; ngu&#7891;n
n&#432;&#7899;c n&#7897;i t&#7881;nh:</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span lang=VI
style='font-size:14.0pt; d&#7921; &aacute;n
g&#7917;i v&#259;n b&#7843;n l&#7845;y &yacute; ki&#7871;n k&egrave;m theo quy
m&ocirc;, ph&#432;&#417;ng &aacute;n chuy&#7875;n n&#432;&#7899;c v&agrave;
c&aacute;c th&ocirc;ng tin, s&#7889; li&#7879;u, t&agrave;i li&#7879;u
li&ecirc;n quan t&#7899;i &#7910;y ban nh&acirc;n d&acirc;n c&#7845;p
x&atilde;, &#7910;y ban nh&acirc;n d&acirc;n c&#7845;p huy&#7879;n n&#417;i ngu&#7891;n
n&#432;&#7899;c n&#7897;i t&#7881;nh b&#7883; chuy&#7875;n n&#432;&#7899;c
v&agrave; S&#7903; T&agrave;i nguy&ecirc;n v&agrave; M&ocirc;i
tr&#432;&#7901;ng;</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span lang=VI
style='font-size:14.0pt;i h&#7841;n
b&#7889;n m&#432;&#417;i (40) ng&agrave;y l&agrave;m vi&#7879;c, k&#7875;
t&#7915; ng&agrave;y nh&#7853;n &#273;&#432;&#7907;c &#273;&#7873; ngh&#7883;
xin &yacute; ki&#7871;n c&#7911;a ch&#7911; d&#7921; &aacute;n, S&#7903; T&agrave;i
nguy&ecirc;n v&agrave; M&ocirc;i tr&#432;&#7901;ng c&oacute; tr&aacute;ch
nhi&#7879;m h&#432;&#7899;ng d&#7851;n, h&#7895; tr&#7907; &#7910;y ban
nh&acirc;n d&acirc;n c&#7845;p huy&#7879;n, &#7910;y ban nh&acirc;n d&acirc;n
c&#7845;p x&atilde; t&#7893; ch&#7913;c c&aacute;c bu&#7893;i l&agrave;m
vi&#7879;c, cu&#7897;c h&#7885;p v&#7899;i c&aacute;c c&#417; quan, t&#7893;
ch&#7913;c c&oacute; li&ecirc;n quan cho &yacute; ki&#7871;n v&#7873; quy m&ocirc;,
ph&#432;&#417;ng &aacute;n chuy&#7875;n n&#432;&#7899;c &#273;&#7873;
xu&#7845;t ho&#7863;c &#273;&#7889;i tho&#7841;i tr&#7921;c ti&#7871;p
v&#7899;i ch&#7911; d&#7921; &aacute;n; t&#7893;ng h&#7907;p &yacute;
ki&#7871;n v&agrave; g&#7917;i cho ch&#7911; d&#7921; &aacute;n.</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span lang=VI
style='font-size:14.0pt;&#7889;i v&#7899;i
d&#7921; &aacute;n c&oacute; chuy&#7875;n n&#432;&#7899;c t&#7915; ngu&#7891;n
n&#432;&#7899;c li&ecirc;n t&#7881;nh, d&#7921; &aacute;n &#273;&#7847;u
t&#432; x&acirc;y d&#7921;ng h&#7891;, &#273;&#7853;p tr&ecirc;n d&ograve;ng
ch&iacute;nh thu&#7897;c l&#432;u v&#7921;c s&ocirc;ng li&ecirc;n t&#7881;nh:</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span lang=VI
style='font-size:14.0pt; d&#7921; &aacute;n
g&#7917;i v&#259;n b&#7843;n l&#7845;y &yacute; ki&#7871;n k&egrave;m theo quy
m&ocirc;, ph&#432;&#417;ng &aacute;n chuy&#7875;n n&#432;&#7899;c,
ph&#432;&#417;ng &aacute;n x&acirc;y d&#7921;ng c&ocirc;ng tr&igrave;nh v&agrave;
c&aacute;c th&ocirc;ng tin, s&#7889; li&#7879;u, t&agrave;i li&#7879;u
li&ecirc;n quan t&#7899;i &#7910;y ban nh&acirc;n d&acirc;n c&aacute;c
t&#7881;nh n&#417;i ngu&#7891;n n&#432;&#7899;c li&ecirc;n t&#7881;nh b&#7883;
chuy&#7875;n n&#432;&#7899;c ho&#7863;c &#7910;y ban nh&acirc;n d&acirc;n
c&aacute;c t&#7881;nh n&#417;i d&ograve;ng ch&iacute;nh ch&#7843;y qua,
t&#7893; ch&#7913;c l&#432;u v&#7921;c s&ocirc;ng v&agrave; c&aacute;c S&#7903;
T&agrave;i nguy&ecirc;n v&agrave; M&ocirc;i tr&#432;&#7901;ng li&ecirc;n quan;</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span lang=VI
style='font-size:14.0pt;i h&#7841;n
b&#7843;y (07) ng&agrave;y l&agrave;m vi&#7879;c, k&#7875; t&#7915; ng&agrave;y
nh&#7853;n &#273;&#432;&#7907;c &#273;&#7873; ngh&#7883; xin &yacute;
ki&#7871;n c&#7911;a ch&#7911; d&#7921; &aacute;n, S&#7903; T&agrave;i
nguy&ecirc;n v&agrave; M&ocirc;i tr&#432;&#7901;ng c&oacute; tr&aacute;ch
nhi&#7879;m g&#7917;i c&aacute;c t&agrave;i li&#7879;u &#273;&#7871;n
c&aacute;c s&#7903;, ban, ng&agrave;nh li&ecirc;n quan thu&#7897;c t&#7881;nh;</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span lang=VI
style='font-size:14.0pt;i h&#7841;n
s&aacute;u m&#432;&#417;i (60) ng&agrave;y l&agrave;m vi&#7879;c, k&#7875;
t&#7915; ng&agrave;y nh&#7853;n &#273;&#432;&#7907;c &#273;&#7873; ngh&#7883;
xin &yacute; ki&#7871;n c&#7911;a ch&#7911; d&#7921; &aacute;n:</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span lang=VI
style='font-size:14.0pt; ch&#7913;c l&#432;u
v&#7921;c s&ocirc;ng c&oacute; tr&aacute;ch nhi&#7879;m tr&#7843; l&#7901;i
b&#7857;ng v&#259;n b&#7843;n cho ch&#7911; d&#7921; &aacute;n;</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span lang=VI
style='font-size:14.0pt; T&agrave;i
nguy&ecirc;n v&agrave; M&ocirc;i tr&#432;&#7901;ng c&oacute; tr&aacute;ch
nhi&#7879;m t&#7893; ch&#7913;c c&aacute;c bu&#7893;i l&agrave;m vi&#7879;c,
cu&#7897;c h&#7885;p v&#7899;i c&aacute;c s&#7903;, ban, ng&agrave;nh
li&ecirc;n quan thu&#7897;c t&#7881;nh v&agrave; c&aacute;c t&#7893;
ch&#7913;c, c&aacute; nh&acirc;n li&ecirc;n quan cho &yacute; ki&#7871;n
v&#7873; c&ocirc;ng tr&igrave;nh d&#7921; ki&#7871;n x&acirc;y d&#7921;ng
ho&#7863;c &#273;&#7889;i tho&#7841;i tr&#7921;c ti&#7871;p v&#7899;i ch&#7911;
d&#7921; &aacute;n t&#7893;ng h&#7907;p &yacute; ki&#7871;n v&agrave;
tr&igrave;nh &#7910;y ban nh&acirc;n d&acirc;n t&#7881;nh &#273;&#7875;
g&#7917;i ch&#7911; d&#7921; &aacute;n.</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span lang=VI
style='font-size:14.0pt;&#7889;i v&#7899;i
d&#7921; &aacute;n &#273;&#7847;u t&#432; x&acirc;y d&#7921;ng h&#7891;,
&#273;&#7853;p tr&ecirc;n d&ograve;ng nh&aacute;nh thu&#7897;c l&#432;u
v&#7921;c s&ocirc;ng li&ecirc;n t&#7881;nh:</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span lang=VI
style='font-size:14.0pt;&#7899;c khi tri&#7875;n
khai l&#7853;p d&#7921; &aacute;n &#273;&#7847;u t&#432;, ch&#7911; d&#7921;
&aacute;n ph&#7843;i th&ocirc;ng b&aacute;o v&#7873; quy m&ocirc;,
ph&#432;&#417;ng &aacute;n &#273;&#7873; xu&#7845;t x&acirc;y d&#7921;ng
c&ocirc;ng tr&igrave;nh cho t&#7893; ch&#7913;c l&#432;u v&#7921;c s&ocirc;ng,

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span lang=VI

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span lang=VI

&#273;&#7911; &#273;i&#7873;u ki&#7879;n, c&#417; quan ti&#7871;p nh&#7853;n

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span lang=VI

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span lang=VI
