<p class=MsoNormal style='margin-top:6.0pt;&#7873; ngh&#7883; c&#7911;a

<p class=MsoNormal style='margin-top:6.0pt;"dieu_1"><b><span lang=VI style='i&#7873;u 1.

<p class=MsoNormal style='margin-top:6.0pt;ng t&#432; n&agrave;y
h&#432;&#7899;ng d&#7851;n danh m&#7909;c, quy c&aacute;ch, ch&#7881;
ti&ecirc;u k&#7929; thu&#7853;t v&agrave; ngu&#7891;n g&#7889;c kho&aacute;ng
s&#7843;n l&agrave;m v&#7853;t li&#7879;u x&acirc;y d&#7921;ng xu&#7845;t
kh&#7849;u.</span></p>

<p class=MsoNormal style='margin-top:6.0pt;ng t&#432; n&agrave;y
&aacute;p d&#7909;ng &#273;&#7889;i v&#7899;i c&aacute;c t&#7893; ch&#7913;c,
c&aacute; nh&acirc;n trong n&#432;&#7899;c v&agrave; n&#432;&#7899;c
ngo&agrave;i c&oacute; ho&#7841;t &#273;&#7897;ng li&ecirc;n quan
&#273;&#7871;n xu&#7845;t kh&#7849;u kho&aacute;ng s&#7843;n l&agrave;m
v&#7853;t li&#7879;u x&acirc;y d&#7921;ng t&#7841;i Vi&#7879;t Nam (tr&#7915;
tr&#432;&#7901;ng h&#7907;p kho&aacute;ng s&#7843;n l&agrave;m v&#7853;t
li&#7879;u x&acirc;y d&#7921;ng t&#7915; n&#7897;i &#273;&#7883;a &#273;&#432;a
v&agrave;o khu phi thu&#7871; quan ho&#7863;c khu v&#7921;c h&#7843;i quan
ri&ecirc;ng &#273;&#7875; ph&#7909;c v&#7909; x&acirc;y d&#7921;ng, s&#7917;a
ch&#7919;a v&agrave; b&#7843;o d&#432;&#7905;ng k&#7871;t c&#7845;u c&ocirc;ng
tr&igrave;nh).</span></p>

<p class=MsoNormal style='margin-top:6.0pt;"dieu_2"><b><span lang=VI style='i&#7873;u 2.
Gi&#7843;i th&iacute;ch t&#7915; ng&#7919;</span></b></a></p>

<p class=MsoNormal style='margin-top:6.0pt;ng t&#432; n&agrave;y,
nh&#7919;ng t&#7915; ng&#7919; d&#432;&#7899;i &#273;&acirc;y
&#273;&#432;&#7907;c hi&#7875;u nh&#432; sau:</span></p>

<p class=MsoNormal style='margin-top:6.0pt; bi&#7871;n kho&aacute;ng
s&#7843;n l&agrave; qu&aacute; tr&igrave;nh s&#7917; d&#7909;ng ri&ecirc;ng
bi&#7879;t ho&#7863;c k&#7871;t h&#7907;p c&aacute;c ph&#432;&#417;ng
ph&aacute;p c&#417;-l&yacute;-h&oacute;a &#273;&#7875; l&agrave;m thay
&#273;&#7893;i t&iacute;nh ch&#7845;t c&#7911;a kho&aacute;ng s&#7843;n sau khi
khai th&aacute;c nh&#7857;m t&#7841;o ra c&aacute;c s&#7843;n ph&#7849;m
c&oacute; quy c&aacute;ch, ch&#7881; ti&ecirc;u k&#7929; thu&#7853;t ph&ugrave;
h&#7907;p v&#7899;i y&ecirc;u c&#7847;u s&#7917; d&#7909;ng v&agrave; c&oacute;
gi&aacute; tr&#7883; th&#432;&#417;ng m&#7841;i cao h&#417;n kho&aacute;ng
s&#7843;n sau khai th&aacute;c.</span></p>

<p class=MsoNormal style='margin-top:6.0pt;&aacute; kh&#7889;i l&agrave;m
&#273;&aacute; &#7889;p l&aacute;t l&agrave; &#273;&aacute; t&#7921;
nhi&ecirc;n &#273;&#432;&#7907;c khai th&aacute;c t&#7915; c&aacute;c m&#7887; &#273;&aacute;
magma, &#273;&aacute; tr&#7847;m t&iacute;ch, &#273;&aacute; bi&#7871;n
ch&#7845;t t&#7841;i moong khai th&aacute;c t&#7841;o ra s&#7843;n ph&#7849;m
c&oacute; c&aacute;c m&#7863;t ph&#7859;ng, d&#7841;ng kh&#7889;i, kh&ocirc;ng
b&#7883; n&#7913;t n&#7867;, c&oacute; th&#7875; t&iacute;ch &#8805; 0,4 m<sup>3</sup>.</span></p>

<p class=MsoNormal style='margin-top:6.0pt;&aacute; &#7889;p l&aacute;t
l&agrave; c&aacute;c lo&#7841;i &#273;&aacute; &#273;&#432;&#7907;c ch&#7871;
bi&#7871;n t&#7915; &#273;&aacute; kh&#7889;i t&#7921; nhi&ecirc;n th&agrave;nh
s&#7843;n ph&#7849;m d&#7841;ng t&#7845;m (ph&ugrave; h&#7907;p v&#7899;i
Ti&ecirc;u chu&#7849;n qu&#7889;c gia TCVN 4732:2016 &#273;&aacute; &#7889;p,
l&aacute;t t&#7921; nhi&ecirc;n) d&ugrave;ng &#273;&#7875; &#7889;p, l&aacute;t
trong c&ocirc;ng tr&igrave;nh x&acirc;y d&#7921;ng.</span></p>

<p class=MsoNormal style='margin-top:6.0pt;&aacute; x&acirc;y d&#7921;ng
l&agrave; c&aacute;c lo&#7841;i &#273;&aacute; &#273;&#432;&#7907;c khai
th&aacute;c t&#7915; c&aacute;c m&#7887; &#273;&aacute; t&#7921; nhi&ecirc;n
(thu&#7897;c danh m&#7909;c kho&aacute;ng s&#7843;n l&agrave;m v&#7853;t
li&#7879;u x&acirc;y d&#7921;ng th&ocirc;ng th&#432;&#7901;ng theo quy
&#273;&#7883;nh ph&aacute;p lu&#7853;t v&#7873; kho&aacute;ng s&#7843;n)
&#273;&#432;&#7907;c gia c&ocirc;ng, ch&#7871; bi&#7871;n th&agrave;nh
s&#7843;n ph&#7849;m d&ugrave;ng trong c&ocirc;ng tr&igrave;nh x&acirc;y
d&#7921;ng.</span></p>

<p class=MsoNormal style='margin-top:6.0pt;&aacute; m&#7929; ngh&#7879;
l&agrave; c&aacute;c lo&#7841;i &#273;&aacute; &#273;&#432;&#7907;c khai
th&aacute;c t&#7915; c&aacute;c m&#7887; &#273;&aacute; t&#7921; nhi&ecirc;n
&#273;&#432;&#7907;c ch&#7871; t&aacute;c th&agrave;nh c&aacute;c s&#7843;n
ph&#7849;m m&#7929; ngh&#7879; c&oacute; k&iacute;ch th&#432;&#7899;c phi
ti&ecirc;u chu&#7849;n.</span></p>

<p class=MsoNormal style='margin-top:6.0pt;"dieu_3"><b><span lang=VI style='i&#7873;u 3.
Ngu&#7891;n g&#7889;c, danh m&#7909;c, quy c&aacute;ch v&agrave; ch&#7881;
ti&ecirc;u k&#7929; thu&#7853;t kho&aacute;ng s&#7843;n l&agrave;m v&#7853;t
li&#7879;u x&acirc;y d&#7921;ng xu&#7845;t kh&#7849;u</span></b></a></p>

<p class=MsoNormal style='margin-top:6.0pt;ng s&#7843;n l&agrave;m
v&#7853;t li&#7879;u x&acirc;y d&#7921;ng xu&#7845;t kh&#7849;u c&oacute;
ngu&#7891;n g&#7889;c h&#7907;p ph&aacute;p bao g&#7891;m kho&aacute;ng
s&#7843;n &#273;&#432;&#7907;c khai th&aacute;c theo gi&#7845;y ph&eacute;p
khai th&aacute;c kho&aacute;ng s&#7843;n, gi&#7845;y ph&eacute;p khai
th&aacute;c t&#7853;n thu kho&aacute;ng s&#7843;n ho&#7863;c quy&#7871;t
&#273;&#7883;nh vi&#7879;c khai th&aacute;c kho&aacute;ng s&#7843;n &#273;i
k&egrave;m c&#7911;a c&#417; quan nh&agrave; n&#432;&#7899;c c&oacute;
th&#7849;m quy&#7873;n c&#7845;p c&ograve;n hi&#7879;u l&#7921;c theo quy
&#273;&#7883;nh c&#7911;a ph&aacute;p lu&#7853;t v&#7873; kho&aacute;ng s&#7843;n.</span></p>

<p class=MsoNormal style='margin-top:6.0pt;c, quy c&aacute;ch
v&agrave; ch&#7881; ti&ecirc;u k&#7929; thu&#7853;t c&aacute;c lo&#7841;i
kho&aacute;ng s&#7843;n l&agrave;m v&#7853;t li&#7879;u x&acirc;y d&#7921;ng
xu&#7845;t kh&#7849;u theo quy &#273;&#7883;nh t&#7841;i Ph&#7909; l&#7909;c I
c&#7911;a Th&ocirc;ng t&#432; n&agrave;y (tr&#7915; kho&aacute;ng s&#7843;n
t&#7841;m nh&#7853;p - t&aacute;i xu&#7845;t, chuy&#7875;n kh&#7849;u,
qu&aacute; c&#7843;nh).</span></p>

<p class=MsoNormal style='margin-top:6.0pt;"dieu_4"><b><span lang=VI style='i&#7873;u 4.
Hi&#7879;u l&#7921;c thi h&agrave;nh</span></b></a></p>

<p class=MsoNormal style='margin-top:6.0pt;ng t&#432; n&agrave;y c&oacute;

B&#7897; X&acirc;y d&#7921;ng v&#7873; h&#432;&#7899;ng d&#7851;n xu&#7845;t

Th&ocirc;ng t&#432; s&#7889; 05/2018/TT-BXD ng&agrave;y 29/6/2018 c&#7911;a
B&#7897; tr&#432;&#7903;ng B&#7897; X&acirc;y d&#7921;ng v&#7873;

<p class=MsoNormal style='margin-top:6.0pt;"dieu_5"><b><span lang=VI style='i&#7873;u 5.
Tr&aacute;ch nhi&#7879;m thi h&agrave;nh v&agrave; t&#7893; ch&#7913;c
th&#7921;c hi&#7879;n</span></b></a></p>

<p class=MsoNormal style='margin-top:6.0pt; X&acirc;y d&#7921;ng c&oacute;
tr&aacute;ch nhi&#7879;m tri&#7875;n khai, h&#432;&#7899;ng d&#7851;n v&agrave;
theo d&otilde;i vi&#7879;c th&#7921;c hi&#7879;n Th&ocirc;ng t&#432;
n&agrave;y; &#273;&#7891;ng th&#7901;i ph&#7889;i h&#7907;p v&#7899;i
c&aacute;c B&#7897;, ng&agrave;nh li&ecirc;n quan t&#7893; ch&#7913;c
ki&#7875;m tra &#273;&#7883;nh k&#7923; ho&#7863;c &#273;&#7897;t xu&#7845;t
vi&#7879;c ch&#7845;p h&agrave;nh ph&aacute;p lu&#7853;t trong ho&#7841;t
&#273;&#7897;ng xu&#7845;t kh&#7849;u kho&aacute;ng s&#7843;n l&agrave;m
v&#7853;t li&#7879;u x&acirc;y d&#7921;ng &#7903; c&aacute;c &#273;&#7883;a
ph&#432;&#417;ng.</span></p>

<p class=MsoNormal style='margin-top:6.0pt;y ban nh&acirc;n d&acirc;n
c&#7845;p t&#7881;nh c&oacute; tr&aacute;ch nhi&#7879;m ch&#7881;
&#273;&#7841;o c&aacute;c c&#417; quan ch&#7913;c n&#259;ng ki&#7875;m tra
&#273;&#7883;nh k&#7923; ho&#7863;c &#273;&#7897;t xu&#7845;t ho&#7841;t &#273;&#7897;ng
xu&#7845;t kh&#7849;u kho&aacute;ng s&#7843;n l&agrave;m v&#7853;t li&#7879;u
x&acirc;y d&#7921;ng theo quy &#273;&#7883;nh c&#7911;a ph&aacute;p lu&#7853;t.
&#272;&#7883;nh k&#7923; h&agrave;ng n&#259;m (ho&#7863;c &#273;&#7897;t
xu&#7845;t khi c&oacute; y&ecirc;u c&#7847;u c&#7911;a c&#417; quan th&#7849;m
quy&#7873;n) b&aacute;o c&aacute;o t&igrave;nh h&igrave;nh xu&#7845;t
kh&#7849;u kho&aacute;ng s&#7843;n theo m&#7851;u quy &#273;&#7883;nh t&#7841;i
Ph&#7909; l&#7909;c II c&#7911;a Th&ocirc;ng t&#432; n&agrave;y
tr&#432;&#7899;c ng&agrave;y 30 th&aacute;ng 01 h&agrave;ng n&#259;m
&#273;&#7875; B&#7897; X&acirc;y d&#7921;ng t&#7893;ng h&#7907;p b&aacute;o
c&aacute;o Th&#7911; t&#432;&#7899;ng Ch&iacute;nh ph&#7911;.</span></p>

<p class=MsoNormal style='margin-top:6.0pt;p xu&#7845;t
kh&#7849;u kho&aacute;ng s&#7843;n ph&#7843;i l&#7853;p b&aacute;o c&aacute;o
&#273;&#7883;nh k&#7923; h&agrave;ng n&#259;m (ho&#7863;c &#273;&#7897;t
xu&#7845;t khi c&oacute; y&ecirc;u c&#7847;u c&#7911;a c&#417; quan c&oacute;
th&#7849;m quy&#7873;n) g&#7917;i S&#7903; X&acirc;y d&#7921;ng &#273;&#7875;
b&aacute;o c&aacute;o &#7910;y ban nh&acirc;n d&acirc;n c&#7845;p t&#7881;nh
(n&#417;i doanh nghi&#7879;p c&oacute; ho&#7841;t &#273;&#7897;ng xu&#7845;t
kh&#7849;u) theo m&#7851;u quy &#273;&#7883;nh t&#7841;i Ph&#7909; l&#7909;c II
c&#7911;a Th&ocirc;ng t&#432; n&agrave;y tr&#432;&#7899;c ng&agrave;y 15
th&aacute;ng 01 h&agrave;ng n&#259;m.</span></p>

<p class=MsoNormal style='margin-top:6.0pt; tr&igrave;nh
th&#7921;c hi&#7879;n n&#7871;u c&oacute; v&#432;&#7899;ng m&#7855;c,
c&aacute;c B&#7897;, ng&agrave;nh, &#273;&#7883;a ph&#432;&#417;ng, c&aacute;c
t&#7893; ch&#7913;c v&agrave; c&aacute; nh&acirc;n ph&#7843;n &aacute;nh
k&#7883;p th&#7901;i v&#7873; B&#7897; X&acirc;y d&#7921;ng &#273;&#7875; xem
