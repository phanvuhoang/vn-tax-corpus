<p class=MsoNormal style='margin-top:1.0pt;text-align:justify;text-indent:1.0cm'><span

<p class=MsoNormal style='margin-top:1.0pt;text-align:justify;text-indent:1.0cm'><span

&#273;i&#7875;m c kho&#7843;n 7 &#272;i&#7873;u 5 Th&ocirc;ng t&#432;

c&#7845;u h&#7841; t&#7847;ng c&#7845;p n&#432;&#7899;c s&#7841;ch
&#273;&#432;&#7907;c x&aacute;c &#273;&#7883;nh l&#7841;i b&#7857;ng (=)

&#273;&#432;&#7907;c giao qu&#7843;n l&yacute; t&agrave;i s&#7843;n k&#7871;t
c&#7845;u h&#7841; t&#7847;ng c&#7845;p n&#432;&#7899;c s&#7841;ch
&#273;&atilde; ch&#7881; ra t&iacute;nh &#273;&#7871;n th&#7901;i
&#273;i&#7875;m ho&agrave;n th&agrave;nh vi&#7879;c th&aacute;o d&#7905;.</span></p>

<p class=MsoNormal style='margin-top:1.0pt;text-align:justify;text-indent:1.0cm'><span

<p class=MsoNormal style='margin-top:1.0pt;text-align:justify;text-indent:1.0cm'><span

h&#7907;p kh&ocirc;ng c&oacute; h&#7891; s&#417; quy &#273;&#7883;nh t&#7841;i

<p class=MsoNormal style='margin-top:1.0pt;text-align:justify;text-indent:1.0cm'><span

<p class=MsoNormal style='margin-top:1.0pt;text-align:justify;text-indent:1.0cm'><span

t&agrave;i s&#7843;n k&#7871;t c&#7845;u h&#7841; t&#7847;ng c&#7845;p
n&#432;&#7899;c s&#7841;ch thu&ecirc; t&#7893; ch&#7913;c c&oacute;

<h2><a name="_Toc123801334"></a><a name="dieu_7"><span style='i&#7873;u 7. Nguy&ecirc;n t&#7855;c t&iacute;nh hao

<p class=MsoNormal style='margin-top:1.0pt;text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt;i s&#7843;n
k&#7871;t c&#7845;u h&#7841; t&#7847;ng c&#7845;p n&#432;&#7899;c s&#7841;ch

l&yacute; ph&#7843;i t&iacute;nh hao m&ograve;n, tr&iacute;ch kh&#7845;u hao
theo quy &#273;&#7883;nh t&#7841;i Th&ocirc;ng t&#432; n&agrave;y, tr&#7915;
c&aacute;c tr&#432;&#7901;ng h&#7907;p quy &#273;&#7883;nh t&#7841;i
kho&#7843;n 2 &#272;i&#7873;u n&agrave;y.</span></p>

<p class=MsoNormal style='margin-top:1.0pt;text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt; quan,
&#273;&#417;n v&#7883; &#273;&#432;&#7907;c giao qu&#7843;n l&yacute;
t&agrave;i s&#7843;n k&#7871;t c&#7845;u h&#7841; t&#7847;ng c&#7845;p
n&#432;&#7899;c s&#7841;ch kh&ocirc;ng ph&#7843;i t&iacute;nh hao m&ograve;n,
tr&iacute;ch kh&#7845;u hao &#273;&#7889;i v&#7899;i:</span></p>

<p class=MsoNormal style='margin-top:1.0pt;text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt;i s&#7843;n
ch&#432;a t&iacute;nh h&#7871;t hao m&ograve;n, ch&#432;a tr&iacute;ch
kh&#7845;u hao h&#7871;t gi&aacute; tr&#7883; nh&#432;ng &#273;&atilde;
b&#7883; h&#432; h&#7887;ng kh&ocirc;ng th&#7875; s&#7917;a ch&#7919;a
&#273;&#7875; s&#7917; d&#7909;ng &#273;&#432;&#7907;c.</span></p>

<p class=MsoNormal style='margin-top:1.0pt;text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt;i s&#7843;n
&#273;&atilde; t&iacute;nh &#273;&#7911; hao m&ograve;n, tr&iacute;ch

<p class=MsoNormal style='margin-top:1.0pt;text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt;i s&#7843;n
k&#7871;t c&#7845;u h&#7841; t&#7847;ng c&#7845;p n&#432;&#7899;c s&#7841;ch

<p class=MsoNormal style='margin-top:1.0pt;text-align:justify;text-indent:1.0cm'><span

hao m&ograve;n, tr&iacute;ch kh&#7845;u hao t&agrave;i s&#7843;n k&#7871;t

<p class=MsoNormal style='margin-top:1.0pt;text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt;i t&agrave;i
s&#7843;n (H&#7879; th&#7889;ng c&#7845;p n&#432;&#7899;c t&#7853;p trung

l&#7853;p).</span></p>

<p class=MsoNormal style='margin-top:1.0pt;text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt;i gian
t&iacute;nh hao m&ograve;n, tr&iacute;ch kh&#7845;u hao t&agrave;i s&#7843;n
k&#7871;t c&#7845;u h&#7841; t&#7847;ng c&#7845;p n&#432;&#7899;c s&#7841;ch.</span></p>

<p class=MsoNormal style='margin-top:1.0pt;text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt; l&#7879; hao
m&ograve;n, kh&#7845;u hao.</span></p>

<p class=MsoNormal style='margin-top:1.0pt;text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt; k&#7871;
to&aacute;n theo quy &#273;&#7883;nh c&#7911;a ch&#7871; &#273;&#7897; k&#7871;

<p class=MsoNormal style='margin-top:1.0pt;text-align:justify;text-indent:1.0cm'><span

k&#7871;t c&#7845;u h&#7841; t&#7847;ng c&#7845;p n&#432;&#7899;c s&#7841;ch

tr&iacute;ch kh&#7845;u hao to&agrave;n b&#7897;. Tr&#432;&#7901;ng h&#7907;p

h&#432;&#7903;ng &#273;&#7871;n gi&aacute; cung c&#7845;p n&#432;&#7899;c sinh
ho&#7841;t theo quy &#273;&#7883;nh th&igrave; c&#259;n c&#7913; v&agrave;o

k&#7923;, tr&ecirc;n c&#417; s&#7903; b&aacute;o c&aacute;o c&#7911;a c&#417;

<p class=MsoNormal style='margin-top:1.0pt;text-align:justify;text-indent:1.0cm'><span

t&iacute;nh hao m&ograve;n to&agrave;n b&#7897;, kh&ocirc;ng tr&iacute;ch

<p class=MsoNormal style='margin-top:1.0pt;text-align:justify;text-indent:1.0cm'><span
