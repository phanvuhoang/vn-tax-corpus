t&agrave;i ch&iacute;nh &#273;&#7889;i v&#7899;i h&#7891; s&#417; quy&#7871;t
to&aacute;n thu&#7871; n&#259;m.</span></p>

<p class=MsoNormal style='margin-bottom:6.0pt;text-align:justify;text-indent:
36.0pt'><span style='font-size:14.0pt'>3. Ch&#7853;m nh&#7845;t l&agrave;
ng&agrave;y th&#7913; m&#432;&#7901;i, k&#7875; t&#7915; ng&agrave;y
ph&aacute;t sinh ngh&#297;a v&#7909; thu&#7871; &#273;&#7889;i v&#7899;i lo&#7841;i
thu&#7871; khai v&agrave; n&#7897;p theo t&#7915;ng l&#7847;n ph&aacute;t sinh
ngh&#297;a v&#7909; thu&#7871;.</span></p>

<p class=MsoNormal style='margin-bottom:6.0pt;text-align:justify;text-indent:
36.0pt'><span style='font-size:14.0pt'>&#272;&#7889;i v&#7899;i c&aacute;c kho&#7843;n
thu t&#7915; &#273;&#7845;t &#273;ai, l&#7879; ph&iacute; tr&#432;&#7899;c b&#7841;
th&igrave; th&#7901;i h&#7841;n n&#7897;p h&#7891; s&#417; khai thu&#7871; theo
quy &#273;&#7883;nh c&#7911;a Ch&iacute;nh ph&#7911; v&agrave; ph&aacute;p lu&#7853;t
c&oacute; li&ecirc;n quan.&#8221;</span></p>

<p class=MsoNormal style='margin-bottom:6.0pt;text-align:justify;text-indent:
36.0pt'><span style='font-size:14.0pt'>&#8220;6. &#272;&#7883;a &#273;i&#7875;m
n&#7897;p h&#7891; s&#417; khai thu&#7871; &#273;&#432;&#7907;c quy &#273;&#7883;nh
nh&#432; sau:</span></p>

<p class=MsoNormal style='margin-bottom:6.0pt;text-align:justify;text-indent:
36.0pt'><span style='font-size:14.0pt'>a) Ng&#432;&#7901;i n&#7897;p thu&#7871;
n&#7897;p h&#7891; s&#417; khai thu&#7871; t&#7841;i c&#417; quan thu&#7871; qu&#7843;n
l&yacute; tr&#7921;c ti&#7871;p;</span></p>

<p class=MsoNormal style='margin-bottom:6.0pt;text-align:justify;text-indent:
36.0pt'><span style='font-size:14.0pt'>b) Tr&#432;&#7901;ng h&#7907;p n&#7897;p
h&#7891; s&#417; khai thu&#7871; theo c&#417; ch&#7871; m&#7897;t c&#7917;a
li&ecirc;n th&ocirc;ng th&igrave; &#273;&#7883;a &#273;i&#7875;m n&#7897;p h&#7891;
s&#417; khai thu&#7871; th&#7921;c hi&#7879;n theo quy &#273;&#7883;nh c&#7911;a
c&#417; ch&#7871; &#273;&oacute;;</span></p>

<p class=MsoNormal style='margin-bottom:6.0pt;text-align:justify;text-indent:
36.0pt'><span style='font-size:14.0pt'>c) &#272;&#7883;a &#273;i&#7875;m n&#7897;p
h&#7891; s&#417; khai thu&#7871; &#273;&#7889;i v&#7899;i h&agrave;ng
h&oacute;a xu&#7845;t kh&#7849;u, nh&#7853;p kh&#7849;u th&#7921;c hi&#7879;n
theo quy &#273;&#7883;nh c&#7911;a Lu&#7853;t h&#7843;i quan;</span></p>

<p class=MsoNormal style='margin-bottom:6.0pt;text-align:justify;text-indent:
36.0pt'><span style='font-size:14.0pt'>d) Ch&iacute;nh ph&#7911; quy &#273;&#7883;nh
&#273;&#7883;a &#273;i&#7875;m n&#7897;p h&#7891; s&#417; khai thu&#7871;
&#273;&#7889;i v&#7899;i c&aacute;c tr&#432;&#7901;ng h&#7907;p: ng&#432;&#7901;i
n&#7897;p thu&#7871; c&oacute; nhi&#7873;u ho&#7841;t &#273;&#7897;ng s&#7843;n
xu&#7845;t, kinh doanh; ng&#432;&#7901;i n&#7897;p thu&#7871; th&#7921;c hi&#7879;n
ho&#7841;t &#273;&#7897;ng s&#7843;n xu&#7845;t, kinh doanh &#7903; nhi&#7873;u
&#273;&#7883;a b&agrave;n; ng&#432;&#7901;i n&#7897;p thu&#7871; c&oacute;
ph&aacute;t sinh ngh&#297;a v&#7909; thu&#7871; &#273;&#7889;i v&#7899;i
c&aacute;c lo&#7841;i thu&#7871; khai v&agrave; n&#7897;p theo t&#7915;ng l&#7847;n
ph&aacute;t sinh; ng&#432;&#7901;i n&#7897;p thu&#7871; c&oacute; ph&aacute;t
sinh ngh&#297;a v&#7909; thu&#7871; &#273;&#7889;i v&#7899;i c&aacute;c kho&#7843;n
thu t&#7915; &#273;&#7845;t &#273;ai; ng&#432;&#7901;i n&#7897;p thu&#7871; th&#7921;c
hi&#7879;n khai thu&#7871; th&ocirc;ng qua giao d&#7883;ch &#273;i&#7879;n t&#7917;
v&agrave; c&aacute;c tr&#432;&#7901;ng h&#7907;p c&#7847;n thi&#7871;t
kh&aacute;c.&#8221;</span></p>

<h2><a name="_Toc114662714">10. Kho&#7843;n 2 v&agrave; kho&#7843;n 4 &#272;i&#7873;u
33 &#273;&#432;&#7907;c s&#7917;a &#273;&#7893;i, b&#7893; sung nh&#432; sau:</a></h2>

<p class=MsoNormal style='margin-bottom:6.0pt;text-align:justify;text-indent:
36.0pt'><span style='font-size:14.0pt'>&#8220;2. Th&#7901;i gian gia h&#7841;n
kh&ocirc;ng qu&aacute; ba m&#432;&#417;i ng&agrave;y &#273;&#7889;i v&#7899;i
vi&#7879;c n&#7897;p h&#7891; s&#417; khai thu&#7871; th&aacute;ng, khai thu&#7871;
qu&yacute;, khai thu&#7871; n&#259;m, khai thu&#7871; t&#7841;m t&iacute;nh,
khai thu&#7871; theo t&#7915;ng l&#7847;n ph&aacute;t sinh ngh&#297;a v&#7909;
thu&#7871;; s&aacute;u m&#432;&#417;i ng&agrave;y &#273;&#7889;i v&#7899;i vi&#7879;c
n&#7897;p h&#7891; s&#417; khai quy&#7871;t to&aacute;n thu&#7871;, k&#7875; t&#7915;
ng&agrave;y h&#7871;t th&#7901;i h&#7841;n ph&#7843;i n&#7897;p h&#7891;
s&#417; khai thu&#7871;.&#8221;</span></p>

<p class=MsoNormal style='margin-bottom:6.0pt;text-align:justify;text-indent:
36.0pt'><span style='font-size:14.0pt'>&#8220;4. Trong th&#7901;i h&#7841;n ba
ng&agrave;y l&agrave;m vi&#7879;c, k&#7875; t&#7915; ng&agrave;y nh&#7853;n
&#273;&#432;&#7907;c v&#259;n b&#7843;n &#273;&#7873; ngh&#7883; gia h&#7841;n
n&#7897;p h&#7891; s&#417; khai thu&#7871;, c&#417; quan thu&#7871; ph&#7843;i
tr&#7843; l&#7901;i b&#7857;ng v&#259;n b&#7843;n cho ng&#432;&#7901;i n&#7897;p
thu&#7871; v&#7873; vi&#7879;c ch&#7845;p nh&#7853;n hay kh&ocirc;ng ch&#7845;p
nh&#7853;n vi&#7879;c gia h&#7841;n n&#7897;p h&#7891; s&#417; khai thu&#7871;.&#8221;</span></p>

<h2><a name="_Toc114662715">11. &#272;i&#7873;u 42 &#273;&#432;&#7907;c s&#7917;a
&#273;&#7893;i, b&#7893; sung nh&#432; sau:</a></h2>

<p class=MsoNormal style='margin-bottom:6.0pt;text-align:justify;text-indent:
36.0pt'><span style='font-size:14.0pt'>&#8220;&#272;i&#7873;u 42. Th&#7901;i h&#7841;n
n&#7897;p thu&#7871;</span></p>

<p class=MsoNormal style='margin-bottom:6.0pt;text-align:justify;text-indent:
36.0pt'><span style='font-size:14.0pt'>1. Tr&#432;&#7901;ng h&#7907;p ng&#432;&#7901;i
n&#7897;p thu&#7871; t&iacute;nh thu&#7871;, th&#7901;i h&#7841;n n&#7897;p thu&#7871;
ch&#7853;m nh&#7845;t l&agrave; ng&agrave;y cu&#7889;i c&ugrave;ng c&#7911;a th&#7901;i
h&#7841;n n&#7897;p h&#7891; s&#417; khai thu&#7871;.</span></p>

<p class=MsoNormal style='margin-bottom:6.0pt;text-align:justify;text-indent:
36.0pt'><span style='font-size:14.0pt'>2. Tr&#432;&#7901;ng h&#7907;p c&#417;
quan thu&#7871; t&iacute;nh thu&#7871; ho&#7863;c &#7845;n &#273;&#7883;nh thu&#7871;,
th&#7901;i h&#7841;n n&#7897;p thu&#7871; l&agrave; th&#7901;i h&#7841;n ghi
tr&ecirc;n th&ocirc;ng b&aacute;o c&#7911;a c&#417; quan thu&#7871;.</span></p>

<p class=MsoNormal style='margin-bottom:6.0pt;text-align:justify;text-indent:
36.0pt'><span style='font-size:14.0pt'>&#272;&#7889;i v&#7899;i c&aacute;c kho&#7843;n
thu t&#7915; &#273;&#7845;t &#273;ai, l&#7879; ph&iacute; tr&#432;&#7899;c b&#7841;
th&igrave; th&#7901;i h&#7841;n n&#7897;p thu&#7871; theo quy &#273;&#7883;nh c&#7911;a
Ch&iacute;nh ph&#7911; v&agrave; ph&aacute;p lu&#7853;t c&oacute; li&ecirc;n
quan.</span></p>

<p class=MsoNormal style='margin-bottom:6.0pt;text-align:justify;text-indent:
36.0pt'><span style='font-size:14.0pt'>3. Th&#7901;i h&#7841;n n&#7897;p thu&#7871;
&#273;&#7889;i v&#7899;i h&agrave;ng ho&aacute; xu&#7845;t kh&#7849;u, nh&#7853;p
kh&#7849;u &#273;&#432;&#7907;c quy &#273;&#7883;nh nh&#432; sau:</span></p>

<p class=MsoNormal style='margin-bottom:6.0pt;text-align:justify;text-indent:
36.0pt'><span style='font-size:14.0pt'>a) H&agrave;ng h&oacute;a l&agrave;
nguy&ecirc;n li&#7879;u, v&#7853;t t&#432; nh&#7853;p kh&#7849;u &#273;&#7875;
s&#7843;n xu&#7845;t h&agrave;ng h&oacute;a xu&#7845;t kh&#7849;u, th&#7901;i h&#7841;n
n&#7897;p thu&#7871; t&#7889;i &#273;a l&agrave; hai tr&#259;m b&#7843;y
m&#432;&#417;i l&#259;m ng&agrave;y, k&#7875; t&#7915; ng&agrave;y
&#273;&#259;ng k&yacute; t&#7901; khai h&#7843;i quan n&#7871;u doanh nghi&#7879;p
&#273;&aacute;p &#7913;ng &#273;&#7911; c&aacute;c &#273;i&#7873;u ki&#7879;n
sau &#273;&acirc;y: </span></p>

<p class=MsoNormal style='margin-bottom:6.0pt;text-align:justify;text-indent:
36.0pt'><span style='font-size:14.0pt'>- C&oacute; c&#417; s&#7903; s&#7843;n
xu&#7845;t h&agrave;ng xu&#7845;t kh&#7849;u tr&ecirc;n l&atilde;nh th&#7893;
Vi&#7879;t <st1:country-region w:st="on"><st1:place w:st="on">Nam</st1:place></st1:country-region>;</span></p>

<p class=MsoNormal style='margin-bottom:6.0pt;text-align:justify;text-indent:
36.0pt'><span style='font-size:14.0pt'>- C&oacute; ho&#7841;t &#273;&#7897;ng
xu&#7845;t kh&#7849;u, nh&#7853;p kh&#7849;u trong th&#7901;i gian &iacute;t nh&#7845;t
hai n&#259;m li&ecirc;n t&#7909;c t&iacute;nh &#273;&#7871;n ng&agrave;y
&#273;&#259;ng k&yacute; t&#7901; khai h&#7843;i quan m&agrave; kh&ocirc;ng
c&oacute; h&agrave;nh vi gian l&#7853;n th&#432;&#417;ng m&#7841;i, tr&#7889;n
thu&#7871;; n&#7907; ti&#7873;n thu&#7871; qu&aacute; h&#7841;n, ti&#7873;n ch&#7853;m
n&#7897;p, ti&#7873;n ph&#7841;t;</span></p>

<p class=MsoNormal style='margin-bottom:6.0pt;text-align:justify;text-indent:
36.0pt'><span style='font-size:14.0pt'>- Tu&acirc;n th&#7911; ph&aacute;p lu&#7853;t
v&#7873; k&#7871; to&aacute;n, th&#7889;ng k&ecirc;;</span></p>

<p class=MsoNormal style='margin-bottom:6.0pt;text-align:justify;text-indent:
36.0pt'><span style='font-size:14.0pt'>- Th&#7921;c hi&#7879;n thanh
to&aacute;n qua ng&acirc;n h&agrave;ng theo quy &#273;&#7883;nh c&#7911;a
ph&aacute;p lu&#7853;t.</span></p>

<p class=MsoNormal style='margin-bottom:6.0pt;text-align:justify;text-indent:
36.0pt'><span style='font-size:14.0pt'>Tr&#432;&#7901;ng h&#7907;p kh&ocirc;ng
&#273;&aacute;p &#7913;ng c&aacute;c &#273;i&#7873;u ki&#7879;n n&ecirc;u
tr&ecirc;n nh&#432;ng &#273;&#432;&#7907;c t&#7893; ch&#7913;c t&iacute;n d&#7909;ng
b&#7843;o l&atilde;nh s&#7889; thu&#7871; ph&#7843;i n&#7897;p th&igrave; th&#7901;i
h&#7841;n n&#7897;p thu&#7871; theo th&#7901;i h&#7841;n b&#7843;o l&atilde;nh,
nh&#432;ng kh&ocirc;ng qu&aacute; hai tr&#259;m b&#7843;y m&#432;&#417;i
l&#259;m ng&agrave;y, k&#7875; t&#7915; ng&agrave;y &#273;&#259;ng k&yacute; t&#7901;
khai h&#7843;i quan v&agrave; kh&ocirc;ng ph&#7843;i n&#7897;p ti&#7873;n ch&#7853;m
n&#7897;p trong th&#7901;i h&#7841;n b&#7843;o l&atilde;nh.</span></p>

<p class=MsoNormal style='margin-bottom:6.0pt;text-align:justify;text-indent:
36.0pt'><span style='font-size:14.0pt'>Tr&#432;&#7901;ng h&#7907;p kh&ocirc;ng
&#273;&aacute;p &#7913;ng c&aacute;c &#273;i&#7873;u ki&#7879;n n&ecirc;u
tr&ecirc;n ho&#7863;c kh&ocirc;ng &#273;&#432;&#7907;c t&#7893; ch&#7913;c
t&iacute;n d&#7909;ng b&#7843;o l&atilde;nh th&igrave; ph&#7843;i n&#7897;p thu&#7871;
tr&#432;&#7899;c khi &#273;&#432;&#7907;c th&ocirc;ng quan ho&#7863;c gi&#7843;i
ph&oacute;ng h&agrave;ng h&oacute;a;</span></p>

<p class=MsoNormal style='margin-bottom:6.0pt;text-align:justify;text-indent:
36.0pt'><span style='font-size:14.0pt'>b) H&agrave;ng h&oacute;a kinh doanh t&#7841;m
nh&#7853;p, t&aacute;i xu&#7845;t ph&#7843;i n&#7897;p thu&#7871; tr&#432;&#7899;c
khi ho&agrave;n th&agrave;nh th&#7911; t&#7909;c h&#7843;i quan t&#7841;m nh&#7853;p
kh&#7849;u h&agrave;ng h&oacute;a.</span></p>

<p class=MsoNormal style='margin-bottom:6.0pt;text-align:justify;text-indent:
36.0pt'><span style='font-size:14.0pt'>Tr&#432;&#7901;ng h&#7907;p &#273;&#432;&#7907;c
t&#7893; ch&#7913;c t&iacute;n d&#7909;ng b&#7843;o l&atilde;nh s&#7889; thu&#7871;
ph&#7843;i n&#7897;p th&igrave; th&#7901;i h&#7841;n n&#7897;p thu&#7871; theo
th&#7901;i h&#7841;n b&#7843;o l&atilde;nh nh&#432;ng kh&ocirc;ng qu&aacute;
m&#432;&#7901;i l&#259;m ng&agrave;y, k&#7875; t&#7915; ng&agrave;y h&#7871;t
th&#7901;i h&#7841;n t&#7841;m nh&#7853;p, t&aacute;i xu&#7845;t v&agrave;
kh&ocirc;ng ph&#7843;i n&#7897;p ti&#7873;n ch&#7853;m n&#7897;p trong th&#7901;i
h&#7841;n b&#7843;o l&atilde;nh;</span></p>

<p class=MsoNormal style='margin-bottom:6.0pt;text-align:justify;text-indent:
36.0pt'><span style='font-size:14.0pt'>c) H&agrave;ng h&oacute;a kh&ocirc;ng
thu&#7897;c &#273;i&#7875;m a v&agrave; &#273;i&#7875;m b kho&#7843;n
n&agrave;y th&igrave; ph&#7843;i n&#7897;p thu&#7871; tr&#432;&#7899;c khi
th&ocirc;ng quan ho&#7863;c gi&#7843;i ph&oacute;ng h&agrave;ng h&oacute;a.</span></p>

<p class=MsoNormal style='margin-bottom:6.0pt;text-align:justify;text-indent:
36.0pt'><span style='font-size:14.0pt'>Tr&#432;&#7901;ng h&#7907;p &#273;&#432;&#7907;c
t&#7893; ch&#7913;c t&iacute;n d&#7909;ng b&#7843;o l&atilde;nh s&#7889; thu&#7871;
ph&#7843;i n&#7897;p th&igrave; &#273;&#432;&#7907;c th&ocirc;ng quan ho&#7863;c
gi&#7843;i ph&oacute;ng h&agrave;ng h&oacute;a nh&#432;ng ph&#7843;i n&#7897;p
ti&#7873;n ch&#7853;m n&#7897;p k&#7875; t&#7915; ng&agrave;y &#273;&#432;&#7907;c
th&ocirc;ng quan ho&#7863;c gi&#7843;i ph&oacute;ng h&agrave;ng h&oacute;a
&#273;&#7871;n ng&agrave;y n&#7897;p thu&#7871; theo quy &#273;&#7883;nh t&#7841;i
&#272;i&#7873;u 106 c&#7911;a Lu&#7853;t n&agrave;y. Th&#7901;i h&#7841;n b&#7843;o
l&atilde;nh t&#7889;i &#273;a l&agrave; ba m&#432;&#417;i ng&agrave;y, k&#7875;
t&#7915; ng&agrave;y &#273;&#259;ng k&yacute; t&#7901; khai h&#7843;i quan; </span></p>

<p class=MsoNormal style='margin-bottom:6.0pt;text-align:justify;text-indent:
36.0pt'><span style='font-size:14.0pt'>d) C&aacute;c tr&#432;&#7901;ng h&#7907;p
&#273;&atilde; &#273;&#432;&#7907;c t&#7893; ch&#7913;c t&iacute;n d&#7909;ng b&#7843;o
l&atilde;nh nh&#432;ng h&#7871;t th&#7901;i h&#7841;n b&#7843;o l&atilde;nh
m&agrave; ng&#432;&#7901;i n&#7897;p thu&#7871; ch&#432;a n&#7897;p thu&#7871;
v&agrave; ti&#7873;n ch&#7853;m n&#7897;p (n&#7871;u c&oacute;), th&igrave; t&#7893;
ch&#7913;c nh&#7853;n b&#7843;o l&atilde;nh c&oacute; tr&aacute;ch nhi&#7879;m
n&#7897;p &#273;&#7911; thu&#7871; v&agrave; ti&#7873;n ch&#7853;m n&#7897;p
thay cho ng&#432;&#7901;i n&#7897;p thu&#7871;.&#8221;</span></p>

<h2><a name="_Toc114662716">12. &#272;i&#7873;u 45 &#273;&#432;&#7907;c s&#7917;a
&#273;&#7893;i, b&#7893; sung nh&#432; sau:</a></h2>

<p class=MsoNormal style='margin-bottom:6.0pt;text-align:justify;text-indent:
36.0pt'><span style='font-size:14.0pt'>&#8220;&#272;i&#7873;u 45. Th&#7913; t&#7921;
thanh to&aacute;n ti&#7873;n thu&#7871;, ti&#7873;n ch&#7853;m n&#7897;p, ti&#7873;n
ph&#7841;t</span></p>

<p class=MsoNormal style='margin-bottom:6.0pt;text-align:justify;text-indent:
36.0pt'><span style='font-size:14.0pt'>Tr&#432;&#7901;ng h&#7907;p ng&#432;&#7901;i
n&#7897;p thu&#7871; v&#7915;a c&oacute; s&#7889; ti&#7873;n thu&#7871; n&#7907;,
ti&#7873;n thu&#7871; truy thu, ti&#7873;n thu&#7871; ph&aacute;t sinh, ti&#7873;n
ch&#7853;m n&#7897;p, ti&#7873;n ph&#7841;t th&igrave; vi&#7879;c thanh
to&aacute;n &#273;&#432;&#7907;c th&#7921;c hi&#7879;n theo th&#7913; t&#7921;
sau &#273;&acirc;y:</span></p>

<p class=MsoNormal style='margin-bottom:6.0pt;text-align:justify;text-indent:
36.0pt'><span style='font-size:14.0pt'>1. &#272;&#7889;i v&#7899;i c&aacute;c
lo&#7841;i thu&#7871; do c&#417; quan thu&#7871; qu&#7843;n l&yacute;:</span></p>

<p class=MsoNormal style='margin-bottom:6.0pt;text-align:justify;text-indent:
36.0pt'><span style='font-size:14.0pt'>a) Ti&#7873;n thu&#7871; n&#7907;;</span></p>

<p class=MsoNormal style='margin-bottom:6.0pt;text-align:justify;text-indent:
36.0pt'><span style='font-size:14.0pt'>b) Ti&#7873;n thu&#7871; truy thu;</span></p>

<p class=MsoNormal style='margin-bottom:6.0pt;text-align:justify;text-indent:
36.0pt'><span style='font-size:14.0pt'>c) Ti&#7873;n ch&#7853;m n&#7897;p;</span></p>

<p class=MsoNormal style='margin-bottom:6.0pt;text-align:justify;text-indent:
36.0pt'><span style='font-size:14.0pt'>d) Ti&#7873;n thu&#7871; ph&aacute;t
sinh;</span></p>

<p class=MsoNormal style='margin-bottom:6.0pt;text-align:justify;text-indent:
36.0pt'><span style='font-size:14.0pt'>&#273;) Ti&#7873;n ph&#7841;t;</span></p>

<p class=MsoNormal style='margin-bottom:6.0pt;text-align:justify;text-indent:
36.0pt'><span style='font-size:14.0pt'>2. &#272;&#7889;i v&#7899;i c&aacute;c
lo&#7841;i thu&#7871; do c&#417; quan h&#7843;i quan qu&#7843;n l&yacute;:</span></p>

<p class=MsoNormal style='margin-bottom:6.0pt;text-align:justify;text-indent:

kh&ocirc;ng qu&aacute; m&#7897;t l&#7847;n trong m&#7897;t n&#259;m.</p>

<p class=MsoNormal style='margin-bottom:6.0pt;text-align:justify;text-indent:
36.0pt'><span style='font-size:14.0pt'>2. Quy&#7871;t &#273;&#7883;nh ki&#7875;m
tra thu&#7871; ph&#7843;i &#273;&#432;&#7907;c g&#7917;i cho ng&#432;&#7901;i n&#7897;p
thu&#7871; trong th&#7901;i h&#7841;n ba ng&agrave;y l&agrave;m vi&#7879;c, k&#7875;
t&#7915; ng&agrave;y k&yacute;. Trong th&#7901;i h&#7841;n n&#259;m ng&agrave;y
l&agrave;m vi&#7879;c, k&#7875; t&#7915; ng&agrave;y nh&#7853;n &#273;&#432;&#7907;c
quy&#7871;t &#273;&#7883;nh ki&#7875;m tra thu&#7871; m&agrave; ng&#432;&#7901;i
n&#7897;p thu&#7871; ch&#7913;ng minh &#273;&#432;&#7907;c s&#7889; thu&#7871;
&#273;&atilde; khai l&agrave; &#273;&uacute;ng ho&#7863;c n&#7897;p &#273;&#7911;
s&#7889; ti&#7873;n thu&#7871; ph&#7843;i n&#7897;p th&igrave; c&#417; quan qu&#7843;n
l&yacute; thu&#7871; b&atilde;i b&#7887; quy&#7871;t &#273;&#7883;nh ki&#7875;m
tra thu&#7871;.</span></p>

<p class=MsoNormal style='margin-bottom:6.0pt;text-align:justify;text-indent:
36.0pt'><span style='font-size:14.0pt'>3. Tr&igrave;nh t&#7921;, th&#7911; t&#7909;c
ki&#7875;m tra thu&#7871; &#273;&#432;&#7907;c quy &#273;&#7883;nh nh&#432;
sau:</span></p>

<p class=MsoNormal style='margin-bottom:6.0pt;text-align:justify;text-indent:
36.0pt'><span style='font-size:14.0pt'>a) C&ocirc;ng b&#7889; quy&#7871;t
&#273;&#7883;nh ki&#7875;m tra thu&#7871; khi b&#7855;t &#273;&#7847;u ti&#7871;n
h&agrave;nh ki&#7875;m tra thu&#7871;;</span></p>

<p class=MsoNormal style='margin-bottom:6.0pt;text-align:justify;text-indent:
36.0pt'><span style='font-size:14.0pt'>b) &#272;&#7889;i chi&#7871;u n&#7897;i
dung khai b&aacute;o v&#7899;i s&#7893; k&#7871; to&aacute;n, ch&#7913;ng t&#7915;
k&#7871; to&aacute;n, b&aacute;o c&aacute;o t&agrave;i ch&iacute;nh, c&aacute;c
t&agrave;i li&#7879;u c&oacute; li&ecirc;n quan, t&igrave;nh tr&#7841;ng th&#7921;c
t&#7871; trong ph&#7841;m vi, n&#7897;i dung c&#7911;a quy&#7871;t &#273;&#7883;nh
ki&#7875;m tra thu&#7871;;</span></p>

<p class=MsoNormal style='margin-bottom:6.0pt;text-align:justify;text-indent:
36.0pt'><span style='font-size:14.0pt'>c) Th&#7901;i h&#7841;n ki&#7875;m tra
thu&#7871; kh&ocirc;ng qu&aacute; n&#259;m ng&agrave;y l&agrave;m vi&#7879;c, k&#7875;
t&#7915; ng&agrave;y c&ocirc;ng b&#7889; quy&#7871;t &#273;&#7883;nh ki&#7875;m
tra; tr&#432;&#7901;ng h&#7907;p ki&#7875;m tra theo k&#7871; ho&#7841;ch
&#273;&#7889;i v&#7899;i h&agrave;ng ho&aacute; xu&#7845;t kh&#7849;u, nh&#7853;p
kh&#7849;u th&igrave; th&#7901;i h&#7841;n kh&ocirc;ng qu&aacute; m&#432;&#7901;i
l&#259;m ng&agrave;y;</span></p>

<p class=MsoNormal style='margin-bottom:6.0pt;text-align:justify;text-indent:
36.0pt'><span style='font-size:14.0pt'>d) Trong tr&#432;&#7901;ng h&#7907;p c&#7847;n
thi&#7871;t, quy&#7871;t &#273;&#7883;nh ki&#7875;m tra thu&#7871; &#273;&#432;&#7907;c
gia h&#7841;n m&#7897;t l&#7847;n; th&#7901;i gian gia h&#7841;n kh&ocirc;ng qu&aacute;
th&#7901;i h&#7841;n quy &#273;&#7883;nh t&#7841;i &#273;i&#7875;m c kho&#7843;n
n&agrave;y;</span></p>

<p class=MsoNormal style='margin-bottom:6.0pt;text-align:justify;text-indent:
36.0pt'><span style='font-size:14.0pt'>&#273;) L&#7853;p bi&ecirc;n b&#7843;n
ki&#7875;m tra thu&#7871; trong th&#7901;i h&#7841;n n&#259;m ng&agrave;y
l&agrave;m vi&#7879;c, k&#7875; t&#7915; ng&agrave;y h&#7871;t th&#7901;i h&#7841;n
ki&#7875;m tra;</span></p>

<p class=MsoNormal style='margin-bottom:6.0pt;text-align:justify;text-indent:
36.0pt'><span style='font-size:14.0pt'>e) X&#7917; l&yacute; theo th&#7849;m
quy&#7873;n ho&#7863;c chuy&#7875;n c&#7845;p c&oacute; th&#7849;m quy&#7873;n
x&#7917; l&yacute; theo k&#7871;t qu&#7843; ki&#7875;m tra.&#8221;</span></p>

<h2><a name="_Toc114662729">25. B&#7893; sung kho&#7843;n 4 v&agrave;o &#272;i&#7873;u
92 nh&#432; sau:</a></h2>

<p class=MsoNormal style='margin-bottom:6.0pt;text-align:justify;text-indent:
36.0pt'><span style='font-size:14.0pt'>&#8220;4. Ch&#432;a th&#7921;c hi&#7879;n
bi&#7879;n ph&aacute;p c&#432;&#7905;ng ch&#7871; thu&#7871; &#273;&#7889;i v&#7899;i
tr&#432;&#7901;ng h&#7907;p ng&#432;&#7901;i n&#7897;p thu&#7871;
&#273;&#432;&#417;&#803;c c&#417; quan qu&#7843;n l&yacute; thu&ecirc;&#769;
cho phe&#769;p n&ocirc;&#803;p d&acirc;&#768;n ti&ecirc;&#768;n n&#417;&#803;
thu&ecirc;&#769; trong th&#417;&#768;i ha&#803;n kh&ocirc;ng qua&#769; m&#432;&#7901;i
hai tha&#769;ng, k&#7875; t&#7915; ng&agrave;y b&#7855;t &#273;&#7847;u c&#7911;a
th&#7901;i h&#7841;n c&#432;&#7905;ng ch&#7871; thu&#7871;. Vi&ecirc;&#803;c
n&ocirc;&#803;p d&acirc;&#768;n ti&ecirc;&#768;n n&#417;&#803; thu&ecirc;&#769;

&#273;&ecirc;&#768; nghi&#803; cu&#777;a ng&#432;&#417;&#768;i n&ocirc;&#803;p
thu&ecirc;&#769; va&#768; ph&#7843;i co&#769; ba&#777;o la&#771;nh cu&#777;a t&#7893;
ch&#7913;c t&iacute;n d&#7909;ng. Ng&#432;&#7901;i n&#7897;p thu&#7871; ph&#7843;i
n&#7897;p ti&#7873;n ch&#7853;m n&#7897;p theo m&#7913;c 0,05%/ng&agrave;y
t&iacute;nh tr&ecirc;n s&#7889; ti&#7873;n thu&#7871; ch&#7853;m n&#7897;p.</span></p>

<p class=MsoNormal style='margin-bottom:6.0pt;text-align:justify;text-indent:
36.0pt'><span style='font-size:14.0pt'>Ch&iacute;nh ph&#7911; quy &#273;&#7883;nh
chi ti&#7871;t kho&#7843;n n&agrave;y.&#8221;</span></p>

<h2><a name="_Toc114662730">26. S&#7917;a &#273;&#7893;i, b&#7893; sung kho&#7843;n
1 &#272;i&#7873;u 93; b&#7893; sung kho&#7843;n 3 v&agrave;o &#272;i&#7873;u 93
nh&#432; sau:</a></h2>

<p class=MsoNormal style='margin-bottom:6.0pt;text-align:justify;text-indent:
36.0pt'><span style='font-size:14.0pt'>&#8220;1. C&aacute;c bi&#7879;n
ph&aacute;p c&#432;&#7905;ng ch&#7871; thi h&agrave;nh quy&#7871;t &#273;&#7883;nh

<p class=MsoNormal style='margin-bottom:6.0pt;text-align:justify;text-indent:
36.0pt'><span style='font-size:14.0pt'>a) Tr&iacute;ch ti&#7873;n t&#7915;
t&agrave;i kho&#7843;n c&#7911;a &#273;&#7889;i t&#432;&#7907;ng b&#7883;
c&#432;&#7905;ng ch&#7871; thi h&agrave;nh quy&#7871;t &#273;&#7883;nh
h&agrave;nh ch&iacute;nh thu&#7871; t&#7841;i Kho b&#7841;c Nh&agrave; n&#432;&#7899;c,
ng&acirc;n h&agrave;ng th&#432;&#417;ng m&#7841;i, t&#7893; ch&#7913;c
t&iacute;n d&#7909;ng kh&aacute;c; y&ecirc;u c&#7847;u phong to&#7843;
t&agrave;i kho&#7843;n; </span></p>

<p class=MsoNormal style='margin-bottom:6.0pt;text-align:justify;text-indent:
36.0pt'><span style='font-size:14.0pt'>b) Kh&#7845;u tr&#7915; m&#7897;t ph&#7847;n
ti&#7873;n l&#432;&#417;ng ho&#7863;c thu nh&#7853;p;</span></p>

<p class=MsoNormal style='margin-bottom:6.0pt;text-align:justify;text-indent:
36.0pt'><span style='font-size:14.0pt'>c) D&#7915;ng l&agrave;m th&#7911; t&#7909;c
h&#7843;i quan &#273;&#7889;i v&#7899;i h&agrave;ng h&oacute;a xu&#7845;t kh&#7849;u,
nh&#7853;p kh&#7849;u; </span></p>

<p class=MsoNormal style='margin-bottom:6.0pt;text-align:justify;text-indent:
36.0pt'><span style='font-size:14.0pt'>d) Th&ocirc;ng b&aacute;o ho&aacute;
&#273;&#417;n kh&ocirc;ng c&ograve;n gi&aacute; tr&#7883; s&#7917; d&#7909;ng;</span></p>

<p class=MsoNormal style='margin-bottom:6.0pt;text-align:justify;text-indent:
36.0pt'><span style='font-size:14.0pt'>&#273;) K&ecirc; bi&ecirc;n t&agrave;i s&#7843;n,
b&aacute;n &#273;&#7845;u gi&aacute; t&agrave;i s&#7843;n k&ecirc; bi&ecirc;n

<p class=MsoNormal style='margin-bottom:6.0pt;text-align:justify;text-indent:
36.0pt'><span style='font-size:14.0pt'>e) Thu ti&#7873;n, t&agrave;i s&#7843;n
kh&aacute;c c&#7911;a &#273;&#7889;i t&#432;&#7907;ng b&#7883; c&#432;&#7905;ng
ch&#7871; thi h&agrave;nh quy&#7871;t &#273;&#7883;nh h&agrave;nh ch&iacute;nh
thu&#7871; do t&#7893; ch&#7913;c, c&aacute; nh&acirc;n kh&aacute;c &#273;ang n&#7855;m
gi&#7919;; </span></p>

<p class=MsoNormal style='margin-bottom:6.0pt;text-align:justify;text-indent:
36.0pt'><span style='font-size:14.0pt'>g) Thu h&#7891;i gi&#7845;y ch&#7913;ng
nh&#7853;n &#273;&#259;ng k&yacute; kinh doanh, gi&#7845;y ch&#7913;ng nh&#7853;n
&#273;&#259;ng k&yacute; doanh nghi&#7879;p, gi&#7845;y ph&eacute;p
th&agrave;nh l&#7853;p v&agrave; ho&#7841;t &#273;&#7897;ng, gi&#7845;y
ph&eacute;p h&agrave;nh ngh&#7873;.&#8221;</span></p>

<p class=MsoNormal style='margin-bottom:6.0pt;text-align:justify;text-indent:
36.0pt'><span style='font-size:14.0pt'>&#8220;3. Vi&#7879;c &aacute;p d&#7909;ng
c&aacute;c bi&#7879;n ph&aacute;p c&#432;&#7905;ng ch&#7871; quy &#273;&#7883;nh
t&#7841;i kho&#7843;n 1 &#272;i&#7873;u n&agrave;y th&#7921;c hi&#7879;n theo
quy &#273;&#7883;nh t&#7841;i c&aacute;c &#273;i&#7873;u 97, 98, 98a, 99, 100,
101 v&agrave; 102 c&#7911;a Lu&#7853;t n&agrave;y v&agrave; quy &#273;&#7883;nh
kh&aacute;c c&#7911;a c&aacute;c v&#259;n b&#7843;n ph&aacute;p lu&#7853;t
c&oacute; li&ecirc;n quan. Trong tr&#432;&#7901;ng h&#7907;p ng&#432;&#7901;i n&#7897;p
thu&#7871; c&oacute; h&agrave;nh vi b&#7887; tr&#7889;n, t&#7849;u t&aacute;n
t&agrave;i s&#7843;n th&igrave; ng&#432;&#7901;i c&oacute; th&#7849;m quy&#7873;n
ra quy&#7871;t &#273;&#7883;nh c&#432;&#7905;ng ch&#7871; quy &#273;&#7883;nh t&#7841;i
&#272;i&#7873;u 94 c&#7911;a Lu&#7853;t n&agrave;y quy&#7871;t &#273;&#7883;nh
vi&#7879;c &aacute;p d&#7909;ng bi&#7879;n ph&aacute;p c&#432;&#7905;ng ch&#7871;
ph&ugrave; h&#7907;p &#273;&#7875; &#273;&#7843;m b&#7843;o thu h&#7891;i n&#7907;
thu&#7871; k&#7883;p th&#7901;i cho ng&acirc;n s&aacute;ch nh&agrave; n&#432;&#7899;c.&#8221;</span></p>

sau &#272;i&#7873;u 98 nh&#432; sau:</a></h2>

<p class=MsoNormal style='margin-bottom:6.0pt;text-align:justify;text-indent:
36.0pt'><span style='font-size:14.0pt'>&#8220;&#272;i&#7873;u 98a. C&#432;&#7905;ng
ch&#7871; b&#7857;ng bi&#7879;n ph&aacute;p th&ocirc;ng b&aacute;o h&oacute;a
&#273;&#417;n kh&ocirc;ng c&ograve;n gi&aacute; tr&#7883; s&#7917; d&#7909;ng</span></p>

<p class=MsoNormal style='margin-bottom:6.0pt;text-align:justify;text-indent:
36.0pt'><span style='font-size:14.0pt'>1. C&#432;&#7905;ng ch&#7871; b&#7857;ng
bi&#7879;n ph&aacute;p th&ocirc;ng b&aacute;o h&oacute;a &#273;&#417;n
kh&ocirc;ng c&ograve;n gi&aacute; tr&#7883; s&#7917; d&#7909;ng &#273;&#432;&#7907;c
th&#7921;c hi&#7879;n khi c&#417; quan qu&#7843;n l&yacute; thu&#7871;
kh&ocirc;ng &aacute;p d&#7909;ng &#273;&#432;&#7907;c ho&#7863;c &#273;&atilde;
&aacute;p d&#7909;ng c&aacute;c bi&#7879;n ph&aacute;p c&#432;&#7905;ng ch&#7871;
quy &#273;&#7883;nh t&#7841;i c&aacute;c &#273;i&#7875;m a, b v&agrave; c kho&#7843;n
1 &#272;i&#7873;u 93 c&#7911;a Lu&#7853;t n&agrave;y nh&#432;ng v&#7851;n
ch&#432;a thu &#273;&#7911; s&#7889; ti&#7873;n thu&#7871; n&#7907;, ti&#7873;n
ch&#7853;m n&#7897;p, ti&#7873;n ph&#7841;t.</span></p>

<p class=MsoNormal style='margin-bottom:6.0pt;text-align:justify;text-indent:
36.0pt'><span style='font-size:14.0pt'>2. Th&#7911; tr&#432;&#7903;ng c&#417;
quan qu&#7843;n l&yacute; thu&#7871; c&oacute; tr&aacute;ch nhi&#7879;m
th&ocirc;ng b&aacute;o cho &#273;&#7889;i t&#432;&#7907;ng b&#7883; c&#432;&#7905;ng
ch&#7871; bi&#7871;t trong th&#7901;i h&#7841;n ba ng&agrave;y l&agrave;m vi&#7879;c
tr&#432;&#7899;c khi th&ocirc;ng b&aacute;o h&oacute;a &#273;&#417;n
kh&ocirc;ng c&ograve;n gi&aacute; tr&#7883; s&#7917; d&#7909;ng.</span></p>

<p class=MsoNormal style='margin-bottom:6.0pt;text-align:justify;text-indent:
36.0pt'><span style='font-size:14.0pt'>3. Khi th&#7921;c hi&#7879;n bi&#7879;n
ph&aacute;p c&#432;&#7905;ng ch&#7871; theo quy &#273;&#7883;nh t&#7841;i
&#272;i&#7873;u n&agrave;y, c&#417; quan qu&#7843;n l&yacute; thu&#7871; ph&#7843;i
th&ocirc;ng b&aacute;o c&ocirc;ng khai tr&ecirc;n ph&#432;&#417;ng ti&#7879;n
th&ocirc;ng tin &#273;&#7841;i ch&uacute;ng.&#8221;</span></p>

<h2><a name="_Toc114662732">28. Kho&#7843;n 1 &#272;i&#7873;u 99 &#273;&#432;&#7907;c

<p class=MsoNormal style='margin-bottom:6.0pt;text-align:justify;text-indent:
36.0pt'><span style='font-size:14.0pt'>&#8220;1. Bi&#7879;n ph&aacute;p
k&ecirc; bi&ecirc;n t&agrave;i s&#7843;n, b&aacute;n &#273;&#7845;u gi&aacute;
t&agrave;i s&#7843;n k&ecirc; bi&ecirc;n &#273;&#432;&#7907;c &aacute;p d&#7909;ng

&#273;&#432;&#7907;c ho&#7863;c &#273;&atilde; &aacute;p d&#7909;ng c&aacute;c

s&#7889; ti&#7873;n thu&#7871; n&#7907;, ti&#7873;n ch&#7853;m n&#7897;p, ti&#7873;n
ph&#7841;t.</span></p>

<p class=MsoNormal style='margin-bottom:6.0pt;text-align:justify;text-indent:
36.0pt'><span style='font-size:14.0pt'>Kh&ocirc;ng &aacute;p d&#7909;ng bi&#7879;n
ph&aacute;p k&ecirc; bi&ecirc;n t&agrave;i s&#7843;n trong tr&#432;&#7901;ng h&#7907;p
ng&#432;&#7901;i n&#7897;p thu&#7871; l&agrave; c&aacute; nh&acirc;n &#273;ang
trong th&#7901;i gian ch&#7919;a b&#7879;nh t&#7841;i c&#417; s&#7903;
kh&aacute;m b&#7879;nh, ch&#7919;a b&#7879;nh &#273;&#432;&#7907;c th&agrave;nh
l&#7853;p theo quy &#273;&#7883;nh c&#7911;a ph&aacute;p lu&#7853;t Vi&#7879;t <st1:place
w:st="on"><st1:country-region w:st="on">Nam</st1:country-region></st1:place>.&#8221;</span></p>

<h2><a name="_Toc114662733">29. S&#7917;a &#273;&#7893;i, b&#7893; sung &#273;i&#7875;m
a kho&#7843;n 1 &#272;i&#7873;u 100; b&#7893; sung kho&#7843;n 4 v&agrave;o
&#272;i&#7873;u 100 nh&#432; sau:</a></h2>

<p class=MsoNormal style='margin-bottom:6.0pt;text-align:justify;text-indent:
36.0pt'><span style='font-size:14.0pt'>&#8220;a) C&#417; quan qu&#7843;n
l&yacute; thu&#7871; kh&ocirc;ng &aacute;p d&#7909;ng &#273;&#432;&#7907;c ho&#7863;c
&#273;&atilde; &aacute;p d&#7909;ng c&aacute;c bi&#7879;n ph&aacute;p c&#432;&#7905;ng
ch&#7871; quy &#273;&#7883;nh t&#7841;i c&aacute;c &#273;i&#7875;m a, b, c, d
v&agrave; &#273; kho&#7843;n 1 &#272;i&#7873;u 93 c&#7911;a Lu&#7853;t
n&agrave;y nh&#432;ng v&#7851;n ch&#432;a thu &#273;&#7911; s&#7889; ti&#7873;n
thu&#7871; n&#7907;, ti&#7873;n ch&#7853;m n&#7897;p, ti&#7873;n ph&#7841;t;&#8221;</span></p>

<p class=MsoNormal style='margin-bottom:6.0pt;text-align:justify;text-indent:
36.0pt'><span style='font-size:14.0pt'>&#8220;4. Ch&iacute;nh ph&#7911; quy
&#273;&#7883;nh tr&igrave;nh t&#7921;, th&#7911; t&#7909;c c&#432;&#7905;ng ch&#7871;
thi h&agrave;nh quy&#7871;t &#273;&#7883;nh h&agrave;nh ch&iacute;nh thu&#7871;
b&#7857;ng bi&#7879;n ph&aacute;p thu ti&#7873;n, t&agrave;i s&#7843;n
kh&aacute;c c&#7911;a &#273;&#7889;i t&#432;&#7907;ng b&#7883; c&#432;&#7905;ng
ch&#7871; do t&#7893; ch&#7913;c, c&aacute; nh&acirc;n kh&aacute;c &#273;ang n&#7855;m
gi&#7919;.&#8221;</span></p>

<h2><a name="_Toc114662734">30. S&#7917;a &#273;&#7893;i t&ecirc;n &#272;i&#7873;u
101; s&#7917;a &#273;&#7893;i kho&#7843;n 1 &#272;i&#7873;u 101; b&#7893; sung
kho&#7843;n 3 v&agrave;o &#272;i&#7873;u 101 nh&#432; sau:</a> </h2>

<p class=MsoNormal style='margin-bottom:6.0pt;text-align:justify;text-indent:
36.0pt'><span style='font-size:14.0pt'>&#8220;&#272;i&#7873;u 101. C&#432;&#7905;ng
ch&#7871; b&#7857;ng bi&#7879;n ph&aacute;p d&#7915;ng l&agrave;m th&#7911; t&#7909;c
h&#7843;i quan &#273;&#7889;i v&#7899;i h&agrave;ng ho&aacute; xu&#7845;t kh&#7849;u,
nh&#7853;p kh&#7849;u</span></p>

<p class=MsoNormal style='margin-bottom:6.0pt;text-align:justify;text-indent:
36.0pt'><span style='font-size:14.0pt'>1. C&#432;&#7905;ng ch&#7871; b&#7857;ng

<p class=MsoNormal style='margin-bottom:6.0pt;text-align:justify;text-indent:

<p class=MsoNormal style='margin-bottom:6.0pt;text-align:justify;text-indent:

<p class=MsoNormal style='margin-bottom:6.0pt;text-align:justify;text-indent:
36.0pt'><span style='font-size:14.0pt'>3. Khi th&#7921;c hi&#7879;n bi&#7879;n

<p class=MsoNormal style='margin-bottom:6.0pt;text-align:justify;text-indent:

<p class=MsoNormal style='margin-bottom:6.0pt;text-align:justify;text-indent:

<p class=MsoNormal style='margin-bottom:6.0pt;text-align:justify;text-indent:
36.0pt'><span style='font-size:14.0pt'>2. Ng&#432;&#7901;i n&#7897;p thu&#7871;

ph&#7843;i n&#7897;p tr&#432;&#7899;c khi c&#417; quan c&oacute; th&#7849;m quy&#7873;n
ph&aacute;t hi&#7879;n th&igrave; ph&#7843;i n&#7897;p ti&#7873;n ch&#7853;m n&#7897;p,
nh&#432;ng kh&ocirc;ng b&#7883; x&#7917; ph&#7841;t vi ph&#7841;m th&#7911; t&#7909;c

</span></p>

<p class=MsoNormal style='margin-bottom:6.0pt;text-align:justify;text-indent:

<p class=MsoNormal style='margin-bottom:6.0pt;text-align:justify;text-indent:

<p class=MsoNormal style='margin-bottom:6.0pt;text-align:justify;text-indent:

<p class=MsoNormal style='margin-bottom:6.0pt;text-align:justify;text-indent:

&#273;&#432;&#7907;c ho&agrave;n cao h&#417;n v&agrave; ti&#7873;n ch&#7853;m n&#7897;p

<p class=MsoNormal style='margin-bottom:6.0pt;text-align:justify;text-indent:

<p class=MsoNormal style='margin-bottom:6.0pt;text-align:justify;text-indent:

<p class=MsoNormal style='margin-bottom:6.0pt;text-align:justify;text-indent:
