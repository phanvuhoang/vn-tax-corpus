v&#7873; vi&#7879;c &#7845;n &#273;&#7883;nh thu&#7871;. Ng&#432;&#7901;i
n&#7897;p thu&#7871; có trách nhi&#7879;m cung c&#7845;p các h&#7891; s&#417;,
tài li&#7879;u &#273;&#7875; ch&#7913;ng minh cho vi&#7879;c khi&#7871;u

ho&#7863;c gi&#7843;i quy&#7871;t tr&#432;&#7899;c &#273;ó;<b style='margin-bottom:.0001pt;text-align:
justify;text-indent:36.0pt;line-height:normal'><a name="_lio4d0ouqu1a"></a><span
lang=VI style='font-size:14.0pt;font-family:"Times New Roman",serif;"Times New Roman";color:black;
