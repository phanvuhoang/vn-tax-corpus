Ch&iacute;nh ph&#7911; th&#7889;ng nh&#7845;t qu&#7843;n l&yacute; nh&agrave;
n&#432;&#7899;c v&#7873; qu&#7843;n l&yacute; thu&#7871; v&agrave; c&oacute;
nhi&#7879;m v&#7909;, quy&#7873;n h&#7841;n sau &#273;&acirc;y:</span></h5>

<p class=MsoNormal style='margin-bottom:6.0pt;text-align:justify;text-indent:
36.0pt;nh
theo th&#7849;m quy&#7873;n ho&#7863;c tr&igrave;nh c&#7845;p c&oacute; th&#7849;m
quy&#7873;n ban h&agrave;nh v&#259;n b&#7843;n quy ph&#7841;m ph&aacute;p lu&#7853;t
v&#7873; qu&#7843;n l&yacute; thu&#7871;;</span></p>

<p class=MsoNormal style='margin-bottom:6.0pt;text-align:justify;text-indent:
36.0pt; ch&#7913;c
vi&#7879;c th&#7921;c hi&#7879;n qu&#7843;n l&yacute; thu&#7871; theo quy
&#273;&#7883;nh c&#7911;a Lu&#7853;t n&agrave;y v&agrave; quy &#273;&#7883;nh
kh&aacute;c c&#7911;a ph&aacute;p lu&#7853;t c&oacute; li&ecirc;n quan;</span></p>

<p class=MsoNormal style='margin-bottom:6.0pt;text-align:justify;text-indent:
36.0pt; ch&#7913;c
vi&#7879;c l&#7853;p v&agrave; th&#7921;c hi&#7879;n d&#7921; to&aacute;n thu
ng&acirc;n s&aacute;ch nh&agrave; n&#432;&#7899;c;</span></p>

<p class=MsoNormal style='margin-bottom:6.0pt;text-align:justify;text-indent:
36.0pt; ch&#7913;c
ki&#7875;m tra, thanh tra vi&#7879;c th&#7921;c hi&#7879;n ph&aacute;p lu&#7853;t
v&#7873; thu&#7871; v&agrave; quy &#273;&#7883;nh kh&aacute;c c&#7911;a
ph&aacute;p lu&#7853;t c&oacute; li&ecirc;n quan;</span></p>

<p class=MsoNormal style='margin-bottom:6.0pt;text-align:justify;text-indent:
36.0pt;) X&#7917;
l&yacute; vi ph&#7841;m ph&aacute;p lu&#7853;t v&agrave; gi&#7843;i quy&#7871;t
khi&#7871;u n&#7841;i, t&#7889; c&aacute;o li&ecirc;n quan &#273;&#7871;n vi&#7879;c
th&#7921;c hi&#7879;n ph&aacute;p lu&#7853;t v&#7873; thu&#7871; theo th&#7849;m
quy&#7873;n;</span></p>

<p class=MsoNormal style='margin-bottom:6.0pt;text-align:justify;text-indent:
36.0pt; ch&#7913;c
th&#7921;c hi&#7879;n h&#7907;p t&aacute;c qu&#7889;c t&#7871; v&#7873; thu&#7871;;</span></p>

<p class=MsoNormal style='margin-bottom:6.0pt;text-align:justify;text-indent:
36.0pt'><span lang=VI style='font-size:14.0pt;
i h&#7907;p v&#7899;i B&#7897; K&#7871; ho&#7841;ch
v&agrave; &#272;&#7847;u t&#432; v&agrave; B&#7897; </span><span
style='font-size:14.0pt'>kh&aacute;c </span><span lang=VI style='font-size:
14.0pt; li&ecirc;n quan h&#432;&#7899;ng d&#7851;n
vi&#7879;c th&#7921;c hi&#7879;n gi&aacute;m &#273;&#7883;nh &#273;&#7897;c l&#7853;p
v&#7873; gi&aacute; tr&#7883; c&#7911;a m&aacute;y m&oacute;c, thi&#7871;t b&#7883;,
d&acirc;y chuy&#7873;n c&ocirc;ng ngh&#7879; theo quy &#273;&#7883;nh c&#7911;a
Lu&#7853;t &#272;&#7847;u t&#432;.</span></p>

<h5><span style='mso-fareast-font-family:"Times New Roman"'>2. B&#7897;
C&ocirc;ng an c&oacute; tr&aacute;ch nhi&#7879;m sau &#273;&acirc;y:</span></h5>

<p class=MsoNormal style='margin-bottom:6.0pt;text-align:justify;text-indent:
36.0pt;t n&#7889;i,
ti&#7871;p nh&#7853;n th&ocirc;ng tin v&#7899;i c&#417; quan qu&#7843;n
l&yacute; thu&#7871; v&#7873; vi&#7879;c ho&agrave;n th&agrave;nh ngh&#297;a v&#7909;
n&#7897;p thu&#7871; &#273;&#7889;i v&#7899;i ph&#432;&#417;ng ti&#7879;n giao
th&ocirc;ng c&#417; gi&#7899;i &#273;&#432;&#7901;ng b&#7897; khi
&#273;&#259;ng k&yacute; quy&#7873;n s&#7903; h&#7919;u, quy&#7873;n s&#7917; d&#7909;ng
theo quy &#273;&#7883;nh c&#7911;a ph&aacute;p lu&#7853;t;</span></p>

<p class=MsoNormal style='margin-bottom:6.0pt;text-align:justify;text-indent:
36.0pt'><span style='font-size:14.0pt;letter-spacing:-.1pt'>b) T&#7893; ch&#7913;c
ti&#7871;p nh&#7853;n, x&#7917; l&yacute;, gi&#7843;i quy&#7871;t tin
b&aacute;o, t&#7889; gi&aacute;c t&#7897;i ph&#7841;m v&agrave; ki&#7871;n ngh&#7883;
kh&#7903;i t&#7889;, ti&#7871;p nh&#7853;n c&aacute;c h&#7891; s&#417; do
c&#417; quan qu&#7843;n l&yacute; thu&#7871; ph&aacute;t hi&#7879;n h&agrave;nh
vi vi ph&#7841;m c&oacute; d&#7845;u hi&#7879;u t&#7897;i ph&#7841;m trong l&#297;nh
v&#7921;c thu&#7871; chuy&#7875;n &#273;&#7871;n, ti&#7871;n h&agrave;nh
&#273;i&#7873;u tra, x&#7917; l&yacute; t&#7897;i ph&#7841;m trong l&#297;nh v&#7921;c
thu&#7871; theo quy &#273;&#7883;nh c&#7911;a ph&aacute;p lu&#7853;t; tr&#432;&#7901;ng
h&#7907;p kh&ocirc;ng kh&#7903;i t&#7889; v&#7909; &aacute;n h&igrave;nh s&#7921;
ho&#7863;c &#273;&igrave;nh ch&#7881; &#273;i&#7873;u tra v&#7909; &aacute;n
th&igrave; th&ocirc;ng b&aacute;o b&#7857;ng v&#259;n b&#7843;n cho c&#417;
quan qu&#7843;n l&yacute; thu&#7871; bi&#7871;t r&otilde; l&yacute; do
v&agrave; chuy&#7875;n h&#7891; s&#417; cho c&#417; quan qu&#7843;n l&yacute;
thu&#7871; gi&#7843;i quy&#7871;t theo th&#7849;m quy&#7873;n. </span></p>

<h5><span style='mso-fareast-font-family:"Times New Roman"'>3. B&#7897;
C&ocirc;ng Th&#432;&#417;ng c&oacute; tr&aacute;ch nhi&#7879;m sau
&#273;&acirc;y:</span></h5>

<p class=MsoNormal style='margin-bottom:6.0pt;text-align:justify;text-indent:
36.0pt; &#273;&#7841;o,
h&#432;&#7899;ng d&#7851;n c&aacute;c c&#417; quan ch&#7913;c n&#259;ng trong
vi&#7879;c k&#7871;t n&#7889;i, cung c&#7845;p th&ocirc;ng tin li&ecirc;n quan
&#273;&#7875; ph&#7889;i h&#7907;p v&#7899;i B&#7897; T&agrave;i ch&iacute;nh
trong qu&#7843;n l&yacute; thu&#7871; &#273;&#7889;i v&#7899;i c&aacute;c t&#7893;
ch&#7913;c, c&aacute; nh&acirc;n ho&#7841;t &#273;&#7897;ng th&#432;&#417;ng m&#7841;i
&#273;i&#7879;n t&#7917;, nh&#432;&#7907;ng quy&#7873;n th&#432;&#417;ng m&#7841;i
v&agrave; c&aacute;c ho&#7841;t &#273;&#7897;ng li&ecirc;n quan;</span></p>

<p class=MsoNormal style='margin-bottom:6.0pt;text-align:justify;text-indent:
36.0pt; &#273;&#7841;o,
h&#432;&#7899;ng d&#7851;n c&aacute;c c&#417; quan ch&#7913;c n&#259;ng ph&#7889;i
h&#7907;p v&#7899;i c&#417; quan qu&#7843;n l&yacute; thu&#7871; th&#7921;c hi&#7879;n
quy &#273;&#7883;nh c&#7911;a ph&aacute;p lu&#7853;t v&#7873; kinh doanh
h&agrave;ng h&oacute;a, d&#7883;ch v&#7909; th&#432;&#417;ng m&#7841;i
tr&ecirc;n th&#7883; tr&#432;&#7901;ng v&agrave; l&#297;nh v&#7921;c
kh&aacute;c theo quy &#273;&#7883;nh c&#7911;a ph&aacute;p lu&#7853;t.</span></p>

<h5><span style='mso-fareast-font-family:"Times New Roman"'>4. B&#7897;
Th&ocirc;ng tin v&agrave; Truy&#7873;n th&ocirc;ng c&oacute; tr&aacute;ch nhi&#7879;m
sau &#273;&acirc;y:</span></h5>

<p class=MsoNormal style='margin-bottom:6.0pt;text-align:justify;text-indent:
36.0pt; &#273;&#7841;o,
h&#432;&#7899;ng d&#7851;n c&aacute;c c&#417; quan ch&#7913;c n&#259;ng ph&#7889;i
h&#7907;p v&#7899;i c&#417; quan qu&#7843;n l&yacute; thu&#7871; &#273;&#7875;
qu&#7843;n l&yacute; thu&#7871; &#273;&#7889;i v&#7899;i ho&#7841;t &#273;&#7897;ng
cung c&#7845;p, s&#7917; d&#7909;ng d&#7883;ch v&#7909; Internet, th&ocirc;ng
tin tr&ecirc;n m&#7841;ng, tr&ograve; ch&#417;i &#273;i&#7879;n t&#7917;
tr&ecirc;n m&#7841;ng; </span></p>

<p class=MsoNormal style='margin-bottom:6.0pt;text-align:justify;text-indent:
36.0pt; &#273;&#7841;o,
h&#432;&#7899;ng d&#7851;n c&aacute;c c&#417; quan ch&#7913;c n&#259;ng trong
vi&#7879;c k&#7871;t n&#7889;i, cung c&#7845;p th&ocirc;ng tin li&ecirc;n quan
v&#7899;i c&#417; quan qu&#7843;n l&yacute; thu&#7871; &#273;&#7889;i v&#7899;i
t&#7893; ch&#7913;c, c&aacute; nh&acirc;n tr&#7921;c ti&#7871;p tham gia ho&#7863;c
c&oacute; li&ecirc;n quan &#273;&#7871;n vi&#7879;c qu&#7843;n l&yacute;, cung
c&#7845;p, s&#7917; d&#7909;ng d&#7883;ch v&#7909; Internet, th&ocirc;ng tin
tr&ecirc;n m&#7841;ng, tr&ograve; ch&#417;i &#273;i&#7879;n t&#7917; tr&ecirc;n
m&#7841;ng.</span></p>

<h5><span style='mso-fareast-font-family:"Times New Roman"'>5. Ng&acirc;n
h&agrave;ng Nh&agrave; n&#432;&#7899;c Vi&#7879;t Nam c&oacute; tr&aacute;ch
nhi&#7879;m sau &#273;&acirc;y:</span></h5>

<p class=MsoNormal style='margin-bottom:6.0pt;text-align:justify;text-indent:
36.0pt; &#273;&#7841;o,
h&#432;&#7899;ng d&#7851;n c&aacute;c t&#7893; ch&#7913;c t&iacute;n d&#7909;ng
trong vi&#7879;c k&#7871;t n&#7889;i, cung c&#7845;p th&ocirc;ng tin v&#7899;i
c&#417; quan qu&#7843;n l&yacute; thu&#7871; li&ecirc;n quan &#273;&#7871;n
giao d&#7883;ch qua ng&acirc;n h&agrave;ng c&#7911;a t&#7893; ch&#7913;c,
c&aacute; nh&acirc;n v&agrave; ph&#7889;i h&#7907;p v&#7899;i c&#417; quan qu&#7843;n
l&yacute; thu&#7871; th&#7921;c hi&#7879;n bi&#7879;n ph&aacute;p c&#432;&#7905;ng
ch&#7871; theo quy &#273;&#7883;nh c&#7911;a Lu&#7853;t n&agrave;y;</span></p>

<p class=MsoNormal style='margin-bottom:6.0pt;text-align:justify;text-indent:
36.0pt;y d&#7921;ng
v&agrave; ph&aacute;t tri&#7875;n h&#7879; th&#7889;ng thanh to&aacute;n
th&#432;&#417;ng m&#7841;i &#273;i&#7879;n t&#7917; qu&#7889;c gia, c&aacute;c
ti&#7879;n &iacute;ch t&iacute;ch h&#7907;p thanh to&aacute;n &#273;i&#7879;n t&#7917;
&#273;&#7875; s&#7917; d&#7909;ng r&#7897;ng r&atilde;i cho c&aacute;c m&ocirc;
h&igrave;nh th&#432;&#417;ng m&#7841;i &#273;i&#7879;n t&#7917;;</span></p>

<p class=MsoNormal style='margin-bottom:6.0pt;text-align:justify;text-indent:
36.0pt;t l&#7853;p
c&#417; ch&#7871; qu&#7843;n l&yacute;, gi&aacute;m s&aacute;t c&aacute;c giao
d&#7883;ch thanh to&aacute;n h&#7895; tr&#7907; c&ocirc;ng t&aacute;c qu&#7843;n
l&yacute; thu&#7871; &#273;&#7889;i v&#7899;i ho&#7841;t &#273;&#7897;ng cung c&#7845;p
d&#7883;ch v&#7909; xuy&ecirc;n bi&ecirc;n gi&#7899;i trong th&#432;&#417;ng m&#7841;i
&#273;i&#7879;n t&#7917;.</span></p>

<h5><span style='mso-fareast-font-family:"Times New Roman"'>6. B&#7897; K&#7871;
ho&#7841;ch v&agrave; &#272;&#7847;u t&#432; c&oacute; tr&aacute;ch nhi&#7879;m
sau &#273;&acirc;y:</span></h5>

<p class=MsoNormal style='margin-bottom:6.0pt;text-align:justify;text-indent:
36.0pt; &#273;&#7841;o,
h&#432;&#7899;ng d&#7851;n c&aacute;c c&#417; quan ch&#7913;c n&#259;ng ph&#7889;i
h&#7907;p v&#7899;i c&#417; quan qu&#7843;n l&yacute; thu&#7871; trong vi&#7879;c
c&#7845;p, thu h&#7891;i gi&#7845;y ch&#7913;ng nh&#7853;n &#273;&#259;ng
k&yacute; doanh nghi&#7879;p, gi&#7845;y ch&#7913;ng nh&#7853;n &#273;&#259;ng
k&yacute; kinh doanh, gi&#7845;y ch&#7913;ng nh&#7853;n &#273;&#259;ng
k&yacute; &#273;&#7847;u t&#432;, gi&#7845;y ch&#7913;ng nh&#7853;n
&#273;&#259;ng k&yacute; thu&#7871; v&agrave; c&aacute;c gi&#7845;y ch&#7913;ng
nh&#7853;n &#273;&#259;ng k&yacute; kh&aacute;c c&#7911;a ng&#432;&#7901;i n&#7897;p
thu&#7871; theo c&#417; ch&#7871; m&#7897;t c&#7917;a li&ecirc;n th&ocirc;ng; </span></p>

<p class=MsoNormal style='margin-bottom:6.0pt;text-align:justify;text-indent:
36.0pt; &#273;&#7841;o,
h&#432;&#7899;ng d&#7851;n c&aacute;c c&#417; quan ch&#7913;c n&#259;ng
t&#259;ng c&#432;&#7901;ng c&ocirc;ng t&aacute;c th&#7849;m &#273;&#7883;nh d&#7921;
&aacute;n &#273;&#7847;u t&#432; nh&#7857;m ng&#259;n ch&#7863;n t&igrave;nh tr&#7841;ng
chuy&#7875;n gi&aacute;, tr&aacute;nh thu&#7871;;<b style='text-align:justify;text-indent:
36.0pt; &#273;&#7841;o,
h&#432;&#7899;ng d&#7851;n c&aacute;c c&#417; quan ch&#7913;c n&#259;ng
t&#259;ng c&#432;&#7901;ng c&ocirc;ng t&aacute;c thanh tra, ki&#7875;m tra,
gi&aacute;m &#273;&#7883;nh ch&#7845;t l&#432;&#7907;ng, gi&aacute; tr&#7883;
m&aacute;y m&oacute;c, thi&#7871;t b&#7883;, c&ocirc;ng ngh&#7879; &#273;&#432;&#7907;c
s&#7917; d&#7909;ng trong qu&aacute; tr&igrave;nh ho&#7841;t &#273;&#7897;ng c&#7911;a
d&#7921; &aacute;n &#273;&#7847;u t&#432;;</span></p>

<p class=MsoNormal style='margin-bottom:6.0pt;text-align:justify;text-indent:
36.0pt; &#273;&#7841;o,
h&#432;&#7899;ng d&#7851;n c&aacute;c c&#417; quan ch&#7913;c n&#259;ng ph&#7889;i
h&#7907;p v&#7899;i c&#417; quan qu&#7843;n l&yacute; thu&#7871; trong vi&#7879;c
th&#7921;c hi&#7879;n quy &#273;&#7883;nh c&#7911;a ph&aacute;p lu&#7853;t v&#7873;
&#432;u &#273;&atilde;i &#273;&#7847;u t&#432; ph&ugrave; h&#7907;p v&#7899;i
quy &#273;&#7883;nh c&#7911;a ph&aacute;p lu&#7853;t v&#7873; thu&#7871;.</span></p>

<h5><span style='mso-fareast-font-family:"Times New Roman"'>7. B&#7897;
T&agrave;i nguy&ecirc;n v&agrave; M&ocirc;i tr&#432;&#7901;ng c&oacute;
tr&aacute;ch nhi&#7879;m sau &#273;&acirc;y:</span></h5>

<p class=MsoNormal style='margin-bottom:6.0pt;text-align:justify;text-indent:
36.0pt; &#273;&#7841;o,
h&#432;&#7899;ng d&#7851;n c&aacute;c c&#417; quan ch&#7913;c n&#259;ng ph&#7889;i
h&#7907;p v&#7899;i c&#417; quan qu&#7843;n l&yacute; thu&#7871; trong vi&#7879;c
qu&#7843;n l&yacute; c&aacute;c kho&#7843;n thu li&ecirc;n quan &#273;&#7871;n
&#273;&#7845;t &#273;ai, t&agrave;i s&#7843;n g&#7855;n li&#7873;n v&#7899;i
&#273;&#7845;t v&agrave; t&agrave;i nguy&ecirc;n kho&aacute;ng s&#7843;n;</span></p>

<p class=MsoNormal style='margin-bottom:6.0pt;text-align:justify;text-indent:
36.0pt;p
th&ocirc;ng tin ng&#432;&#7901;i n&#7897;p thu&#7871; do c&#417; quan
t&agrave;i nguy&ecirc;n, m&ocirc;i tr&#432;&#7901;ng qu&#7843;n l&yacute;
c&oacute; li&ecirc;n quan &#273;&#7871;n c&ocirc;ng t&aacute;c qu&#7843;n
l&yacute; thu&#7871; theo y&ecirc;u c&#7847;u c&#7911;a c&#417; quan qu&#7843;n
l&yacute; thu&#7871;.</span></p>

<h5><span style='mso-fareast-font-family:"Times New Roman"'>8. B&#7897; Giao
th&ocirc;ng v&#7853;n t&#7843;i c&oacute; tr&aacute;ch nhi&#7879;m sau
&#273;&acirc;y:</span></h5>

<p class=MsoNormal style='margin-bottom:6.0pt;text-align:justify;text-indent:
36.0pt; &#273;&#7841;o,
h&#432;&#7899;ng d&#7851;n c&aacute;c c&#417; quan ch&#7913;c n&#259;ng trong
vi&#7879;c k&#7871;t n&#7889;i, cung c&#7845;p th&ocirc;ng tin li&ecirc;n quan
&#273;&#7871;n qu&#7843;n l&yacute; thu&#7871; &#273;&#7889;i v&#7899;i doanh
nghi&#7879;p, c&aacute; nh&acirc;n ho&#7841;t &#273;&#7897;ng trong l&#297;nh v&#7921;c
v&#7853;n t&#7843;i h&agrave;ng h&oacute;a, h&agrave;nh kh&aacute;ch;</span></p>

<p class=MsoNormal style='margin-bottom:6.0pt;text-align:justify;text-indent:
36.0pt;t n&#7889;i,
cung c&#7845;p th&ocirc;ng tin v&#7873; ti&ecirc;u ch&iacute; k&#7929; thu&#7853;t
li&ecirc;n quan &#273;&#7871;n qu&#7843;n l&yacute; thu &#273;&#7889;i v&#7899;i
t&agrave;i s&#7843;n l&agrave; ph&#432;&#417;ng ti&#7879;n ph&#7843;i
&#273;&#259;ng k&yacute; quy&#7873;n s&#7903; h&#7919;u, quy&#7873;n s&#7917; d&#7909;ng.</span></p>

<h5><span style='mso-fareast-font-family:"Times New Roman"'>9. B&#7897; Lao
&#273;&#7897;ng - Th&#432;&#417;ng binh v&agrave; X&atilde; h&#7897;i:</span></h5>

<p class=MsoNormal style='margin-bottom:6.0pt;text-align:justify;text-indent:
36.0pt;
tr&aacute;ch nhi&#7879;m ch&#7881; &#273;&#7841;o, h&#432;&#7899;ng d&#7851;n
c&aacute;c c&#417; quan ch&#7913;c n&#259;ng trong vi&#7879;c k&#7871;t n&#7889;i,
cung c&#7845;p th&ocirc;ng tin v&#7899;i c&#417; quan qu&#7843;n l&yacute; thu&#7871;
li&ecirc;n quan &#273;&#7871;n vi&#7879;c c&#7845;p ph&eacute;p cho ng&#432;&#7901;i
lao &#273;&#7897;ng n&#432;&#7899;c ngo&agrave;i l&agrave;m vi&#7879;c &#7903;
Vi&#7879;t Nam v&agrave; ng&#432;&#7901;i lao &#273;&#7897;ng Vi&#7879;t Nam
&#273;i l&agrave;m vi&#7879;c &#7903; n&#432;&#7899;c ngo&agrave;i.</span></p>

<h5><span style='mso-fareast-font-family:"Times New Roman"'>10. B&#7897; Y t&#7871;:
</span></h5>

<p class=MsoNormal style='margin-bottom:6.0pt;text-align:justify;text-indent:
36.0pt;
tr&aacute;ch nhi&#7879;m ch&#7881; &#273;&#7841;o, h&#432;&#7899;ng d&#7851;n
c&aacute;c c&#417; quan ch&#7913;c n&#259;ng ph&#7889;i h&#7907;p v&#7899;i
c&#417; quan qu&#7843;n l&yacute; thu&#7871; trong vi&#7879;c k&#7871;t n&#7889;i,
cung c&#7845;p th&ocirc;ng tin c&#7911;a c&aacute;c c&#417; s&#7903; kinh doanh
d&#432;&#7907;c, c&#417; s&#7903; kh&aacute;m b&#7879;nh, ch&#7919;a b&#7879;nh.</span></p>

<h5><span style='mso-fareast-font-family:"Times New Roman"'>11. B&#7897;,
c&#417; quan ngang B&#7897;, c&#417; quan thu&#7897;c Ch&iacute;nh ph&#7911;;</span></h5>

<p class=MsoNormal style='margin-bottom:6.0pt;text-align:justify;text-indent:
36.0pt;
tr&aacute;ch nhi&#7879;m ph&#7889;i h&#7907;p v&#7899;i B&#7897; T&agrave;i
ch&iacute;nh th&#7921;c hi&#7879;n nhi&#7879;m v&#7909; qu&#7843;n l&yacute;
nh&agrave; n&#432;&#7899;c v&#7873; qu&#7843;n l&yacute; thu&#7871; theo quy
&#273;&#7883;nh c&#7911;a Ch&iacute;nh ph&#7911;.</span></p>

<h4><a name="_Toc522612735"></a><a name="_Toc17699706"></a><a
name="_Toc17699918"><span style='"Times New Roman"'>&#272;i&#7873;u
16. Quy&#7873;n c&#7911;a ng&#432;&#7901;i n&#7897;p thu&#7871;</span></span></span></a></h4>

<p class=MsoNormal style='margin-bottom:6.0pt;text-align:justify;text-indent:
36.0pt;&#432;&#7907;c
h&#7895; tr&#7907;, h&#432;&#7899;ng d&#7851;n th&#7921;c hi&#7879;n vi&#7879;c
n&#7897;p thu&#7871;; cung c&#7845;p th&ocirc;ng tin, t&agrave;i li&#7879;u
&#273;&#7875; th&#7921;c hi&#7879;n ngh&#297;a v&#7909;, quy&#7873;n l&#7907;i
v&#7873; thu&#7871;. </span></p>

<p class=MsoNormal style='margin-bottom:6.0pt;text-align:justify;text-indent:
36.0pt;</span><span
lang=VI style='font-size:14.0pt;&#7907;c nh&#7853;n
v&#259;n b&#7843;n</span><span style='font-size:14.0pt'> li&ecirc;n quan &#273;&#7871;n
ngh&#297;a v&#7909; thu&#7871; </span><span lang=VI style='font-size:14.0pt;
a c&aacute;c c&#417; quan ch&#7913;c n&#259;ng
khi ti&#7871;n h&agrave;nh thanh tra, ki&#7875;m tra, ki&#7875;m to&aacute;n</span><span
style='font-size:14.0pt'>.</span></p>

<p class=MsoNormal style='margin-bottom:6.0pt;text-align:justify;text-indent:
36.0pt;u c&#7847;u
c&#417; quan qu&#7843;n l&yacute; thu&#7871; gi&#7843;i th&iacute;ch v&#7873;
vi&#7879;c t&iacute;nh thu&#7871;, &#7845;n &#273;&#7883;nh thu&#7871;;
y&ecirc;u c&#7847;u gi&aacute;m &#273;&#7883;nh s&#7889; l&#432;&#7907;ng, ch&#7845;t
l&#432;&#7907;ng, ch&#7911;ng lo&#7841;i h&agrave;ng h&oacute;a xu&#7845;t kh&#7849;u,
nh&#7853;p kh&#7849;u.</span></p>

<p class=MsoNormal style='margin-bottom:6.0pt;text-align:justify;text-indent:
36.0pt;&#432;&#7907;c
gi&#7919; b&iacute; m&#7853;t th&ocirc;ng tin, tr&#7915; c&aacute;c th&ocirc;ng
tin ph&#7843;i cung c&#7845;p cho c&#417; quan nh&agrave; n&#432;&#7899;c
c&oacute; th&#7849;m quy&#7873;n ho&#7863;c th&ocirc;ng tin c&ocirc;ng khai v&#7873;
thu&#7871; theo quy &#273;&#7883;nh c&#7911;a ph&aacute;p lu&#7853;t.</span></p>

<p class=MsoNormal style='margin-bottom:6.0pt;text-align:justify;text-indent:
36.0pt;&#7903;ng
c&aacute;c &#432;u &#273;&atilde;i v&#7873; thu&#7871;, ho&agrave;n thu&#7871;
theo quy &#273;&#7883;nh c&#7911;a ph&aacute;p lu&#7853;t v&#7873; thu&#7871;;
&#273;&#432;&#7907;c bi&#7871;t th&#7901;i h&#7841;n gi&#7843;i quy&#7871;t
ho&agrave;n thu&#7871;, s&#7889; ti&#7873;n thu&#7871; kh&ocirc;ng &#273;&#432;&#7907;c
ho&agrave;n v&agrave; c&#259;n c&#7913; ph&aacute;p l&yacute; &#273;&#7889;i v&#7899;i
s&#7889; ti&#7873;n thu&#7871; kh&ocirc;ng &#273;&#432;&#7907;c ho&agrave;n.</span></p>

<p class=MsoNormal style='margin-bottom:6.0pt;text-align:justify;text-indent:
36.0pt; h&#7907;p
&#273;&#7891;ng v&#7899;i t&#7893; ch&#7913;c kinh doanh d&#7883;ch v&#7909;
l&agrave;m th&#7911; t&#7909;c v&#7873; thu&#7871;, &#273;&#7841;i l&yacute;
l&agrave;m th&#7911; t&#7909;c h&#7843;i quan &#273;&#7875; th&#7921;c hi&#7879;n
d&#7883;ch v&#7909; &#273;&#7841;i l&yacute; thu&#7871;, &#273;&#7841;i
l&yacute; l&agrave;m th&#7911; t&#7909;c h&#7843;i quan. </span></p>

<p class=MsoNormal style='margin-bottom:6.0pt;text-align:justify;text-indent:
36.0pt;&#432;&#7907;c
nh&#7853;n quy&#7871;t &#273;&#7883;nh x&#7917; l&yacute; v&#7873; thu&#7871;,
bi&ecirc;n b&#7843;n ki&#7875;m tra thu&#7871;, thanh tra thu&#7871;,
&#273;&#432;&#7907;c y&ecirc;u c&#7847;u gi&#7843;i th&iacute;ch n&#7897;i dung
quy&#7871;t &#273;&#7883;nh x&#7917; l&yacute; v&#7873; thu&#7871;;
&#273;&#432;&#7907;c b&#7843;o l&#432;u &yacute; ki&#7871;n trong bi&ecirc;n b&#7843;n
ki&#7875;m tra thu&#7871;, thanh tra thu&#7871;; &#273;&#432;&#7907;c nh&#7853;n
v&#259;n b&#7843;n k&#7871;t lu&#7853;n ki&#7875;m tra thu&#7871;, thanh tra
thu&#7871;, quy&#7871;t &#273;&#7883;nh x&#7917; l&yacute; v&#7873; thu&#7871;
sau thanh tra, ki&#7875;m tra c&#7911;a c&#417; quan qu&#7843;n l&yacute; thu&#7871;.</span></p>

<p class=MsoNormal style='margin-bottom:6.0pt;text-align:justify;text-indent:
36.0pt;&#432;&#7907;c
b&#7891;i th&#432;&#7901;ng thi&#7879;t h&#7841;i do c&#417; quan qu&#7843;n
l&yacute; thu&#7871;, c&ocirc;ng ch&#7913;c qu&#7843;n l&yacute; thu&#7871;
g&acirc;y ra theo quy &#273;&#7883;nh c&#7911;a ph&aacute;p lu&#7853;t.</span></p>

<p class=MsoNormal style='margin-bottom:6.0pt;text-align:justify;text-indent:
36.0pt;letter-spacing:.1pt'>9.
Y&ecirc;u c&#7847;u c&#417; quan qu&#7843;n l&yacute; thu&#7871; x&aacute;c nh&#7853;n
vi&#7879;c th&#7921;c hi&#7879;n ngh&#297;a v&#7909; n&#7897;p thu&#7871; c&#7911;a
m&igrave;nh.</span></p>

<p class=MsoNormal style='margin-bottom:6.0pt;text-align:justify;text-indent:
36.0pt;u n&#7841;i,
kh&#7903;i ki&#7879;n quy&#7871;t &#273;&#7883;nh h&agrave;nh ch&iacute;nh,
h&agrave;nh vi h&agrave;nh ch&iacute;nh li&ecirc;n quan &#273;&#7871;n quy&#7873;n
v&agrave; l&#7907;i &iacute;ch h&#7907;p ph&aacute;p c&#7911;a m&igrave;nh.</span></p>

<p class=MsoNormal style='margin-bottom:6.0pt;text-align:justify;text-indent:
36.0pt;ng b&#7883;
x&#7917; ph&#7841;t vi ph&#7841;m h&agrave;nh ch&iacute;nh v&#7873; thu&#7871;,
kh&ocirc;ng t&iacute;nh ti&#7873;n ch&#7853;m n&#7897;p &#273;&#7889;i v&#7899;i
tr&#432;&#7901;ng h&#7907;p do ng&#432;&#7901;i n&#7897;p thu&#7871; th&#7921;c
hi&#7879;n theo v&#259;n b&#7843;n h&#432;&#7899;ng d&#7851;n v&agrave; quy&#7871;t
&#273;&#7883;nh x&#7917; l&yacute; c&#7911;a c&#417; quan thu&#7871;, c&#417;
quan nh&agrave; n&#432;&#7899;c c&oacute; th&#7849;m quy&#7873;n li&ecirc;n
quan &#273;&#7871;n n&#7897;i dung x&aacute;c &#273;&#7883;nh ngh&#297;a v&#7909;
thu&#7871; c&#7911;a ng&#432;&#7901;i n&#7897;p thu&#7871;.</span></p>

<p class=MsoNormal style='margin-bottom:6.0pt;text-align:justify;text-indent:
36.0pt;
c&aacute;o h&agrave;nh vi vi ph&#7841;m ph&aacute;p lu&#7853;t c&#7911;a
c&ocirc;ng ch&#7913;c qu&#7843;n l&yacute; thu&#7871; v&agrave; t&#7893; ch&#7913;c,
c&aacute; nh&acirc;n kh&aacute;c theo quy &#273;&#7883;nh c&#7911;a ph&aacute;p
lu&#7853;t v&#7873; t&#7889; c&aacute;o.</span></p>

<p class=MsoNormal style='margin-bottom:6.0pt;text-align:justify;text-indent:
36.0pt;&#432;&#7907;c
tra c&#7913;u, xem, in to&agrave;n b&#7897; ch&#7913;ng t&#7915; &#273;i&#7879;n
t&#7917; m&agrave; m&igrave;nh &#273;&atilde; g&#7917;i &#273;&#7871;n c&#7893;ng
th&ocirc;ng tin &#273;i&#7879;n t&#7917; c&#7911;a c&#417; quan qu&#7843;n
l&yacute; thu&#7871; theo quy &#273;&#7883;nh c&#7911;a Lu&#7853;t n&agrave;y
v&agrave; ph&aacute;p lu&#7853;t v&#7873; giao d&#7883;ch &#273;i&#7879;n t&#7917;.</span></p>

<p class=MsoNormal style='margin-bottom:6.0pt;text-align:justify;text-indent:
36.0pt;&#432;&#7907;c
s&#7917; d&#7909;ng ch&#7913;ng t&#7915; &#273;i&#7879;n t&#7917; trong giao d&#7883;ch
v&#7899;i c&#417; quan qu&#7843;n l&yacute; thu&#7871; v&agrave; c&#417; quan,
t&#7893; ch&#7913;c c&oacute; li&ecirc;n quan.</span></p>

<h4><a name="_Toc522612736"></a><a name="_Toc17699707"></a><a
name="_Toc17699919"><span style='"Times New Roman"'>&#272;i&#7873;u
17. Tr&aacute;ch nhi&#7879;m c&#7911;a ng&#432;&#7901;i n&#7897;p thu&#7871;</span></span></span></a></h4>

<p class=MsoNormal style='margin-bottom:6.0pt;text-align:justify;text-indent:
36.0pt;c hi&#7879;n
&#273;&#259;ng k&yacute; thu&#7871;, s&#7917; d&#7909;ng m&atilde; s&#7889; thu&#7871;
theo quy &#273;&#7883;nh c&#7911;a ph&aacute;p lu&#7853;t.</span></p>

<p class=MsoNormal style='margin-bottom:6.0pt;text-align:justify;text-indent:
36.0pt;letter-spacing:-.1pt'>2.
Khai thu&#7871; ch&iacute;nh x&aacute;c, trung th&#7921;c, &#273;&#7847;y
&#273;&#7911; v&agrave; n&#7897;p h&#7891; s&#417; thu&#7871; &#273;&uacute;ng
th&#7901;i h&#7841;n; ch&#7883;u tr&aacute;ch nhi&#7879;m tr&#432;&#7899;c
ph&aacute;p lu&#7853;t v&#7873; t&iacute;nh ch&iacute;nh x&aacute;c, trung th&#7921;c,
&#273;&#7847;y &#273;&#7911; c&#7911;a h&#7891; s&#417; thu&#7871;.</span></p>

<p class=MsoNormal style='margin-bottom:6.0pt;text-align:justify;text-indent:
36.0pt;letter-spacing:-.1pt'>3.
N&#7897;p ti&#7873;n thu&#7871;, ti&#7873;n ch&#7853;m n&#7897;p, ti&#7873;n ph&#7841;t
&#273;&#7847;y &#273;&#7911;, &#273;&uacute;ng th&#7901;i h&#7841;n,
&#273;&uacute;ng &#273;&#7883;a &#273;i&#7875;m.</span></p>

<p class=MsoNormal style='margin-bottom:6.0pt;text-align:justify;text-indent:
36.0pt;p
h&agrave;nh ch&#7871; &#273;&#7897; k&#7871; to&aacute;n, th&#7889;ng k&ecirc;
v&agrave; qu&#7843;n l&yacute;, s&#7917; d&#7909;ng h&oacute;a &#273;&#417;n,
ch&#7913;ng t&#7915; theo quy &#273;&#7883;nh c&#7911;a ph&aacute;p lu&#7853;t.
</span></p>

<p class=MsoNormal style='margin-bottom:6.0pt;text-align:justify;text-indent:
36.0pt;p
ch&iacute;nh x&aacute;c, trung th&#7921;c, &#273;&#7847;y &#273;&#7911; nh&#7919;ng
ho&#7841;t &#273;&#7897;ng ph&aacute;t sinh ngh&#297;a v&#7909; thu&#7871;, kh&#7845;u
tr&#7915; thu&#7871; v&agrave; giao d&#7883;ch ph&#7843;i k&ecirc; khai
th&ocirc;ng tin v&#7873; thu&#7871;. </span></p>

<p class=MsoNormal style='margin-bottom:6.0pt;text-align:justify;text-indent:
36.0pt;p
v&agrave; giao h&oacute;a &#273;&#417;n, ch&#7913;ng t&#7915; cho ng&#432;&#7901;i
mua theo &#273;&uacute;ng s&#7889; l&#432;&#7907;ng, ch&#7911;ng lo&#7841;i,
gi&aacute; tr&#7883; th&#7921;c thanh to&aacute;n khi b&aacute;n h&agrave;ng
h&oacute;a, cung c&#7845;p d&#7883;ch v&#7909; theo quy &#273;&#7883;nh c&#7911;a
ph&aacute;p lu&#7853;t.</span></p>

<p class=MsoNormal style='margin-bottom:6.0pt;text-align:justify;text-indent:
36.0pt'><span style='font-size:14.0pt'>7. Cung c&#7845;p ch&iacute;nh
x&aacute;c, &#273;&#7847;y &#273;&#7911;, k&#7883;p th&#7901;i th&ocirc;ng tin,
t&agrave;i li&#7879;u li&ecirc;n quan &#273;&#7871;n vi&#7879;c x&aacute;c
&#273;&#7883;nh ngh&#297;a v&#7909; thu&#7871;, bao g&#7891;m c&#7843;
th&ocirc;ng tin v&#7873; gi&aacute; tr&#7883; &#273;&#7847;u t&#432;; s&#7889;
hi&#7879;u v&agrave; n&#7897;i dung giao d&#7883;ch c&#7911;a t&agrave;i kho&#7843;n
&#273;&#432;&#7907;c m&#7903; t&#7841;i ng&acirc;n h&agrave;ng th&#432;&#417;ng
m&#7841;i, t&#7893; ch&#7913;c t&iacute;n d&#7909;ng kh&aacute;c; gi&#7843;i
th&iacute;ch vi&#7879;c t&iacute;nh thu&#7871;, khai thu&#7871;, n&#7897;p thu&#7871;
theo y&ecirc;u c&#7847;u c&#7911;a c&#417; quan qu&#7843;n l&yacute; thu&#7871;.<b
style='text-align:justify;text-indent:
36.0pt;p
h&agrave;nh quy&#7871;t &#273;&#7883;nh, th&ocirc;ng b&aacute;o, y&ecirc;u c&#7847;u
c&#7911;a c&#417; quan qu&#7843;n l&yacute; thu&#7871;, c&ocirc;ng ch&#7913;c
qu&#7843;n l&yacute; thu&#7871; theo quy &#273;&#7883;nh c&#7911;a ph&aacute;p
lu&#7853;t.</span></p>

<p class=MsoNormal style='margin-bottom:6.0pt;text-align:justify;text-indent:
36.0pt;u
tr&aacute;ch nhi&#7879;m th&#7921;c hi&#7879;n ngh&#297;a v&#7909; thu&#7871;
theo quy &#273;&#7883;nh c&#7911;a ph&aacute;p lu&#7853;t trong tr&#432;&#7901;ng
h&#7907;p ng&#432;&#7901;i &#273;&#7841;i di&#7879;n theo ph&aacute;p lu&#7853;t
ho&#7863;c &#273;&#7841;i di&#7879;n theo &#7911;y quy&#7873;n thay m&#7863;t
ng&#432;&#7901;i n&#7897;p thu&#7871; th&#7921;c hi&#7879;n th&#7911; t&#7909;c
v&#7873; thu&#7871; sai quy &#273;&#7883;nh.</span></p>

<p class=MsoNormal style='margin-bottom:6.0pt;text-align:justify;text-indent:
36.0pt;&#7901;i
n&#7897;p thu&#7871; th&#7921;c hi&#7879;n ho&#7841;t &#273;&#7897;ng kinh
doanh t&#7841;i &#273;&#7883;a b&agrave;n c&oacute; c&#417; s&#7903; h&#7841; t&#7847;ng
v&#7873; c&ocirc;ng ngh&#7879; th&ocirc;ng tin ph&#7843;i th&#7921;c hi&#7879;n
k&ecirc; khai, n&#7897;p thu&#7871;, giao d&#7883;ch v&#7899;i c&#417; quan qu&#7843;n
l&yacute; thu&#7871; th&ocirc;ng qua ph&#432;&#417;ng ti&#7879;n &#273;i&#7879;n
t&#7917; theo quy &#273;&#7883;nh c&#7911;a ph&aacute;p lu&#7853;t.</span></p>

<p class=MsoNormal style='margin-bottom:6.0pt;text-align:justify;text-indent:
36.0pt;n c&#7913;
t&igrave;nh h&igrave;nh th&#7921;c t&#7871; v&agrave; &#273;i&#7873;u ki&#7879;n
trang b&#7883; c&ocirc;ng ngh&#7879; th&ocirc;ng tin, Ch&iacute;nh ph&#7911;
quy &#273;&#7883;nh chi ti&#7871;t vi&#7879;c ng&#432;&#7901;i n&#7897;p thu&#7871;
kh&ocirc;ng ph&#7843;i n&#7897;p c&aacute;c ch&#7913;ng t&#7915; trong h&#7891;
s&#417; khai, n&#7897;p thu&#7871;, h&#7891; s&#417; ho&agrave;n thu&#7871;
v&agrave; c&aacute;c h&#7891; s&#417; thu&#7871; kh&aacute;c m&agrave; c&#417;
quan qu&#7843;n l&yacute; nh&agrave; n&#432;&#7899;c &#273;&atilde; c&oacute;.</span></p>

<p class=MsoNormal style='margin-bottom:6.0pt;text-align:justify;text-indent:
36.0pt;y d&#7921;ng,
qu&#7843;n l&yacute;, v&#7853;n h&agrave;nh h&#7879; th&#7889;ng h&#7841; t&#7847;ng
k&#7929; thu&#7853;t b&#7843;o &#273;&#7843;m vi&#7879;c th&#7921;c hi&#7879;n
giao d&#7883;ch &#273;i&#7879;n t&#7917; v&#7899;i c&#417; quan qu&#7843;n
l&yacute; thu&#7871;, &aacute;p d&#7909;ng k&#7871;t n&#7889;i th&ocirc;ng tin
li&ecirc;n quan &#273;&#7871;n vi&#7879;c th&#7921;c hi&#7879;n ngh&#297;a v&#7909;
thu&#7871; v&#7899;i c&#417; quan qu&#7843;n l&yacute; thu&#7871;.</span></p>

<p class=MsoNormal style='margin-bottom:6.0pt;text-align:justify;text-indent:
36.0pt;&#7901;i
n&#7897;p thu&#7871; c&oacute; ph&aacute;t sinh giao d&#7883;ch li&ecirc;n k&#7871;t
c&oacute; ngh&#297;a v&#7909; l&#7853;p, l&#432;u tr&#7919;, k&ecirc; khai,
cung c&#7845;p h&#7891; s&#417; th&ocirc;ng tin v&#7873; ng&#432;&#7901;i n&#7897;p
thu&#7871; v&agrave; c&aacute;c b&ecirc;n li&ecirc;n k&#7871;t c&#7911;a
ng&#432;&#7901;i n&#7897;p thu&#7871; bao g&#7891;m c&#7843; th&ocirc;ng tin v&#7873;
c&aacute;c b&ecirc;n li&ecirc;n k&#7871;t c&#432; tr&uacute; t&#7841;i
c&aacute;c qu&#7889;c gia, v&ugrave;ng l&atilde;nh th&#7893; ngo&agrave;i Vi&#7879;t
Nam theo quy &#273;&#7883;nh c&#7911;a Ch&iacute;nh ph&#7911;. </span></p>

<h4><a name="_Toc522612737"></a><a name="_Toc17699708"></a><a
name="_Toc17699920"><span style='"Times New Roman"'>&#272;i&#7873;u
18. Nhi&#7879;m v&#7909; c&#7911;a c&#417; quan qu&#7843;n l&yacute; thu&#7871;</span></span></span></a></h4>

<p class=MsoNormal style='margin-bottom:6.0pt;text-align:justify;text-indent:
36.0pt; ch&#7913;c
th&#7921;c hi&#7879;n qu&#7843;n l&yacute; thu thu&#7871; v&agrave; c&aacute;c
kho&#7843;n thu kh&aacute;c thu&#7897;c ng&acirc;n s&aacute;ch nh&agrave;
n&#432;&#7899;c theo quy &#273;&#7883;nh c&#7911;a ph&aacute;p lu&#7853;t v&#7873;
thu&#7871; v&agrave; quy &#273;&#7883;nh kh&aacute;c c&#7911;a ph&aacute;p lu&#7853;t
c&oacute; li&ecirc;n quan.</span></p>

<p class=MsoNormal style='margin-bottom:6.0pt;text-align:justify;text-indent:
36.0pt;n truy&#7873;n,
ph&#7893; bi&#7871;n, h&#432;&#7899;ng d&#7851;n ph&aacute;p lu&#7853;t v&#7873;
thu&#7871;; c&ocirc;ng khai c&aacute;c th&#7911; t&#7909;c v&#7873; thu&#7871;
t&#7841;i tr&#7909; s&#7903;, trang th&ocirc;ng tin &#273;i&#7879;n t&#7917; c&#7911;a
c&#417; quan qu&#7843;n l&yacute; thu&#7871; v&agrave; tr&ecirc;n c&aacute;c
ph&#432;&#417;ng ti&#7879;n th&ocirc;ng tin &#273;&#7841;i ch&uacute;ng.</span></p>

<p class=MsoNormal style='margin-bottom:6.0pt;text-align:justify;text-indent:
36.0pt;i
th&iacute;ch, cung c&#7845;p th&ocirc;ng tin li&ecirc;n quan &#273;&#7871;n vi&#7879;c
x&aacute;c &#273;&#7883;nh ngh&#297;a v&#7909; thu&#7871; cho ng&#432;&#7901;i
n&#7897;p thu&#7871;; c&#417; quan thu&#7871; c&oacute; tr&aacute;ch nhi&#7879;m
c&ocirc;ng khai m&#7913;c thu&#7871; ph&#7843;i n&#7897;p c&#7911;a h&#7897;
kinh doanh, c&aacute; nh&acirc;n kinh doanh tr&ecirc;n &#273;&#7883;a
b&agrave;n x&atilde;, ph&#432;&#7901;ng, th&#7883; tr&#7845;n.</span></p>

<p class=MsoNormal style='margin-bottom:6.0pt;text-align:justify;text-indent:

<h4><a name="_Toc522612776"></a><a name="_Toc17699748"></a><a
name="_Toc17699959"><span style='"Times New Roman"'>&#272;i&#7873;u

c&#259;n c&#7913; v&agrave;o t&agrave;i li&#7879;u k&ecirc; khai c&#7911;a h&#7897;

<p class=MsoNormal style='margin-bottom:6.0pt;text-align:justify;text-indent:

&#273;&#432;&#7907;c c&ocirc;ng khai trong &#273;&#7883;a b&agrave;n x&atilde;,

<p class=MsoNormal style='margin-bottom:6.0pt;text-align:justify;text-indent:
36.0pt; tr&#432;&#7903;ng

doanh, c&aacute; nh&acirc;n kinh doanh c&oacute; quy m&ocirc; v&#7873; doanh

<h4><a name="_Toc522612777"></a><a name="_Toc17699749"></a><a

<p class=MsoNormal style='margin-bottom:6.0pt;text-align:justify;text-indent:

<p class=MsoNormal style='margin-bottom:6.0pt;text-align:justify;text-indent:

<p class=MsoNormal style='margin-bottom:6.0pt;text-align:justify;text-indent:

<p class=MsoNormal style='margin-bottom:6.0pt;text-align:justify;text-indent:

khai thu&#7871; kh&ocirc;ng ph&#7843;n &aacute;nh ho&#7863;c ph&#7843;n
&aacute;nh kh&ocirc;ng &#273;&#7847;y &#273;&#7911;, trung th&#7921;c,

<p class=MsoNormal style='margin-bottom:6.0pt;text-align:justify;text-indent:
36.0pt;) C&#417; quan

t&#7871;;</span></p>

h&#7891; s&#417; quy&#7871;t to&aacute;n thu&#7871; TNCN</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>Quy &#273;&#7883;nh c&#361;: Kho&#7843;n 2 &#272;i&#7873;u
32 Lu&#7853;t Qu&#7843;n l&yacute; thu&#7871; 2006 quy &#273;&#7883;nh:</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>Th&#7901;i h&#7841;n n&#7897;p h&#7891; s&#417; quy&#7871;t
to&aacute;n thu&#7871; ch&#7853;m nh&#7845;t l&agrave; ng&agrave;y th&#7913; 90
k&#7875; t&#7915; ng&agrave;y k&#7871;t th&#7913;c n&#259;m d&#432;&#417;ng l&#7883;ch,
ho&#7863;c n&#259;m t&agrave;i ch&iacute;nh &#273;&#7889;i v&#7899;i h&#7891;
s&#417; quy&#7871;t to&aacute;n n&#259;m.</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>Quy &#273;&#7883;nh m&#7899;i: &#272;i&#7875;m b kho&#7843;n
2 &#272;i&#7873;u 44 Lu&#7853;t Qu&#7843;n l&yacute; thu&#7871; 2019 cho
ph&eacute;p:</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>Ch&#7853;m nh&#7845;t l&agrave; ng&agrave;y cu&#7889;i
c&ugrave;ng c&#7911;a th&aacute;ng th&#7913; 4 k&#7875; t&#7915; ng&agrave;y k&#7871;t
th&uacute;c n&#259;m d&#432;&#417;ng l&#7883;ch &#273;&#7889;i v&#7899;i h&#7891;
s&#417; quy&#7871;t to&aacute;n thu&#7871; thu nh&#7853;p c&aacute; nh&acirc;n <span
style='color:red'>c&#7911;a c&aacute; nh&acirc;n tr&#7921;c ti&#7871;p quy&#7871;t
to&aacute;n thu&#7871;.</span></span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>Nh&#432; v&#7853;y, Lu&#7853;t Qu&#7843;n l&yacute;
thu&#7871; 2019 &#273;&atilde; k&eacute;o d&agrave;i th&#7901;i h&#7841;n n&#7897;p
h&#7891; s&#417; quy&#7871;t to&aacute;n thu&#7871; TNCN th&ecirc;m 01
th&aacute;ng so v&#7899;i Lu&#7853;t Qu&#7843;n l&yacute; thu&#7871; 2006. Quy
&#273;&#7883;nh n&agrave;y &aacute;p d&#7909;ng v&#7899;i c&aacute; nh&acirc;n
tr&#7921;c ti&#7871;p quy&#7871;t to&aacute;n thu&#7871;.</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>6. M&#7903; r&#7897;ng quy&#7873;n c&#7911;a ng&#432;&#7901;i
n&#7897;p thu&#7871;</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>&#272;i&#7873;u 16 c&#7911;a Lu&#7853;t qu&#7843;n
l&yacute; thu&#7871; s&#7889; 38/2019/QH14 &#273;&atilde; quy &#273;&#7883;nh
14 quy&#7873;n c&#7911;a ng&#432;&#7901;i n&#7897;p thu&#7871;. So v&#7899;i
quy &#273;&#7883;nh c&#361; th&igrave; quy&#7873;n c&#7911;a ng&#432;&#7901;i n&#7897;p
thu&#7871; &#273;&#432;&#7907;c m&#7903; r&#7897;ng nh&#432; sau:</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>&#272;&#432;&#7907;c nh&#7853;n v&#259;n b&#7843;n
li&ecirc;n quan &#273;&#7871;n ngh&#297;a v&#7909; thu&#7871; c&#7911;a
c&aacute;c c&#417; quan ch&#7913;c n&#259;ng khi ti&#7871;n h&agrave;nh thanh
tra, ki&#7875;m tra, ki&#7875;m to&aacute;n.</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>&#272;&#432;&#7907;c bi&#7871;t th&#7901;i h&#7841;n
gi&#7843;i quy&#7871;t ho&agrave;n thu&#7871;, s&#7889; ti&#7873;n thu&#7871;
kh&ocirc;ng &#273;&#432;&#7907;c ho&agrave;n v&agrave; c&#259;n c&#7913;
ph&aacute;p l&yacute; &#273;&#7889;i v&#7899;i s&#7889; ti&#7873;n thu&#7871;
kh&ocirc;ng &#273;&#432;&#7907;c ho&agrave;n.</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>&#272;&#432;&#7907;c nh&#7853;n quy&#7871;t &#273;&#7883;nh
x&#7917; l&yacute; v&#7873; thu&#7871;, bi&ecirc;n b&#7843;n ki&#7875;m tra thu&#7871;,
thanh tra thu&#7871;, &#273;&#432;&#7907;c y&ecirc;u c&#7847;u gi&#7843;i
th&iacute;ch n&#7897;i dung quy&#7871;t &#273;&#7883;nh x&#7917; l&yacute; v&#7873;
thu&#7871;;</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>Kh&ocirc;ng b&#7883; x&#7917; ph&#7841;t vi ph&#7841;m
h&agrave;nh ch&iacute;nh v&#7873; thu&#7871;, kh&ocirc;ng t&iacute;nh ti&#7873;n
ch&#7853;m n&#7897;p &#273;&#7889;i v&#7899;i tr&#432;&#7901;ng h&#7907;p <span
style='color:red'>do ng&#432;&#7901;i n&#7897;p thu&#7871; th&#7921;c hi&#7879;n
theo v&#259;n b&#7843;n h&#432;&#7899;ng d&#7851;n v&agrave; quy&#7871;t &#273;&#7883;nh
x&#7917; l&yacute; c&#7911;a c&#417; quan thu&#7871;, c&#417; quan nh&agrave;
n&#432;&#7899;c c&oacute; th&#7849;m quy&#7873;n</span> li&ecirc;n quan &#273;&#7871;n
n&#7897;i dung x&aacute;c &#273;&#7883;nh ngh&#297;a v&#7909; thu&#7871; c&#7911;a
ng&#432;&#7901;i n&#7897;p thu&#7871;</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>7. Quy &#273;&#7883;nh qu&#7843;n l&yacute; thu&#7871;
&#273;&#7889;i v&#7899;i ho&#7841;t &#273;&#7897;ng th&#432;&#417;ng m&#7841;i
&#273;i&#7879;n t&#7917;</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>V&#7899;i s&#7921; ph&aacute;t tri&#7875;n v&agrave; m&#7903;
r&#7897;ng c&#7911;a ho&#7841;t &#273;&#7897;ng kinh doanh th&#432;&#417;ng m&#7841;i
&#273;i&#7879;n t&#7917; th&igrave; vi&#7879;c x&acirc;y d&#7921;ng, ban
h&agrave;nh c&aacute;c quy &#273;&#7883;nh v&#7873; Qu&#7843;n l&yacute; thu&#7871;
trong l&#297;nh v&#7921;c n&agrave;y l&agrave; &#273;i&#7873;u c&#7847;n thi&#7871;t.</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>Kho&#7843;n 4 &#272;i&#7873;u 42 Lu&#7853;t Qu&#7843;n
l&yacute; thu&#7871; 2019 quy &#273;&#7883;nh: &#272;&#7889;i v&#7899;i ho&#7841;t
&#273;&#7897;ng kinh doanh th&#432;&#417;ng m&#7841;i &#273;i&#7879;n t&#7917;,
kinh doanh d&#7921;a tr&ecirc;n n&#7873;n t&#7843;ng s&#7889; v&agrave;
c&aacute;c d&#7883;ch v&#7909; kh&aacute;c &#273;&#432;&#7907;c th&#7921;c hi&#7879;n
b&#7903;i nh&agrave; cung c&#7845;p &#7903; n&#432;&#7899;c ngo&agrave;i
kh&ocirc;ng c&oacute; c&#417; s&#7903; th&#432;&#7901;ng tr&uacute; t&#7841;i
Vi&#7879;t Nam th&igrave; nh&agrave; cung c&#7845;p &#7903; n&#432;&#7899;c
ngo&agrave;i c&oacute; ngh&#297;a v&#7909; tr&#7921;c ti&#7871;p ho&#7863;c &#7911;y
quy&#7873;n th&#7921;c hi&#7879;n &#273;&#259;ng k&yacute; thu&#7871;, khai thu&#7871;,
n&#7897;p thu&#7871; t&#7841;i Vi&#7879;t Nam theo quy &#273;&#7883;nh c&#7911;a
B&#7897; tr&#432;&#7903;ng B&#7897; T&agrave;i ch&iacute;nh.</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>M&#7863;c d&ugrave; &#273;&acirc;y ch&#7881; l&agrave;
n&#7897;i dung mang t&iacute;nh ch&#7845;t &#273;&#7883;nh h&#432;&#7899;ng
nh&#432;ng &#273;&oacute;ng vai tr&ograve; nh&#7845;t &#273;&#7883;nh v&agrave;
l&agrave; ti&#7873;n &#273;&#7873; quan tr&#7885;ng &#273;&#7875; ban
h&agrave;nh c&aacute;c v&#259;n b&#7843;n h&#432;&#7899;ng d&#7851;n c&#7909;
th&#7875; c&ocirc;ng t&aacute;c qu&#7843;n l&yacute; thu&#7871; &#273;&#7889;i
v&#7899;i ho&#7841;t &#273;&#7897;ng kinh doanh th&#432;&#417;ng m&#7841;i
&#273;i&#7879;n t&#7917;.</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>8. B&#7893; sung d&#7883;ch v&#7909; k&#7871;
to&aacute;n cho doanh nghi&#7879;p nh&#7887; v&agrave; v&#7915;a do &#273;&#7841;i
l&yacute; thu&#7871; cung c&#7845;p</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>Theo &#273;i&#7875;m c kho&#7843;n 1 &#272;i&#7873;u
104 Lu&#7853;t Qu&#7843;n l&yacute; thu&#7871; 2019 th&igrave; d&#7883;ch v&#7909;
do &#273;&#7841;i l&yacute; thu&#7871; cung c&#7845;p cho ng&#432;&#7901;i n&#7897;p
thu&#7871; theo h&#7907;p &#273;&#7891;ng b&#7893; sung th&ecirc;m: D&#7883;ch
v&#7909; k&#7871; to&aacute;n cho doanh nghi&#7879;p si&ecirc;u nh&#7887; theo
quy &#273;&#7883;nh t&#7841;i &#272;i&#7873;u 150 c&#7911;a Lu&#7853;t
n&agrave;y. Doanh nghi&#7879;p si&ecirc;u nh&#7887; &#273;&#432;&#7907;c
x&aacute;c &#273;&#7883;nh theo quy &#273;&#7883;nh c&#7911;a ph&aacute;p lu&#7853;t
v&#7873; h&#7895; tr&#7907; doanh nghi&#7879;p nh&#7887; v&agrave; v&#7915;a.</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>Ch&#7913;c n&#259;ng n&agrave;y gi&uacute;p nh&#7919;ng
doanh nghi&#7879;p si&ecirc;u nh&#7887; ti&#7871;t ki&#7879;m chi ph&iacute;
v&agrave; ph&ugrave; h&#7907;p v&#7899;i Lu&#7853;t H&#7895; tr&#7907; doanh
nghi&#7879;p nh&#7887; v&agrave; v&#7915;a. Thay v&igrave; ph&#7843;i
thu&ecirc; hai &#273;&#417;n v&#7883; th&#7921;c hi&#7879;n 02 d&#7883;ch v&#7909;
(t&#432; v&#7845;n thu&#7871; v&agrave; k&#7871; to&aacute;n) th&igrave; nay ch&#7881;
c&#7847;n thu&ecirc; m&#7897;t &#273;&#417;n v&#7883; &#273;&#7875; th&#7921;c
hi&ecirc;n c&#7843; hai nhi&#7879;m v&#7909; tr&ecirc;n.</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>9. Si&#7871;t ch&#7863;t qu&#7843;n l&yacute; ho&#7841;t
&#273;&#7897;ng chuy&#7875;n gi&aacute;</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>&#272;&#7875; ng&#259;n ch&#7863;n h&agrave;nh vi tr&#7889;n
thu&#7871; th&ocirc;ng qua chuy&#7875;n gi&aacute; &#273;ang ng&agrave;y
c&agrave;ng ph&#7893; bi&#7871;n, Lu&#7853;t Qu&#7843;n l&yacute; thu&#7871;
2019 nghi&ecirc;m c&#7845;m h&agrave;nh vi: Th&ocirc;ng &#273;&#7891;ng,
m&oacute;c n&#7889;i, bao che gi&#7919;a ng&#432;&#7901;i n&#7897;p thu&#7871;
v&agrave; c&ocirc;ng ch&#7913;c qu&#7843;n l&yacute; thu&#7871;, c&#417; quan
qu&#7843;n l&yacute; thu&#7871; nh&#7857;m chuy&#7875;n gi&aacute; ho&#7863;c
tr&#7889;n thu&#7871;.</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>Kho&#7843;n 5, &#272;i&#7873;u 42 Lu&#7853;t Qu&#7843;n
l&yacute; thu&#7871; 2019 quy &#273;&#7883;nh nguy&ecirc;n t&#7855;c k&ecirc;
khai, x&aacute;c &#273;&#7883;nh gi&aacute; t&iacute;nh thu&#7871; &#273;&#7889;i
v&#7899;i giao d&#7883;ch li&ecirc;n k&#7871;t nh&#7857;m si&#7871;t ch&#7863;t
qu&#7843;n l&yacute; ho&#7841;t &#273;&#7897;ng chuy&#7875;n gi&aacute;
nh&#432; sau:</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>K&ecirc; khai, x&aacute;c &#273;&#7883;nh gi&aacute;
giao d&#7883;ch li&ecirc;n k&#7871;t theo nguy&ecirc;n t&#7855;c ph&acirc;n
t&iacute;ch, so s&aacute;nh v&#7899;i c&aacute;c giao d&#7883;ch &#273;&#7897;c
l&#7853;p v&agrave; nguy&ecirc;n t&#7855;c b&#7843;n ch&#7845;t ho&#7841;t
&#273;&#7897;ng, giao d&#7883;ch quy&#7871;t &#273;&#7883;nh ngh&#297;a v&#7909;
thu&#7871; &#273;&#7875; x&aacute;c &#273;&#7883;nh ngh&#297;a v&#7909; thu&#7871;
ph&#7843;i n&#7897;p nh&#432; trong &#273;i&#7873;u ki&#7879;n giao d&#7883;ch
gi&#7919;a c&aacute;c b&ecirc;n &#273;&#7897;c l&#7853;p;</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>Gi&aacute; giao d&#7883;ch li&ecirc;n k&#7871;t
&#273;&#432;&#7907;c &#273;i&#7873;u ch&#7881;nh theo giao d&#7883;ch &#273;&#7897;c
l&#7853;p &#273;&#7875; k&ecirc; khai, x&aacute;c &#273;&#7883;nh s&#7889; ti&#7873;n
thu&#7871; ph&#7843;i n&#7897;p theo nguy&ecirc;n t&#7855;c kh&ocirc;ng
l&agrave;m gi&#7843;m thu nh&#7853;p ch&#7883;u thu&#7871;;</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>Ng&#432;&#7901;i n&#7897;p thu&#7871; c&oacute; quy
m&ocirc; nh&#7887;, r&#7911;i ro v&#7873; thu&#7871; th&#7845;p &#273;&#432;&#7907;c
mi&#7877;n th&#7921;c hi&#7879;n quy &#273;&#7883;nh t&#7841;i &#273;i&#7875;m
a, &#273;i&#7875;m b kho&#7843;n n&agrave;y v&agrave; &#273;&#432;&#7907;c
&aacute;p d&#7909;ng c&#417; ch&#7871; &#273;&#417;n gi&#7843;n h&oacute;a
trong k&ecirc; khai, x&aacute;c &#273;&#7883;nh gi&aacute; giao d&#7883;ch
li&ecirc;n k&#7871;t.</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>10. Lu&#7853;t h&oacute;a quy &#273;&#7883;nh v&#7873;
h&oacute;a &#273;&#417;n, ch&#7913;ng t&#7915; &#273;i&#7879;n t&#7917;</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>Chuy&#7875;n &#273;&#7893;i h&oacute;a &#273;&#417;n
&#273;i&#7879;n t&#7917;</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>T&#7841;i Ch&#432;&#417;ng X Lu&#7853;t qu&#7843;n
l&yacute; thu&#7871; 2019 quy &#273;&#7883;nh v&#7873; vi&#7879;c &aacute;p d&#7909;ng
h&oacute;a &#273;&#417;n, ch&#7913;ng t&#7915; &#273;i&#7879;n t&#7917; v&#7899;i
m&#7897;t s&#7889; n&#7897;i dung t&#432;&#417;ng t&#7921; nh&#432;
&#273;&atilde; quy &#273;&#7883;nh t&#7841;i Ngh&#7883; &#273;&#7883;nh s&#7889;
119/2018/N&#272;-CP. Tuy nhi&ecirc;n, t&#7841;i &#272;i&#7873;u 151 quy &#273;&#7883;nh
v&#7873; hi&#7879;u l&#7921;c thi h&agrave;nh c&#7911;a Lu&#7853;t n&agrave;y
c&oacute; n&ecirc;u: <span style='color:red'>Nh&#7919;ng n&#7897;i dung v&#7873;
h&oacute;a &#273;&#417;n, ch&#7913;ng t&#7915; &#273;i&#7879;n t&#7917; s&#7869;
c&oacute; hi&#7879;u l&#7921;c t&#7915; ng&agrave;y 1/7/2022</span>. Khuy&#7871;n
kh&iacute;ch c&aacute;c c&#417; quan, &#273;&#417;n v&#7883; t&#7893; ch&#7913;c
th&#7921;c hi&#7879;n nh&#7919;ng quy &#273;&#7883;nh v&#7873; h&oacute;a
&#273;&#417;n &#273;i&#7879;n t&#7917; t&#7841;i Lu&#7853;t n&agrave;y tr&#432;&#7899;c
ng&agrave;y 1/7/2022.</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>Quy &#273;&#7883;nh n&agrave;y c&#7911;a Lu&#7853;t Qu&#7843;n
l&yacute; thu&#7871; 2019 &#273;&#432;&#7907;c hi&#7875;u l&agrave; quy &#273;&#7883;nh
chung d&agrave;nh cho h&oacute;a &#273;&#417;n, ch&#7913;ng t&#7915; &#273;i&#7879;n
t&#7917; n&oacute;i chung, bao g&#7891;m: h&#7907;p &#273;&#7891;ng, &#273;&#7873;
ngh&#7883;, th&ocirc;ng b&aacute;o, x&aacute;c nh&#7853;n ho&#7863;c c&aacute;c
t&agrave;i li&#7879;u kh&aacute;c &#7903; d&#7841;ng th&ocirc;ng &#273;i&#7879;p
d&#7919; li&#7879;u do c&aacute;c b&ecirc;n &#273;&#432;a ra li&ecirc;n quan t&#7899;i
vi&#7879;c giao k&#7871;t hay th&#7921;c hi&#7879;n h&#7907;p &#273;&#7891;ng.</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>Quy &#273;&#7883;nh n&agrave;y &iacute;t nhi&#7873;u
&#273;&atilde; khi&#7871;n ng&#432;&#7901;i n&#7897;p thu&#7871; hoang mang khi
&#273;ang trong giai &#273;o&#7841;n chuy&#7875;n &#273;&#7893;i h&oacute;a
&#273;&#417;n &#273;i&#7879;n t&#7917; theo l&#7897; tr&igrave;nh t&#7841;i Ngh&#7883;
&#273;&#7883;nh 119/2018/N&#272;-CP: B&#7855;t bu&#7897;c s&#7917; d&#7909;ng
h&oacute;a &#273;&#417;n &#273;i&#7879;n t&#7917; t&#7915; 1/11/2020.</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>V&#7873; v&#7845;n &#273;&#7873; n&agrave;y, t&#7841;i
c&ocirc;ng v&#259;n tr&#7843; l&#7901;i CTCP B&#7879;nh vi&#7879;n &#272;a khoa
V&#297;nh &#272;&#7913;c, T&#7893;ng c&#7909;c thu&#7871; c&oacute; &yacute; ki&#7871;n
nh&#432; sau:</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>&#8220;T&#7915; ng&agrave;y 1/11/2020, vi&#7879;c
&aacute;p d&#7909;ng h&oacute;a &#273;&#417;n &#273;i&#7879;n t&#7917; th&#7921;c
hi&#7879;n theo Ngh&#7883; &#273;&#7883;nh 119/2018/N&#272;-CP v&agrave;
Th&ocirc;ng t&#432; 68/2019/TT-BTC.</span></p>
