<p class=Vnbnnidung0 style='margin-bottom:6.0pt;text-align:justify;text-indent:

Tr&#432;&#7901;ng h&#7907;p ng&#432;&#7901;i n&#7897;p thu&#7871; phát sinh

&#273;&#432;&#7907;c xác &#273;&#7883;nh theo &#273;úng b&#7843;n ch&#7845;t

t&#7871; và các quy&#7873;n t&#7841;o ra thu nh&#7853;p t&#7915; c&#7893;
ph&#7847;n, c&#7893; phi&#7871;u và các công c&#7909; tài chính khác và
ng&#432;&#7901;i n&#7897;p thu&#7871; phát sinh chi phí t&#7915; giao
d&#7883;ch v&#7899;i bên liên k&#7871;t ph&#7843;i nh&#7853;n &#273;&#432;&#7907;c

&#273;&#7897;ng s&#7843;n xu&#7845;t, kinh doanh c&#7911;a ng&#432;&#7901;i

&#273;&#7897;c l&#7853;p;</span></span></p>

&#272;i&#7873;u 15 Ngh&#7883; &#273;&#7883;nh này.</span></span></p>

&#273;&#7883;nh l&#432;&#7907;ng là khác bi&#7879;t xác &#273;&#7883;nh b&#7857;ng

&#273;&#7883;nh c&#259;n c&#7913; vào t&#7915;ng ph&#432;&#417;ng pháp xác
&#273;&#7883;nh giá giao d&#7883;ch liên k&#7871;t quy &#273;&#7883;nh

bàn t&#7841;i &#273;&#7883;a ph&#432;&#417;ng, trong n&#432;&#7899;c và

<p class=Vnbnnidung0 style='margin-bottom:6.0pt;text-align:justify;text-indent:

&#273;&#7883;nh l&#432;&#7907;ng và &#273;&#7883;nh tính ph&#7843;i
&#273;&#432;&#7907;c rà soát, &#273;i&#7873;u ch&#7881;nh t&#432;&#417;ng

&#273;&#7883;nh giá giao d&#7883;ch liên k&#7871;t quy &#273;&#7883;nh
t&#7841;i &#272;i&#7873;u 13, &#272;i&#7873;u 14, &#272;i&#7873;u 15 Ngh&#7883;
&#273;&#7883;nh này.</span></span></p>

<p class=Vnbnnidung0 style='margin-bottom:6.0pt;text-align:justify;text-indent:

phân tích, so sánh là c&#259;n c&#7913; l&#7921;a ch&#7885;n &#273;&#7889;i

&#272;i&#7873;u 15 Ngh&#7883; &#273;&#7883;nh này. Tr&#432;&#7901;ng h&#7907;p

&#273;i&#7873;u ch&#7881;nh m&#7913;c giá, t&#7927; su&#7845;t l&#7907;i

&#273;&#7889;i t&#432;&#7907;ng so sánh &#273;&#7897;c l&#7853;p v&#7899;i l\u01b0

các &#273;&#7889;i t&#432;&#7907;ng so sánh &#273;&#7897;c l&#7853;p
&#273;&#7875; xác &#273;&#7883;nh kho&#7843;ng giá tr&#7883; giao d&#7883;ch
&#273;&#7897;c l&#7853;p chu&#7849;n &#273;&#7843;m b&#7843;o m&#7913;c
&#273;&#7897; tin c&#7853;y, t&#432;&#417;ng &#273;&#7891;ng nh&#7845;t và
th&#7921;c hi&#7879;n &#273;i&#7873;u ch&#7881;nh giá giao d&#7883;ch liên
k&#7871;t theo quy &#273;&#7883;nh t&#7841;i Ngh&#7883; &#273;&#7883;nh này.</span></span></p>

<p class=MsoTitle><a name="_Toc56167878"><span lang=VI>&#272;i&#7873;u 11.
Tr\u0301nh t&#7921; phân tích, so sánh</span></a></p>

<p class=Vnbnnidung0 style='margin-bottom:6.0pt;text-align:justify;text-indent:

b&#7843;n ch&#7845;t c&#7911;a giao d&#7883;ch liên k&#7871;t tr&#432;&#7899;c

<p class=Vnbnnidung0 style='margin-bottom:6.0pt;text-align:justify;text-indent:
36.0pt;line-height:normal;tab-stops:44.6pt;layout-grid-mode:char;m, l&#7921;a ch&#7885;n các &#273;&#7889;i t&#432;&#7907;ng so
sánh &#273;&#7897;c l&#7853;p t&#432;&#417;ng &#273;&#7891;ng trên c&#417;

ngành, th&#7883; tr&#432;&#7901;ng, &#273;i&#7873;u ki&#7879;n kinh t&#7871;
khi phát sinh giao d&#7883;ch; phân tích giao d&#7883;ch liên k&#7871;t và
ng&#432;&#7901;i n&#7897;p thu&#7871; th&#7921;c hi&#7879;n giao d&#7883;ch

&#273;i&#7873;u ch&#7881;nh các khác bi&#7879;t tr&#7885;ng y&#7871;u, c&#7909;
th&#7875;:</span></span></p>

<p class=Vnbnnidung0 style='margin-bottom:6.0pt;text-align:justify;text-indent:
36.0pt;line-height:normal;tab-stops:45.0pt;layout-grid-mode:char;&#7883;nh
ph&#7841;m vi, n&#7897;i dung và y&#7871;u t&#7889; so sánh bao g&#7891;m
th&#7901;i gian so sánh; thông tin phân tích v&#7873; ng&#432;&#7901;i
n&#7897;p thu&#7871; &#273;&#7889;i v&#7899;i các y&#7871;u t&#7889; so sánh
v&#7873; ch&#7913;c n&#259;ng, tài s&#7843;n, r&#7911;i ro; &#273;&#7863;c tính
s&#7843;n ph&#7849;m; &#273;i&#7873;u ki&#7879;n h&#7907;p &#273;&#7891;ng;
&#273;i&#7873;u ki&#7879;n kinh t&#7871; khi phát sinh giao d&#7883;ch, phân
tích ngành, th&#7883; tr&#432;&#7901;ng, hoàn c&#7843;nh ho&#7841;t
&#273;&#7897;ng kinh doanh, giao d&#7883;ch hàng hóa, d&#7883;ch v&#7909; và
tài s&#7843;n c&#7911;a các bên &#273;&#7875; l&#7921;a ch&#7885;n bên liên
k&#7871;t c&#7847;n th&#7921;c hi&#7879;n xác &#273;&#7883;nh giá giao
d&#7883;ch liên k&#7871;t theo quy &#273;&#7883;nh t&#7841;i Ngh&#7883;
&#273;&#7883;nh này;</span></span></p>

<p class=Vnbnnidung0 style='margin-bottom:6.0pt;text-align:justify;text-indent:
36.0pt;line-height:normal;tab-stops:46.25pt;layout-grid-mode:char;ánh giá, t\u0301m
ki&#7871;m &#273;&#7889;i t&#432;&#7907;ng so sánh g&#7891;m &#432;u tiên rà
soát các &#273;&#7889;i t&#432;&#7907;ng so sánh &#273;&#7897;c l&#7853;p

s&#7917; d&#7909;ng theo quy &#273;&#7883;nh t&#7841;i &#272;i&#7873;u 17
Ngh&#7883; &#273;&#7883;nh này &#273;&#7875; ti&#7871;n hành t\u0301m ki&#7871;m các
&#273;&#7889;i t&#432;&#7907;ng so sánh &#273;&#7897;c l&#7853;p

&#273;&#7883;nh giá;</span></span></p>

<p class=Vnbnnidung0 style='margin-bottom:6.0pt;text-align:justify;text-indent:
36.0pt;line-height:normal;tab-stops:45.7pt;layout-grid-mode:char;c
&#273;&#7897; t&#432;&#417;ng &#273;&#7891;ng và tin c&#7853;y c&#7911;a các
&#273;&#7889;i t&#432;&#7907;ng so sánh &#273;&#7897;c l&#7853;p
&#273;&#432;&#7907;c l&#7921;a ch&#7885;n trên c&#417; s&#7903; rà soát, sàng

&#273;&#7875; xác minh m&#7913;c &#273;&#7897; t&#432;&#417;ng &#273;&#7891;ng;
xác &#273;&#7883;nh khác bi&#7879;t tr&#7885;ng y&#7871;u và &#273;i&#7873;u
ch&#7881;nh khác bi&#7879;t tr&#7885;ng y&#7871;u. Trên c&#417; s&#7903;
k&#7871;t qu&#7843; l&#7921;a ch&#7885;n các &#273;&#7889;i t&#432;&#7907;ng so
sánh &#273;&#7897;c l&#7853;p t&#432;&#417;ng &#273;&#7891;ng, s&#7917;
d&#7909;ng d&#7919; li&#7879;u, s&#7889; li&#7879;u tài chính c&#7911;a các
&#273;&#7889;i t&#432;&#7907;ng so sánh &#273;&#7897;c l&#7853;p
&#273;&#432;&#7907;c l&#7921;a ch&#7885;n &#273;&#7875; xác &#273;&#7883;nh
c&#259;n c&#7913; th&#7921;c hi&#7879;n &#273;i&#7873;u ch&#7881;nh m&#7913;c
giá, t&#7927; su&#7845;t l&#7907;i nhu&#7853;n, t&#7927; l&#7879; phân b&#7893;
l&#7907;i nhu&#7853;n c&#7911;a ng&#432;&#7901;i n&#7897;p thu&#7871; theo quy
&#273;&#7883;nh t&#7841;i &#272;i&#7873;u 8 Ngh&#7883; &#273;&#7883;nh này.</span></span></p>

<p class=Vnbnnidung0 style='margin-bottom:6.0pt;text-align:justify;text-indent:
36.0pt;line-height:normal;tab-stops:45.0pt;layout-grid-mode:char;background:white;background:white;
&#7883;nh m&#7913;c
giá, t&#7927; su&#7845;t l&#7907;i nhu&#7853;n ho&#7863;c t&#7927; l&#7879;
phân b&#7893; l&#7907;i nhu&#7853;n c&#259;n c&#7913; k&#7871;t qu&#7843; phân
tích các &#273;&#7889;i t&#432;&#7907;ng so sánh &#273;&#7897;c l&#7853;p
&#273;&#7875; làm c&#417; s&#7903; so sánh, áp d&#7909;ng xác &#273;&#7883;nh

ngh&#297;a v&#7909; thu&#7871; ph&#7843;i n&#7897;p ngân sách nhà n&#432;&#7899;c.
Ph&#432;&#417;ng pháp tính toán ph&#7843;i &#273;&#432;&#7907;c áp d&#7909;ng

&#272;i&#7873;u 14, &#272;i&#7873;u 15 Ngh&#7883; &#273;&#7883;nh này.</span></span></p>

<p class=MsoTitle><a name="_Toc56167879"><span lang=VI>&#272;i&#7873;u 12. L&#7921;a

<p class=Vnbnnidung0 style='margin-bottom:6.0pt;text-align:justify;text-indent:

d&#7883;ch liên k&#7871;t (vi&#7871;t t&#7855;t là ph&#432;&#417;ng pháp xác
&#273;&#7883;nh giá giao d&#7883;ch liên k&#7871;t) &#273;&#432;&#7907;c áp
d&#7909;ng phù h&#7907;p nguyên t&#7855;c giao d&#7883;ch &#273;&#7897;c
l&#7853;p, b&#7843;n ch&#7845;t giao d&#7883;ch và ch&#7913;c n&#259;ng
c&#7911;a ng&#432;&#7901;i n&#7897;p thu&#7871; trên c&#417; s&#7903; tính

giai &#273;o&#7841;n s&#7843;n xu&#7845;t kinh doanh; c&#259;n c&#7913;
d&#7919; li&#7879;u tài chính c&#7911;a các &#273;&#7889;i t&#432;&#7907;ng so

các nguyên t&#7855;c phân tích, so sánh quy &#273;&#7883;nh t&#7841;i
&#272;i&#7873;u 6, &#272;i&#7873;u 7, &#272;i&#7873;u 8, &#272;i&#7873;u 9,
&#272;i&#7873;u 10 Ngh&#7883; &#273;&#7883;nh này. Ph&#432;&#417;ng pháp xác
&#273;&#7883;nh giá giao d&#7883;ch liên k&#7871;t &#273;&#432;&#7907;c
l&#7921;a ch&#7885;n trong các ph&#432;&#417;ng pháp quy &#273;&#7883;nh
t&#7841;i &#272;i&#7873;u 13, &#272;i&#7873;u 14, &#272;i&#7873;u 15 Ngh&#7883;
&#273;&#7883;nh này, c&#259;n c&#7913; vào &#273;&#7863;c &#273;i&#7875;m
c&#7911;a giao d&#7883;ch liên k&#7871;t và c&#259;n c&#7913; vào thông tin
d&#7919; li&#7879;u s&#7861;n có.</span></span></p>

<p class=MsoTitle><a name="_Toc56167880"><span lang=VI>&#272;i&#7873;u 13.

<p class=Vnbnnidung0 style='margin-bottom:6.0pt;text-align:justify;text-indent:
36.0pt;line-height:normal;layout-grid-mode:char;&#7901;i n&#7897;p thu&#7871; th&#7921;c hi&#7879;n giao d&#7883;ch
liên k&#7871;t &#273;&#7889;i v&#7899;i t&#7915;ng ch&#7911;ng lo&#7841;i hàng
hóa, tài s&#7843;n h&#7919;u h\u0301nh, lo&#7841;i h\u0301nh d&#7883;ch v&#7909; có
&#273;i&#7873;u ki&#7879;n giao d&#7883;ch, l&#432;u thông ph&#7893; bi&#7871;n
trên th&#7883; tr&#432;&#7901;ng ho&#7863;c có giá &#273;&#432;&#7907;c công
b&#7889; trên các sàn giao d&#7883;ch hàng hóa, d&#7883;ch v&#7909; trong
n&#432;&#7899;c và qu&#7889;c t&#7871;; giao d&#7883;ch thanh toán phí

trong ho&#7841;t &#273;&#7897;ng vay và cho vay; ho&#7863;c ng&#432;&#7901;i
n&#7897;p thu&#7871; th&#7921;c hi&#7879;n c&#7843; giao d&#7883;ch
&#273;&#7897;c l&#7853;p và giao d&#7883;ch liên k&#7871;t &#273;&#7889;i
v&#7899;i s&#7843;n ph&#7849;m t&#432;&#417;ng &#273;&#7891;ng v&#7873;
&#273;&#7863;c tính s&#7843;n ph&#7849;m và &#273;i&#7873;u ki&#7879;n
h&#7907;p &#273;&#7891;ng.</span></span></p>

<p class=Vnbnnidung0 style='margin-bottom:6.0pt;text-align:justify;text-indent:
36.0pt;line-height:normal;tab-stops:45.0pt;layout-grid-mode:char;c áp
d&#7909;ng:</span></span></p>

<p class=Vnbnnidung0 style='margin-bottom:6.0pt;text-align:justify;text-indent:
36.0pt;line-height:normal;tab-stops:46.25pt;layout-grid-mode:char;&#7901;i n&#7897;p thu&#7871; tham gia các giao d&#7883;ch kinh
t&#7871; s&#7889;, không có c&#259;n c&#7913; &#273;&#7875; xác &#273;&#7883;nh
giá gi&#7919;a các bên liên k&#7871;t ho&#7863;c tham gia vi&#7879;c t&#7841;o
giá tr&#7883; t&#259;ng thêm thu &#273;&#432;&#7907;c t&#7915; h&#7907;p
l&#7921;c trong t&#7853;p &#273;oàn;</span></span></p>

<p class=Vnbnnidung0 style='margin-bottom:6.0pt;text-align:justify;text-indent:

t&#432;&#7907;ng áp d&#7909;ng theo quy &#273;&#7883;nh t&#7841;i kho&#7843;n 1
&#272;i&#7873;u 13, kho&#7843;n 1 &#272;i&#7873;u 14 Ngh&#7883; &#273;&#7883;nh

<p class=Vnbnnidung0 style='margin-bottom:6.0pt;text-align:justify;text-indent:
36.0pt;line-height:normal;tab-stops:45.6pt;layout-grid-mode:char;c áp d&#7909;ng:</span></span></p>

<p class=Vnbnnidung0 style='margin-bottom:6.0pt;text-align:justify;text-indent:
36.0pt;line-height:normal;layout-grid-mode:char;&#417;ng pháp phân b&#7893; l&#7907;i nhu&#7853;n là
ph&#432;&#417;ng pháp phân b&#7893; t&#7893;ng l&#7907;i nhu&#7853;n thu
&#273;&#432;&#7907;c &#273;&#7875; xác &#273;&#7883;nh l&#7907;i nhu&#7853;n
c&#7911;a ng&#432;&#7901;i n&#7897;p thu&#7871; tham gia vào chu&#7895;i giao
d&#7883;ch. Ph&#432;&#417;ng pháp phân b&#7893; l&#7907;i nhu&#7853;n
&#273;&#432;&#7907;c áp d&#7909;ng &#273;&#7889;i v&#7899;i: T&#7893;ng
l&#7907;i nhu&#7853;n th&#7921;c t&#7871; và l&#7907;i nhu&#7853;n ti&#7873;m
n&#259;ng thu &#273;&#432;&#7907;c xác &#273;&#7883;nh b&#7857;ng các s&#7889;
li&#7879;u tài chính trên c&#417; s&#7903; các ch&#7913;ng t&#7915; h&#7907;p
l\u01b0, h&#7907;p l&#7879;; giá tr&#7883; và l&#7907;i nhu&#7853;n c&#7911;a giao
d&#7883;ch ph&#7843;i &#273;&#432;&#7907;c xác &#273;&#7883;nh theo cùng
ph&#432;&#417;ng pháp k&#7871; toán trong toàn b&#7897; th&#7901;i gian áp
d&#7909;ng ph&#432;&#417;ng pháp phân b&#7893; l&#7907;i nhu&#7853;n.</span></span></p>

<p class=Vnbnnidung0 style='margin-bottom:6.0pt;text-align:justify;text-indent:
36.0pt;line-height:normal;tab-stops:45.6pt;layout-grid-mode:char;&#417;ng pháp xác &#273;&#7883;nh:</span></span></p>

<p class=Vnbnnidung0 style='margin-bottom:6.0pt;text-align:justify;text-indent:
36.0pt;line-height:normal;layout-grid-mode:char;i nhu&#7853;n &#273;&#432;&#7907;c &#273;i&#7873;u ch&#7881;nh
c&#7911;a ng&#432;&#7901;i n&#7897;p thu&#7871; &#273;&#432;&#7907;c phân
b&#7893; trên t&#7893;ng l&#7907;i nhu&#7853;n thu &#273;&#432;&#7907;c, bao
g&#7891;m l&#7907;i nhu&#7853;n th&#7921;c t&#7871; và l&#7907;i nhu&#7853;n
ti&#7873;m n&#259;ng c&#7911;a các bên tham gia chu&#7895;i giao d&#7883;ch.</span></span></p>

<p class=Vnbnnidung0 style='margin-bottom:6.0pt;text-align:justify;text-indent:
36.0pt;line-height:normal;layout-grid-mode:char;i nhu&#7853;n &#273;&#432;&#7907;c &#273;i&#7873;u ch&#7881;nh
c&#7911;a ng&#432;&#7901;i n&#7897;p thu&#7871; là t&#7893;ng l&#7907;i
nhu&#7853;n c&#417; b&#7843;n và l&#7907;i nhu&#7853;n ph&#7909; tr&#7897;i.
L&#7907;i nhu&#7853;n c&#417; b&#7843;n xác &#273;&#7883;nh theo
ph&#432;&#417;ng pháp so sánh t&#7927; su&#7845;t l&#7907;i nhu&#7853;n quy
&#273;&#7883;nh t&#7841;i &#272;i&#7873;u 14 Ngh&#7883; &#273;&#7883;nh này.
L&#7907;i nhu&#7853;n ph&#7909; tr&#7897;i xác &#273;&#7883;nh theo t&#7927;
l&#7879; phân b&#7893; d&#7921;a trên m&#7897;t ho&#7863;c m&#7897;t s&#7889;
y&#7871;u t&#7889; nh&#432; doanh thu, chi phí, tài s&#7843;n ho&#7863;c nhân
l&#7921;c c&#7911;a các bên liên k&#7871;t tham gia giao d&#7883;ch và phù
h&#7907;p nguyên t&#7855;c giao d&#7883;ch &#273;&#7897;c l&#7853;p.</span></span></p>

<p class=Vnbnnidung0 style='margin-bottom:6.0pt;text-align:justify;text-indent:
36.0pt;line-height:normal;layout-grid-mode:char;&#7901;ng h&#7907;p không &#273;&#7911; thông tin, d&#7919;
li&#7879;u &#273;&#7875; phân b&#7893; l&#7907;i nhu&#7853;n
&#273;&#432;&#7907;c &#273;i&#7873;u ch&#7881;nh theo quy &#273;&#7883;nh trên,
vi&#7879;c phân b&#7893; có th&#7875; d&#7921;a trên m&#7897;t ho&#7863;c m&#7897;t
s&#7889; y&#7871;u t&#7889; nh&#432; doanh thu, chi phí, tài s&#7843;n
ho&#7863;c nhân l&#7921;c c&#7911;a các bên liên k&#7871;t tham gia giao
d&#7883;ch và phù h&#7907;p nguyên t&#7855;c giao d&#7883;ch &#273;&#7897;c
l&#7853;p.</span></span></p>

<p class=Vnbnnidung0 style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:

&#273;&#432;&#7907;c &#273;i&#7873;u ch&#7881;nh c&#7911;a ng&#432;&#7901;i

<h1><a name="_Toc56167884"><span lang=VI>CHI PHÍ TÍNH THU&#7870; VÀ KÊ KHAI,

<p class=MsoTitle><a name="_Toc56167885"><span lang=VI>&#272;i&#7873;u 16. Xác
&#273;&#7883;nh chi phí &#273;&#7875; tính thu&#7871; &#273;&#7889;i v&#7899;i
doanh nghi&#7879;p có giao d&#7883;ch liên k&#7871;t</span></a></p>

<p class=Vnbnnidung0 style='margin-bottom:6.0pt;text-align:justify;text-indent:
36.0pt;line-height:normal;tab-stops:45.05pt;layout-grid-mode:char;background:white;background:white;a giao d&#7883;ch liên k&#7871;t không phù h&#7907;p
b&#7843;n ch&#7845;t giao d&#7883;ch &#273;&#7897;c l&#7853;p ho&#7863;c không
góp ph&#7847;n t&#7841;o ra doanh thu, thu nh&#7853;p cho ho&#7841;t
&#273;&#7897;ng s&#7843;n xu&#7845;t, kinh doanh c&#7911;a ng&#432;&#7901;i
n&#7897;p thu&#7871; không &#273;&#432;&#7907;c tính vào chi phí
&#273;&#432;&#7907;c tr&#7915; khi xác &#273;&#7883;nh thu nh&#7853;p
ch&#7883;u thu&#7871; thu nh&#7853;p doanh nghi&#7879;p trong k&#7923;, bao
g&#7891;m:</span></span></p>

<p class=Vnbnnidung0 style='margin-bottom:6.0pt;text-align:justify;text-indent:
36.0pt;line-height:normal;tab-stops:45.5pt;layout-grid-mode:char;t không th&#7921;c hi&#7879;n b&#7845;t k&#7923; ho&#7841;t
&#273;&#7897;ng s&#7843;n xu&#7845;t, kinh doanh nào liên quan &#273;&#7871;n
ngành ngh&#7873;, ho&#7841;t &#273;&#7897;ng s&#7843;n xu&#7845;t, kinh doanh
c&#7911;a ng&#432;&#7901;i n&#7897;p thu&#7871;; không có quy&#7873;n
l&#7907;i, trách nhi&#7879;m liên quan &#273;&#7889;i v&#7899;i tài s&#7843;n,
hàng hóa, d&#7883;ch v&#7909; cung c&#7845;p cho ng&#432;&#7901;i n&#7897;p
thu&#7871;;</span></span></p>

<p class=Vnbnnidung0 style='margin-bottom:6.0pt;text-align:justify;text-indent:
36.0pt;line-height:normal;tab-stops:46.25pt;layout-grid-mode:char;t có ho&#7841;t &#273;&#7897;ng
s&#7843;n xu&#7845;t, kinh doanh nh&#432;ng quy mô tài s&#7843;n, s&#7889;
l&#432;&#7907;ng nhân viên và ch&#7913;c n&#259;ng s&#7843;n xu&#7845;t, kinh
doanh không t&#432;&#417;ng x&#7913;ng v&#7899;i giá tr&#7883; giao d&#7883;ch
mà bên liên k&#7871;t nh&#7853;n &#273;&#432;&#7907;c t&#7915; ng&#432;&#7901;i
n&#7897;p thu&#7871;;</span></span></p>

<p class=Vnbnnidung0 style='margin-bottom:6.0pt;text-align:justify;text-indent:
36.0pt;line-height:normal;tab-stops:46.6pt;layout-grid-mode:char;t là &#273;&#7889;i
t&#432;&#7907;ng c&#432; trú c&#7911;a m&#7897;t n&#432;&#7899;c ho&#7863;c
vùng l\u0103nh th&#7893; không thu thu&#7871; thu nh&#7853;p doanh nghi&#7879;p,
không góp ph&#7847;n t&#7841;o ra doanh thu, giá tr&#7883; gia t&#259;ng cho
ho&#7841;t &#273;&#7897;ng s&#7843;n xu&#7845;t, kinh doanh c&#7911;a
ng&#432;&#7901;i n&#7897;p thu&#7871;.</span></span></p>

<p class=Vnbnnidung0 style='margin-bottom:6.0pt;text-align:justify;text-indent:
36.0pt;line-height:normal;tab-stops:45.0pt;layout-grid-mode:char;background:white;background:white;ch v&#7909; gi&#7919;a các bên liên k&#7871;t:</span></span></p>

<p class=Vnbnnidung0 style='margin-bottom:6.0pt;text-align:justify;text-indent:
36.0pt;line-height:normal;tab-stops:45.9pt;layout-grid-mode:char; các kho&#7843;n chi quy &#273;&#7883;nh t&#7841;i
&#273;i&#7875;m b kho&#7843;n này, ng&#432;&#7901;i n&#7897;p thu&#7871;
&#273;&#432;&#7907;c tr&#7915; các kho&#7843;n chi phí d&#7883;ch v&#7909; vào
chi phí tính thu&#7871; trong k&#7923; n&#7871;u &#273;áp &#7913;ng
&#273;&#7911; các &#273;i&#7873;u ki&#7879;n nh&#432; sau: D&#7883;ch v&#7909;
&#273;&#432;&#7907;c cung c&#7845;p có giá tr&#7883; th&#432;&#417;ng
m&#7841;i, tài chính, kinh t&#7871; và ph&#7909;c v&#7909; tr&#7921;c
ti&#7871;p cho ho&#7841;t &#273;&#7897;ng s&#7843;n xu&#7845;t kinh doanh
c&#7911;a ng&#432;&#7901;i n&#7897;p thu&#7871;; d&#7883;ch v&#7909; t&#7915;
các bên liên k&#7871;t &#273;&#432;&#7907;c xác &#273;&#7883;nh &#273;\u0103 cung
c&#7845;p trong &#273;i&#7873;u ki&#7879;n hoàn c&#7843;nh t&#432;&#417;ng
t&#7921; các bên &#273;&#7897;c l&#7853;p chi tr&#7843; cho các d&#7883;ch
v&#7909; này; phí d&#7883;ch v&#7909; &#273;&#432;&#7907;c thanh toán trên
c&#417; s&#7903; nguyên t&#7855;c giao d&#7883;ch &#273;&#7897;c l&#7853;p và
ph&#432;&#417;ng pháp tính giá giao d&#7883;ch liên k&#7871;t ho&#7863;c phân
b&#7893; m&#7913;c phí d&#7883;ch v&#7909; gi&#7919;a các bên liên k&#7871;t
ph&#7843;i &#273;&#432;&#7907;c áp d&#7909;ng th&#7889;ng nh&#7845;t trong toàn
t&#7853;p &#273;oàn &#273;&#7889;i v&#7899;i lo&#7841;i h\u0301nh d&#7883;ch
v&#7909; t&#432;&#417;ng t&#7921; và ng&#432;&#7901;i n&#7897;p thu&#7871;
ph&#7843;i cung c&#7845;p h&#7907;p &#273;&#7891;ng, ch&#7913;ng t&#7915;, hoá
&#273;&#417;n và thông tin v&#7873; ph&#432;&#417;ng pháp tính, y&#7871;u
t&#7889; phân b&#7893; và chính sách giá c&#7911;a t&#7853;p &#273;oàn
&#273;&#7889;i v&#7899;i d&#7883;ch v&#7909; &#273;&#432;&#7907;c cung
c&#7845;p.</span></span></p>

<p class=Vnbnnidung0 style='margin-bottom:6.0pt;text-align:justify;text-indent:
36.0pt;line-height:normal;layout-grid-mode:char;&#7901;ng h&#7907;p liên quan &#273;&#7871;n các trung tâm
th&#7921;c hi&#7879;n ch&#7913;c n&#259;ng chuyên môn hoá và h&#7907;p
l&#7921;c t&#7841;o giá tr&#7883; t&#259;ng thêm c&#7911;a t&#7853;p &#273;oàn,
ng&#432;&#7901;i n&#7897;p thu&#7871; ph&#7843;i xác &#273;&#7883;nh t&#7893;ng
giá tr&#7883; t&#7841;o ra t&#7915; các ch&#7913;c n&#259;ng này, xác
&#273;&#7883;nh m&#7913;c phân b&#7893; l&#7907;i nhu&#7853;n phù h&#7907;p
v&#7899;i giá tr&#7883; &#273;óng góp c&#7911;a các bên liên k&#7871;t sau khi
&#273;\u0103 tr&#7915; (-) m&#7913;c phí d&#7883;ch v&#7909; t&#432;&#417;ng
&#7913;ng cho bên liên k&#7871;t th&#7921;c hi&#7879;n ch&#7913;c n&#259;ng
&#273;i&#7873;u ph&#7889;i, cung c&#7845;p d&#7883;ch v&#7909; c&#7911;a giao
d&#7883;ch &#273;&#7897;c l&#7853;p có tính ch&#7845;t t&#432;&#417;ng
&#273;&#7891;ng.</span></span></p>

<p class=Vnbnnidung0 style='margin-bottom:6.0pt;text-align:justify;text-indent:
36.0pt;line-height:normal;tab-stops:46.05pt;layout-grid-mode:char;ch v&#7909; không &#273;&#432;&#7907;c tr&#7915; khi xác
&#273;&#7883;nh thu nh&#7853;p ch&#7883;u thu&#7871; bao g&#7891;m: Chi phí
phát sinh t&#7915; các d&#7883;ch v&#7909; &#273;&#432;&#7907;c cung c&#7845;p
ch&#7881; nh&#7857;m m&#7909;c &#273;ích ph&#7909;c v&#7909; l&#7907;i ích
ho&#7863;c t&#7841;o giá tr&#7883; cho các bên liên k&#7871;t khác; d&#7883;ch
v&#7909; ph&#7909;c v&#7909; l&#7907;i ích c&#7893; &#273;ông c&#7911;a bên
liên k&#7871;t; d&#7883;ch v&#7909; tính phí trùng l&#7855;p do nhi&#7873;u bên
liên k&#7871;t cung c&#7845;p cho cùng m&#7897;t lo&#7841;i d&#7883;ch
v&#7909;, không xác &#273;&#7883;nh &#273;&#432;&#7907;c giá tr&#7883; gia
t&#259;ng cho ng&#432;&#7901;i n&#7897;p thu&#7871;; d&#7883;ch v&#7909;
v&#7873; b&#7843;n ch&#7845;t là các l&#7907;i ích ng&#432;&#7901;i n&#7897;p
thu&#7871; nh&#7853;n &#273;&#432;&#7907;c do là thành viên c&#7911;a m&#7897;t
t&#7853;p &#273;oàn và chi phí mà bên liên k&#7871;t c&#7897;ng thêm
&#273;&#7889;i v&#7899;i d&#7883;ch v&#7909; do bên th&#7913; ba cung c&#7845;p
thông qua trung gian bên liên k&#7871;t không &#273;óng góp thêm giá tr&#7883;
cho d&#7883;ch v&#7909;.</span></span></p>

<p class=Vnbnnidung0 style='margin-bottom:6.0pt;text-align:justify;text-indent:
36.0pt;line-height:normal;tab-stops:44.6pt;layout-grid-mode:char;background:white;background:white;
ng chi phí l\u0103i vay
&#273;&#432;&#7907;c tr&#7915; khi xác &#273;&#7883;nh thu nh&#7853;p
ch&#7883;u thu&#7871; thu nh&#7853;p doanh nghi&#7879;p &#273;&#7889;i
v&#7899;i doanh nghi&#7879;p có giao d&#7883;ch liên k&#7871;t:</span></span></p>

<p class=Vnbnnidung0 style='margin-bottom:6.0pt;text-align:justify;text-indent:
36.0pt;line-height:normal;tab-stops:46.25pt;layout-grid-mode:char;ng chi phí l\u0103i vay sau khi tr&#7915; l\u0103i ti&#7873;n g&#7917;i và
l\u0103i cho vay phát sinh trong k&#7923; c&#7911;a ng&#432;&#7901;i n&#7897;p

nh&#7853;p ch&#7883;u thu&#7871; thu nh&#7853;p doanh nghi&#7879;p không
v&#432;&#7907;t quá 30% c&#7911;a t&#7893;ng l&#7907;i nhu&#7853;n thu&#7847;n
t&#7915; ho&#7841;t &#273;&#7897;ng kinh doanh trong k&#7923; c&#7897;ng chi

trong k&#7923; c&#7897;ng chi phí kh&#7845;u hao phát sinh trong k&#7923;
c&#7911;a ng&#432;&#7901;i n&#7897;p thu&#7871;;</span></span></p>

<p class=Vnbnnidung0 style='margin-bottom:6.0pt;text-align:justify;text-indent:
36.0pt;line-height:normal;tab-stops:46.8pt;layout-grid-mode:char;n chi phí l\u0103i vay không &#273;&#432;&#7907;c tr&#7915; theo quy
&#273;&#7883;nh t&#7841;i &#273;i&#7875;m a kho&#7843;n này
&#273;&#432;&#7907;c chuy&#7875;n sang k&#7923; tính thu&#7871; ti&#7871;p theo
khi xác &#273;&#7883;nh t&#7893;ng chi phí l\u0103i vay &#273;&#432;&#7907;c
tr&#7915; trong tr&#432;&#7901;ng h&#7907;p t&#7893;ng chi phí l\u0103i vay phát
sinh &#273;&#432;&#7907;c tr&#7915; c&#7911;a k&#7923; tính thu&#7871;
ti&#7871;p theo th&#7845;p h&#417;n m&#7913;c quy &#273;&#7883;nh t&#7841;i </span></span><span
class=Vnbnnidung><span lang=VI style='font-size:14.0pt'>&#273;i&#7875;m </span></span><span
class=Vnbnnidung></p>

<p class=Vnbnnidung0 style='margin-bottom:6.0pt;text-align:justify;text-indent:
36.0pt;line-height:normal;tab-stops:46.8pt;layout-grid-mode:char;&#7883;nh t&#7841;i &#273;i&#7875;m a kho&#7843;n này không áp
d&#7909;ng v&#7899;i các kho&#7843;n vay c&#7911;a ng&#432;&#7901;i n&#7897;p
thu&#7871; là t&#7893; ch&#7913;c tín d&#7909;ng theo Lu&#7853;t Các t&#7893;
ch&#7913;c tín d&#7909;ng; t&#7893; ch&#7913;c kinh doanh b&#7843;o hi&#7875;m
theo Lu&#7853;t Kinh doanh b&#7843;o hi&#7875;m; các kho&#7843;n vay v&#7889;n
h&#7895; tr&#7907; phát tri&#7875;n chính th&#7913;c (ODA), vay &#432;u
&#273;\u0103i c&#7911;a Chính ph&#7911; th&#7921;c hi&#7879;n theo ph&#432;&#417;ng
