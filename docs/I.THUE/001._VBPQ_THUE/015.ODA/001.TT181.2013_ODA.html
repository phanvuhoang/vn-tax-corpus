 d&#7921; &aacute;n ODA vi&#7879;n tr&#7907;

 GTGT &#273;&#7889;i v&#7899;i h&agrave;ng

&#273;&#432;&#7907;c ho&agrave;n l&#7841;i s&#7889; thu&#7871; GTGT &#273;&atilde;

 th&#7847;u ch&iacute;nh, nh&agrave;

 quan h&#7843;i quan t&#7893; ch&#7913;c

ODA vi&#7879;n tr&#7907; kh&ocirc;ng ho&agrave;n l&#7841;i cho nh&agrave;

<p style='margin-top:0cm;margin-right:0cm;margin-bottom:6.0pt;margin-left:0cm;

t th&uacute;c th&#7901;i h&#7841;n thi

c&oacute;) &#273;&atilde; &#273;&#432;&#7907;c mi&#7877;n tr&#432;&#7899;c

&#273;&#7883;nh c&#7911;a ph&aacute;p lu&#7853;t v&#7873; thu&#7871; hi&#7879;n

ng &#273;&#7889;i v&#7899;i xe &ocirc;t&ocirc;

ngo&agrave;i s&#7889; xe &#273;&atilde; nh&#7853;p v&agrave;
&#273;&#432;&#7907;c ho&agrave;n l&#7841;i thu&#7871; NK, thu&#7871; TT&#272;B

t&#7909;c ho&agrave;n thu&#7871; &#273;&#432;&#7907;c th&#7921;c hi&#7879;n
theo h&#432;&#7899;ng d&#7851;n t&#7841;i Lu&#7853;t H&#7843;i quan, Lu&#7853;t
Thu&#7871; xu&#7845;t kh&#7849;u, thu&#7871; nh&#7853;p kh&#7849;u, Lu&#7853;t
thu&#7871; TT&#272;B, Lu&#7853;t Qu&#7843;n l&yacute; thu&#7871; v&agrave;

 GTGT, thu&#7871; TNDN v&agrave; c&aacute;c

 th&#7847;u ch&iacute;nh cung c&#7845;p

 th&#7847;u ph&#7909; cung c&#7845;p

kh&aacute;c theo quy &#273;&#7883;nh c&#7911;a lu&#7853;t ph&aacute;p
thu&#7871;, ph&iacute;, l&#7879; ph&iacute;.</span></p>

<p style='margin-top:0cm;margin-right:0cm;margin-bottom:6.0pt;margin-left:0cm;

 th&#7847;u ch&iacute;nh n&#432;&#7899;c
ngo&agrave;i, nh&agrave; th&#7847;u ph&#7909; n&#432;&#7899;c ngo&agrave;i

&#7901;ng h&#7907;p nh&agrave; th&#7847;u
ch&iacute;nh (kh&ocirc;ng ph&acirc;n bi&#7879;t nh&agrave; th&#7847;u

GTGT theo ph&#432;&#417;ng ph&aacute;p kh&#7845;u tr&#7915; hay

&#273;&#7891;ng v&#7899;i Ch&#7911; d&#7921; &aacute;n ODA ho&#7863;c
Nh&agrave; t&agrave;i tr&#7907; &#273;&#7875; th&#7921;c hi&#7879;n d&#7921;
&aacute;n ODA vi&#7879;n tr&#7907; kh&ocirc;ng ho&agrave;n l&#7841;i v&#7899;i
gi&aacute; kh&ocirc;ng bao g&#7891;m thu&#7871; GTGT v&agrave; d&#7921;

n&#432;&#7899;c b&#7889; tr&iacute; v&#7889;n &#273;&#7889;i &#7913;ng
&#273;&#7875; tr&#7843; thu&#7871; GTGT th&igrave; nh&agrave; th&#7847;u
ch&iacute;nh &#273;&#432;&#7907;c ho&agrave;n l&#7841;i s&#7889; thu&#7871;
GTGT &#273;&#7847;u v&agrave;o &#273;&atilde; tr&#7843; khi mua h&agrave;ng
h&oacute;a, d&#7883;ch v&#7909; &#273;&#7875; th&#7921;c hi&#7879;n h&#7907;p

8 Th&ocirc;ng t&#432; n&agrave;y. Tr&#432;&#7901;ng h&#7907;p d&#7921;

&#273;&#7875; tr&#7843; thu&#7871; GTGT th&igrave; nh&agrave; th&#7847;u
ch&iacute;nh kh&ocirc;ng &#273;&#432;&#7907;c ho&agrave;n thu&#7871; GTGT
&#273;&#7847;u v&agrave;o &#273;&atilde; tr&#7843; &#273;&#7889;i v&#7899;i
h&agrave;ng h&oacute;a, d&#7883;ch v&#7909; mua t&#7841;i Vi&#7879;t Nam
kh&ocirc;ng ph&acirc;n bi&#7879;t h&#7907;p &#273;&#7891;ng k&yacute;
gi&#7919;a ch&#7911; d&#7921; &aacute;n v&agrave; nh&agrave; th&#7847;u
ch&iacute;nh &#273;&#432;&#7907;c ph&ecirc; duy&#7879;t bao g&#7891;m
thu&#7871; GTGT hay kh&ocirc;ng bao g&#7891;m thu&#7871; GTGT. Nh&agrave;
th&#7847;u ch&iacute;nh ph&#7843;i khai, n&#7897;p thu&#7871; GTGT theo quy
&#273;&#7883;nh c&#7911;a Lu&#7853;t Thu&#7871; GTGT v&agrave; c&aacute;c
v&#259;n b&#7843;n h&#432;&#7899;ng d&#7851;n hi&#7879;n h&agrave;nh.</span></p>

<p style='margin-top:0cm;margin-right:0cm;margin-bottom:6.0pt;margin-left:0cm;

 d&#7909; 2:</span></p>

ng ty A k&yacute; h&#7907;p &#273;&#7891;ng

<p style='margin-top:0cm;margin-right:0cm;margin-bottom:6.0pt;margin-left:0cm;

&#7901;ng h&#7907;p 1: D&#7921; &aacute;n
kh&ocirc;ng &#273;&#432;&#7907;c ng&acirc;n s&aacute;ch nh&agrave;

ng ty A &#273;&#432;&#7907;c ho&agrave;n

<p style='margin-top:0cm;margin-right:0cm;margin-bottom:6.0pt;margin-left:0cm;

&#7901;ng h&#7907;p 2: D&#7921; &aacute;n
&#273;&#432;&#7907;c ng&acirc;n s&aacute;ch nh&agrave; n&#432;&#7899;c b&#7889;

&#273;&#7891;ng k&yacute; v&#7899;i Ch&#7911; d&#7921; &aacute;n. C&ocirc;ng ty
ph&#7843;i khai, n&#7897;p thu&#7871; GTGT theo quy &#273;&#7883;nh.</span></p>

<p style='margin-top:0cm;margin-right:0cm;margin-bottom:6.0pt;margin-left:0cm;
text-align:justify;text-indent:36.0pt'><span lang=VI style='font-size:14.0pt;
 th&#7847;u ch&iacute;nh ph&#7843;i h&#7841;ch
to&aacute;n ri&ecirc;ng thu&#7871; GTGT &#273;&#7847;u v&agrave;o mua
h&agrave;ng h&oacute;a, d&#7883;ch v&#7909; &#273;&#7875; th&#7921;c hi&#7879;n
h&#7907;p &#273;&#7891;ng cung c&#7845;p h&agrave;ng h&oacute;a, d&#7883;ch
v&#7909; k&yacute; v&#7899;i Ch&#7911; d&#7921; &aacute;n ho&#7863;c nh&agrave;
t&agrave;i tr&#7907; c&#7911;a d&#7921; &aacute;n ODA vi&#7879;n tr&#7907;
kh&ocirc;ng ho&agrave;n l&#7841;i. Tr&#432;&#7901;ng h&#7907;p kh&ocirc;ng
h&#7841;ch to&aacute;n ri&ecirc;ng &#273;&#432;&#7907;c thu&#7871; GTGT

<p style='margin-top:0cm;margin-right:0cm;margin-bottom:6.0pt;margin-left:0cm;
text-align:justify;text-indent:36.0pt'><span lang=VI style='font-size:14.0pt;
n &#273;&#7883;nh s&#7889; thu&#7871;
ph&#7843;i n&#7897;p trong tr&#432;&#7901;ng h&#7907;p c&aacute;c Ch&#7911;
d&#7921; &aacute;n ODA, v&#7889;n vay &#432;u &#273;&atilde;i, c&aacute;c
nh&agrave; th&#7847;u ch&iacute;nh, nh&agrave; th&#7847;u ph&#7909; kh&ocirc;ng
k&ecirc; khai &#273;&uacute;ng th&#7901;i h&#7841;n quy &#273;&#7883;nh
ho&#7863;c k&ecirc; khai kh&ocirc;ng &#273;&#7847;y &#273;&#7911;, ch&iacute;nh
x&aacute;c ho&#7863;c kh&ocirc;ng cung c&#7845;p &#273;&#7847;y &#273;&#7911;,
ch&iacute;nh x&aacute;c c&aacute;c th&ocirc;ng tin li&ecirc;n quan
&#273;&#7871;n vi&#7879;c t&iacute;nh thu&#7871;.</span></p>

<p style='margin-top:0cm;margin-right:0cm;margin-bottom:6.0pt;margin-left:0cm;
text-align:justify;text-indent:36.0pt'><span lang=VI style='font-size:14.0pt;
m tra, thanh tra t&igrave;nh h&igrave;nh
n&#7897;p thu&#7871;, quy&#7871;t to&aacute;n thu&#7871;, ho&agrave;n
thu&#7871; c&#7911;a c&aacute;c Ch&#7911; d&#7921; &aacute;n ODA, v&#7889;n vay
&#432;u &#273;&atilde;i, c&aacute;c nh&agrave; th&#7847;u ch&iacute;nh,
nh&agrave; th&#7847;u ph&#7909; theo quy &#273;&#7883;nh c&#7911;a ph&aacute;p
lu&#7853;t hi&#7879;n h&agrave;nh.</span></p>

<p style='margin-top:0cm;margin-right:0cm;margin-bottom:6.0pt;margin-left:0cm;
text-align:justify;text-indent:36.0pt'><span lang=VI style='font-size:14.0pt;
p bi&ecirc;n b&#7843;n v&agrave; x&#7917;
l&yacute; c&aacute;c vi ph&#7841;m v&#7873; thu&#7871; trong th&#7849;m
quy&#7873;n &#273;&#432;&#7907;c ph&aacute;p lu&#7853;t quy &#273;&#7883;nh.</span></p>

<p style='margin-top:0cm;margin-right:0cm;margin-bottom:6.0pt;margin-left:0cm;
text-align:justify;text-indent:36.0pt'><span lang=VI style='font-size:14.0pt;
u tr&aacute;ch nhi&#7879;m thi h&agrave;nh
ph&aacute;p lu&#7853;t v&#7873; thu&#7871;, &#273;&#7843;m b&#7843;o
t&iacute;nh trung th&#7921;c, ch&iacute;nh x&aacute;c v&agrave; kh&aacute;ch
quan.</span></p>

<p style='margin-top:0cm;margin-right:0cm;margin-bottom:6.0pt;margin-left:0cm;
text-align:justify;text-indent:36.0pt'><span lang=VI style='font-size:14.0pt;
c nh&#7853;n c&aacute;c kho&#7843;n
thu&#7871; &#273;&atilde; n&#7897;p c&#7911;a c&aacute;c Ch&#7911; d&#7921;
&aacute;n ODA, v&#7889;n vay &#432;u &#273;&atilde;i c&aacute;c nh&agrave;
th&#7847;u ch&iacute;nh, nh&agrave; th&#7847;u ph&#7909; v&agrave; ch&#7883;u

s&#7889; thu&#7871; &#273;&atilde; x&aacute;c nh&#7853;n.</span></p>

<p style='margin-top:0cm;margin-right:0cm;margin-bottom:6.0pt;margin-left:0cm;
text-align:justify;text-indent:36.0pt'><b><span lang=VI style='font-size:14.0pt;
i&#7873;u 16. Hi&#7879;u l&#7921;c thi h&agrave;nh</span></b><span

ng t&#432; n&agrave;y c&oacute; hi&#7879;u

<p style='margin-top:0cm;margin-right:0cm;margin-bottom:6.0pt;margin-left:0cm;

&#7889;i v&#7899;i c&aacute;c d&#7921; &aacute;n
ODA &#273;&#432;&#7907;c c&#7845;p c&oacute; th&#7849;m quy&#7873;n ph&ecirc;

ch&iacute;nh h&#432;&#7899;ng d&#7851;n th&#7921;c hi&#7879;n ch&iacute;nh

&#273;&#7889;i v&#7899;i c&aacute;c ch&#432;&#417;ng tr&igrave;nh, d&#7921;
&aacute;n s&#7917; d&#7909;ng ngu&#7891;n h&#7895; tr&#7907; ph&aacute;t
tri&#7875;n ch&iacute;nh th&#7913;c (ODA) cho &#273;&#7871;n khi k&#7871;t
th&uacute;c d&#7921; &aacute;n.</span></p>

<p style='margin:0cm;margin-bottom:.0001pt;text-align:justify;text-indent:36.0pt'><span
