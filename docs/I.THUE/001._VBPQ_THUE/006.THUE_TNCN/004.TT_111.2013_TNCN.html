justify;text-indent:1.0cm;line-height:normal'><span lang=NL style='mso-fareast-font-family:"Times New Roman";
c&#7845;p hàng tháng, tr&#7907; c&#7845;p m&#7897;t l&#7847;n &#273;&#7889;i v&#7899;i
các &#273;&#7889;i t&#432;&#7907;ng tham gia kháng chi&#7871;n, b&#7843;o v&#7879;
t&#7893; qu&#7889;c, làm nhi&#7879;m v&#7909; qu&#7889;c t&#7871;, thanh niên
xung phong &#273;\u0103 hoàn thành nhi&#7879;m v&#7909;.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span lang=NL style='mso-fareast-font-family:"Times New Roman";
c&#7845;p qu&#7889;c ph\u0323ng, an ninh; các kho&#7843;n tr&#7907; c&#7845;p &#273;&#7889;i
v&#7899;i l&#7921;c l&#432;&#7907;ng v&#361; trang.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span lang=NL style='mso-fareast-font-family:"Times New Roman";
c&#7845;p &#273;&#7897;c h&#7841;i, nguy hi&#7875;m &#273;&#7889;i v&#7899;i nh&#7919;ng
ngành, ngh&#7873; ho&#7863;c công vi&#7879;c &#7903; n&#417;i làm vi&#7879;c có
y&#7871;u t&#7889; &#273;&#7897;c h&#7841;i, nguy hi&#7875;m.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span lang=NL style='mso-fareast-font-family:"Times New Roman";
c&#7845;p thu hút, ph&#7909; c&#7845;p khu v&#7921;c.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span lang=NL style='mso-fareast-font-family:"Times New Roman";
c&#7845;p khó kh&#259;n &#273;&#7897;t xu&#7845;t, tr&#7907; c&#7845;p tai n&#7841;n
lao &#273;&#7897;ng, b&#7879;nh ngh&#7873; nghi&#7879;p, tr&#7907; c&#7845;p m&#7897;t
l&#7847;n khi sinh con ho&#7863;c nh&#7853;n nuôi con nuôi, m&#7913;c h&#432;&#7903;ng
ch&#7871; &#273;&#7897; thai s&#7843;n, m&#7913;c h&#432;&#7903;ng d</span><span
lang=IT style='mso-fareast-font-family:"Times New Roman";
&#7905;ng s&#7913;c, ph&#7909;c h&#7891;i s&#7913;c
kho&#7867; sau thai s&#7843;n,</span><span lang=NL style='mso-fareast-font-family:"Times New Roman";
c&#7845;p do suy gi&#7843;m kh&#7843; n&#259;ng lao &#273;&#7897;ng, tr&#7907;
c&#7845;p h&#432;u trí m&#7897;t l&#7847;n, ti&#7873;n tu&#7845;t hàng tháng,
tr&#7907; c&#7845;p thôi vi&#7879;c, tr&#7907; c&#7845;p m&#7845;t vi&#7879;c
làm, tr&#7907; c&#7845;p th&#7845;t nghi&#7879;p và các kho&#7843;n tr&#7907; c&#7845;p
khác theo quy &#273;&#7883;nh c&#7911;a B&#7897; lu&#7853;t Lao &#273;&#7897;ng
và Lu&#7853;t B&#7843;o hi&#7875;m x\u0103 h&#7897;i.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span lang=NL style='mso-fareast-font-family:"Times New Roman";
c&#7845;p &#273;&#7889;i v&#7899;i các &#273;&#7889;i t&#432;&#7907;ng
&#273;&#432;&#7907;c b&#7843;o tr&#7907; x\u0103 h&#7897;i theo quy &#273;&#7883;nh
c&#7911;a pháp lu&#7853;t.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal;text-autospace:none'><span
lang=NL style='mso-fareast-font-family:"Times New Roman";
 c&#7845;p ph&#7909;c v&#7909; &#273;&#7889;i
v&#7899;i l\u0103nh &#273;&#7841;o c&#7845;p cao.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal;text-autospace:none'><span
lang=NL style='mso-fareast-font-family:"Times New Roman";
 c&#7845;p m&#7897;t l&#7847;n &#273;&#7889;i
v&#7899;i cá nhân khi chuy&#7875;n công tác &#273;&#7871;n vùng có &#273;i&#7873;u
ki&#7879;n kinh t&#7871; x\u0103 h&#7897;i &#273;&#7863;c bi&#7879;t khó kh&#259;n,
h&#7895; tr&#7907; m&#7897;t l&#7847;n &#273;&#7889;i v&#7899;i cán b&#7897;
công ch&#7913;c làm công tác v&#7873; ch&#7911; quy&#7873;n bi&#7875;n &#273;&#7843;o
theo quy &#273;&#7883;nh c&#7911;a pháp lu&#7853;t. Tr&#7907; c&#7845;p chuy&#7875;n
vùng m&#7897;t l&#7847;n &#273;&#7889;i v&#7899;i ng&#432;&#7901;i n&#432;&#7899;c
ngoài &#273;&#7871;n c&#432; trú t&#7841;i Vi&#7879;t Nam, ng&#432;&#7901;i Vi&#7879;t
Nam &#273;i làm vi&#7879;c &#7903; n&#432;&#7899;c ngoài.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal;text-autospace:none'><span
lang=NL style='mso-fareast-font-family:"Times New Roman";
 c&#7845;p &#273;&#7889;i v&#7899;i nhân
viên y t&#7871; thôn, b&#7843;n.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal;text-autospace:none'><span
lang=NL style='mso-fareast-font-family:"Times New Roman";
 c&#7845;p &#273;&#7863;c thù ngành ngh&#7873;.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span lang=NL style='mso-fareast-font-family:"Times New Roman";n
ph&#7909; c&#7845;p, tr&#7907; c&#7845;p và m&#7913;c ph&#7909; c&#7845;p, tr&#7907;
c&#7845;p không tính vào thu nh&#7853;p ch&#7883;u thu&#7871; h&#432;&#7899;ng
d&#7851;n t&#7841;i &#273;i&#7875;m b, kho&#7843;n 2, &#272;i&#7873;u này ph&#7843;i
&#273;&#432;&#7907;c c&#417; quan Nhà n&#432;&#7899;c có th&#7849;m quy&#7873;n
quy &#273;&#7883;nh. </span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal;text-autospace:none'><span
lang=NL style='mso-fareast-font-family:"Times New Roman";
&#7901;ng h&#7907;p các v&#259;n b&#7843;n
h&#432;&#7899;ng d&#7851;n v&#7873; các kho&#7843;n ph&#7909; c&#7845;p, tr&#7907;
c&#7845;p, m&#7913;c ph&#7909; c&#7845;p, tr&#7907; c&#7845;p áp d&#7909;ng
&#273;&#7889;i v&#7899;i khu v&#7921;c Nhà n&#432;&#7899;c th\u0301 các thành ph&#7847;n
kinh t&#7871; khác, các c&#417; s&#7903; kinh doanh khác &#273;&#432;&#7907;c
c&#259;n c&#7913; vào danh m&#7909;c và m&#7913;c ph&#7909; c&#7845;p, tr&#7907;
c&#7845;p h&#432;&#7899;ng d&#7851;n &#273;&#7889;i v&#7899;i khu v&#7921;c Nhà
n&#432;&#7899;c &#273;&#7875; tính TR&#7914;. </span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal;text-autospace:none'><span
lang=NL style='mso-fareast-font-family:"Times New Roman";
&#7901;ng h&#7907;p kho&#7843;n ph&#7909; c&#7845;p,
tr&#7907; c&#7845;p nh&#7853;n &#273;&#432;&#7907;c cao h&#417;n m&#7913;c ph&#7909;
c&#7845;p, tr&#7907; c&#7845;p theo h&#432;&#7899;ng d&#7851;n nêu trên th\u0301 ph&#7847;n
v&#432;&#7907;t ph&#7843;i tính vào thu nh&#7853;p ch&#7883;u thu&#7871;.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span lang=NL style='mso-fareast-font-family:"Times New Roman";
c&#7845;p chuy&#7875;n vùng m&#7897;t l&#7847;n &#273;&#7889;i v&#7899;i
ng&#432;&#7901;i n&#432;&#7899;c ngoài &#273;&#7871;n c&#432; trú t&#7841;i Vi&#7879;t
Nam, ng&#432;&#7901;i Vi&#7879;t Nam &#273;i làm vi&#7879;c &#7903; n&#432;&#7899;c
ngoài &#273;&#432;&#7907;c TR&#7914; theo m&#7913;c ghi t&#7841;i H&#7907;p
&#273;&#7891;ng lao &#273;&#7897;ng ho&#7863;c th&#7887;a &#432;&#7899;c lao
&#273;&#7897;ng t&#7853;p th&#7875;.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span lang=NL style='mso-fareast-font-family:"Times New Roman";n
thù lao nh&#7853;n &#273;&#432;&#7907;c d&#432;&#7899;i các h\u0301nh th&#7913;c
nh&#432;: ti&#7873;n hoa h&#7891;ng &#273;&#7841;i l\u01b0 bán hàng hóa, ti&#7873;n
hoa h&#7891;ng môi gi&#7899;i; ti&#7873;n tham gia các &#273;&#7873; tài nghiên
c&#7913;u khoa h&#7885;c, k&#7929; thu&#7853;t; ti&#7873;n tham gia các d&#7921;
án, &#273;&#7873; án; ti&#7873;n nhu&#7853;n bút theo quy &#273;&#7883;nh c&#7911;a
pháp lu&#7853;t v&#7873; ch&#7871; &#273;&#7897; nhu&#7853;n bút; ti&#7873;n
tham gia các ho&#7841;t &#273;&#7897;ng gi&#7843;ng d&#7841;y; ti&#7873;n tham
gia bi&#7875;u di&#7877;n v&#259;n hoá, ngh&#7879; thu&#7853;t, th&#7875; d&#7909;c,
th&#7875; thao; ti&#7873;n d&#7883;ch v&#7909; qu&#7843;ng cáo; ti&#7873;n d&#7883;ch
v&#7909; khác, thù lao khác. </span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span lang=NL style='mso-fareast-font-family:"Times New Roman";n
nh&#7853;n &#273;&#432;&#7907;c t&#7915; tham gia hi&#7879;p h&#7897;i kinh
doanh, h&#7897;i &#273;&#7891;ng qu&#7843;n tr&#7883; doanh nghi&#7879;p, ban
ki&#7875;m soát doanh nghi&#7879;p, ban qu&#7843;n l\u01b0 d&#7921; án, h&#7897;i
&#273;&#7891;ng qu&#7843;n l\u01b0, các hi&#7879;p h&#7897;i, h&#7897;i ngh&#7873;
nghi&#7879;p và các t&#7893; ch&#7913;c khác. </span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span lang=NL style='mso-fareast-font-family:"Times New Roman";)
Các kho&#7843;n l&#7907;i ích b&#7857;ng ti&#7873;n ho&#7863;c không b&#7857;ng
ti&#7873;n ngoài ti&#7873;n l&#432;&#417;ng, ti&#7873;n công do ng&#432;&#7901;i
s&#7917; d&#7909;ng lao &#273;&#7897;ng tr&#7843; mà ng&#432;&#7901;i n&#7897;p
thu&#7871; &#273;&#432;&#7907;c h&#432;&#7903;ng d&#432;&#7899;i m&#7885;i h\u0301nh
th&#7913;c:</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span lang=NL style='mso-fareast-font-family:"Times New Roman";.1)
Ti&#7873;n nhà &#7903;, &#273;i&#7879;n, n&#432;&#7899;c và các d&#7883;ch v&#7909;
kèm theo (n&#7871;u có).</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal;text-autospace:none'><span
lang=NL style='mso-fareast-font-family:"Times New Roman";
&#7901;ng h&#7907;p cá nhân &#7903; t&#7841;i tr&#7909;
s&#7903; làm vi&#7879;c th\u0301 thu nh&#7853;p ch&#7883;u thu&#7871; c&#259;n c&#7913;
vào ti&#7873;n thuê nhà ho&#7863;c chi phí kh&#7845;u hao, ti&#7873;n &#273;i&#7879;n,
n&#432;&#7899;c và các d&#7883;ch v&#7909; khác tính theo t&#7927; l&#7879; gi&#7919;a
di&#7879;n tích cá nhân s&#7917; d&#7909;ng v&#7899;i di&#7879;n tích tr&#7909;
s&#7903; làm vi&#7879;c.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span lang=NL style='mso-fareast-font-family:"Times New Roman";n
ti&#7873;n thuê nhà do &#273;&#417;n v&#7883; s&#7917; d&#7909;ng lao &#273;&#7897;ng
tr&#7843; h&#7897; tính vào thu nh&#7853;p ch&#7883;u thu&#7871; theo s&#7889;
th&#7921;c t&#7871; tr&#7843; h&#7897; nh&#432;ng không v&#432;&#7907;t quá 15%
t&#7893;ng thu nh&#7853;p ch&#7883;u thu&#7871; (ch&#432;a bao g&#7891;m ti&#7873;n
thuê nhà) t&#7841;i &#273;&#417;n v&#7883;.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span lang=NL style='mso-fareast-font-family:"Times New Roman";.2)
Kho&#7843;n ti&#7873;n phí mua b&#7843;o hi&#7875;m nhân th&#7885;, b&#7843;o
hi&#7875;m không b&#7855;t bu&#7897;c khác, ti&#7873;n &#273;óng góp qu&#7929;
h&#432;u trí t&#7921; nguy&#7879;n do ng&#432;&#7901;i s&#7917; d&#7909;ng lao
&#273;&#7897;ng mua ho&#7863;c &#273;óng góp cho ng&#432;&#7901;i lao &#273;&#7897;ng
&#273;&#7889;i v&#7899;i nh&#7919;ng s&#7843;n ph&#7849;m b&#7843;o hi&#7875;m
có tích l&#361;y v&#7873; phí b&#7843;o hi&#7875;m.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span lang=NL style='mso-fareast-font-family:"Times New Roman";.3)
Phí h&#7897;i viên và các kho&#7843;n chi d&#7883;ch v&#7909; khác ph&#7909;c v&#7909;
cho cá nhân theo yêu c&#7847;u nh&#432;: ch&#259;m sóc s&#7913;c kho&#7867;,
vui ch&#417;i, th&#7875; thao, gi&#7843;i trí, th&#7849;m m&#7929;, c&#7909; th&#7875;
nh&#432; sau:</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span lang=NL style='mso-fareast-font-family:"Times New Roman";.3.1)
Kho&#7843;n phí h&#7897;i viên (nh&#432; th&#7867; h&#7897;i viên sân gôn, sân
qu&#7847;n v&#7907;t, th&#7867; sinh ho&#7841;t câu l&#7841;c b&#7897; v&#259;n
hoá ngh&#7879; thu&#7853;t, th&#7875; d&#7909;c th&#7875; thao...) n&#7871;u th&#7867;
có ghi &#273;ích danh cá nhân ho&#7863;c nhóm cá nhân s&#7917; d&#7909;ng.
Tr&#432;&#7901;ng h&#7907;p th&#7867; &#273;&#432;&#7907;c s&#7917; d&#7909;ng
chung, không ghi tên cá nhân ho&#7863;c nhóm cá nhân s&#7917; d&#7909;ng th\u0301
không tính vào thu nh&#7853;p ch&#7883;u thu&#7871;.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span lang=NL style='mso-fareast-font-family:"Times New Roman";.3.2)</span><span
style='mso-fareast-font-family:"Times New Roman"'> K</span><span
lang=NL style='mso-fareast-font-family:"Times New Roman";
n chi d&#7883;ch v&#7909; khác ph&#7909;c v&#7909;
cho cá nhân trong ho&#7841;t &#273;&#7897;ng ch&#259;m sóc s&#7913;c kho&#7867;,
vui ch&#417;i, gi&#7843;i trí th&#7849;m m&#7929;... n&#7871;u n&#7897;i dung
chi tr&#7843; ghi r\u01a1 tên cá nhân &#273;&#432;&#7907;c h&#432;&#7903;ng.
Tr&#432;&#7901;ng h&#7907;p n&#7897;i dung chi tr&#7843; phí d&#7883;ch v&#7909;
không ghi tên cá nhân &#273;&#432;&#7907;c h&#432;&#7903;ng mà chi chung cho t&#7853;p
th&#7875; ng&#432;&#7901;i lao &#273;&#7897;ng th\u0301 không tính vào thu nh&#7853;p
ch&#7883;u thu&#7871;.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span lang=NL style='mso-fareast-font-family:"Times New Roman";.4)
Ph&#7847;n khoán chi v&#259;n ph\u0323ng ph&#7849;m, công tác phí, &#273;i&#7879;n
tho&#7841;i, trang ph&#7909;c,... cao h&#417;n m&#7913;c quy &#273;&#7883;nh hi&#7879;n
hành c&#7911;a Nhà n&#432;&#7899;c. M&#7913;c khoán chi không tính vào thu nh&#7853;p
ch&#7883;u thu&#7871; &#273;&#7889;i v&#7899;i m&#7897;t s&#7889; tr&#432;&#7901;ng
h&#7907;p nh&#432; sau: </span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span lang=NL style='mso-fareast-font-family:"Times New Roman";.4.1)
&#272;&#7889;i v&#7899;i cán b&#7897;, công ch&#7913;c và ng&#432;&#7901;i làm
vi&#7879;c trong các c&#417; quan hành chính s&#7921; nghi&#7879;p, &#272;&#7843;ng,
&#273;oàn th&#7875;, H&#7897;i, Hi&#7879;p h&#7897;i: m&#7913;c khoán chi áp d&#7909;ng
theo v&#259;n b&#7843;n h&#432;&#7899;ng d&#7851;n c&#7911;a B&#7897; Tài
chính.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span lang=NL style='mso-fareast-font-family:"Times New Roman";.4.2)
&#272;&#7889;i v&#7899;i ng&#432;&#7901;i lao &#273;&#7897;ng làm vi&#7879;c
trong các t&#7893; ch&#7913;c kinh doanh, các v&#259;n ph\u0323ng &#273;&#7841;i di&#7879;n:
m&#7913;c khoán chi áp d&#7909;ng phù h&#7907;p v&#7899;i m&#7913;c xác &#273;&#7883;nh
thu nh&#7853;p ch&#7883;u thu&#7871; thu nh&#7853;p doanh nghi&#7879;p theo các
v&#259;n b&#7843;n h&#432;&#7899;ng d&#7851;n thi hành Lu&#7853;t thu&#7871;
thu nh&#7853;p doanh nghi&#7879;p.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span lang=NL style='mso-fareast-font-family:"Times New Roman";.4.3)
</span><span lang=FR style='"Times New Roman";&#7889;i v&#7899;i ng&#432;&#7901;i
lao &#273;&#7897;ng làm vi&#7879;c trong các t&#7893; ch&#7913;c qu&#7889;c t&#7871;,
các v&#259;n ph\u0323ng &#273;&#7841;i di&#7879;n c&#7911;a t&#7893; ch&#7913;c
n&#432;&#7899;c ngoài: m&#7913;c khoán chi th&#7921;c hi&#7879;n theo quy
&#273;&#7883;nh c&#7911;a T&#7893; ch&#7913;c qu&#7889;c t&#7871;, v&#259;n
ph\u0323ng &#273;&#7841;i di&#7879;n c&#7911;a t&#7893; ch&#7913;c n&#432;&#7899;c
ngoài.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span lang=NL style='mso-fareast-font-family:"Times New Roman";.5)
&#272;&#7889;i v&#7899;i kho&#7843;n chi v&#7873; ph&#432;&#417;ng ti&#7879;n
ph&#7909;c v&#7909; &#273;&#432;a &#273;ón t&#7853;p th&#7875; ng&#432;&#7901;i
lao &#273;&#7897;ng t&#7915; n&#417;i &#7903; &#273;&#7871;n n&#417;i làm vi&#7879;c
và ng&#432;&#7907;c l&#7841;i th\u0301 không tính vào thu nh&#7853;p ch&#7883;u thu&#7871;
c&#7911;a ng&#432;&#7901;i lao &#273;&#7897;ng; tr&#432;&#7901;ng h&#7907;p ch&#7881;
&#273;&#432;a &#273;ón riêng t&#7915;ng cá nhân th\u0301 ph&#7843;i tính vào thu nh&#7853;p
ch&#7883;u thu&#7871; c&#7911;a cá nhân &#273;&#432;&#7907;c &#273;&#432;a
&#273;ón.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span lang=NL style='mso-fareast-font-family:"Times New Roman";.6)
&#272;&#7889;i v&#7899;i kho&#7843;n chi tr&#7843; h&#7897; ti&#7873;n &#273;ào
t&#7841;o nâng cao tr\u0301nh &#273;&#7897;, tay ngh&#7873; cho ng&#432;&#7901;i lao
&#273;&#7897;ng phù h&#7907;p v&#7899;i công vi&#7879;c chuyên môn, nghi&#7879;p
v&#7909; c&#7911;a ng&#432;&#7901;i lao &#273;&#7897;ng ho&#7863;c theo k&#7871;
ho&#7841;ch c&#7911;a &#273;&#417;n v&#7883; s&#7917; d&#7909;ng lao &#273;&#7897;ng
th\u0301 không tính vào thu nh&#7853;p c&#7911;a ng&#432;&#7901;i lao &#273;&#7897;ng.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span lang=NL style='mso-fareast-font-family:"Times New Roman";.7)
Các kho&#7843;n l&#7907;i ích khác.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal;text-autospace:none'><span
lang=NL style='mso-fareast-font-family:"Times New Roman";
n l&#7907;i ích khác mà ng&#432;&#7901;i s&#7917;
d&#7909;ng lao &#273;&#7897;ng chi cho ng&#432;&#7901;i lao &#273;&#7897;ng
nh&#432;: chi trong các ngày ngh&#7881;, l&#7877;; thuê các d&#7883;ch v&#7909;
t&#432; v&#7845;n, thuê khai thu&#7871; cho &#273;ích danh m&#7897;t ho&#7863;c
m&#7897;t nhóm cá nhân; chi cho ng&#432;&#7901;i giúp vi&#7879;c gia &#273;\u0301nh
nh&#432; lái xe, ng&#432;&#7901;i n&#7845;u &#259;n, ng&#432;&#7901;i làm các
công vi&#7879;c khác trong gia &#273;\u0301nh theo h&#7907;p &#273;&#7891;ng... </span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span lang=NL style='mso-fareast-font-family:"Times New Roman";n th&#432;&#7903;ng b&#7857;ng ti&#7873;n ho&#7863;c không b&#7857;ng
ti&#7873;n d&#432;&#7899;i m&#7885;i h\u0301nh th&#7913;c, k&#7875; c&#7843;
th&#432;&#7903;ng b&#7857;ng ch&#7913;ng khoán, TR&#7914; các kho&#7843;n ti&#7873;n
th&#432;&#7903;ng sau &#273;ây:</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span lang=NL style='mso-fareast-font-family:"Times New Roman";n
th&#432;&#7903;ng kèm theo các danh hi&#7879;u &#273;&#432;&#7907;c Nhà n&#432;&#7899;c
phong t&#7863;ng, bao g&#7891;m c&#7843; ti&#7873;n th&#432;&#7903;ng kèm theo
các danh hi&#7879;u thi &#273;ua, các h\u0301nh th&#7913;c khen th&#432;&#7903;ng
theo quy &#273;&#7883;nh c&#7911;a pháp lu&#7853;t v&#7873; thi &#273;ua, khen
th&#432;&#7903;ng, c&#7909; th&#7875;:</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal;text-autospace:none'><span
lang=NL style='mso-fareast-font-family:"Times New Roman";
n th&#432;&#7903;ng kèm theo các danh hi&#7879;u
thi &#273;ua nh&#432; Chi&#7871;n s&#297; thi &#273;ua toàn qu&#7889;c; Chi&#7871;n
s&#297; thi &#273;ua c&#7845;p B&#7897;, ngành, &#273;oàn th&#7875; Trung
&#432;&#417;ng, t&#7881;nh, thành ph&#7889; tr&#7921;c thu&#7897;c Trung
&#432;&#417;ng; Chi&#7871;n s&#297; thi &#273;ua c&#417; s&#7903;, Lao &#273;&#7897;ng
tiên ti&#7871;n, Chi&#7871;n s&#7929; tiên ti&#7871;n.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal;text-autospace:none'><span
lang=NL style='mso-fareast-font-family:"Times New Roman";
n th&#432;&#7903;ng kèm theo các h\u0301nh th&#7913;c
khen th&#432;&#7903;ng.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal;text-autospace:none'><span
lang=NL style='mso-fareast-font-family:"Times New Roman";
n th&#432;&#7903;ng kèm theo các danh hi&#7879;u
do Nhà n&#432;&#7899;c phong t&#7863;ng. </span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal;text-autospace:none'><span
lang=NL style='mso-fareast-font-family:"Times New Roman";
n th&#432;&#7903;ng kèm theo các gi&#7843;i
th&#432;&#7903;ng do các H&#7897;i, t&#7893; ch&#7913;c thu&#7897;c các T&#7893;
ch&#7913;c chính tr&#7883;, T&#7893; ch&#7913;c chính tr&#7883; - x\u0103 h&#7897;i,
T&#7893; ch&#7913;c x\u0103 h&#7897;i, T&#7893; ch&#7913;c x\u0103 h&#7897;i - ngh&#7873;
nghi&#7879;p c&#7911;a Trung &#432;&#417;ng và &#273;&#7883;a ph&#432;&#417;ng
trao t&#7863;ng phù h&#7907;p v&#7899;i &#273;i&#7873;u l&#7879; c&#7911;a t&#7893;
ch&#7913;c &#273;ó và phù h&#7907;p v&#7899;i quy &#273;&#7883;nh c&#7911;a Lu&#7853;t
Thi &#273;ua, Khen th&#432;&#7903;ng.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal;text-autospace:none'><span
lang=NL style='mso-fareast-font-family:"Times New Roman";
n th&#432;&#7903;ng kèm theo gi&#7843;i
th&#432;&#7903;ng H&#7891; Chí Minh, gi&#7843;i th&#432;&#7903;ng Nhà n&#432;&#7899;c.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal;text-autospace:none'><span
lang=NL style='mso-fareast-font-family:"Times New Roman";
n th&#432;&#7903;ng kèm theo K&#7927; ni&#7879;m
ch&#432;&#417;ng, Huy hi&#7879;u.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal;text-autospace:none'><span
lang=NL style='mso-fareast-font-family:"Times New Roman";
n th&#432;&#7903;ng kèm theo B&#7857;ng
khen, Gi&#7845;y khen.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal;text-autospace:none'><span
lang=NL style='mso-fareast-font-family:"Times New Roman";
m quy&#7873;n ra quy&#7871;t &#273;&#7883;nh
khen th&#432;&#7903;ng, m&#7913;c ti&#7873;n th&#432;&#7903;ng kèm theo các
danh hi&#7879;u thi &#273;ua, h\u0301nh th&#7913;c khen th&#432;&#7903;ng nêu trên
ph&#7843;i phù h&#7907;p v&#7899;i quy &#273;&#7883;nh c&#7911;a Lu&#7853;t Thi
&#273;ua khen th&#432;&#7903;ng. </span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span lang=NL style='mso-fareast-font-family:"Times New Roman";n
th&#432;&#7903;ng kèm theo gi&#7843;i th&#432;&#7903;ng qu&#7889;c gia, gi&#7843;i
th&#432;&#7903;ng qu&#7889;c t&#7871; &#273;&#432;&#7907;c Nhà n&#432;&#7899;c
Vi&#7879;t Nam th&#7915;a nh&#7853;n.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span lang=NL style='mso-fareast-font-family:"Times New Roman";n
th&#432;&#7903;ng v&#7873; c&#7843;i ti&#7871;n k&#7929; thu&#7853;t, sáng ch&#7871;,
phát minh &#273;&#432;&#7907;c c&#417; quan Nhà n&#432;&#7899;c có th&#7849;m
quy&#7873;n công nh&#7853;n.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span lang=NL style='mso-fareast-font-family:"Times New Roman";n
th&#432;&#7903;ng v&#7873; vi&#7879;c phát hi&#7879;n, khai báo hành vi vi ph&#7841;m
pháp lu&#7853;t v&#7899;i c&#417; quan Nhà n&#432;&#7899;c có th&#7849;m quy&#7873;n.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span lang=NL style='mso-fareast-font-family:"Times New Roman";p ch&#7883;u thu&#7871; &#273;&#7889;i v&#7899;i các kho&#7843;n
sau:</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span lang=NL style='mso-fareast-font-family:"Times New Roman";n
h&#7895; tr&#7907; c&#7911;a ng&#432;&#7901;i s&#7917; d&#7909;ng lao &#273;&#7897;ng
cho vi&#7879;c khám ch&#7919;a b&#7879;nh hi&#7875;m nghèo cho b&#7843;n thân
ng&#432;&#7901;i lao &#273;&#7897;ng và thân nhân c&#7911;a ng&#432;&#7901;i
lao &#273;&#7897;ng.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='mso-fareast-font-family:"Times New Roman"'>g.1.1) Thân nhân c&#7911;a
ng&#432;&#7901;i lao &#273;&#7897;ng trong tr&#432;&#7901;ng h&#7907;p này bao
g&#7891;m: </span><span lang=NL style='"Times New Roman";mso-fareast-font-family:"Times New Roman"'>on</span><span lang=PT-BR
style='mso-fareast-font-family:"Times New Roman";
&#7867;, con nuôi h&#7907;p pháp, con ngoài giá
thú, con riêng c&#7911;a v&#7907; ho&#7863;c ch&#7891;ng; v&#7907; ho&#7863;c
ch&#7891;ng; </span><span style='"Times New Roman"'>c</span><span lang=PT-BR style='
mso-fareast-font-family:"Times New Roman";&#7867;,
m&#7865; &#273;&#7867;; cha v&#7907;, m&#7865; v&#7907; (ho&#7863;c cha ch&#7891;ng,
m&#7865; ch&#7891;ng); cha d&#432;&#7907;ng, m&#7865; k&#7871;; cha nuôi, m&#7865;
nuôi h&#7907;p pháp.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span lang=PT-BR
style='mso-fareast-font-family:"Times New Roman";
mso-fareast-font-family:"Times New Roman";c
h&#7895; tr&#7907; không tính vào thu nh&#7853;p ch&#7883;u thu&#7871; là s&#7889;
ti&#7873;n th&#7921;c t&#7871; chi tr&#7843; theo ch&#7913;ng t&#7915; tr&#7843;
ti&#7873;n vi&#7879;n phí nh&#432;ng t&#7889;i &#273;a không quá s&#7889; ti&#7873;n
tr&#7843; vi&#7879;n phí c&#7911;a ng&#432;&#7901;i lao &#273;&#7897;ng và thân
nhân ng&#432;&#7901;i lao &#273;&#7897;ng sau khi &#273;\u0103 TR&#7914; s&#7889; ti&#7873;n
chi tr&#7843; c&#7911;a t&#7893; ch&#7913;c b&#7843;o hi&#7875;m.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span lang=NL style='mso-fareast-font-family:"Times New Roman";&#7901;i s&#7917; d&#7909;ng lao &#273;&#7897;ng chi ti&#7873;n h&#7895;
tr&#7907; có trách nhi&#7879;m: l&#432;u gi&#7919; b&#7843;n sao ch&#7913;ng t&#7915;
tr&#7843; ti&#7873;n vi&#7879;n phí có xác nh&#7853;n c&#7911;a ng&#432;&#7901;i
s&#7917; d&#7909;ng lao &#273;&#7897;ng (trong tr&#432;&#7901;ng h&#7907;p
ng&#432;&#7901;i lao &#273;&#7897;ng và thân nhân ng&#432;&#7901;i lao &#273;&#7897;ng
tr&#7843; ph&#7847;n c\u0323n l&#7841;i sau khi t&#7893; ch&#7913;c b&#7843;o hi&#7875;m
tr&#7843; tr&#7921;c ti&#7871;p v&#7899;i c&#417; s&#7903; khám ch&#7919;a b&#7879;nh)
ho&#7863;c b&#7843;n sao ch&#7913;ng t&#7915; tr&#7843; vi&#7879;n phí; b&#7843;n
sao ch&#7913;ng t&#7915; chi b&#7843;o hi&#7875;m y t&#7871; có xác nh&#7853;n
c&#7911;a ng&#432;&#7901;i s&#7917; d&#7909;ng lao &#273;&#7897;ng (trong
tr&#432;&#7901;ng h&#7907;p ng&#432;&#7901;i lao &#273;&#7897;ng và thân nhân
ng&#432;&#7901;i lao &#273;&#7897;ng tr&#7843; toàn b&#7897; vi&#7879;n phí, t&#7893;
ch&#7913;c b&#7843;o hi&#7875;m tr&#7843; ti&#7873;n b&#7843;o hi&#7875;m cho
ng&#432;&#7901;i lao &#273;&#7897;ng và thân nhân ng&#432;&#7901;i lao &#273;&#7897;ng)
cùng v&#7899;i ch&#7913;ng t&#7915; chi ti&#7873;n h&#7895; tr&#7907; cho
ng&#432;&#7901;i lao &#273;&#7897;ng và thân nhân ng&#432;&#7901;i lao &#273;&#7897;ng
m&#7855;c b&#7879;nh hi&#7875;m nghèo.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='mso-fareast-font-family:"Times New Roman"'>g.2) Kho&#7843;n ti&#7873;n
nh&#7853;n &#273;&#432;&#7907;c theo quy &#273;&#7883;nh v&#7873; s&#7917; d&#7909;ng
ph&#432;&#417;ng ti&#7879;n &#273;i l&#7841;i trong c&#417; quan Nhà n&#432;&#7899;c,
&#273;&#417;n v&#7883; s&#7921; nghi&#7879;p công l&#7853;p, t&#7893; ch&#7913;c
&#272;&#7843;ng, &#273;oàn th&#7875;. </span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='mso-fareast-font-family:"Times New Roman"'>g.3) Kho&#7843;n ti&#7873;n
nh&#7853;n &#273;&#432;&#7907;c theo ch&#7871; &#273;&#7897; nhà &#7903; công v&#7909;
theo quy &#273;&#7883;nh c&#7911;a pháp lu&#7853;t. </span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='mso-fareast-font-family:"Times New Roman"'>g.4) Các kho&#7843;n nh&#7853;n
&#273;&#432;&#7907;c ngoài ti&#7873;n l&#432;&#417;ng, ti&#7873;n công do tham<b>
</b>gia<b> </b></span><span lang=SV style='
mso-fareast-font-family:"Times New Roman";n,
th&#7849;m &#273;&#7883;nh, th&#7849;m tra các v&#259;n b&#7843;n pháp lu&#7853;t,
Ngh&#7883; quy&#7871;t, các báo cáo chính tr&#7883;; tham gia các &#273;oàn ki&#7875;m
tra giám sát; ti&#7871;p c&#7917; tri, ti&#7871;p công dân; trang ph&#7909;c và
các công vi&#7879;c khác có liên quan &#273;&#7871;n ph&#7909;c v&#7909; tr&#7921;c
ti&#7871;p ho&#7841;t &#273;&#7897;ng c&#7911;a V&#259;n ph\u0323ng Qu&#7889;c h&#7897;i,
H&#7897;i &#273;&#7891;ng dân t&#7897;c và các &#7910;y ban c&#7911;a Qu&#7889;c
h&#7897;i, các &#272;oàn &#273;&#7841;i bi&#7875;u Qu&#7889;c h&#7897;i;
V&#259;n ph\u0323ng Trung &#432;&#417;ng và các Ban c&#7911;a &#272;&#7843;ng;
V&#259;n ph\u0323ng Thành &#7911;y, T&#7881;nh &#7911;y và các Ban c&#7911;a Thành u&#7927;,
T&#7881;nh &#7911;y.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='mso-fareast-font-family:"Times New Roman"'>g.5) </span><span lang=NL
style='mso-fareast-font-family:"Times New Roman";
n ti&#7873;n &#259;n gi&#7919;a ca, &#259;n
tr&#432;a do ng&#432;&#7901;i s&#7917; d&#7909;ng lao &#273;&#7897;ng t&#7893;
ch&#7913;c b&#7919;a &#259;n gi&#7919;a, &#259;n tr&#432;a ca cho ng&#432;&#7901;i
lao &#273;&#7897;ng d&#432;&#7899;i các h\u0301nh th&#7913;c nh&#432; tr&#7921;c ti&#7871;p
n&#7845;u &#259;n, mua su&#7845;t &#259;n, c&#7845;p phi&#7871;u &#259;n.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span lang=NL style='mso-fareast-font-family:"Times New Roman";&#7901;ng
h&#7907;p ng&#432;&#7901;i s&#7917; d&#7909;ng lao &#273;&#7897;ng không t&#7893;
ch&#7913;c b&#7919;a &#259;n gi&#7919;a ca, &#259;n tr&#432;a mà chi ti&#7873;n
cho ng&#432;&#7901;i lao &#273;&#7897;ng th\u0301 không tính vào thu nh&#7853;p ch&#7883;u
thu&#7871; c&#7911;a cá nhân n&#7871;u m&#7913;c chi phù h&#7907;p v&#7899;i
h&#432;&#7899;ng d&#7851;n c&#7911;a B&#7897; Lao &#273;&#7897;ng -
Th&#432;&#417;ng binh và X\u0103 h&#7897;i. Tr&#432;&#7901;ng h&#7907;p m&#7913;c
chi cao h&#417;n m&#7913;c h&#432;&#7899;ng d&#7851;n c&#7911;a B&#7897; Lao
&#273;&#7897;ng - Th&#432;&#417;ng binh và X\u0103 h&#7897;i th\u0301 ph&#7847;n chi
v&#432;&#7907;t m&#7913;c ph&#7843;i tính vào thu nh&#7853;p ch&#7883;u thu&#7871;
c&#7911;a cá nhân.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span lang=NL style='mso-fareast-font-family:"Times New Roman";c
chi c&#7909; th&#7875; áp d&#7909;ng &#273;&#7889;i v&#7899;i doanh nghi&#7879;p
Nhà n&#432;&#7899;c và các t&#7893; ch&#7913;c, &#273;&#417;n v&#7883; thu&#7897;c
c&#417; quan hành chính s&#7921; nghi&#7879;p, &#272;&#7843;ng, &#272;oàn th&#7875;,
các H&#7897;i không quá m&#7913;c h&#432;&#7899;ng d&#7851;n c&#7911;a B&#7897;
Lao &#273;&#7897;ng - Th&#432;&#417;ng binh và X\u0103 h&#7897;i. &#272;&#7889;i v&#7899;i
các doanh nghi&#7879;p ngoài Nhà n&#432;&#7899;c và các t&#7893; ch&#7913;c
khác, m&#7913;c chi do th&#7911; tr&#432;&#7903;ng &#273;&#417;n v&#7883; th&#7889;ng
nh&#7845;t v&#7899;i ch&#7911; t&#7883;ch công &#273;oàn quy&#7871;t &#273;&#7883;nh
nh&#432;ng t&#7889;i &#273;a không v&#432;&#7907;t quá m&#7913;c áp d&#7909;ng
&#273;&#7889;i v&#7899;i doanh nghi&#7879;p Nhà n&#432;&#7899;c.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='mso-fareast-font-family:"Times New Roman"'>g.6) Kho&#7843;n ti&#7873;n
mua vé máy bay kh&#7913; h&#7891;i do ng&#432;&#7901;i s&#7917; d&#7909;ng lao
&#273;&#7897;ng tr&#7843; h&#7897; (ho&#7863;c thanh toán) cho ng&#432;&#7901;i

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal;text-autospace:none'><span
lang=PT-BR style='mso-fareast-font-family:"Times New Roman";
&#7875; tính thu nh&#7853;p ch&#7883;u
thu&#7871; t&#7915; kinh doanh là toàn b&#7897; ti&#7873;n bán hàng hoá, ti&#7873;n
gia công, ti&#7873;n hoa h&#7891;ng, ti&#7873;n cung &#7913;ng hàng hoá, d&#7883;ch
v&#7909; phát sinh trong k&#7923; tính thu&#7871; bao g&#7891;m c&#7843; kho&#7843;n
tr&#7907; giá, ph&#7909; thu, ph&#7909; tr&#7897;i mà cá nhân kinh doanh
&#273;&#432;&#7907;c h&#432;&#7903;ng không phân bi&#7879;t &#273;\u0103 thu
&#273;&#432;&#7907;c ti&#7873;n hay ch&#432;a thu &#273;&#432;&#7907;c ti&#7873;n
và &#273;&#432;&#7907;c xác &#273;&#7883;nh theo s&#7893; sách k&#7871; toán.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal;text-autospace:none'><span
lang=PT-BR style='mso-fareast-font-family:"Times New Roman";
i &#273;i&#7875;m xác &#273;&#7883;nh
doanh thu &#273;&#7875; tính thu nh&#7853;p ch&#7883;u thu&#7871; nh&#432; sau:</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal;text-autospace:none'><span
lang=PT-BR style='mso-fareast-font-family:"Times New Roman";
&#7889;i v&#7899;i ho&#7841;t &#273;&#7897;ng
bán hàng hoá là th&#7901;i &#273;i&#7875;m chuy&#7875;n giao quy&#7873;n s&#7903;
h&#7919;u, quy&#7873;n s&#7917; d&#7909;ng hàng hoá ho&#7863;c th&#7901;i
&#273;i&#7875;m l&#7853;p hoá &#273;&#417;n bán hàng. </span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal;text-autospace:none'><span
lang=PT-BR style='mso-fareast-font-family:"Times New Roman";
&#7889;i v&#7899;i ho&#7841;t &#273;&#7897;ng
cung &#7913;ng d&#7883;ch v&#7909; là th&#7901;i &#273;i&#7875;m hoàn thành vi&#7879;c
cung &#7913;ng d&#7883;ch v&#7909; cho ng&#432;&#7901;i mua ho&#7863;c th&#7901;i
&#273;i&#7875;m l&#7853;p hoá &#273;&#417;n cung &#7913;ng d&#7883;ch v&#7909;.
&#272;&#7889;i v&#7899;i ho&#7841;t &#273;&#7897;ng cho thuê nhà, quy&#7873;n s&#7917;
d&#7909;ng &#273;&#7845;t, m&#7863;t n&#432;&#7899;c, tài s&#7843;n khác là th&#7901;i
&#273;i&#7875;m h&#7907;p &#273;&#7891;ng cho thuê có hi&#7879;u l&#7921;c. </span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal;text-autospace:none'><span
lang=PT-BR style='mso-fareast-font-family:"Times New Roman";
&#7901;ng h&#7907;p th&#7901;i &#273;i&#7875;m
l&#7853;p hoá &#273;&#417;n tr&#432;&#7899;c th&#7901;i &#273;i&#7875;m chuy&#7875;n
giao quy&#7873;n s&#7903; h&#7919;u hàng hoá (ho&#7863;c d&#7883;ch v&#7909;
hoàn thành) th\u0301 th&#7901;i &#273;i&#7875;m xác &#273;&#7883;nh doanh thu &#273;&#432;&#7907;c
tính theo th&#7901;i &#273;i&#7875;m l&#7853;p hoá &#273;&#417;n ho&#7863;c
ng&#432;&#7907;c l&#7841;i. </span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal;text-autospace:none'><span
lang=PT-BR style='mso-fareast-font-family:"Times New Roman";
&#7875; tính thu nh&#7853;p ch&#7883;u
thu&#7871; &#273;&#7889;i v&#7899;i m&#7897;t s&#7889; tr&#432;&#7901;ng h&#7907;p
&#273;&#432;&#7907;c xác &#273;&#7883;nh nh&#432; sau:</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal;text-autospace:none'><span
lang=PT-BR style='mso-fareast-font-family:"Times New Roman";
&#7889;i v&#7899;i hàng hoá bán theo
ph&#432;&#417;ng th&#7913;c tr&#7843; góp &#273;&#432;&#7907;c xác &#273;&#7883;nh
theo giá bán hàng hoá tr&#7843; ti&#7873;n m&#7897;t l&#7847;n, không bao g&#7891;m
ti&#7873;n l\u0103i tr&#7843; góp.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal;text-autospace:none'><span
lang=PT-BR style='mso-fareast-font-family:"Times New Roman";
&#7889;i v&#7899;i hàng hoá, d&#7883;ch
v&#7909; bán theo ph&#432;&#417;ng th&#7913;c tr&#7843; ch&#7853;m là ti&#7873;n
bán hàng hoá, d&#7883;ch v&#7909; tr&#7843; m&#7897;t l&#7847;n, không bao g&#7891;m
ti&#7873;n l\u0103i tr&#7843; ch&#7853;m. </span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal;text-autospace:none'><span
lang=PT-BR style='mso-fareast-font-family:"Times New Roman";
&#7901;ng h&#7907;p vi&#7879;c thanh toán theo
h&#7907;p &#273;&#7891;ng mua bán theo ph&#432;&#417;ng th&#7913;c tr&#7843;
góp, tr&#7843; ch&#7853;m kéo dài nhi&#7873;u k&#7923; tính thu&#7871; theo
doanh thu là s&#7889; ti&#7873;n ph&#7843;i thu c&#7911;a ng&#432;&#7901;i mua
trong k&#7923; tính thu&#7871; không bao g&#7891;m l\u0103i tr&#7843; góp, tr&#7843;
ch&#7853;m theo th&#7901;i h&#7841;n quy &#273;&#7883;nh trong h&#7907;p &#273;&#7891;ng.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal;text-autospace:none'><span
lang=PT-BR style='mso-fareast-font-family:"Times New Roman";
c xác &#273;&#7883;nh chi phí khi xác &#273;&#7883;nh
thu nh&#7853;p ch&#7883;u thu&#7871; &#273;&#7889;i v&#7899;i hàng hoá bán tr&#7843;
góp, tr&#7843; ch&#7853;m th&#7921;c hi&#7879;n theo nguyên t&#7855;c chi phí
ph&#7843;i phù h&#7907;p v&#7899;i doanh thu.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal;text-autospace:none'><span
lang=PT-BR style='mso-fareast-font-family:"Times New Roman";
&#7889;i v&#7899;i hàng hoá, d&#7883;ch
v&#7909; do cá nhân kinh doanh làm ra dùng &#273;&#7875; trao &#273;&#7893;i,
bi&#7871;u, t&#7863;ng, trang b&#7883;, th&#432;&#7903;ng cho ng&#432;&#7901;i
lao &#273;&#7897;ng, doanh thu &#273;&#432;&#7907;c xác &#273;&#7883;nh theo
giá bán hàng hoá, d&#7883;ch v&#7909; cùng lo&#7841;i ho&#7863;c
t&#432;&#417;ng &#273;&#432;&#417;ng trên th&#7883; tr&#432;&#7901;ng t&#7841;i
th&#7901;i &#273;i&#7875;m trao &#273;&#7893;i, bi&#7871;u, t&#7863;ng, trang b&#7883;,

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:

&#7889;i v&#7899;i hàng hoá, d&#7883;ch
v&#7909; do cá nhân kinh doanh làm ra t&#7921; dùng &#273;&#7875; ph&#7909;c v&#7909;

là chi phí s&#7843;n xu&#7845;t ra s&#7843;n ph&#7849;m hàng hoá, d&#7883;ch v&#7909;
&#273;ó.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal;text-autospace:none'><span
lang=PT-BR style='mso-fareast-font-family:"Times New Roman";

t&#7915; ho&#7841;t &#273;&#7897;ng gia công bao g&#7891;m c&#7843; ti&#7873;n

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:

lang=PT-BR style='mso-fareast-font-family:"Times New Roman";

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal;text-autospace:none'><span
lang=PT-BR style='mso-fareast-font-family:"Times New Roman";

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:

lang=PT-BR style='mso-fareast-font-family:"Times New Roman";

n&#259;m tr&#7843; ti&#7873;n tr&#432;&#7899;c ho&#7863;c xác &#273;&#7883;nh

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal;text-autospace:none'><span
lang=PT-BR style='mso-fareast-font-family:"Times New Roman";
&#7889;i v&#7899;i ho&#7841;t &#273;&#7897;ng
xây d&#7921;ng, l&#7855;p &#273;&#7863;t là giá tr&#7883; công tr\u0301nh, giá tr&#7883;
h&#7841;ng m&#7909;c công tr\u0301nh ho&#7863;c giá tr&#7883; kh&#7889;i l&#432;&#7907;ng
công tr\u0301nh nghi&#7879;m thu bàn giao. Tr&#432;&#7901;ng h&#7907;p xây d&#7921;ng,
l&#7855;p &#273;&#7863;t không bao th&#7847;u nguyên v&#7853;t li&#7879;u, máy
móc, thi&#7871;t b&#7883; th\u0301 doanh thu tính thu&#7871; là s&#7889; ti&#7873;n
t&#7915; ho&#7841;t &#273;&#7897;ng xây d&#7921;ng, l&#7855;p &#273;&#7863;t
không bao g&#7891;m giá tr&#7883; nguyên v&#7853;t li&#7879;u, máy móc, thi&#7871;t
b&#7883;.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal;text-autospace:none'><span
lang=PT-BR style='mso-fareast-font-family:"Times New Roman";
&#7901;ng h&#7907;p xây d&#7921;ng, l&#7855;p
&#273;&#7863;t có bao th&#7847;u nguyên v&#7853;t li&#7879;u, máy móc, thi&#7871;t

&#273;&#7897;ng xây d&#7921;ng, l&#7855;p &#273;&#7863;t bao g&#7891;m c&#7843;

p l\u01b0 &#273;&#432;&#7907;c TR&#7914; là

n l&#432;&#417;ng, ti&#7873;n

&#273;&#7891;ng lao &#273;&#7897;ng, h&#7907;p &#273;&#7891;ng d&#7883;ch v&#7909;

&#272;&#7889;i v&#7899;i nh&#7919;ng ngành kinh doanh có tính ch&#7845;t &#273;&#7863;c

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:

u, v&#7853;t li&#7879;u,

v&#7853;t li&#7879;u, nhiên li&#7879;u, hàng hoá &#273;\u0103</span><span
style='mso-fareast-font-family:"Times New Roman"'>
&#273;&#432;&#7907;c </span><span lang=VI style='

ban hành &#273;&#7883;nh m&#7913;c tiêu hao th\u0301 th&#7921;c hi&#7879;n theo
&#273;&#7883;nh m&#7913;c c&#7911;a Nhà n&#432;&#7899;c &#273;\u0103 ban hành</span><span

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:

i tr&#432;&#7901;ng h&#7907;p t&#7893;n th&#7845;t

không &#273;&#432;&#7907;c tính giá tr&#7883; t&#7893;n th&#7845;t &#273;ó vào
chi phí h&#7907;p l\u01b0 TR&#7914; tr&#432;&#7901;ng h&#7907;p t&#7893;n th&#7845;t
do thiên tai, ho&#7843; ho&#7841;n, d&#7883;ch b&#7879;nh và các tr&#432;&#7901;ng
h&#7907;p b&#7845;t kh&#7843; kháng khác không &#273;&#432;&#7907;c b&#7891;i
th&#432;&#7901;ng.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal;text-autospace:none'><span
lang=PT-BR style='mso-fareast-font-family:"Times New Roman";
&#7889;i v&#7899;i v&#7853;t t&#432; hàng hoá v&#7915;a
dùng cho tiêu dùng cá nhân, v&#7915;a dùng cho kinh doanh th\u0301 ch&#7881;
&#273;&#432;&#7907;c tính vào chi phí ph&#7847;n s&#7917; d&#7909;ng vào kinh

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal;text-autospace:none'><span
lang=PT-BR style='mso-fareast-font-family:"Times New Roman";
u hao, duy tu, b&#7843;o
d&#432;&#7905;ng tài s&#7843;n c&#7889; &#273;&#7883;nh s&#7917; d&#7909;ng cho
ho&#7841;t &#273;&#7897;ng s&#7843;n xu&#7845;t, kinh doanh hàng hoá, d&#7883;ch
v&#7909;. C&#7909; th&#7875; nh&#432; sau: </span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:

lang=PT-BR style='mso-fareast-font-family:"Times New Roman";
n c&#7889; &#273;&#7883;nh
&#273;&#432;&#7907;c trích kh&#7845;u hao tính vào chi phí h&#7907;p l\u01b0 ph&#7843;i

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:

&#273;&#7847;y &#273;&#7911; hóa &#273;&#417;n, ch&#7913;ng t&#7915; và các gi&#7845;y

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal;text-autospace:none'><span
lang=PT-BR style='mso-fareast-font-family:"Times New Roman";
n c&#7889; &#273;&#7883;nh ph&#7843;i
&#273;&#432;&#7907;c qu&#7843;n l\u01b0, theo d\u01a1i, h&#7841;ch toán trong s&#7893;
sách k&#7871; toán c&#7911;a cá nhân kinh doanh theo ch&#7871; &#273;&#7897; qu&#7843;n

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:

u hao &#273;&#7889;i v&#7899;i

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:

lang=PT-BR style='mso-fareast-font-family:"Times New Roman";
n c&#7889; &#273;&#7883;nh

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal;text-autospace:none'><span
lang=PT-BR style='mso-fareast-font-family:"Times New Roman";
&#7889;i v&#7899;i tài s&#7843;n c&#7889; &#273;&#7883;nh
v&#7915;a s&#7917; d&#7909;ng cho m&#7909;c &#273;ích kinh doanh, v&#7915;a s&#7917;
d&#7909;ng cho m&#7909;c &#273;ích khác th\u0301 chi phí kh&#7845;u hao &#273;&#432;&#7907;c

 l\u0103i các kho&#7843;n ti&#7873;n

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:

c l\u0103i su&#7845;t ti&#7873;n vay &#273;&#432;&#7907;c
tính theo l\u0103i su&#7845;t th&#7921;c t&#7871; c&#259;n c&#7913; vào h&#7907;p
&#273;&#7891;ng vay v&#7889;n c&#7911;a các t&#7893; ch&#7913;c tín d&#7909;ng</span><span
style='mso-fareast-font-family:"Times New Roman"'>,
chi nhánh ngân hàng n&#432;&#7899;c ngoài</span><span lang=VI style='mso-fareast-font-family:"Times New Roman";c

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:

 trú là ng&#432;&#7901;i n&#432;&#7899;c

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:

&#7889;i v&#7899;i ng&#432;&#7901;i n&#7897;p

(ho&#7863;c ch&#7891;ng), con và nh&#7919;ng ng&#432;&#7901;i khác thu&#7897;c

hi&#7879;n theo h&#432;&#7899;ng d&#7851;n t&#7841;i các ti&#7871;t g.1, g.2,
g.3, g.4, g.5, &#273;i&#7875;m g, kho&#7843;n 1, &#272;i&#7873;u này ho&#7863;c
ch&#7881; c&#7847;n T&#7901; khai &#273;&#259;ng k\u01b0 ng&#432;&#7901;i ph&#7909;
thu&#7897;c theo m&#7851;u </span></s><s><span lang=FR style='mso-fareast-font-family:"Times New Roman";n b&#7843;n h&#432;&#7899;ng d&#7851;n v&#7873; qu&#7843;n l\u01b0

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><s><span lang=PT-BR
style='mso-fareast-font-family:"Times New Roman";
 tr&#432;&#7903;ng &#273;&#417;n v&#7883; ch&#7881;
ch&#7883;u trách nhi&#7879;m &#273;&#7889;i v&#7899;i các n&#7897;i dung sau: h&#7885;
tên ng&#432;&#7901;i ph&#7909; thu&#7897;c, n&#259;m sinh và quan h&#7879; v&#7899;i
ng&#432;&#7901;i n&#7897;p thu&#7871;; các n&#7897;i dung khác, ng&#432;&#7901;i
n&#7897;p thu&#7871; t&#7921; khai và ch&#7883;u trách nhi&#7879;m.</span></s></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='color:red'>\u201cg) H&#7891; s&#417; ch&#7913;ng minh ng&#432;&#7901;i ph&#7909;
thu&#7897;c <span style='background:yellow;"file:///C:/EBOOK-THUE%202023/I.THUE/01.%20VBPQ%20THUE/006.THUE%20TNCN/017.%20TT%2079.2022%20sua%20TT%20111.2013%20TNCN.mht">(th<span
lang=PT-BR style='mso-fareast-font-family:"Times New Roman"; s&#7889;: 79/2022/TT-BTC ngày 30 tháng 12 n&#259;m 2022)</span></a></span></span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='color:red'>g.1) &#272;&#7889;i v&#7899;i con:</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='color:red'>g.1.1) Con d&#432;&#7899;i 18 tu&#7893;i: H&#7891; s&#417; ch&#7913;ng
minh là b&#7843;n ch&#7909;p Gi&#7845;y khai sinh và b&#7843;n ch&#7909;p Ch&#7913;ng
minh nhân dân ho&#7863;c C&#259;n c&#432;&#7899;c công dân (n&#7871;u có).</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='color:red'>g.1.2) Con t&#7915; 18 tu&#7893;i tr&#7903; lên b&#7883; khuy&#7871;t
t&#7853;t, không có kh&#7843; n&#259;ng lao &#273;&#7897;ng, h&#7891; s&#417;
ch&#7913;ng minh g&#7891;m:</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='color:red'>g.1.2.1) B&#7843;n ch&#7909;p Gi&#7845;y khai sinh và b&#7843;n
ch&#7909;p Ch&#7913;ng minh nhân dân ho&#7863;c C&#259;n c&#432;&#7899;c công
dân (n&#7871;u có).</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='color:red'>g.1.2.2) B&#7843;n ch&#7909;p Gi&#7845;y xác nh&#7853;n khuy&#7871;t
t&#7853;t theo quy &#273;&#7883;nh c&#7911;a pháp lu&#7853;t v&#7873; ng&#432;&#7901;i
khuy&#7871;t t&#7853;t.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='color:red'>g.1.3) Con &#273;ang theo h&#7885;c t&#7841;i các b&#7853;c h&#7885;c
theo h&#432;&#7899;ng d&#7851;n t&#7841;i ti&#7871;t d.1.3, &#273;i&#7875;m d,
kho&#7843;n 1, &#272;i&#7873;u này, h&#7891; s&#417; ch&#7913;ng minh g&#7891;m:</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='color:red'>g.1.3.1) B&#7843;n ch&#7909;p Gi&#7845;y khai sinh.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='color:red'>g.1.3.2) B&#7843;n ch&#7909;p Th&#7867; sinh viên ho&#7863;c
b&#7843;n khai có xác nh&#7853;n c&#7911;a nhà tr&#432;&#7901;ng ho&#7863;c gi&#7845;y
t&#7901; khác ch&#7913;ng minh &#273;ang theo h&#7885;c t&#7841;i các tr&#432;&#7901;ng
h&#7885;c &#273;&#7841;i h&#7885;c, cao &#273;&#7859;ng, trung h&#7885;c chuyên
nghi&#7879;p, trung h&#7885;c ph&#7893; thông ho&#7863;c h&#7885;c ngh&#7873;.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='color:red'>g.1.4) Tr&#432;&#7901;ng h&#7907;p là con nuôi, con ngoài giá
thú, con riêng th\u0301 ngoài các gi&#7845;y t&#7901; theo t&#7915;ng tr&#432;&#7901;ng
h&#7907;p nêu trên, h&#7891; s&#417; ch&#7913;ng minh c&#7847;n có thêm gi&#7845;y
t&#7901; khác &#273;&#7875; ch&#7913;ng minh m&#7889;i quan h&#7879; nh&#432;:
b&#7843;n ch&#7909;p quy&#7871;t &#273;&#7883;nh công nh&#7853;n vi&#7879;c
nuôi con nuôi, quy&#7871;t &#273;&#7883;nh công nh&#7853;n vi&#7879;c nh&#7853;n
cha, m&#7865;, con c&#7911;a c&#417; quan nhà n&#432;&#7899;c có th&#7849;m quy&#7873;n...</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='color:red'>g.2) &#272;&#7889;i v&#7899;i v&#7907; ho&#7863;c ch&#7891;ng,
h&#7891; s&#417; ch&#7913;ng minh g&#7891;m:</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='color:red'>- B&#7843;n ch&#7909;p Ch&#7913;ng minh nhân dân ho&#7863;c
C&#259;n c&#432;&#7899;c công dân.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='color:red'>- B&#7843;n ch&#7909;p Gi&#7845;y xác nh&#7853;n thông tin v&#7873;
c&#432; trú ho&#7863;c Thông báo s&#7889; &#273;&#7883;nh danh cá nhân và thông
tin trong C&#417; s&#7903; d&#7919; li&#7879;u qu&#7889;c gia v&#7873; dân
c&#432; ho&#7863;c gi&#7845;y t&#7901; khác do c&#417; quan C&#417; quan Công
an c&#7845;p (ch&#7913;ng minh &#273;&#432;&#7907;c m&#7889;i quan h&#7879; v&#7907;
ch&#7891;ng) ho&#7863;c B&#7843;n ch&#7909;p Gi&#7845;y ch&#7913;ng nh&#7853;n
k&#7871;t hôn.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='color:red'>Tr&#432;&#7901;ng h&#7907;p v&#7907; ho&#7863;c ch&#7891;ng
trong &#273;&#7897; tu&#7893;i lao &#273;&#7897;ng th\u0301 ngoài các gi&#7845;y t&#7901;
nêu trên h&#7891; s&#417; ch&#7913;ng minh c&#7847;n có thêm gi&#7845;y t&#7901;
khác ch&#7913;ng minh ng&#432;&#7901;i ph&#7909; thu&#7897;c không có kh&#7843;
n&#259;ng lao &#273;&#7897;ng nh&#432; b&#7843;n ch&#7909;p Gi&#7845;y xác nh&#7853;n
khuy&#7871;t t&#7853;t theo quy &#273;&#7883;nh c&#7911;a pháp lu&#7853;t v&#7873;
ng&#432;&#7901;i khuy&#7871;t t&#7853;t &#273;&#7889;i v&#7899;i ng&#432;&#7901;i
khuy&#7871;t t&#7853;t không có kh&#7843; n&#259;ng lao &#273;&#7897;ng, b&#7843;n
ch&#7909;p h&#7891; s&#417; b&#7879;nh án &#273;&#7889;i v&#7899;i ng&#432;&#7901;i
m&#7855;c b&#7879;nh không có kh&#7843; n&#259;ng lao &#273;&#7897;ng (nh&#432;
b&#7879;nh AIDS, ung th&#432;, suy th&#7853;n m\u0103n,..).</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='color:red'>g.3) &#272;&#7889;i v&#7899;i cha &#273;&#7867;, m&#7865;
&#273;&#7867;, cha v&#7907;, m&#7865; v&#7907; (ho&#7863;c cha ch&#7891;ng, m&#7865;
ch&#7891;ng), cha d&#432;&#7907;ng, m&#7865; k&#7871;, cha nuôi h&#7907;p pháp,
m&#7865; nuôi h&#7907;p pháp h&#7891; s&#417; ch&#7913;ng minh g&#7891;m:</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='color:red'>- B&#7843;n ch&#7909;p Ch&#7913;ng minh nhân dân ho&#7863;c
C&#259;n c&#432;&#7899;c công dân.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='color:red'>- Gi&#7845;y t&#7901; h&#7907;p pháp &#273;&#7875; xác &#273;&#7883;nh
m&#7889;i quan h&#7879; c&#7911;a ng&#432;&#7901;i ph&#7909; thu&#7897;c v&#7899;i
ng&#432;&#7901;i n&#7897;p thu&#7871; nh&#432; b&#7843;n ch&#7909;p Gi&#7845;y xác
nh&#7853;n thông tin v&#7873; c&#432; trú ho&#7863;c Thông báo s&#7889; &#273;&#7883;nh
danh cá nhân và thông tin trong C&#417; s&#7903; d&#7919; li&#7879;u qu&#7889;c
gia v&#7873; dân c&#432; ho&#7863;c gi&#7845;y t&#7901; khác do c&#417; quan
C&#417; quan Công an c&#7845;p, gi&#7845;y khai sinh, quy&#7871;t &#273;&#7883;nh
công nh&#7853;n vi&#7879;c nh&#7853;n cha, m&#7865;, con c&#7911;a c&#417; quan
Nhà n&#432;&#7899;c có th&#7849;m quy&#7873;n.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='color:red'>Tr&#432;&#7901;ng h&#7907;p trong &#273;&#7897; tu&#7893;i
lao &#273;&#7897;ng th\u0301 ngoài các gi&#7845;y t&#7901; nêu trên, h&#7891;
s&#417; ch&#7913;ng minh c&#7847;n có thêm gi&#7845;y t&#7901; ch&#7913;ng minh
là ng&#432;&#7901;i khuy&#7871;t t&#7853;t, không có kh&#7843; n&#259;ng lao
&#273;&#7897;ng nh&#432; b&#7843;n ch&#7909;p Gi&#7845;y xác nh&#7853;n khuy&#7871;t
t&#7853;t theo quy &#273;&#7883;nh c&#7911;a pháp lu&#7853;t v&#7873; ng&#432;&#7901;i
khuy&#7871;t t&#7853;t &#273;&#7889;i v&#7899;i ng&#432;&#7901;i khuy&#7871;t t&#7853;t
không có kh&#7843; n&#259;ng lao &#273;&#7897;ng, b&#7843;n ch&#7909;p h&#7891;
s&#417; b&#7879;nh án &#273;&#7889;i v&#7899;i ng&#432;&#7901;i m&#7855;c b&#7879;nh
không có kh&#7843; n&#259;ng lao &#273;&#7897;ng (nh&#432; b&#7879;nh AIDS, ung
th&#432;, suy th&#7853;n m\u0103n,..).</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='color:red'>g.4) &#272;&#7889;i v&#7899;i các cá nhân khác theo h&#432;&#7899;ng
d&#7851;n t&#7841;i ti&#7871;t d.4, &#273;i&#7875;m d, kho&#7843;n 1, &#272;i&#7873;u
này h&#7891; s&#417; ch&#7913;ng minh g&#7891;m:</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='color:red'>g.4.1) B&#7843;n ch&#7909;p Ch&#7913;ng minh nhân dân ho&#7863;c
C&#259;n c&#432;&#7899;c công dân ho&#7863;c Gi&#7845;y khai sinh.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='color:red'>g.4.2) Các gi&#7845;y t&#7901; h&#7907;p pháp &#273;&#7875;
xác &#273;&#7883;nh trách nhi&#7879;m nuôi d&#432;&#7905;ng theo quy &#273;&#7883;nh
c&#7911;a pháp lu&#7853;t.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='color:red'>Tr&#432;&#7901;ng h&#7907;p ng&#432;&#7901;i ph&#7909; thu&#7897;c
trong &#273;&#7897; tu&#7893;i lao &#273;&#7897;ng th\u0301 ngoài các gi&#7845;y t&#7901;
nêu trên, h&#7891; s&#417; ch&#7913;ng minh c&#7847;n có thêm gi&#7845;y t&#7901;
ch&#7913;ng minh không có kh&#7843; n&#259;ng lao &#273;&#7897;ng nh&#432; b&#7843;n
ch&#7909;p Gi&#7845;y xác nh&#7853;n khuy&#7871;t t&#7853;t theo quy &#273;&#7883;nh
c&#7911;a pháp lu&#7853;t v&#7873; ng&#432;&#7901;i khuy&#7871;t t&#7853;t
&#273;&#7889;i v&#7899;i ng&#432;&#7901;i khuy&#7871;t t&#7853;t không có kh&#7843;
n&#259;ng lao &#273;&#7897;ng, b&#7843;n ch&#7909;p h&#7891; s&#417; b&#7879;nh
án &#273;&#7889;i v&#7899;i ng&#432;&#7901;i m&#7855;c b&#7879;nh không có kh&#7843;
n&#259;ng lao &#273;&#7897;ng (nh&#432; b&#7879;nh AIDS, ung th&#432;, suy th&#7853;n
m\u0103n,..).</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='color:red'>Các gi&#7845;y t&#7901; h&#7907;p pháp t&#7841;i ti&#7871;t
g.4.2, &#273;i&#7875;m g, kho&#7843;n 1, &#272;i&#7873;u này là b&#7845;t k&#7923;
gi&#7845;y t&#7901; pháp l\u01b0 nào xác &#273;&#7883;nh &#273;&#432;&#7907;c m&#7889;i
quan h&#7879; c&#7911;a ng&#432;&#7901;i n&#7897;p thu&#7871; v&#7899;i
ng&#432;&#7901;i ph&#7909; thu&#7897;c nh&#432;:</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='color:red'>- B&#7843;n ch&#7909;p gi&#7845;y t&#7901; xác &#273;&#7883;nh
ngh&#297;a v&#7909; nuôi d&#432;&#7905;ng theo quy &#273;&#7883;nh c&#7911;a
pháp lu&#7853;t (n&#7871;u có).</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='color:red'>- B&#7843;n ch&#7909;p Gi&#7845;y xác nh&#7853;n thông tin v&#7873;
c&#432; trú ho&#7863;c Thông báo s&#7889; &#273;&#7883;nh danh cá nhân và thông
tin trong C&#417; s&#7903; d&#7919; li&#7879;u qu&#7889;c gia v&#7873; dân
c&#432; ho&#7863;c gi&#7845;y t&#7901; khác do c&#417; quan C&#417; quan Công
an c&#7845;p.</span></p>
