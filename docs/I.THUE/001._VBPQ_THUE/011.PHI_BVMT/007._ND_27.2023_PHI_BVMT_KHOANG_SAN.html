k&egrave;m theo Ngh&#7883; &#273;&#7883;nh n&agrave;y v&agrave; tham kh&#7843;o
m&#7913;c thu ph&iacute; c&#7911;a c&aacute;c &#273;&#7883;a ph&#432;&#417;ng
c&oacute; khai th&aacute;c kho&aacute;ng s&#7843;n t&#432;&#417;ng t&#7921;
thu&#7897;c &#273;&#7889;i t&#432;&#7907;ng ch&#7883;u ph&iacute;, H&#7897;i
&#273;&#7891;ng nh&acirc;n d&acirc;n c&aacute;c t&#7881;nh, th&agrave;nh
ph&#7889; tr&#7921;c thu&#7897;c trung &#432;&#417;ng (sau &#273;&acirc;y
g&#7885;i chung l&agrave; H&#7897;i &#273;&#7891;ng nh&acirc;n d&acirc;n
c&#7845;p t&#7881;nh) quy&#7871;t &#273;&#7883;nh c&#7909; th&#7875; m&#7913;c
thu, &#273;&#417;n v&#7883; t&iacute;nh ph&iacute; b&#7843;o v&#7879; m&ocirc;i
tr&#432;&#7901;ng &#273;&#7889;i v&#7899;i t&#7915;ng lo&#7841;i kho&aacute;ng
s&#7843;n &aacute;p d&#7909;ng t&#7841;i &#273;&#7883;a ph&#432;&#417;ng
ph&ugrave; h&#7907;p v&#7899;i t&igrave;nh h&igrave;nh th&#7921;c t&#7871;
trong t&#7915;ng th&#7901;i k&#7923;.</span></p>

<h2><a name="_Toc137450670"></a><a name="dieu_7"><span style='i&#7873;u 7. Ph&#432;&#417;ng ph&aacute;p t&iacute;nh
ph&iacute;</span></a></h2>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>1. Ph&iacute; b&#7843;o v&#7879; m&ocirc;i
tr&#432;&#7901;ng &#273;&#7889;i v&#7899;i khai th&aacute;c kho&aacute;ng
s&#7843;n ph&#7843;i n&#7897;p trong k&#7923; n&#7897;p ph&iacute;
&#273;&#432;&#7907;c t&iacute;nh theo c&ocirc;ng th&#7913;c sau:</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>F = [(Q1 x f1) + (Q2 x f2)] x K.</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>Trong &#273;&oacute;:</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>F l&agrave; s&#7889; ph&iacute; b&#7843;o v&#7879;
m&ocirc;i tr&#432;&#7901;ng ph&#7843;i n&#7897;p trong k&#7923; (th&aacute;ng).</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>Q1 l&agrave; kh&#7889;i l&#432;&#7907;ng
&#273;&#7845;t &#273;&aacute; b&oacute;c, &#273;&#7845;t &#273;&aacute;
th&#7843;i trong k&#7923; n&#7897;p ph&iacute; (m<sup>3</sup>).</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>Kh&#7889;i l&#432;&#7907;ng &#273;&#7845;t
&#273;&aacute; b&oacute;c, &#273;&#7845;t &#273;&aacute; th&#7843;i trong
k&#7923; n&#7897;p ph&iacute; (Q1) &#273;&#432;&#7907;c x&aacute;c
&#273;&#7883;nh theo quy &#273;&#7883;nh t&#7841;i <a name="dc_3">kho&#7843;n 2
&#272;i&#7873;u 41 v&agrave; kho&#7843;n 4 &#272;i&#7873;u 42 Ngh&#7883;
&#273;&#7883;nh s&#7889; 158/2016/N&#272;-CP</a>.</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>f1 l&agrave; m&#7913;c thu ph&iacute; &#273;&#7889;i
v&#7899;i s&#7889; l&#432;&#7907;ng &#273;&#7845;t &#273;&aacute; b&oacute;c,
&#273;&#7845;t &#273;&aacute; th&#7843;i: 200 &#273;&#7891;ng/m<sup>3</sup>.</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>Q2 l&agrave; t&#7893;ng kh&#7889;i l&#432;&#7907;ng
kho&aacute;ng s&#7843;n nguy&ecirc;n khai khai th&aacute;c th&#7921;c t&#7871;
trong k&#7923; n&#7897;p ph&iacute; (t&#7845;n ho&#7863;c m<sup>3</sup>).</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>T&#7893;ng kh&#7889;i l&#432;&#7907;ng kho&aacute;ng
s&#7843;n nguy&ecirc;n khai khai th&aacute;c th&#7921;c t&#7871; trong k&#7923;
n&#7897;p ph&iacute; (Q2) &#273;&#432;&#7907;c x&aacute;c &#273;&#7883;nh theo
quy &#273;&#7883;nh t&#7841;i <a name="dc_4">&#272;i&#7873;u 42 Ngh&#7883;
&#273;&#7883;nh s&#7889; 158/2016/N&#272;-CP</a>.</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>f2 l&agrave; m&#7913;c thu ph&iacute; t&#432;&#417;ng
&#7913;ng c&#7911;a t&#7915;ng lo&#7841;i kho&aacute;ng s&#7843;n khai
th&aacute;c (&#273;&#7891;ng/t&#7845;n ho&#7863;c &#273;&#7891;ng/m<sup>3</sup>).</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>K l&agrave; h&#7879; s&#7889; t&iacute;nh ph&iacute;
theo ph&#432;&#417;ng ph&aacute;p khai th&aacute;c, trong &#273;&oacute;:</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>Khai th&aacute;c l&#7897; thi&ecirc;n (bao g&#7891;m
c&#7843; khai th&aacute;c b&#7857;ng s&#7913;c n&#432;&#7899;c nh&#432; khai
th&aacute;c titan, c&aacute;t, s&#7887;i l&ograve;ng s&ocirc;ng, su&#7889;i,
l&ograve;ng h&#7891; th&#7911;y &#273;i&#7879;n, th&#7911;y l&#7907;i,
c&#7917;a bi&#7875;n): K = 1,1.</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>Khai th&aacute;c h&#7847;m l&ograve; v&agrave;
c&aacute;c h&igrave;nh th&#7913;c khai th&aacute;c kh&aacute;c (khai
th&aacute;c d&#7847;u th&ocirc;, kh&iacute; thi&ecirc;n nhi&ecirc;n,
n&#432;&#7899;c kho&aacute;ng thi&ecirc;n nhi&ecirc;n v&agrave; c&aacute;c
tr&#432;&#7901;ng h&#7907;p c&ograve;n l&#7841;i): K = 1.</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>2. &#272;&#7889;i v&#7899;i kho&aacute;ng s&#7843;n
ch&#7913;a nhi&#7873;u kho&aacute;ng v&#7853;t, kho&aacute;ng ch&#7845;t
c&oacute; &iacute;ch th&#7921;c hi&#7879;n theo c&ocirc;ng th&#7913;c quy
&#273;&#7883;nh t&#7841;i kho&#7843;n 1 &#272;i&#7873;u n&agrave;y.</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>Trong &#273;&oacute;, s&#7889; ph&iacute; ph&#7843;i
n&#7897;p c&#7911;a t&#7915;ng lo&#7841;i kho&aacute;ng s&#7843;n trong
t&#7893;ng kh&#7889;i l&#432;&#7907;ng kho&aacute;ng s&#7843;n nguy&ecirc;n
khai ch&#7913;a nhi&#7873;u kho&aacute;ng v&#7853;t, kho&aacute;ng ch&#7845;t
c&oacute; &iacute;ch = T&#7927; l&#7879; c&#7911;a t&#7915;ng lo&#7841;i
kho&aacute;ng s&#7843;n nguy&ecirc;n khai c&oacute; trong t&#7893;ng kh&#7889;i
l&#432;&#7907;ng kho&aacute;ng s&#7843;n nguy&ecirc;n khai ch&#7913;a
nhi&#7873;u kho&aacute;ng v&#7853;t, kho&aacute;ng ch&#7845;t c&oacute;
&iacute;ch x T&#7893;ng kh&#7889;i l&#432;&#7907;ng kho&aacute;ng s&#7843;n
nguy&ecirc;n khai ch&#7913;a nhi&#7873;u kho&aacute;ng v&#7853;t, kho&aacute;ng
ch&#7845;t c&oacute; &iacute;ch khai th&aacute;c trong k&#7923; n&#7897;p
ph&iacute; (Q2) x M&#7913;c thu ph&iacute; t&#432;&#417;ng &#7913;ng c&#7911;a
t&#7915;ng lo&#7841;i kho&aacute;ng s&#7843;n khai th&aacute;c (f2).</span></p>

  b&igrave;nh c&#7911;a c&aacute;c lo&#7841;i kho&aacute;ng s&#7843;n<br>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>C&#259;n c&#7913; h&agrave;m l&#432;&#7907;ng trung
b&igrave;nh c&#7911;a t&#7915;ng lo&#7841;i kho&aacute;ng s&#7843;n c&oacute;
trong qu&#7863;ng nguy&ecirc;n khai khai th&aacute;c v&agrave; t&#7893;ng
h&agrave;m l&#432;&#7907;ng trung b&igrave;nh c&#7911;a c&aacute;c lo&#7841;i
kho&aacute;ng s&#7843;n c&oacute; trong qu&#7863;ng nguy&ecirc;n khai khai
th&aacute;c trong h&#7891; s&#417; v&#7873; tr&#7919; l&#432;&#7907;ng
kho&aacute;ng s&#7843;n ho&#7863;c b&aacute;o c&aacute;o &#273;&#7883;nh k&#7923;
k&#7871;t qu&#7843; ho&#7841;t &#273;&#7897;ng khai th&aacute;c kho&aacute;ng
s&#7843;n c&#7911;a t&#7893; ch&#7913;c, c&aacute; nh&acirc;n theo quy
&#273;&#7883;nh ph&aacute;p lu&#7853;t kho&aacute;ng s&#7843;n, S&#7903;
T&agrave;i nguy&ecirc;n v&agrave; M&ocirc;i tr&#432;&#7901;ng ch&#7911;
tr&igrave;, ph&#7889;i h&#7907;p v&#7899;i C&#7909;c Thu&#7871; v&agrave;
c&aacute;c c&#417; quan li&ecirc;n quan tr&igrave;nh &#7910;y ban nh&acirc;n
d&acirc;n c&aacute;c t&#7881;nh, th&agrave;nh ph&#7889; tr&#7921;c thu&#7897;c
trung &#432;&#417;ng (sau &#273;&acirc;y g&#7885;i chung l&agrave; &#7910;y ban
nh&acirc;n d&acirc;n c&#7845;p t&#7881;nh) quy&#7871;t &#273;&#7883;nh t&#7927;
l&#7879; c&#7911;a t&#7915;ng lo&#7841;i kho&aacute;ng s&#7843;n nguy&ecirc;n
khai c&oacute; trong t&#7893;ng kh&#7889;i l&#432;&#7907;ng kho&aacute;ng
s&#7843;n nguy&ecirc;n khai ch&#7913;a nhi&#7873;u kho&aacute;ng v&#7853;t,
kho&aacute;ng ch&#7845;t c&oacute; &iacute;ch (sau &#273;&acirc;y g&#7885;i
t&#7855;t l&agrave; t&#7927; l&#7879;) &#273;&#7875; t&iacute;nh ph&iacute;
b&#7843;o v&#7879; m&ocirc;i tr&#432;&#7901;ng ph&ugrave; h&#7907;p v&#7899;i
t&igrave;nh h&igrave;nh th&#7921;c t&#7871; c&#7911;a &#273;&#7883;a
ph&#432;&#417;ng, c&#7909; th&#7875;:</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>a) &#272;&#7889;i v&#7899;i kho&aacute;ng s&#7843;n
&#273;&#432;&#7907;c c&#7845;p ph&eacute;p khai th&aacute;c l&#7847;n
&#273;&#7847;u: c&#259;n c&#7913; h&#7891; s&#417; v&#7873; tr&#7919;
l&#432;&#7907;ng kho&aacute;ng s&#7843;n, ph&#7843;i ban h&agrave;nh t&#7927;
l&#7879; tr&#432;&#7899;c khi t&#7893; ch&#7913;c, c&aacute; nh&acirc;n
ti&#7871;n h&agrave;nh khai th&aacute;c kho&aacute;ng s&#7843;n, l&agrave;m
c&#417; s&#7903; cho ng&#432;&#7901;i n&#7897;p ph&iacute; k&ecirc; khai,
n&#7897;p ph&iacute; b&#7843;o v&#7879; m&ocirc;i tr&#432;&#7901;ng.</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>N&#259;m sau, c&#259;n c&#7913; s&#7889; li&#7879;u
t&#7841;i b&aacute;o c&aacute;o &#273;&#7883;nh k&#7923; k&#7871;t qu&#7843;
ho&#7841;t &#273;&#7897;ng khai th&aacute;c kho&aacute;ng s&#7843;n, vi&#7879;c
ban h&agrave;nh t&#7927; l&#7879; ph&ugrave; h&#7907;p v&#7899;i t&igrave;nh
h&igrave;nh th&#7921;c t&#7871;, l&agrave;m c&#417; s&#7903; cho
ng&#432;&#7901;i n&#7897;p ph&iacute; k&ecirc; khai, n&#7897;p ph&iacute;
b&#7843;o v&#7879; m&ocirc;i tr&#432;&#7901;ng cho th&#7901;i gian ti&#7871;p
theo.</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>b) &#272;&#7889;i v&#7899;i kho&aacute;ng s&#7843;n
&#273;ang khai th&aacute;c: c&#259;n c&#7913; s&#7889; li&#7879;u t&#7841;i
b&aacute;o c&aacute;o &#273;&#7883;nh k&#7923; k&#7871;t qu&#7843; ho&#7841;t
&#273;&#7897;ng khai th&aacute;c kho&aacute;ng s&#7843;n c&#7911;a n&#259;m
tr&#432;&#7899;c li&#7873;n k&#7873;, vi&#7879;c ban h&agrave;nh t&#7927;
l&#7879; ph&ugrave; h&#7907;p v&#7899;i t&igrave;nh h&igrave;nh th&#7921;c
t&#7871;, l&agrave;m c&#417; s&#7903; cho ng&#432;&#7901;i n&#7897;p ph&iacute;
k&ecirc; khai, n&#7897;p ph&iacute; b&#7843;o v&#7879; m&ocirc;i
tr&#432;&#7901;ng cho th&#7901;i gian ti&#7871;p theo.</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>3. &#272;&#7889;i v&#7899;i tr&#432;&#7901;ng
h&#7907;p thu h&#7891;i than l&#7851;n trong &#273;&#7845;t &#273;&aacute;
b&oacute;c, &#273;&#7845;t &#273;&aacute; th&#7843;i, s&#7889; ph&iacute;
b&#7843;o v&#7879; m&ocirc;i tr&#432;&#7901;ng ph&#7843;i n&#7897;p th&#7921;c
hi&#7879;n theo c&ocirc;ng th&#7913;c quy &#273;&#7883;nh t&#7841;i kho&#7843;n
1 &#272;i&#7873;u n&agrave;y.</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>Tr&#432;&#7901;ng h&#7907;p than l&#7851;n trong
&#273;&#7845;t &#273;&aacute; ph&#7843;i qua s&agrave;ng, tuy&#7875;n,
ph&acirc;n lo&#7841;i, l&agrave;m gi&agrave;u tr&#432;&#7899;c khi b&aacute;n
ra th&igrave; c&#259;n c&#7913; &#273;i&#7873;u ki&#7879;n th&#7921;c t&#7871;
khai th&aacute;c v&agrave; c&ocirc;ng ngh&#7879; ch&#7871; bi&#7871;n
tr&ecirc;n &#273;&#7883;a b&agrave;n, S&#7903; T&agrave;i nguy&ecirc;n
v&agrave; M&ocirc;i tr&#432;&#7901;ng ch&#7911; tr&igrave;, ph&#7889;i
h&#7907;p v&#7899;i C&#7909;c Thu&#7871; v&agrave; c&aacute;c c&#417; quan
li&ecirc;n quan tr&igrave;nh &#7910;y ban nh&acirc;n d&acirc;n c&#7845;p
t&#7881;nh quy&#7871;t &#273;&#7883;nh t&#7927; l&#7879; quy &#273;&#7893;i
t&#7915; kh&#7889;i l&#432;&#7907;ng kho&aacute;ng s&#7843;n th&agrave;nh
ph&#7849;m ra kh&#7889;i l&#432;&#7907;ng kho&aacute;ng s&#7843;n nguy&ecirc;n
khai l&agrave;m c&#259;n c&#7913; t&iacute;nh ph&iacute; b&#7843;o v&#7879;
m&ocirc;i tr&#432;&#7901;ng ph&ugrave; h&#7907;p v&#7899;i t&igrave;nh
h&igrave;nh th&#7921;c t&#7871; c&#7911;a &#273;&#7883;a ph&#432;&#417;ng.</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>4. &#272;&#7889;i v&#7899;i kho&aacute;ng s&#7843;n
t&#7853;n thu quy &#273;&#7883;nh t&#7841;i <a name="tc_1">kho&#7843;n 3
&#272;i&#7873;u 6 Ngh&#7883; &#273;&#7883;nh n&agrave;y</a>.</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>a) Vi&#7879;c x&aacute;c &#273;&#7883;nh s&#7889;
ph&iacute; ph&#7843;i n&#7897;p theo quy &#273;&#7883;nh t&#7841;i kho&#7843;n
1 v&agrave; kho&#7843;n 2 &#272;i&#7873;u n&agrave;y.</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>b) Tr&#432;&#7901;ng h&#7907;p kho&aacute;ng s&#7843;n
khai th&aacute;c ph&#7843;i qua s&agrave;ng, tuy&#7875;n, ph&acirc;n
lo&#7841;i, l&agrave;m gi&agrave;u tr&#432;&#7899;c khi b&aacute;n ra
th&igrave; c&#259;n c&#7913; &#273;i&#7873;u ki&#7879;n th&#7921;c t&#7871;
khai th&aacute;c v&agrave; c&ocirc;ng ngh&#7879; ch&#7871; bi&#7871;n
kho&aacute;ng s&#7843;n tr&ecirc;n &#273;&#7883;a b&agrave;n, S&#7903;
T&agrave;i nguy&ecirc;n v&agrave; M&ocirc;i tr&#432;&#7901;ng ch&#7911;
tr&igrave;, ph&#7889;i h&#7907;p v&#7899;i C&#7909;c Thu&#7871; v&agrave;
c&aacute;c c&#417; quan li&ecirc;n quan tr&igrave;nh &#7910;y ban nh&acirc;n
d&acirc;n c&#7845;p t&#7881;nh quy&#7871;t &#273;&#7883;nh t&#7927; l&#7879;
quy &#273;&#7893;i t&#7915; kh&#7889;i l&#432;&#7907;ng kho&aacute;ng s&#7843;n
th&agrave;nh ph&#7849;m ra kh&#7889;i l&#432;&#7907;ng kho&aacute;ng s&#7843;n
nguy&ecirc;n khai l&agrave;m c&#259;n c&#7913; t&iacute;nh ph&iacute; b&#7843;o
v&#7879; m&ocirc;i tr&#432;&#7901;ng ph&ugrave; h&#7907;p v&#7899;i t&igrave;nh
h&igrave;nh th&#7921;c t&#7871; c&#7911;a &#273;&#7883;a ph&#432;&#417;ng.</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
