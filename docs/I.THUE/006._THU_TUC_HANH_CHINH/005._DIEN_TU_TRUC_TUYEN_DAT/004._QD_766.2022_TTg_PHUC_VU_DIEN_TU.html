n &#273;&#7897; x&#7917; l&yacute;

&#273;&uacute;ng ho&#7863;c tr&#432;&#7899;c h&#7841;n/T&#7893;ng s&#7889;

<p class=MsoNormal style='margin-top:6.0pt'><span style='font-size:10.0pt;
&oacute;, th&#7901;i h&#7841;n

ngh&#7883; theo quy &#273;&#7883;nh t&#7841;i <a name="dc_5">&#272;i&#7873;u

Ch&iacute;nh ph&#7911; ban h&agrave;nh Quy ch&#7871; qu&#7843;n l&yacute;,

<p class=MsoNormal style='margin-top:6.0pt'><span style='font-size:10.0pt;

&#273;&#417;n v&#7883; kh&ocirc;ng c&oacute; ph&#7843;n &aacute;nh, ki&#7871;n

<p class=MsoNormal style='margin-top:6.0pt'><b><span style='font-size:10.0pt;

&#7901;ng h&#7907;p, c&#417; quan,

<p class=MsoNormal style='margin-top:6.0pt'><b><span style='font-size:10.0pt;
