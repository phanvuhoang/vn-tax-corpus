tr&#432;&#7901;ng viên, x\u0103 viên - &#273;&#7889;i v&#7899;i tr&#432;&#7901;ng h&#7907;p
&#273;&#432;&#7907;c mi&#7877;n, gi&#7843;m quy &#273;&#7883;nh t&#7841;i
&#273;i&#7875;m 3 M&#7909;c II, &#273;i&#7875;m 3 M&#7909;c III Ph&#7847;n C Thông
t&#432; s&#7889; 120/2005/TT-BTC nay &#273;&#432;&#7907;c s&#7917;a &#273;&#7893;i
t&#7841;i &#273;i&#7875;m 4 M&#7909;c VII, &#273;i&#7875;m 3 M&#7909;c VIII
Thông t&#432; s&#7889; 141/2007/TT-BTC ngày 30 tháng 11 n&#259;m 2007 c&#7911;a
B&#7897; Tài chính).</p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'>- Gi&#7845;y phép &#273;&#7847;u
t&#432; ho&#7863;c Gi&#7845;y ch&#7913;ng nh&#7853;n &#273;&#259;ng k\u01b0 kinh
doanh.</p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'>- Gi&#7845;y ch&#7913;ng nh&#7853;n
&#273;&#7847;u t&#432; do c&#417; quan nhà n&#432;&#7899;c có th&#7849;m quy&#7873;n
c&#7845;p trong tr&#432;&#7901;ng h&#7907;p d&#7921; án &#273;&#7847;u t&#432;
ph&#7843;i &#273;&#432;&#7907;c c&#417; quan nhà n&#432;&#7899;c qu&#7843;n l\u01b0
&#273;&#7847;u t&#432; ghi vào Gi&#7845;y ch&#7913;ng nh&#7853;n &#273;&#7847;u
t&#432; ho&#7863;c d&#7921; án thu&#7897;c di&#7879;n không ph&#7843;i
&#273;&#259;ng k\u01b0 &#273;&#7847;u t&#432; nh&#432;ng nhà &#273;&#7847;u t&#432;
có yêu c&#7847;u xác nh&#7853;n &#432;u &#273;\u0103i &#273;&#7847;u t&#432;.</p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'>Ngoài các gi&#7845;y t&#7901; nêu
trên, m&#7897;t s&#7889; tr&#432;&#7901;ng h&#7907;p h&#7891; s&#417; ph&#7843;i
có các gi&#7845;y t&#7901; c&#7909; th&#7875; theo quy &#273;&#7883;nh sau
&#273;ây:</p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'>a) Tr&#432;&#7901;ng h&#7907;p d&#7921;
án g&#7863;p khó kh&#259;n ph&#7843;i t&#7841;m ng&#7915;ng xây d&#7921;ng, t&#7841;m
ng&#7915;ng ho&#7841;t &#273;&#7897;ng &#273;&#432;&#7907;c mi&#7877;n ti&#7873;n
thuê &#273;&#7845;t trong th&#7901;i gian t&#7841;m ng&#7915;ng xây d&#7921;ng
c&#417; b&#7843;n, t&#7841;m ng&#7915;ng ho&#7841;t &#273;&#7897;ng:</p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'>- &#272;&#7889;i v&#7899;i d&#7921;
án g&#7863;p khó kh&#259;n ph&#7843;i t&#7841;m ng&#7915;ng xây d&#7921;ng, ch&#7853;m
nh&#7845;t sau ba m&#432;&#417;i (30) ngày k&#7875; t&#7915; ngày t&#7841;m ng&#7915;ng
xây d&#7921;ng, ph&#7843;i g&#7917;i cho c&#417; quan thu&#7871;:</p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'>+ V&#259;n b&#7843;n &#273;&#7873;
ngh&#7883; mi&#7877;n, gi&#7843;m nêu r\u01a1 l\u01b0 do và th&#7901;i gian ph&#7843;i t&#7841;m
ng&#7915;ng xây d&#7921;ng.</p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'>+ Ph&#7909; l&#7909;c h&#7907;p
&#273;&#7891;ng xây d&#7921;ng ho&#7863;c Biên b&#7843;n (v&#7873; vi&#7879;c t&#7841;m
ng&#7915;ng xây d&#7921;ng) &#273;&#432;&#7907;c l&#7853;p gi&#7919;a Bên giao
th&#7847;u và Bên nh&#7853;n th&#7847;u, trong &#273;ó xác &#273;&#7883;nh vi&#7879;c
t&#7841;m d&#7915;ng th&#7921;c hi&#7879;n h&#7907;p &#273;&#7891;ng xây d&#7921;ng.</p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'>- &#272;&#7889;i v&#7899;i d&#7921;
án g&#7863;p khó kh&#259;n ph&#7843;i t&#7841;m ng&#7915;ng ho&#7841;t &#273;&#7897;ng,
ch&#7853;m nh&#7845;t sau ba m&#432;&#417;i (30) ngày k&#7875; t&#7915; ngày t&#7841;m
ng&#7915;ng ho&#7841;t &#273;&#7897;ng, ph&#7843;i g&#7917;i cho c&#417; quan
thu&#7871;: V&#259;n b&#7843;n &#273;&#7873; ngh&#7883; mi&#7877;n, gi&#7843;m
thu&#7871; có xác nh&#7853;n c&#7911;a c&#417; quan c&#7845;p gi&#7845;y phép
&#273;&#7847;u t&#432;.</p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'>b) Tr&#432;&#7901;ng h&#7907;p
&#273;&#432;&#7907;c mi&#7877;n ti&#7873;n thuê &#273;&#7845;t trong th&#7901;i
gian xây d&#7921;ng theo d&#7921; án &#273;&#432;&#7907;c c&#7845;p có th&#7849;m
quy&#7873;n phê duy&#7879;t, th&#7911; t&#7909;c h&#7891; s&#417; chia làm 2
giai &#273;o&#7841;n:</p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='color:red'>b.1)
Trong th&#7901;i gian &#273;ang ti&#7871;n hành xây d&#7921;ng: ng&#432;&#7901;i
thuê &#273;&#7845;t ph&#7843;i xu&#7845;t tr\u0301nh v&#7899;i c&#417; quan Thu&#7871;
các gi&#7845;y t&#7901; &#273;&#7875; làm c&#259;n c&#7913; t&#7841;m xác
&#273;&#7883;nh th&#7901;i gian &#273;&#432;&#7907;c mi&#7877;n ti&#7873;n thuê
&#273;&#7845;t g&#7891;m:</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='color:red'>- Gi&#7845;y
phép xây d&#7921;ng do c&#417; quan có th&#7849;m quy&#7873;n c&#7845;p, tr&#7915;
tr&#432;&#7901;ng h&#7907;p th&#7921;c hi&#7879;n d&#7921; án trong khu &#273;ô
th&#7883; m&#7899;i, khu công nghi&#7879;p, c&#7909;m công nghi&#7879;p thu&#7897;c
di&#7879;n không ph&#7843;i c&#7845;p Gi&#7845;y phép xây d&#7921;ng.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'>- H&#7907;p &#273;&#7891;ng xây d&#7921;ng;
Tr&#432;&#7901;ng h&#7907;p &#273;&#417;n v&#7883; t&#7921; làm, không có H&#7907;p
&#273;&#7891;ng xây d&#7921;ng th\u0301 ph&#7843;i nêu r\u01a1 trong &#273;&#417;n xin mi&#7877;n
ti&#7873;n thuê &#273;&#7845;t.</p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'>- Biên b&#7843;n bàn giao &#273;&#7845;t
trên th&#7921;c &#273;&#7883;a.</p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'>b.2) Sau khi công tr\u0301nh ho&#7863;c
h&#7841;ng m&#7909;c công tr\u0301nh &#273;&#432;&#7907;c hoàn thành, bàn giao
&#273;&#432;a vào khai thác s&#7917; d&#7909;ng, ng&#432;&#7901;i thuê &#273;&#7845;t
ph&#7843;i xu&#7845;t tr\u0301nh &#273;&#7847;y &#273;&#7911; các gi&#7845;y t&#7901;
&#273;&#7875; c&#417; quan Thu&#7871; có c&#259;n c&#7913; ban hành Quy&#7871;t
&#273;&#7883;nh mi&#7877;n ti&#7873;n thuê &#273;&#7845;t bao g&#7891;m:</p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'>+ Biên b&#7843;n nghi&#7879;m
thu, bàn giao công tr\u0301nh, h&#7841;ng m&#7909;c công tr\u0301nh hoàn thành,
&#273;&#432;a vào khai thác, s&#7917; d&#7909;ng &#273;&#432;&#7907;c l&#7853;p
gi&#7919;a ch&#7911; &#273;&#7847;u t&#432; xây d&#7921;ng công tr\u0301nh và nhà th&#7847;u
thi công xây d&#7921;ng công tr\u0301nh.</p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'>Ho&#7863;c các ch&#7913;ng t&#7915;
ch&#7913;ng minh vi&#7879;c &#273;&#417;n v&#7883; t&#7921; xây d&#7921;ng
trong tr&#432;&#7901;ng h&#7907;p &#273;&#417;n v&#7883; t&#7921; th&#7921;c hi&#7879;n
ho&#7841;t &#273;&#7897;ng xây d&#7921;ng c&#417; b&#7843;n.</p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='color:red'>c) <b
style='&#7901;ng h&#7907;p &#273;&#432;&#7907;c
mi&#7877;n, gi&#7843;m theo di&#7879;n &#432;u &#273;\u0103i &#273;&#7847;u t&#432;
theo quy &#273;&#7883;nh c&#7911;a pháp lu&#7853;t v&#7873; &#273;&#7847;u</b>
t&#432; ho&#7863;c &#273;&#7889;i v&#7899;i c&#417; s&#7903; s&#7843;n xu&#7845;t
kinh doanh m&#7899;i c&#7911;a t&#7893; ch&#7913;c kinh t&#7871; th&#7921;c hi&#7879;n
di d&#7901;i theo quy ho&#7841;ch, di d&#7901;i do ô nhi&#7877;m môi tr&#432;&#7901;ng:</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'>- <b style='i gi&#7845;y v&#7873; &#432;u &#273;\u0103i &#273;&#7847;u t&#432;
có ghi &#432;u &#273;\u0103i v&#7873; ti&#7873;n thuê &#273;&#7845;t, thuê m&#7863;t
n&#432;&#7899;c nh&#432;: Gi&#7845;y ch&#7913;ng nh&#7853;n &#432;u &#273;\u0103i
&#273;&#7847;u t&#432;, Gi&#7845;y phép &#273;&#7847;u t&#432;, Gi&#7845;y ch&#7913;ng
nh&#7853;n &#273;&#7847;u t&#432; do c&#417; quan nhà n&#432;&#7899;c có th&#7849;m
quy&#7873;n c&#7845;p (<span style='color:red'>B&#7843;n sao có xác nh&#7853;n
công ch&#7913;ng ho&#7863;c ch&#7913;ng th&#7921;c</span>).</b></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'>- Quy&#7871;t &#273;&#7883;nh c&#7911;a
c&#417; quan nhà n&#432;&#7899;c có th&#7849;m quy&#7873;n v&#7873; vi&#7879;c
di d&#7901;i c&#417; s&#7903; s&#7843;n xu&#7845;t kinh doanh theo quy ho&#7841;ch
ho&#7863;c do ô nhi&#7877;m môi tr&#432;&#7901;ng.</p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'>- Quy&#7871;t &#273;&#7883;nh cho
thuê &#273;&#7845;t, H&#7907;p &#273;&#7891;ng thuê &#273;&#7845;t ho&#7863;c
Biên b&#7843;n bàn giao &#273;&#7845;t trên th&#7921;c &#273;&#7883;a t&#7841;i
n&#417;i c&#417; s&#7903; s&#7843;n xu&#7845;t kinh doanh m&#7899;i.</p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'>d) Tr&#432;&#7901;ng h&#7907;p
&#273;&#432;&#7907;c mi&#7877;n, gi&#7843;m &#273;&#7889;i v&#7899;i d&#7921; án
xây d&#7921;ng tr&#7909; s&#7903; làm vi&#7879;c, &#273;&#7845;t thuê thu&#7897;c
d&#7921; án xây d&#7921;ng tr&#7909; s&#7903; làm vi&#7879;c c&#7911;a các
c&#417; quan &#273;&#7841;i di&#7879;n ngo&#7841;i giao, c&#417; quan l\u0103nh s&#7921;
n&#432;&#7899;c ngoài và c&#417; quan &#273;&#7841;i di&#7879;n c&#7911;a t&#7893;
ch&#7913;c qu&#7889;c t&#7871; t&#7841;i Vi&#7879;t Nam theo &#273;i&#7873;u
&#432;&#7899;c qu&#7889;c t&#7871; mà Vi&#7879;t Nam là thành viên ho&#7863;c
theo nguyên t&#7855;c có &#273;i có l&#7841;i.</p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'>Tr&#432;&#7901;ng h&#7907;p này,
ng&#432;&#7901;i thuê &#273;&#7845;t ph&#7843;i xu&#7845;t tr\u0301nh v&#7899;i
c&#417; quan Thu&#7871;: Hi&#7879;p &#273;&#7883;nh, ho&#7863;c tho&#7843; thu&#7853;n,
ho&#7863;c cam k&#7871;t c&#7911;a Chính ph&#7911; Vi&#7879;t Nam v&#7899;i t&#7893;
ch&#7913;c qu&#7889;c t&#7871; v&#7873; vi&#7879;c mi&#7877;n, gi&#7843;m ti&#7873;n
thuê &#273;&#7845;t; ho&#7863;c Gi&#7845;y xác nh&#7853;n c&#7911;a B&#7897;
Ngo&#7841;i giao Vi&#7879;t Nam ho&#7863;c c&#417; quan ngo&#7841;i v&#7909;
&#273;&#7883;a ph&#432;&#417;ng &#273;&#432;&#7907;c B&#7897; Ngo&#7841;i giao &#7911;y
quy&#7873;n.</p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'>e) Tr&#432;&#7901;ng h&#7907;p
&#273;&#432;&#7907;c mi&#7877;n, gi&#7843;m ti&#7873;n thuê &#273;&#7845;t do
Th&#7911; t&#432;&#7899;ng Chính ph&#7911; quy&#7871;t &#273;&#7883;nh theo
&#273;&#7873; ngh&#7883; c&#7911;a B&#7897; tr&#432;&#7903;ng, Th&#7911;
tr&#432;&#7903;ng c&#417; quan ngang B&#7897;, c&#417; quan thu&#7897;c Chính
ph&#7911;, Ch&#7911; t&#7883;ch &#7910;y ban nhân dân các t&#7881;nh, thành ph&#7889;
tr&#7921;c thu&#7897;c Trung &#432;&#417;ng, h&#7891; s&#417; ph&#7843;i có:
Quy&#7871;t &#273;&#7883;nh c&#7911;a Th&#7911; t&#432;&#7899;ng Chính ph&#7911;
(B&#7843;n sao có xác nh&#7853;n công ch&#7913;ng ho&#7863;c ch&#7913;ng th&#7921;c).</p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'>7. Th&#7901;i h&#7841;n gi&#7843;i
quy&#7871;t h&#7891; s&#417; mi&#7877;n thu&#7871;, gi&#7843;m thu&#7871;:</p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'>- Trong th&#7901;i h&#7841;n ba
m&#432;&#417;i ngày, k&#7875; t&#7915; ngày nh&#7853;n &#273;&#7911; h&#7891;
s&#417;, c&#417; quan thu&#7871; ra quy&#7871;t &#273;&#7883;nh mi&#7877;n thu&#7871;,
gi&#7843;m thu&#7871; theo m&#7851;u s&#7889; 03/MGTH ho&#7863;c thông báo cho
ng&#432;&#7901;i n&#7897;p thu&#7871; l\u01b0 do không thu&#7897;c di&#7879;n
&#273;&#432;&#7907;c mi&#7877;n thu&#7871;, gi&#7843;m thu&#7871; theo m&#7851;u
s&#7889; 04/MGTH ban hành kèm theo Thông t&#432; này.</p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'>- Tr&#432;&#7901;ng h&#7907;p c&#7847;n
ki&#7875;m tra th&#7921;c t&#7871; &#273;&#7875; có &#273;&#7911; c&#259;n c&#7913;
gi&#7843;i quy&#7871;t h&#7891; s&#417; th\u0301 th&#7901;i h&#7841;n ra quy&#7871;t
&#273;&#7883;nh mi&#7877;n thu&#7871;, gi&#7843;m thu&#7871; là sáu
m&#432;&#417;i ngày, k&#7875; t&#7915; ngày nh&#7853;n &#273;&#7911; h&#7891;
s&#417;.</p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'>8. Th&#7849;m quy&#7873;n gi&#7843;i
quy&#7871;t vi&#7879;c mi&#7877;n thu&#7871;, gi&#7843;m thu&#7871;:</p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'>a) &#272;&#7889;i v&#7899;i ti&#7873;n
s&#7917; d&#7909;ng &#273;&#7845;t và ti&#7873;n thuê &#273;&#7845;t, thuê m&#7863;t
n&#432;&#7899;c:</p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'>- C&#7909;c tr&#432;&#7903;ng C&#7909;c
Thu&#7871; phê duy&#7879;t mi&#7877;n, gi&#7843;m ti&#7873;n s&#7917; d&#7909;ng
&#273;&#7845;t ban hành quy&#7871;t &#273;&#7883;nh mi&#7877;n, gi&#7843;m ti&#7873;n
thuê &#273;&#7845;t, thuê m&#7863;t n&#432;&#7899;c &#273;&#7889;i v&#7899;i
ng&#432;&#7901;i n&#7897;p thu&#7871; là t&#7893; ch&#7913;c kinh t&#7871;; T&#7893;
ch&#7913;c, cá nhân n&#432;&#7899;c ngoài, ng&#432;&#7901;i Vi&#7879;t Nam
&#273;&#7883;nh c&#432; &#7903; n&#432;&#7899;c ngoài.</p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'>- Chi c&#7909;c tr&#432;&#7903;ng
Chi c&#7909;c Thu&#7871; phê duy&#7879;t mi&#7877;n, gi&#7843;m ti&#7873;n s&#7917;
d&#7909;ng &#273;&#7845;t ban hành quy&#7871;t &#273;&#7883;nh mi&#7877;n, gi&#7843;m
ti&#7873;n thuê &#273;&#7845;t, thuê m&#7863;t n&#432;&#7899;c &#273;&#7889;i v&#7899;i
ng&#432;&#7901;i n&#7897;p thu&#7871; là h&#7897; gia &#273;\u0301nh, cá nhân.</p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'>b) Vi&#7879;c mi&#7877;n, gi&#7843;m
các lo&#7841;i thu&#7871; khác &#273;&#7889;i v&#7899;i tr&#432;&#7901;ng h&#7907;p
c&#417; quan thu&#7871; quy&#7871;t &#273;&#7883;nh mi&#7877;n thu&#7871;, gi&#7843;m
thu&#7871;: H&#7891; s&#417; mi&#7877;n thu&#7871;, gi&#7843;m thu&#7871;
&#273;&#432;&#7907;c n&#7897;p t&#7841;i c&#417; quan thu&#7871; qu&#7843;n l\u01b0
tr&#7921;c ti&#7871;p c&#7845;p nào th\u0301 Th&#7911; tr&#432;&#7903;ng c&#417;
quan thu&#7871; c&#7845;p &#273;ó quy&#7871;t &#273;&#7883;nh vi&#7879;c mi&#7877;n,
gi&#7843;m thu&#7871; ho&#7863;c thông báo cho ng&#432;&#7901;i n&#7897;p thu&#7871;
l\u01b0 do không &#273;&#432;&#7907;c mi&#7877;n thu&#7871;, gi&#7843;m thu&#7871;.</p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:

xây d&#7921;ng.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:36.0pt;line-height:normal'><span style='mso-fareast-font-family:"Times New Roman";mso-bidi-font-family:"Times New Roman"'>-
H&#7907;p &#273;&#7891;ng xây d&#7921;ng; Tr&#432;&#7901;ng h&#7907;p
&#273;&#417;n v&#7883; t&#7921; làm, không có H&#7907;p &#273;&#7891;ng xây d&#7921;ng
th\u0301 ph&#7843;i nêu r\u01a1 trong &#273;&#417;n xin mi&#7877;n ti&#7873;n thuê &#273;&#7845;t.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:36.0pt;line-height:normal'><span style='mso-fareast-font-family:"Times New Roman";mso-bidi-font-family:"Times New Roman"'>-
Biên b&#7843;n bàn giao &#273;&#7845;t trên th&#7921;c &#273;&#7883;a.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:36.0pt;line-height:normal'><span style='mso-fareast-font-family:"Times New Roman";mso-bidi-font-family:"Times New Roman"'>c.2.2)
Sau khi công tr\u0301nh ho&#7863;c h&#7841;ng m&#7909;c công tr\u0301nh &#273;&#432;&#7907;c
hoàn thành, bàn giao &#273;&#432;a vào khai thác s&#7917; d&#7909;ng, ng&#432;&#7901;i
thuê &#273;&#7845;t ph&#7843;i xu&#7845;t tr\u0301nh &#273;&#7847;y &#273;&#7911;
các gi&#7845;y t&#7901; &#273;&#7875; c&#417; quan Thu&#7871; có c&#259;n c&#7913;
ban hành Quy&#7871;t &#273;&#7883;nh mi&#7877;n ti&#7873;n thuê &#273;&#7845;t
bao g&#7891;m:</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:36.0pt;line-height:normal'><span style='mso-fareast-font-family:"Times New Roman";mso-bidi-font-family:"Times New Roman"'>+
Biên b&#7843;n nghi&#7879;m thu, bàn giao công tr\u0301nh, h&#7841;ng m&#7909;c công
tr\u0301nh hoàn thành, &#273;&#432;a vào khai thác, s&#7917; d&#7909;ng &#273;&#432;&#7907;c
l&#7853;p gi&#7919;a ch&#7911; &#273;&#7847;u t&#432; xây d&#7921;ng công tr\u0301nh
và nhà th&#7847;u thi công xây d&#7921;ng công tr\u0301nh.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:36.0pt;line-height:normal'><span style='mso-fareast-font-family:"Times New Roman";mso-bidi-font-family:"Times New Roman"'>Ho&#7863;c
các ch&#7913;ng t&#7915; ch&#7913;ng minh vi&#7879;c &#273;&#417;n v&#7883; t&#7921;
xây d&#7921;ng trong tr&#432;&#7901;ng h&#7907;p &#273;&#417;n v&#7883; t&#7921;
th&#7921;c hi&#7879;n ho&#7841;t &#273;&#7897;ng xây d&#7921;ng c&#417; b&#7843;n.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:36.0pt;line-height:normal'><span style='mso-fareast-font-family:"Times New Roman";mso-bidi-font-family:"Times New Roman"'>c.3)
Tr&#432;&#7901;ng h&#7907;p &#273;&#432;&#7907;c mi&#7877;n, gi&#7843;m theo di&#7879;n
&#432;u &#273;\u0103i &#273;&#7847;u t&#432; theo quy &#273;&#7883;nh c&#7911;a pháp
lu&#7853;t v&#7873; &#273;&#7847;u t&#432; ho&#7863;c &#273;&#7889;i v&#7899;i
c&#417; s&#7903; s&#7843;n xu&#7845;t kinh doanh m&#7899;i c&#7911;a t&#7893;
ch&#7913;c kinh t&#7871; th&#7921;c hi&#7879;n di d&#7901;i theo quy ho&#7841;ch,
di d&#7901;i do ô nhi&#7877;m môi tr&#432;&#7901;ng:</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:36.0pt;line-height:normal'><span style='mso-fareast-font-family:"Times New Roman";mso-bidi-font-family:"Times New Roman";
color:red'>- Các lo&#7841;i gi&#7845;y v&#7873; &#432;u &#273;\u0103i &#273;&#7847;u
t&#432; (n&#7871;u có) có ghi &#432;u &#273;\u0103i v&#7873; ti&#7873;n thuê &#273;&#7845;t,
thuê m&#7863;t n&#432;&#7899;c nh&#432;: Gi&#7845;y ch&#7913;ng nh&#7853;n
&#432;u &#273;\u0103i &#273;&#7847;u t&#432;, Gi&#7845;y phép &#273;&#7847;u
t&#432;, Gi&#7845;y ch&#7913;ng nh&#7853;n &#273;&#7847;u t&#432; do c&#417;
quan nhà n&#432;&#7899;c có th&#7849;m quy&#7873;n c&#7845;p (B&#7843;n sao có
xác nh&#7853;n công ch&#7913;ng ho&#7863;c ch&#7913;ng th&#7921;c).</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:36.0pt;line-height:normal'><span style='mso-fareast-font-family:"Times New Roman";mso-bidi-font-family:"Times New Roman"'>-
Quy&#7871;t &#273;&#7883;nh c&#7911;a c&#417; quan nhà n&#432;&#7899;c có th&#7849;m
quy&#7873;n v&#7873; vi&#7879;c di d&#7901;i c&#417; s&#7903; s&#7843;n xu&#7845;t
kinh doanh theo quy ho&#7841;ch ho&#7863;c do ô nhi&#7877;m môi tr&#432;&#7901;ng.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:36.0pt;line-height:normal'><span style='mso-fareast-font-family:"Times New Roman";mso-bidi-font-family:"Times New Roman"'>-
Quy&#7871;t &#273;&#7883;nh cho thuê &#273;&#7845;t, H&#7907;p &#273;&#7891;ng
thuê &#273;&#7845;t ho&#7863;c Biên b&#7843;n bàn giao &#273;&#7845;t trên th&#7921;c
&#273;&#7883;a t&#7841;i n&#417;i c&#417; s&#7903; s&#7843;n xu&#7845;t kinh
doanh m&#7899;i.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:36.0pt;line-height:normal'><span style='mso-fareast-font-family:"Times New Roman";mso-bidi-font-family:"Times New Roman"'>c.4)
Tr&#432;&#7901;ng h&#7907;p &#273;&#432;&#7907;c mi&#7877;n, gi&#7843;m &#273;&#7889;i
v&#7899;i d&#7921; án xây d&#7921;ng tr&#7909; s&#7903; làm vi&#7879;c, &#273;&#7845;t
thuê thu&#7897;c d&#7921; án xây d&#7921;ng tr&#7909; s&#7903; làm vi&#7879;c c&#7911;a
các c&#417; quan &#273;&#7841;i di&#7879;n ngo&#7841;i giao, c&#417; quan l\u0103nh
s&#7921; n&#432;&#7899;c ngoài và c&#417; quan &#273;&#7841;i di&#7879;n c&#7911;a
t&#7893; ch&#7913;c qu&#7889;c t&#7871; t&#7841;i Vi&#7879;t Nam theo &#273;i&#7873;u
&#432;&#7899;c qu&#7889;c t&#7871; mà Vi&#7879;t Nam là thành viên ho&#7863;c
theo nguyên t&#7855;c có &#273;i có l&#7841;i.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:36.0pt;line-height:normal'><span style='mso-fareast-font-family:"Times New Roman";mso-bidi-font-family:"Times New Roman"'>Tr&#432;&#7901;ng
h&#7907;p này, ng&#432;&#7901;i thuê &#273;&#7845;t ph&#7843;i xu&#7845;t tr\u0301nh
v&#7899;i c&#417; quan Thu&#7871;: Hi&#7879;p &#273;&#7883;nh, ho&#7863;c th&#7887;a
thu&#7853;n, ho&#7863;c cam k&#7871;t c&#7911;a Chính ph&#7911; Vi&#7879;t Nam
v&#7899;i t&#7893; ch&#7913;c qu&#7889;c t&#7871; v&#7873; vi&#7879;c mi&#7877;n,
gi&#7843;m ti&#7873;n thuê &#273;&#7845;t; ho&#7863;c Gi&#7845;y xác nh&#7853;n
c&#7911;a B&#7897; Ngo&#7841;i giao Vi&#7879;t Nam ho&#7863;c c&#417; quan ngo&#7841;i
v&#7909; &#273;&#7883;a ph&#432;&#417;ng &#273;&#432;&#7907;c B&#7897; Ngo&#7841;i
giao &#7911;y quy&#7873;n.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:36.0pt;line-height:normal'><span style='mso-fareast-font-family:"Times New Roman";mso-bidi-font-family:"Times New Roman"'>c.5)
Tr&#432;&#7901;ng h&#7907;p &#273;&#432;&#7907;c mi&#7877;n, gi&#7843;m ti&#7873;n
thuê &#273;&#7845;t do Th&#7911; t&#432;&#7899;ng Chính ph&#7911; quy&#7871;t
&#273;&#7883;nh theo &#273;&#7873; ngh&#7883; c&#7911;a B&#7897; tr&#432;&#7903;ng,
Th&#7911; tr&#432;&#7903;ng c&#417; quan ngang B&#7897;, c&#417; quan thu&#7897;c
Chính ph&#7911;, Ch&#7911; t&#7883;ch &#7910;y ban nhân dân các t&#7881;nh,
thành ph&#7889; tr&#7921;c thu&#7897;c Trung &#432;&#417;ng, h&#7891; s&#417;
ph&#7843;i có: Quy&#7871;t &#273;&#7883;nh c&#7911;a Th&#7911; t&#432;&#7899;ng
Chính ph&#7911; (B&#7843;n sao có xác nh&#7853;n công ch&#7913;ng ho&#7863;c ch&#7913;ng
th&#7921;c).</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:36.0pt;line-height:normal'><span style='mso-fareast-font-family:"Times New Roman";mso-bidi-font-family:"Times New Roman"'>6.
Th&#7901;i h&#7841;n gi&#7843;i quy&#7871;t h&#7891; s&#417; mi&#7877;n thu&#7871;,
gi&#7843;m thu&#7871;</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:36.0pt;line-height:normal'><span style='mso-fareast-font-family:"Times New Roman";mso-bidi-font-family:"Times New Roman"'>Trong
th&#7901;i h&#7841;n 30 (ba m&#432;&#417;i) ngày, k&#7875; t&#7915; ngày nh&#7853;n
&#273;&#7911; h&#7891; s&#417;, c&#417; quan thu&#7871; ph&#7843;i ki&#7875;m
tra h&#7891; s&#417; theo quy &#273;&#7883;nh t&#7841;i &#272;i&#7873;u 60
Thông t&#432; này và ra quy&#7871;t &#273;&#7883;nh mi&#7877;n thu&#7871;, gi&#7843;m
thu&#7871; theo m&#7851;u s&#7889; 03/MGTH ho&#7863;c thông báo cho ng&#432;&#7901;i
n&#7897;p thu&#7871; l\u01b0 do không thu&#7897;c di&#7879;n &#273;&#432;&#7907;c mi&#7877;n
thu&#7871;, gi&#7843;m thu&#7871; theo m&#7851;u s&#7889; 04/MGTH ban hành kèm
theo Thông t&#432; này.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:36.0pt;line-height:normal'><span style='mso-fareast-font-family:"Times New Roman";mso-bidi-font-family:"Times New Roman"'>Tr&#432;&#7901;ng
h&#7907;p ng&#432;&#7901;i n&#7897;p thu&#7871; không gi&#7843;i tr\u0301nh, b&#7893;
sung thông tin, tài li&#7879;u theo thông báo c&#7911;a c&#417; quan thu&#7871;;
không khai b&#7893; sung h&#7891; s&#417; thu&#7871; ho&#7863;c gi&#7843;i
tr\u0301nh, khai b&#7893; sung h&#7891; s&#417; thu&#7871; nh&#432;ng không ch&#7913;ng
minh &#273;&#432;&#7907;c s&#7889; thu&#7871; &#273;\u0103 khai là &#273;úng th\u0301
c&#417; quan thu&#7871; ti&#7871;n hành ki&#7875;m tra th&#7921;c t&#7871;. Th&#7901;i
h&#7841;n ra quy&#7871;t &#273;&#7883;nh mi&#7877;n thu&#7871;, gi&#7843;m thu&#7871;
trong tr&#432;&#7901;ng h&#7907;p này là 60 (sáu m&#432;&#417;i) ngày, k&#7875;
t&#7915; ngày nh&#7853;n &#273;&#7911; h&#7891; s&#417;.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:36.0pt;line-height:normal'><span style='mso-fareast-font-family:"Times New Roman";mso-bidi-font-family:"Times New Roman"'>7.
Th&#7849;m quy&#7873;n gi&#7843;i quy&#7871;t vi&#7879;c mi&#7877;n thu&#7871;,
gi&#7843;m thu&#7871;</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:36.0pt;line-height:normal'><span style='mso-fareast-font-family:"Times New Roman";mso-bidi-font-family:"Times New Roman"'>a)
&#272;&#7889;i v&#7899;i ti&#7873;n s&#7917; d&#7909;ng &#273;&#7845;t và ti&#7873;n
thuê &#273;&#7845;t, thuê m&#7863;t n&#432;&#7899;c:</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:36.0pt;line-height:normal'><span style='mso-fareast-font-family:"Times New Roman";mso-bidi-font-family:"Times New Roman"'>-
C&#7909;c tr&#432;&#7903;ng C&#7909;c Thu&#7871; ban hành quy&#7871;t &#273;&#7883;nh
mi&#7877;n, gi&#7843;m ti&#7873;n thuê &#273;&#7845;t, thuê m&#7863;t n&#432;&#7899;c
và quy&#7871;t &#273;&#7883;nh mi&#7877;n, gi&#7843;m ti&#7873;n s&#7917; d&#7909;ng
&#273;&#7845;t &#273;&#7889;i v&#7899;i ng&#432;&#7901;i n&#7897;p thu&#7871;
là t&#7893; ch&#7913;c kinh t&#7871;; T&#7893; ch&#7913;c, cá nhân n&#432;&#7899;c
ngoài, ng&#432;&#7901;i Vi&#7879;t Nam &#273;&#7883;nh c&#432; &#7903; n&#432;&#7899;c
ngoài.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:36.0pt;line-height:normal'><span style='mso-fareast-font-family:"Times New Roman";mso-bidi-font-family:"Times New Roman"'>-
Chi c&#7909;c tr&#432;&#7903;ng Chi c&#7909;c Thu&#7871; ban hành quy&#7871;t
&#273;&#7883;nh mi&#7877;n, gi&#7843;m ti&#7873;n thuê &#273;&#7845;t, thuê m&#7863;t
n&#432;&#7899;c và quy&#7871;t &#273;&#7883;nh mi&#7877;n, gi&#7843;m ti&#7873;n
s&#7917; d&#7909;ng &#273;&#7845;t &#273;&#7889;i v&#7899;i ng&#432;&#7901;i n&#7897;p
thu&#7871; là h&#7897; gia &#273;\u0301nh, cá nhân.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:36.0pt;line-height:normal'><span style='mso-fareast-font-family:"Times New Roman";mso-bidi-font-family:"Times New Roman"'>b)
Vi&#7879;c mi&#7877;n, gi&#7843;m các lo&#7841;i thu&#7871; khác &#273;&#7889;i
v&#7899;i tr&#432;&#7901;ng h&#7907;p c&#417; quan thu&#7871; quy&#7871;t
&#273;&#7883;nh mi&#7877;n thu&#7871;, gi&#7843;m thu&#7871;: H&#7891; s&#417;
mi&#7877;n thu&#7871;, gi&#7843;m thu&#7871; &#273;&#432;&#7907;c n&#7897;p t&#7841;i
c&#417; quan thu&#7871; qu&#7843;n l\u01b0 tr&#7921;c ti&#7871;p c&#7845;p nào th\u0301
Th&#7911; tr&#432;&#7903;ng c&#417; quan thu&#7871; c&#7845;p &#273;ó quy&#7871;t
&#273;&#7883;nh vi&#7879;c mi&#7877;n, gi&#7843;m thu&#7871; ho&#7863;c thông
báo cho ng&#432;&#7901;i n&#7897;p thu&#7871; l\u01b0 do không &#273;&#432;&#7907;c
mi&#7877;n thu&#7871;, gi&#7843;m thu&#7871;.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'></p>
