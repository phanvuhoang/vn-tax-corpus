các kho&#7843;n thu không &#273;úng quy &#273;&#7883;nh &#273;&#7889;i
v&#7899;i hành vi vi ph&#7841;m quy &#273;&#7883;nh t&#7841;i &#272;i&#7875;m c
Kho&#7843;n 2 &#272;i&#7873;u này.</span></p>

<p style='margin:0cm;margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><a
name="muc_4"><b><span lang=VI style='font-size:14.0pt;C
4. HÀNH VI VI PH&#7840;M HÀNH CHÍNH TRONG L&#296;NH V&#7920;C &#272;&#258;NG K\u01af
KINH DOANH C&#7910;A DOANH NGHI&#7878;P, H&#7896; KINH DOANH, H&#7906;P TÁC X\u0102,
LIÊN HI&#7878;P H&#7906;P TÁC X\u0102, H\u0300NH TH&#7912;C X&#7916; PH&#7840;T VÀ
BI&#7878;N PHÁP KH&#7854;C PH&#7908;C H&#7852;U QU&#7842;</span></b></a><span
style='
margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><a
name="dieu_20"><b><span lang=VI style='font-size:14.0pt;i&#7873;u
20. Vi ph&#7841;m quy &#273;&#7883;nh v&#7873; kê khai h&#7891; s&#417;
&#273;&#259;ng k\u01b0 doanh nghi&#7879;p</span></b></a><span style='margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><span
lang=VI style='font-size:14.0pt;t ti&#7873;n
t&#7915; 10.000.000 &#273;&#7891;ng &#273;&#7871;n 15.000.000 &#273;&#7891;ng
&#273;&#7889;i v&#7899;i hành vi kê khai không trung th&#7921;c, không chính
xác trong tr&#432;&#7901;ng h&#7907;p:</span></p>

<p style='margin:0cm;margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><span
lang=VI style='font-size:14.0pt;&#259;ng k\u01b0
thành l&#7853;p doanh nghi&#7879;p;</span></p>

<p style='margin:0cm;margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><span
lang=VI style='font-size:14.0pt;&#259;ng k\u01b0 thay
&#273;&#7893;i n&#7897;i dung &#273;&#259;ng k\u01b0 doanh nghi&#7879;p;</span></p>

<p style='margin:0cm;margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><span
lang=VI style='font-size:14.0pt;&#259;ng k\u01b0
ho&#7841;t &#273;&#7897;ng c&#7911;a chi nhánh, v&#259;n ph\u0323ng &#273;&#7841;i di&#7879;n,
&#273;&#7883;a &#273;i&#7875;m kinh doanh;</span></p>

<p style='margin:0cm;margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><span
lang=VI style='font-size:14.0pt;&#259;ng k\u01b0 thay
&#273;&#7893;i n&#7897;i dung &#273;&#259;ng k\u01b0 ho&#7841;t &#273;&#7897;ng chi
nhánh, v&#259;n ph\u0323ng &#273;&#7841;i di&#7879;n, &#273;&#7883;a &#273;i&#7875;m
kinh doanh;</span></p>

<p style='margin:0cm;margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><span
lang=VI style='font-size:14.0pt;) &#272;&#259;ng k\u01b0
gi&#7843;i th&#7875; doanh nghi&#7879;p;</span></p>

<p style='margin:0cm;margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><span
lang=VI style='font-size:14.0pt;m
d&#7913;t ho&#7841;t &#273;&#7897;ng chi nhánh, v&#259;n ph\u0323ng &#273;&#7841;i
di&#7879;n, &#273;&#7883;a &#273;i&#7875;m kinh doanh;</span></p>

<p style='margin:0cm;margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><span
lang=VI style='font-size:14.0pt;m
ng&#7915;ng kinh doanh.</span></p>

<p style='margin:0cm;margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><span
lang=VI style='font-size:14.0pt;n pháp
kh&#7855;c ph&#7909;c h&#7853;u qu&#7843;: Bu&#7897;c &#273;&#259;ng k\u01b0 thay
&#273;&#7893;i và thông báo l&#7841;i các thông tin doanh nghi&#7879;p &#273;\u0103
kê khai không trung th&#7921;c, không chính xác.</span></p>

<p style='margin:0cm;margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><a
name="dieu_21"><b><span lang=VI style='font-size:14.0pt;i&#7873;u
21. Vi ph&#7841;m quy &#273;&#7883;nh v&#7873; th&#7901;i h&#7841;n
&#273;&#259;ng k\u01b0 thay &#273;&#7893;i n&#7897;i dung &#273;&#259;ng k\u01b0 doanh
nghi&#7879;p</span></b></a><span style='margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><span
lang=VI style='font-size:14.0pt;t ti&#7873;n
t&#7915; 1.000.000 &#273;&#7891;ng &#273;&#7871;n 2.000.000 &#273;&#7891;ng
&#273;&#7889;i v&#7899;i hành vi &#273;&#259;ng k\u01b0 thay &#273;&#7893;i
n&#7897;i dung &#273;&#259;ng k\u01b0 doanh nghi&#7879;p không &#273;úng th&#7901;i
h&#7841;n quy &#273;&#7883;nh.</span></p>

<p style='margin:0cm;margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><span
lang=VI style='font-size:14.0pt;t ti&#7873;n
t&#7915; 2.000.000 &#273;&#7891;ng &#273;&#7871;n 5.000.000 &#273;&#7891;ng
&#273;&#7889;i v&#7899;i hành vi không &#273;&#259;ng k\u01b0 thay &#273;&#7893;i
n&#7897;i dung &#273;&#259;ng k\u01b0 doanh nghi&#7879;p sau 10 ngày k&#7875;
t&#7915; ngày có quy&#7871;t &#273;&#7883;nh thay &#273;&#7893;i.</span></p>

<p style='margin:0cm;margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><span
lang=VI style='font-size:14.0pt;n pháp
kh&#7855;c ph&#7909;c h&#7853;u qu&#7843;: Bu&#7897;c &#273;&#259;ng k\u01b0 thay
&#273;&#7893;i các n&#7897;i dung &#273;&#259;ng k\u01b0 doanh nghi&#7879;p theo quy
&#273;&#7883;nh &#273;&#7889;i v&#7899;i hành vi vi ph&#7841;m quy
&#273;&#7883;nh t&#7841;i Kho&#7843;n 2 &#272;i&#7873;u này.</span></p>

<p style='margin:0cm;margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><a
name="dieu_22"><b><span lang=VI style='font-size:14.0pt;i&#7873;u
22. Vi ph&#7841;m quy &#273;&#7883;nh v&#7873; công b&#7889; n&#7897;i dung
&#273;&#259;ng k\u01b0 doanh nghi&#7879;p</span></b></a><span style='margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><span
lang=VI style='font-size:14.0pt;t ti&#7873;n
t&#7915; 1.000.000 &#273;&#7891;ng &#273;&#7871;n 2.000.000 &#273;&#7891;ng
&#273;&#7889;i v&#7899;i hành vi không công b&#7889; ho&#7863;c công b&#7889; không
&#273;úng th&#7901;i h&#7841;n quy &#273;&#7883;nh n&#7897;i dung
&#273;&#259;ng k\u01b0 doanh nghi&#7879;p trên C&#7893;ng thông tin &#273;&#259;ng
k\u01b0 doanh nghi&#7879;p qu&#7889;c gia theo quy &#273;&#7883;nh.</span></p>

<p style='margin:0cm;margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><span
lang=VI style='font-size:14.0pt;n pháp
kh&#7855;c ph&#7909;c h&#7853;u qu&#7843;: Bu&#7897;c ph&#7843;i công b&#7889;
n&#7897;i dung &#273;&#259;ng k\u01b0 doanh nghi&#7879;p trên C&#7893;ng thông tin
&#273;&#259;ng k\u01b0 doanh nghi&#7879;p qu&#7889;c gia theo quy &#273;&#7883;nh.</span></p>

<p style='margin:0cm;margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><a
name="dieu_23"><b><span lang=VI style='font-size:14.0pt;i&#7873;u
23. Vi ph&#7841;m các quy &#273;&#7883;nh v&#7873; thành l&#7853;p doanh
nghi&#7879;p</span></b></a><span style='margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><span
lang=VI style='font-size:14.0pt;t ti&#7873;n
t&#7915; 5.000.000 &#273;&#7891;ng &#273;&#7871;n 10.000.000 &#273;&#7891;ng
&#273;&#7889;i v&#7899;i m&#7897;t trong các hành vi sau:</span></p>

<p style='margin:0cm;margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><span
lang=VI style='font-size:14.0pt;p t&#7909;c
ho&#7841;t &#273;&#7897;ng khi &#273;\u0103 k&#7871;t thúc th&#7901;i h&#7841;n
ho&#7841;t &#273;&#7897;ng ghi trong &#272;i&#7873;u l&#7879; mà không
&#273;&#432;&#7907;c gia h&#7841;n;</span></p>

<p style='margin:0cm;margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><span
lang=VI style='font-size:14.0pt;úng
h&#7841;n s&#7889; v&#7889;n &#273;\u0103 &#273;&#259;ng k\u01b0.</span></p>

<p style='margin:0cm;margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><span
lang=VI style='font-size:14.0pt;t ti&#7873;n
t&#7915; 10.000.000 &#273;&#7891;ng &#273;&#7871;n 20.000.000 &#273;&#7891;ng
&#273;&#7889;i v&#7899;i hành vi không góp &#273;&#7911; s&#7889; v&#7889;n
nh&#432; &#273;\u0103 &#273;&#259;ng k\u01b0.</span></p>

<p style='margin:0cm;margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><span
lang=VI style='font-size:14.0pt;t ti&#7873;n
t&#7915; 25.000.000 &#273;&#7891;ng &#273;&#7871;n 30.000.000 &#273;&#7891;ng
&#273;&#7889;i v&#7899;i m&#7897;t trong các hành vi sau:</span></p>

<p style='margin:0cm;margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><span
lang=VI style='font-size:14.0pt; \u01b0
&#273;&#7883;nh giá tài s&#7843;n góp v&#7889;n không &#273;úng giá tr&#7883;
th&#7921;c t&#7871;;</span></p>

<p style='margin:0cm;margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><span
lang=VI style='font-size:14.0pt;&#7899;i danh ngh&#297;a doanh nghi&#7879;p khi &#273;\u0103 b&#7883; thu
h&#7891;i Gi&#7845;y ch&#7913;ng nh&#7853;n &#273;&#259;ng k\u01b0 doanh
nghi&#7879;p ho&#7863;c &#273;\u0103 gi&#7843;i th&#7875;;</span></p>

<p style='margin:0cm;margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><span
lang=VI style='font-size:14.0pt;&#7899;i h\u0301nh th&#7913;c doanh nghi&#7879;p mà không &#273;&#259;ng k\u01b0
thành l&#7853;p doanh nghi&#7879;p.</span></p>

<p style='margin:0cm;margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><span
lang=VI style='font-size:14.0pt;n pháp
kh&#7855;c ph&#7909;c h&#7853;u qu&#7843;:</span></p>

<p style='margin:0cm;margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><span
lang=VI style='font-size:14.0pt;c
&#273;&#259;ng k\u01b0 gia h&#7841;n ho&#7841;t &#273;&#7897;ng &#273;&#7889;i
v&#7899;i hành vi vi ph&#7841;m quy &#273;&#7883;nh t&#7841;i &#272;i&#7875;m a
Kho&#7843;n 1 &#272;i&#7873;u này;</span></p>

<p style='margin:0cm;margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><span
lang=VI style='font-size:14.0pt;c
&#273;&#259;ng k\u01b0 gi&#7843;m v&#7889;n &#273;i&#7873;u l&#7879; theo quy
&#273;&#7883;nh &#273;&#7889;i v&#7899;i công ty trách nhi&#7879;m h&#7919;u
h&#7841;n hai thành viên tr&#7903; lên ho&#7863;c bu&#7897;c góp &#273;&#7911;
s&#7889; v&#7889;n nh&#432; &#273;\u0103 &#273;&#259;ng k\u01b0 &#273;&#7889;i v&#7899;i
các lo&#7841;i h\u0301nh doanh nghi&#7879;p khác có hành vi vi ph&#7841;m quy
&#273;&#7883;nh t&#7841;i Kho&#7843;n 2 &#272;i&#7873;u này;</span></p>

<p style='margin:0cm;margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><span
lang=VI style='font-size:14.0pt;c
&#273;&#7883;nh giá l&#7841;i tài s&#7843;n góp v&#7889;n &#273;&#7889;i
v&#7899;i hành vi vi ph&#7841;m quy &#273;&#7883;nh t&#7841;i &#272;i&#7875;m a
Kho&#7843;n 3 &#272;i&#7873;u này;</span></p>

<p style='margin:0cm;margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><span
lang=VI style='font-size:14.0pt;c
&#273;&#259;ng k\u01b0 thành l&#7853;p doanh nghi&#7879;p &#273;&#7889;i v&#7899;i
hành vi vi ph&#7841;m quy &#273;&#7883;nh t&#7841;i &#272;i&#7875;m c
Kho&#7843;n 3 &#272;i&#7873;u này.</span></p>

<p style='margin:0cm;margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><a
name="dieu_24"><b><span lang=VI style='font-size:14.0pt;i&#7873;u
24. Vi ph&#7841;m quy &#273;&#7883;nh v&#7873; &#273;&#259;ng k\u01b0
ng&#432;&#7901;i thành l&#7853;p doanh nghi&#7879;p</span></b></a><span
style='
margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><span
lang=VI style='font-size:14.0pt;t ti&#7873;n
t&#7915; 5.000.000 &#273;&#7891;ng &#273;&#7871;n 10.000.000 &#273;&#7891;ng
&#273;&#7889;i v&#7899;i hành vi &#273;&#259;ng k\u01b0 ch&#7911; s&#7903; h&#7919;u
công ty trách nhi&#7879;m h&#7919;u h&#7841;n m&#7897;t thành viên, ch&#7911;
doanh nghi&#7879;p t&#432; nhân, thành viên công ty trách nhi&#7879;m h&#7919;u
h&#7841;n, thành viên góp v&#7889;n, thành viên h&#7907;p danh, c&#7893;
&#273;ông sáng l&#7853;p là cá nhân, t&#7893; ch&#7913;c theo quy
&#273;&#7883;nh pháp lu&#7853;t không &#273;&#432;&#7907;c quy&#7873;n thành
l&#7853;p doanh nghi&#7879;p.</span></p>

<p style='margin:0cm;margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><span
lang=VI style='font-size:14.0pt;n pháp
kh&#7855;c ph&#7909;c h&#7853;u qu&#7843;: Bu&#7897;c &#273;&#259;ng k\u01b0 thay
&#273;&#7893;i &#273;&#7889;i v&#7899;i thành viên, thành viên góp v&#7889;n,
thành viên h&#7907;p danh, c&#7893; &#273;ông sáng l&#7853;p là cá nhân,
t&#7893; ch&#7913;c theo quy &#273;&#7883;nh.</span></p>

<p style='margin:0cm;margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><a
name="dieu_25"><b><span lang=VI style='font-size:14.0pt;i&#7873;u
25. Vi ph&#7841;m v&#7873; vi&#7879;c kinh doanh ngành, ngh&#7873; không có
trong Gi&#7845;y ch&#7913;ng nh&#7853;n &#273;&#259;ng k\u01b0 doanh nghi&#7879;p</span></b></a><span
style='
margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><span
lang=VI style='font-size:14.0pt;t ti&#7873;n
t&#7915; 15.000.000 &#273;&#7891;ng &#273;&#7871;n 20.000.000 &#273;&#7891;ng
&#273;&#7889;i v&#7899;i hành vi kinh doanh ngành, ngh&#7873; không có trong
Gi&#7845;y ch&#7913;ng nh&#7853;n &#273;&#259;ng k\u01b0 doanh nghi&#7879;p.</span></p>

<p style='margin:0cm;margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><a
name="dieu_26"><b><span lang=VI style='font-size:14.0pt;i&#7873;u
26. Vi ph&#7841;m quy &#273;&#7883;nh v&#7873; vi&#7879;c thuê Giám
&#273;&#7889;c doanh nghi&#7879;p t&#432; nhân</span></b></a><span
style='
margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><span
lang=VI style='font-size:14.0pt;t ti&#7873;n
t&#7915; 10.000.000 &#273;&#7891;ng &#273;&#7871;n 15.000.000 &#273;&#7891;ng
&#273;&#7889;i v&#7899;i hành vi thuê ng&#432;&#7901;i khác làm Giám
&#273;&#7889;c doanh nghi&#7879;p t&#432; nhân nh&#432;ng không &#273;&#259;ng
k\u01b0.</span></p>

<p style='margin:0cm;margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><span
lang=VI style='font-size:14.0pt;n pháp
kh&#7855;c ph&#7909;c h&#7853;u qu&#7843;: Bu&#7897;c &#273;&#259;ng k\u01b0
b&#7893; sung Giám &#273;&#7889;c.</span></p>

<p style='margin:0cm;margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><a
name="dieu_27"><b><span lang=VI style='font-size:14.0pt;i&#7873;u
27. Vi ph&#7841;m quy &#273;&#7883;nh v&#7873; &#273;&#259;ng k\u01b0 thay
&#273;&#7893;i thành viên</span></b></a><span style='margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><span
lang=VI style='font-size:14.0pt;t ti&#7873;n
t&#7915; 15.000.000 &#273;&#7891;ng &#273;&#7871;n 20.000.000 &#273;&#7891;ng
&#273;&#7889;i v&#7899;i hành vi không &#273;&#259;ng k\u01b0 thay &#273;&#7893;i
thành viên trong th&#7901;i h&#7841;n quy &#273;&#7883;nh k&#7875; t&#7915;
ngày cam k&#7871;t góp v&#7889;n l&#7847;n cu&#7889;i theo quy &#273;&#7883;nh
c&#7911;a pháp lu&#7853;t.</span></p>

<p style='margin:0cm;margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><span
lang=VI style='font-size:14.0pt;n pháp
kh&#7855;c ph&#7909;c h&#7853;u qu&#7843;: Bu&#7897;c &#273;&#259;ng k\u01b0 thay
&#273;&#7893;i thành viên theo k&#7871;t qu&#7843; góp v&#7889;n th&#7921;c
t&#7871; c&#7911;a các thành viên công ty.</span></p>

<p style='margin:0cm;margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><a
name="dieu_28"><b><span lang=VI style='font-size:14.0pt;i&#7873;u
28. Vi ph&#7841;m quy &#273;&#7883;nh v&#7873; vi&#7879;c th&#7921;c hi&#7879;n
yêu c&#7847;u c&#7911;a c&#417; quan &#273;&#259;ng k\u01b0 kinh doanh</span></b></a><span
style='
margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><span
lang=VI style='font-size:14.0pt;t ti&#7873;n
t&#7915; 15.000.000 &#273;&#7891;ng &#273;&#7871;n 20.000.000 &#273;&#7891;ng
&#273;&#7889;i v&#7899;i m&#7897;t trong các hành vi sau:</span></p>

<p style='margin:0cm;margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><span
lang=VI style='font-size:14.0pt;p t&#7909;c
kinh doanh ngành, ngh&#7873; kinh doanh có &#273;i&#7873;u ki&#7879;n khi có
yêu c&#7847;u t&#7841;m d&#7915;ng c&#7911;a Ph\u0323ng &#273;&#259;ng k\u01b0 kinh doanh
c&#7845;p t&#7881;nh;</span></p>

<p style='margin:0cm;margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><span
lang=VI style='font-size:14.0pt;&#259;ng
k\u01b0 thay &#273;&#7893;i tên c&#7911;a doanh nghi&#7879;p theo yêu c&#7847;u
c&#7911;a Ph\u0323ng &#273;&#259;ng k\u01b0 kinh doanh c&#7845;p t&#7881;nh
&#273;&#7889;i v&#7899;i tr&#432;&#7901;ng h&#7907;p doanh nghi&#7879;p có tên
xâm ph&#7841;m quy&#7873;n b&#7843;o h&#7897; s&#7903; h&#7919;u công
nghi&#7879;p theo quy &#273;&#7883;nh c&#7911;a pháp lu&#7853;t.</span></p>

<p style='margin:0cm;margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><span
lang=VI style='font-size:14.0pt;n pháp
kh&#7855;c ph&#7909;c h&#7853;u qu&#7843;: Bu&#7897;c &#273;&#259;ng k\u01b0 thay
&#273;&#7893;i tên cho phù h&#7907;p v&#7899;i quy &#273;&#7883;nh c&#7911;a
pháp lu&#7853;t &#273;&#7889;i v&#7899;i hành vi vi ph&#7841;m quy
&#273;&#7883;nh t&#7841;i &#272;i&#7875;m b Kho&#7843;n 1 &#272;i&#7873;u này.</span></p>

<p style='margin:0cm;margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><a
name="dieu_29"><b><span lang=VI style='font-size:14.0pt;i&#7873;u
29. Vi ph&#7841;m quy &#273;&#7883;nh v&#7873; ch&#7871; &#273;&#7897; báo cáo</span></b></a><span
style='
margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><span
lang=VI style='font-size:14.0pt;t ti&#7873;n
t&#7915; 1.000.000 &#273;&#7891;ng &#273;&#7871;n 5.000.000 &#273;&#7891;ng
&#273;&#7889;i v&#7899;i m&#7897;t trong các hành vi sau:</span></p>

<p style='margin:0cm;margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><span
lang=VI style='font-size:14.0pt;p t&#432; nhân nh&#432;ng không báo cáo b&#7857;ng v&#259;n
b&#7843;n kèm theo h&#7907;p &#273;&#7891;ng cho thuê có công ch&#7913;ng
&#273;&#7871;n Ph\u0323ng &#273;&#259;ng k\u01b0 kinh doanh c&#7845;p t&#7881;nh và
c&#417; quan thu&#7871;;</span></p>

<p style='margin:0cm;margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><span
lang=VI style='font-size:14.0pt;p báo
cáo tài chính &#273;úng th&#7901;i h&#7841;n theo quy &#273;&#7883;nh.</span></p>

<p style='margin:0cm;margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><span
lang=VI style='font-size:14.0pt;n pháp
kh&#7855;c ph&#7909;c h&#7853;u qu&#7843;: Bu&#7897;c g&#7917;i báo cáo
t&#7899;i c&#417; quan qu&#7843;n l\u01b0 nhà n&#432;&#7899;c theo quy
&#273;&#7883;nh.</span></p>

<p style='margin:0cm;margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><a
name="dieu_30"><b><span lang=VI style='font-size:14.0pt;i&#7873;u
30. Vi ph&#7841;m quy &#273;&#7883;nh v&#7873; vi&#7879;c thông báo cho Ph\u0323ng
&#273;&#259;ng k\u01b0 kinh doanh c&#7845;p t&#7881;nh</span></b></a><span
style='
margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><span
lang=VI style='font-size:14.0pt;t ti&#7873;n
t&#7915; 1.000.000 &#273;&#7891;ng &#273;&#7871;n 2.000.000 &#273;&#7891;ng
&#273;&#7889;i v&#7899;i m&#7897;t trong các hành vi sau:</span></p>

<p style='margin:0cm;margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><span
lang=VI style='font-size:14.0pt;ng v&#259;n b&#7843;n trong th&#7901;i h&#7841;n quy &#273;&#7883;nh
v&#7873; th&#7901;i &#273;i&#7875;m và th&#7901;i h&#7841;n t&#7841;m
d&#7915;ng kinh doanh ho&#7863;c ti&#7871;p t&#7909;c kinh doanh theo quy
&#273;&#7883;nh c&#7911;a pháp lu&#7853;t;</span></p>

<p style='margin:0cm;margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><span
lang=VI style='font-size:14.0pt;ng v&#259;n b&#7843;n trong th&#7901;i h&#7841;n quy &#273;&#7883;nh
v&#7873; vi&#7879;c thay &#273;&#7893;i lo&#7841;i tài s&#7843;n góp v&#7889;n
c&#7911;a thành viên công ty trách nhi&#7879;m h&#7919;u h&#7841;n;</span></p>

<p style='margin:0cm;margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><span
lang=VI style='font-size:14.0pt;c góp v&#7889;n c&#7893; ph&#7847;n trong th&#7901;i h&#7841;n quy
&#273;&#7883;nh k&#7875; t&#7915; ngày &#273;&#432;&#7907;c c&#7845;p
Gi&#7845;y ch&#7913;ng nh&#7853;n &#273;&#259;ng k\u01b0 doanh nghi&#7879;p;</span></p>

<p style='margin:0cm;margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><span
lang=VI style='font-size:14.0pt;c thông báo không &#273;úng th&#7901;i h&#7841;n v&#7873; vi&#7879;c
bán doanh nghi&#7879;p t&#432; nhân;</span></p>

<p style='margin:0cm;margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><span
lang=VI style='font-size:14.0pt;) Không g&#7917;i
ho&#7863;c g&#7917;i không &#273;úng th&#7901;i h&#7841;n thông báo ch&#7881;
&#273;&#7883;nh ho&#7863;c thay th&#7871; ng&#432;&#7901;i &#273;&#7841;i
di&#7879;n theo &#7911;y quy&#7873;n &#273;&#7889;i v&#7899;i công ty trách
nhi&#7879;m h&#7919;u h&#7841;n;</span></p>

<p style='margin:0cm;margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><span
lang=VI style='font-size:14.0pt;t qu&#7843; ti&#7871;n &#273;&#7897; góp v&#7889;n b&#7857;ng v&#259;n
b&#7843;n trong th&#7901;i h&#7841;n quy &#273;&#7883;nh sau m&#7895;i &#273;&#7907;t
góp v&#7889;n theo cam k&#7871;t.</span></p>

<p style='margin:0cm;margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><span
lang=VI style='font-size:14.0pt;n pháp
kh&#7855;c ph&#7909;c h&#7853;u qu&#7843;: Bu&#7897;c thông báo &#273;&#7871;n
Ph\u0323ng &#273;&#259;ng k\u01b0 kinh doanh c&#7845;p t&#7881;nh các n&#7897;i dung theo
quy &#273;&#7883;nh.</span></p>

<p style='margin:0cm;margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><a
name="dieu_31"><b><span lang=VI style='font-size:14.0pt;i&#7873;u
31. Vi ph&#7841;m quy &#273;&#7883;nh v&#7873; ng&#432;&#7901;i &#273;&#7841;i
di&#7879;n theo pháp lu&#7853;t c&#7911;a doanh nghi&#7879;p</span></b></a><span
style='
margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><span
lang=VI style='font-size:14.0pt;t ti&#7873;n
t&#7915; 10.000.000 &#273;&#7891;ng &#273;&#7871;n 15.000.000 &#273;&#7891;ng &#273;&#7889;i
v&#7899;i m&#7897;t trong các hành vi sau:</span></p>

<p style='margin:0cm;margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><span
lang=VI style='font-size:14.0pt;&#7901;i
&#273;&#7841;i di&#7879;n theo pháp lu&#7853;t c&#7911;a doanh nghi&#7879;p
không th&#432;&#7901;ng trú t&#7841;i Vi&#7879;t <st1:country-region w:st="on"><st1:place
 w:st="on">Nam</st1:place></st1:country-region>;</span></p>

<p style='margin:0cm;margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><span
lang=VI style='font-size:14.0pt;&#7901;i
&#273;&#7841;i di&#7879;n theo pháp lu&#7853;t c&#7911;a doanh nghi&#7879;p
v&#7855;ng m&#7863;t t&#7841;i Vi&#7879;t Nam trên 30 ngày mà không &#7911;y
quy&#7873;n b&#7857;ng v&#259;n b&#7843;n cho ng&#432;&#7901;i khác
&#273;&#7875; th&#7921;c hi&#7879;n quy&#7873;n và ngh&#297;a v&#7909;
c&#7911;a m\u0301nh.</span></p>

<p style='margin:0cm;margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><span
lang=VI style='font-size:14.0pt;n pháp
kh&#7855;c ph&#7909;c h&#7853;u qu&#7843;:</span></p>

<p style='margin:0cm;margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><span
lang=VI style='font-size:14.0pt;c
&#273;&#259;ng k\u01b0 ng&#432;&#7901;i &#273;ang th&#432;&#7901;ng trú t&#7841;i
Vi&#7879;t <st1:country-region w:st="on"><st1:place w:st="on">Nam</st1:place></st1:country-region>
làm ng&#432;&#7901;i &#273;&#7841;i di&#7879;n theo pháp lu&#7853;t c&#7911;a
doanh nghi&#7879;p &#273;&#7889;i v&#7899;i hành vi vi ph&#7841;m quy
&#273;&#7883;nh t&#7841;i &#272;i&#7875;m a Kho&#7843;n 1 &#272;i&#7873;u này;</span></p>

<p style='margin:0cm;margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><span
lang=VI style='font-size:14.0pt;c ph&#7843;i
&#7911;y quy&#7873;n b&#7857;ng v&#259;n b&#7843;n cho ng&#432;&#7901;i khác
ho&#7863;c &#273;&#259;ng k\u01b0 ng&#432;&#7901;i khác c&#432; trú &#7903;
Vi&#7879;t <st1:country-region w:st="on"><st1:place w:st="on">Nam</st1:place></st1:country-region>
làm ng&#432;&#7901;i &#273;&#7841;i di&#7879;n theo pháp lu&#7853;t
&#273;&#7889;i v&#7899;i hành vi vi ph&#7841;m quy &#273;&#7883;nh t&#7841;i
&#272;i&#7875;m b Kho&#7843;n 1 &#272;i&#7873;u này.</span></p>

<p style='margin:0cm;margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><a
name="dieu_32"><b><span lang=VI style='font-size:14.0pt;i&#7873;u
32. Vi ph&#7841;m khác liên quan &#273;&#7871;n t&#7893; ch&#7913;c, qu&#7843;n
l\u01b0 doanh nghi&#7879;p</span></b></a><span style='margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><span
lang=VI style='font-size:14.0pt;t ti&#7873;n
t&#7915; 5.000.000 &#273;&#7891;ng &#273;&#7871;n 10.000.000 &#273;&#7891;ng
&#273;&#7889;i v&#7899;i m&#7897;t trong các hành vi sau:</span></p>

<p style='margin:0cm;margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><span
lang=VI style='font-size:14.0pt;n hành
h&#7885;p &#272;&#7841;i h&#7897;i &#273;&#7891;ng c&#7893; &#273;ông
th&#432;&#7901;ng niên trong th&#7901;i h&#7841;n quy &#273;&#7883;nh, k&#7875;
t&#7915; ngày k&#7871;t thúc n&#259;m tài chính mà không &#273;&#432;&#7907;c
Ph\u0323ng kinh doanh c&#7845;p t&#7881;nh gia h&#7841;n;</span></p>

<p style='margin:0cm;margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><span
lang=VI style='font-size:14.0pt; nhi&#7879;m
ng&#432;&#7901;i không &#273;&#432;&#7907;c quy&#7873;n qu&#7843;n l\u01b0 doanh
nghi&#7879;p gi&#7919; các ch&#7913;c danh qu&#7843;n l\u01b0;</span></p>

<p style='margin:0cm;margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><span
lang=VI style='font-size:14.0pt; nhi&#7879;m
Giám &#273;&#7889;c (T&#7893;ng Giám &#273;&#7889;c) công ty c&#7893;
ph&#7847;n không có &#273;&#7911; tiêu chu&#7849;n và &#273;i&#7873;u
ki&#7879;n theo quy &#273;&#7883;nh c&#7911;a pháp lu&#7853;t.</span></p>

<p style='margin:0cm;margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><span
lang=VI style='font-size:14.0pt;t ti&#7873;n
t&#7915; 10.000.000 &#273;&#7891;ng &#273;&#7871;n 15.000.000 &#273;&#7891;ng
&#273;&#7889;i v&#7899;i m&#7897;t trong các hành vi sau:</span></p>

<p style='margin:0cm;margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><span
lang=VI style='font-size:14.0pt;p
gi&#7845;y ch&#7913;ng nh&#7853;n ph&#7847;n v&#7889;n góp c&#7911;a thành viên
công ty theo quy &#273;&#7883;nh;</span></p>

<p style='margin:0cm;margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><span
lang=VI style='font-size:14.0pt;p s&#7893;
&#273;&#259;ng k\u01b0 thành viên, s&#7893; &#273;&#259;ng k\u01b0 c&#7893; &#273;ông
theo quy &#273;&#7883;nh;</span></p>

<p style='margin:0cm;margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><span
lang=VI style='font-size:14.0pt;n tên
doanh nghi&#7879;p t&#7841;i tr&#7909; s&#7903; chính, chi nhánh, v&#259;n
ph\u0323ng &#273;&#7841;i di&#7879;n c&#7911;a doanh nghi&#7879;p;</span></p>

<p style='margin:0cm;margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><span
lang=VI style='font-size:14.0pt;u
gi&#7919; các tài li&#7879;u và con d&#7845;u t&#7841;i tr&#7909; s&#7903;
chính theo quy &#273;&#7883;nh c&#7911;a pháp lu&#7853;t.</span></p>

<p style='margin:0cm;margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><span
lang=VI style='font-size:14.0pt;n pháp
kh&#7855;c ph&#7909;c h&#7853;u qu&#7843;:</span></p>

<p style='margin:0cm;margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><span
lang=VI style='font-size:14.0pt;c ti&#7871;n
hành h&#7885;p &#272;&#7841;i h&#7897;i &#273;&#7891;ng c&#7893; &#273;ông
th&#432;&#7901;ng niên theo quy &#273;&#7883;nh &#273;&#7889;i v&#7899;i hành
vi vi ph&#7841;m quy &#273;&#7883;nh t&#7841;i &#272;i&#7875;m a Kho&#7843;n 1 &#272;i&#7873;u
này;</span></p>

<p style='margin:0cm;margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><span
lang=VI style='font-size:14.0pt;c mi&#7877;n
nhi&#7879;m ch&#7913;c danh qu&#7843;n l\u01b0 c&#7911;a ng&#432;&#7901;i không
&#273;&#432;&#7907;c quy&#7873;n qu&#7843;n l\u01b0 doanh nghi&#7879;p
&#273;&#7889;i v&#7899;i hành vi vi ph&#7841;m quy &#273;&#7883;nh t&#7841;i
&#272;i&#7875;m b Kho&#7843;n 1 &#272;i&#7873;u này;</span></p>

<p style='margin:0cm;margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><span
lang=VI style='font-size:14.0pt;c mi&#7877;n
nhi&#7879;m ch&#7913;c danh Giám &#273;&#7889;c (T&#7893;ng Giám
&#273;&#7889;c) công ty c&#7893; ph&#7847;n &#273;&#7889;i v&#7899;i
ng&#432;&#7901;i không &#273;&#7911; tiêu chu&#7849;n và &#273;i&#7873;u
ki&#7879;n, &#273;&#7891;ng th&#7901;i, b&#7893; nhi&#7879;m ng&#432;&#7901;i
khác có &#273;&#7911; tiêu chu&#7849;n và &#273;i&#7873;u ki&#7879;n theo quy
&#273;&#7883;nh &#273;&#7889;i v&#7899;i hành vi vi ph&#7841;m quy
&#273;&#7883;nh t&#7841;i &#272;i&#7875;m c Kho&#7843;n 1 &#272;i&#7873;u này;</span></p>

<p style='margin:0cm;margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><span
lang=VI style='font-size:14.0pt;c c&#7845;p
gi&#7845;y ch&#7913;ng nh&#7853;n ph&#7847;n v&#7889;n góp cho&nbsp;&nbsp;
thành viên theo quy &#273;&#7883;nh &#273;&#7889;i v&#7899;i hành vi vi
ph&#7841;m quy &#273;&#7883;nh t&#7841;i &#272;i&#7875;m a Kho&#7843;n 2
&#272;i&#7873;u này;</span></p>

<p style='margin:0cm;margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><span
lang=VI style='font-size:14.0pt;) Bu&#7897;c
l&#7853;p s&#7893; &#273;&#259;ng k\u01b0 thành viên, s&#7893; &#273;&#259;ng k\u01b0 c&#7893;
&#273;ông theo quy &#273;&#7883;nh &#273;&#7889;i v&#7899;i hành vi vi
ph&#7841;m quy &#273;&#7883;nh t&#7841;i &#272;i&#7875;m b Kho&#7843;n 2
&#272;i&#7873;u này;</span></p>

<p style='margin:0cm;margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><span
lang=VI style='font-size:14.0pt;c g&#7855;n
tên doanh nghi&#7879;p t&#7841;i tr&#7909; s&#7903; chính, chi nhánh, v&#259;n
ph\u0323ng &#273;&#7841;i di&#7879;n c&#7911;a doanh nghi&#7879;p &#273;&#7889;i
v&#7899;i hành vi vi ph&#7841;m quy &#273;&#7883;nh t&#7841;i &#272;i&#7875;m c
Kho&#7843;n 2 &#272;i&#7873;u này;</span></p>

<p style='margin:0cm;margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><span
lang=VI style='font-size:14.0pt;c l&#432;u
gi&#7919; tài li&#7879;u và con d&#7845;u theo quy &#273;&#7883;nh
&#273;&#7889;i v&#7899;i hành vi vi ph&#7841;m quy &#273;&#7883;nh t&#7841;i
&#272;i&#7875;m d Kho&#7843;n 2 &#272;i&#7873;u này.</span></p>

<p style='margin:0cm;margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><a
name="dieu_33"><b><span lang=VI style='font-size:14.0pt;i&#7873;u
33. Vi ph&#7841;m quy &#273;&#7883;nh v&#7873; Ban ki&#7875;m soát</span></b></a><span
style='
margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><span
lang=VI style='font-size:14.0pt;t ti&#7873;n
t&#7915; 1.000.000 &#273;&#7891;ng &#273;&#7871;n 2.000.000 &#273;&#7891;ng
&#273;&#7889;i v&#7899;i hành vi t&#7893; ch&#7913;c Ban ki&#7875;m soát không
&#273;úng ho&#7863;c không &#273;&#7847;y &#273;&#7911; thành ph&#7847;n theo
quy &#273;&#7883;nh c&#7911;a pháp lu&#7853;t.</span></p>

<p style='margin:0cm;margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><span
lang=VI style='font-size:14.0pt;t ti&#7873;n
t&#7915; 5.000.000 &#273;&#7891;ng &#273;&#7871;n 10.000.000 &#273;&#7891;ng
&#273;&#7889;i v&#7899;i m&#7897;t trong các hành vi sau:</span></p>

<p style='margin:0cm;margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><span
lang=VI style='font-size:14.0pt;m h&#7919;u h&#7841;n có t&#7915; 11 thành viên tr&#7903; lên
nh&#432;ng không thành l&#7853;p Ban ki&#7875;m soát;</span></p>

<p style='margin:0cm;margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><span
lang=VI style='font-size:14.0pt;
ph&#7847;n có trên 11 c&#7893; &#273;ông là cá nhân ho&#7863;c có m&#7897;t
c&#7893; &#273;ông là t&#7893; ch&#7913;c s&#7903; h&#7919;u trên 50% c&#7893;
ph&#7847;n c&#7911;a công ty nh&#432;ng không thành l&#7853;p Ban ki&#7875;m
soát.</span></p>

<p style='margin:0cm;margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><span
lang=VI style='font-size:14.0pt;n pháp
kh&#7855;c ph&#7909;c h&#7853;u qu&#7843;:</span></p>

<p style='margin:0cm;margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><span
lang=VI style='font-size:14.0pt;c t&#7893;
ch&#7913;c l&#7841;i Ban ki&#7875;m soát theo &#273;úng quy &#273;&#7883;nh
c&#7911;a pháp lu&#7853;t &#273;&#7889;i v&#7899;i hành vi vi ph&#7841;m quy
&#273;&#7883;nh t&#7841;i Kho&#7843;n 1 &#272;i&#7873;u này;</span></p>

<p style='margin:0cm;margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><span
lang=VI style='font-size:14.0pt;c thành
l&#7853;p Ban ki&#7875;m soát theo quy &#273;&#7883;nh c&#7911;a pháp
lu&#7853;t &#273;&#7889;i v&#7899;i hành vi vi ph&#7841;m quy &#273;&#7883;nh
t&#7841;i Kho&#7843;n 2 &#272;i&#7873;u này.</span></p>

<p style='margin:0cm;margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><a
name="dieu_34"><b><span lang=VI style='font-size:14.0pt;i&#7873;u
34. Vi ph&#7841;m quy &#273;&#7883;nh v&#7873; gi&#7843;i th&#7875; doanh
nghi&#7879;p</span></b></a><span style='margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><span
lang=VI style='font-size:14.0pt;t ti&#7873;n
t&#7915; 5.000.000 &#273;&#7891;ng &#273;&#7871;n 10.000.000 &#273;&#7891;ng
&#273;&#7889;i v&#7899;i hành vi không ti&#7871;n hành th&#7911; t&#7909;c
gi&#7843;i th&#7875; &#273;&#7889;i v&#7899;i doanh nghi&#7879;p thu&#7897;c
các tr&#432;&#7901;ng h&#7907;p b&#7883; gi&#7843;i th&#7875; theo quy
&#273;&#7883;nh c&#7911;a pháp lu&#7853;t.</span></p>

<p style='margin:0cm;margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><span
lang=VI style='font-size:14.0pt;n pháp
kh&#7855;c ph&#7909;c h&#7853;u qu&#7843;: Bu&#7897;c ph&#7843;i ti&#7871;n
hành th&#7911; t&#7909;c gi&#7843;i th&#7875; doanh nghi&#7879;p theo quy
&#273;&#7883;nh c&#7911;a pháp lu&#7853;t.</span></p>

<p style='margin:0cm;margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><a
name="dieu_35"><b><span lang=VI style='font-size:14.0pt;i&#7873;u
35. Vi ph&#7841;m quy &#273;&#7883;nh v&#7873; thành l&#7853;p, ch&#7845;m
d&#7913;t ho&#7841;t &#273;&#7897;ng chi nhánh, v&#259;n ph\u0323ng &#273;&#7841;i
di&#7879;n, &#273;&#7883;a &#273;i&#7875;m kinh doanh c&#7911;a doanh
nghi&#7879;p</span></b></a><span style='margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><span
lang=VI style='font-size:14.0pt;t ti&#7873;n
t&#7915; 5.000.000 &#273;&#7891;ng &#273;&#7871;n 10.000.000 &#273;&#7891;ng
&#273;&#7889;i v&#7899;i m&#7897;t trong các hành vi sau:</span></p>

<p style='margin:0cm;margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><span
lang=VI style='font-size:14.0pt;
&#273;&#7883;a &#273;i&#7875;m mà không thông báo v&#7899;i Ph\u0323ng
&#273;&#259;ng k\u01b0 kinh doanh c&#7845;p t&#7881;nh n&#417;i doanh nghi&#7879;p
th&#7921;c hi&#7879;n ho&#7841;t &#273;&#7897;ng kinh doanh;</span></p>

<p style='margin:0cm;margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><span
lang=VI style='font-size:14.0pt;m d&#7913;t
ho&#7841;t &#273;&#7897;ng c&#7911;a chi nhánh, v&#259;n ph\u0323ng &#273;&#7841;i
di&#7879;n, &#273;&#7883;a &#273;i&#7875;m kinh doanh nh&#432;ng không thông
báo cho Ph\u0323ng &#273;&#259;ng k\u01b0 kinh doanh c&#7845;p t&#7881;nh.</span></p>

<p style='margin:0cm;margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><span
lang=VI style='font-size:14.0pt;n pháp
kh&#7855;c ph&#7909;c h&#7853;u qu&#7843;:</span></p>

<p style='margin:0cm;margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><span
lang=VI style='font-size:14.0pt;c thông báo
n&#417;i &#273;&#7863;t &#273;&#7883;a &#273;i&#7875;m kinh doanh v&#7899;i
Ph\u0323ng &#273;&#259;ng k\u01b0 kinh doanh c&#7845;p t&#7881;nh ho&#7863;c ch&#7845;m
d&#7913;t ho&#7841;t &#273;&#7897;ng kinh doanh t&#7841;i n&#417;i &#273;ó
&#273;&#7889;i v&#7899;i hành vi vi ph&#7841;m quy &#273;&#7883;nh t&#7841;i
&#272;i&#7875;m a Kho&#7843;n 1 &#272;i&#7873;u này;</span></p>

<p style='margin:0cm;margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><span
lang=VI style='font-size:14.0pt;c thông báo
vi&#7879;c ch&#7845;m d&#7913;t ho&#7841;t &#273;&#7897;ng c&#7911;a chi nhánh,
v&#259;n ph\u0323ng &#273;&#7841;i di&#7879;n, &#273;&#7883;a &#273;i&#7875;m kinh
doanh theo quy &#273;&#7883;nh &#273;&#7889;i v&#7899;i hành vi vi ph&#7841;m
quy &#273;&#7883;nh t&#7841;i &#272;i&#7875;m b Kho&#7843;n 1 &#272;i&#7873;u
này.</span></p>

<p style='margin:0cm;margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><a
name="dieu_36"><b><span lang=VI style='font-size:14.0pt;i&#7873;u
36. Vi ph&#7841;m các quy &#273;&#7883;nh v&#7873; &#273;&#259;ng k\u01b0 kinh doanh
c&#7911;a h&#7897; kinh doanh</span></b></a><span style='margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><span
lang=VI style='font-size:14.0pt;t ti&#7873;n
t&#7915; 3.000.000 &#273;&#7891;ng &#273;&#7871;n 5.000.000 &#273;&#7891;ng
&#273;&#7889;i v&#7899;i m&#7897;t trong các hành vi sau:</span></p>

<p style='margin:0cm;margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><span
lang=VI style='font-size:14.0pt;&#259;ng k\u01b0 kinh
doanh nhi&#7873;u h&#417;n m&#7897;t &#273;&#7883;a &#273;i&#7875;m;</span></p>

<p style='margin:0cm;margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><span
lang=VI style='font-size:14.0pt;&#259;ng k\u01b0 kinh
doanh nhi&#7873;u h&#417;n m&#7897;t h&#7897; kinh doanh;</span></p>

<p style='margin:0cm;margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><span
lang=VI style='font-size:14.0pt;u c&#7911;a c&#417; quan &#273;&#259;ng k\u01b0
kinh doanh c&#7845;p huy&#7879;n.</span></p>

<p style='margin:0cm;margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><span
lang=VI style='font-size:14.0pt;t ti&#7873;n
t&#7915; 5.000.000 &#273;&#7891;ng &#273;&#7871;n 7.000.000 &#273;&#7891;ng
&#273;&#7889;i v&#7899;i hành vi kê khai không trung th&#7921;c, không chính
xác h&#7891; s&#417; &#273;&#259;ng k\u01b0 h&#7897; kinh doanh ho&#7863;c h&#7891;
s&#417; &#273;&#259;ng k\u01b0 thay &#273;&#7893;i n&#7897;i dung &#273;&#259;ng k\u01b0
h&#7897; kinh doanh.</span></p>

<p style='margin:0cm;margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><span
lang=VI style='font-size:14.0pt;n pháp
kh&#7855;c ph&#7909;c h&#7853;u qu&#7843;:</span></p>

<p style='margin:0cm;margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><span
lang=VI style='font-size:14.0pt;c báo cáo
t\u0301nh h\u0301nh kinh doanh theo yêu c&#7847;u c&#7911;a c&#417; quan &#273;&#259;ng
k\u01b0 kinh doanh c&#7845;p huy&#7879;n &#273;&#7889;i v&#7899;i hành vi vi
ph&#7841;m quy &#273;&#7883;nh t&#7841;i &#272;i&#7875;m c Kho&#7843;n 1
&#272;i&#7873;u này;</span></p>

<p style='margin:0cm;margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><span
lang=VI style='font-size:14.0pt;c kê khai
l&#7841;i nh&#7919;ng n&#7897;i dung &#273;\u0103 kê khai không trung th&#7921;c,
không chính xác &#273;&#7889;i v&#7899;i hành vi vi ph&#7841;m quy
&#273;&#7883;nh t&#7841;i Kho&#7843;n 2 &#272;i&#7873;u này.</span></p>

<p style='margin:0cm;margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><a
name="dieu_37"><b><span lang=VI style='font-size:14.0pt;i&#7873;u
37. Vi ph&#7841;m v&#7873; vi&#7879;c t&#7841;m ng&#7915;ng kinh doanh
c&#7911;a h&#7897; kinh doanh</span></b></a><span style='margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'></p>

<p style='margin:0cm;margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><span
lang=VI style='font-size:14.0pt;t ti&#7873;n
t&#7915; 5.000.000 &#273;&#7891;ng &#273;&#7871;n 10.000.000 &#273;&#7891;ng
&#273;&#7889;i v&#7899;i hành vi không t&#7841;m ng&#7915;ng kinh doanh ngành,
ngh&#7873; kinh doanh có &#273;i&#7873;u ki&#7879;n theo yêu c&#7847;u
c&#7911;a c&#417; quan &#273;&#259;ng k\u01b0 kinh doanh c&#7845;p huy&#7879;n
n&#417;i h&#7897; kinh doanh &#273;&#259;ng k\u01b0.</span></p>

<p style='margin:0cm;margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'></p>

<p style='margin:0cm;margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><a
name="dieu_38"><b><span lang=VI style='font-size:14.0pt;i&#7873;u
38. Vi ph&#7841;m quy &#273;&#7883;nh v&#7873; &#273;&#259;ng k\u01b0 thay
&#273;&#7893;i n&#7897;i dung &#273;&#259;ng k\u01b0 h&#7897; kinh doanh</span></b></a><span
style='
margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><span
lang=VI style='font-size:14.0pt;nh cáo
ho&#7863;c ph&#7841;t ti&#7873;n t&#7915; 500.000 &#273;&#7891;ng
&#273;&#7871;n 1.000.000 &#273;&#7891;ng &#273;&#7889;i v&#7899;i hành vi thay
&#273;&#7893;i n&#7897;i dung &#273;&#259;ng k\u01b0 kinh doanh mà không thông báo
v&#7899;i c&#417; quan &#273;&#259;ng k\u01b0 kinh doanh c&#7845;p huy&#7879;n theo
quy &#273;&#7883;nh.</span></p>

<p style='margin:0cm;margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><span
lang=VI style='font-size:14.0pt;n pháp
kh&#7855;c ph&#7909;c h&#7853;u qu&#7843;: Bu&#7897;c thông báo n&#7897;i dung
thay &#273;&#7893;i &#273;&#259;ng k\u01b0 h&#7897; kinh doanh cho c&#417; quan
&#273;&#259;ng k\u01b0 kinh doanh c&#7845;p huy&#7879;n.</span></p>

<p style='margin:0cm;margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><a
name="dieu_39"><b><span lang=VI style='font-size:14.0pt;i&#7873;u
39. Vi ph&#7841;m quy &#273;&#7883;nh v&#7873; vi&#7879;c ch&#7845;m d&#7913;t
ho&#7841;t &#273;&#7897;ng c&#7911;a h&#7897; kinh doanh</span></b></a><span
style='
margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><span
lang=VI style='font-size:14.0pt;nh cáo
ho&#7863;c ph&#7841;t ti&#7873;n t&#7915; 500.000 &#273;&#7891;ng
&#273;&#7871;n 1.000.000 &#273;&#7891;ng &#273;&#7889;i v&#7899;i hành vi
ch&#7845;m d&#7913;t ho&#7841;t &#273;&#7897;ng kinh doanh d&#432;&#7899;i h\u0301nh
th&#7913;c h&#7897; kinh doanh mà không thông báo ho&#7863;c không n&#7897;p
l&#7841;i b&#7843;n g&#7889;c Gi&#7845;y ch&#7913;ng nh&#7853;n &#273;&#259;ng
k\u01b0 h&#7897; kinh doanh cho c&#417; quan &#273;&#259;ng k\u01b0 kinh doanh c&#7845;p
huy&#7879;n.</span></p>

<p style='margin:0cm;margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><span
lang=VI style='font-size:14.0pt;n pháp
kh&#7855;c ph&#7909;c h&#7853;u qu&#7843;: Bu&#7897;c thông báo ho&#7863;c
n&#7897;p l&#7841;i b&#7843;n g&#7889;c Gi&#7845;y ch&#7913;ng nh&#7853;n
&#273;&#259;ng k\u01b0 h&#7897; kinh doanh cho c&#417; quan &#273;&#259;ng k\u01b0 kinh
doanh c&#7845;p huy&#7879;n.</span></p>

<p style='margin:0cm;margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><a
name="dieu_40"><b><span lang=VI style='font-size:14.0pt;i&#7873;u
40. Vi ph&#7841;m các quy &#273;&#7883;nh v&#7873; &#273;&#259;ng k\u01b0 kinh doanh
c&#7911;a h&#7907;p tác x\u0103, liên hi&#7879;p h&#7907;p tác x\u0103</span></b></a><span
style='
margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><span
lang=VI style='font-size:14.0pt;nh cáo
ho&#7863;c ph&#7841;t ti&#7873;n t&#7915; 500.000 &#273;&#7891;ng
&#273;&#7871;n 1.000.000 &#273;&#7891;ng &#273;&#7889;i v&#7899;i m&#7897;t
trong các hành vi sau:</span></p>

<p style='margin:0cm;margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><span
lang=VI style='font-size:14.0pt;
ch&#7913;c &#272;&#7841;i h&#7897;i thành viên th&#432;&#7901;ng niên c&#7911;a
h&#7907;p tác x\u0103, liên hi&#7879;p h&#7907;p tác x\u0103;</span></p>

<p style='margin:0cm;margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><span
lang=VI style='font-size:14.0pt;p
s&#7893; &#273;&#259;ng k\u01b0 thành viên sau khi &#273;&#432;&#7907;c c&#7845;p Gi&#7845;y
ch&#7913;ng nh&#7853;n &#273;&#259;ng k\u01b0 h&#7907;p tác x\u0103, liên hi&#7879;p
h&#7907;p tác x\u0103.</span></p>

<p style='margin:0cm;margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><span
lang=VI style='font-size:14.0pt;t ti&#7873;n
t&#7915; 5.000.000 &#273;&#7891;ng &#273;&#7871;n 10.000.000 &#273;&#7891;ng
&#273;&#7889;i v&#7899;i m&#7897;t trong các hành vi sau:</span></p>

<p style='margin:0cm;margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><span
lang=VI style='font-size:14.0pt;c, không chính xác h&#7891; s&#417; &#273;&#259;ng k\u01b0 thành l&#7853;p
h&#7907;p tác x\u0103, liên hi&#7879;p h&#7907;p tác x\u0103;</span></p>

<p style='margin:0cm;margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><span
lang=VI style='font-size:14.0pt;t
&#273;&#7897;ng mang danh ngh&#297;a h&#7907;p tác x\u0103, liên hi&#7879;p h&#7907;p
tác x\u0103 nh&#432;ng không có Gi&#7845;y ch&#7913;ng nh&#7853;n &#273;&#259;ng k\u01b0
thành l&#7853;p.</span></p>

<p style='margin:0cm;margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><span
lang=VI style='font-size:14.0pt;n pháp
kh&#7855;c ph&#7909;c h&#7853;u qu&#7843;:</span></p>

<p style='margin:0cm;margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><span
lang=VI style='font-size:14.0pt;c t&#7893;
ch&#7913;c &#272;&#7841;i h&#7897;i thành viên th&#432;&#7901;ng niên
&#273;&#7889;i v&#7899;i hành vi vi ph&#7841;m quy &#273;&#7883;nh t&#7841;i
&#272;i&#7875;m a Kho&#7843;n 1 &#272;i&#7873;u này;</span></p>

<p style='margin:0cm;margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><span
lang=VI style='font-size:14.0pt;c l&#7853;p s&#7893;
&#273;&#259;ng k\u01b0 thành viên &#273;&#7889;i v&#7899;i hành vi vi ph&#7841;m quy
&#273;&#7883;nh t&#7841;i &#272;i&#7875;m b Kho&#7843;n 1 &#272;i&#7873;u này;</span></p>

<p style='margin:0cm;margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><span
lang=VI style='font-size:14.0pt;c &#273;&#259;ng
k\u01b0 h&#7907;p tác x\u0103, liên hi&#7879;p h&#7907;p tác x\u0103 &#273;&#7889;i v&#7899;i
hành vi vi ph&#7841;m quy &#273;&#7883;nh t&#7841;i &#272;i&#7875;m b
Kho&#7843;n 2 &#272;i&#7873;u này.</span></p>

<p style='margin:0cm;margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><a
name="dieu_41"><b><span lang=VI style='font-size:14.0pt;i&#7873;u
41. Vi ph&#7841;m các quy &#273;&#7883;nh v&#7873; &#273;&#259;ng k\u01b0 v&#7889;n
góp &#273;&#7889;i v&#7899;i h&#7907;p tác x\u0103, liên hi&#7879;p h&#7907;p tác x\u0103</span></b></a><span
style='
margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><span
lang=VI style='font-size:14.0pt;t ti&#7873;n
t&#7915; 5.000.000 &#273;&#7891;ng &#273;&#7871;n 10.000.000 &#273;&#7891;ng
&#273;&#7889;i v&#7899;i m&#7897;t trong các hành vi sau:</span></p>

<p style='margin:0cm;margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><span
lang=VI style='font-size:14.0pt;&#7897;ng &#273;&#7911; và &#273;úng th&#7901;i h&#7841;n s&#7889;
v&#7889;n &#273;\u0103 &#273;&#259;ng k\u01b0;</span></p>

<p style='margin:0cm;margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><span
lang=VI style='font-size:14.0pt;c v&#7889;n pháp &#273;&#7883;nh &#273;&#7889;i v&#7899;i h&#7907;p tác
x\u0103 kinh doanh ngành, ngh&#7873; ph&#7843;i có v&#7889;n pháp &#273;&#7883;nh;</span></p>

<p style='margin:0cm;margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><span
lang=VI style='font-size:14.0pt;p
gi&#7845;y ch&#7913;ng nh&#7853;n góp v&#7889;n cho thành viên h&#7907;p tác x\u0103
ho&#7863;c h&#7907;p tác x\u0103 thành viên.</span></p>

<p style='margin:0cm;margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><span
lang=VI style='font-size:14.0pt;t ti&#7873;n
t&#7915; 10.000.000 &#273;&#7891;ng &#273;&#7871;n 15.000.000 &#273;&#7891;ng
&#273;&#7889;i v&#7899;i hành vi &#273;&#7875; m&#7897;t thành viên góp
v&#7889;n l&#7899;n h&#417;n 20% t&#7893;ng s&#7889; v&#7889;n góp c&#7911;a h&#7907;p
tác x\u0103; m&#7897;t h&#7907;p tác x\u0103 thành viên góp v&#7889;n l&#7899;n h&#417;n
30% t&#7893;ng s&#7889; v&#7889;n góp c&#7911;a liên hi&#7879;p h&#7907;p tác
x\u0103.</span></p>

<p style='margin:0cm;margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><span
lang=VI style='font-size:14.0pt;n pháp
kh&#7855;c ph&#7909;c h&#7853;u qu&#7843;:</span></p>

<p style='margin:0cm;margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><span
lang=VI style='font-size:14.0pt;c b&#7893;
sung &#273;&#7911; v&#7889;n góp nh&#432; &#273;\u0103 &#273;&#259;ng k\u01b0
&#273;&#7889;i v&#7899;i hành vi vi ph&#7841;m quy &#273;&#7883;nh t&#7841;i
&#272;i&#7875;m a Kho&#7843;n 1 &#272;i&#7873;u này;</span></p>

<p style='margin:0cm;margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><span
lang=VI style='font-size:14.0pt;c c&#7845;p
gi&#7845;y ch&#7913;ng nh&#7853;n góp v&#7889;n cho thành viên h&#7907;p tác x\u0103
ho&#7863;c h&#7907;p tác x\u0103 thành viên &#273;&#7889;i v&#7899;i hành vi vi
ph&#7841;m quy &#273;&#7883;nh t&#7841;i &#272;i&#7875;m c Kho&#7843;n 1
&#272;i&#7873;u này;</span></p>

<p style='margin:0cm;margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><span
lang=VI style='font-size:14.0pt;c
&#273;i&#7873;u ch&#7881;nh l&#7841;i t&#7927; l&#7879; v&#7889;n góp
&#273;&#7889;i v&#7899;i hành vi vi ph&#7841;m quy &#273;&#7883;nh t&#7841;i
Kho&#7843;n 2 &#272;i&#7873;u này.</span></p>

<p style='margin:0cm;margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><a
name="dieu_42"><b><span lang=VI style='font-size:14.0pt;i&#7873;u
42. Vi ph&#7841;m các quy &#273;&#7883;nh v&#7873; thay &#273;&#7893;i
n&#7897;i dung &#273;&#259;ng k\u01b0 h&#7907;p tác x\u0103, liên hi&#7879;p h&#7907;p
tác x\u0103</span></b></a><span style='margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><span
lang=VI style='font-size:14.0pt;nh cáo
ho&#7863;c ph&#7841;t ti&#7873;n t&#7915; 500.000 &#273;&#7891;ng
&#273;&#7871;n 1.000.000 &#273;&#7891;ng &#273;&#7889;i v&#7899;i m&#7897;t
trong các hành vi sau:</span></p>

<p style='margin:0cm;margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><span
lang=VI style='font-size:14.0pt;&#259;ng
k\u01b0 ho&#7863;c &#273;&#259;ng k\u01b0 không &#273;úng th&#7901;i h&#7841;n ho&#7863;c
không thông báo thay &#273;&#7893;i các n&#7897;i dung &#273;&#259;ng k\u01b0
