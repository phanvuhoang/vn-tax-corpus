<p style='margin:0cm;margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><span

<p style='margin:0cm;margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><span
lang=VI style='font-size:14.0pt;p Báo cáo
nghiên c&#7913;u kh&#7843; thi không &#273;úng theo quy ho&#7841;ch

<p style='margin:0cm;margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><span

&#273;i&#7873;u ch&#7881;nh Báo cáo nghiên c&#7913;u kh&#7843; thi cho phù
h&#7907;p v&#7899;i tiêu chu&#7849;n qu&#7889;c gia, quy chu&#7849;n k&#7929;
thu&#7853;t qu&#7889;c gia &#273;&#7889;i v&#7899;i hành vi vi ph&#7841;m quy
&#273;&#7883;nh t&#7841;i &#272;i&#7875;m c Kho&#7843;n 2 &#272;i&#7873;u này;</span></p>

<p style='margin:0cm;margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><span
lang=VI style='font-size:14.0pt;c b&#7893;
sung các n&#7897;i dung c\u0323n thi&#7871;u &#273;&#7889;i v&#7899;i hành vi vi
ph&#7841;m quy &#273;&#7883;nh t&#7841;i &#272;i&#7875;m d Kho&#7843;n 2
&#272;i&#7873;u này;</span></p>

<p style='margin:0cm;margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><span
lang=VI style='font-size:14.0pt;c
&#273;i&#7873;u ch&#7881;nh Báo cáo nghiên c&#7913;u kh&#7843; thi phù
h&#7907;p v&#7899;i quy ho&#7841;ch &#273;\u0103 &#273;&#432;&#7907;c phê
duy&#7879;t &#273;&#7889;i v&#7899;i hành vi vi ph&#7841;m quy &#273;&#7883;nh
t&#7841;i &#272;i&#7875;m b Kho&#7843;n 3 &#272;i&#7873;u này.</span></p>

<p style='margin:0cm;margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><a
name="dieu_6"><b><span lang=VI style='font-size:14.0pt;i&#7873;u
6. Vi ph&#7841;m hành chính trong l&#297;nh v&#7921;c &#273;&#7847;u t&#432; có
xây d&#7921;ng công tr\u0301nh</span></b></a><span style='margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><span
lang=VI style='font-size:14.0pt;m
hành chính trong l&#297;nh v&#7921;c &#273;&#7847;u t&#432; có xây d&#7921;ng
công tr\u0301nh v&#7873; kh&#7843;o sát, thi&#7871;t k&#7871;, giám sát thi công,
xây d&#7921;ng công tr\u0301nh, qu&#7843;n l\u01b0 ch&#7845;t l&#432;&#7907;ng,
nghi&#7879;m thu, thanh toán, quy&#7871;t toán d&#7921; án &#273;&#7847;u
t&#432; &#273;&#432;&#7907;c x&#7917; ph&#7841;t theo quy &#273;&#7883;nh
c&#7911;a Chính ph&#7911; v&#7873; x&#7917; ph&#7841;t vi ph&#7841;m hành chính
trong ho&#7841;t &#273;&#7897;ng xây d&#7921;ng.</span></p>

<p style='margin:0cm;margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><a
name="dieu_7"><b><span lang=VI style='font-size:14.0pt;i&#7873;u
7. Vi ph&#7841;m v&#7873; báo cáo giám sát, &#273;ánh giá &#273;&#7847;u
t&#432;</span></b></a><span style='margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><span
lang=VI style='font-size:14.0pt;t ti&#7873;n
t&#7915; 1.000.000 &#273;&#7891;ng &#273;&#7871;n 2.000.000 &#273;&#7891;ng
&#273;&#7889;i v&#7899;i m&#7897;t trong các hành vi sau:</span></p>

<p style='margin:0cm;margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><span
lang=VI style='font-size:14.0pt;p báo cáo giám
sát, &#273;ánh giá &#273;&#7847;u t&#432; không &#273;úng th&#7901;i h&#7841;n
quy &#273;&#7883;nh;</span></p>

<p style='margin:0cm;margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><span
lang=VI style='font-size:14.0pt;p báo cáo giám
sát, &#273;ánh giá &#273;&#7847;u t&#432; không &#273;&#7847;y &#273;&#7911;
n&#7897;i dung theo quy &#273;&#7883;nh.</span></p>

<p style='margin:0cm;margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><span
lang=VI style='font-size:14.0pt;t ti&#7873;n
t&#7915; 2.000.000 &#273;&#7891;ng &#273;&#7871;n 5.000.000 &#273;&#7891;ng
&#273;&#7889;i v&#7899;i m&#7897;t trong các hành vi sau:</span></p>

<p style='margin:0cm;margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><span
lang=VI style='font-size:14.0pt;p báo
cáo giám sát, &#273;ánh giá &#273;&#7847;u t&#432; g&#7917;i c&#417; quan nhà
n&#432;&#7899;c có th&#7849;m quy&#7873;n theo quy &#273;&#7883;nh;</span></p>

<p style='margin:0cm;margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><span
lang=VI style='font-size:14.0pt;p báo cáo giám
sát, &#273;ánh giá &#273;&#7847;u t&#432; không trung th&#7921;c.</span></p>

<p style='margin:0cm;margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><span
lang=VI style='font-size:14.0pt;n pháp
kh&#7855;c ph&#7909;c h&#7853;u qu&#7843;:</span></p>

<p style='margin:0cm;margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><span
lang=VI style='font-size:14.0pt;c b&#7893;
sung các n&#7897;i dung c\u0323n thi&#7871;u vào Báo cáo giám sát, &#273;ánh giá
&#273;&#7847;u t&#432; &#273;&#7889;i v&#7899;i hành vi vi ph&#7841;m quy
&#273;&#7883;nh t&#7841;i &#272;i&#7875;m b Kho&#7843;n 1 &#272;i&#7873;u này;</span></p>

<p style='margin:0cm;margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><span
lang=VI style='font-size:14.0pt;c g&#7917;i
Báo cáo giám sát, &#273;ánh giá &#273;&#7847;u t&#432; cho c&#417; quan nhà
n&#432;&#7899;c có th&#7849;m quy&#7873;n &#273;&#7889;i v&#7899;i hành vi vi
ph&#7841;m quy &#273;&#7883;nh t&#7841;i &#272;i&#7875;m a Kho&#7843;n 2
&#272;i&#7873;u này.</span></p>

<p style='margin:0cm;margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><a
name="dieu_8"><b><span lang=VI style='font-size:14.0pt;i&#7873;u
8. Vi ph&#7841;m v&#7873; qu&#7843;n l\u01b0 th&#7921;c hi&#7879;n ch&#432;&#417;ng
tr\u0301nh, d&#7921; án s&#7917; d&#7909;ng ngu&#7891;n v&#7889;n H&#7895; tr&#7907;
phát tri&#7875;n chính th&#7913;c (ODA)</span></b></a><span style='margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><span
lang=VI style='font-size:14.0pt;t ti&#7873;n
t&#7915; 5.000.000 &#273;&#7891;ng &#273;&#7871;n 10.000.000 &#273;&#7891;ng
&#273;&#7889;i v&#7899;i m&#7897;t trong các hành vi sau:</span></p>

<p style='margin:0cm;margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><span
lang=VI style='font-size:14.0pt;
ch&#7913;c giám sát, &#273;ánh giá quá tr\u0301nh th&#7921;c hi&#7879;n
ch&#432;&#417;ng tr\u0301nh, d&#7921; án ODA theo quy &#273;&#7883;nh;</span></p>

<p style='margin:0cm;margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><span
lang=VI style='font-size:14.0pt;c hi&#7879;n
d&#7921; án ch&#7853;m so v&#7899;i ti&#7871;n &#273;&#7897; quy
&#273;&#7883;nh n&#7871;u không v\u0301 l\u01b0 do khách quan ho&#7863;c s&#7921;
ki&#7879;n b&#7845;t kh&#7843; kháng.</span></p>

<p style='margin:0cm;margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><span
lang=VI style='font-size:14.0pt;t ti&#7873;n
t&#7915; 20.000.000 &#273;&#7891;ng &#273;&#7871;n 30.000.000 &#273;&#7891;ng
&#273;&#7889;i v&#7899;i hành vi tri&#7875;n khai d&#7921; án không &#273;úng
các n&#7897;i dung trong quy&#7871;t &#273;&#7883;nh &#273;&#7847;u t&#432;,
quy&#7871;t &#273;&#7883;nh phê duy&#7879;t V&#259;n ki&#7879;n
ch&#432;&#417;ng tr\u0301nh, d&#7921; án h&#7895; tr&#7907; k&#7929; thu&#7853;t.</span></p>

<p style='margin:0cm;margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><span
lang=VI style='font-size:14.0pt;n pháp
kh&#7855;c ph&#7909;c h&#7853;u qu&#7843;: Bu&#7897;c ph&#7843;i t&#7893;
ch&#7913;c giám sát, &#273;ánh giá d&#7921; án theo quy &#273;&#7883;nh
&#273;&#7889;i v&#7899;i hành vi vi ph&#7841;m quy &#273;&#7883;nh t&#7841;i
&#272;i&#7875;m a Kho&#7843;n 1 &#272;i&#7873;u này.</span></p>

<p style='margin:0cm;margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><a
name="dieu_9"><b><span lang=VI style='font-size:14.0pt;i&#7873;u
9. Vi ph&#7841;m v&#7873; ch&#7871; &#273;&#7897; báo cáo và cung c&#7845;p
thông tin &#273;&#7889;i v&#7899;i ch&#432;&#417;ng tr\u0301nh, d&#7921; án ODA</span></b></a><span
style='
margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><span
lang=VI style='font-size:14.0pt;t ti&#7873;n
t&#7915; 1.000.000 &#273;&#7891;ng &#273;&#7871;n 2.000.000 &#273;&#7891;ng
&#273;&#7889;i v&#7899;i hành vi không tuân th&#7911; ch&#7871; &#273;&#7897;
báo cáo k&#7871;t qu&#7843; th&#7921;c hi&#7879;n ch&#432;&#417;ng tr\u0301nh,
d&#7921; án ODA g&#7917;i c&#417; quan có th&#7849;m quy&#7873;n theo quy
&#273;&#7883;nh.</span></p>

<p style='margin:0cm;margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><span
lang=VI style='font-size:14.0pt;t ti&#7873;n
t&#7915; 5.000.000 &#273;&#7891;ng &#273;&#7871;n 10.000.000 &#273;&#7891;ng
&#273;&#7889;i v&#7899;i hành vi cung c&#7845;p thông tin, tài li&#7879;u sai
l&#7879;ch cho các bên h&#7907;p &#273;&#7891;ng, t&#432; v&#7845;n l&#7853;p
và th&#7921;c hi&#7879;n ch&#432;&#417;ng tr\u0301nh, d&#7921; án ODA.</span></p>

<p style='margin:0cm;margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><span
lang=VI style='font-size:14.0pt;n pháp
kh&#7855;c ph&#7909;c h&#7853;u qu&#7843;:</span></p>

<p style='margin:0cm;margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><span
lang=VI style='font-size:14.0pt;c l&#7853;p
báo cáo g&#7917;i c&#417; quan qu&#7843;n l\u01b0 nhà n&#432;&#7899;c có th&#7849;m
quy&#7873;n theo quy &#273;&#7883;nh c&#7911;a pháp lu&#7853;t &#273;&#7889;i
v&#7899;i hành vi vi ph&#7841;m quy &#273;&#7883;nh t&#7841;i Kho&#7843;n 1
&#272;i&#7873;u này;</span></p>

<p style='margin:0cm;margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><span
lang=VI style='font-size:14.0pt;c cung
c&#7845;p thông tin, tài li&#7879;u chính xác cho các bên h&#7907;p
&#273;&#7891;ng, t&#432; v&#7845;n l&#7853;p và th&#7921;c hi&#7879;n
ch&#432;&#417;ng tr\u0301nh, d&#7921; án &#273;&#7889;i v&#7899;i hành vi vi
ph&#7841;m quy &#273;&#7883;nh t&#7841;i Kho&#7843;n 2 &#272;i&#7873;u này.</span></p>

<p style='margin:0cm;margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><a
name="muc_2"><b><span lang=VI style='font-size:14.0pt;C
2. HÀNH VI VI PH&#7840;M HÀNH CHÍNH TRONG L&#296;NH V&#7920;C &#272;&#7846;U
T&#431; TRONG N&#431;&#7898;C, &#272;&#7846;U T&#431; C&#7910;A N&#431;&#7898;C
NGOÀI VÀ &#272;&#7846;U T&#431; C&#7910;A VI&#7878;T NAM RA N&#431;&#7898;C
NGOÀI, H\u0300NH TH&#7912;C X&#7916; PH&#7840;T VÀ BI&#7878;N PHÁP KH&#7854;C
PH&#7908;C H&#7852;U QU&#7842;</span></b></a><span style='margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><a
name="dieu_10"><b><span lang=VI style='font-size:14.0pt;i&#7873;u
10. Vi ph&#7841;m các quy &#273;&#7883;nh v&#7873; &#273;&#7847;u t&#432;
t&#7841;i Vi&#7879;t Nam</span></b></a><span style='margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><span
lang=VI style='font-size:14.0pt;t ti&#7873;n
t&#7915; 5.000.000 &#273;&#7891;ng &#273;&#7871;n 10.000.000 &#273;&#7891;ng
&#273;&#7889;i v&#7899;i hành vi không th&#7921;c hi&#7879;n báo cáo v&#7873;
ho&#7841;t &#273;&#7897;ng &#273;&#7847;u t&#432;, báo cáo giám sát, &#273;ánh
giá d&#7921; án &#273;&#7847;u t&#432; theo quy &#273;&#7883;nh.</span></p>

<p style='margin:0cm;margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><span
lang=VI style='font-size:14.0pt;t ti&#7873;n
t&#7915; 10.000.000 &#273;&#7891;ng &#273;&#7871;n 15.000.000 &#273;&#7891;ng
&#273;&#7889;i v&#7899;i hành vi báo cáo không trung th&#7921;c v&#7873;
ho&#7841;t &#273;&#7897;ng &#273;&#7847;u t&#432;.</span></p>

<p style='margin:0cm;margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><span
lang=VI style='font-size:14.0pt;t ti&#7873;n
t&#7915; 15.000.000 &#273;&#7891;ng &#273;&#7871;n 20.000.000 &#273;&#7891;ng
&#273;&#7889;i v&#7899;i m&#7897;t trong các hành vi sau:</span></p>

<p style='margin:0cm;margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><span
lang=VI style='font-size:14.0pt;p h&#7891;
s&#417; d&#7921; án &#273;&#7847;u t&#432; không trung th&#7921;c, không chính
xác &#273;&#7875; &#273;&#432;&#7907;c c&#7845;p Gi&#7845;y ch&#7913;ng
nh&#7853;n &#273;&#7847;u t&#432;;</span></p>

<p style='margin:0cm;margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><span
lang=VI style='font-size:14.0pt;c hi&#7879;n
d&#7921; án ch&#7853;m so v&#7899;i ti&#7871;n &#273;&#7897; quy
&#273;&#7883;nh trong Gi&#7845;y ch&#7913;ng nh&#7853;n &#273;&#7847;u t&#432;
mà không &#273;&#432;&#7907;c c&#417; quan nhà n&#432;&#7899;c có th&#7849;m
quy&#7873;n ch&#7845;p thu&#7853;n.</span></p>

<p style='margin:0cm;margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><span
lang=VI style='font-size:14.0pt;t ti&#7873;n
t&#7915; 20.000.000 &#273;&#7891;ng &#273;&#7871;n 30.000.000 &#273;&#7891;ng
&#273;&#7889;i v&#7899;i m&#7897;t trong các hành vi sau:</span></p>

<p style='margin:0cm;margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><span
lang=VI style='font-size:14.0pt;c hi&#7879;n
th&#7911; t&#7909;c &#273;i&#7873;u ch&#7881;nh d&#7921; án &#273;&#7847;u
t&#432; theo quy &#273;&#7883;nh c&#7911;a pháp lu&#7853;t;</span></p>

<p style='margin:0cm;margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><span
lang=VI style='font-size:14.0pt;m ng&#7915;ng,
gi\u0103n ti&#7871;n &#273;&#7897; th&#7921;c hi&#7879;n d&#7921; án &#273;&#7847;u
t&#432; nh&#432;ng không thông báo b&#7857;ng v&#259;n b&#7843;n t&#7899;i
c&#417; quan qu&#7843;n l\u01b0 nhà n&#432;&#7899;c v&#7873; &#273;&#7847;u t&#432;;</span></p>

<p style='margin:0cm;margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><span
lang=VI style='font-size:14.0pt;c
hi&#7879;n th&#7911; t&#7909;c ch&#7845;m d&#7913;t ho&#7841;t &#273;&#7897;ng
d&#7921; án &#273;&#7847;u t&#432;, th&#7911; t&#7909;c thanh l\u01b0 d&#7921; án
&#273;&#7847;u t&#432;.</span></p>

<p style='margin:0cm;margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><span
lang=VI style='font-size:14.0pt;t ti&#7873;n
t&#7915; 30.000.000 &#273;&#7891;ng &#273;&#7871;n 50.000.000 &#273;&#7891;ng
&#273;&#7889;i v&#7899;i m&#7897;t trong các hành vi sau:</span></p>

<p style='margin:0cm;margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><span
lang=VI style='font-size:14.0pt;c
hi&#7879;n ho&#7841;t &#273;&#7897;ng &#273;&#7847;u t&#432; theo &#273;úng
n&#7897;i dung quy &#273;&#7883;nh t&#7841;i Gi&#7845;y ch&#7913;ng nh&#7853;n
&#273;&#7847;u t&#432;;</span></p>

<p style='margin:0cm;margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><span
lang=VI style='font-size:14.0pt;&#7847;u t&#432;
theo h\u0301nh th&#7913;c góp v&#7889;n, mua c&#7893; ph&#7847;n, sáp nh&#7853;p,
mua l&#7841;i doanh nghi&#7879;p không &#273;úng quy &#273;&#7883;nh;</span></p>

<p style='margin:0cm;margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><span
lang=VI style='font-size:14.0pt;n
&#273;&#7893;i h\u0301nh th&#7913;c &#273;&#7847;u t&#432; ho&#7863;c chuy&#7875;n
nh&#432;&#7907;ng v&#7889;n &#273;&#7847;u t&#432; không &#273;úng quy
&#273;&#7883;nh;</span></p>

<p style='margin:0cm;margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><span
lang=VI style='font-size:14.0pt;n
nh&#432;&#7907;ng d&#7921; án không &#273;úng quy &#273;&#7883;nh.</span></p>

<p style='margin:0cm;margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><span
lang=VI style='font-size:14.0pt;t ti&#7873;n
t&#7915; 50.000.000 &#273;&#7891;ng &#273;&#7871;n 70.000.000 &#273;&#7891;ng
&#273;&#7889;i v&#7899;i m&#7897;t trong các hành vi sau:</span></p>

<p style='margin:0cm;margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><span
lang=VI style='font-size:14.0pt;c
hi&#7879;n th&#7911; t&#7909;c &#273;&#7847;u t&#432; theo quy &#273;&#7883;nh
c&#7911;a pháp lu&#7853;t;</span></p>

<p style='margin:0cm;margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><span
lang=VI style='font-size:14.0pt;p t&#7909;c
tri&#7875;n khai d&#7921; án khi &#273;\u0103 b&#7883; thu h&#7891;i Gi&#7845;y
ch&#7913;ng nh&#7853;n &#273;&#7847;u t&#432;;</span></p>

<p style='margin:0cm;margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><span
lang=VI style='font-size:14.0pt;p t&#7909;c
tri&#7875;n khai d&#7921; án khi &#273;\u0103 h&#7871;t th&#7901;i h&#7841;n
ho&#7841;t &#273;&#7897;ng ghi trên Gi&#7845;y ch&#7913;ng nh&#7853;n
&#273;&#7847;u t&#432;;</span></p>

<p style='margin:0cm;margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><span
lang=VI style='font-size:14.0pt;n khai
d&#7921; án &#273;&#7847;u t&#432; sau 12 (m&#432;&#7901;i hai) tháng mà không
&#273;&#432;&#7907;c s&#7921; ch&#7845;p thu&#7853;n c&#7911;a c&#417; quan nhà
n&#432;&#7899;c có th&#7849;m quy&#7873;n.</span></p>

<p style='margin:0cm;margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><span
lang=VI style='font-size:14.0pt;t ti&#7873;n
t&#7915; 70.000.000 &#273;&#7891;ng &#273;&#7871;n 80.000.000 &#273;&#7891;ng
&#273;&#7889;i v&#7899;i hành vi tri&#7875;n khai th&#7921;c hi&#7879;n
d&#7921; án khi ch&#432;a &#273;&#432;&#7907;c c&#7845;p Gi&#7845;y ch&#7913;ng
nh&#7853;n &#273;&#7847;u t&#432;.</span></p>

<p style='margin:0cm;margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><span
lang=VI style='font-size:14.0pt;n pháp
kh&#7855;c ph&#7909;c h&#7853;u qu&#7843;:</span></p>

<p style='margin:0cm;margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><span
lang=VI style='font-size:14.0pt;c th&#7921;c
hi&#7879;n báo cáo v&#7873; ho&#7841;t &#273;&#7897;ng &#273;&#7847;u t&#432;;
báo cáo giám sát, &#273;ánh giá d&#7921; án &#273;&#7847;u t&#432; theo quy
&#273;&#7883;nh &#273;&#7889;i v&#7899;i hành vi vi ph&#7841;m quy &#273;&#7883;nh
t&#7841;i Kho&#7843;n 1 &#272;i&#7873;u này;</span></p>

<p style='margin:0cm;margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><span
lang=VI style='font-size:14.0pt;c th&#7921;c
hi&#7879;n th&#7911; t&#7909;c &#273;i&#7873;u ch&#7881;nh d&#7921; án
&#273;&#7847;u t&#432; &#273;&#7889;i v&#7899;i hành vi vi ph&#7841;m quy
&#273;&#7883;nh t&#7841;i &#272;i&#7875;m a Kho&#7843;n 4 &#272;i&#7873;u này;</span></p>

<p style='margin:0cm;margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><span
lang=VI style='font-size:14.0pt;c g&#7917;i
thông báo cho c&#417; quan qu&#7843;n l\u01b0 nhà n&#432;&#7899;c v&#7873;
&#273;&#7847;u t&#432; &#273;&#7889;i v&#7899;i hành vi vi ph&#7841;m quy
&#273;&#7883;nh t&#7841;i &#272;i&#7875;m b Kho&#7843;n 4 &#272;i&#7873;u này;</span></p>

<p style='margin:0cm;margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><span
lang=VI style='font-size:14.0pt;c th&#7921;c
hi&#7879;n th&#7911; t&#7909;c ch&#7845;m d&#7913;t ho&#7841;t &#273;&#7897;ng
c&#7911;a d&#7921; án &#273;&#7847;u t&#432;, thanh l\u01b0 theo quy &#273;&#7883;nh
&#273;&#7889;i v&#7899;i hành vi vi ph&#7841;m quy &#273;&#7883;nh t&#7841;i
&#272;i&#7875;m c Kho&#7843;n 4 &#272;i&#7873;u này;</span></p>

<p style='margin:0cm;margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><span
lang=VI style='font-size:14.0pt;) Bu&#7897;c
th&#7921;c hi&#7879;n th&#7911; t&#7909;c gia h&#7841;n Gi&#7845;y ch&#7913;ng
nh&#7853;n &#273;&#7847;u t&#432; &#273;&#7889;i v&#7899;i hành vi vi
ph&#7841;m quy &#273;&#7883;nh t&#7841;i &#272;i&#7875;m c Kho&#7843;n 6
&#272;i&#7873;u này.</span></p>

<p style='margin:0cm;margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><a
name="dieu_11"><b><span lang=VI style='font-size:14.0pt;i&#7873;u
11. Vi ph&#7841;m các quy &#273;&#7883;nh v&#7873; s&#7917; d&#7909;ng
v&#7889;n nhà n&#432;&#7899;c &#273;&#7875; &#273;&#7847;u t&#432;, kinh doanh</span></b></a><span
style='
margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><span
lang=VI style='font-size:14.0pt;t ti&#7873;n
t&#7915; 30.000.000 &#273;&#7891;ng &#273;&#7871;n 50.000.000 &#273;&#7891;ng
&#273;&#7889;i v&#7899;i m&#7897;t trong các hành vi sau:</span></p>

<p style='margin:0cm;margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><span
lang=VI style='font-size:14.0pt; d&#7909;ng
v&#7889;n nhà n&#432;&#7899;c &#273;&#7875; &#273;&#7847;u t&#432;, góp
v&#7889;n, mua c&#7893; ph&#7847;n khi ch&#432;a &#273;&#432;&#7907;c c&#417;
quan có th&#7849;m quy&#7873;n ch&#7845;p thu&#7853;n;</span></p>

<p style='margin:0cm;margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><span
lang=VI style='font-size:14.0pt;&#7893;i
d&#7921; án &#273;&#7847;u t&#432; s&#7917; d&#7909;ng v&#7889;n nhà
n&#432;&#7899;c khi ch&#432;a &#273;&#432;&#7907;c c&#417; quan nhà
n&#432;&#7899;c có th&#7849;m quy&#7873;n ch&#7845;p thu&#7853;n.</span></p>

<p style='margin:0cm;margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><span
lang=VI style='font-size:14.0pt;t ti&#7873;n
t&#7915; 50.000.000 &#273;&#7891;ng &#273;&#7871;n 70.000.000 &#273;&#7891;ng
&#273;&#7889;i v&#7899;i hành vi &#273;&#7847;u t&#432;, kinh doanh s&#7917;
d&#7909;ng v&#7889;n nhà n&#432;&#7899;c sai m&#7909;c &#273;ích.</span></p>

<p style='margin:0cm;margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><a
name="dieu_12"><b><span lang=VI style='font-size:14.0pt;i&#7873;u
12. Vi ph&#7841;m các quy &#273;&#7883;nh v&#7873; &#273;&#7847;u t&#432; ra
n&#432;&#7899;c ngoài</span></b></a><span style='margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><span
lang=VI style='font-size:14.0pt;t ti&#7873;n
t&#7915; 5.000.000 &#273;&#7891;ng &#273;&#7871;n 10.000.000 &#273;&#7891;ng
&#273;&#7889;i v&#7899;i m&#7897;t trong các hành vi sau:</span></p>

<p style='margin:0cm;margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><span
lang=VI style='font-size:14.0pt;c
hi&#7879;n ch&#7871; &#273;&#7897; báo cáo v&#7873; ho&#7841;t &#273;&#7897;ng
&#273;&#7847;u t&#432; &#7903; n&#432;&#7899;c ngoài theo quy &#273;&#7883;nh;</span></p>

<p style='margin:0cm;margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><span
lang=VI style='font-size:14.0pt;c thông báo th&#7921;c hi&#7879;n d&#7921; án &#273;&#7847;u t&#432;
không &#273;&#7847;y &#273;&#7911; n&#7897;i dung theo quy &#273;&#7883;nh.</span></p>

<p style='margin:0cm;margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><span
lang=VI style='font-size:14.0pt;t ti&#7873;n
t&#7915; 20.000.000 &#273;&#7891;ng &#273;&#7871;n 30.000 000 &#273;&#7891;ng
&#273;&#7889;i v&#7899;i m&#7897;t trong các hành vi sau:</span></p>

<p style='margin:0cm;margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><span
lang=VI style='font-size:14.0pt;c
hi&#7879;n &#273;úng các n&#7897;i dung quy &#273;&#7883;nh t&#7841;i
Gi&#7845;y ch&#7913;ng nh&#7853;n &#273;&#7847;u t&#432;;</span></p>

<p style='margin:0cm;margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><span
lang=VI style='font-size:14.0pt;n l&#7907;i
nhu&#7853;n và các kho&#7843;n thu nh&#7853;p t&#7915; vi&#7879;c &#273;&#7847;u
t&#432; ra n&#432;&#7899;c ngoài v&#7873; n&#432;&#7899;c không &#273;úng quy
&#273;&#7883;nh;</span></p>

<p style='margin:0cm;margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><span
lang=VI style='font-size:14.0pt;n
v&#7889;n và tài s&#7843;n h&#7907;p pháp v&#7873; n&#432;&#7899;c khi
k&#7871;t thúc d&#7921; án theo quy &#273;&#7883;nh.</span></p>

<p style='margin:0cm;margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><span
lang=VI style='font-size:14.0pt;t ti&#7873;n
t&#7915; 30.000.000 &#273;&#7891;ng &#273;&#7871;n 40.000.000 &#273;&#7891;ng
&#273;&#7889;i v&#7899;i m&#7897;t trong các hành vi sau:</span></p>

<p style='margin:0cm;margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><span
lang=VI style='font-size:14.0pt;p h&#7891;
s&#417; không chính xác, không trung th&#7921;c &#273;&#7875;
&#273;&#432;&#7907;c c&#7845;p Gi&#7845;y ch&#7913;ng nh&#7853;n &#273;&#7847;u
t&#432; ra n&#432;&#7899;c ngoài;</span></p>

<p style='margin:0cm;margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><span
lang=VI style='font-size:14.0pt;i
nhu&#7853;n thu &#273;&#432;&#7907;c t&#7915; d&#7921; án &#273;&#7847;u
t&#432; &#7903; n&#432;&#7899;c ngoài &#273;&#7875; tái &#273;&#7847;u t&#432;
vào chính d&#7921; án &#273;&#7847;u t&#432; &#273;ó khi Gi&#7845;y ch&#7913;ng
nh&#7853;n &#273;&#7847;u t&#432; ch&#432;a &#273;&#432;&#7907;c
&#273;i&#7873;u ch&#7881;nh theo quy &#273;&#7883;nh;</span></p>

<p style='margin:0cm;margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><span
lang=VI style='font-size:14.0pt;i
nhu&#7853;n thu &#273;&#432;&#7907;c t&#7915; d&#7921; án &#273;&#7847;u
t&#432; &#7903; n&#432;&#7899;c ngoài &#273;&#7875; &#273;&#7847;u t&#432; vào
d&#7921; án khác &#7903; n&#432;&#7899;c ngoài mà ch&#432;a
&#273;&#432;&#7907;c c&#7845;p Gi&#7845;y ch&#7913;ng nh&#7853;n &#273;&#7847;u
t&#432; theo quy &#273;&#7883;nh.</span></p>

<p style='margin:0cm;margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><span
lang=VI style='font-size:14.0pt;t ti&#7873;n
t&#7915; 50.000.000 &#273;&#7891;ng &#273;&#7871;n 60.000.000 &#273;&#7891;ng
&#273;&#7889;i v&#7899;i m&#7897;t trong các hành vi sau:</span></p>

<p style='margin:0cm;margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><span
lang=VI style='font-size:14.0pt;&#7847;u t&#432;
ra n&#432;&#7899;c ngoài khi ch&#432;a &#273;&#432;&#7907;c c&#417; quan nhà
n&#432;&#7899;c có th&#7849;m quy&#7873;n c&#7845;p Gi&#7845;y ch&#7913;ng
nh&#7853;n &#273;&#7847;u t&#432; ch&#7845;p thu&#7853;n;</span></p>

<p style='margin:0cm;margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><span
lang=VI style='font-size:14.0pt;n v&#7889;n
&#273;&#7847;u t&#432; ra n&#432;&#7899;c ngoài khi ch&#432;a
&#273;&#432;&#7907;c c&#7845;p Gi&#7845;y ch&#7913;ng nh&#7853;n &#273;&#7847;u
t&#432; ho&#7863;c ch&#432;a &#273;&#432;&#7907;c c&#417; quan nhà
n&#432;&#7899;c có th&#7849;m quy&#7873;n c&#7911;a n&#432;&#7899;c ti&#7871;p
nh&#7853;n &#273;&#7847;u t&#432; ch&#7845;p thu&#7853;n;</span></p>

<p style='margin:0cm;margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><span
lang=VI style='font-size:14.0pt; d&#7909;ng
v&#7889;n nhà n&#432;&#7899;c &#273;&#7875; &#273;&#7847;u t&#432; ra
n&#432;&#7899;c ngoài không &#273;úng quy &#273;&#7883;nh.</span></p>

<p style='margin:0cm;margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><span
lang=VI style='font-size:14.0pt;n pháp
kh&#7855;c ph&#7909;c h&#7853;u qu&#7843;:</span></p>

<p style='margin:0cm;margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><span
lang=VI style='font-size:14.0pt;c th&#7921;c
hi&#7879;n báo cáo &#273;&#7847;u t&#432; theo quy &#273;&#7883;nh
&#273;&#7889;i v&#7899;i hành vi vi ph&#7841;m quy &#273;&#7883;nh t&#7841;i
&#272;i&#7875;m a Kho&#7843;n 1 &#272;i&#7873;u này;</span></p>

<p style='margin:0cm;margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><span
lang=VI style='font-size:14.0pt;c th&#7921;c
hi&#7879;n &#273;úng các n&#7897;i dung c&#7911;a Gi&#7845;y ch&#7913;ng
nh&#7853;n &#273;&#7847;u t&#432; &#273;&#7889;i v&#7899;i hành vi vi
ph&#7841;m quy &#273;&#7883;nh t&#7841;i &#272;i&#7875;m a Kho&#7843;n 2
&#272;i&#7873;u này;</span></p>

<p style='margin:0cm;margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><span
lang=VI style='font-size:14.0pt;c
&#273;&#259;ng k\u01b0 &#273;i&#7873;u ch&#7881;nh Gi&#7845;y ch&#7913;ng nh&#7853;n
&#273;&#7847;u t&#432; &#273;&#7889;i v&#7899;i hành vi vi ph&#7841;m quy
&#273;&#7883;nh t&#7841;i &#272;i&#7875;m b Kho&#7843;n 3 &#272;i&#7873;u này;</span></p>

<p style='margin:0cm;margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><span
lang=VI style='font-size:14.0pt;c th&#7921;c
hi&#7879;n th&#7911; t&#7909;c &#273;&#7847;u t&#432; &#273;&#7889;i v&#7899;i
hành vi vi ph&#7841;m quy &#273;&#7883;nh t&#7841;i &#272;i&#7875;m c
Kho&#7843;n 3 &#272;i&#7873;u này.</span></p>

<p style='margin:0cm;margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><a
name="dieu_13"><b><span lang=VI style='font-size:14.0pt;i&#7873;u
13. Vi ph&#7841;m các quy &#273;&#7883;nh v&#7873; &#432;u &#273;\u0103i
&#273;&#7847;u t&#432;</span></b></a><span style='margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'></p>

<p style='margin:0cm;margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><span
lang=VI style='font-size:14.0pt;t ti&#7873;n
t&#7915; 15.000.000 &#273;&#7891;ng &#273;&#7871;n 20.000.000 &#273;&#7891;ng
&#273;&#7889;i v&#7899;i hành vi kê khai không chính xác, không trung
th&#7921;c các thông tin c&#7847;n thi&#7871;t &#273;&#7875;
&#273;&#432;&#7907;c h&#432;&#7903;ng &#432;u &#273;\u0103i &#273;&#7847;u t&#432;.</span></p>

<p style='margin:0cm;margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><span
lang=VI style='font-size:14.0pt;n pháp
kh&#7855;c ph&#7909;c h&#7853;u qu&#7843;: Bu&#7897;c hoàn tr&#7843;
nh&#7919;ng &#432;u &#273;\u0103i &#273;&#7847;u t&#432; &#273;\u0103
&#273;&#432;&#7907;c h&#432;&#7903;ng không &#273;úng quy &#273;&#7883;nh
&#273;&#7889;i v&#7899;i hành vi vi ph&#7841;m quy &#273;&#7883;nh t&#7841;i
Kho&#7843;n 1 và Kho&#7843;n 2 &#272;i&#7873;u này.</span></p>

<p style='margin:0cm;margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><a
name="dieu_14"><b><span lang=VI style='font-size:14.0pt;i&#7873;u
14. Vi ph&#7841;m quy &#273;&#7883;nh v&#7873; &#273;&#7847;u t&#432; theo h\u0301nh
th&#7913;c h&#7907;p &#273;&#7891;ng xây d&#7921;ng - kinh doanh - chuy&#7875;n
giao (BOT), h&#7907;p &#273;&#7891;ng xây d&#7921;ng - chuy&#7875;n giao - kinh
doanh (BTO), h&#7907;p &#273;&#7891;ng xây d&#7921;ng - chuy&#7875;n giao (BT)
và h&#7907;p &#273;&#7891;ng h&#7907;p tác công t&#432; (PPP)</span></b></a><span
style='
margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><span
lang=VI style='font-size:14.0pt;t ti&#7873;n
t&#7915; 20.000.000 &#273;&#7891;ng &#273;&#7871;n 30.000.000 &#273;&#7891;ng
&#273;&#7889;i v&#7899;i m&#7897;t trong các hành vi sau:</span></p>

<p style='margin:0cm;margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><span
lang=VI style='font-size:14.0pt;c
hi&#7879;n bi&#7879;n pháp b&#7843;o &#273;&#7843;m th&#7921;c hi&#7879;n h&#7907;p
&#273;&#7891;ng d&#7921; án theo quy &#273;&#7883;nh;</span></p>

<p style='margin:0cm;margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><span
lang=VI style='font-size:14.0pt;p h&#7891;
s&#417; quy&#7871;t toán giá tr&#7883; công tr\u0301nh hoàn thành không &#273;úng
quy &#273;&#7883;nh.</span></p>

<p style='margin:0cm;margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><span
lang=VI style='font-size:14.0pt;t ti&#7873;n
t&#7915; 30.000.000 &#273;&#7891;ng &#273;&#7871;n 40.000.000 &#273;&#7891;ng
&#273;&#7889;i v&#7899;i hành vi chuy&#7875;n giao công tr\u0301nh không &#273;úng
quy &#273;&#7883;nh.</span></p>

<p style='margin:0cm;margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><span
lang=VI style='font-size:14.0pt;t ti&#7873;n
t&#7915; 40.000.000 &#273;&#7891;ng &#273;&#7871;n 50.000.000 &#273;&#7891;ng
&#273;&#7889;i v&#7899;i hành vi l&#7853;p, th&#7849;m tra các n&#7897;i dung
trong Báo cáo nghiên c&#7913;u kh&#7843; thi không &#273;úng quy
&#273;&#7883;nh.</span></p>

<p style='margin:0cm;margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><span
lang=VI style='font-size:14.0pt;n pháp
kh&#7855;c ph&#7909;c h&#7853;u qu&#7843;: Bu&#7897;c th&#7921;c hi&#7879;n
bi&#7879;n pháp b&#7843;o &#273;&#7843;m th&#7921;c hi&#7879;n h&#7907;p
&#273;&#7891;ng d&#7921; án &#273;&#7889;i v&#7899;i hành vi vi ph&#7841;m quy
&#273;&#7883;nh t&#7841;i &#272;i&#7875;m a Kho&#7843;n 1 &#272;i&#7873;u này.</span></p>

<p style='margin:0cm;margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><a
name="dieu_15"><b><span lang=VI style='font-size:14.0pt;i&#7873;u
15. Vi ph&#7841;m quy &#273;&#7883;nh v&#7873; &#273;&#7847;u t&#432; h&#7879;
th&#7889;ng k&#7871;t c&#7845;u h&#7841; t&#7847;ng khu công nghi&#7879;p, khu
ch&#7871; xu&#7845;t, khu công ngh&#7879; cao, khu kinh t&#7871;</span></b></a><span
style='
margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><span
lang=VI style='font-size:14.0pt; ch&#7913;c, cá
nhân có hành vi vi ph&#7841;m các quy &#273;&#7883;nh v&#7873; &#273;&#7847;u
t&#432; h&#7879; th&#7889;ng k&#7871;t c&#7845;u h&#7841; t&#7847;ng k&#7929;
thu&#7853;t trong khu công nghi&#7879;p, khu ch&#7871; xu&#7845;t, khu công
ngh&#7879; cao, khu kinh t&#7871; th\u0301 b&#7883; x&#7917; ph&#7841;t theo quy
&#273;&#7883;nh t&#7841;i &#272;i&#7873;u 5, &#272;i&#7873;u 6, &#272;i&#7873;u
10, &#272;i&#7873;u 11 và &#272;i&#7873;u 13 c&#7911;a Ngh&#7883;
&#273;&#7883;nh này.</span></p>

<p style='margin:0cm;margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><a
name="muc_3"><b><span lang=VI style='font-size:14.0pt;C
3. HÀNH VI VI PH&#7840;M HÀNH CHÍNH TRONG L&#296;NH V&#7920;C &#272;&#7844;U
TH&#7846;U, H\u0300NH TH&#7912;C X&#7916; PH&#7840;T VÀ BI&#7878;N PHÁP KH&#7854;C
PH&#7908;C H&#7852;U QU&#7842;</span></b></a><span style='margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><a
name="dieu_16"><b><span lang=VI style='font-size:14.0pt;i&#7873;u
16. Vi ph&#7841;m các quy &#273;&#7883;nh v&#7873; k&#7871; ho&#7841;ch
&#273;&#7845;u th&#7847;u</span></b></a><span style='margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><span
lang=VI style='font-size:14.0pt;t ti&#7873;n
t&#7915; 10.000.000 &#273;&#7891;ng &#273;&#7871;n 15.000.000 &#273;&#7891;ng
&#273;&#7889;i v&#7899;i m&#7897;t trong các hành vi sau:</span></p>

<p style='margin:0cm;margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><span
lang=VI style='font-size:14.0pt;p, th&#7849;m
&#273;&#7883;nh, phê duy&#7879;t k&#7871; ho&#7841;ch &#273;&#7845;u th&#7847;u
không &#273;úng tr\u0301nh t&#7921;, th&#7911; t&#7909;c và th&#7849;m quy&#7873;n
theo quy &#273;&#7883;nh;</span></p>

<p style='margin:0cm;margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><span

<p style='margin:0cm;margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><span

m&#7901;i th&#7847;u, thông báo m&#7901;i chào hàng.</span></p>

t&#7915; 10.000.000 &#273;&#7891;ng &#273;&#7871;n 15.000.000 &#273;&#7891;ng
&#273;&#7889;i v&#7899;i m&#7897;t trong các hành vi sau:</span></p>

<p style='margin:0cm;margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><span

<p style='margin:0cm;margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><span

<p style='margin:0cm;margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><span

<p style='margin:0cm;margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><span

<p style='margin:0cm;margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><span

<p style='margin:0cm;margin-bottom:.0001pt;text-align:justify;text-indent:27.0pt'><span

hành vi vi ph&#7841;m quy &#273;&#7883;nh t&#7841;i &#272;i&#7875;m b Kho&#7843;n
2 &#272;i&#7873;u này;</span></p>
