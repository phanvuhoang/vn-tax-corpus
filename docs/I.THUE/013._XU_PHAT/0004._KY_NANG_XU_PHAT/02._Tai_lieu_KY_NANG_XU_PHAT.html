<h2><a name="_Toc131755280">I. M&#7896;T S&#7888; KHÁI NI&#7878;M</a></h2>

<h3><a name="_Toc131755281">1. Vi ph&#7841;m hành chính</a></h3>

<p class=MsoTitle><a name="_Toc131755282">1.1. Khái ni&#7879;m</a></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>Vi ph&#7841;m hành chính là lo&#7841;i vi
ph&#7841;m pháp lu&#7853;t x&#7843;y ra khá ph&#7893; bi&#7871;n trong &#273;&#7901;i
s&#7889;ng x\u0103 h&#7897;i, tuy m&#7913;c &#273;&#7897; nguy hi&#7875;m cho x\u0103 h&#7897;i
c&#7911;a nó th&#7845;p h&#417;n so v&#7899;i t&#7897;i ph&#7841;m, nh&#432;ng
vi ph&#7841;m hành chính là hành vi gây thi&#7879;t h&#7841;i ho&#7863;c
&#273;e d&#7885;a gây thi&#7879;t h&#7841;i cho l&#7907;i ích c&#7911;a Nhà
n&#432;&#7899;c, t&#7853;p th&#7875;, cá nhân c&#361;ng nh&#432; l&#7907;i ích
chung c&#7911;a t&#7853;p th&#7875; c&#7897;ng &#273;&#7891;ng, là nguyên nhân
d&#7851;n &#273;&#7871;n t\u0301nh tr&#7841;ng ph&#7841;m t&#7897;i n&#7843;y sinh
trên các l&#297;nh v&#7921;c c&#7911;a &#273;&#7901;i s&#7889;ng - x\u0103 h&#7897;i
n&#7871;u nh&#432; không &#273;&#432;&#7907;c ng&#259;n ch&#7863;n và x&#7917;
l\u01b0 k&#7883;p th&#7901;i. Chính v\u0301 l&#7869; &#273;ó, công tác &#273;&#7845;u
tranh ph\u0323ng, ch&#7889;ng vi ph&#7841;m hành chính luôn &#273;&#432;&#7907;c x\u0103
h&#7897;i quan tâm.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>Khái ni&#7879;m vi ph&#7841;m hành chính
&#273;&#432;&#7907;c quy &#273;&#7883;nh t&#7841;i kho&#7843;n 1 &#272;i&#7873;u
2 Lu&#7853;t X&#7917; l\u01b0 vi ph&#7841;m hành chính 2020 c&#7909; th&#7875;
nh&#432; sau: Vi ph&#7841;m hành chính là hành vi có l&#7895;i do cá nhân, t&#7893;
ch&#7913;c th&#7921;c hi&#7879;n, vi ph&#7841;m quy &#273;&#7883;nh c&#7911;a
pháp lu&#7853;t v&#7873; qu&#7843;n l\u01b0 nhà n&#432;&#7899;c mà không ph&#7843;i
là t&#7897;i ph&#7841;m và theo quy &#273;&#7883;nh c&#7911;a pháp lu&#7853;t
ph&#7843;i b&#7883; x&#7917; ph&#7841;t vi ph&#7841;m hành chính.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>Nh&#432; v&#7853;y, vi ph&#7841;m hành
chính là m&#7897;t d&#7841;ng c&#7909; th&#7875; c&#7911;a vi ph&#7841;m pháp
lu&#7853;t, tuy m&#7913;c &#273;&#7897; nguy hi&#7875;m c&#7911;a nó th&#7845;p
h&#417;n t&#7897;i ph&#7841;m h\u0301nh s&#7921;, nh&#432;ng c&#361;ng là hành vi
gây thi&#7879;t h&#7841;i ho&#7863;c &#273;e d&#7885;a gây thi&#7879;t h&#7841;i
&#273;&#7871;n l&#7907;i ích c&#7911;a Nhà n&#432;&#7899;c, c&#7911;a t&#7853;p
th&#7875;, l&#7907;i ích c&#7911;a cá nhân c&#361;ng nh&#432; l&#7907;i ích
chung c&#7911;a toàn x\u0103 h&#7897;i, gây m&#7845;t tr&#7853;t t&#7921; k&#7927;
c&#432;&#417;ng trong các l&#297;nh v&#7921;c qu&#7843;n l\u01b0 nhà n&#432;&#7899;c.</span></p>

<p class=MsoTitle><a name="_Toc131755283">1.2. &#272;&#7863;c &#273;i&#7875;m c&#7911;a
vi ph&#7841;m hành chính</a></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>T&#7915; khái ni&#7879;m trên, cho th&#7845;y
vi ph&#7841;m hành chính có nh&#7919;ng &#273;&#7863;c &#273;i&#7875;m sau:</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>- Th&#7913; nh&#7845;t, tính có l&#7895;i.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>L&#7895;i là thái &#273;&#7897; tâm l\u01b0 c&#7911;a
cá nhân, t&#7893; ch&#7913;c, &#273;&#7889;i v&#7899;i hành vi vi ph&#7841;m
quy &#273;&#7883;nh c&#7911;a pháp lu&#7853;t v&#7873; qu&#7843;n l\u01b0 nhà
n&#432;&#7899;c c&#7911;a m\u0301nh và &#273;&#7889;i v&#7899;i h&#7853;u qu&#7843;
c&#7911;a hành vi &#273;ó gây ra. L&#7895;i bao g&#7891;m l&#7895;i c&#7889; \u01b0
và l&#7895;i vô \u01b0.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>L&#7895;i c&#7889; \u01b0 là thái &#273;&#7897;
tâm l\u01b0 c&#7911;a cá nhân, t&#7893; ch&#7913;c, khi th&#7921;c hi&#7879;n hành
vi trái pháp lu&#7853;t, nh&#7853;n th&#7913;c &#273;&#432;&#7907;c ngh&#297;a
v&#7909; pháp l\u01b0 b&#7855;t bu&#7897;c, nh&#432;ng l&#7841;i có \u01b0 th&#7913;c xem
th&#432;&#7901;ng m&#7863;c dù h&#7885; hoàn toàn có kh&#7843; n&#259;ng x&#7917;
s&#7921; theo &#273;úng ngh&#297;a v&#7909; &#273;ó.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>L&#7895;i vô \u01b0 trong vi ph&#7841;m hành
chính là thái &#273;&#7897; tâm l\u01b0 c&#7911;a cá nhân, t&#7893; ch&#7913;c, khi
th&#7921;c hi&#7879;n hành vi trái pháp lu&#7853;t do vô t\u0301nh ho&#7863;c thi&#7871;u
th&#7853;n tr&#7885;ng, &#273;\u0103 không nh&#7853;n th&#7913;c &#273;&#432;&#7907;c
nh&#7919;ng ngh&#297;a v&#7909; pháp l\u01b0 b&#7855;t bu&#7897;c, m&#7863;c dù h&#7885;
có kh&#7843; n&#259;ng và &#273;i&#7873;u ki&#7879;n x&#7917; s&#7921; theo
&#273;úng ngh&#297;a v&#7909; này.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>L&#7895;i là d&#7845;u hi&#7879;u b&#7855;t
bu&#7897;c c&#7911;a vi ph&#7841;m hành chính.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>- Th&#7913; hai, tính trái pháp lu&#7853;t.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>&#272;&#432;&#7907;c th&#7875; hi&#7879;n &#7903;
hành vi vi ph&#7841;m quy &#273;&#7883;nh c&#7911;a pháp lu&#7853;t v&#7873; qu&#7843;n
l\u01b0 nhà n&#432;&#7899;c (nh&#432; vi ph&#7841;m các quy &#273;&#7883;nh v&#7873;
qu&#7843;n l\u01b0 s&#7917; d&#7909;ng &#273;&#7845;t &#273;ai, vi ph&#7841;m các
quy &#273;&#7883;nh v&#7873; khám ch&#7919;a b&#7879;nh, vi ph&#7841;m các quy
&#273;&#7883;nh v&#7873; b&#7843;o v&#7879; môi tr&#432;&#7901;ng, an toàn v&#7879;
sinh th&#7921;c ph&#7849;m...).</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>- Th&#7913; ba, không ph&#7843;i là t&#7897;i
ph&#7841;m.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>Ngh&#297;a là v&#7873; tính ch&#7845;t, m&#7913;c
&#273;&#7897; nguy hi&#7875;m cho x\u0103 h&#7897;i c&#7911;a hành vi vi ph&#7841;m
ch&#432;a &#273;&#7871;n m&#7913;c ph&#7843;i b&#7883; truy c&#7913;u trách nhi&#7879;m
h\u0301nh s&#7921;, ho&#7863;c hành vi vi ph&#7841;m &#273;ó ch&#432;a &#273;&#7911;
d&#7845;u hi&#7879;u c&#7845;u thành m&#7897;t t&#7897;i ph&#7841;m c&#7909; th&#7875;
&#273;&#432;&#7907;c B&#7897; lu&#7853;t H\u0301nh s&#7921; quy &#273;&#7883;nh.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>- Th&#7913; t&#432;, theo quy &#273;&#7883;nh
c&#7911;a pháp lu&#7853;t ph&#7843;i b&#7883; x&#7917; ph&#7841;t ho&#7863;c b&#7883;
x&#7917; l\u01b0 vi ph&#7841;m hành chính.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>&#272;i&#7873;u này có ngh&#297;a là không
b&#7883; coi là vi ph&#7841;m hành chính n&#7871;u hành vi &#273;ó không
&#273;&#432;&#7907;c pháp lu&#7853;t (pháp lu&#7853;t v&#7873; x&#7917; ph&#7841;t
ho&#7863;c x&#7917; l\u01b0 vi ph&#7841;m hành chính) quy &#273;&#7883;nh ph&#7843;i
b&#7883; x&#7917; ph&#7841;t ho&#7863;c x&#7917; l\u01b0 vi ph&#7841;m hành chính.</span></p>

<p class=MsoTitle><a name="_Toc131755284">1.3. Phân bi&#7879;t vi ph&#7841;m
hành chính và t&#7897;i ph&#7841;m</a></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>Vi ph&#7841;m hành chính là hành vi nguy
hi&#7875;m cho x\u0103 h&#7897;i nh&#432;ng ch&#432;a &#273;&#7871;n m&#7913;c ph&#7843;i
truy c&#7913;u trách nhi&#7879;m h\u0301nh s&#7921;. V\u0301 th&#7871;, khi x&#7917; l\u01b0
các vi ph&#7841;m hành chính, c&#7847;n &#273;&#7863;c bi&#7879;t l&#432;u \u01b0
&#273;&#7871;n vi&#7879;c nh&#7853;n bi&#7871;t các d&#7845;u hi&#7879;u &#273;&#7875;
phân bi&#7879;t vi ph&#7841;m hành chính v&#7899;i t&#7897;i ph&#7841;m h\u0301nh s&#7921;.
T&#7897;i ph&#7841;m hay vi ph&#7841;m hành chính &#273;&#7873;u là vi ph&#7841;m
pháp lu&#7853;t, do &#273;ó gi&#7919;a hai khái ni&#7879;m này có nh&#7919;ng
nét t&#432;&#417;ng &#273;&#7891;ng r&#7845;t khó &#273;&#7875; xác &#273;&#7883;nh
ranh gi&#7899;i. N&#7871;u không phân bi&#7879;t chính xác hai khái ni&#7879;m
này th\u0301 d&#7877; x&#7843;y ra t\u0301nh tr&#7841;ng \u201c&#273;&#7875; l&#7885;t t&#7897;i
ph&#7841;m\u201d ho&#7863;c \u201cx&#7917; l\u01b0 oan ng&#432;&#7901;i vi ph&#7841;m
ch&#432;a &#273;&#7871;n m&#7913;c ph&#7841;m t&#7897;i\u201d.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>D&#7845;u hi&#7879;u c&#259;n b&#7843;n
&#273;&#7875; phân bi&#7879;t vi ph&#7841;m hành chính v&#7899;i t&#7897;i ph&#7841;m
là m&#7913;c &#273;&#7897; nguy hi&#7875;m cho x\u0103 h&#7897;i c&#7911;a hành vi
vi ph&#7841;m, vi ph&#7841;m hành chính có m&#7913;c &#273;&#7897; nguy hi&#7875;m
th&#7845;p h&#417;n t&#7897;i ph&#7841;m. Và c&#259;n c&#7913; vào các quy
&#273;&#7883;nh hi&#7879;n hành, vi&#7879;c &#273;ánh giá m&#7913;c &#273;&#7897;
nguy hi&#7875;m c&#7911;a t&#7897;i ph&#7841;m và vi ph&#7841;m hành chính
th&#432;&#7901;ng d&#7921;a vào nh&#7919;ng c&#259;n c&#7913; d&#432;&#7899;i
&#273;ây:</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>- M&#7913;c &#273;&#7897; gây thi&#7879;t
h&#7841;i cho x\u0103 h&#7897;i.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>&#272;i&#7873;u này &#273;&#432;&#7907;c
các nhà làm lu&#7853;t miêu t&#7843; c&#7909; th&#7875; &#273;&#7889;i v&#7899;i
các lo&#7841;i t&#7897;i ph&#7841;m trong B&#7897; lu&#7853;t H\u0301nh s&#7921; hi&#7879;n
nay. D&#7921;a vào d&#7845;u hi&#7879;u này, ta có th&#7875; phân bi&#7879;t
ranh gi&#7899;i gi&#7919;a vi ph&#7841;m hành chính v&#7899;i t&#7897;i ph&#7841;m.
M&#7913;c &#273;&#7897; gây thi&#7879;t h&#7841;i có th&#7875; bi&#7875;u hi&#7879;n
d&#432;&#7899;i nhi&#7873;u h\u0301nh th&#7913;c khác nhau nh&#432; giá tr&#7883;
tài s&#7843;n b&#7883; xâm h&#7841;i, m&#7913;c &#273;&#7897; gây
th&#432;&#417;ng t&#7853;t, giá tr&#7883; hàng hóa vi ph&#7841;m,...</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>- M&#7913;c &#273;&#7897; tái ph&#7841;m
ho&#7863;c vi ph&#7841;m nhi&#7873;u l&#7847;n.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>D&#7845;u hi&#7879;u này c&#361;ng có th&#7875;
giúp chúng ta xác &#273;&#7883;nh &#273;&#432;&#7907;c ranh gi&#7899;i gi&#7919;a
t&#7897;i ph&#7841;m và vi ph&#7841;m hành chính. Trong B&#7897; lu&#7853;t
H\u0301nh s&#7921;, nhi&#7873;u lo&#7841;i t&#7897;i ph&#7841;m &#273;&#432;&#7907;c
nhà làm lu&#7853;t mô t&#7843; \u201c&#273;\u0103 b&#7883; x&#7917; ph&#7841;t vi ph&#7841;m
hành chính\u201d. Trong nh&#7919;ng tr&#432;&#7901;ng h&#7907;p này, n&#7871;u ch&#7881;
&#273;ánh giá v&#7873; m&#7863;t hành vi, th\u0301 khó xác &#273;&#7883;nh
&#273;&#432;&#7907;c &#273;ó là t&#7897;i ph&#7841;m hay vi ph&#7841;m hành
chính mà ph&#7843;i c&#259;n c&#7913; vào d&#7845;u hi&#7879;u tái ph&#7841;m
ho&#7863;c vi ph&#7841;m nhi&#7873;u l&#7847;n.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>- Công c&#7909;, ph&#432;&#417;ng ti&#7879;n,
th&#7911; &#273;o&#7841;n th&#7921;c hi&#7879;n hành vi vi ph&#7841;m.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>&#272;ây c&#361;ng là m&#7897;t trong nh&#7919;ng
c&#259;n c&#7913; &#273;&#7871; &#273;ánh giá m&#7913;c &#273;&#7897; nguy hi&#7875;m
cho x\u0103 h&#7897;i c&#7911;a hành vi vi ph&#7841;m.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>Ngoài m&#7913;c &#273;&#7897; nguy hi&#7875;m
cho x\u0103 h&#7897;i c&#7911;a hành vi, vi ph&#7841;m hành chính và t&#7897;i ph&#7841;m
c\u0323n phân bi&#7879;t v&#7899;i nhau &#7903; m&#7897;t s&#7889; d&#7845;u hi&#7879;u
pháp l\u01b0 khác nh&#432;: T&#7897;i ph&#7841;m là lo&#7841;i vi ph&#7841;m
&#273;&#432;&#7907;c quy &#273;&#7883;nh trong B&#7897; lu&#7853;t H\u0301nh s&#7921;
và Qu&#7889;c h&#7897;i có th&#7849;m quy&#7873;n quy &#273;&#7883;nh v&#7873;
t&#7897;i ph&#7841;m và h\u0301nh ph&#7841;t. C\u0323n vi ph&#7841;m hành chính
&#273;&#432;&#7907;c quy &#273;&#7883;nh trong nhi&#7873;u v&#259;n b&#7843;n
pháp lu&#7853;t khác nhau c&#7911;a các c&#417; quan nhà n&#432;&#7899;c có th&#7849;m
quy&#7873;n nh&#432; lu&#7853;t, pháp l&#7879;nh, ngh&#7883; &#273;&#7883;nh.
Ch&#7911; th&#7875; c&#7911;a t&#7897;i ph&#7841;m: Là cá nhân có n&#259;ng l&#7921;c
trách nhi&#7879;m h\u0301nh s&#7921; và pháp nhân th&#432;&#417;ng m&#7841;i, c\u0323n ch&#7911;
th&#7875; c&#7911;a vi ph&#7841;m hành chính có th&#7875; là cá nhân ho&#7863;c
t&#7893; ch&#7913;c (c&#417; quan nhà n&#432;&#7899;c, các pháp nhân,.).</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>Tóm l&#7841;i, ngoài &#273;&#7863;c
&#273;i&#7875;m chung &#273;&#7873;u là vi ph&#7841;m pháp lu&#7853;t th\u0301 vi ph&#7841;m
hành chính và t&#7897;i ph&#7841;m c\u0323n có nh&#7919;ng &#273;&#7863;c &#273;i&#7875;m
riêng &#273;&#7875; có th&#7875; phân bi&#7879;t hai khái ni&#7879;m này. Và vi&#7879;c
nh&#7853;n th&#7913;c r\u01a1 hai khái ni&#7879;m này, nh&#7845;t là nh&#7919;ng
&#273;&#7863;c &#273;i&#7875;m riêng gi&#7919;a chúng là r&#7845;t c&#7847;n
thi&#7871;t &#273;&#7889;i v&#7899;i các c&#417; quan nhà n&#432;&#7899;c có th&#7849;m
quy&#7873;n x&#7917; l\u01b0 vi ph&#7841;m hành chính và c&#417; quan có th&#7849;m
quy&#7873;n truy c&#7913;u trách nhi&#7879;m h\u0301nh s&#7921;, &#273;&#7875; t&#7915;
&#273;ó có th&#7875; x&#7917; l\u01b0 chính xác nh&#7919;ng v&#7909; vi&#7879;c
&#273;\u0103, &#273;ang và s&#7869; x&#7843;y ra trong &#273;&#7901;i s&#7889;ng, x\u0103
h&#7897;i. &#272;&#7863;c bi&#7879;t, khi xem xét v&#7909; vi ph&#7841;m &#273;&#7875;
quy&#7871;t &#273;&#7883;nh x&#7917; ph&#7841;t vi ph&#7841;m hành chính, n&#7871;u
xét th&#7845;y hành vi vi ph&#7841;m có d&#7845;u hi&#7879;u t&#7897;i ph&#7841;m,
th\u0301 ng&#432;&#7901;i có th&#7849;m quy&#7873;n x&#7917; ph&#7841;t ph&#7843;i
chuy&#7875;n ngay h&#7891; s&#417; v&#7909; vi ph&#7841;m cho c&#417; quan ti&#7871;n
hành t&#7889; t&#7909;ng h\u0301nh s&#7921; có th&#7849;m quy&#7873;n. Nghiêm c&#7845;m
vi&#7879;c gi&#7919; l&#7841;i nh&#7919;ng v&#7909; vi ph&#7841;m có d&#7845;u
hi&#7879;u vi ph&#7841;m h\u0301nh s&#7921; &#273;&#7875; x&#7917; l\u01b0 hành chính.</span></p>

<h3><a name="_Toc131755285">2. X&#7917; ph&#7841;t vi ph&#7841;m hành chính</a></h3>

<h4><a name="_Toc131755286">2.1. Khái ni&#7879;m, &#273;&#7863;c &#273;i&#7875;m
x&#7917; ph&#7841;t vi ph&#7841;m hành chính</a></h4>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>X&#7917; ph&#7841;t vi ph&#7841;m hành
chính là vi&#7879;c ng&#432;&#7901;i có th&#7849;m quy&#7873;n x&#7917; ph&#7841;t
áp d&#7909;ng h\u0301nh th&#7913;c x&#7917; ph&#7841;t, bi&#7879;n pháp kh&#7855;c
ph&#7909;c h&#7853;u qu&#7843; &#273;&#7889;i v&#7899;i cá nhân, t&#7893; ch&#7913;c
th&#7921;c hi&#7879;n hành vi vi ph&#7841;m hành chính theo quy &#273;&#7883;nh
c&#7911;a pháp lu&#7853;t v&#7873; x&#7917; ph&#7841;t vi ph&#7841;m hành chính
(kho&#7843;n 2 &#272;i&#7873;u 2 Lu&#7853;t X&#7917; l\u01b0 vi ph&#7841;m hành
chính).</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>Ho&#7841;t &#273;&#7897;ng x&#7917; ph&#7841;t
vi ph&#7841;m hành chính có &#273;&#7863;c &#273;i&#7875;m sau:</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>- X&#7917; ph&#7841;t vi ph&#7841;m hành
chính &#273;&#432;&#7907;c áp d&#7909;ng &#273;&#7889;i v&#7899;i cá nhân, t&#7893;
ch&#7913;c vi ph&#7841;m hành chính theo quy &#273;&#7883;nh c&#7911;a pháp lu&#7853;t.
Nói cách khác, vi ph&#7841;m hành chính là c&#417; s&#7903; &#273;&#7875; ti&#7871;n
hành ho&#7841;t &#273;&#7897;ng x&#7917; ph&#7841;t vi ph&#7841;m hành chính.
Lu&#7853;t X&#7917; l\u01b0 vi ph&#7841;m hành chính và các ngh&#7883; &#273;&#7883;nh
h&#432;&#7899;ng d&#7851;n thi hành c&#7911;a Chính ph&#7911; quy &#273;&#7883;nh
hành vi vi ph&#7841;m hành chính, h\u0301nh th&#7913;c, bi&#7879;n pháp x&#7917; ph&#7841;t
hành chính áp d&#7909;ng &#273;&#7889;i v&#7899;i t&#7893; ch&#7913;c, cá nhân
vi ph&#7841;m hành chính trong các l&#297;nh v&#7921;c qu&#7843;n l\u01b0 hành chính
nhà n&#432;&#7899;c, c&#7909; th&#7875;, là nh&#7919;ng c&#417; s&#7903; pháp
l\u01b0 quan tr&#7885;ng &#273;&#7875; ti&#7871;n hành ho&#7841;t &#273;&#7897;ng x&#7917;
ph&#7841;t vi ph&#7841;m hành chính.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>- X&#7917; ph&#7841;t vi ph&#7841;m hành
chính &#273;&#432;&#7907;c ti&#7871;n hành b&#7903;i các ch&#7911; th&#7875; có
th&#7849;m quy&#7873;n theo quy &#273;&#7883;nh c&#7911;a pháp lu&#7853;t. Lu&#7853;t
X&#7917; l\u01b0 vi ph&#7841;m hành chính và các v&#259;n b&#7843;n pháp lu&#7853;t
khác có quy &#273;&#7883;nh v&#7873; x&#7917; ph&#7841;t vi ph&#7841;m hành
chính quy &#273;&#7883;nh c&#7909; th&#7875; các ch&#7911; th&#7875; có th&#7849;m
quy&#7873;n x&#7917; ph&#7841;t vi ph&#7841;m hành chính, h\u0301nh th&#7913;c, m&#7913;c
&#273;&#7897; x&#7917; ph&#7841;t vi ph&#7841;m hành chính mà h&#7885;
&#273;&#432;&#7907;c phép áp d&#7909;ng &#273;&#7889;i v&#7899;i t&#7893; ch&#7913;c,
cá nhân vi ph&#7841;m hành chính.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>- X&#7917; ph&#7841;t vi ph&#7841;m hành
chính &#273;&#432;&#7907;c ti&#7871;n hành theo nh&#7919;ng nguyên t&#7855;c,
tr\u0301nh t&#7921;, th&#7911; t&#7909;c &#273;&#432;&#7907;c quy &#273;&#7883;nh
trong các v&#259;n b&#7843;n pháp lu&#7853;t v&#7873; x&#7917; ph&#7841;t vi ph&#7841;m
hành chính do các c&#417; quan nhà n&#432;&#7899;c có th&#7849;m quy&#7873;n
ban hành.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>Vi&#7879;c áp d&#7909;ng bi&#7879;n pháp x&#7917;
ph&#7841;t &#273;ó th&#7875; hi&#7879;n thái &#273;&#7897; nghiêm kh&#7855;c c&#7911;a
Nhà n&#432;&#7899;c, &#273;&#7889;i v&#7899;i các t&#7893; ch&#7913;c, cá nhân
vi ph&#7841;m hành chính. Vi&#7879;c x&#7917; ph&#7841;t vi ph&#7841;m hành
chính c\u0323n h&#432;&#7899;ng t&#7899;i m&#7909;c &#273;ích giáo d&#7909;c m&#7885;i
ng&#432;&#7901;i \u01b0 th&#7913;c tuân th&#7911; pháp lu&#7853;t hành chính nói
riêng và pháp lu&#7853;t nói chung, \u01b0 th&#7913;c tôn tr&#7885;ng các quy t&#7855;c
c&#7911;a &#273;&#7901;i s&#7889;ng, x\u0103 h&#7897;i, ph\u0323ng ng&#7915;a các vi ph&#7841;m
pháp lu&#7853;t có th&#7875; x&#7843;y ra.</span></p>

<p class=MsoTitle><a name="_Toc131755287">2.2. &#272;&#7889;i t&#432;&#7907;ng
b&#7883; x&#7917; ph&#7841;t vi ph&#7841;m hành chính</a></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>Các cá nhân, t&#7893; ch&#7913;c là ch&#7911;
th&#7875; th&#7921;c hi&#7879;n hành vi vi ph&#7841;m pháp lu&#7853;t hành
chính là &#273;&#7889;i t&#432;&#7907;ng b&#7883; x&#7917; ph&#7841;t vi ph&#7841;m
hành chính, ph&#7843;i có n&#259;ng l&#7921;c trách nhi&#7879;m hành chính theo
quy &#273;&#7883;nh c&#7911;a pháp lu&#7853;t.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>- Cá nhân: Là con ng&#432;&#7901;i c&#7909;
th&#7875;, có n&#259;ng l&#7921;c pháp lu&#7853;t và n&#259;ng l&#7921;c hành
vi, có các quy&#7873;n và ngh&#297;a v&#7909; theo các quy &#273;&#7883;nh pháp
lu&#7853;t. C á nhân là ch&#7911; th&#7875; c&#7911;a vi ph&#7841;m hành chính
ph&#7843;i s&#7869; tr&#7903; thành &#273;&#7889;i t&#432;&#7907;ng b&#7883; x&#7917;
ph&#7841;t vi ph&#7841;m hành chính khi có &#273;&#7911; hai &#273;i&#7873;u ki&#7879;n:
Có n&#259;ng l&#7921;c trách nhi&#7879;m hành chính và &#273;&#7841;t &#273;&#7897;
tu&#7893;i nh&#7845;t &#273;&#7883;nh. C&#7909; th&#7875;:</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>+ Ng&#432;&#7901;i t&#7915; &#273;&#7911;
14 tu&#7893;i &#273;&#7871;n d&#432;&#7899;i 16 tu&#7893;i b&#7883; x&#7917; ph&#7841;t
vi ph&#7841;m hành chính v&#7873; vi ph&#7841;m hành chính do c&#7889; \u01b0;
ng&#432;&#7901;i t&#7915; &#273;&#7911; 16 tu&#7893;i tr&#7903; lên b&#7883; x&#7917;
ph&#7841;t vi ph&#7841;m hành chính v&#7873; m&#7885;i vi ph&#7841;m hành
chính.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>+ Ng&#432;&#7901;i thu&#7897;c l&#7921;c
l&#432;&#7907;ng Quân &#273;&#7897;i nhân dân, Công an nhân dân vi ph&#7841;m
hành chính th\u0301 b&#7883; x&#7917; l\u01b0 nh&#432; &#273;&#7889;i v&#7899;i công dân
khác; tr&#432;&#7901;ng h&#7907;p c&#7847;n áp d&#7909;ng h\u0301nh th&#7913;c ph&#7841;t
t&#432;&#7899;c quy&#7873;n s&#7917; d&#7909;ng gi&#7845;y phép, ch&#7913;ng ch&#7881;
hành ngh&#7873; ho&#7863;c &#273;\u0301nh ch&#7881; ho&#7841;t &#273;&#7897;ng có th&#7901;i
h&#7841;n liên quan &#273;&#7871;n qu&#7889;c ph\u0323ng, an ninh th\u0301 ng&#432;&#7901;i
x&#7917; ph&#7841;t &#273;&#7873; ngh&#7883; c&#417; quan, &#273;&#417;n v&#7883;
Quân &#273;&#7897;i nhân dân, Công an nhân dân có th&#7849;m quy&#7873;n x&#7917;
l\u01b0.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>- T&#7893; ch&#7913;c: T&#7893; ch&#7913;c
b&#7883; x&#7917; ph&#7841;t vi ph&#7841;m hành chính v&#7873; m&#7885;i hành
vi vi ph&#7841;m hành chính do m\u0301nh gây ra. T&#7893; ch&#7913;c là &#273;&#7889;i
t&#432;&#7907;ng b&#7883; x&#7917; ph&#7841;t vi ph&#7841;m hành chính bao g&#7891;m:
Các c&#417; quan nhà n&#432;&#7899;c, t&#7893; ch&#7913;c chính tr&#7883;, t&#7893;
ch&#7913;c chính tr&#7883; - x\u0103 h&#7897;i, t&#7893; ch&#7913;c chính tr&#7883;
x\u0103 h&#7897;i ngh&#7873; nghi&#7879;p, t&#7893; ch&#7913;c x\u0103 h&#7897;i, t&#7893;
ch&#7913;c x\u0103 h&#7897;i ngh&#7873; nghi&#7879;p, t&#7893; ch&#7913;c kinh t&#7871;,
&#273;&#417;n v&#7883; v&#361; trang nhân dân và t&#7893; ch&#7913;c khác
&#273;&#432;&#7907;c thành l&#7853;p theo quy &#273;&#7883;nh c&#7911;a pháp lu&#7853;t.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>T&#7893; ch&#7913;c b&#7883; x&#7917; ph&#7841;t
vi ph&#7841;m hành chính khi có &#273;&#7911; các &#273;i&#7873;u ki&#7879;n
sau &#273;ây:</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>+ Là pháp nhân theo quy &#273;&#7883;nh c&#7911;a
pháp lu&#7853;t dân s&#7921; ho&#7863;c các t&#7893; ch&#7913;c khác
&#273;&#432;&#7907;c thành l&#7853;p theo quy &#273;&#7883;nh c&#7911;a pháp lu&#7853;t;</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>+ Hành vi vi ph&#7841;m hành chính do
ng&#432;&#7901;i &#273;&#7841;i di&#7879;n, ng&#432;&#7901;i &#273;&#432;&#7907;c
giao nhi&#7879;m v&#7909; nhân danh t&#7893; ch&#7913;c ho&#7863;c ng&#432;&#7901;i
th&#7921;c hi&#7879;n hành vi theo s&#7921; ch&#7881; &#273;&#7841;o, &#273;i&#7873;u
hành, phân công, ch&#7845;p thu&#7853;n c&#7911;a t&#7893; ch&#7913;c và hành
vi &#273;ó &#273;&#432;&#7907;c quy &#273;&#7883;nh t&#7841;i ngh&#7883; &#273;&#7883;nh
v&#7873; x&#7917; ph&#7841;t vi ph&#7841;m hành chính trong các l&#297;nh v&#7921;c
qu&#7843;n l\u01b0 nhà n&#432;&#7899;c.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>- Cá nhân, t&#7893; ch&#7913;c n&#432;&#7899;c
ngoài vi ph&#7841;m hành chính trong ph&#7841;m vi l\u0103nh th&#7893;, vùng ti&#7871;p
giáp l\u0103nh h&#7843;i, vùng &#273;&#7863;c quy&#7873;n kinh t&#7871; và th&#7873;m
l&#7909;c &#273;&#7883;a c&#7911;a n&#432;&#7899;c C&#7897;ng hoà x\u0103 h&#7897;i
ch&#7911; ngh&#297;a Vi&#7879;t Nam; trên tàu bay mang qu&#7889;c t&#7883;ch Vi&#7879;t
Nam, tàu bi&#7875;n mang c&#7901; qu&#7889;c t&#7883;ch Vi&#7879;t Nam th\u0301 b&#7883;
x&#7917; ph&#7841;t vi ph&#7841;m hành chính theo quy &#273;&#7883;nh c&#7911;a
pháp lu&#7853;t Vi&#7879;t Nam, tr&#7915; tr&#432;&#7901;ng h&#7907;p &#273;i&#7873;u
&#432;&#7899;c qu&#7889;c t&#7871; mà n&#432;&#7899;c C&#7897;ng h\u0323a x\u0103 h&#7897;i
ch&#7911; ngh&#297;a Vi&#7879;t Nam là thành viên có quy &#273;&#7883;nh khác</span></p>

<p class=MsoTitle><a name="_Toc131755288">2.3. Th&#7901;i h&#7841;n, th&#7901;i
hi&#7879;u trong x&#7917; ph&#7841;t vi ph&#7841;m hành chính</a></p>

<h4><a name="_Toc131755289">2.3.1. Th&#7901;i h&#7841;n &#273;&#432;&#7907;c
coi là ch&#432;a b&#7883; x&#7917; ph&#7841;t vi ph&#7841;m hành chính</a></h4>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>Theo quy &#273;&#7883;nh c&#7911;a B&#7897;
lu&#7853;t Dân s&#7921;, th&#7901;i h&#7841;n là kho&#7843;ng th&#7901;i gian
&#273;&#432;&#7907;c xác &#273;&#7883;nh t&#7915; th&#7901;i &#273;i&#7875;m
này &#273;&#7871;n th&#7901;i &#273;i&#7875;m khác. Th&#7901;i h&#7841;n có th&#7875;
&#273;&#432;&#7907;c tính b&#7857;ng phút, gi&#7901;, ngày, tu&#7847;n, tháng,
n&#259;m ho&#7863;c b&#7857;ng m&#7897;t s&#7921; ki&#7879;n có th&#7875; s&#7869;
x&#7843;y ra.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>Th&#7901;i h&#7841;n &#273;&#432;&#7907;c
coi là ch&#432;a b&#7883; x&#7917; ph&#7841;t vi ph&#7841;m hành chính:
&#272;&#432;&#7907;c quy &#273;&#7883;nh t&#7841;i &#272;i&#7873;u 7 Lu&#7853;t
X&#7917; l\u01b0 vi ph&#7841;m hành chính, c&#7909; th&#7875; nh&#432; sau:</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>\u201cCá nhân, t&#7893; ch&#7913;c b&#7883; x&#7917;
ph&#7841;t vi ph&#7841;m hành chính, n&#7871;u trong th&#7901;i h&#7841;n 06
tháng, k&#7875; t&#7915; ngày ch&#7845;p hành xong quy&#7871;t &#273;&#7883;nh
x&#7917; ph&#7841;t c&#7843;nh cáo ho&#7863;c 01 n&#259;m, k&#7875; t&#7915;
ngày ch&#7845;p hành xong quy&#7871;t &#273;&#7883;nh x&#7917; ph&#7841;t hành
chính khác ho&#7863;c t&#7915; ngày h&#7871;t th&#7901;i hi&#7879;u thi hành
quy&#7871;t &#273;&#7883;nh x&#7917; ph&#7841;t vi ph&#7841;m hành chính mà
không tái ph&#7841;m th\u0301 &#273;&#432;&#7907;c coi là ch&#432;a b&#7883; x&#7917;
ph&#7841;t vi ph&#7841;m hành chính\u201d.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>V&#7899;i vi&#7879;c quy &#273;&#7883;nh
th&#7901;i h&#7841;n &#273;&#432;&#7907;c coi là ch&#432;a b&#7883; x&#7917; ph&#7841;t
vi ph&#7841;m hành chính, th&#7875; hi&#7879;n tính nhân &#273;&#7841;o c&#7911;a
pháp lu&#7853;t XHCN, &#273;&#7891;ng th&#7901;i c\u0323n t&#7841;o c&#417; s&#7903;
pháp l\u01b0 cho vi&#7879;c xác &#273;&#7883;nh các t\u0301nh ti&#7871;t t&#259;ng n&#7863;ng,
gi&#7843;m nh&#7865; trách nhi&#7879;m hành chính. B&#7843;o &#273;&#7843;m cho
vi&#7879;c x&#7917; ph&#7841;t vi ph&#7841;m hành chính &#273;&#432;&#7907;c
nghiêm minh và chính xác.</span></p>

<h4><a name="_Toc131755290">2.3.2. Th&#7901;i hi&#7879;u x&#7917; ph&#7841;t vi
ph&#7841;m hành chính</a></h4>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>Th&#7901;i hi&#7879;u x&#7917; ph&#7841;t
vi ph&#7841;m hành chính &#273;&#432;&#7907;c hi&#7875;u là kho&#7843;ng th&#7901;i
gian do pháp lu&#7853;t quy &#273;&#7883;nh, mà khi h&#7871;t th&#7901;i gian
&#273;ó th\u0301 ng&#432;&#7901;i vi ph&#7841;m s&#7869; không b&#7883; x&#7917; ph&#7841;t
hành chính và &#273;&#7891;ng ngh&#297;a v&#7899;i vi&#7879;c ng&#432;&#7901;i
có th&#7849;m quy&#7873;n không &#273;&#432;&#7907;c x&#7917; ph&#7841;t n&#7919;a.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>Nh&#7857;m m&#7909;c &#273;ích phát hi&#7879;n,
x&#7917; l\u01b0 và thi hành quy&#7871;t &#273;&#7883;nh x&#7917; l\u01b0 vi ph&#7841;m
hành chính &#273;\u0103 x&#7843;y ra m&#7897;t cách nhanh chóng, k&#7883;p th&#7901;i,
pháp lu&#7853;t hi&#7879;n hành &#273;\u0103 quy &#273;&#7883;nh th&#7901;i hi&#7879;u
x&#7917; ph&#7841;t vi ph&#7841;m hành chính, c&#7909; th&#7875; nh&#432; sau:</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>- Th&#7901;i hi&#7879;u x&#7917; ph&#7841;t
vi ph&#7841;m hành chính là 01 n&#259;m, tr&#7915; các tr&#432;&#7901;ng h&#7907;p
sau &#273;ây: Vi ph&#7841;m hành chính v&#7873; k&#7871; toán; hóa
&#273;&#417;n; phí, l&#7879; phí; kinh doanh b&#7843;o hi&#7875;m; qu&#7843;n
l\u01b0 giá; ch&#7913;ng khoán; s&#7903; h&#7919;u trí tu&#7879;; xây d&#7921;ng; th&#7911;y
s&#7843;n; lâm nghi&#7879;p; &#273;i&#7873;u tra, quy ho&#7841;ch, th&#259;m
d\u0323, khai thác, s&#7917; d&#7909;ng ngu&#7891;n tài nguyên n&#432;&#7899;c; ho&#7841;t
&#273;&#7897;ng d&#7847;u khí và ho&#7841;t &#273;&#7897;ng khoáng s&#7843;n
khác; b&#7843;o v&#7879; môi tr&#432;&#7901;ng; n&#259;ng l&#432;&#7907;ng
nguyên t&#7917;; qu&#7843;n l\u01b0, phát tri&#7875;n nhà và công s&#7903;; &#273;&#7845;t
&#273;ai; &#273;ê &#273;i&#7873;u; báo chí; xu&#7845;t b&#7843;n; s&#7843;n xu&#7845;t,
xu&#7845;t kh&#7849;u, nh&#7853;p kh&#7849;u, kinh doanh hàng hóa; s&#7843;n xu&#7845;t,
buôn bán hàng c&#7845;m, hàng gi&#7843;; qu&#7843;n l\u01b0 lao &#273;&#7897;ng
ngoài n&#432;&#7899;c th\u0301 th&#7901;i hi&#7879;u x&#7917; ph&#7841;t vi ph&#7841;m
hành chính là 02 n&#259;m. Vi ph&#7841;m hành chính v&#7873; thu&#7871; th\u0301 th&#7901;i
hi&#7879;u x&#7917; ph&#7841;t vi ph&#7841;m hành chính theo quy &#273;&#7883;nh
c&#7911;a pháp lu&#7853;t v&#7873; qu&#7843;n l\u01b0 thu&#7871;.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>- Th&#7901;i &#273;i&#7875;m &#273;&#7875;
tính th&#7901;i hi&#7879;u x&#7917; ph&#7841;t vi ph&#7841;m hành chính
&#273;&#432;&#7907;c quy &#273;&#7883;nh nh&#432; sau:</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>+ &#272;&#7889;i v&#7899;i vi ph&#7841;m
hành chính &#273;\u0103 k&#7871;t thúc, th\u0301 th&#7901;i hi&#7879;u &#273;&#432;&#7907;c
tính t&#7915; th&#7901;i &#273;i&#7875;m ch&#7845;m d&#7913;t hành vi vi ph&#7841;m.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>+ &#272;&#7889;i v&#7899;i vi ph&#7841;m
hành chính &#273;ang &#273;&#432;&#7907;c th&#7921;c hi&#7879;n, th\u0301 th&#7901;i
hi&#7879;u &#273;&#432;&#7907;c tính t&#7915; th&#7901;i &#273;i&#7875;m phát
hi&#7879;n hành vi vi ph&#7841;m.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>- Tr&#432;&#7901;ng h&#7907;p x&#7917; ph&#7841;t
vi ph&#7841;m hành chính &#273;&#7889;i v&#7899;i cá nhân do c&#417; quan ti&#7871;n
hành t&#7889; t&#7909;ng chuy&#7875;n &#273;&#7871;n, th\u0301 th&#7901;i hi&#7879;u
&#273;&#432;&#7907;c áp d&#7909;ng nh&#432; &#273;&#7889;i v&#7899;i các vi ph&#7841;m
khác. Th&#7901;i gian c&#417; quan ti&#7871;n hành t&#7889; t&#7909;ng th&#7909;
l\u01b0, xem xét &#273;&#432;&#7907;c tính vào th&#7901;i hi&#7879;u x&#7917; ph&#7841;t
vi ph&#7841;m hành chính.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>Trong th&#7901;i h&#7841;n do pháp lu&#7853;t
quy &#273;&#7883;nh, n&#7871;u cá nhân, t&#7893; ch&#7913;c c&#7889; t\u0301nh tr&#7889;n
tránh, c&#7843;n tr&#7903; vi&#7879;c x&#7917; ph&#7841;t, th\u0301 th&#7901;i hi&#7879;u
x&#7917; ph&#7841;t vi ph&#7841;m hành chính &#273;&#432;&#7907;c tính l&#7841;i
k&#7875; t&#7915; th&#7901;i &#273;i&#7875;m ch&#7845;m d&#7913;t hành vi tr&#7889;n
tránh, c&#7843;n tr&#7903; vi&#7879;c x&#7917; ph&#7841;t.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>Cách tính th&#7901;i h&#7841;n, th&#7901;i
hi&#7879;u trong x&#7917; l\u01b0 vi ph&#7841;m hành chính &#273;&#432;&#7907;c áp d&#7909;ng
theo quy &#273;&#7883;nh c&#7911;a B&#7897; lu&#7853;t Dân s&#7921;, tr&#7915;
tr&#432;&#7901;ng h&#7907;p trong Lu&#7853;t X&#7917; l\u01b0 vi ph&#7841;m hành
chính có quy &#273;&#7883;nh c&#7909; th&#7875; th&#7901;i gian theo ngày làm
vi&#7879;c.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>Th&#7901;i gian ban &#273;êm &#273;&#432;&#7907;c
tính t&#7915; 22 gi&#7901; ngày hôm tr&#432;&#7899;c &#273;&#7871;n 06 gi&#7901;
ngày hôm sau.</span></p>

<h4><a name="_Toc131755291">2.3.3. Th&#7901;i h&#7841;n ra quy&#7871;t &#273;&#7883;nh
x&#7917; ph&#7841;t vi ph&#7841;m hành chính</a></h4>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>Th&#7901;i h&#7841;n ra quy&#7871;t &#273;&#7883;nh
x&#7917; ph&#7841;t vi ph&#7841;m hành chính &#273;&#432;&#7907;c quy &#273;&#7883;nh
t&#7841;i &#272;i&#7873;u 66 Lu&#7853;t X&#7917; l\u01b0 vi ph&#7841;m hành chính
2020 &#273;&#432;&#7907;c quy &#273;&#7883;nh r\u01a1 h&#417;n, chia thành các
tr&#432;&#7901;ng h&#7907;p v&#7899;i quy &#273;&#7883;nh th&#7901;i h&#7841;n
khác nhau &#273;&#7875; &#273;&#7843;m b&#7843;o tính phù h&#7907;p v&#7899;i
th&#7921;c t&#7871; trong quá tr\u0301nh áp d&#7909;ng, c&#7909; th&#7875; nh&#432;
sau:</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>- &#272;&#7889;i v&#7899;i v&#7909; vi&#7879;c
thông th&#432;&#7901;ng, th&#7901;i h&#7841;n ra quy&#7871;t &#273;&#7883;nh x&#7917;
ph&#7841;t là 07 ngày làm vi&#7879;c, k&#7875; t&#7915; ngày l&#7853;p biên b&#7843;n
vi ph&#7841;m hành chính; v&#7909; vi&#7879;c thu&#7897;c tr&#432;&#7901;ng h&#7907;p
ph&#7843;i chuy&#7875;n h&#7891; s&#417; &#273;&#7871;n ng&#432;&#7901;i có th&#7849;m
quy&#7873;n x&#7917; ph&#7841;t th\u0301 th&#7901;i h&#7841;n ra quy&#7871;t &#273;&#7883;nh
x&#7917; ph&#7841;t là 10 ngày làm vi&#7879;c, k&#7875; t&#7915; ngày l&#7853;p
biên b&#7843;n vi ph&#7841;m hành chính;</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>- &#272;&#7889;i v&#7899;i v&#7909; vi&#7879;c
thu&#7897;c tr&#432;&#7901;ng h&#7907;p gi&#7843;i tr\u0301nh ho&#7863;c ph&#7843;i
xác &#273;&#7883;nh giá tr&#7883; tang v&#7853;t, ph&#432;&#417;ng ti&#7879;n,
giám &#273;&#7883;nh, ki&#7875;m nghi&#7879;m, ki&#7875;m &#273;&#7883;nh, xét
nghi&#7879;m ho&#7863;c ph&#7843;i xác minh các t\u0301nh ti&#7871;t có liên quan
th\u0301 th&#7901;i h&#7841;n ra quy&#7871;t &#273;&#7883;nh x&#7917; ph&#7841;t t&#7889;i
&#273;a là 01 tháng, k&#7875; t&#7915; ngày l&#7853;p biên b&#7843;n;</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>- &#272;&#7889;i v&#7899;i v&#7909; vi&#7879;c
thu&#7897;c tr&#432;&#7901;ng h&#7907;p ph&#7843;i gi&#7843;i tr\u0301nh ho&#7863;c
xác &#273;&#7883;nh giá tr&#7883; tang v&#7853;t. mà &#273;&#7863;c bi&#7879;t
nghiêm tr&#7885;ng, có nhi&#7873;u t\u0301nh ti&#7871;t ph&#7913;c t&#7841;p, c&#7847;n
có thêm th&#7901;i gian &#273;&#7875; xác minh, thu th&#7853;p ch&#7913;ng c&#7913;
th\u0301 th&#7901;i h&#7841;n ra quy&#7871;t &#273;&#7883;nh x&#7917; ph&#7841;t t&#7889;i
&#273;a là 02 tháng, k&#7875; t&#7915; ngày l&#7853;p biên b&#7843;n vi ph&#7841;m
hành chính.</span></p>

<p class=MsoTitle><a name="_Toc131755292">2.4. Các t\u0301nh ti&#7871;t t&#259;ng n&#7863;ng,
gi&#7843;m nh&#7865; trách nhi&#7879;m hành chính</a></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>&#272;ây là các t\u0301nh ti&#7871;t mà
ng&#432;&#7901;i có th&#7849;m quy&#7873;n x&#7917; ph&#7841;t c&#7847;n
&#273;ánh giá, xem xét &#273;&#7875; quy&#7871;t &#273;&#7883;nh h\u0301nh th&#7913;c,
m&#7913;c x&#7917; ph&#7841;t cho phù h&#7907;p &#273;&#7875; &#273;&#7843;m b&#7843;o
nguyên t&#7855;c công b&#7857;ng trong x&#7917; ph&#7841;t vi ph&#7841;m hành
chính, làm c&#259;n c&#7913; ban hành quy&#7871;t &#273;&#7883;nh x&#7917; ph&#7841;t
phù h&#7907;p v&#7899;i nhân thân ng&#432;&#7901;i vi ph&#7841;m, b&#7843;o
&#273;&#7843;m vi&#7879;c x&#7917; ph&#7841;t phù h&#7907;p v&#7899;i tính ch&#7845;t,
m&#7913;c &#273;&#7897;, h&#7853;u qu&#7843; vi ph&#7841;m; &#273;&#7891;ng th&#7901;i
khuy&#7871;n khích ng&#432;&#7901;i vi ph&#7841;m thành th&#7853;t khai báo...
&#273;&#7875; &#273;&#432;&#7907;c áp d&#7909;ng h\u0301nh th&#7913;c, m&#7913;c ph&#7841;t
nh&#7865; h&#417;n m&#7913;c ph&#7841;t thông th&#432;&#7901;ng, ng&#432;&#7907;c
l&#7841;i ph&#7841;t n&#7863;ng &#273;&#7889;i v&#7899;i &#273;&#7889;i t&#432;&#7907;ng
vi ph&#7841;m nhi&#7873;u l&#7847;n, tái ph&#7841;m, th&#7853;m chí vi ph&#7841;m
v&#7899;i quy mô l&#7899;n, có t&#7893; ch&#7913;c, có tính ch&#7845;t côn
&#273;&#7891;, vi ph&#7841;m &#273;&#7889;i v&#7899;i nhi&#7873;u ng&#432;&#7901;i,
tr&#7867; em, ng&#432;&#7901;i già, ng&#432;&#7901;i khuy&#7871;t t&#7853;t, ph&#7909;
n&#7919; mang thai ho&#7863;c l&#259;ng m&#7841;, ph&#7881; báng ng&#432;&#7901;i
thi hành công v&#7909;, sau khi vi ph&#7841;m &#273;\u0103 c&#7889; t\u0301nh che gi&#7845;u
hành vi vi ph&#7841;m, gây khó kh&#259;n cho c&#417; quan, ng&#432;&#7901;i có
th&#7849;m quy&#7873;n trong vi&#7879;c xác minh v&#7909; vi&#7879;c.</span></p>

<h4><a name="_Toc131755293">2.4.1. T\u0301nh ti&#7871;t t&#259;ng n&#7863;ng</a></h4>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>&#272;i&#7873;u 10 Lu&#7853;t X&#7917; l\u01b0
vi ph&#7841;m hành chính quy &#273;&#7883;nh 12 t\u0301nh ti&#7871;t t&#259;ng n&#7863;ng,
c&#7909; th&#7875;:</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>- Vi ph&#7841;m hành chính có t&#7893; ch&#7913;c:
Là tr&#432;&#7901;ng h&#7907;p cá nhân, t&#7893; ch&#7913;c câu k&#7871;t v&#7899;i
cá nhân, t&#7893; ch&#7913;c khác &#273;&#7875; cùng th&#7921;c hi&#7879;n hành
vi vi ph&#7841;m hành chính.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>- Vi ph&#7841;m hành chính nhi&#7873;u l&#7847;n;
tái ph&#7841;m. Trong &#273;ó:</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>+ Vi ph&#7841;m hành chính nhi&#7873;u l&#7847;n:
Là tr&#432;&#7901;ng h&#7907;p cá nhân, t&#7893; ch&#7913;c th&#7921;c hi&#7879;n
hành vi vi ph&#7841;m hành chính mà tr&#432;&#7899;c &#273;ó &#273;\u0103 th&#7921;c
hi&#7879;n hành vi vi ph&#7841;m hành chính này nh&#432;ng ch&#432;a b&#7883; x&#7917;
l\u01b0 và ch&#432;a h&#7871;t th&#7901;i hi&#7879;u x&#7917; l\u01b0.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>+ Tái ph&#7841;m: Là vi&#7879;c cá nhân, t&#7893;
ch&#7913;c &#273;\u0103 b&#7883; x&#7917; l\u01b0 vi ph&#7841;m hành chính nh&#432;ng
ch&#432;a h&#7871;t th&#7901;i h&#7841;n &#273;&#432;&#7907;c coi là ch&#432;a
b&#7883; x&#7917; l\u01b0 vi ph&#7841;m hành chính, k&#7875; t&#7915; ngày ch&#7845;p
hành xong quy&#7871;t &#273;&#7883;nh x&#7917; ph&#7841;t, quy&#7871;t &#273;&#7883;nh
áp d&#7909;ng bi&#7879;n pháp x&#7917; l\u01b0 hành chính ho&#7863;c k&#7875; t&#7915;
ngày h&#7871;t th&#7901;i hi&#7879;u thi hành quy&#7871;t &#273;&#7883;nh này
mà l&#7841;i th&#7921;c hi&#7879;n hành vi vi ph&#7841;m hành chính &#273;\u0103 b&#7883;
x&#7917; l\u01b0.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>- Xúi gi&#7909;c, lôi kéo, s&#7917; d&#7909;ng
ng&#432;&#7901;i ch&#432;a thành niên vi ph&#7841;m; ép bu&#7897;c ng&#432;&#7901;i
b&#7883; l&#7879; thu&#7897;c vào m\u0301nh v&#7873; v&#7853;t ch&#7845;t, tinh th&#7847;n
th&#7921;c hi&#7879;n hành vi vi ph&#7841;m hành chính: Là tr&#432;&#7901;ng h&#7907;p
cá nhân, t&#7893; ch&#7913;c th&#7921;c hi&#7879;n hành vi xúi gi&#7909;c, lôi
kéo, s&#7917; d&#7909;ng ng&#432;&#7901;i ch&#432;a &#273;&#7911; 18 tu&#7893;i
th&#7921;c hi&#7879;n hành vi vi ph&#7841;m hành chính ho&#7863;c ép bu&#7897;c
ng&#432;&#7901;i b&#7883; l&#7879; thu&#7897;c vào m\u0301nh v&#7873; v&#7853;t ch&#7845;t,
tinh th&#7847;n th&#7921;c hi&#7879;n hành vi vi ph&#7841;m hành chính.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>B&#7883; ép bu&#7897;c &#273;&#432;&#7907;c
hi&#7875;u là hành vi dùng v&#361; l&#7921;c ho&#7863;c &#273;e d&#7885;a dùng
v&#361; l&#7921;c ho&#7863;c b&#7857;ng các h\u0301nh th&#7913;c (nh&#432; d&#7885;a
công b&#7889; thông tin &#273;&#7901;i t&#432; c&#7911;a ng&#432;&#7901;i b&#7883;
ép bu&#7897;c... ) nh&#7857;m kh&#7889;ng ch&#7871; t&#432; t&#432;&#7903;ng,
làm cho ng&#432;&#7901;i b&#7883; ép bu&#7897;c ph&#7843;i th&#7921;c hi&#7879;n
hành vi vi ph&#7841;m hành chính m&#7897;t cách mi&#7877;n c&#432;&#7905;ng. B&#7883;
l&#7879; thu&#7897;c v&#7873; v&#7853;t ch&#7845;t (nh&#432; &#273;&#432;&#7907;c
nuôi d&#432;&#7905;ng, &#273;&#432;&#7907;c tr&#7907; giúp v&#7873; &#273;i&#7873;u
ki&#7879;n sinh s&#7889;ng...), b&#7883; l&#7879; thu&#7897;c v&#7873; tinh th&#7847;n
(nh&#432; gi&#7919;a tín &#273;&#7891; v&#7899;i ng&#432;&#7901;i có ch&#7913;c
s&#7855;c v&#7873; tôn giáo, gi&#7919;a h&#7885;c sinh v&#7899;i th&#7847;y
giáo.).</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>- S&#7917; d&#7909;ng ng&#432;&#7901;i bi&#7871;t
r\u01a1 là &#273;ang b&#7883; tâm th&#7847;n ho&#7863;c b&#7879;nh khác làm m&#7845;t
kh&#7843; n&#259;ng nh&#7853;n th&#7913;c ho&#7863;c kh&#7843; n&#259;ng
&#273;i&#7873;u khi&#7875;n hành vi &#273;&#7875; vi ph&#7841;m hành chính:
&#272;ây &#273;&#432;&#7907;c hi&#7875;u là hành vi &#273;i&#7873;u khi&#7875;n
ho&#7863;c &#273;&#432;a ng&#432;&#7901;i mà m\u0301nh bi&#7871;t r\u01a1 là &#273;ang b&#7883;
b&#7879;nh tâm th&#7847;n ho&#7863;c các b&#7879;nh khác làm m&#7845;t kh&#7843;
n&#259;ng nh&#7853;n th&#7913;c ho&#7863;c kh&#7843; n&#259;ng &#273;i&#7873;u
khi&#7875;n hành vi &#273;&#7875; h&#7885; th&#7921;c hi&#7879;n hành vi vi ph&#7841;m
hành chính.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>- L&#259;ng m&#7841;, ph&#7881; báng
ng&#432;&#7901;i &#273;ang thi hành công v&#7909;; vi ph&#7841;m hành chính có tính
ch&#7845;t côn &#273;&#7891;:</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>+ L&#259;ng m&#7841;, ph&#7881; báng
ng&#432;&#7901;i &#273;ang thi hành công v&#7909; &#273;&#432;&#7907;c hi&#7875;u
là hành vi ch&#7917;i b&#7899;i thô t&#7909;c nh&#7857;m xúc ph&#7841;m danh d&#7921;,
nhân ph&#7849;m &#273;&#7889;i v&#7899;i ng&#432;&#7901;i thi hành công v&#7909;.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>+ Vi ph&#7841;m hành chính có tính ch&#7845;t
côn &#273;&#7891; &#273;&#432;&#7907;c hi&#7875;u là hành vi coi th&#432;&#7901;ng
pháp lu&#7853;t, vô c&#7899; ho&#7863;c ch&#7881; v\u0301 m&#7897;t duyên c&#7899;
nh&#7887; nh&#7863;t mà th&#7921;c hi&#7879;n hành vi vi ph&#7841;m pháp lu&#7853;t
hành chính.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>- L&#7907;i d&#7909;ng ch&#7913;c v&#7909;,
quy&#7873;n h&#7841;n &#273;&#7875; vi ph&#7841;m hành chính: &#272;&#432;&#7907;c
hi&#7875;u là ng&#432;&#7901;i có ch&#7913;c v&#7909;, quy&#7873;n h&#7841;n
trong c&#417; quan, t&#7893; ch&#7913;c &#273;\u0103 s&#7917; d&#7909;ng ch&#7913;c
v&#7909;, quy&#7873;n h&#7841;n c&#7911;a m\u0301nh nh&#432; m&#7897;t
ph&#432;&#417;ng ti&#7879;n &#273;&#7875; vi ph&#7841;m hành chính.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>- L&#7907;i d&#7909;ng hoàn c&#7843;nh chi&#7871;n
tranh, thiên tai, th&#7843;m h&#7885;a, d&#7883;ch b&#7879;nh ho&#7863;c nh&#7919;ng
khó kh&#259;n &#273;&#7863;c bi&#7879;t khác c&#7911;a x\u0103 h&#7897;i &#273;&#7875;
vi ph&#7841;m hành chính: &#272;&#432;&#7907;c hi&#7875;u là ng&#432;&#7901;i
th&#7921;c hi&#7879;n hành vi vi ph&#7841;m hành chính &#273;\u0103 t&#7853;n d&#7909;ng,
khai thác nh&#7919;ng khó kh&#259;n c&#7911;a x\u0103 h&#7897;i khi x&#7843;y ra
t\u0301nh h\u0301nh trên và coi &#273;ó là &#273;i&#7873;u ki&#7879;n thu&#7853;n l&#7907;i
&#273;&#7875; vi ph&#7841;m hành chính.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>Ví d&#7909;: L&#7907;i d&#7909;ng t\u0301nh
h\u0301nh d&#7883;ch b&#7879;nh x&#7843;y ra trên di&#7879;n r&#7897;ng. Ng&#432;&#7901;i
kinh doanh thu&#7889;c ch&#7919;a b&#7879;nh &#273;\u0103 bán thu&#7889;c v&#7899;i
giá cao so v&#7899;i giá niêm y&#7871;t, &#273;&#7875; thu l&#7907;i b&#7845;t
chính, hành vi này vi ph&#7841;m các quy &#273;&#7883;nh v&#7873; qu&#7843;n l\u01b0
giá.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>- Vi ph&#7841;m trong th&#7901;i gian
&#273;ang ch&#7845;p hành h\u0301nh ph&#7841;t c&#7911;a b&#7843;n án h\u0301nh s&#7921;
ho&#7863;c &#273;ang ch&#7845;p hành quy&#7871;t &#273;&#7883;nh áp d&#7909;ng
bi&#7879;n pháp x&#7917; l\u01b0 vi ph&#7841;m hành chính. &#272;ây &#273;&#432;&#7907;c
xem là bi&#7875;u hi&#7879;n coi th&#432;&#7901;ng pháp lu&#7853;t, th&#7875;
hi&#7879;n s&#7921; thi&#7871;u rèn luy&#7879;n, tu d&#432;&#7905;ng ngay c&#7843;
trong môi tr&#432;&#7901;ng thu&#7853;n l&#7907;i có &#273;i&#7873;u ki&#7879;n
&#273;&#7875; h&#7885;c t&#7853;p, tu d&#432;&#7905;ng c&#7911;a ng&#432;&#7901;i
vi ph&#7841;m hành chính. V\u0301 v&#7853;y, tr&#432;&#7901;ng h&#7907;p này làm
t&#259;ng n&#7863;ng trách nhi&#7879;m hành chính c&#7911;a ng&#432;&#7901;i vi
ph&#7841;m.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>- Ti&#7871;p t&#7909;c th&#7921;c hi&#7879;n
hành vi vi ph&#7841;m hành chính m&#7863;c dù ng&#432;&#7901;i có th&#7849;m
quy&#7873;n &#273;\u0103 yêu c&#7847;u ch&#7845;m d&#7913;t hành vi &#273;ó:
&#272;ây có th&#7875; xem là hành vi c&#7889; \u01b0 th&#7921;c hi&#7879;n vi ph&#7841;m
hành chính &#273;&#7871;n cùng, b&#7845;t ch&#7845;p vi&#7879;c ng&#432;&#7901;i
có th&#7849;m quy&#7873;n yêu c&#7847;u ch&#7845;m d&#7913;t hành vi &#273;ó.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>- Sau khi vi ph&#7841;m &#273;\u0103 có hành vi
tr&#7889;n tránh, che gi&#7845;u vi ph&#7841;m hành chính: Tr&#7889;n tránh là
vi&#7879;c c&#7889; t\u0301nh không ph&#7843;i làm, không ph&#7843;i ch&#7883;u
trách nhi&#7879;m m&#7863;c dù có hành vi vi ph&#7841;m. Che gi&#7845;u vi ph&#7841;m
hành chính &#273;&#432;&#7907;c hi&#7875;u là hành vi không &#273;&#7875; l&#7897;
ra vi ph&#7841;m hành chính b&#7857;ng nhi&#7873;u cánh th&#7913;c và th&#7911;
&#273;o&#7841;n khác nhau.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>- Vi ph&#7841;m hành chính có quy mô l&#7899;n,
s&#7889; l&#432;&#7907;ng ho&#7863;c tr&#7883; giá hàng hóa l&#7899;n: &#272;&#7875;
xác &#273;&#7883;nh quy mô l&#7899;n, s&#7889; l&#432;&#7907;ng l&#7899;n ho&#7863;c
giá tr&#7883; hàng hóa l&#7899;n ph&#7843;i c&#259;n c&#7913; vào h&#432;&#7899;ng
d&#7851;n c&#7911;a c&#417; quan ch&#7913;c n&#259;ng. Nh&#7919;ng tr&#432;&#7901;ng
h&#7907;p vi ph&#7841;m hành chính v&#7899;i quy mô l&#7899;n, s&#7889; l&#432;&#7907;ng
ho&#7863;c tr&#7883; giá hàng hóa l&#7899;n, th&#7875; hi&#7879;n m&#7913;c &#273;&#7897;
nguy h&#7841;i cho x\u0103 h&#7897;i c&#7911;a hành vi vi ph&#7841;m và &#273;&#432;&#7907;c
coi là m&#7897;t t\u0301nh ti&#7871;t t&#259;ng n&#7863;ng trách nhi&#7879;m hành
chính.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>- Vi ph&#7841;m hành chính &#273;&#7889;i
v&#7899;i nhi&#7873;u ng&#432;&#7901;i, tr&#7867; em, ng&#432;&#7901;i già,
ng&#432;&#7901;i khuy&#7871;t t&#7853;t, ph&#7909; n&#7919; mang thai.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>+ &#272;&#7889;i v&#7899;i nhi&#7873;u
ng&#432;&#7901;i: &#272;&#432;&#7907;c hi&#7875;u là hai ng&#432;&#7901;i tr&#7903;
lên.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>+ &#272;&#7889;i v&#7899;i tr&#7867; em:
&#272;&#432;&#7907;c hi&#7875;u là &#273;&#7889;i v&#7899;i ng&#432;&#7901;i
d&#432;&#7899;i 16 tu&#7893;i.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>+ Ng&#432;&#7901;i khuy&#7871;t t&#7853;t:
Là ng&#432;&#7901;i khi&#7871;m khuy&#7871;t m&#7897;t ho&#7863;c nhi&#7873;u b&#7897;
ph&#7853;n c&#417; th&#7875; ho&#7863;c b&#7883; suy gi&#7843;m ch&#7913;c
n&#259;ng khi&#7871;n cho lao &#273;&#7897;ng, sinh ho&#7841;t, h&#7885;c t&#7853;p
g&#7863;p khó kh&#259;n.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>+ Ph&#7909; n&#7919; mang thai: &#272;&#7875;
có &#273;&#7911; c&#417; s&#7903; k&#7871;t lu&#7853;n là ph&#7909; n&#7919;
mang thai, th\u0301 c&#7847;n ph&#7843;i có k&#7871;t lu&#7853;n c&#7911;a c&#417;
quan chuyên môn xác &#273;&#7883;nh.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>Tuy nhiên, c&#361;ng c&#7847;n chú \u01b0 r&#7857;ng
n&#7871;u các t\u0301nh ti&#7871;t nêu trên &#273;\u0103 b&#7883; x&#7917; l\u01b0 và quy
&#273;&#7883;nh là hành vi vi ph&#7841;m hành chính th\u0301 s&#7869; không coi là
t\u0301nh ti&#7871;t t&#259;ng n&#7863;ng n&#7919;a. Ví d&#7909;: Ng&#432;&#7901;i
có hành vi l&#259;ng m&#7841;, ph&#7881; báng c&#7843;nh sát giao thông sau khi
có hành vi vi ph&#7841;m tr&#7853;t t&#7921; giao thông &#273;&#432;&#7901;ng b&#7897;
mà b&#7883; x&#7917; ph&#7841;t v&#7873; hành vi ch&#7889;ng ng&#432;&#7901;i
thi hành công v&#7909; r&#7891;i th\u0301 khi x&#7917; ph&#7841;t v&#7873; hành vi
vi ph&#7841;m tr&#7853;t t&#7921; giao thông s&#7869; không coi hành vi
l&#259;ng m&#7841;, ph&#7881; báng ng&#432;&#7901;i thi hành công v&#7909; là
t\u0301nh ti&#7871;t t&#259;ng n&#7863;ng &#273;&#7875; xác &#273;&#7883;nh khung
h\u0301nh ph&#7841;t.</span></p>

<h4><a name="_Toc131755294">2.4.2. T\u0301nh ti&#7871;t gi&#7843;m nh&#7865;</a></h4>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>&#272;i&#7873;u 9 Lu&#7853;t X&#7917; l\u01b0
vi ph&#7841;m hành chính quy &#273;&#7883;nh 07 t\u0301nh ti&#7871;t gi&#7843;m nh&#7865;,
c&#7909; th&#7875;:</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>- Ng&#432;&#7901;i vi ph&#7841;m hành
chính &#273;\u0103 có hành vi ng&#259;n ch&#7863;n, làm gi&#7843;m b&#7899;t h&#7853;u
qu&#7843; c&#7911;a vi ph&#7841;m ho&#7863;c t&#7921; nguy&#7879;n kh&#7855;c
ph&#7909;c h&#7853;u qu&#7843;, b&#7891;i th&#432;&#7901;ng thi&#7879;t h&#7841;i.
Ng&#259;n ch&#7863;n, làm gi&#7843;m b&#7899;t h&#7853;u qu&#7843; c&#7911;a vi
ph&#7841;m là khi vi ph&#7841;m &#273;\u0103 &#273;&#432;&#7907;c th&#7921;c hi&#7879;n
và ng&#432;&#7901;i vi ph&#7841;m t&#7921; m\u0301nh ho&#7863;c có s&#7921; tác
&#273;&#7897;ng khách quan, nên b&#7857;ng nh&#7919;ng kh&#7843; n&#259;ng có
th&#7875; &#273;&#7875; ng&#259;n ch&#7863;n, &#273;&#7875; không cho tác h&#7841;i,
h&#7853;u qu&#7843; l&#7899;n h&#417;n c&#7911;a vi ph&#7841;m x&#7843;y ra. T&#7921;
nguy&#7879;n kh&#7855;c ph&#7909;c h&#7853;u qu&#7843;, b&#7891;i th&#432;&#7901;ng
thi&#7879;t h&#7841;i: Ng&#432;&#7901;i vi ph&#7841;m ph&#7843;i t&#7921; nguy&#7879;n
(không do ép bu&#7897;c, c&#432;&#7905;ng ch&#7871;) s&#7917;a ch&#7919;a, b&#7891;i
th&#432;&#7901;ng thi&#7879;t h&#7841;i, kh&#7855;c ph&#7909;c h&#7853;u qu&#7843;
do vi ph&#7841;m hành chính gây ra.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>Ng&#432;&#7901;i vi ph&#7841;m hành chính
&#273;\u0103 t&#7921; nguy&#7879;n khai báo, thành th&#7853;t h&#7889;i l&#7895;i;
tích c&#7921;c giúp &#273;&#7905; c&#417; quan ch&#7913;c n&#259;ng phát hi&#7879;n
vi ph&#7841;m hành chính, x&#7917; l\u01b0 vi ph&#7841;m hành chính:</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>+ T&#7921; nguy&#7879;n khai báo là
tr&#432;&#7901;ng h&#7907;p ng&#432;&#7901;i vi ph&#7841;m trong quá tr\u0301nh x&#7917;
l\u01b0 c&#7911;a c&#417; quan ch&#7913;c n&#259;ng &#273;\u0103 t&#7921; nguy&#7879;n
khai báo &#273;&#7847;y &#273;&#7911;, &#273;úng s&#7921; th&#7853;t nh&#7919;ng
g\u0301 liên quan &#273;&#7871;n hành vi vi ph&#7841;m mà h&#7885; &#273;\u0103 th&#7921;c
hi&#7879;n.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>+ Thành th&#7853;t h&#7889;i l&#7895;i là
tr&#432;&#7901;ng h&#7907;p sau khi th&#7921;c hi&#7879;n vi ph&#7841;m,
ng&#432;&#7901;i vi ph&#7841;m th&#7875; hi&#7879;n s&#7921; &#259;n n&#259;n,
h&#7889;i l&#7895;i v&#7873; hành vi c&#7911;a m\u0301nh, và b&#7857;ng nh&#7919;ng
hành &#273;&#7897;ng c&#7909; th&#7875; ch&#7913;ng minh cho vi&#7879;c mu&#7889;n
s&#7917;a ch&#7919;a l&#7895;i l&#7847;m c&#7911;a m\u0301nh, bù &#273;&#7855;p nh&#7919;ng
t&#7893;n th&#7845;t, thi&#7879;t h&#7841;i do hành vi c&#7911;a m\u0301nh gây ra.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>+ Tích c&#7921;c giúp &#273;&#7905;
c&#417; quan ch&#7913;c n&#259;ng phát hi&#7879;n và x&#7917; l\u01b0 vi ph&#7841;m
hành chính và có thái &#273;&#7897; ch&#7911; &#273;&#7897;ng giúp &#273;&#7905;
nh&#7857;m t&#7841;o ra nh&#7919;ng bi&#7871;n &#273;&#7893;i, thay &#273;&#7893;i
nhanh h&#417;n trong vi&#7879;c phát hi&#7879;n và x&#7917; l\u01b0 vi ph&#7841;m
hành chính. &#272;&#432;&#7907;c th&#7875; hi&#7879;n b&#7857;ng vi&#7879;c
cung c&#7845;p nh&#7919;ng thông tin, tài li&#7879;u, b&#7857;ng ch&#7913;ng có
\u01b0 ngh&#297;a thi&#7871;t th&#7921;c cho vi&#7879;c phát hi&#7879;n và x&#7917;
l\u01b0 vi ph&#7841;m hành chính, ch&#7881; n&#417;i c&#7845;t gi&#7845;u tang v&#7853;t,
n&#417;i ng&#432;&#7901;i vi ph&#7841;m khác &#273;ang tr&#7889;n tránh, cung c&#7845;p
thông tin v&#7873; vi ph&#7841;m khác, ng&#432;&#7901;i vi ph&#7841;m khác
không liên quan &#273;&#7871;n m\u0301nh...</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>- Vi ph&#7841;m hành chính trong t\u0301nh tr&#7841;ng
b&#7883; kích &#273;&#7897;ng v&#7873; tinh th&#7847;n do hành vi trái pháp lu&#7853;t
c&#7911;a ng&#432;&#7901;i khác gây ra; v&#432;&#7907;t quá gi&#7899;i h&#7841;n
ph\u0323ng v&#7879; chính &#273;áng; v&#432;&#7907;t quá yêu c&#7847;u c&#7911;a
t\u0301nh th&#7871; c&#7845;p thi&#7871;t.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>+ Vi ph&#7841;m trong t\u0301nh tr&#7841;ng b&#7883;
kích &#273;&#7897;ng v&#7873; tinh th&#7847;n do hành vi trái pháp lu&#7853;t c&#7911;a
ng&#432;&#7901;i khác gây ra ch&#7881; &#273;&#432;&#7907;c coi là m&#7897;t
t\u0301nh ti&#7871;t gi&#7843;m nh&#7865; khi có &#273;&#7847;y &#273;&#7911; các y&#7871;u
t&#7889; sau: Ph&#7843;i có hành vi trái pháp lu&#7853;t c&#7911;a ng&#432;&#7901;i
khác; hành vi trái pháp lu&#7853;t &#273;ó xâm ph&#7841;m &#273;&#7871;n quy&#7873;n,
l&#7907;i ích h&#7907;p pháp c&#7911;a ng&#432;&#7901;i vi ph&#7841;m ho&#7863;c
xâm ph&#7841;m &#273;&#7871;n quy&#7873;n, l&#7907;i ích h&#7907;p pháp c&#7911;a
ng&#432;&#7901;i thân thích c&#7911;a ng&#432;&#7901;i vi ph&#7841;m.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>+ Vi ph&#7841;m trong tr&#432;&#7901;ng h&#7907;p
v&#432;&#7907;t quá gi&#7899;i h&#7841;n ph\u0323ng v&#7879; chính &#273;áng là hành
vi ch&#7889;ng tr&#7843; r\u01a1 ràng quá m&#7913;c c&#7847;n thi&#7871;t, không phù
h&#7907;p v&#7899;i tính ch&#7845;t và m&#7913;c &#273;&#7897; nguy hi&#7875;m
cho x\u0103 h&#7897;i c&#7911;a hành vi vi ph&#7841;m.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>+ Vi ph&#7841;m trong tr&#432;&#7901;ng h&#7907;p
v&#432;&#7907;t quá yêu c&#7847;u c&#7911;a t\u0301nh th&#7871; c&#7845;p thi&#7871;t
là v\u0301 mu&#7889;n tránh m&#7897;t nguy c&#417; &#273;ang th&#7921;c t&#7871;
&#273;e d&#7885;a l&#7907;i ích c&#7911;a Nhà n&#432;&#7899;c, c&#7911;a t&#7893;
ch&#7913;c, quy&#7873;n và l&#7907;i ích chính &#273;áng c&#7911;a m\u0301nh ho&#7863;c
c&#7911;a ng&#432;&#7901;i khác mà không c\u0323n cách nào khác là ph&#7843;i gây ra
m&#7897;t thi&#7879;t h&#7841;i, nh&#432;ng thi&#7879;t h&#7841;i gây ra r\u01a1
ràng v&#432;&#7907;t quá yêu c&#7847;u c&#7911;a thi&#7879;t h&#7841;i c&#7847;n
&#273;&#432;&#7907;c ng&#259;n ng&#7915;a.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>- Vi ph&#7841;m hành chính do b&#7883; ép
bu&#7897;c ho&#7863;c b&#7883; l&#7879; thu&#7897;c v&#7873; v&#7853;t ch&#7845;t
ho&#7863;c tinh th&#7847;n: Là hành vi c&#7911;a ng&#432;&#7901;i b&#7883;
c&#432;&#7905;ng ép th&#7921;c hi&#7879;n hành vi vi ph&#7841;m hành chính,
trong khi &#273;ang b&#7883; l&#7879; thu&#7897;c v&#7873; m&#7863;t v&#7853;t
ch&#7845;t ho&#7863;c tinh th&#7847;n &#273;&#7889;i v&#7899;i ng&#432;&#7901;i
c&#432;&#7905;ng ép. Do tâm l\u01b0 không mong mu&#7889;n th&#7921;c hi&#7879;n hành
vi c&#361;ng nh&#432; h&#7853;u qu&#7843; do hành vi vi ph&#7841;m gây ra,
nh&#432;ng do b&#7883; ép bu&#7897;c ph&#7843;i làm, nên &#273;ây &#273;&#432;&#7907;c
coi là m&#7897;t t\u0301nh ti&#7871;t gi&#7843;m nh&#7865; trách nhi&#7879;m hành
chính.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>- Ng&#432;&#7901;i vi ph&#7841;m hành
chính là ph&#7909; n&#7919; mang thai, ng&#432;&#7901;i già y&#7871;u, ng&#432;&#7901;i
có b&#7879;nh ho&#7863;c khuy&#7871;t t&#7853;t làm h&#7841;n ch&#7871; kh&#7843;
n&#259;ng nh&#7853;n th&#7913;c ho&#7863;c kh&#7843; n&#259;ng &#273;i&#7873;u
khi&#7875;n hành vi c&#7911;a m\u0301nh: Ch&#7871; &#273;&#7897; pháp l\u01b0 c&#7911;a
pháp lu&#7853;t Vi&#7879;t Nam, coi nh&#7919;ng tr&#432;&#7901;ng h&#7907;p vi
ph&#7841;m hành chính trong tr&#432;&#7901;ng h&#7907;p là ph&#7909; n&#7919;
mang thai, ng&#432;&#7901;i già y&#7871;u, ng&#432;&#7901;i có b&#7879;nh ho&#7863;c
khuy&#7871;t t&#7853;t có th&#7875; làm h&#7841;n ch&#7871; kh&#7843; n&#259;ng
nh&#7853;n th&#7913;c và &#273;i&#7873;u khi&#7875;n hành vi là t\u0301nh ti&#7871;t
gi&#7843;m nh&#7865; trách nhi&#7879;m hành chính, &#273;ây là m&#7897;t bi&#7875;u
hi&#7879;n c&#7911;a s&#7921; nhân &#273;&#7841;o trong pháp lu&#7853;t Vi&#7879;t
Nam. Tuy nhiên, khi áp d&#7909;ng t\u0301nh ti&#7871;t này, c&#7847;n l&#432;u \u01b0
c&#259;n c&#7913; &#273;&#7875; xác &#273;&#7883;nh t\u0301nh ti&#7871;t gi&#7843;m
nh&#7865;, &#273;&#7875; b&#7843;o &#273;&#7843;m tính nghiêm minh c&#7911;a
pháp lu&#7853;t (ví d&#7909; nh&#432; xác nh&#7853;n c&#7911;a c&#417; quan
chuyên môn y t&#7871;, ho&#7863;c k&#7871;t lu&#7853;n giám &#273;&#7883;nh c&#7911;a
c&#417; quan có th&#7849;m quy&#7873;n).</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>- Vi ph&#7841;m hành chính v\u0301 hoàn c&#7843;nh
&#273;&#7863;c bi&#7879;t khó kh&#259;n mà không do m\u0301nh gây ra: T\u0301nh ti&#7871;t
này &#273;&#432;&#7907;c áp d&#7909;ng khi có c&#7843; hai &#273;i&#7873;u ki&#7879;n:
Hành vi vi ph&#7841;m hành chính ph&#7843;i do hoàn c&#7843;nh &#273;&#7863;c
bi&#7879;t khó kh&#259;n (không ph&#7843;i do l&#7907;i d&#7909;ng) mà th&#7921;c
hi&#7879;n, bên c&#7841;nh &#273;ó hoàn c&#7843;nh khó kh&#259;n không ph&#7843;i
do ng&#432;&#7901;i vi ph&#7841;m t&#7921; m\u0301nh gây ra, hoàn c&#7843;nh khó
kh&#259;n có th&#7875; do thiên tai, &#273;&#7883;ch h&#7885;a ho&#7863;c do
nguyên nhân khác gây ra (có th&#7875; do ng&#432;&#7901;i khác gây ra).</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>- Vi ph&#7841;m hành chính do tr\u0301nh &#273;&#7897;
l&#7841;c h&#7853;u: L&#7841;c h&#7853;u &#273;&#432;&#7907;c hi&#7875;u là
không theo k&#7883;p &#273;à ti&#7871;n b&#7897;, phát tri&#7875;n chung c&#7911;a
x\u0103 h&#7897;i. Ch&#7881; áp d&#7909;ng t\u0301nh ti&#7871;t l&#7841;c h&#7853;u n&#7871;u
s&#7921; l&#7841;c h&#7853;u &#273;ó là do nguyên nhân khách quan &#273;&#432;a
l&#7841;i, nh&#432;: &#272;&#7901;i s&#7889;ng x\u0103 h&#7897;i nên không hi&#7875;u
bi&#7871;t ho&#7863;c kém hi&#7875;u bi&#7871;t v&#7873; pháp lu&#7853;t, không
&#273;&#432;&#7907;c h&#7885;c t&#7853;p, không có &#273;i&#7873;u ki&#7879;n
th&#7921;c t&#7871; &#273;&#7875; nh&#7853;n bi&#7871;t các &#273;úng sai trong
cu&#7897;c s&#7889;ng.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>- Nh&#7919;ng t\u0301nh ti&#7871;t gi&#7843;m
nh&#7865; khác do Chính ph&#7911; quy &#273;&#7883;nh.</span></p>

<p class=MsoTitle><a name="_Toc131755295">2.5. Nh&#7919;ng tr&#432;&#7901;ng h&#7907;p
không x&#7917; ph&#7841;t vi ph&#7841;m hành chính</a></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>&#272;i&#7873;u 11 Lu&#7853;t X&#7917; l\u01b0
vi ph&#7841;m hành chính quy &#273;&#7883;nh 06 tr&#432;&#7901;ng h&#7907;p
không b&#7883; x&#7917; ph&#7841;t vi ph&#7841;m hành chính (hay mi&#7877;n trách
nhi&#7879;m hành chính), bao g&#7891;m các tr&#432;&#7901;ng h&#7907;p sau
&#273;ây:</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>- Tr&#432;&#7901;ng h&#7907;p th&#7921;c
hi&#7879;n hành vi vi ph&#7841;m hành chính trong t\u0301nh th&#7871; c&#7845;p thi&#7871;t.
T\u0301nh th&#7871; c&#7845;p thi&#7871;t là t\u0301nh th&#7871; c&#7911;a cá nhân, t&#7893;
ch&#7913;c v\u0301 mu&#7889;n tránh m&#7897;t nguy c&#417; &#273;ang th&#7921;c t&#7871;
&#273;e d&#7885;a l&#7907;i ích c&#7911;a Nhà n&#432;&#7899;c, c&#7911;a t&#7893;
ch&#7913;c, quy&#7873;n, l&#7907;i ích chính &#273;áng c&#7911;a m\u0301nh ho&#7863;c
c&#7911;a ng&#432;&#7901;i khác mà không c\u0323n cách nào khác là ph&#7843;i gây m&#7897;t
thi&#7879;t h&#7841;i nh&#7887; h&#417;n thi&#7879;t h&#7841;i c&#7847;n
ng&#259;n ng&#7915;a.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>- Tr&#432;&#7901;ng h&#7907;p th&#7921;c
hi&#7879;n hành vi vi ph&#7841;m hành chính do ph\u0323ng v&#7879; chính &#273;áng.
Ph\u0323ng v&#7879; chính &#273;áng là hành vi c&#7911;a cá nhân v\u0301 b&#7843;o v&#7879;
l&#7907;i ích c&#7911;a Nhà n&#432;&#7899;c, c&#7911;a t&#7893; ch&#7913;c, b&#7843;o
v&#7879; quy&#7873;n, l&#7907;i ích chính &#273;áng c&#7911;a m\u0301nh ho&#7863;c c&#7911;a
ng&#432;&#7901;i khác mà ch&#7889;ng tr&#7843; l&#7841;i m&#7897;t cách c&#7847;n
thi&#7871;t ng&#432;&#7901;i &#273;ang có hành vi xâm ph&#7841;m quy&#7873;n, l&#7907;i
ích nói trên.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>- Tr&#432;&#7901;ng h&#7907;p th&#7921;c
hi&#7879;n hành vi vi ph&#7841;m hành chính do s&#7921; ki&#7879;n b&#7845;t ng&#7901;.
S&#7921; ki&#7879;n b&#7845;t ng&#7901; là s&#7921; ki&#7879;n mà cá nhân, t&#7893;
ch&#7913;c không th&#7875; th&#7845;y tr&#432;&#7899;c ho&#7863;c không bu&#7897;c
ph&#7843;i th&#7845;y tr&#432;&#7899;c h&#7853;u qu&#7843; c&#7911;a hành vi
nguy h&#7841;i cho x\u0103 h&#7897;i do m\u0301nh gây ra.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>- Tr&#432;&#7901;ng h&#7907;p th&#7921;c
hi&#7879;n hành vi vi ph&#7841;m hành chính do s&#7921; ki&#7879;n b&#7845;t kh&#7843;
kháng. S&#7921; ki&#7879;n b&#7845;t kh&#7843; kháng là s&#7921; ki&#7879;n x&#7843;y
ra m&#7897;t cách khách quan không th&#7875; l&#432;&#7901;ng tr&#432;&#7899;c
&#273;&#432;&#7907;c và không th&#7875; kh&#7855;c ph&#7909;c &#273;&#432;&#7907;c
m&#7863;c dù &#273;\u0103 áp d&#7909;ng m&#7885;i bi&#7879;n pháp c&#7847;n thi&#7871;t
và kh&#7843; n&#259;ng cho phép.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>- Tr&#432;&#7901;ng h&#7907;p ng&#432;&#7901;i
th&#7921;c hi&#7879;n hành vi vi ph&#7841;m hành chính không có n&#259;ng l&#7921;c
trách nhi&#7879;m hành chính. &#272;&#432;&#7907;c hi&#7875;u là nh&#7919;ng
ng&#432;&#7901;i th&#7921;c hi&#7879;n hành vi vi ph&#7841;m hành chính trong
khi &#273;ang m&#7855;c b&#7879;nh tâm th&#7847;n ho&#7863;c các b&#7879;nh
khác làm m&#7845;t kh&#7843; n&#259;ng nh&#7853;n th&#7913;c và &#273;i&#7873;u
khi&#7875;n hành vi c&#7911;a m\u0301nh.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>- Tr&#432;&#7901;ng h&#7907;p ng&#432;&#7901;i
th&#7921;c hi&#7879;n hành vi vi ph&#7841;m hành chính ch&#432;a &#273;&#7911;
tu&#7893;i b&#7883; x&#7917; ph&#7841;t vi ph&#7841;m hành chính theo quy
&#273;&#7883;nh.</span></p>

<p class=MsoTitle><a name="_Toc131755296">2.6. Các h\u0301nh th&#7913;c x&#7917; ph&#7841;t
vi ph&#7841;m hành chính và bi&#7879;n pháp kh&#7855;c ph&#7909;c h&#7853;u qu&#7843;</a></p>

<h4><a name="_Toc131755297">2.6.1. Các h\u0301nh th&#7913;c x&#7917; ph&#7841;t vi
ph&#7841;m hành chính</a></h4>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>Lu&#7853;t X&#7917; l\u01b0 vi ph&#7841;m hành
chính hi&#7879;n hành quy &#273;&#7883;nh các h\u0301nh th&#7913;c x&#7917; ph&#7841;t
hành chính bao g&#7891;m: C&#7843;nh cáo; ph&#7841;t ti&#7873;n; t&#432;&#7899;c
quy&#7873;n s&#7917; d&#7909;ng gi&#7845;y phép, ch&#7913;ng ch&#7881; hành ngh&#7873;
có th&#7901;i h&#7841;n ho&#7863;c &#273;\u0301nh ch&#7881; ho&#7841;t &#273;&#7897;ng
có th&#7901;i h&#7841;n; t&#7883;ch thu tang v&#7853;t vi ph&#7841;m hành
chính, ph&#432;&#417;ng ti&#7879;n &#273;&#432;&#7907;c s&#7917; d&#7909;ng
&#273;&#7875; vi ph&#7841;m hành chính; tr&#7909;c xu&#7845;t. Trong &#273;ó, c&#7843;nh
cáo và ph&#7841;t ti&#7873;n ch&#7881; &#273;&#432;&#7907;c quy &#273;&#7883;nh
là h\u0301nh th&#7913;c x&#7917; ph&#7841;t chính, ba h\u0301nh th&#7913;c c\u0323n l&#7841;i
(t&#432;&#7899;c quy&#7873;n s&#7917; d&#7909;ng gi&#7845;y phép, ch&#7913;ng
ch&#7881; hành ngh&#7873; có th&#7901;i h&#7841;n ho&#7863;c &#273;\u0301nh ch&#7881;
ho&#7841;t &#273;&#7897;ng có th&#7901;i h&#7841;n; t&#7883;ch thu tang v&#7853;t
vi ph&#7841;m hành chính, ph&#432;&#417;ng ti&#7879;n &#273;&#432;&#7907;c s&#7917;
d&#7909;ng &#273;&#7875; vi ph&#7841;m hành chính; tr&#7909;c xu&#7845;t) có th&#7875;
&#273;&#432;&#7907;c quy &#273;&#7883;nh là h\u0301nh th&#7913;c x&#7917; ph&#7841;t
b&#7893; sung ho&#7863;c h\u0301nh th&#7913;c x&#7917; ph&#7841;t chính tùy theo t&#7915;ng
tr&#432;&#7901;ng h&#7907;p c&#7909; th&#7875;, do ng&#432;&#7901;i có th&#7849;m
quy&#7873;n x&#7917; l\u01b0 vi ph&#7841;m hành chính quy&#7871;t &#273;&#7883;nh.
&#272;&#7889;i v&#7899;i m&#7895;i vi ph&#7841;m hành chính, cá nhân, t&#7893;
ch&#7913;c vi ph&#7841;m ch&#7881; b&#7883; x&#7917; ph&#7841;t m&#7897;t l&#7847;n,
b&#7857;ng m&#7897;t h\u0301nh th&#7913;c x&#7917; ph&#7841;t chính. Ngoài h\u0301nh th&#7913;c
x&#7917; ph&#7841;t chính, tùy theo tính ch&#7845;t, m&#7913;c &#273;&#7897; vi
ph&#7841;m mà c&#417; quan ho&#7863;c ng&#432;&#7901;i có th&#7849;m quy&#7873;n
c\u0323n có th&#7875; áp d&#7909;ng kèm theo m&#7897;t ho&#7863;c nhi&#7873;u h\u0301nh
th&#7913;c x&#7917; ph&#7841;t b&#7893; sung.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>&#272;&#7889;i v&#7899;i m&#7895;i vi ph&#7841;m
hành chính, t&#7893; ch&#7913;c, cá nhân vi ph&#7841;m ph&#7843;i gánh ch&#7883;u
m&#7897;t trong các h\u0301nh th&#7913;c x&#7917; ph&#7841;t chính sau:</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>- C&#7843;nh cáo: Là h\u0301nh th&#7913;c x&#7917;
ph&#7841;t nh&#7865; nh&#7845;t trong các h\u0301nh th&#7913;c x&#7917; ph&#7841;t vi
ph&#7841;m hành chính. C&#7843;nh cáo &#273;&#432;&#7907;c áp d&#7909;ng &#273;&#7889;i
v&#7899;i cá nhân, t&#7893; ch&#7913;c vi ph&#7841;m hành chính không nghiêm tr&#7885;ng,
có t\u0301nh ti&#7871;t gi&#7843;m nh&#7865; và theo quy &#273;&#7883;nh th\u0301 b&#7883;
áp d&#7909;ng h\u0301nh th&#7913;c x&#7917; ph&#7841;t c&#7843;nh cáo ho&#7863;c
&#273;&#7889;i v&#7899;i m&#7885;i hành vi vi ph&#7841;m hành chính do ng&#432;&#7901;i
