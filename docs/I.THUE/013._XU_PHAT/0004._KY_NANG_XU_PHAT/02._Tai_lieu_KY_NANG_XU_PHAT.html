justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>Tr&#432;&#7899;c khi ti&#7871;n hành
c&#432;&#7905;ng ch&#7871;, n&#7871;u bên th&#7913; ba &#273;ang gi&#7919; ti&#7873;n,
tài s&#7843;n c&#7911;a &#273;&#7889;i t&#432;&#7907;ng b&#7883; c&#432;&#7905;ng
ch&#7871; t&#7921; nguy&#7879;n thi hành quy&#7871;t &#273;&#7883;nh c&#432;&#7905;ng
ch&#7871; th\u0301 c&#417; quan ch&#7911; tr\u0301 c&#432;&#7905;ng ch&#7871; l&#7853;p
biên b&#7843;n công nh&#7853;n s&#7921; t&#7921; nguy&#7879;n thi hành.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>Khi c&#432;&#7905;ng ch&#7871; &#273;&#7875;
thu ti&#7873;n, tài s&#7843;n c&#7911;a &#273;&#7889;i t&#432;&#7907;ng b&#7883;
c&#432;&#7905;ng ch&#7871; do bên th&#7913; ba &#273;ang gi&#7919; trong
tr&#432;&#7901;ng h&#7907;p cá nhân, t&#7893; ch&#7913;c sau khi vi ph&#7841;m
c&#7889; t\u0301nh t&#7849;u tán tài s&#7843;n ph&#7843;i có &#273;&#7841;i di&#7879;n
chính quy&#7873;n &#273;&#7883;a ph&#432;&#417;ng và ng&#432;&#7901;i ch&#7913;ng
ki&#7871;n.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>Vi&#7879;c c&#432;&#7905;ng ch&#7871; ph&#7843;i
&#273;&#432;&#7907;c l&#7853;p thành biên b&#7843;n. Trong biên b&#7843;n ghi
r\u01a1: Th&#7901;i gian, &#273;&#7883;a &#273;i&#7875;m t&#7893; ch&#7913;c c&#432;&#7905;ng
ch&#7871;; c&#417; quan ch&#7911; tr\u0301 ti&#7871;n hành c&#432;&#7905;ng ch&#7871;;
h&#7885; tên, &#273;&#7883;a ch&#7881; c&#7911;a cá nhân, t&#7893; ch&#7913;c b&#7883;
c&#432;&#7905;ng ch&#7871;; h&#7885; tên, &#273;&#7883;a ch&#7881; c&#7911;a cá
nhân, t&#7893; ch&#7913;c &#273;ang gi&#7919; ti&#7873;n, tài s&#7843;n; &#273;&#7841;i
di&#7879;n chính quy&#7873;n &#273;&#7883;a ph&#432;&#417;ng n&#417;i ti&#7871;n
hành c&#432;&#7905;ng ch&#7871;, ng&#432;&#7901;i ch&#7913;ng ki&#7871;n; s&#7889;
ti&#7873;n, tài s&#7843;n và t\u0301nh tr&#7841;ng tài s&#7843;n b&#7883; thu.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>Cá nhân ho&#7863;c &#273;&#7841;i di&#7879;n
t&#7893; ch&#7913;c b&#7883; c&#432;&#7905;ng ch&#7871;; cá nhân, &#273;&#7841;i
di&#7879;n t&#7893; ch&#7913;c &#273;ang gi&#7919; ti&#7873;n, tài s&#7843;n;
&#273;&#7841;i di&#7879;n c&#417; quan ra quy&#7871;t &#273;&#7883;nh c&#432;&#7905;ng
ch&#7871;, &#273;&#7841;i di&#7879;n chính quy&#7873;n &#273;&#7883;a
ph&#432;&#417;ng và ng&#432;&#7901;i ch&#7913;ng ki&#7871;n k\u01b0 vào biên b&#7843;n.
Biên b&#7843;n có nhi&#7873;u t&#7901; th\u0301 ph&#7843;i k\u01b0 vào t&#7915;ng t&#7901;
biên b&#7843;n. Trong tr&#432;&#7901;ng h&#7907;p có ng&#432;&#7901;i v&#7855;ng
m&#7863;t ho&#7863;c có m&#7863;t mà t&#7915; ch&#7889;i k\u01b0 biên b&#7843;n th\u0301
vi&#7879;c &#273;ó ph&#7843;i ghi vào biên b&#7843;n và nêu r\u01a1 l\u01b0 do.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>Tr&#432;&#7901;ng h&#7907;p cá nhân, t&#7893;
ch&#7913;c b&#7883; c&#432;&#7905;ng ch&#7871;, cá nhân, &#273;&#7841;i di&#7879;n
t&#7893; ch&#7913;c &#273;ang gi&#7919; ti&#7873;n, tài s&#7843;n c&#7889; t\u0301nh
v&#7855;ng m&#7863;t th\u0301 v&#7851;n ti&#7871;n hành c&#432;&#7905;ng ch&#7871;
nh&#432;ng ph&#7843;i có &#273;&#7841;i di&#7879;n c&#7911;a chính quy&#7873;n
&#273;&#7883;a ph&#432;&#417;ng và ng&#432;&#7901;i ch&#7913;ng ki&#7871;n.</span></p>

<h4><a name="_Toc131755364">3.2.5. Bu&#7897;c th&#7921;c hi&#7879;n bi&#7879;n
pháp kh&#7855;c ph&#7909;c h&#7853;u qu&#7843;</a></h4>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>- Quy&#7871;t &#273;&#7883;nh c&#432;&#7905;ng
ch&#7871; bu&#7897;c th&#7921;c hi&#7879;n bi&#7879;n pháp kh&#7855;c ph&#7909;c
h&#7853;u qu&#7843;</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>Quy&#7871;t &#273;&#7883;nh c&#432;&#7905;ng
ch&#7871; bu&#7897;c th&#7921;c hi&#7879;n bi&#7879;n pháp kh&#7855;c ph&#7909;c
h&#7853;u qu&#7843; bao g&#7891;m nh&#7919;ng n&#7897;i dung sau: s&#7889; quy&#7871;t
&#273;&#7883;nh; ngày, tháng, n&#259;m ra quy&#7871;t &#273;&#7883;nh; c&#259;n
c&#7913; ra quy&#7871;t &#273;&#7883;nh; h&#7885; tên, ch&#7913;c v&#7909; c&#7911;a
ng&#432;&#7901;i ra quy&#7871;t &#273;&#7883;nh; h&#7885; tên, &#273;&#7883;a
ch&#7881; c&#7911;a cá nhân, t&#7893; ch&#7913;c b&#7883; c&#432;&#7905;ng ch&#7871;,
bi&#7879;n pháp kh&#7855;c ph&#7909;c h&#7853;u qu&#7843; ph&#7843;i th&#7921;c
hi&#7879;n; th&#7901;i gian hoàn thành c&#432;&#7905;ng ch&#7871;; cá nhân,
c&#417; quan có trách nhi&#7879;m ch&#7911; tr\u0301 t&#7893; ch&#7913;c các ho&#7841;t
&#273;&#7897;ng c&#432;&#7905;ng ch&#7871;; c&#417; quan có trách nhi&#7879;m
tham gia; ch&#7919; k\u01b0 c&#7911;a ng&#432;&#7901;i ra quy&#7871;t &#273;&#7883;nh
và &#273;óng d&#7845;u c&#7911;a c&#417; quan ra quy&#7871;t &#273;&#7883;nh.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>- T&#7893; ch&#7913;c thi hành c&#432;&#7905;ng
ch&#7871; bu&#7897;c th&#7921;c hi&#7879;n bi&#7879;n pháp kh&#7855;c ph&#7909;c
h&#7853;u qu&#7843;</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>Khi nh&#7853;n &#273;&#432;&#7907;c quy&#7871;t
&#273;&#7883;nh c&#432;&#7905;ng ch&#7871; bu&#7897;c th&#7921;c hi&#7879;n bi&#7879;n
pháp kh&#7855;c ph&#7909;c h&#7853;u qu&#7843;, cá nhân, t&#7893; ch&#7913;c
&#273;&#432;&#7907;c giao nhi&#7879;m v&#7909; t&#7893; ch&#7913;c thi hành quy&#7871;t
&#273;&#7883;nh c&#432;&#7905;ng ch&#7871; ph&#7843;i ph&#7889;i h&#7907;p v&#7899;i
các c&#417; quan có liên quan huy &#273;&#7897;ng l&#7921;c l&#432;&#7907;ng,
ph&#432;&#417;ng ti&#7879;n &#273;&#7875; th&#7921;c hi&#7879;n bi&#7879;n pháp
&#273;\u0103 ghi trong quy&#7871;t &#273;&#7883;nh.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>Tr&#432;&#7899;c khi ti&#7871;n hành
c&#432;&#7905;ng ch&#7871;, n&#7871;u cá nhân, t&#7893; ch&#7913;c b&#7883;
c&#432;&#7905;ng ch&#7871; t&#7921; nguy&#7879;n thi hành th\u0301 c&#417; quan ch&#7911;
tr\u0301 c&#432;&#7905;ng ch&#7871; l&#7853;p biên b&#7843;n công nh&#7853;n s&#7921;
t&#7921; nguy&#7879;n thi hành.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>Khi th&#7921;c hi&#7879;n c&#432;&#7905;ng
ch&#7871; &#273;&#7875; thi hành bi&#7879;n pháp kh&#7855;c ph&#7909;c h&#7853;u
qu&#7843; ph&#7843;i có &#273;&#7841;i di&#7879;n chính quy&#7873;n &#273;&#7883;a
ph&#432;&#417;ng và ng&#432;&#7901;i ch&#7913;ng ki&#7871;n.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>Tr&#432;&#7901;ng h&#7907;p cá nhân, t&#7893;
ch&#7913;c b&#7883; c&#432;&#7905;ng ch&#7871; c&#7889; t\u0301nh v&#7855;ng m&#7863;t
th\u0301 v&#7851;n ti&#7871;n hành c&#432;&#7905;ng ch&#7871; nh&#432;ng ph&#7843;i
có &#273;&#7841;i di&#7879;n c&#7911;a chính quy&#7873;n &#273;&#7883;a
ph&#432;&#417;ng và ng&#432;&#7901;i ch&#7913;ng ki&#7871;n.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>Tr&#432;&#7901;ng h&#7907;p cá nhân, t&#7893;
ch&#7913;c ph&#7843;i thi hành quy&#7871;t &#273;&#7883;nh c&#432;&#7905;ng ch&#7871;
v&#7873; vi&#7879;c tháo d&#7905;, di chuy&#7875;n công tr\u0301nh xây d&#7921;ng
trái phép ho&#7863;c bàn giao &#273;&#7845;t mà trong công tr\u0301nh và trên &#273;&#7845;t
&#273;ó có tài s&#7843;n không thu&#7897;c di&#7879;n ph&#7843;i c&#432;&#7905;ng
ch&#7871; th\u0301 ng&#432;&#7901;i t&#7893; ch&#7913;c c&#432;&#7905;ng ch&#7871;
có quy&#7873;n bu&#7897;c cá nhân, t&#7893; ch&#7913;c ph&#7843;i thi hành quy&#7871;t
&#273;&#7883;nh c&#432;&#7905;ng ch&#7871; và nh&#7919;ng ng&#432;&#7901;i khác
có m&#7863;t trong công tr\u0301nh ra kh&#7887;i công tr\u0301nh ho&#7863;c khu v&#7921;c
&#273;&#7845;t, &#273;&#7891;ng th&#7901;i yêu c&#7847;u h&#7885; t&#7921; chuy&#7875;n
tài s&#7843;n ra theo. N&#7871;u h&#7885; không t&#7921; nguy&#7879;n th&#7921;c
hi&#7879;n th\u0301 ng&#432;&#7901;i t&#7893; ch&#7913;c c&#432;&#7905;ng ch&#7871;
yêu c&#7847;u l&#7921;c l&#432;&#7907;ng c&#432;&#7905;ng ch&#7871;
&#273;&#432;a h&#7885; cùng tài s&#7843;n ra kh&#7887;i công tr\u0301nh ho&#7863;c
khu v&#7921;c &#273;&#7845;t &#273;ó.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>N&#7871;u h&#7885; t&#7915; ch&#7889;i nh&#7853;n
tài s&#7843;n, ng&#432;&#7901;i t&#7893; ch&#7913;c c&#432;&#7905;ng ch&#7871;
ph&#7843;i l&#7853;p biên b&#7843;n ghi r\u01a1 s&#7889; l&#432;&#7907;ng, ch&#7911;ng
lo&#7841;i, t\u0301nh tr&#7841;ng t&#7915;ng lo&#7841;i tài s&#7843;n và thuê t&#7893;
ch&#7913;c, cá nhân có &#273;&#7911; &#273;i&#7873;u ki&#7879;n &#273;&#7875;
trông gi&#7919;, b&#7843;o qu&#7843;n ho&#7863;c b&#7843;o qu&#7843;n t&#7841;i
kho c&#7911;a c&#417; quan ra quy&#7871;t &#273;&#7883;nh c&#432;&#7905;ng ch&#7871;
và thông báo &#273;&#7883;a &#273;i&#7875;m, th&#7901;i gian &#273;&#7875; cá
nhân, t&#7893; ch&#7913;c có tài s&#7843;n nh&#7853;n l&#7841;i tài s&#7843;n.
Cá nhân, t&#7893; ch&#7913;c có tài s&#7843;n ph&#7843;i ch&#7883;u các chi phí
v&#7853;n chuy&#7875;n, trông gi&#7919;, b&#7843;o qu&#7843;n tài s&#7843;n.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>Quá th&#7901;i h&#7841;n 06 tháng, k&#7875;
t&#7915; ngày nh&#7853;n &#273;&#432;&#7907;c thông báo &#273;&#7871;n nh&#7853;n
tài s&#7843;n mà cá nhân, t&#7893; ch&#7913;c có tài s&#7843;n không &#273;&#7871;n
nh&#7853;n th\u0301 tài s&#7843;n &#273;ó &#273;&#432;&#7907;c bán &#273;&#7845;u
giá theo quy &#273;&#7883;nh c&#7911;a pháp lu&#7853;t. S&#7889; ti&#7873;n thu
&#273;&#432;&#7907;c, sau khi tr&#7915; các chi phí cho vi&#7879;c v&#7853;n
chuy&#7875;n, trông gi&#7919;, b&#7843;o qu&#7843;n, x&#7917; l\u01b0 tài s&#7843;n
s&#7869; &#273;&#432;&#7907;c g&#7917;i ti&#7871;t ki&#7879;m lo&#7841;i không
k&#7923; h&#7841;n t&#7841;i t&#7893; ch&#7913;c tín d&#7909;ng và thông báo
cho cá nhân, t&#7893; ch&#7913;c có tài s&#7843;n bi&#7871;t &#273;&#7875; nh&#7853;n
kho&#7843;n ti&#7873;n &#273;ó. &#272;&#7889;i v&#7899;i tài s&#7843;n h&#432;
h&#7887;ng và không c\u0323n giá tr&#7883;, ng&#432;&#7901;i t&#7893; ch&#7913;c
c&#432;&#7905;ng ch&#7871; t&#7893; ch&#7913;c tiêu h&#7911;y theo quy &#273;&#7883;nh
c&#7911;a pháp lu&#7853;t. Ng&#432;&#7901;i t&#7893; ch&#7913;c c&#432;&#7905;ng
ch&#7871; ph&#7843;i l&#7853;p biên b&#7843;n ghi r\u01a1 hi&#7879;n tr&#7841;ng c&#7911;a
tài s&#7843;n tr&#432;&#7899;c khi tiêu h&#7911;y.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>Tr&#432;&#7901;ng h&#7907;p cá nhân, t&#7893;
ch&#7913;c ph&#7843;i thi hành quy&#7871;t &#273;&#7883;nh c&#432;&#7905;ng ch&#7871;
bu&#7897;c n&#7897;p l&#7841;i s&#7889; l&#7907;i b&#7845;t h&#7907;p pháp có
&#273;&#432;&#7907;c do th&#7921;c hi&#7879;n vi ph&#7841;m hành chính ho&#7863;c
bu&#7897;c n&#7897;p l&#7841;i s&#7889; ti&#7873;n b&#7857;ng tr&#7883; giá
tang v&#7853;t, ph&#432;&#417;ng ti&#7879;n vi ph&#7841;m hành chính &#273;\u0103 b&#7883;
tiêu th&#7909;, t&#7849;u tán, tiêu h&#7911;y trái quy &#273;&#7883;nh c&#7911;a
pháp lu&#7853;t mà ng&#432;&#7901;i b&#7883; c&#432;&#7905;ng ch&#7871;
ch&#432;a th&#7921;c hi&#7879;n &#273;&#432;&#7907;c ngay th\u0301 ng&#432;&#7901;i
có th&#7849;m quy&#7873;n ra quy&#7871;t &#273;&#7883;nh c&#432;&#7905;ng ch&#7871;
áp d&#7909;ng m&#7897;t trong các bi&#7879;n pháp c&#432;&#7905;ng ch&#7871;
quy &#273;&#7883;nh t&#7841;i &#272;i&#7875;m a, &#272;i&#7875;m b, &#272;i&#7875;m
c Kho&#7843;n 2 &#272;i&#7873;u 86 Lu&#7853;t XLVPHC.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>- Biên b&#7843;n thi hành quy&#7871;t
&#273;&#7883;nh c&#432;&#7905;ng ch&#7871; bu&#7897;c th&#7921;c hi&#7879;n bi&#7879;n
pháp kh&#7855;c ph&#7909;c h&#7853;u qu&#7843;</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>Vi&#7879;c thi hành quy&#7871;t &#273;&#7883;nh
c&#432;&#7905;ng ch&#7871; bu&#7897;c th&#7921;c hi&#7879;n bi&#7879;n pháp kh&#7855;c
ph&#7909;c h&#7853;u qu&#7843; gây ra ph&#7843;i &#273;&#432;&#7907;c l&#7853;p
biên b&#7843;n và giao cho ng&#432;&#7901;i b&#7883; c&#432;&#7905;ng ch&#7871;
m&#7897;t b&#7843;n. Trong biên b&#7843;n ghi r\u01a1: Th&#7901;i gian, &#273;&#7883;a
&#273;i&#7875;m, c&#417; quan ch&#7911; tr\u0301 ti&#7871;n hành c&#432;&#7905;ng ch&#7871;;
cá nhân, t&#7893; ch&#7913;c b&#7883; c&#432;&#7905;ng ch&#7871;; &#273;&#7841;i
di&#7879;n chính quy&#7873;n &#273;&#7883;a ph&#432;&#417;ng và ng&#432;&#7901;i
ch&#7913;ng ki&#7871;n; k&#7871;t qu&#7843; th&#7921;c hi&#7879;n.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>Cá nhân ho&#7863;c &#273;&#7841;i di&#7879;n
t&#7893; ch&#7913;c b&#7883; c&#432;&#7905;ng ch&#7871;, &#273;&#7841;i di&#7879;n
c&#417; quan ra quy&#7871;t &#273;&#7883;nh c&#432;&#7905;ng ch&#7871;, &#273;&#7841;i
di&#7879;n chính quy&#7873;n &#273;&#7883;a ph&#432;&#417;ng và ng&#432;&#7901;i
ch&#7913;ng ki&#7871;n k\u01b0 vào biên b&#7843;n. Tr&#432;&#7901;ng h&#7907;p có
ng&#432;&#7901;i v&#7855;ng m&#7863;t ho&#7863;c có m&#7863;t mà t&#7915; ch&#7889;i
k\u01b0 biên b&#7843;n th\u0301 vi&#7879;c &#273;ó ph&#7843;i ghi vào biên b&#7843;n và
nêu r\u01a1 l\u01b0 do.</span></p>

<h3><a name="_Toc131755365">4. Thi hành quy&#7871;t &#273;&#7883;nh c&#432;&#7905;ng
ch&#7871;</a></h3>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>Vi&#7879;c thi hành quy&#7871;t &#273;&#7883;nh
c&#432;&#7905;ng ch&#7871; &#273;&#432;&#7907;c quy &#273;&#7883;nh t&#7841;i
&#272;i&#7873;u 88 c&#7911;a Lu&#7853;t XLVPHC, nh&#432; sau:</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>- Trong th&#7901;i h&#7841;n 02 ngày làm
vi&#7879;c, k&#7875; t&#7915; ngày ra quy&#7871;t &#273;&#7883;nh c&#432;&#7905;ng
ch&#7871; thi hành quy&#7871;t &#273;&#7883;nh x&#7917; ph&#7841;t vi ph&#7841;m
hành chính, ng&#432;&#7901;i ra quy&#7871;t &#273;&#7883;nh ph&#7843;i g&#7917;i
quy&#7871;t &#273;&#7883;nh cho cá nhân, t&#7893; ch&#7913;c b&#7883; c&#432;&#7905;ng
ch&#7871;, c&#417; quan, t&#7893; ch&#7913;c th&#7921;c hi&#7879;n vi&#7879;c
c&#432;&#7905;ng ch&#7871; và cá nhân, t&#7893; ch&#7913;c có liên quan.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>Ng&#432;&#7901;i ra quy&#7871;t &#273;&#7883;nh
c&#432;&#7905;ng ch&#7871; t&#7893; ch&#7913;c th&#7921;c hi&#7879;n vi&#7879;c
c&#432;&#7905;ng ch&#7871; thi hành quy&#7871;t &#273;&#7883;nh x&#7917; ph&#7841;t
c&#7911;a m\u0301nh và c&#7911;a c&#7845;p d&#432;&#7899;i.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>Vi&#7879;c g&#7917;i quy&#7871;t &#273;&#7883;nh
c&#432;&#7905;ng ch&#7871; cho các cá nhân, t&#7893; ch&#7913;c liên quan
&#273;&#432;&#7907;c th&#7921;c hi&#7879;n theo quy &#273;&#7883;nh t&#7841;i
&#272;i&#7873;u 70 c&#7911;a Lu&#7853;t XLVPHC.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>Quy&#7871;t &#273;&#7883;nh c&#432;&#7905;ng
ch&#7871; ph&#7843;i &#273;&#432;&#7907;c thi hành ngay khi cá nhân, t&#7893;
ch&#7913;c b&#7883; c&#432;&#7905;ng ch&#7871; nh&#7853;n &#273;&#432;&#7907;c
quy&#7871;t &#273;&#7883;nh c&#432;&#7905;ng ch&#7871;.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>- Cá nhân, t&#7893; ch&#7913;c nh&#7853;n
&#273;&#432;&#7907;c quy&#7871;t &#273;&#7883;nh c&#432;&#7905;ng ch&#7871; ph&#7843;i
nghiêm ch&#7881;nh ch&#7845;p hành quy&#7871;t &#273;&#7883;nh c&#432;&#7905;ng
ch&#7871; và ph&#7843;i ch&#7883;u m&#7885;i chi phí v&#7873; vi&#7879;c t&#7893;
ch&#7913;c th&#7921;c hi&#7879;n các bi&#7879;n pháp c&#432;&#7905;ng ch&#7871;.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>- Th&#7901;i hi&#7879;u thi hành quy&#7871;t
&#273;&#7883;nh c&#432;&#7905;ng ch&#7871; &#273;&#432;&#7907;c tính k&#7875; t&#7915;
ngày ra quy&#7871;t &#273;&#7883;nh c&#432;&#7905;ng ch&#7871; cho &#273;&#7871;n
th&#7901;i &#273;i&#7875;m ch&#7845;m d&#7913;t hi&#7879;u l&#7921;c thi hành c&#7911;a
quy&#7871;t &#273;&#7883;nh x&#7917; ph&#7841;t vi ph&#7841;m hành chính quy
&#273;&#7883;nh t&#7841;i kho&#7843;n 1 &#272;i&#7873;u 74 c&#7911;a Lu&#7853;t
XLVPHC; quá th&#7901;i h&#7841;n này th\u0301 không thi hành quy&#7871;t &#273;&#7883;nh
c&#432;&#7905;ng ch&#7871; &#273;ó, tr&#7915; tr&#432;&#7901;ng h&#7907;p quy&#7871;t
&#273;&#7883;nh x&#7917; ph&#7841;t có áp d&#7909;ng h\u0301nh th&#7913;c x&#7917;
ph&#7841;t t&#7883;ch thu tang v&#7853;t, ph&#432;&#417;ng ti&#7879;n vi ph&#7841;m
hành chính, áp d&#7909;ng bi&#7879;n pháp kh&#7855;c ph&#7909;c h&#7853;u qu&#7843;
th\u0301 v&#7851;n ph&#7843;i c&#432;&#7905;ng ch&#7871; t&#7883;ch thu tang v&#7853;t,
ph&#432;&#417;ng ti&#7879;n, áp d&#7909;ng bi&#7879;n pháp kh&#7855;c ph&#7909;c
h&#7853;u qu&#7843; &#273;ó.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>- Trách nhi&#7879;m c&#7911;a c&#417;
quan, t&#7893; ch&#7913;c trong vi&#7879;c ph&#7889;i h&#7907;p thi hành quy&#7871;t
&#273;&#7883;nh c&#432;&#7905;ng ch&#7871;:</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>+ Cá nhân, t&#7893; ch&#7913;c liên quan
có ngh&#297;a v&#7909; ph&#7889;i h&#7907;p v&#7899;i ng&#432;&#7901;i có th&#7849;m
quy&#7873;n ra quy&#7871;t &#273;&#7883;nh c&#432;&#7905;ng ch&#7871; tri&#7875;n
khai các bi&#7879;n pháp nh&#7857;m th&#7921;c hi&#7879;n các quy&#7871;t
&#273;&#7883;nh c&#432;&#7905;ng ch&#7871;;</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>+ L&#7921;c l&#432;&#7907;ng C&#7843;nh
sát nhân dân có trách nhi&#7879;m b&#7843;o &#273;&#7843;m tr&#7853;t t&#7921;,
an toàn trong quá tr\u0301nh thi hành quy&#7871;t &#273;&#7883;nh c&#432;&#7905;ng
ch&#7871; c&#7911;a Ch&#7911; t&#7883;ch &#7910;y ban nhân dân cùng c&#7845;p
ho&#7863;c quy&#7871;t &#273;&#7883;nh c&#432;&#7905;ng ch&#7871; c&#7911;a các
c&#417; quan nhà n&#432;&#7899;c khác khi &#273;&#432;&#7907;c yêu c&#7847;u;</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>+ T&#7893; ch&#7913;c tín d&#7909;ng, Kho
b&#7841;c Nhà n&#432;&#7899;c, chi nhánh ngân hàng n&#432;&#7899;c ngoài
n&#417;i cá nhân, t&#7893; ch&#7913;c b&#7883; c&#432;&#7905;ng ch&#7871; thi hành
m&#7903; tài kho&#7843;n có trách nhi&#7879;m cung c&#7845;p thông tin v&#7873;
&#273;i&#7873;u ki&#7879;n thi hành quy&#7871;t &#273;&#7883;nh x&#7917; ph&#7841;t
vi ph&#7841;m hành chính c&#7911;a cá nhân, t&#7893; ch&#7913;c b&#7883;
c&#432;&#7905;ng ch&#7871; trong th&#7901;i h&#7841;n 02 ngày làm vi&#7879;c, k&#7875;
t&#7915; khi nh&#7853;n &#273;&#432;&#7907;c yêu c&#7847;u b&#7857;ng v&#259;n
b&#7843;n c&#7911;a ng&#432;&#7901;i có th&#7849;m quy&#7873;n c&#432;&#7905;ng
ch&#7871;; ti&#7871;n hành phong t&#7887;a s&#7889; ti&#7873;n trong tài kho&#7843;n
t&#432;&#417;ng &#273;&#432;&#417;ng v&#7899;i s&#7889; ti&#7873;n mà cá nhân,
t&#7893; ch&#7913;c b&#7883; c&#432;&#7905;ng ch&#7871; ph&#7843;i n&#7897;p ho&#7863;c
phong t&#7887;a toàn b&#7897; s&#7889; ti&#7873;n trong tài kho&#7843;n trong
tr&#432;&#7901;ng h&#7907;p s&#7889; d&#432; trong tài kho&#7843;n ti&#7873;n g&#7917;i
ít h&#417;n s&#7889; ti&#7873;n mà cá nhân, t&#7893; ch&#7913;c b&#7883;
c&#432;&#7905;ng ch&#7871; ph&#7843;i n&#7897;p; th&#7921;c hi&#7879;n vi&#7879;c
trích chuy&#7875;n s&#7889; ti&#7873;n ph&#7843;i n&#7897;p theo yêu c&#7847;u
c&#7911;a ng&#432;&#7901;i có th&#7849;m quy&#7873;n ra quy&#7871;t &#273;&#7883;nh
c&#432;&#7905;ng ch&#7871;. Trong th&#7901;i h&#7841;n 05 ngày làm vi&#7879;c
tr&#432;&#7899;c khi trích chuy&#7875;n, t&#7893; ch&#7913;c tín d&#7909;ng,
Kho b&#7841;c Nhà n&#432;&#7899;c, chi nhánh ngân hàng n&#432;&#7899;c ngoài có
trách nhi&#7879;m thông báo cho cá nhân, t&#7893; ch&#7913;c b&#7883; c&#432;&#7905;ng
ch&#7871; bi&#7871;t vi&#7879;c trích chuy&#7875;n; vi&#7879;c trích chuy&#7875;n
không c&#7847;n s&#7921; &#273;&#7891;ng \u01b0 c&#7911;a cá nhân, t&#7893; ch&#7913;c
b&#7883; c&#432;&#7905;ng ch&#7871;./.</span></p>
