t&#7841;i &#272;i&#7873;u 76 Lu&#7853;t XLVPHC và &#273;&#432;&#7907;c th&#7921;c
hi&#7879;n khi có &#273;&#7911; các &#273;i&#7873;u ki&#7879;n sau &#273;ây:</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>+ Cá nhân b&#7883; ph&#7841;t ti&#7873;n t&#7915;
2.000.000 &#273;&#7891;ng tr&#7903; lên, t&#7893; ch&#7913;c b&#7883; ph&#7841;t
ti&#7873;n t&#7915; 100.000.000 &#273;&#7891;ng tr&#7903; lên;</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>+ Cá nhân &#273;ang g&#7863;p khó
kh&#259;n v&#7873; kinh t&#7871; do thiên tai, th&#7843;m h&#7885;a, h&#7887;a
ho&#7841;n, d&#7883;ch b&#7879;nh, m&#7855;c b&#7879;nh hi&#7875;m nghèo, tai n&#7841;n;
t&#7893; ch&#7913;c &#273;ang g&#7863;p khó kh&#259;n &#273;&#7863;c bi&#7879;t
ho&#7863;c &#273;&#7897;t xu&#7845;t v&#7873; kinh t&#7871; do thiên tai, th&#7843;m
h&#7885;a, h&#7887;a ho&#7841;n, d&#7883;ch b&#7879;nh.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>Tr&#432;&#7901;ng h&#7907;p cá nhân g&#7863;p
khó kh&#259;n v&#7873; kinh t&#7871; do thiên tai, th&#7843;m h&#7885;a, h&#7887;a
ho&#7841;n, d&#7883;ch b&#7879;nh, m&#7855;c b&#7879;nh hi&#7875;m nghèo, tai n&#7841;n
th\u0301 ph&#7843;i có xác nh&#7853;n c&#7911;a &#7910;y ban nhân dân c&#7845;p x\u0103

&#273;\u0103 ra quy&#7871;t &#273;&#7883;nh x&#7917; ph&#7841;t xem xét, quy&#7871;t
&#273;&#7883;nh vi&#7879;c gi&#7843;m, mi&#7877;n và thông báo cho ng&#432;&#7901;i
có &#273;&#417;n &#273;&#7873; ngh&#7883; gi&#7843;m, mi&#7877;n bi&#7871;t; n&#7871;u
không &#273;&#7891;ng \u01b0 v&#7899;i vi&#7879;c gi&#7843;m, mi&#7877;n th\u0301 ph&#7843;i
nêu r\u01a1 l\u01b0 do.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>Cá nhân, t&#7893; ch&#7913;c &#273;&#432;&#7907;c
gi&#7843;m, mi&#7877;n ti&#7873;n ph&#7841;t &#273;&#432;&#7907;c nh&#7853;n l&#7841;i
gi&#7845;y t&#7901;, tang v&#7853;t, ph&#432;&#417;ng ti&#7879;n &#273;ang b&#7883;
t&#7841;m gi&#7919; theo quy &#273;&#7883;nh t&#7841;i kho&#7843;n 6 &#272;i&#7873;u
125 c&#7911;a Lu&#7853;t XLVPHC.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>- N&#7897;p ti&#7873;n ph&#7841;t nhi&#7873;u
l&#7847;n</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>T&#7883;a &#272;i&#7873;u 79 Lu&#7853;t
XLVPHC, vi&#7879;c n&#7897;p ti&#7873;n ph&#7841;t nhi&#7873;u l&#7847;n
&#273;&#432;&#7907;c áp d&#7909;ng khi có &#273;&#7911; các &#273;i&#7873;u ki&#7879;n
sau &#273;ây:</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>+ B&#7883; ph&#7841;t ti&#7873;n t&#7915;
15.000.000 &#273;&#7891;ng tr&#7903; lên &#273;&#7889;i v&#7899;i cá nhân và t&#7915;
150.000.000 &#273;&#7891;ng tr&#7903; lên &#273;&#7889;i v&#7899;i t&#7893; ch&#7913;c;</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>+ &#272;ang g&#7863;p khó kh&#259;n &#273;&#7863;c
bi&#7879;t v&#7873; kinh t&#7871; và có &#273;&#417;n &#273;&#7873; ngh&#7883;
n&#7897;p ti&#7873;n ph&#7841;t nhi&#7873;u l&#7847;n. &#272;&#417;n &#273;&#7873;
ngh&#7883; c&#7911;a cá nhân ph&#7843;i &#273;&#432;&#7907;c &#7910;y ban nhân
dân c&#7845;p x\u0103 n&#417;i ng&#432;&#7901;i &#273;ó c&#432; trú ho&#7863;c
c&#417; quan, t&#7893; ch&#7913;c n&#417;i ng&#432;&#7901;i &#273;ó h&#7885;c t&#7853;p,
làm vi&#7879;c xác nh&#7853;n hoàn c&#7843;nh khó kh&#259;n &#273;&#7863;c bi&#7879;t
v&#7873; kinh t&#7871;. &#272;&#417;n &#273;&#7873; ngh&#7883; c&#7911;a t&#7893;
ch&#7913;c ph&#7843;i &#273;&#432;&#7907;c &#7910;y ban nhân dân c&#7845;p x\u0103,
Ban qu&#7843;n l\u01b0 khu công nghi&#7879;p, khu ch&#7871; xu&#7845;t, khu công ngh&#7879;
cao, khu kinh t&#7871;, c&#417; quan Thu&#7871; qu&#7843;n l\u01b0 tr&#7921;c ti&#7871;p
ho&#7863;c c&#417; quan c&#7845;p trên tr&#7921;c ti&#7871;p xác nh&#7853;n
hoàn c&#7843;nh khó kh&#259;n &#273;&#7863;c bi&#7879;t v&#7873; kinh t&#7871;.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>Th&#7901;i h&#7841;n n&#7897;p ti&#7873;n
ph&#7841;t nhi&#7873;u l&#7847;n không quá 06 tháng, k&#7875; t&#7915; ngày quy&#7871;t
&#273;&#7883;nh x&#7917; ph&#7841;t có hi&#7879;u l&#7921;c; s&#7889; l&#7847;n
n&#7897;p ti&#7873;n ph&#7841;t t&#7889;i &#273;a không quá 03 l&#7847;n.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>M&#7913;c n&#7897;p ph&#7841;t l&#7847;n
th&#7913; nh&#7845;t t&#7889;i thi&#7875;u là 40% t&#7893;ng s&#7889; ti&#7873;n
ph&#7841;t.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>Ng&#432;&#7901;i &#273;\u0103 ra quy&#7871;t
&#273;&#7883;nh ph&#7841;t ti&#7873;n có quy&#7873;n quy&#7871;t &#273;&#7883;nh
vi&#7879;c n&#7897;p ti&#7873;n ph&#7841;t nhi&#7873;u l&#7847;n. Quy&#7871;t
&#273;&#7883;nh v&#7873; vi&#7879;c n&#7897;p ti&#7873;n ph&#7841;t nhi&#7873;u
l&#7847;n ph&#7843;i b&#7857;ng v&#259;n b&#7843;n.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><b style='font-family:"Times New Roman",serif'>c. T&#7893;
ch&#7913;c thi hành quy&#7871;t &#273;&#7883;nh x&#7917; ph&#7841;t trong
tr&#432;&#7901;ng h&#7907;p chuy&#7875;n quy&#7871;t &#273;&#7883;nh x&#7917;
ph&#7841;t &#273;&#7875; t&#7893; ch&#7913;c thi hành</span></b></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>Chuy&#7875;n quy&#7871;t &#273;&#7883;nh x&#7917;
ph&#7841;t &#273;&#7875; t&#7893; ch&#7913;c thi hành &#273;&#432;&#7907;c quy
&#273;&#7883;nh t&#7841;i &#272;i&#7873;u 71 Lu&#7853;t XLVPHC, nh&#432; sau:</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>+ Trong tr&#432;&#7901;ng h&#7907;p cá
nhân, t&#7893; ch&#7913;c th&#7921;c hi&#7879;n vi ph&#7841;m hành chính &#7903;
&#273;&#7883;a bàn c&#7845;p t&#7881;nh này nh&#432;ng c&#432; trú, &#273;óng
tr&#7909; s&#7903; &#7903; &#273;&#7883;a bàn c&#7845;p t&#7881;nh khác và
không có &#273;i&#7873;u ki&#7879;n ch&#7845;p hành quy&#7871;t &#273;&#7883;nh
x&#7917; ph&#7841;t t&#7841;i n&#417;i b&#7883; x&#7917; ph&#7841;t th\u0301 quy&#7871;t
&#273;&#7883;nh x&#7917; ph&#7841;t &#273;&#432;&#7907;c chuy&#7875;n &#273;&#7871;n
c&#417; quan cùng c&#7845;p n&#417;i cá nhân c&#432; trú, t&#7893; ch&#7913;c
&#273;óng tr&#7909; s&#7903; &#273;&#7875; t&#7893; ch&#7913;c thi hành; n&#7871;u
n&#417;i cá nhân c&#432; trú, t&#7893; ch&#7913;c &#273;óng tr&#7909; s&#7903;
không có c&#417; quan cùng c&#7845;p th\u0301 quy&#7871;t &#273;&#7883;nh x&#7917;
ph&#7841;t &#273;&#432;&#7907;c chuy&#7875;n &#273;&#7871;n &#7910;y ban nhân
dân c&#7845;p huy&#7879;n &#273;&#7875; t&#7893; ch&#7913;c thi hành.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>+ Trong tr&#432;&#7901;ng h&#7907;p vi ph&#7841;m
hành chính x&#7843;y ra &#7903; &#273;&#7883;a bàn c&#7845;p huy&#7879;n này
nh&#432;ng cá nhân c&#432; trú, t&#7893; ch&#7913;c &#273;óng tr&#7909; s&#7903;
&#7903; &#273;&#7883;a bàn c&#7845;p huy&#7879;n khác mà vi&#7879;c &#273;i l&#7841;i
g&#7863;p khó kh&#259;n và cá nhân, t&#7893; ch&#7913;c vi ph&#7841;m không có
&#273;i&#7873;u ki&#7879;n ch&#7845;p hành quy&#7871;t &#273;&#7883;nh x&#7917;
ph&#7841;t t&#7841;i n&#417;i b&#7883; x&#7917; ph&#7841;t th\u0301 quy&#7871;t
&#273;&#7883;nh x&#7917; ph&#7841;t &#273;&#432;&#7907;c chuy&#7875;n &#273;&#7871;n
c&#417; quan cùng c&#7845;p n&#417;i cá nhân c&#432; trú, t&#7893; ch&#7913;c
&#273;óng tr&#7909; s&#7903; &#273;&#7875; t&#7893; ch&#7913;c thi hành; n&#7871;u
n&#417;i cá nhân c&#432; trú, t&#7893; ch&#7913;c &#273;óng tr&#7909; s&#7903;
không có c&#417; quan cùng c&#7845;p th\u0301 quy&#7871;t &#273;&#7883;nh x&#7917;
ph&#7841;t &#273;&#432;&#7907;c chuy&#7875;n &#273;&#7871;n &#7910;y ban nhân
dân c&#7845;p huy&#7879;n &#273;&#7875; thi hành.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>+ C&#417; quan c&#7911;a ng&#432;&#7901;i
&#273;\u0103 ra quy&#7871;t &#273;&#7883;nh x&#7917; ph&#7841;t vi ph&#7841;m hành
chính &#273;&#7889;i v&#7899;i các tr&#432;&#7901;ng h&#7907;p quy &#273;&#7883;nh
t&#7841;i kho&#7843;n 1 và kho&#7843;n 2 &#272;i&#7873;u 71 Lu&#7853;t XLVPHC
có trách nhi&#7879;m chuy&#7875;n toàn b&#7897; b&#7843;n g&#7889;c h&#7891;
s&#417;, gi&#7845;y t&#7901; liên quan &#273;&#7871;n c&#417; quan ti&#7871;p
nh&#7853;n quy&#7871;t &#273;&#7883;nh x&#7917; ph&#7841;t &#273;&#7875; thi
hành theo quy &#273;&#7883;nh c&#7911;a Lu&#7853;t XLVPHC. Tang v&#7853;t,
ph&#432;&#417;ng ti&#7879;n vi ph&#7841;m hành chính b&#7883; t&#7841;m gi&#7919;,
t&#7883;ch thu (n&#7871;u có) &#273;&#432;&#7907;c chuy&#7875;n &#273;&#7871;n
c&#417; quan ti&#7871;p nh&#7853;n quy&#7871;t &#273;&#7883;nh x&#7917; ph&#7841;t
&#273;&#7875; thi hành, tr&#7915; tr&#432;&#7901;ng h&#7907;p tang v&#7853;t là
&#273;&#7897;ng v&#7853;t, th&#7921;c v&#7853;t s&#7889;ng, hàng hóa, v&#7853;t
ph&#7849;m d&#7877; b&#7883; h&#432; h&#7887;ng, khó b&#7843;o qu&#7843;n theo
quy &#273;&#7883;nh c&#7911;a pháp lu&#7853;t và m&#7897;t s&#7889; lo&#7841;i
tài s&#7843;n khác do Chính ph&#7911; quy &#273;&#7883;nh.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>Cá nhân, t&#7893; ch&#7913;c vi ph&#7841;m
ph&#7843;i tr&#7843; chi phí chuy&#7875;n h&#7891; s&#417;, tang v&#7853;t,
ph&#432;&#417;ng ti&#7879;n vi ph&#7841;m hành chính.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><b style='font-family:"Times New Roman",serif'>d. T&#7893;
ch&#7913;c thi hành quy&#7871;t &#273;&#7883;nh x&#7917; ph&#7841;t trong
tr&#432;&#7901;ng h&#7907;p công b&#7889; công khai trên các ph&#432;&#417;ng
ti&#7879;n thông tin &#273;&#7841;i chúng vi&#7879;c x&#7917; ph&#7841;t &#273;&#7889;i
v&#7899;i cá nhân, t&#7893; ch&#7913;c vi ph&#7841;m hành chính</span></b></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>Theo &#272;i&#7873;u 72 Lu&#7853;t XLVPHC,
tr&#432;&#7901;ng h&#7907;p vi ph&#7841;m hành chính v&#7873; an toàn th&#7921;c
ph&#7849;m; ch&#7845;t l&#432;&#7907;ng s&#7843;n ph&#7849;m, hàng hóa; d&#432;&#7907;c;
khám b&#7879;nh, ch&#7919;a b&#7879;nh; lao &#273;&#7897;ng; xây d&#7921;ng; b&#7843;o
hi&#7875;m x\u0103 h&#7897;i; b&#7843;o hi&#7875;m y t&#7871;; b&#7843;o v&#7879;
môi tr&#432;&#7901;ng; thu&#7871;; ch&#7913;ng khoán; s&#7903; h&#7919;u trí tu&#7879;;
&#273;o l&#432;&#7901;ng; s&#7843;n xu&#7845;t, buôn bán hàng gi&#7843; mà gây
h&#7853;u qu&#7843; l&#7899;n ho&#7863;c gây &#7843;nh h&#432;&#7903;ng x&#7845;u
v&#7873; d&#432; lu&#7853;n x\u0103 h&#7897;i th\u0301 c&#417; quan c&#7911;a ng&#432;&#7901;i
có th&#7849;m quy&#7873;n x&#7917; ph&#7841;t vi ph&#7841;m hành chính có trách
nhi&#7879;m công b&#7889; công khai v&#7873; vi&#7879;c x&#7917; ph&#7841;t. N&#7897;i
dung công b&#7889; công khai bao g&#7891;m cá nhân, t&#7893; ch&#7913;c vi ph&#7841;m
hành chính, hành vi vi ph&#7841;m, h\u0301nh th&#7913;c x&#7917; ph&#7841;t và bi&#7879;n
pháp kh&#7855;c ph&#7909;c h&#7853;u qu&#7843;. Vi&#7879;c công b&#7889; công
khai &#273;&#432;&#7907;c th&#7921;c hi&#7879;n trên trang thông tin &#273;i&#7879;n
t&#7917; ho&#7863;c báo c&#7911;a c&#417; quan qu&#7843;n l\u01b0 c&#7845;p b&#7897;,
c&#7845;p s&#7903; ho&#7863;c c&#7911;a &#7910;y ban nhân dân c&#7845;p t&#7881;nh
n&#417;i x&#7843;y ra vi ph&#7841;m hành chính.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>&#272;i&#7873;u 18 c&#7911;a Ngh&#7883;
&#273;&#7883;nh s&#7889; 118/2021/N&#272;-CP, Chính ph&#7911; h&#432;&#7899;ng
d&#7851;n vi&#7879;c công b&#7889; công khai trên các ph&#432;&#417;ng ti&#7879;n
thông tin &#273;&#7841;i chúng vi&#7879;c x&#7917; ph&#7841;t &#273;&#7889;i v&#7899;i
cá nhân, t&#7893; ch&#7913;c vi ph&#7841;m hành chính, nh&#432; sau:</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>- &#272;&#7889;i v&#7899;i các tr&#432;&#7901;ng
h&#7907;p vi ph&#7841;m ph&#7843;i &#273;&#432;&#7907;c công b&#7889; công khai
theo quy &#273;&#7883;nh t&#7841;i kho&#7843;n 1 &#272;i&#7873;u 72 Lu&#7853;t
XLVPHC, th&#7911; tr&#432;&#7903;ng c&#417; quan, &#273;&#417;n v&#7883; c&#7911;a
ng&#432;&#7901;i &#273;\u0103 ra quy&#7871;t &#273;&#7883;nh x&#7917; ph&#7841;t g&#7917;i
v&#259;n b&#7843;n v&#7873; vi&#7879;c công b&#7889; công khai và b&#7843;n sao
quy&#7871;t &#273;&#7883;nh x&#7917; ph&#7841;t vi ph&#7841;m hành chính &#273;&#7871;n
trang thông tin &#273;i&#7879;n t&#7917; ho&#7863;c báo c&#7911;a c&#417; quan
qu&#7843;n l\u01b0 c&#7845;p b&#7897;, c&#7845;p s&#7903; ho&#7863;c c&#7911;a &#7910;y
ban nhân dân c&#7845;p t&#7881;nh n&#417;i x&#7843;y ra vi ph&#7841;m hành
chính trong th&#7901;i h&#7841;n 03 ngày làm vi&#7879;c, k&#7875; t&#7915; ngày
ra quy&#7871;t &#273;&#7883;nh x&#7917; ph&#7841;t.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>Tr&#432;&#7901;ng h&#7907;p &#273;ính chính,
s&#7917;a &#273;&#7893;i, b&#7893; sung, h&#7911;y b&#7887;, ban hành quy&#7871;t
&#273;&#7883;nh m&#7899;i trong x&#7917; ph&#7841;t vi ph&#7841;m hành chính,
th\u0301 c&#361;ng ph&#7843;i th&#7921;c hi&#7879;n công b&#7889; công khai theo quy
&#273;&#7883;nh t&#7841;i kho&#7843;n này.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>- N&#7897;i dung thông tin công b&#7889;
công khai g&#7891;m: H&#7885; và tên, ngày, tháng, n&#259;m sinh, s&#7889; ch&#7913;ng
minh nhân dân ho&#7863;c c&#259;n c&#432;&#7899;c công dân ho&#7863;c s&#7889;
&#273;&#7883;nh danh cá nhân, qu&#7889;c t&#7883;ch c&#7911;a ng&#432;&#7901;i
vi ph&#7841;m ho&#7863;c tên, &#273;&#7883;a ch&#7881; c&#7911;a t&#7893; ch&#7913;c
vi ph&#7841;m; hành vi vi ph&#7841;m hành chính; h\u0301nh th&#7913;c x&#7917; ph&#7841;t;
bi&#7879;n pháp kh&#7855;c ph&#7909;c h&#7853;u qu&#7843; và th&#7901;i gian th&#7921;c
hi&#7879;n.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>- Ng&#432;&#7901;i &#273;&#7913;ng &#273;&#7847;u
c&#417; quan báo ho&#7863;c ng&#432;&#7901;i ch&#7883;u trách nhi&#7879;m qu&#7843;n
l\u01b0 n&#7897;i dung c&#7911;a trang thông tin &#273;i&#7879;n t&#7917; và th&#7901;i
h&#7841;n công b&#7889; công khai có trách nhi&#7879;m:</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>+ &#272;&#259;ng &#273;&#7847;y &#273;&#7911;
các n&#7897;i dung thông tin c&#7847;n công khai trong th&#7901;i h&#7841;n 02
ngày làm vi&#7879;c k&#7875; t&#7915; ngày nh&#7853;n &#273;&#432;&#7907;c
v&#259;n b&#7843;n v&#7873; vi&#7879;c công b&#7889; công khai và b&#7843;n sao
quy&#7871;t &#273;&#7883;nh x&#7917; ph&#7841;t vi ph&#7841;m hành chính;</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>+ &#272;&#259;ng công khai thông tin
&#273;&#7889;i v&#7899;i m&#7895;i quy&#7871;t &#273;&#7883;nh x&#7917; ph&#7841;t
vi ph&#7841;m hành chính ít nh&#7845;t 01 l&#7847;n, th&#7901;i gian
&#273;&#259;ng t&#7843;i ít nh&#7845;t là 30 ngày;</span></p>

tháng, n&#259;m ra quy&#7871;t &#273;&#7883;nh; c&#259;n c&#7913; ra quy&#7871;t
&#273;&#7883;nh; h&#7885; tên, ch&#7913;c v&#7909;, &#273;&#417;n v&#7883; công
tác c&#7911;a ng&#432;&#7901;i ra quy&#7871;t &#273;&#7883;nh; h&#7885; tên,
&#273;&#7883;a ch&#7881; c&#7911;a cá nhân b&#7883; c&#432;&#7905;ng ch&#7871;
kh&#7845;u tr&#7915; m&#7897;t ph&#7847;n l&#432;&#417;ng ho&#7863;c m&#7897;t
ph&#7847;n thu nh&#7853;p; tên, &#273;&#7883;a ch&#7881; c&#417; quan, t&#7893;
ch&#7913;c qu&#7843;n l\u01b0 ti&#7873;n l&#432;&#417;ng ho&#7863;c thu nh&#7853;p c&#7911;a
cá nhân b&#7883; c&#432;&#7905;ng ch&#7871;; s&#7889; ti&#7873;n b&#7883; kh&#7845;u
tr&#7915;; l\u01b0 do kh&#7845;u tr&#7915;; tên, &#273;&#7883;a ch&#7881; c&#7911;a
Kho b&#7841;c Nhà n&#432;&#7899;c nh&#7853;n ti&#7873;n; ph&#432;&#417;ng th&#7913;c
chuy&#7875;n s&#7889; ti&#7873;n b&#7883; kh&#7845;u tr&#7915; &#273;&#7871;n
Kho b&#7841;c; th&#7901;i gian thi hành; ch&#7919; k\u01b0 c&#7911;a ng&#432;&#7901;i
ra quy&#7871;t &#273;&#7883;nh và &#273;óng d&#7845;u c&#7911;a c&#417; quan ra
quy&#7871;t &#273;&#7883;nh.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>- T&#7927; l&#7879; kh&#7845;u tr&#7915; m&#7897;t
ph&#7847;n l&#432;&#417;ng ho&#7863;c m&#7897;t ph&#7847;n thu nh&#7853;p
&#273;&#7889;i v&#7899;i cá nhân có th&#7875; ti&#7871;n hành nhi&#7873;u l&#7847;n,
t&#7927; l&#7879; nh&#432; sau:</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>+ &#272;&#7889;i v&#7899;i ti&#7873;n
l&#432;&#417;ng, b&#7843;o hi&#7875;m x\u0103 h&#7897;i t&#7927; l&#7879; kh&#7845;u
tr&#7915; m&#7895;i l&#7847;n không quá 30% t&#7893;ng s&#7889; ti&#7873;n
l&#432;&#417;ng, b&#7843;o hi&#7875;m x\u0103 h&#7897;i &#273;&#432;&#7907;c h&#432;&#7903;ng.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>+ &#272;&#7889;i v&#7899;i nh&#7919;ng kho&#7843;n
thu nh&#7853;p khác, t&#7927; l&#7879; kh&#7845;u tr&#7915; m&#7895;i l&#7847;n
không quá 50% t&#7893;ng s&#7889; thu nh&#7853;p.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>- Trách nhi&#7879;m c&#7911;a c&#417;
quan, &#273;&#417;n v&#7883;, t&#7893; ch&#7913;c, ng&#432;&#7901;i s&#7917; d&#7909;ng
lao &#273;&#7897;ng &#273;ang qu&#7843;n l\u01b0 ti&#7873;n l&#432;&#417;ng ho&#7863;c
thu nh&#7853;p c&#7911;a cá nhân b&#7883; kh&#7845;u tr&#7915;</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>+ C&#417; quan, &#273;&#417;n v&#7883;, t&#7893;
ch&#7913;c, ng&#432;&#7901;i s&#7917; d&#7909;ng lao &#273;&#7897;ng &#273;ang
qu&#7843;n l\u01b0 ti&#7873;n l&#432;&#417;ng ho&#7863;c thu nh&#7853;p c&#7911;a cá
nhân b&#7883; áp d&#7909;ng bi&#7879;n pháp kh&#7845;u tr&#7915; m&#7897;t ph&#7847;n
l&#432;&#417;ng ho&#7863;c m&#7897;t ph&#7847;n thu nh&#7853;p có trách nhi&#7879;m
ch&#7845;p hành nghiêm ch&#7881;nh quy&#7871;t &#273;&#7883;nh c&#432;&#7905;ng
ch&#7871; c&#7911;a c&#417; quan có th&#7849;m quy&#7873;n.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>+ &#272;&#7871;n k&#7923; l&#297;nh ti&#7873;n
l&#432;&#417;ng ho&#7863;c thu nh&#7853;p g&#7847;n nh&#7845;t, c&#417; quan,
&#273;&#417;n v&#7883;, t&#7893; ch&#7913;c, ng&#432;&#7901;i s&#7917; d&#7909;ng
lao &#273;&#7897;ng &#273;ang qu&#7843;n l\u01b0 ti&#7873;n l&#432;&#417;ng ho&#7863;c
thu nh&#7853;p c&#7911;a cá nhân b&#7883; c&#432;&#7905;ng ch&#7871; có trách
nhi&#7879;m kh&#7845;u tr&#7915; m&#7897;t ph&#7847;n l&#432;&#417;ng ho&#7863;c
thu nh&#7853;p c&#7911;a cá nhân b&#7883; c&#432;&#7905;ng ch&#7871; và chuy&#7875;n
s&#7889; ti&#7873;n &#273;\u0103 kh&#7845;u tr&#7915; &#273;&#7871;n tài kho&#7843;n
t&#7841;i Kho b&#7841;c Nhà n&#432;&#7899;c theo n&#7897;i dung ghi trong quy&#7871;t
&#273;&#7883;nh c&#432;&#7905;ng ch&#7871;, &#273;&#7891;ng th&#7901;i thông
báo cho c&#417; quan có th&#7849;m quy&#7873;n ra quy&#7871;t &#273;&#7883;nh
c&#432;&#7905;ng ch&#7871; bi&#7871;t.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>+ Tr&#432;&#7901;ng h&#7907;p ch&#432;a kh&#7845;u
tr&#7915; &#273;&#7911; s&#7889; ti&#7873;n theo quy&#7871;t &#273;&#7883;nh
c&#432;&#7905;ng ch&#7871; mà cá nhân b&#7883; c&#432;&#7905;ng ch&#7871;
&#273;\u0103 ch&#7845;m d&#7913;t h&#7907;p &#273;&#7891;ng có h&#432;&#7903;ng
l&#432;&#417;ng ho&#7863;c thu nh&#7853;p th\u0301 c&#417; quan, &#273;&#417;n v&#7883;,
t&#7893; ch&#7913;c, ng&#432;&#7901;i s&#7917; d&#7909;ng lao &#273;&#7897;ng
ph&#7843;i thông báo ngay cho c&#417; quan có th&#7849;m quy&#7873;n ra quy&#7871;t
&#273;&#7883;nh c&#432;&#7905;ng ch&#7871; bi&#7871;t.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>Tr&#432;&#7901;ng h&#7907;p c&#417; quan,
&#273;&#417;n v&#7883;, t&#7893; ch&#7913;c, ng&#432;&#7901;i s&#7917; d&#7909;ng
lao &#273;&#7897;ng &#273;ang qu&#7843;n l\u01b0 ti&#7873;n l&#432;&#417;ng ho&#7863;c
thu nh&#7853;p c&#7911;a cá nhân b&#7883; áp d&#7909;ng bi&#7879;n pháp kh&#7845;u
tr&#7915; m&#7897;t ph&#7847;n l&#432;&#417;ng ho&#7863;c m&#7897;t ph&#7847;n
thu nh&#7853;p c&#7889; t\u0301nh không th&#7921;c hi&#7879;n quy&#7871;t &#273;&#7883;nh
c&#432;&#7905;ng ch&#7871; kh&#7845;u tr&#7915; c&#7911;a c&#417; quan có th&#7849;m
quy&#7873;n th\u0301 b&#7883; x&#7917; l\u01b0 theo quy &#273;&#7883;nh c&#7911;a pháp lu&#7853;t.</span></p>

<h4><a name="_Toc131755361">3.3.2. Kh&#7845;u tr&#7915; ti&#7873;n t&#7915; tài
kho&#7843;n</a></h4>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>- &#272;&#7889;i t&#432;&#7907;ng b&#7883;
áp d&#7909;ng</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>&#272;&#7889;i t&#432;&#7907;ng b&#7883;
áp d&#7909;ng bi&#7879;n pháp c&#432;&#7905;ng ch&#7871; kh&#7845;u tr&#7915;
ti&#7873;n t&#7915; tài kho&#7843;n là t&#7893; ch&#7913;c, cá nhân không t&#7921;
nguy&#7879;n ch&#7845;p hành quy&#7871;t &#273;&#7883;nh x&#7917; ph&#7841;t,
quy&#7871;t &#273;&#7883;nh kh&#7855;c ph&#7909;c h&#7853;u qu&#7843;, không
thanh toán ho&#7863;c thanh toán ch&#432;a &#273;&#7911; chi phí c&#432;&#7905;ng
ch&#7871; mà có ti&#7873;n g&#7917;i t&#7841;i t&#7893; ch&#7913;c tín d&#7909;ng
&#7903; Vi&#7879;t Nam.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>- Xác minh thông tin v&#7873; tài kho&#7843;n
c&#7911;a cá nhân, t&#7893; ch&#7913;c b&#7883; c&#432;&#7905;ng ch&#7871;</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>Ng&#432;&#7901;i có th&#7849;m quy&#7873;n
ra quy&#7871;t &#273;&#7883;nh c&#432;&#7905;ng ch&#7871; kh&#7845;u tr&#7915;
ti&#7873;n t&#7915; tài kho&#7843;n có quy&#7873;n yêu c&#7847;u t&#7893; ch&#7913;c
tín d&#7909;ng cung c&#7845;p thông tin v&#7873; tài kho&#7843;n c&#7911;a cá
nhân, t&#7893; ch&#7913;c b&#7883; c&#432;&#7905;ng ch&#7871; theo quy &#273;&#7883;nh
c&#7911;a pháp lu&#7853;t; tr&#432;&#7901;ng h&#7907;p ng&#432;&#7901;i có th&#7849;m
quy&#7873;n ra quy&#7871;t &#273;&#7883;nh c&#432;&#7905;ng ch&#7871; không có
th&#7849;m quy&#7873;n yêu c&#7847;u cung c&#7845;p thông tin v&#7873; tài kho&#7843;n
th\u0301 &#273;&#7873; ngh&#7883; ng&#432;&#7901;i có th&#7849;m quy&#7873;n yêu c&#7847;u
t&#7893; ch&#7913;c tín d&#7909;ng cung c&#7845;p thông tin. Ng&#432;&#7901;i
&#273;&#432;&#7907;c cung c&#7845;p thông tin có trách nhi&#7879;m b&#7843;o m&#7853;t
nh&#7919;ng thông tin &#273;&#432;&#7907;c cung c&#7845;p.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>Cá nhân, t&#7893; ch&#7913;c b&#7883;
c&#432;&#7905;ng ch&#7871; có trách nhi&#7879;m thông báo cho ng&#432;&#7901;i
có th&#7849;m quy&#7873;n ra quy&#7871;t &#273;&#7883;nh c&#432;&#7905;ng ch&#7871;
kh&#7845;u tr&#7915; ti&#7873;n t&#7915; tài kho&#7843;n v&#7873; tên t&#7893;
ch&#7913;c tín d&#7909;ng, n&#417;i m&#7903; tài kho&#7843;n, s&#7889; tài kho&#7843;n
c&#7911;a m\u0301nh t&#7841;i t&#7893; ch&#7913;c tín d&#7909;ng khi có yêu c&#7847;u.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>- Quy&#7871;t &#273;&#7883;nh c&#432;&#7905;ng
ch&#7871; kh&#7845;u tr&#7915; ti&#7873;n t&#7915; tài kho&#7843;n</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>Quy&#7871;t &#273;&#7883;nh c&#432;&#7905;ng
ch&#7871; kh&#7845;u tr&#7915; ti&#7873;n t&#7915; tài kho&#7843;n bao g&#7891;m
nh&#7919;ng n&#7897;i dung sau: S&#7889; quy&#7871;t &#273;&#7883;nh; ngày,
tháng, n&#259;m ra quy&#7871;t &#273;&#7883;nh; c&#259;n c&#7913; ra quy&#7871;t
&#273;&#7883;nh; h&#7885; tên, ch&#7913;c v&#7909;, &#273;&#417;n v&#7883; công
tác c&#7911;a ng&#432;&#7901;i ra quy&#7871;t &#273;&#7883;nh; s&#7889; ti&#7873;n
b&#7883; kh&#7845;u tr&#7915;, l\u01b0 do kh&#7845;u tr&#7915;; h&#7885; tên, s&#7889;
tài kho&#7843;n c&#7911;a cá nhân, t&#7893; ch&#7913;c b&#7883; kh&#7845;u tr&#7915;;
tên, &#273;&#7883;a ch&#7881; t&#7893; ch&#7913;c tín d&#7909;ng n&#417;i
&#273;&#7889;i t&#432;&#7907;ng b&#7883; áp d&#7909;ng kh&#7845;u tr&#7915; m&#7903;
tài kho&#7843;n; tên, &#273;&#7883;a ch&#7881;, s&#7889; tài kho&#7843;n c&#7911;a
Kho b&#7841;c Nhà n&#432;&#7899;c, ph&#432;&#417;ng th&#7913;c chuy&#7875;n s&#7889;
ti&#7873;n b&#7883; kh&#7845;u tr&#7915; t&#7915; t&#7893; ch&#7913;c tín d&#7909;ng
&#273;&#7871;n Kho b&#7841;c Nhà n&#432;&#7899;c; ch&#7919; k\u01b0 c&#7911;a ng&#432;&#7901;i
ra quy&#7871;t &#273;&#7883;nh và &#273;óng d&#7845;u c&#417; quan ra quy&#7871;t
&#273;&#7883;nh.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>Khi nh&#7853;n &#273;&#432;&#7907;c quy&#7871;t
&#273;&#7883;nh c&#432;&#7905;ng ch&#7871; kh&#7845;u tr&#7915; ti&#7873;n t&#7915;
tài kho&#7843;n, cá nhân, t&#7893; ch&#7913;c b&#7883; c&#432;&#7905;ng ch&#7871;
có trách nhi&#7879;m yêu c&#7847;u t&#7893; ch&#7913;c tín d&#7909;ng n&#417;i
m\u0301nh m&#7903; tài kho&#7843;n chuy&#7875;n ti&#7873;n t&#7915; tài kho&#7843;n
c&#7911;a m\u0301nh sang tài kho&#7843;n c&#7911;a Kho b&#7841;c Nhà n&#432;&#7899;c
ghi trong quy&#7871;t &#273;&#7883;nh c&#432;&#7905;ng ch&#7871; kh&#7845;u tr&#7915;
ti&#7873;n t&#7915; tài kho&#7843;n.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>- Trách nhi&#7879;m c&#7911;a t&#7893; ch&#7913;c
tín d&#7909;ng n&#417;i cá nhân, t&#7893; ch&#7913;c b&#7883; c&#432;&#7905;ng
ch&#7871; m&#7903; tài kho&#7843;n</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>Cung c&#7845;p các thông tin b&#7857;ng
v&#259;n b&#7843;n v&#7873; tài kho&#7843;n c&#7911;a cá nhân, t&#7893; ch&#7913;c
b&#7883; c&#432;&#7905;ng ch&#7871; hi&#7879;n &#273;ang m&#7903; tài kho&#7843;n
t&#7841;i t&#7893; ch&#7913;c tín d&#7909;ng c&#7911;a m\u0301nh khi có yêu c&#7847;u
c&#7911;a ng&#432;&#7901;i có th&#7849;m quy&#7873;n ra quy&#7871;t &#273;&#7883;nh
c&#432;&#7905;ng ch&#7871;.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>Gi&#7919; l&#7841;i trong tài kho&#7843;n
c&#7911;a cá nhân, t&#7893; ch&#7913;c b&#7883; c&#432;&#7905;ng ch&#7871; s&#7889;
ti&#7873;n t&#432;&#417;ng &#273;&#432;&#417;ng v&#7899;i s&#7889; ti&#7873;n
mà cá nhân, t&#7893; ch&#7913;c &#273;ó ph&#7843;i n&#7897;p theo yêu c&#7847;u
c&#7911;a ng&#432;&#7901;i có th&#7849;m quy&#7873;n ra quy&#7871;t &#273;&#7883;nh
c&#432;&#7905;ng ch&#7871;.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>Trích chuy&#7875;n t&#7915; tài kho&#7843;n
ti&#7873;n g&#7917;i c&#7911;a cá nhân, t&#7893; ch&#7913;c b&#7883; c&#432;&#7905;ng
ch&#7871; vào ngân sách nhà n&#432;&#7899;c qua tài kho&#7843;n m&#7903; t&#7841;i
Kho b&#7841;c Nhà n&#432;&#7899;c s&#7889; ti&#7873;n mà cá nhân, t&#7893; ch&#7913;c
b&#7883; c&#432;&#7905;ng ch&#7871; ph&#7843;i n&#7897;p.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>Tr&#432;&#7901;ng h&#7907;p cá nhân, t&#7893;
ch&#7913;c b&#7883; c&#432;&#7905;ng ch&#7871; không th&#7921;c hi&#7879;n quy
&#273;&#7883;nh t&#7841;i Kho&#7843;n 2 &#272;i&#7873;u 15 Ngh&#7883; &#273;&#7883;nh
s&#7889; 166/N&#272;-CP th\u0301 t&#7893; ch&#7913;c tín d&#7909;ng thông báo cho cá
nhân, t&#7893; ch&#7913;c b&#7883; c&#432;&#7905;ng ch&#7871; bi&#7871;t vi&#7879;c
trích chuy&#7875;n; vi&#7879;c trích chuy&#7875;n không c&#7847;n s&#7921;
&#273;&#7891;ng \u01b0 c&#7911;a cá nhân, t&#7893; ch&#7913;c b&#7883; c&#432;&#7905;ng
ch&#7871;.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>Tr&#432;&#7901;ng h&#7907;p trong tài kho&#7843;n
không c\u0323n s&#7889; d&#432; ho&#7863;c c\u0323n nh&#432;ng không &#273;&#7911; &#273;&#7875;
kh&#7845;u tr&#7915; th\u0301 t&#7893; ch&#7913;c tín d&#7909;ng sau khi kh&#7845;u
tr&#7915; s&#7889; ti&#7873;n hi&#7879;n có ph&#7843;i thông báo b&#7857;ng
v&#259;n b&#7843;n cho c&#417; quan &#273;\u0103 ra quy&#7871;t &#273;&#7883;nh
c&#432;&#7905;ng ch&#7871; kh&#7845;u tr&#7915; ti&#7873;n t&#7915; tài kho&#7843;n
t&#7841;i t&#7893; ch&#7913;c tín d&#7909;ng bi&#7871;t &#273;&#7875; áp d&#7909;ng
bi&#7879;n pháp c&#432;&#7905;ng ch&#7871; kê biên tài s&#7843;n theo quy
&#273;&#7883;nh.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>N&#7871;u trong tài kho&#7843;n c&#7911;a
cá nhân, t&#7893; ch&#7913;c c\u0323n s&#7889; d&#432; mà t&#7893; ch&#7913;c tín d&#7909;ng
không th&#7921;c hi&#7879;n vi&#7879;c trích chuy&#7875;n ti&#7873;n c&#7911;a
cá nhân, t&#7893; ch&#7913;c b&#7883; c&#432;&#7905;ng ch&#7871; theo quy&#7871;t
&#273;&#7883;nh c&#432;&#7905;ng ch&#7871; kh&#7845;u tr&#7915; c&#7911;a
ng&#432;&#7901;i có th&#7849;m quy&#7873;n th\u0301 t&#7893; ch&#7913;c tín d&#7909;ng
b&#7883; x&#7917; l\u01b0 theo quy &#273;&#7883;nh c&#7911;a pháp lu&#7853;t.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>- Th&#7911; t&#7909;c thu ti&#7873;n kh&#7845;u
tr&#7915;</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>Vi&#7879;c kh&#7845;u tr&#7915; m&#7897;t
ph&#7847;n l&#432;&#417;ng ho&#7863;c m&#7897;t ph&#7847;n thu nh&#7853;p, kh&#7845;u
tr&#7915; ti&#7873;n t&#7915; tài kho&#7843;n t&#7841;i t&#7893; ch&#7913;c tín
d&#7909;ng c&#7911;a cá nhân, t&#7893; ch&#7913;c b&#7883; c&#432;&#7905;ng ch&#7871;
&#273;&#432;&#7907;c th&#7921;c hi&#7879;n trên c&#417; s&#7903; các ch&#7913;ng
t&#7915; thu theo quy &#273;&#7883;nh hi&#7879;n hành. Ch&#7913;ng t&#7915; thu
s&#7917; d&#7909;ng &#273;&#7875; kh&#7845;u tr&#7915; ti&#7873;n
l&#432;&#417;ng ho&#7863;c thu nh&#7853;p &#273;&#432;&#7907;c g&#7917;i cho
các bên có liên quan.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>Sau khi thu ti&#7873;n, Kho b&#7841;c Nhà
n&#432;&#7899;c n&#417;i nh&#7853;n ti&#7873;n kh&#7845;u tr&#7915; có trách
nhi&#7879;m thông báo cho ng&#432;&#7901;i có th&#7849;m quy&#7873;n ra quy&#7871;t
&#273;&#7883;nh c&#432;&#7905;ng ch&#7871; bi&#7871;t.</span></p>

<h4><a name="_Toc131755362">3.2.3. Kê biên tài s&#7843;n có giá tr&#7883;
t&#432;&#417;ng &#7913;ng v&#7899;i s&#7889; ti&#7873;n ph&#7841;t &#273;&#7875;
bán &#273;&#7845;u giá</a></h4>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>- &#272;&#7889;i t&#432;&#7907;ng b&#7883;
áp d&#7909;ng bi&#7879;n</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>Cá nhân không &#273;&#432;&#7907;c h&#432;&#7903;ng
ti&#7873;n l&#432;&#417;ng, thu nh&#7853;p ho&#7863;c b&#7843;o hi&#7875;m x\u0103 h&#7897;i
t&#7841;i m&#7897;t c&#417; quan, &#273;&#417;n v&#7883;, t&#7893; ch&#7913;c
và không có tài kho&#7843;n ho&#7863;c s&#7889; ti&#7873;n g&#7917;i t&#7915;
tài kho&#7843;n t&#7841;i t&#7893; ch&#7913;c tín d&#7909;ng không &#273;&#7911;
&#273;&#7875; áp d&#7909;ng bi&#7879;n pháp kh&#7845;u tr&#7915; ti&#7873;n t&#7915;
tài kho&#7843;n.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>T&#7893; ch&#7913;c không có tài kho&#7843;n
ho&#7863;c s&#7889; ti&#7873;n g&#7917;i t&#7915; tài kho&#7843;n t&#7841;i t&#7893;
ch&#7913;c tín d&#7909;ng không &#273;&#7911; &#273;&#7875; áp d&#7909;ng bi&#7879;n
pháp kh&#7845;u tr&#7915; ti&#7873;n t&#7915; tài kho&#7843;n.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>Ch&#7881; &#273;&#432;&#7907;c kê biên tài
s&#7843;n c&#7911;a cá nhân, t&#7893; ch&#7913;c b&#7883; c&#432;&#7905;ng ch&#7871;
t&#432;&#417;ng &#7913;ng v&#7899;i s&#7889; ti&#7873;n &#273;\u0103 ghi trong quy&#7871;t
&#273;&#7883;nh x&#7917; ph&#7841;t, quy&#7871;t &#273;&#7883;nh áp d&#7909;ng
bi&#7879;n pháp kh&#7855;c ph&#7909;c h&#7853;u qu&#7843; và chi phí cho vi&#7879;c
t&#7893; ch&#7913;c thi hành c&#432;&#7905;ng ch&#7871;.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>- Nh&#7919;ng tài s&#7843;n không
&#273;&#432;&#7907;c kê biên</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>Nhà &#7903; duy nh&#7845;t c&#7911;a cá
nhân và gia &#273;\u0301nh ng&#432;&#7901;i b&#7883; c&#432;&#7905;ng ch&#7871; có
di&#7879;n tích t&#7889;i thi&#7875;u theo quy &#273;&#7883;nh c&#7911;a pháp
lu&#7853;t v&#7873; c&#432; trú.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>Thu&#7889;c ch&#7919;a b&#7879;nh,
l&#432;&#417;ng th&#7921;c, th&#7921;c ph&#7849;m ph&#7909;c v&#7909; nhu c&#7847;u
thi&#7871;t y&#7871;u cho cá nhân b&#7883; c&#432;&#7905;ng ch&#7871; và gia
&#273;\u0301nh h&#7885; s&#7917; d&#7909;ng.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>Công c&#7909; lao &#273;&#7897;ng, &#273;&#7891;
dùng sinh ho&#7841;t thông th&#432;&#7901;ng c&#7847;n thi&#7871;t cho cá nhân
b&#7883; c&#432;&#7905;ng ch&#7871; và gia &#273;\u0301nh h&#7885; s&#7917; d&#7909;ng.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>&#272;&#7891; dùng th&#7901; cúng; di v&#7853;t,
huân ch&#432;&#417;ng, huy ch&#432;&#417;ng, b&#7857;ng khen.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>Tài s&#7843;n ph&#7909;c v&#7909; qu&#7889;c
ph\u0323ng và an ninh.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>Tài s&#7843;n &#273;ang &#273;&#432;&#7907;c
c&#7847;m c&#7889;, th&#7871; ch&#7845;p h&#7907;p pháp.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>- Xác minh thông tin v&#7873; tài s&#7843;n
c&#7911;a &#273;&#7889;i t&#432;&#7907;ng b&#7883; c&#432;&#7905;ng ch&#7871;</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>Ng&#432;&#7901;i có th&#7849;m quy&#7873;n
ra quy&#7871;t &#273;&#7883;nh c&#432;&#7905;ng ch&#7871; có trách nhi&#7879;m
xác minh thông tin v&#7873; tài s&#7843;n c&#7911;a &#273;&#7889;i t&#432;&#7907;ng
b&#7883; c&#432;&#7905;ng ch&#7871;, &#273;i&#7873;u ki&#7879;n thi hành quy&#7871;t
&#273;&#7883;nh c&#432;&#7905;ng ch&#7871; kê biên tài s&#7843;n có giá tr&#7883;
t&#432;&#417;ng &#7913;ng v&#7899;i s&#7889; ti&#7873;n ph&#7841;t.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>C&#417; quan, &#273;&#417;n v&#7883;, t&#7893;
ch&#7913;c, cá nhân liên quan có trách nhi&#7879;m cung c&#7845;p thông tin v&#7873;
tài s&#7843;n c&#7911;a &#273;&#7889;i t&#432;&#7907;ng b&#7883; c&#432;&#7905;ng
ch&#7871; khi có yêu c&#7847;u c&#7911;a c&#417; quan ra quy&#7871;t &#273;&#7883;nh
c&#432;&#7905;ng ch&#7871;.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>- Quy&#7871;t &#273;&#7883;nh c&#432;&#7905;ng
ch&#7871; kê biên tài s&#7843;n</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>Quy&#7871;t &#273;&#7883;nh c&#432;&#7905;ng
ch&#7871; b&#7857;ng bi&#7879;n pháp kê biên tài s&#7843;n bao g&#7891;m nh&#7919;ng
n&#7897;i dung sau: s&#7889; quy&#7871;t &#273;&#7883;nh; ngày, tháng, n&#259;m
ra quy&#7871;t &#273;&#7883;nh; c&#259;n c&#7913; ra quy&#7871;t &#273;&#7883;nh;
h&#7885; tên, ch&#7913;c v&#7909;, &#273;&#417;n v&#7883; ng&#432;&#7901;i ra
quy&#7871;t &#273;&#7883;nh; h&#7885; tên, n&#417;i c&#432; trú, tr&#7909; s&#7903;
c&#7911;a cá nhân, t&#7893; ch&#7913;c b&#7883; kê biên tài s&#7843;n; s&#7889;
ti&#7873;n b&#7883; x&#7917; ph&#7841;t; &#273;&#7883;a &#273;i&#7875;m kê
biên; ch&#7919; k\u01b0 c&#7911;a ng&#432;&#7901;i ra quy&#7871;t &#273;&#7883;nh và
&#273;óng d&#7845;u c&#7911;a c&#417; quan ra quy&#7871;t &#273;&#7883;nh.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>Vi&#7879;c kê biên tài s&#7843;n ph&#7843;i
&#273;&#432;&#7907;c thông báo cho cá nhân, t&#7893; ch&#7913;c b&#7883; kê
biên, &#7910;y ban nhân dân c&#7845;p x\u0103 n&#417;i ng&#432;&#7901;i &#273;ó
c&#432; trú ho&#7863;c t&#7893; ch&#7913;c có tr&#7909; s&#7903; &#273;óng trên
&#273;&#7883;a bàn ho&#7863;c c&#417; quan n&#417;i ng&#432;&#7901;i &#273;ó
công tác tr&#432;&#7899;c khi ti&#7871;n hành c&#432;&#7905;ng ch&#7871; kê
biên 05 ngày làm vi&#7879;c, tr&#7915; tr&#432;&#7901;ng h&#7907;p vi&#7879;c
thông báo s&#7869; gây tr&#7903; ng&#7841;i cho vi&#7879;c ti&#7871;n hành kê
biên.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>- T&#7893; ch&#7913;c thi hành c&#432;&#7905;ng
ch&#7871; kê biên tài s&#7843;n</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>Vi&#7879;c kê biên tài s&#7843;n ph&#7843;i
th&#7921;c hi&#7879;n vào ban ngày, th&#7901;i gian t&#7915; 08 gi&#7901;
&#273;&#7871;n 17 gi&#7901;.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>Ng&#432;&#7901;i ra quy&#7871;t &#273;&#7883;nh
c&#432;&#7905;ng ch&#7871; ho&#7863;c ng&#432;&#7901;i &#273;&#432;&#7907;c
phân công th&#7921;c hi&#7879;n quy&#7871;t &#273;&#7883;nh c&#432;&#7905;ng ch&#7871;
ch&#7911; tr\u0301 th&#7921;c hi&#7879;n vi&#7879;c kê biên.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>Khi ti&#7871;n hành kê biên tài s&#7843;n
ph&#7843;i có m&#7863;t cá nhân b&#7883; c&#432;&#7905;ng ch&#7871; ho&#7863;c
ng&#432;&#7901;i thành niên có &#273;&#7847;y &#273;&#7911; n&#259;ng l&#7921;c
hành vi dân s&#7921; trong gia &#273;\u0301nh, &#273;&#7841;i di&#7879;n t&#7893; ch&#7913;c
b&#7883; kê biên tài s&#7843;n, &#273;&#7841;i di&#7879;n chính quy&#7873;n
&#273;&#7883;a ph&#432;&#417;ng và ng&#432;&#7901;i ch&#7913;ng ki&#7871;n.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>N&#7871;u cá nhân ph&#7843;i thi hành quy&#7871;t
&#273;&#7883;nh c&#432;&#7905;ng ch&#7871; ho&#7863;c ng&#432;&#7901;i thành
niên trong gia &#273;\u0301nh c&#7889; t\u0301nh v&#7855;ng m&#7863;t, th\u0301 v&#7851;n ti&#7871;n
hành kê biên tài s&#7843;n nh&#432;ng ph&#7843;i có &#273;&#7841;i di&#7879;n
chính quy&#7873;n &#273;&#7883;a ph&#432;&#417;ng và ng&#432;&#7901;i ch&#7913;ng
ki&#7871;n.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>Cá nhân, t&#7893; ch&#7913;c b&#7883;
c&#432;&#7905;ng ch&#7871; có quy&#7873;n &#273;&#7873; ngh&#7883; kê biên tài
s&#7843;n nào tr&#432;&#7899;c, ng&#432;&#7901;i &#273;&#432;&#7907;c giao ch&#7911;
tr\u0301 kê biên ph&#7843;i ch&#7845;p nh&#7853;n n&#7871;u xét th&#7845;y &#273;&#7873;
ngh&#7883; &#273;ó không &#7843;nh h&#432;&#7903;ng &#273;&#7871;n vi&#7879;c
c&#432;&#7905;ng ch&#7871;.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>N&#7871;u cá nhân, t&#7893; ch&#7913;c b&#7883;
c&#432;&#7905;ng ch&#7871; không &#273;&#7873; ngh&#7883; c&#7909; th&#7875; vi&#7879;c
kê biên tài s&#7843;n nào tr&#432;&#7899;c th\u0301 tài s&#7843;n thu&#7897;c s&#7903;
h&#7919;u riêng &#273;&#432;&#7907;c kê biên tr&#432;&#7899;c.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>Ch&#7881; kê biên nh&#7919;ng tài s&#7843;n
thu&#7897;c s&#7903; h&#7919;u chung c&#7911;a cá nhân b&#7883; c&#432;&#7905;ng
ch&#7871; v&#7899;i ng&#432;&#7901;i khác n&#7871;u cá nhân b&#7883; c&#432;&#7905;ng
ch&#7871; không có tài s&#7843;n riêng ho&#7863;c tài s&#7843;n riêng không
&#273;&#7911; &#273;&#7875; thi hành quy&#7871;t &#273;&#7883;nh c&#432;&#7905;ng
ch&#7871;. Tr&#432;&#7901;ng h&#7907;p tài s&#7843;n có tranh ch&#7845;p th\u0301 v&#7851;n
ti&#7871;n hành kê biên và gi&#7843;i thích cho nh&#7919;ng ng&#432;&#7901;i
cùng s&#7903; h&#7919;u tài s&#7843;n kê biên v&#7873; quy&#7873;n kh&#7903;i
ki&#7879;n theo th&#7911; t&#7909;c t&#7889; t&#7909;ng dân s&#7921;.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>C&#417; quan ti&#7871;n hành kê biên có
trách nhi&#7879;m thông báo công khai th&#7901;i gian, &#273;&#7883;a &#273;i&#7875;m
ti&#7871;n hành kê biên &#273;&#7875; các &#273;&#7891;ng s&#7903; h&#7919;u bi&#7871;t.
H&#7871;t th&#7901;i h&#7841;n 03 tháng, k&#7875; t&#7915; ngày kê biên mà
không có ng&#432;&#7901;i kh&#7903;i ki&#7879;n th\u0301 tài s&#7843;n kê biên
&#273;&#432;&#7907;c &#273;em bán &#273;&#7845;u giá theo quy &#273;&#7883;nh c&#7911;a
pháp lu&#7853;t v&#7873; bán &#273;&#7845;u giá tài s&#7843;n.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>- Biên b&#7843;n kê biên tài s&#7843;n</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>Vi&#7879;c kê biên tài s&#7843;n ph&#7843;i
&#273;&#432;&#7907;c l&#7853;p biên b&#7843;n. Trong biên b&#7843;n ghi r\u01a1: Th&#7901;i
gian, &#273;&#7883;a &#273;i&#7875;m ti&#7871;n hành kê biên tài s&#7843;n; h&#7885;
tên, ch&#7913;c v&#7909; ng&#432;&#7901;i ch&#7911; tr\u0301 th&#7921;c hi&#7879;n
vi&#7879;c kê biên; ng&#432;&#7901;i &#273;&#7841;i di&#7879;n cho t&#7893; ch&#7913;c
b&#7883; kê biên tài s&#7843;n, cá nhân có tài s&#7843;n b&#7883; kê biên ho&#7863;c
ng&#432;&#7901;i &#273;&#7841;i di&#7879;n h&#7907;p pháp cho h&#7885;;
ng&#432;&#7901;i ch&#7913;ng ki&#7871;n; &#273;&#7841;i di&#7879;n chính quy&#7873;n
&#273;&#7883;a ph&#432;&#417;ng (ho&#7863;c c&#417; quan c&#7911;a cá nhân b&#7883;
c&#432;&#7905;ng ch&#7871;); mô t&#7843; tên g&#7885;i, t\u0301nh tr&#7841;ng,
&#273;&#7863;c &#273;i&#7875;m t&#7915;ng tài s&#7843;n b&#7883; kê biên.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>Ng&#432;&#7901;i ch&#7911; tr\u0301 th&#7921;c
hi&#7879;n vi&#7879;c kê biên, ng&#432;&#7901;i &#273;&#7841;i di&#7879;n cho t&#7893;
ch&#7913;c b&#7883; kê biên tài s&#7843;n, cá nhân có tài s&#7843;n b&#7883; kê
biên ho&#7863;c ng&#432;&#7901;i &#273;&#7841;i di&#7879;n h&#7907;p pháp cho h&#7885;,
ng&#432;&#7901;i ch&#7913;ng ki&#7871;n, &#273;&#7841;i di&#7879;n chính quy&#7873;n
&#273;&#7883;a ph&#432;&#417;ng (ho&#7863;c c&#417; quan c&#7911;a cá nhân b&#7883;
c&#432;&#7905;ng ch&#7871;) k\u01b0 tên vào biên b&#7843;n. Biên b&#7843;n kê biên
tài s&#7843;n có nhi&#7873;u t&#7901; th\u0301 ph&#7843;i k\u01b0 vào t&#7915;ng t&#7901;
biên b&#7843;n. Trong tr&#432;&#7901;ng h&#7907;p có ng&#432;&#7901;i v&#7855;ng
m&#7863;t ho&#7863;c có m&#7863;t mà t&#7915; ch&#7889;i k\u01b0 biên b&#7843;n th\u0301
vi&#7879;c &#273;ó ph&#7843;i ghi vào biên b&#7843;n và nêu r\u01a1 l\u01b0 do.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>Biên b&#7843;n kê biên &#273;&#432;&#7907;c
l&#7853;p thành 02 b&#7843;n, c&#417; quan ra quy&#7871;t &#273;&#7883;nh
c&#432;&#7905;ng ch&#7871; gi&#7919; 01 b&#7843;n, 01 b&#7843;n giao cho cá
nhân ho&#7863;c &#273;&#7841;i di&#7879;n t&#7893; ch&#7913;c b&#7883; kê biên
ngay sau khi hoàn thành vi&#7879;c l&#7853;p biên b&#7843;n.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>- Giao b&#7843;o qu&#7843;n tài s&#7843;n
kê biên</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>Ng&#432;&#7901;i ch&#7911; tr\u0301 th&#7921;c
hi&#7879;n kê biên l&#7921;a ch&#7885;n m&#7897;t trong các h\u0301nh th&#7913;c sau
&#273;ây &#273;&#7875; b&#7843;o qu&#7843;n tài s&#7843;n kê biên: Giao cho
ng&#432;&#7901;i b&#7883; c&#432;&#7905;ng ch&#7871;, thân nhân c&#7911;a
ng&#432;&#7901;i b&#7883; c&#432;&#7905;ng ch&#7871; ho&#7863;c ng&#432;&#7901;i
&#273;ang qu&#7843;n l\u01b0, s&#7917; d&#7909;ng tài s&#7843;n &#273;ó b&#7843;o qu&#7843;n;
Giao cho m&#7897;t trong nh&#7919;ng &#273;&#7891;ng s&#7903; h&#7919;u chung b&#7843;o
qu&#7843;n n&#7871;u tài s&#7843;n &#273;ó thu&#7897;c s&#7903; h&#7919;u
chung; Giao cho t&#7893; ch&#7913;c, cá nhân có &#273;i&#7873;u ki&#7879;n b&#7843;o
qu&#7843;n.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>&#272;&#7889;i v&#7899;i tài s&#7843;n là
vàng, b&#7841;c, kim khí qu\u01b0, &#273;á qu\u01b0, ngo&#7841;i t&#7879; th\u0301 t&#7841;m
giao cho Kho b&#7841;c Nhà n&#432;&#7899;c qu&#7843;n l\u01b0; &#273;&#7889;i v&#7899;i
các tài s&#7843;n nh&#432; v&#7853;t li&#7879;u n&#7893; công nghi&#7879;p,
công c&#7909; h&#7895; tr&#7907;, v&#7853;t có giá tr&#7883; l&#7883;ch s&#7917;,
v&#259;n hóa, b&#7843;o v&#7853;t qu&#7889;c gia, c&#7893; v&#7853;t, hàng lâm
s&#7843;n qu\u01b0 hi&#7871;m th\u0301 t&#7841;m giao cho c&#417; quan qu&#7843;n l\u01b0 nhà
n&#432;&#7899;c chuyên ngành &#273;&#7875; qu&#7843;n l\u01b0.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>Khi giao b&#7843;o qu&#7843;n tài s&#7843;n
kê biên, ng&#432;&#7901;i ch&#7911; tr\u0301 th&#7921;c hi&#7879;n kê biên ph&#7843;i
l&#7853;p biên b&#7843;n. Trong biên b&#7843;n ghi r\u01a1: Th&#7901;i gian bàn giao
b&#7843;o qu&#7843;n; h&#7885; và tên ng&#432;&#7901;i ch&#7911; tr\u0301 th&#7921;c
hi&#7879;n quy&#7871;t &#273;&#7883;nh c&#432;&#7905;ng ch&#7871;, cá nhân,
&#273;&#7841;i di&#7879;n t&#7893; ch&#7913;c b&#7883; c&#432;&#7905;ng ch&#7871;,
ng&#432;&#7901;i &#273;&#432;&#7907;c giao b&#7843;o qu&#7843;n tài s&#7843;n,
ng&#432;&#7901;i ch&#7913;ng ki&#7871;n vi&#7879;c bàn gia o; s&#7889; l&#432;&#7907;ng,
t\u0301nh tr&#7841;ng (ch&#7845;t l&#432;&#7907;ng) tài s&#7843;n; quy&#7873;n và
ngh&#297;a v&#7909; c&#7911;a ng&#432;&#7901;i &#273;&#432;&#7907;c giao b&#7843;o
qu&#7843;n tài s&#7843;n.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>Ng&#432;&#7901;i ch&#7911; tr\u0301 th&#7921;c
hi&#7879;n kê biên, ng&#432;&#7901;i &#273;&#432;&#7907;c giao b&#7843;o qu&#7843;n
tài s&#7843;n, cá nhân, &#273;&#7841;i di&#7879;n t&#7893; ch&#7913;c b&#7883;
c&#432;&#7905;ng ch&#7871;, ng&#432;&#7901;i ch&#7913;ng ki&#7871;n k\u01b0 tên vào
biên b&#7843;n. Biên b&#7843;n có nhi&#7873;u t&#7901; th\u0301 ph&#7843;i k\u01b0 vào t&#7915;ng
t&#7901; biên b&#7843;n. Trong tr&#432;&#7901;ng h&#7907;p có ng&#432;&#7901;i
v&#7855;ng m&#7863;t ho&#7863;c có m&#7863;t mà t&#7915; ch&#7889;i k\u01b0 biên b&#7843;n
th\u0301 vi&#7879;c &#273;ó ph&#7843;i ghi vào biên b&#7843;n và nêu r\u01a1 l\u01b0 do.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>Biên b&#7843;n &#273;&#432;&#7907;c giao
cho ng&#432;&#7901;i &#273;&#432;&#7907;c giao b&#7843;o qu&#7843;n tài s&#7843;n,
cá nhân, &#273;&#7841;i di&#7879;n t&#7893; ch&#7913;c b&#7883; c&#432;&#7905;ng
ch&#7871;, ng&#432;&#7901;i ch&#7913;ng ki&#7871;n và ng&#432;&#7901;i ch&#7911;
tr\u0301 th&#7921;c hi&#7879;n kê biên m&#7895;i ng&#432;&#7901;i gi&#7919; 01 b&#7843;n.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>Ng&#432;&#7901;i &#273;&#432;&#7907;c giao
b&#7843;o qu&#7843;n tài s&#7843;n &#273;&#432;&#7907;c thanh toán chi phí th&#7921;c
t&#7871;, h&#7907;p l\u01b0 &#273;&#7875; b&#7843;o qu&#7843;n tài s&#7843;n, tr&#7915;
nh&#7919;ng ng&#432;&#7901;i quy &#273;&#7883;nh t&#7841;i &#272;i&#7875;m a
Kho&#7843;n 1 &#272;i&#7873;u này.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>Ng&#432;&#7901;i &#273;&#432;&#7907;c giao
b&#7843;o qu&#7843;n tài s&#7843;n gây h&#432; h&#7887;ng, &#273;ánh tráo, làm
m&#7845;t ho&#7863;c h&#7911;y ho&#7841;i tài s&#7843;n th\u0301 ph&#7843;i ch&#7883;u
trách nhi&#7879;m b&#7891;i th&#432;&#7901;ng và tùy theo tính ch&#7845;t, m&#7913;c
&#273;&#7897; vi ph&#7841;m s&#7869; b&#7883; x&#7917; l\u01b0 theo quy &#273;&#7883;nh
c&#7911;a pháp lu&#7853;t.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>- &#272;&#7883;nh giá tài s&#7843;n kê
biên</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>Vi&#7879;c &#273;&#7883;nh giá tài s&#7843;n
&#273;\u0103 kê biên &#273;&#432;&#7907;c ti&#7871;n hành t&#7841;i nhà c&#7911;a cá
nhân ho&#7863;c tr&#7909; s&#7903; c&#7911;a t&#7893; ch&#7913;c b&#7883; kê
biên ho&#7863;c n&#417;i l&#432;u gi&#7919; tài s&#7843;n b&#7883; kê biên, tr&#7915;
tr&#432;&#7901;ng h&#7907;p ph&#7843;i thành l&#7853;p H&#7897;i &#273;&#7891;ng
&#273;&#7883;nh giá tài s&#7843;n.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>Tài s&#7843;n &#273;\u0103 kê biên &#273;&#432;&#7907;c
&#273;&#7883;nh giá theo s&#7921; th&#7887;a thu&#7853;n gi&#7919;a ng&#432;&#7901;i
ch&#7911; tr\u0301 th&#7921;c hi&#7879;n quy&#7871;t &#273;&#7883;nh c&#432;&#7905;ng
ch&#7871; v&#7899;i &#273;&#7841;i di&#7879;n t&#7893; ch&#7913;c ho&#7863;c cá
nhân b&#7883; c&#432;&#7905;ng ch&#7871; và ch&#7911; s&#7903; h&#7919;u chung
trong tr&#432;&#7901;ng h&#7907;p kê biên tài s&#7843;n chung. Th&#7901;i h&#7841;n
&#273;&#7875; các bên th&#7887;a thu&#7853;n v&#7873; giá không quá 05 ngày làm
vi&#7879;c, k&#7875; t&#7915; ngày tài s&#7843;n b&#7883; kê biên.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>Tr&#432;&#7901;ng h&#7907;p các bên không
th&#7887;a thu&#7853;n &#273;&#432;&#7907;c v&#7873; giá th\u0301 trong th&#7901;i h&#7841;n
không quá 10 ngày làm vi&#7879;c, k&#7875; t&#7915; ngày tài s&#7843;n b&#7883;
kê biên, ng&#432;&#7901;i &#273;\u0103 ra quy&#7871;t &#273;&#7883;nh c&#432;&#7905;ng
ch&#7871; ra quy&#7871;t &#273;&#7883;nh thành l&#7853;p H&#7897;i &#273;&#7891;ng
&#273;&#7883;nh giá tài s&#7843;n. H&#7897;i &#273;&#7891;ng &#273;&#7883;nh
giá tài s&#7843;n g&#7891;m có ng&#432;&#7901;i &#273;\u0103 ra quy&#7871;t &#273;&#7883;nh
c&#432;&#7905;ng ch&#7871; là Ch&#7911; t&#7883;ch H&#7897;i &#273;&#7891;ng,
&#273;&#7841;i di&#7879;n c&#417; quan tài chính cùng c&#7845;p và &#273;&#7841;i
di&#7879;n c&#417; quan chuyên môn có liên quan.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>Trong th&#7901;i h&#7841;n 07 ngày làm vi&#7879;c,
k&#7875; t&#7915; ngày &#273;&#432;&#7907;c thành l&#7853;p, H&#7897;i &#273;&#7891;ng
&#273;&#7883;nh giá tài s&#7843;n ph&#7843;i ti&#7871;n hành vi&#7879;c &#273;&#7883;nh
giá. Vi&#7879;c &#273;&#7883;nh giá tài s&#7843;n d&#7921;a trên giá th&#7883;
tr&#432;&#7901;ng t&#7841;i th&#7901;i &#273;i&#7875;m &#273;&#7883;nh giá.
&#272;&#7889;i v&#7899;i tài s&#7843;n mà Nhà n&#432;&#7899;c th&#7889;ng nh&#7845;t
qu&#7843;n l\u01b0 giá th\u0301 vi&#7879;c &#273;&#7883;nh giá d&#7921;a trên c&#417; s&#7903;
giá tài s&#7843;n do Nhà n&#432;&#7899;c quy &#273;&#7883;nh.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>H&#7897;i &#273;&#7891;ng &#273;&#7883;nh
giá tài s&#7843;n làm vi&#7879;c theo nguyên t&#7855;c t&#7853;p th&#7875;. Cu&#7897;c
h&#7885;p &#273;&#7883;nh giá tài s&#7843;n c&#7911;a H&#7897;i &#273;&#7891;ng
do Ch&#7911; t&#7883;ch H&#7897;i &#273;&#7891;ng tri&#7879;u t&#7853;p và ph&#7843;i
có ít nh&#7845;t 2/3 t&#7893;ng s&#7889; thành viên c&#7911;a H&#7897;i &#273;&#7891;ng
tham d&#7921;. Trong cu&#7897;c h&#7885;p &#273;&#7883;nh giá, m&#7895;i thành
viên c&#7911;a H&#7897;i &#273;&#7891;ng &#273;&#7883;nh giá tài s&#7843;n phát
bi&#7875;u \u01b0 ki&#7871;n c&#7911;a m\u0301nh v&#7873; giá tr&#7883; c&#7911;a tài s&#7843;n.
Các quy&#7871;t &#273;&#7883;nh v&#7873; giá tài s&#7843;n ph&#7843;i
&#273;&#432;&#7907;c quá n&#7917;a s&#7889; thành viên H&#7897;i &#273;&#7891;ng
tán thành. Tr&#432;&#7901;ng h&#7907;p bi&#7875;u quy&#7871;t ngang nhau th\u0301
quy&#7871;t &#273;&#7883;nh theo bên có bi&#7875;u quy&#7871;t c&#7911;a Ch&#7911;
t&#7883;ch H&#7897;i &#273;&#7891;ng ho&#7863;c ng&#432;&#7901;i &#273;&#432;&#7907;c
&#7911;y quy&#7873;n &#273;i&#7873;u hành cu&#7897;c h&#7885;p &#273;&#7883;nh
giá tài s&#7843;n. Cá nhân b&#7883; kê biên ho&#7863;c &#273;&#7841;i di&#7879;n
t&#7893; ch&#7913;c có tài s&#7843;n b&#7883; kê biên &#273;&#432;&#7907;c tham
gia \u01b0 ki&#7871;n vào vi&#7879;c &#273;&#7883;nh giá, nh&#432;ng quy&#7873;n quy&#7871;t
&#273;&#7883;nh giá thu&#7897;c H&#7897;i &#273;&#7891;ng &#273;&#7883;nh giá
tài s&#7843;n.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>Vi&#7879;c &#273;&#7883;nh giá tài s&#7843;n
ph&#7843;i &#273;&#432;&#7907;c l&#7853;p thành biên b&#7843;n, trong &#273;ó
ghi r\u01a1 th&#7901;i gian, &#273;&#7883;a &#273;i&#7875;m ti&#7871;n hành &#273;&#7883;nh
giá, thành ph&#7847;n nh&#7919;ng ng&#432;&#7901;i tham gia &#273;&#7883;nh
giá, tên và tr&#7883; giá tài s&#7843;n &#273;\u0103 &#273;&#432;&#7907;c &#273;&#7883;nh
giá, ch&#7919; k\u01b0 c&#7911;a các thành viên tham gia &#273;&#7883;nh giá và c&#7911;a
ch&#7911; tài s&#7843;n.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>- Chuy&#7875;n giao tài s&#7843;n &#273;\u0103
kê biên &#273;&#7875; bán &#273;&#7845;u giá</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>&#272;&#7889;i v&#7899;i tài s&#7843;n b&#7883;
kê biên &#273;&#7875; bán &#273;&#7845;u giá, giá kh&#7903;i &#273;i&#7875;m
&#273;&#432;&#7907;c xác &#273;&#7883;nh theo quy &#273;&#7883;nh t&#7841;i
&#272;i&#7873;u 25 Ngh&#7883; &#273;&#7883;nh này. Trong th&#7901;i h&#7841;n
15 ngày làm vi&#7879;c, k&#7875; t&#7915; ngày tài s&#7843;n b&#7883; kê biên,
ng&#432;&#7901;i &#273;\u0103 ra quy&#7871;t &#273;&#7883;nh c&#432;&#7905;ng ch&#7871;
k\u01b0 h&#7907;p &#273;&#7891;ng bán &#273;&#7845;u giá v&#7899;i t&#7893; ch&#7913;c
bán &#273;&#7845;u giá chuyên nghi&#7879;p trên &#273;&#7883;a bàn t&#7881;nh,
thành ph&#7889; tr&#7921;c thu&#7897;c Trung &#432;&#417;ng n&#417;i có tài s&#7843;n
b&#7883; kê biên &#273;&#7875; bán &#273;&#7845;u giá; tr&#432;&#7901;ng h&#7907;p
không k\u01b0 &#273;&#432;&#7907;c h&#7907;p &#273;&#7891;ng bán &#273;&#7845;u giá
v&#7899;i t&#7893; ch&#7913;c bán &#273;&#7845;u giá chuyên nghi&#7879;p th\u0301
thành l&#7853;p H&#7897;i &#273;&#7891;ng bán &#273;&#7845;u giá tài s&#7843;n.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>Vi&#7879;c bán &#273;&#7845;u giá tài s&#7843;n
b&#7883; kê biên &#273;&#432;&#7907;c th&#7921;c hi&#7879;n theo quy &#273;&#7883;nh
c&#7911;a pháp lu&#7853;t v&#7873; bán &#273;&#7845;u giá tài s&#7843;n.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>Sau khi &#273;\u0103 k\u01b0 h&#7907;p &#273;&#7891;ng
bán &#273;&#7845;u giá tài s&#7843;n, ng&#432;&#7901;i ch&#7911; tr\u0301 th&#7921;c
hi&#7879;n kê biên ti&#7871;n hành chuy&#7875;n giao tài s&#7843;n &#273;\u0103 kê
biên &#273;&#7875; bán &#273;&#7845;u giá. Vi&#7879;c chuy&#7875;n giao ph&#7843;i
&#273;&#432;&#7907;c l&#7853;p thành biên b&#7843;n, trong &#273;ó ghi r\u01a1: Th&#7901;i
gian bàn giao; ng&#432;&#7901;i bàn giao, ng&#432;&#7901;i nh&#7853;n; ch&#7919;
k\u01b0 c&#7911;a ng&#432;&#7901;i giao, ng&#432;&#7901;i nh&#7853;n; s&#7889;
l&#432;&#7907;ng, t\u0301nh tr&#7841;ng tài s&#7843;n. H&#7891; s&#417; bàn giao tài
s&#7843;n kê biên cho c&#417; quan có trách nhi&#7879;m bán &#273;&#7845;u giá
bao g&#7891;m: Quy&#7871;t &#273;&#7883;nh c&#432;&#7905;ng ch&#7871; kê biên;
các gi&#7845;y t&#7901;, tài li&#7879;u có liên quan &#273;&#7871;n quy&#7873;n
s&#7903; h&#7919;u, quy&#7873;n s&#7917; d&#7909;ng h&#7907;p pháp (n&#7871;u
có); v&#259;n b&#7843;n &#273;&#7883;nh giá tài s&#7843;n và biên b&#7843;n bàn
giao tài s&#7843;n &#273;ó.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>Trong tr&#432;&#7901;ng h&#7907;p tài s&#7843;n
kê biên là hàng hóa c&#7891;ng k&#7873;nh ho&#7863;c có s&#7889; l&#432;&#7907;ng
l&#7899;n mà c&#417; quan có trách nhi&#7879;m bán &#273;&#7845;u giá không có
n&#417;i c&#7845;t gi&#7919; tài s&#7843;n th\u0301 sau khi th&#7921;c hi&#7879;n
xong th&#7911; t&#7909;c chuy&#7875;n giao có th&#7875; k\u01b0 h&#7907;p &#273;&#7891;ng
b&#7843;o qu&#7843;n tài s&#7843;n v&#7899;i n&#417;i &#273;ang gi&#7919; tài s&#7843;n
&#273;ó. Chi phí cho vi&#7879;c th&#7921;c hi&#7879;n h&#7907;p &#273;&#7891;ng
b&#7843;o qu&#7843;n &#273;&#432;&#7907;c thanh toán t&#7915; s&#7889; ti&#7873;n
bán &#273;&#7845;u giá tài s&#7843;n thu &#273;&#432;&#7907;c sau khi bán
&#273;&#7845;u giá.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>&#272;&#7889;i v&#7899;i tài s&#7843;n thu&#7897;c
s&#7903; h&#7919;u chung, khi bán &#273;&#7845;u giá th\u0301 &#432;u tiên bán cho
ng&#432;&#7901;i &#273;&#7891;ng s&#7903; h&#7919;u tr&#432;&#7899;c.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>Tr&#432;&#7901;ng h&#7907;p s&#7889; ti&#7873;n
bán &#273;&#7845;u giá tài s&#7843;n nhi&#7873;u h&#417;n s&#7889; ti&#7873;n
ghi trong quy&#7871;t &#273;&#7883;nh x&#7917; ph&#7841;t và chi phí cho vi&#7879;c
c&#432;&#7905;ng ch&#7871; th\u0301 trong th&#7901;i h&#7841;n 10 ngày làm vi&#7879;c
k&#7875; t&#7915; ngày bán &#273;&#7845;u giá, c&#417; quan thi hành bi&#7879;n
pháp c&#432;&#7905;ng ch&#7871; kê biên tài s&#7843;n bán &#273;&#7845;u giá
làm th&#7911; t&#7909;c tr&#7843; l&#7841;i ph&#7847;n chênh l&#7879;ch cho cá
nhân, t&#7893; ch&#7913;c b&#7883; c&#432;&#7905;ng ch&#7871;.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>- Chuy&#7875;n giao quy&#7873;n s&#7903; h&#7919;u
tài s&#7843;n</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>Ng&#432;&#7901;i mua tài s&#7843;n kê biên
&#273;&#432;&#7907;c pháp lu&#7853;t công nh&#7853;n và b&#7843;o v&#7879; quy&#7873;n
s&#7903; h&#7919;u &#273;&#7889;i v&#7899;i tài s&#7843;n &#273;ó.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>C&#417; quan nhà n&#432;&#7899;c có th&#7849;m
quy&#7873;n có trách nhi&#7879;m th&#7921;c hi&#7879;n th&#7911; t&#7909;c chuy&#7875;n
quy&#7873;n s&#7903; h&#7919;u cho ng&#432;&#7901;i mua theo quy &#273;&#7883;nh
c&#7911;a pháp lu&#7853;t.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>H&#7891; s&#417; chuy&#7875;n quy&#7873;n
s&#7903; h&#7919;u g&#7891;m có: B&#7843;n sao quy&#7871;t &#273;&#7883;nh
c&#432;&#7905;ng ch&#7871; b&#7857;ng bi&#7879;n pháp kê biên tài s&#7843;n
&#273;&#7875; bán &#273;&#7845;u giá; Biên b&#7843;n bán &#273;&#7845;u giá tài
s&#7843;n; Các gi&#7845;y t&#7901; khác liên quan &#273;&#7871;n tài s&#7843;n
(n&#7871;u có).</span></p>

<h4><a name="_Toc131755363">3.2.4. Thu ti&#7873;n, tài s&#7843;n khác c&#7911;a
&#273;&#7889;i t&#432;&#7907;ng b&#7883; c&#432;&#7905;ng ch&#7871; thi hành
quy&#7871;t &#273;&#7883;nh x&#7917; ph&#7841;t vi ph&#7841;m hành chính do cá
nhân, t&#7893; ch&#7913;c khác &#273;ang gi&#7919; trong tr&#432;&#7901;ng h&#7907;p
cá nhân, t&#7893; ch&#7913;c sau khi vi ph&#7841;m c&#7889; t\u0301nh t&#7849;u tán
tài s&#7843;n</a></h4>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>- &#272;i&#7873;u ki&#7879;n áp d&#7909;ng
bi&#7879;n pháp c&#432;&#7905;ng ch&#7871; thu ti&#7873;n, tài s&#7843;n c&#7911;a
&#273;&#7889;i t&#432;&#7907;ng b&#7883; c&#432;&#7905;ng ch&#7871; do cá nhân,
t&#7893; ch&#7913;c khác &#273;ang gi&#7919; trong tr&#432;&#7901;ng h&#7907;p
cá nhân, t&#7893; ch&#7913;c sau khi vi ph&#7841;m c&#7889; t\u0301nh t&#7849;u tán
tài s&#7843;n</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>Ng&#432;&#7901;i có th&#7849;m quy&#7873;n
ra quy&#7871;t &#273;&#7883;nh c&#432;&#7905;ng ch&#7871; không áp d&#7909;ng
&#273;&#432;&#7907;c ho&#7863;c &#273;\u0103 áp d&#7909;ng các bi&#7879;n pháp
c&#432;&#7905;ng ch&#7871; quy &#273;&#7883;nh t&#7841;i M&#7909;c 1, 2 và 3
Ch&#432;&#417;ng II Ngh&#7883; &#273;&#7883;nh s&#7889; 166/N&#272;-CP
nh&#432;ng v&#7851;n ch&#432;a thu &#273;&#7911; s&#7889; ti&#7873;n ph&#7841;t,
ch&#432;a thanh toán ho&#7863;c thanh toán ch&#432;a &#273;&#7911; chi phí
c&#432;&#7905;ng ch&#7871;.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>Ng&#432;&#7901;i có th&#7849;m quy&#7873;n
ra quy&#7871;t &#273;&#7883;nh c&#432;&#7905;ng ch&#7871; có c&#259;n c&#7913;
xác &#273;&#7883;nh bên th&#7913; ba &#273;ang gi&#7919; ti&#7873;n, tài s&#7843;n
c&#7911;a &#273;&#7889;i t&#432;&#7907;ng b&#7883; c&#432;&#7905;ng ch&#7871;.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>- Xác minh thông tin v&#7873; ti&#7873;n,
tài s&#7843;n c&#7911;a &#273;&#7889;i t&#432;&#7907;ng b&#7883; c&#432;&#7905;ng
ch&#7871; do bên th&#7913; ba &#273;ang gi&#7919;</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>Ng&#432;&#7901;i có th&#7849;m quy&#7873;n
ra quy&#7871;t &#273;&#7883;nh c&#432;&#7905;ng ch&#7871; có trách nhi&#7879;m
xác minh thông tin v&#7873; ti&#7873;n, tài s&#7843;n c&#7911;a &#273;&#7889;i
t&#432;&#7907;ng b&#7883; c&#432;&#7905;ng ch&#7871;; &#273;i&#7873;u ki&#7879;n
thi hành quy&#7871;t &#273;&#7883;nh c&#432;&#7905;ng ch&#7871; thu ti&#7873;n,
tài s&#7843;n do bên th&#7913; ba &#273;ang gi&#7919; và ch&#7913;ng minh
&#273;&#432;&#7907;c hành vi c&#7889; t\u0301nh t&#7849;u tán ti&#7873;n, tài s&#7843;n
c&#7911;a &#273;&#7889;i t&#432;&#7907;ng b&#7883; c&#432;&#7905;ng ch&#7871;
sau khi vi ph&#7841;m.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>C&#417; quan, &#273;&#417;n v&#7883;, t&#7893;
ch&#7913;c, cá nhân liên quan có trách nhi&#7879;m cung c&#7845;p thông tin v&#7873;
ti&#7873;n, tài s&#7843;n c&#7911;a &#273;&#7889;i t&#432;&#7907;ng b&#7883;
c&#432;&#7905;ng ch&#7871; và hành vi t&#7849;u tán c&#7911;a &#273;&#7889;i
t&#432;&#7907;ng b&#7883; c&#432;&#7905;ng ch&#7871; khi có yêu c&#7847;u c&#7911;a
c&#417; quan ra quy&#7871;t &#273;&#7883;nh c&#432;&#7905;ng ch&#7871;.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>- Trách nhi&#7879;m c&#7911;a bên th&#7913;
ba &#273;ang gi&#7919; ti&#7873;n, tài s&#7843;n c&#7911;a &#273;&#7889;i
t&#432;&#7907;ng b&#7883; c&#432;&#7905;ng ch&#7871;</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>Cung c&#7845;p cho c&#417; quan có th&#7849;m
quy&#7873;n ra quy&#7871;t &#273;&#7883;nh c&#432;&#7905;ng ch&#7871; thông tin
v&#7873; s&#7889; ti&#7873;n, tài s&#7843;n &#273;ang gi&#7919; c&#7911;a
&#273;&#7889;i t&#432;&#7907;ng c&#432;&#7905;ng ch&#7871; khi có yêu c&#7847;u.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>Khi nh&#7853;n &#273;&#432;&#7907;c
v&#259;n b&#7843;n yêu c&#7847;u c&#7911;a c&#417; quan có th&#7849;m quy&#7873;n
ra quy&#7871;t &#273;&#7883;nh c&#432;&#7905;ng ch&#7871;, không &#273;&#432;&#7907;c
chuy&#7875;n tr&#7843; ti&#7873;n, tài s&#7843;n cho &#273;&#7889;i t&#432;&#7907;ng
b&#7883; c&#432;&#7905;ng ch&#7871; cho &#273;&#7871;n khi th&#7921;c hi&#7879;n
n&#7897;p ti&#7873;n vào ngân sách nhà n&#432;&#7899;c ho&#7863;c chuy&#7875;n
giao tài s&#7843;n cho c&#417; quan có th&#7849;m quy&#7873;n ra quy&#7871;t
&#273;&#7883;nh c&#432;&#7905;ng ch&#7871; &#273;&#7875; làm th&#7911; t&#7909;c
bán &#273;&#7845;u giá.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>Tr&#432;&#7901;ng h&#7907;p bên th&#7913;
ba không th&#7921;c hi&#7879;n &#273;&#432;&#7907;c yêu c&#7847;u c&#7911;a
c&#417; quan có th&#7849;m quy&#7873;n ra quy&#7871;t &#273;&#7883;nh c&#432;&#7905;ng
ch&#7871; ho&#7863;c t&#7849;u tán ti&#7873;n, tài s&#7843;n &#273;ang gi&#7919;
c&#7911;a &#273;&#7889;i t&#432;&#7907;ng b&#7883; c&#432;&#7905;ng ch&#7871;
th\u0301 b&#7883; x&#7917; l\u01b0 theo quy &#273;&#7883;nh c&#7911;a pháp lu&#7853;t.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>- Quy&#7871;t &#273;&#7883;nh c&#432;&#7905;ng
ch&#7871; thu ti&#7873;n, tài s&#7843;n c&#7911;a &#273;&#7889;i t&#432;&#7907;ng
b&#7883; c&#432;&#7905;ng ch&#7871; do bên th&#7913; ba &#273;ang gi&#7919;
trong tr&#432;&#7901;ng h&#7907;p cá nhân, t&#7893; ch&#7913;c sau khi vi ph&#7841;m
c&#7889; t\u0301nh t&#7849;u tán tài s&#7843;n</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>Quy&#7871;t &#273;&#7883;nh c&#432;&#7905;ng
ch&#7871; thu ti&#7873;n, tài s&#7843;n c&#7911;a &#273;&#7889;i t&#432;&#7907;ng
b&#7883; c&#432;&#7905;ng ch&#7871; do bên th&#7913; ba &#273;ang gi&#7919;
trong tr&#432;&#7901;ng h&#7907;p cá nhân, t&#7893; ch&#7913;c sau khi vi ph&#7841;m
c&#7889; t\u0301nh t&#7849;u tán tài s&#7843;n bao g&#7891;m nh&#7919;ng n&#7897;i
dung sau: S&#7889; quy&#7871;t &#273;&#7883;nh; ngày, tháng, n&#259;m ra quy&#7871;t
&#273;&#7883;nh; c&#259;n c&#7913; ra quy&#7871;t &#273;&#7883;nh; h&#7885;
tên, ch&#7913;c v&#7909;, &#273;&#417;n v&#7883; ng&#432;&#7901;i ra quy&#7871;t
&#273;&#7883;nh; h&#7885; tên, &#273;&#7883;a ch&#7881; c&#7911;a cá nhân, t&#7893;
ch&#7913;c b&#7883; c&#432;&#7905;ng ch&#7871;; h&#7885; tên, &#273;&#7883;a ch&#7881;
c&#7911;a cá nhân, t&#7893; ch&#7913;c &#273;ang gi&#7919; ti&#7873;n, tài s&#7843;n;
s&#7889; ti&#7873;n, tài s&#7843;n b&#7883; thu; ch&#7919; k\u01b0 c&#7911;a
ng&#432;&#7901;i ra quy&#7871;t &#273;&#7883;nh và &#273;óng d&#7845;u c&#7911;a
c&#417; quan ra quy&#7871;t &#273;&#7883;nh.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>- T&#7893; ch&#7913;c thi hành c&#432;&#7905;ng
ch&#7871; thu ti&#7873;n, tài s&#7843;n c&#7911;a &#273;&#7889;i t&#432;&#7907;ng
b&#7883; c&#432;&#7905;ng ch&#7871; do bên th&#7913; ba &#273;ang gi&#7919;
trong tr&#432;&#7901;ng h&#7907;p cá nhân, t&#7893; ch&#7913;c sau khi vi ph&#7841;m
c&#7889; t\u0301nh t&#7849;u tán tài s&#7843;n</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
