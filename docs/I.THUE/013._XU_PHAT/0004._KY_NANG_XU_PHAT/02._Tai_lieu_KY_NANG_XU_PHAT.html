ch&#432;a thành niên t&#7915; &#273;&#7911; 14 tu&#7893;i &#273;&#7871;n
d&#432;&#7899;i 16 tu&#7893;i th&#7921;c hi&#7879;n. C&#7843;nh cáo
&#273;&#432;&#7907;c quy&#7871;t &#273;&#7883;nh b&#7857;ng v&#259;n b&#7843;n.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>- Ph&#7841;t ti&#7873;n: Là h\u0301nh th&#7913;c
x&#7917; ph&#7841;t chính, &#273;&#432;&#7907;c quy &#273;&#7883;nh t&#7841;i
&#272;i&#7873;u 23 Lu&#7853;t X&#7917; l\u01b0 vi ph&#7841;m hành chính. Ph&#7841;t
ti&#7873;n &#273;&#432;&#7907;c áp d&#7909;ng &#273;&#7889;i v&#7899;i cá nhân,
t&#7893; ch&#7913;c vi ph&#7841;m hành chính và không thu&#7897;c tr&#432;&#7901;ng
h&#7907;p b&#7883; x&#7917; ph&#7841;t c&#7843;nh cáo. M&#7913;c ph&#7841;t ti&#7873;n
trong x&#7917; ph&#7841;t vi ph&#7841;m hành chính t&#7915; 50.000 &#273;&#7891;ng
&#273;&#7871;n 1.000.000.000 &#273;&#7891;ng &#273;&#7889;i v&#7899;i cá nhân,
t&#7915; 100.000 &#273;&#7891;ng &#273;&#7871;n 2.000.000.000 &#273;&#7891;ng
&#273;&#7889;i v&#7899;i t&#7893; ch&#7913;c. &#272;&#7889;i v&#7899;i khu v&#7921;c
n&#7897;i thành c&#7911;a thành ph&#7889; tr&#7921;c thu&#7897;c Trung
&#432;&#417;ng th\u0301 m&#7913;c ph&#7841;t ti&#7873;n có th&#7875; cao h&#417;n,
nh&#432;ng t&#7889;i &#273;a không quá 02 l&#7847;n m&#7913;c ph&#7841;t chung
áp d&#7909;ng &#273;&#7889;i v&#7899;i cùng hành vi vi ph&#7841;m trong các
l&#297;nh v&#7921;c giao thông &#273;&#432;&#7901;ng b&#7897;; b&#7843;o v&#7879;
môi tr&#432;&#7901;ng; an ninh tr&#7853;t t&#7921;, an toàn x\u0103 h&#7897;i.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>C&#259;n c&#7913; vào quy &#273;&#7883;nh
c&#7911;a Lu&#7853;t X&#7917; l\u01b0 vi ph&#7841;m hành chính v&#7873; h\u0301nh th&#7913;c
ph&#7841;t ti&#7873;n, Ngh&#7883; &#273;&#7883;nh c&#7911;a Chính ph&#7911; s&#7869;
quy &#273;&#7883;nh c&#7909; th&#7875; vi&#7879;c áp d&#7909;ng m&#7913;c ti&#7873;n
ph&#7841;t &#273;&#7889;i v&#7899;i t&#7915;ng hành vi vi ph&#7841;m hành chính
trong t&#7915;ng l&#297;nh v&#7921;c qu&#7843;n l\u01b0 nhà n&#432;&#7899;c.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>- T&#432;&#7899;c quy&#7873;n s&#7917; d&#7909;ng
gi&#7845;y phép, ch&#7913;ng ch&#7881; hành ngh&#7873; có th&#7901;i h&#7841;n
ho&#7863;c &#273;\u0301nh ch&#7881; ho&#7841;t &#273;&#7897;ng có th&#7901;i h&#7841;n:</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>+ T&#432;&#7899;c quy&#7873;n s&#7917; d&#7909;ng
gi&#7845;y phép, ch&#7913;ng ch&#7881; hành ngh&#7873; có th&#7901;i h&#7841;n
là h\u0301nh th&#7913;c x&#7917; ph&#7841;t &#273;&#432;&#7907;c áp d&#7909;ng
&#273;&#7889;i v&#7899;i cá nhân, t&#7893; ch&#7913;c vi ph&#7841;m nghiêm tr&#7885;ng
các ho&#7841;t &#273;&#7897;ng &#273;&#432;&#7907;c ghi trong gi&#7845;y phép,
ch&#7913;ng ch&#7881; hành ngh&#7873;. Trong th&#7901;i gian b&#7883; t&#432;&#7899;c
quy&#7873;n s&#7917; d&#7909;ng gi&#7845;y phép, ch&#7913;ng ch&#7881; hành ngh&#7873;,
cá nhân, t&#7893; ch&#7913;c không &#273;&#432;&#7907;c ti&#7871;n hành các ho&#7841;t
&#273;&#7897;ng ghi trong gi&#7845;y phép, ch&#7913;ng ch&#7881; hành ngh&#7873;.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>+ &#272;\u0301nh ch&#7881; ho&#7841;t &#273;&#7897;ng
có th&#7901;i h&#7841;n là h\u0301nh th&#7913;c x&#7917; ph&#7841;t &#273;&#432;&#7907;c
áp d&#7909;ng &#273;&#7889;i v&#7899;i cá nhân, t&#7893; ch&#7913;c vi ph&#7841;m
hành chính khi th&#7921;c hi&#7879;n nh&#7919;ng ho&#7841;t &#273;&#7897;ng s&#7843;n
xu&#7845;t, kinh doanh, d&#7883;ch v&#7909;. gây h&#7853;u qu&#7843; nghiêm tr&#7885;ng
ho&#7863;c có kh&#7843; n&#259;ng th&#7921;c t&#7871; gây h&#7853;u qu&#7843;
nghiêm tr&#7885;ng &#273;&#7889;i v&#7899;i tính m&#7841;ng, s&#7913;c kh&#7887;e
con ng&#432;&#7901;i, môi tr&#432;&#7901;ng và tr&#7853;t t&#7921; an toàn x\u0103 h&#7897;i.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>- T&#7883;ch thu tang v&#7853;t vi ph&#7841;m
hành chính, ph&#432;&#417;ng ti&#7879;n &#273;&#432;&#7907;c s&#7917; d&#7909;ng
&#273;&#7875; vi ph&#7841;m hành chính: Là vi&#7879;c ng&#432;&#7901;i có th&#7849;m
quy&#7873;n quy&#7871;t &#273;&#7883;nh áp d&#7909;ng bi&#7879;n pháp t&#7883;ch
thu &#273;&#7875; sung vào công qu&#7929; Nhà n&#432;&#7899;c. Tài s&#7843;n, v&#7853;t
d&#7909;ng, hàng hóa, ti&#7873;n b&#7841;c, ph&#432;&#417;ng ti&#7879;n... dùng
&#273;&#7875; th&#7921;c hi&#7879;n hành vi vi ph&#7841;m hành chính ho&#7863;c
do vi ph&#7841;m hành chính mà có, &#273;&#432;&#7907;c áp d&#7909;ng &#273;&#7889;i
v&#7899;i vi ph&#7841;m hành chính nghiêm tr&#7885;ng do l&#7895;i c&#7889; \u01b0 c&#7911;a
cá nhân, t&#7893; ch&#7913;c. Khi áp d&#7909;ng h\u0301nh th&#7913;c này, c&#7847;n
l&#432;u \u01b0 &#273;&#7889;i v&#7899;i v&#7853;t, ti&#7873;n b&#7841;c,
ph&#432;&#417;ng ti&#7879;n &#273;&#432;&#7907;c s&#7917; d&#7909;ng &#273;&#7875;
vi ph&#7841;m thu&#7897;c các h\u0301nh th&#7913;c s&#7903; h&#7919;u h&#7907;p pháp
b&#7883; t&#7893; ch&#7913;c, cá nhân vi ph&#7841;m hành chính chi&#7871;m
&#273;o&#7841;t m&#7897;t cách b&#7845;t h&#7907;p pháp ho&#7863;c s&#7917; d&#7909;ng
trái phép th\u0301 không &#273;&#432;&#7907;c t&#7883;ch thu mà ph&#7843;i tr&#7843;
l&#7841;i cho ch&#7911; s&#7903; h&#7919;u h&#7907;p pháp. Th&#7911; t&#7909;c,
th&#7849;m quy&#7873;n t&#7883;ch thu tang v&#7853;t, ph&#432;&#417;ng ti&#7879;n
vi ph&#7841;m hành chính &#273;&#432;&#7907;c pháp lu&#7853;t quy &#273;&#7883;nh
c&#7909; th&#7875; (&#272;i&#7873;u 81, Lu&#7853;t X&#7917; l\u01b0 vi ph&#7841;m
hành chính).</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>Tang v&#7853;t, ph&#432;&#417;ng ti&#7879;n
vi ph&#7841;m hành chính b&#7883; t&#7883;ch thu ph&#7843;i &#273;&#432;&#7907;c
qu&#7843;n l\u01b0 và b&#7843;o qu&#7843;n theo quy &#273;&#7883;nh c&#7911;a Chính
ph&#7911;.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>Tang v&#7853;t, ph&#432;&#417;ng ti&#7879;n
vi ph&#7841;m hành chính &#273;\u0103 có quy&#7871;t &#273;&#7883;nh t&#7883;ch thu
&#273;&#432;&#7907;c x&#7917; l\u01b0 theo quy &#273;&#7883;nh c&#7911;a pháp lu&#7853;t
v&#7873; qu&#7843;n l\u01b0, s&#7917; d&#7909;ng tài s&#7843;n công.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>- Tr&#7909;c xu&#7845;t: Tr&#7909;c xu&#7845;t
là h\u0301nh th&#7913;c x&#7917; ph&#7841;t bu&#7897;c ng&#432;&#7901;i n&#432;&#7899;c
ngoài có hành vi vi ph&#7841;m hành chính t&#7841;i Vi&#7879;t Nam ph&#7843;i r&#7901;i
kh&#7887;i l\u0103nh th&#7893; N&#432;&#7899;c C&#7897;ng hoà x\u0103 h&#7897;i ch&#7911;
ngh&#297;a Vi&#7879;t Nam.</span></p>

<h4><a name="_Toc131755298">2.6.2. Các bi&#7879;n pháp kh&#7855;c ph&#7909;c h&#7853;u
qu&#7843;</a></h4>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>Trong nhi&#7873;u tr&#432;&#7901;ng h&#7907;p,
ngoài vi&#7879;c b&#7883; áp d&#7909;ng các bi&#7879;n pháp x&#7917; ph&#7841;t
vi ph&#7841;m hành chính nh&#432; &#273;\u0103 nêu trên, t&#7893; ch&#7913;c cá nhân
vi ph&#7841;m hành chính c\u0323n c ó th&#7875; b&#7883; áp d&#7909;ng các bi&#7879;n
pháp kh&#7855;c ph&#7909;c h&#7853;u qu&#7843; do vi ph&#7841;m hành chính gây
ra. V&#7873; m&#7863;t b&#7843;n ch&#7845;t, các bi&#7879;n pháp nh&#7857;m m&#7909;c
&#273;ích kh&#7855;c ph&#7909;c nh&#7919;ng h&#7853;u qu&#7843; do vi ph&#7841;m
hành chính &#273;\u0103 &#273;&#7875; l&#7841;i trên th&#7921;c t&#7871;. Các bi&#7879;n
pháp kh&#7855;c ph&#7909;c h&#7853;u qu&#7843; bao g&#7891;m:</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>- Bu&#7897;c khôi ph&#7909;c l&#7841;i
t\u0301nh tr&#7841;ng ban &#273;&#7847;u: Cá nhân, t&#7893; ch&#7913;c vi ph&#7841;m
hành chính ph&#7843;i khôi ph&#7909;c l&#7841;i t\u0301nh tr&#7841;ng ban &#273;&#7847;u
&#273;\u0103 b&#7883; thay &#273;&#7893;i do vi ph&#7841;m hành chính c&#7911;a m\u0301nh
gây ra; n&#7871;u cá nhân, t&#7893; ch&#7913;c vi ph&#7841;m hành chính không t&#7921;
nguy&#7879;n th&#7921;c hi&#7879;n th\u0301 b&#7883; c&#432;&#7905;ng ch&#7871; th&#7921;c
hi&#7879;n.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>- Bu&#7897;c tháo d&#7905; công tr\u0301nh, ph&#7847;n
công tr\u0301nh xây d&#7921;ng không có gi&#7845;y phép ho&#7863;c xây d&#7921;ng
không &#273;úng v&#7899;i gi&#7845;y phép: Cá nhân, t&#7893; ch&#7913;c vi ph&#7841;m
hành chính ph&#7843;i tháo d&#7905; công tr\u0301nh, ph&#7847;n công tr\u0301nh xây d&#7921;ng
không có gi&#7845;y phép ho&#7863;c xây d&#7921;ng không &#273;úng v&#7899;i gi&#7845;y
phép; n&#7871;u cá nhân, t&#7893; ch&#7913;c vi ph&#7841;m hành chính không t&#7921;
nguy&#7879;n th&#7921;c hi&#7879;n th\u0301 b&#7883; c&#432;&#7905;ng ch&#7871; th&#7921;c
hi&#7879;n.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>- Bu&#7897;c th&#7921;c hi&#7879;n bi&#7879;n
pháp kh&#7855;c ph&#7909;c t\u0301nh tr&#7841;ng ô nhi&#7877;m môi tr&#432;&#7901;ng,
lây lan d&#7883;ch b&#7879;nh: Cá nhân, t&#7893; ch&#7913;c vi ph&#7841;m hành
chính ph&#7843;i th&#7921;c hi&#7879;n bi&#7879;n pháp &#273;&#7875; kh&#7855;c
ph&#7909;c t\u0301nh tr&#7841;ng ô nhi&#7877;m môi tr&#432;&#7901;ng, lây lan d&#7883;ch
b&#7879;nh; n&#7871;u cá nhân, t&#7893; ch&#7913;c vi ph&#7841;m hành chính
không t&#7921; nguy&#7879;n th&#7921;c hi&#7879;n th\u0301 b&#7883; c&#432;&#7905;ng
ch&#7871; th&#7921;c hi&#7879;n.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>- Bu&#7897;c &#273;&#432;a ra kh&#7887;i
l\u0103nh th&#7893; N&#432;&#7899;c C&#7897;ng h\u0323a x\u0103 h&#7897;i ch&#7911; ngh&#297;a
Vi&#7879;t Nam ho&#7863;c tái xu&#7845;t hàng hoá, v&#7853;t ph&#7849;m,
ph&#432;&#417;ng ti&#7879;n: Cá nhân, t&#7893; ch&#7913;c vi ph&#7841;m hành chính
ph&#7843;i &#273;&#432;a ra kh&#7887;i l\u0103nh th&#7893; N&#432;&#7899;c C&#7897;ng
h\u0323a x\u0103 h&#7897;i ch&#7911; ngh&#297;a Vi&#7879;t Nam ho&#7863;c tái xu&#7845;t
hàng hoá, v&#7853;t ph&#7849;m, ph&#432;&#417;ng ti&#7879;n &#273;&#432;&#7907;c
&#273;&#432;a vào l\u0103nh th&#7893; N&#432;&#7899;c C&#7897;ng h\u0323a x\u0103 h&#7897;i ch&#7911;
ngh&#297;a Vi&#7879;t Nam, nh&#7853;p kh&#7849;u trái v&#7899;i quy &#273;&#7883;nh
c&#7911;a pháp lu&#7853;t ho&#7863;c &#273;&#432;&#7907;c t&#7841;m nh&#7853;p,
tái xu&#7845;t nh&#432;ng không tái xu&#7845;t theo &#273;úng quy &#273;&#7883;nh
c&#7911;a pháp lu&#7853;t.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>Bi&#7879;n pháp kh&#7855;c ph&#7909;c h&#7853;u
qu&#7843; này c&#361;ng &#273;&#432;&#7907;c áp d&#7909;ng &#273;&#7889;i v&#7899;i
hàng hóa nh&#7853;p kh&#7849;u, quá c&#7843;nh xâm ph&#7841;m quy&#7873;n s&#7903;
h&#7919;u trí tu&#7879;, hàng hóa gi&#7843; m&#7841;o quy&#7873;n s&#7903; h&#7919;u
trí tu&#7879;, ph&#432;&#417;ng ti&#7879;n, nguyên li&#7879;u, v&#7853;t li&#7879;u
nh&#7853;p kh&#7849;u &#273;&#432;&#7907;c s&#7917; d&#7909;ng ch&#7911; y&#7871;u
&#273;&#7875; s&#7843;n xu&#7845;t, kinh doanh hàng hóa gi&#7843; m&#7841;o v&#7873;
s&#7903; h&#7919;u trí tu&#7879; sau khi &#273;\u0103 lo&#7841;i b&#7887; y&#7871;u
t&#7889; vi ph&#7841;m; n&#7871;u cá nhân, t&#7893; ch&#7913;c vi ph&#7841;m
hành chính không t&#7921; nguy&#7879;n th&#7921;c hi&#7879;n th\u0301 b&#7883;
c&#432;&#7905;ng ch&#7871; th&#7921;c hi&#7879;n.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>- Bu&#7897;c tiêu h&#7911;y hàng hóa, v&#7853;t
ph&#7849;m gây h&#7841;i cho s&#7913;c kh&#7887;e con ng&#432;&#7901;i, v&#7853;t
nuôi, cây tr&#7891;ng và môi tr&#432;&#7901;ng, v&#259;n hóa ph&#7849;m có n&#7897;i
dung &#273;&#7897;c h&#7841;i: Cá nhân, t&#7893; ch&#7913;c vi ph&#7841;m hành
chính ph&#7843;i tiêu h&#7911;y hàng hóa, v&#7853;t ph&#7849;m gây h&#7841;i
cho s&#7913;c kho&#7867; con ng&#432;&#7901;i, v&#7853;t nuôi, cây tr&#7891;ng
và môi tr&#432;&#7901;ng, v&#259;n hoá ph&#7849;m có n&#7897;i dung &#273;&#7897;c
h&#7841;i ho&#7863;c tang v&#7853;t khác thu&#7897;c &#273;&#7889;i t&#432;&#7907;ng
b&#7883; tiêu h&#7911;y theo quy &#273;&#7883;nh c&#7911;a pháp lu&#7853;t; n&#7871;u
cá nhân, t&#7893; ch&#7913;c vi ph&#7841;m hành chính không t&#7921; nguy&#7879;n
th&#7921;c hi&#7879;n th\u0301 b&#7883; c&#432;&#7905;ng ch&#7871; th&#7921;c hi&#7879;n.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>- Bu&#7897;c c&#7843;i chính thông tin sai
s&#7921; th&#7853;t ho&#7863;c gây nh&#7847;m l&#7851;n: Cá nhân, t&#7893; ch&#7913;c
vi ph&#7841;m hành chính ph&#7843;i c&#7843;i chính thông tin sai s&#7921; th&#7853;t
ho&#7863;c gây nh&#7847;m l&#7851;n &#273;\u0103 &#273;&#432;&#7907;c công b&#7889;,
&#273;&#432;a tin trên chính ph&#432;&#417;ng ti&#7879;n thông tin &#273;&#7841;i
chúng, trang thông tin &#273;i&#7879;n t&#7917; &#273;\u0103 công b&#7889;,
&#273;&#432;a tin; n&#7871;u cá nhân, t&#7893; ch&#7913;c vi ph&#7841;m hành
chính không t&#7921; nguy&#7879;n th&#7921;c hi&#7879;n th\u0301 b&#7883; c&#432;&#7905;ng
ch&#7871; th&#7921;c hi&#7879;n.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>- Bu&#7897;c lo&#7841;i b&#7887; y&#7871;u
t&#7889; vi ph&#7841;m trên hàng hoá, bao b\u0301 hàng hóa, ph&#432;&#417;ng ti&#7879;n
kinh doanh, v&#7853;t ph&#7849;m: Cá nhân, t&#7893; ch&#7913;c s&#7843;n xu&#7845;t,
kinh doanh hàng hóa ho&#7863;c s&#7917; d&#7909;ng ph&#432;&#417;ng ti&#7879;n
kinh doanh, v&#7853;t ph&#7849;m ch&#7913;a y&#7871;u t&#7889; vi ph&#7841;m
trên hàng hóa, bao b\u0301 hàng hóa, ph&#432;&#417;ng ti&#7879;n kinh doanh, v&#7853;t
ph&#7849;m th\u0301 ph&#7843;i lo&#7841;i b&#7887; các y&#7871;u t&#7889; vi ph&#7841;m
&#273;ó; n&#7871;u cá nhân, t&#7893; ch&#7913;c vi ph&#7841;m hành chính không
t&#7921; nguy&#7879;n th&#7921;c hi&#7879;n th\u0301 b&#7883; c&#432;&#7905;ng ch&#7871;
th&#7921;c hi&#7879;n.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>- Bu&#7897;c thu h&#7891;i s&#7843;n ph&#7849;m,
hàng hóa không b&#7843;o &#273;&#7843;m ch&#7845;t l&#432;&#7907;ng: Cá nhân, t&#7893;
ch&#7913;c s&#7843;n xu&#7845;t, kinh doanh s&#7843;n ph&#7849;m, hàng hóa
không b&#7843;o &#273;&#7843;m ch&#7845;t l&#432;&#7907;ng &#273;\u0103
&#273;&#259;ng k\u01b0 ho&#7863;c công b&#7889; và hàng hóa khác không b&#7843;o
&#273;&#7843;m ch&#7845;t l&#432;&#7907;ng, &#273;i&#7873;u ki&#7879;n l&#432;u
thông th\u0301 ph&#7843;i thu h&#7891;i các s&#7843;n ph&#7849;m, hàng hóa vi ph&#7841;m
&#273;ang l&#432;u thông trên th&#7883; tr&#432;&#7901;ng; n&#7871;u cá nhân, t&#7893;
ch&#7913;c vi ph&#7841;m hành chính không t&#7921; nguy&#7879;n th&#7921;c hi&#7879;n
th\u0301 b&#7883; c&#432;&#7905;ng ch&#7871; th&#7921;c hi&#7879;n.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>- Bu&#7897;c n&#7897;p l&#7841;i s&#7889;
l&#7907;i b&#7845;t h&#7907;p pháp có &#273;&#432;&#7907;c do th&#7921;c hi&#7879;n
vi ph&#7841;m hành chính ho&#7863;c bu&#7897;c n&#7897;p l&#7841;i s&#7889; ti&#7873;n
b&#7857;ng tr&#7883; giá tang v&#7853;t, ph&#432;&#417;ng ti&#7879;n vi ph&#7841;m
hành chính &#273;\u0103 b&#7883; tiêu th&#7909;, t&#7849;u tán, tiêu h&#7911;y trái
quy &#273;&#7883;nh c&#7911;a pháp lu&#7853;t: Cá nhân, t&#7893; ch&#7913;c vi
ph&#7841;m ph&#7843;i n&#7897;p l&#7841;i s&#7889; l&#7907;i b&#7845;t h&#7907;p
pháp là ti&#7873;n, tài s&#7843;n, gi&#7845;y t&#7901; và v&#7853;t có giá có
&#273;&#432;&#7907;c t&#7915; vi ph&#7841;m hành chính mà cá nhân, t&#7893; ch&#7913;c
&#273;ó &#273;\u0103 th&#7921;c hi&#7879;n &#273;&#7875; sung vào ngân sách nhà
n&#432;&#7899;c ho&#7863;c hoàn tr&#7843; cho &#273;&#7889;i t&#432;&#7907;ng b&#7883;
chi&#7871;m &#273;o&#7841;t; ph&#7843;i n&#7897;p l&#7841;i s&#7889; ti&#7873;n
b&#7857;ng v&#7899;i giá tr&#7883; tang v&#7853;t, ph&#432;&#417;ng ti&#7879;n
vi ph&#7841;m hành chính n&#7871;u tang v&#7853;t, ph&#432;&#417;ng ti&#7879;n
&#273;ó &#273;\u0103 b&#7883; tiêu th&#7909;, t&#7849;u tán, tiêu h&#7911;y trái quy
&#273;&#7883;nh c&#7911;a pháp lu&#7853;t; n&#7871;u cá nhân, t&#7893; ch&#7913;c
vi ph&#7841;m hành chính không t&#7921; nguy&#7879;n th&#7921;c hi&#7879;n th\u0301
b&#7883; c&#432;&#7905;ng ch&#7871; th&#7921;c hi&#7879;n.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>- Các bi&#7879;n pháp kh&#7855;c ph&#7909;c
h&#7853;u qu&#7843; khác do Chính ph&#7911; quy &#273;&#7883;nh. Trên c&#417; s&#7903;
quy &#273;&#7883;nh này c&#7911;a Lu&#7853;t, trong t&#7915;ng Ngh&#7883;
&#273;&#7883;nh c&#7911;a Chính ph&#7911; quy &#273;&#7883;nh v&#7873; x&#7917;
ph&#7841;t vi ph&#7841;m hành chính &#7903; t&#7915;ng l&#297;nh v&#7921;c,
Chính ph&#7911; s&#7869; quy &#273;&#7883;nh v&#7873; các bi&#7879;n pháp kh&#7855;c
ph&#7909;c h&#7853;u qu&#7843; phù h&#7907;p v&#7899;i yêu c&#7847;u qu&#7843;n
l\u01b0 nhà n&#432;&#7899;c &#7903; t&#7915;ng l&#297;nh v&#7921;c c&#7909; th&#7875;.</span></p>

<h2><a name="_Toc131755299">II. NGUYÊN T&#7854;C X&#7916; PH&#7840;T HÀNH CHÍNH</a></h2>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>Các nguyên t&#7855;c x&#7917; ph&#7841;t
vi ph&#7841;m hành chính là nh&#7919;ng t&#432; t&#432;&#7903;ng ch&#7881;
&#273;&#7841;o vi&#7879;c ti&#7871;n hành x&#7917; ph&#7841;t vi ph&#7841;m
hành chính &#273;&#432;&#7907;c pháp l\u01b0 hoá nh&#7857;m b&#7843;o &#273;&#7843;m
&#273;&#7841;t &#273;&#432;&#7907;c m&#7909;c &#273;ích, yêu c&#7847;u c&#7911;a
x&#7917; l\u01b0 vi ph&#7841;m hành chính, &#273;ó là m&#7885;i vi ph&#7841;m hành
chính ph&#7843;i &#273;&#432;&#7907;c x&#7917; l\u01b0 kiên quy&#7871;t, tri&#7879;t
&#273;&#7875;, x&#7917; l\u01b0 &#273;úng ng&#432;&#7901;i, &#273;úng vi ph&#7841;m,
&#273;úng pháp lu&#7853;t, góp ph&#7847;n gi&#7919; v&#7919;ng an ninh, tr&#7853;t
t&#7921;, an toàn x\u0103 h&#7897;i, b&#7843;o v&#7879; l&#7907;i ích c&#7911;a Nhà
n&#432;&#7899;c, quy&#7873;n, l&#7907;i ích h&#7907;p pháp c&#7911;a cá nhân, t&#7893;
ch&#7913;c, t&#259;ng c&#432;&#7901;ng pháp ch&#7871; x\u0103 h&#7897;i ch&#7911;
ngh&#297;a, nâng cao hi&#7879;u l&#7921;c qu&#7843;n l\u01b0 c&#7911;a Nhà n&#432;&#7899;c.
Khi ti&#7871;n hành ho&#7841;t &#273;&#7897;ng x&#7917; ph&#7841;t vi ph&#7841;m
hành chính, ng&#432;&#7901;i có th&#7849;m quy&#7873;n x&#7917; ph&#7841;t vi
ph&#7841;m hành chính ph&#7843;i tuân th&#7911; nh&#7919;ng nguyên t&#7855;c
&#273;&#432;&#7907;c quy &#273;&#7883;nh trong Lu&#7853;t X&#7917; l\u01b0 vi ph&#7841;m
hành chính, bao g&#7891;m:</span></p>

<h3><a name="_Toc131755300">1. Nguyên t&#7855;c 1: M&#7885;i vi ph&#7841;m hành
chính ph&#7843;i &#273;&#432;&#7907;c phát hi&#7879;n, ng&#259;n ch&#7863;n k&#7883;p
th&#7901;i và ph&#7843;i b&#7883; x&#7917; l\u01b0 nghiêm minh, m&#7885;i h&#7853;u
qu&#7843; do vi ph&#7841;m hành chính gây ra ph&#7843;i &#273;&#432;&#7907;c kh&#7855;c
ph&#7909;c theo &#273;úng quy &#273;&#7883;nh c&#7911;a pháp lu&#7853;t.</a></h3>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>&#272;ây là nguyên t&#7855;c chung mang
tính ch&#7911; &#273;&#7841;o. Hành vi vi ph&#7841;m hành chính tuy không ph&#7843;i
là t&#7897;i ph&#7841;m, nh&#432;ng h&#7853;u qu&#7843; mà nó gây ra cho x\u0103 h&#7897;i
là &#273;áng k&#7875; (do s&#7889; l&#432;&#7907;ng x&#7843;y ra nhi&#7873;u)
và tác &#273;&#7897;ng x&#7845;u &#273;&#7871;n hi&#7879;u l&#7921;c qu&#7843;n
l\u01b0 nhà n&#432;&#7899;c trên t&#7845;t c&#7843; các l&#297;nh v&#7921;c
(nh&#432; l&#297;nh v&#7921;c qu&#7843;n l\u01b0 &#273;&#7845;t &#273;ai, v&#259;n
hóa giáo d&#7909;c, môi tr&#432;&#7901;ng...). V\u0301 v&#7853;y vi&#7879;c phát hi&#7879;n
và ng&#259;n ch&#7863;n k&#7883;p th&#7901;i m&#7885;i vi ph&#7841;m hành chính
c&#361;ng nh&#432; ph&#7843;i x&#7917; l\u01b0 nghiêm minh nh&#7919;ng vi ph&#7841;m
&#273;ó là m&#7897;t &#273;\u0323i h&#7887;i khách quan và ph&#7843;i th&#7921;c hi&#7879;n
m&#7897;t cách tri&#7879;t &#273;&#7875;. Vi&#7879;c ch&#7853;m tr&#7877; phát
hi&#7879;n, ng&#259;n ch&#7863;n ho&#7863;c ch&#7853;m x&#7917; l\u01b0 hành vi vi
ph&#7841;m hành chính s&#7869; d&#7851;n &#273;&#7871;n kh&#7843; n&#259;ng
hành vi vi ph&#7841;m gây ra h&#7853;u qu&#7843; l&#7899;n h&#417;n, nghiêm tr&#7885;ng
h&#417;n. V\u0301 v&#7853;y, tính k&#7883;p th&#7901;i trong vi&#7879;c phát hi&#7879;n,
ng&#259;n ch&#7863;n vi ph&#7841;m hành chính là m&#7897;t yêu c&#7847;u quan tr&#7885;ng.
Theo &#273;ó, ng&#432;&#7901;i có th&#7849;m quy&#7873;n x&#7917; l\u01b0 vi ph&#7841;m
hành chính ph&#7843;i nêu cao tinh th&#7847;n trách nhi&#7879;m, không
&#273;&#432;&#7907;c l&#417; là &#273;&#7875; x&#7843;y ra t\u0301nh tr&#7841;ng ch&#7853;m
tr&#7877;, kéo dài t\u0301nh tr&#7841;ng vi ph&#7841;m hành chính mà không
&#273;&#432;&#7907;c ng&#259;n ch&#7863;n, x&#7917; l\u01b0. Tr&#432;&#7901;ng h&#7907;p
ng&#432;&#7901;i có th&#7849;m quy&#7873;n trong ph&#7841;m vi th&#7849;m quy&#7873;n
không phát hi&#7879;n &#273;&#432;&#7907;c, phát hi&#7879;n mà không x&#7917;
l\u01b0, x&#7917; l\u01b0 mà không k&#7883;p th&#7901;i, không nghiêm minh,... &#273;&#7873;u
là vi ph&#7841;m, tùy tính ch&#7845;t và m&#7913;c &#273;&#7897;, ph&#7843;i ch&#7883;u
trách nhi&#7879;m pháp l\u01b0, n&#7871;u gây thi&#7879;t h&#7841;i, ph&#7843;i b&#7891;i
th&#432;&#7901;ng theo quy &#273;&#7883;nh c&#7911;a pháp lu&#7853;t.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>X&#7917; l\u01b0 nghiêm minh m&#7885;i vi ph&#7841;m
hành chính là th&#7875; hi&#7879;n s&#7921; kiên quy&#7871;t và minh b&#7841;ch
trong x&#7917; l\u01b0 vi ph&#7841;m hành chính. Ch&#7881; có x&#7917; l\u01b0 nghiêm
minh m&#7885;i vi ph&#7841;m hành chính th\u0301 pháp ch&#7871; XHCN m&#7899;i
&#273;&#432;&#7907;c t&#259;ng c&#432;&#7901;ng, tính r&#259;n &#273;e, giáo d&#7909;c
trong x&#7917; l\u01b0 vi ph&#7841;m hành chính m&#7899;i có tác d&#7909;ng và
nh&#432; v&#7853;y m&#7899;i có th&#7875; nâng cao hi&#7879;u l&#7921;c qu&#7843;n
l\u01b0 nhà n&#432;&#7899;c.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>&#272;&#7891;ng th&#7901;i v&#7899;i vi&#7879;c
x&#7917; l\u01b0 nghiêm minh m&#7885;i vi ph&#7841;m hành chính th\u0301 vi&#7879;c x&#7917;
l\u01b0 h&#7853;u qu&#7843; do hành vi vi ph&#7841;m hành chính gây ra c&#361;ng
&#273;\u0323i h&#7887;i ph&#7843;i &#273;&#432;&#7907;c gi&#7843;i quy&#7871;t tri&#7879;t
&#273;&#7875; và &#273;úng pháp lu&#7853;t. Ngh&#297;a là ph&#7843;i bu&#7897;c
&#273;&#7889;i t&#432;&#7907;ng vi ph&#7841;m hành chính ph&#7843;i kh&#7855;c
ph&#7909;c hoàn toàn nh&#7919;ng h&#7853;u qu&#7843; x&#7845;u do hành vi vi ph&#7841;m
hành chính gây ra theo nh&#7919;ng bi&#7879;n pháp &#273;\u0103 &#273;&#432;&#7907;c
lu&#7853;t quy &#273;&#7883;nh. Nh&#7857;m nâng cao hi&#7879;u qu&#7843; ho&#7841;t
&#273;&#7897;ng x&#7917; l\u01b0 vi ph&#7841;m hành chính, &#273;&#7891;ng th&#7901;i
&#273;&#7873; cao tính nghiêm minh c&#7911;a pháp lu&#7853;t.</span></p>

<h3><a name="_Toc131755301">2. Nguyên t&#7855;c 2: Vi&#7879;c x&#7917; ph&#7841;t
vi ph&#7841;m hành chính &#273;&#432;&#7907;c ti&#7871;n hành nhanh chóng, công
khai, khách quan, &#273;úng th&#7849;m quy&#7873;n, b&#7843;o &#273;&#7843;m
công b&#7857;ng, &#273;úng quy &#273;&#7883;nh c&#7911;a pháp lu&#7853;t.</a></h3>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>Nguyên t&#7855;c này &#273;&#7873; ra nh&#7919;ng
yêu c&#7847;u c&#417; b&#7843;n nh&#7845;t ph&#7843;i th&#7921;c hi&#7879;n khi
ti&#7871;n hành x&#7917; ph&#7841;t vi ph&#7841;m hành chính, &#273;ó là:
&#272;&#7843;m b&#7843;o nhanh chóng, công khai, khách quan, &#273;úng th&#7849;m
quy&#7873;n, b&#7843;o &#273;&#7843;m công b&#7857;ng, &#273;úng quy &#273;&#7883;nh
c&#7911;a pháp lu&#7853;t. Vi&#7879;c &#273;&#7873; ra các yêu c&#7847;u trên
nh&#7857;m h&#7841;n ch&#7871; s&#7921; tùy ti&#7879;n trong x&#7917; ph&#7841;t
vi ph&#7841;m hành chính, nâng cao tính hi&#7879;u qu&#7843; c&#7911;a pháp lu&#7853;t
trên th&#7921;c t&#7871;. &#272;&#7891;ng th&#7901;i, c&#361;ng &#273;&#7863;t
ra nh&#7919;ng yêu c&#7847;u kh&#7855;t khe v&#7873; th&#7901;i h&#7841;n
&#273;&#432;a ra các quy&#7871;t &#273;&#7883;nh x&#7917; ph&#7841;t c&#361;ng
nh&#432; ràng bu&#7897;c trách nhi&#7879;m c&#7911;a ng&#432;&#7901;i có th&#7849;m
quy&#7873;n khi xem xét, ban hành quy&#7871;t &#273;&#7883;nh x&#7917; ph&#7841;t
vi ph&#7841;m hành chính. Vi&#7879;c công khai k&#7871;t qu&#7843; x&#7917; ph&#7841;t
vi ph&#7841;m hành chính tr&#7903; thành nguyên t&#7855;c b&#7855;t bu&#7897;c
b&#7903;i v\u0301 \u01b0 ngh&#297;a c&#7911;a vi&#7879;c x&#7917; ph&#7841;t không ch&#7881;
là r&#259;n &#273;e &#273;&#7889;i v&#7899;i cá nhân, t&#7893; ch&#7913;c vi ph&#7841;m
mà qua các h\u0301nh th&#7913;c công khai, nó c\u0323n mang \u01b0 ngh&#297;a tuyên truy&#7873;n,
giáo d&#7909;c, nâng cao \u01b0 th&#7913;c pháp lu&#7853;t c&#7911;a các th&#7921;c
th&#7875; trong x\u0103 h&#7897;i.</span></p>

<h3><a name="_Toc131755302">3. Nguyên t&#7855;c 3: Vi&#7879;c x&#7917; ph&#7841;t
vi ph&#7841;m hành chính ph&#7843;i c&#259;n c&#7913; vào tính ch&#7845;t, m&#7913;c
&#273;&#7897;, h&#7853;u qu&#7843; vi ph&#7841;m, &#273;&#7889;i t&#432;&#7907;ng
vi ph&#7841;m và t\u0301nh ti&#7871;t gi&#7843;m nh&#7865;, t\u0301nh ti&#7871;t
t&#259;ng n&#7863;ng.</a></h3>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>Trên th&#7921;c t&#7871;, m&#7895;i
tr&#432;&#7901;ng h&#7907;p vi ph&#7841;m hành chính &#273;&#7873;u ít nhi&#7873;u
có s&#7921; khác nhau nh&#7845;t &#273;&#7883;nh v&#7873; tính ch&#7845;t, m&#7913;c
&#273;&#7897; vi ph&#7841;m, ch&#7911; th&#7875; vi ph&#7841;m. &#272;i&#7873;u
&#273;ó có ngh&#297;a là không ph&#7843;i m&#7885;i vi ph&#7841;m hành chính
&#273;&#7873;u gi&#7889;ng nhau. V\u0301 v&#7853;y, &#273;\u0323i h&#7887;i vi&#7879;c x&#7917;
ph&#7841;t vi ph&#7841;m hành chính c&#361;ng ph&#7843;i &#273;áp &#7913;ng v&#7899;i
yêu c&#7847;u b&#7843;o &#273;&#7843;m s&#7921; chính xác và phù h&#7907;p v&#7899;i
t&#7915;ng tr&#432;&#7901;ng h&#7907;p vi ph&#7841;m hành chính. Nh&#432; v&#7853;y
m&#7899;i &#273;&#7843;m b&#7843;o &#273;&#432;&#7907;c tính giáo d&#7909;c và
nghiêm minh trong x&#7917; ph&#7841;t vi ph&#7841;m hành chính.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>&#272;&#7875; &#273;áp &#7913;ng
&#273;&#432;&#7907;c các yêu c&#7847;u trên, th\u0301 vi&#7879;c x&#7917; ph&#7841;t
vi ph&#7841;m hành chính ph&#7843;i d&#7921;a trên các c&#259;n c&#7913; nh&#7845;t
&#273;&#7883;nh, &#273;ó là:</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>+ C&#259;n c&#7913; vào tính ch&#7845;t, m&#7913;c
&#273;&#7897; c&#7911;a hành vi vi ph&#7841;m: Theo &#273;ó, hành vi vi ph&#7841;m
càng ph&#7913;c t&#7841;p, tinh vi th\u0301 càng nguy hi&#7875;m, hành vi vi ph&#7841;m
càng nhi&#7873;u (th&#7921;c hi&#7879;n nhi&#7873;u l&#7847;n), v&#7899;i quy
mô càng l&#7899;n th\u0301 càng nguy hi&#7875;m. Do v&#7853;y m&#7913;c x&#7917; ph&#7841;t
càng n&#7863;ng.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>+ C&#259;n c&#7913; vào h&#7853;u qu&#7843;
do hành vi vi ph&#7841;m gây ra: Theo &#273;ó, h&#7853;u qu&#7843; gây ra càng
l&#7899;n, càng nghiêm tr&#7885;ng, th\u0301 áp d&#7909;ng h\u0301nh th&#7913;c và m&#7913;c
x&#7917; ph&#7841;t càng n&#7863;ng.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>+ C&#259;n c&#7913; và &#273;&#7889;i
t&#432;&#7907;ng vi ph&#7841;m: Theo &#273;ó &#273;&#7889;i t&#432;&#7907;ng
(ch&#7911; th&#7875;) vi ph&#7841;m có nhân thân x&#7845;u th\u0301 áp d&#7909;ng
h\u0301nh th&#7913;c và m&#7913;c x&#7917; ph&#7841;t n&#7863;ng h&#417;n so v&#7899;i
&#273;&#7889;i t&#432;&#7907;ng có nhân thân t&#7889;t.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>+ C&#259;n c&#7913; vào t\u0301nh ti&#7871;t
t&#259;ng n&#7863;ng, gi&#7843;m nh&#7865;: Theo &#273;ó &#273;&#7889;i t&#432;&#7907;ng
vi ph&#7841;m có t\u0301nh ti&#7871;t gi&#7843;m nh&#7865; &#273;&#432;&#7907;c áp d&#7909;ng
h\u0301nh th&#7913;c và m&#7913;c x&#7917; ph&#7841;t nh&#7865; h&#417;n &#273;&#7889;i
t&#432;&#7907;ng không có t\u0301nh ti&#7871;t gi&#7843;m nh&#7865;. &#272;&#7889;i
t&#432;&#7907;ng vi ph&#7841;m có t\u0301nh ti&#7871;t t&#259;ng n&#7863;ng th\u0301 b&#7883;
áp d&#7909;ng h\u0301nh th&#7913;c và m&#7913;c x&#7917; ph&#7841;t n&#7863;ng
h&#417;n &#273;&#7889;i t&#432;&#7907;ng không có t\u0301nh ti&#7871;t t&#259;ng n&#7863;ng.</span></p>

<h3><a name="_Toc131755303">4. Nguyên t&#7855;c 4: Ch&#7881; x&#7917; ph&#7841;t
vi ph&#7841;m hành chính khi có hành vi vi ph&#7841;m hành chính do pháp lu&#7853;t
quy &#273;&#7883;nh.</a></h3>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>M&#7897;t hành vi vi ph&#7841;m hành chính
ch&#7881; b&#7883; x&#7917; ph&#7841;t m&#7897;t l&#7847;n.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>Nhi&#7873;u ng&#432;&#7901;i cùng th&#7921;c
hi&#7879;n m&#7897;t hành vi vi ph&#7841;m hành chính th\u0301 m&#7895;i ng&#432;&#7901;i
vi ph&#7841;m &#273;&#7873;u b&#7883; x&#7917; ph&#7841;t v&#7873; hành vi vi
ph&#7841;m hành chính &#273;ó.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>M&#7897;t ng&#432;&#7901;i th&#7921;c hi&#7879;n
nhi&#7873;u hành vi vi ph&#7841;m hành chính ho&#7863;c vi ph&#7841;m hành
chính nhi&#7873;u l&#7847;n th\u0301 b&#7883; x&#7917; ph&#7841;t v&#7873; t&#7915;ng
hành vi vi ph&#7841;m, tr&#7915; tr&#432;&#7901;ng h&#7907;p hành vi vi ph&#7841;m
hành chính nhi&#7873;u l&#7847;n &#273;&#432;&#7907;c Chính ph&#7911; quy
&#273;&#7883;nh là t\u0301nh ti&#7871;t t&#259;ng n&#7863;ng;</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>Theo &#273;ó, m&#7897;t hành vi nào
&#273;ó n&#7871;u không &#273;&#432;&#7907;c pháp lu&#7853;t quy &#273;&#7883;nh
là hành vi vi ph&#7841;m hành chính th\u0301 không &#273;&#432;&#7907;c x&#7917; ph&#7841;t
hành vi &#273;ó. N&#7871;u ti&#7871;n hành x&#7917; ph&#7841;t m&#7897;t hành
vi mà không &#273;&#432;&#7907;c pháp lu&#7853;t quy &#273;&#7883;nh là hành vi
vi ph&#7841;m hành chính th\u0301 vi&#7879;c x&#7917; ph&#7841;t &#273;ó là không có
c&#259;n c&#7913; pháp lu&#7853;t. Pháp lu&#7853;t v&#7873; x&#7917; ph&#7841;t
vi ph&#7841;m hành chính hi&#7879;n nay &#7903; n&#432;&#7899;c ta quy &#273;&#7883;nh
nh&#7919;ng hành vi b&#7883; coi là vi ph&#7841;m hành chính và ph&#7843;i b&#7883;
x&#7917; ph&#7841;t r&#7843;i rác &#7903; nhi&#7873;u v&#259;n b&#7843;n khác
nhau, nh&#432;ng ch&#7911; y&#7871;u &#273;&#432;&#7907;c quy &#273;&#7883;nh
trong các ngh&#7883; &#273;&#7883;nh c&#7911;a Chính ph&#7911;. V\u0301 v&#7853;y,
&#273;&#7875; xác &#273;&#7883;nh hành vi nào &#273;ó là hành vi vi ph&#7841;m
hành chính, c&#7847;n tra c&#7913;u &#273;&#7847;y &#273;&#7911; các quy &#273;&#7883;nh
c&#7911;a pháp lu&#7853;t v&#7873; x&#7917; ph&#7841;t vi ph&#7841;m hành chính
trên t&#7915;ng l&#297;nh v&#7921;c c&#7909; th&#7875; &#273;&#7875; &#273;&#7843;m
b&#7843;o vi&#7879;c x&#7917; ph&#7841;t vi ph&#7841;m hành chính &#273;&#432;&#7907;c
chính xác và &#273;úng pháp lu&#7853;t.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>M&#7897;t hành vi vi ph&#7841;m hành chính
ch&#7881; b&#7883; x&#7917; ph&#7841;t m&#7897;t l&#7847;n: Theo tinh th&#7847;n
c&#7911;a nguyên t&#7855;c này, th\u0301 không th&#7875; x&#7917; ph&#7841;t nhi&#7873;u
l&#7847;n cho cùng m&#7897;t hành vi vi ph&#7841;m hành chính. Tuy nhiên, trong
tr&#432;&#7901;ng h&#7907;p th&#7921;c hi&#7879;n nhi&#7873;u l&#7847;n, (t&#7915;
hai l&#7847;n tr&#7903; lên) cùng m&#7897;t hành vi vi ph&#7841;m hành chính
th\u0301 không áp d&#7909;ng nguyên t&#7855;c này v\u0301 thu&#7897;c tr&#432;&#7901;ng h&#7907;p
\u201cvi ph&#7841;m hành chính nhi&#7873;u l&#7847;n\u201d.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>Nhi&#7873;u ng&#432;&#7901;i cùng th&#7921;c
hi&#7879;n m&#7897;t hành vi vi ph&#7841;m hành chính th\u0301 m&#7895;i ng&#432;&#7901;i
vi ph&#7841;m &#273;&#7873;u b&#7883; x&#7917; ph&#7841;t v&#7873; hành vi vi
ph&#7841;m hành chính &#273;ó: Theo &#273;ó, tr&#432;&#7901;ng h&#7907;p có nhi&#7873;u
ng&#432;&#7901;i cùng tham gia th&#7921;c hi&#7879;n m&#7897;t hành vi vi ph&#7841;m
hành chính (ví d&#7909;: Nhi&#7873;u ng&#432;&#7901;i cùng tham gia gây r&#7889;i
tr&#7853;t t&#7921; công c&#7897;ng...) th\u0301 cá th&#7875; hóa trách nhi&#7879;m
c&#7911;a t&#7915;ng ng&#432;&#7901;i &#273;&#7875; ra quy&#7871;t &#273;&#7883;nh
x&#7917; ph&#7841;t vi ph&#7841;m hành chính. &#272;i&#7873;u &#273;ó c&#361;ng
có ngh&#297;a là không &#273;&#432;&#7907;c x&#7917; ph&#7841;t vi ph&#7841;m
hành chính chung cho c&#7843; nhóm ng&#432;&#7901;i, mà ph&#7843;i x&#7917; ph&#7841;t
theo t&#7915;ng ng&#432;&#7901;i &#273;&#7889;i v&#7899;i hành vi mà h&#7885;
cùng vi ph&#7841;m.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>M&#7897;t ng&#432;&#7901;i th&#7921;c hi&#7879;n
nhi&#7873;u hành vi vi ph&#7841;m hành chính ho&#7863;c vi ph&#7841;m hành
chính nhi&#7873;u l&#7847;n th\u0301 b&#7883; x&#7917; ph&#7841;t v&#7873; t&#7915;ng
hành vi vi ph&#7841;m: Theo nguyên t&#7855;c này, m&#7897;t ng&#432;&#7901;i th&#7921;c
hi&#7879;n nhi&#7873;u hành vi vi ph&#7841;m (hành vi khác nhau) th\u0301 b&#7883; x&#7917;
ph&#7841;t v&#7873; t&#7915;ng hành vi vi ph&#7841;m. Ngh&#297;a là m&#7895;i
hành vi vi ph&#7841;m th\u0301 b&#7883; x&#7917; ph&#7841;t riêng v&#7873; h\u0301nh th&#7913;c
và m&#7913;c ph&#7841;t ch&#7913; không g&#7897;p l&#7841;i &#273;&#7875; x&#7917;
ph&#7841;t chung. M&#7897;t ng&#432;&#7901;i vi ph&#7841;m hành chính nhi&#7873;u
l&#7847;n th\u0301 b&#7883; x&#7917; ph&#7841;t v&#7873; t&#7915;ng hành vi vi ph&#7841;m.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>&#272;&#7875; kh&#7855;c ph&#7909;c khó
kh&#259;n trong vi&#7879;c áp d&#7909;ng quy &#273;&#7883;nh \u201cvi ph&#7841;m
hành chính nhi&#7873;u l&#7847;n\u201d, khi v&#7915;a quy &#273;&#7883;nh là t\u0301nh ti&#7871;t
t&#259;ng n&#7863;ng, v&#7915;a quy &#273;&#7883;nh b&#7883; x&#7917; ph&#7841;t
v&#7873; t&#7915;ng hành vi vi ph&#7841;m trong các Ngh&#7883; &#273;&#7883;nh
quy &#273;&#7883;nh v&#7873; x&#7917; ph&#7841;t trong t&#7915;ng l&#297;nh v&#7921;c
(trong khi nhi&#7873;u Ngh&#7883; &#273;&#7883;nh không quy &#273;&#7883;nh r\u01a1
hành vi này) c&#7911;a Lu&#7853;t XLVPHC 2012. Do v&#7853;y, Lu&#7853;t X&#7917;
l\u01b0 vi ph&#7841;m hành chính s&#7917;a &#273;&#7893;i 2020, &#273;\u0103 quy &#273;&#7883;nh
r\u01a1 h&#417;n vi&#7879;c áp d&#7909;ng nguyên t&#7855;c này, theo &#273;ó: m&#7897;t
ng&#432;&#7901;i th&#7921;c hi&#7879;n nhi&#7873;u hành vi vi ph&#7841;m hành
chính ho&#7863;c vi ph&#7841;m hành chính nhi&#7873;u l&#7847;n th\u0301 b&#7883; x&#7917;
ph&#7841;t v&#7873; t&#7915;ng hành vi vi ph&#7841;m, tr&#7915; tr&#432;&#7901;ng
h&#7907;p vi ph&#7841;m hành chính nhi&#7873;u l&#7847;n &#273;&#432;&#7907;c
Chính ph&#7911; quy &#273;&#7883;nh áp d&#7909;ng t\u0301nh ti&#7871;t t&#259;ng n&#7863;ng
(Kho&#7843;n 2 &#272;i&#7873;u 1 Lu&#7853;t XLVPHC 2020).</span></p>

<h3><a name="_Toc131755304">5. Nguyên t&#7855;c 5: Ng&#432;&#7901;i có th&#7849;m
quy&#7873;n x&#7917; ph&#7841;t có trách nhi&#7879;m ch&#7913;ng minh vi ph&#7841;m
hành chính. Cá nhân, t&#7893; ch&#7913;c b&#7883; x&#7917; ph&#7841;t có quy&#7873;n
t&#7921; m\u0301nh ho&#7863;c thông qua ng&#432;&#7901;i &#273;&#7841;i di&#7879;n h&#7907;p
pháp ch&#7913;ng minh m\u0301nh không vi ph&#7841;m hành chính.</a></h3>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>Theo nguyên t&#7855;c này, ng&#432;&#7901;i
có th&#7849;m quy&#7873;n x&#7917; ph&#7841;t vi ph&#7841;m hành chính có trách
nhi&#7879;m ch&#7913;ng minh vi ph&#7841;m hành chính. &#272;i&#7873;u này
c&#361;ng có ngh&#297;a là ch&#7881; khi ng&#432;&#7901;i có th&#7849;m quy&#7873;n
x&#7917; ph&#7841;t vi ph&#7841;m hành chính ch&#7913;ng minh &#273;&#432;&#7907;c
có hành vi vi ph&#7841;m hành chính th\u0301 m&#7899;i &#273;&#432;&#7907;c ti&#7871;n
hành x&#7917; ph&#7841;t vi ph&#7841;m hành chính. &#272;&#7875; có k&#7871;t
lu&#7853;n và làm r\u01a1 các t\u0301nh ti&#7871;t c&#7911;a vi ph&#7841;m hành chính, bu&#7897;c
ng&#432;&#7901;i vi ph&#7841;m ph&#7843;i ch&#7883;u trách nhi&#7879;m v&#7873;
hành vi mà h&#7885; &#273;\u0103 th&#7921;c hi&#7879;n, ng&#432;&#7901;i có th&#7849;m
quy&#7873;n ph&#7843;i th&#7921;c hi&#7879;n hàng lo&#7841;t các công vi&#7879;c
ph&#7913;c t&#7841;p theo m&#7897;t tr\u0301nh t&#7921; quy &#273;&#7883;nh, các
công vi&#7879;c &#273;ó chính là ho&#7841;t &#273;&#7897;ng ch&#7913;ng minh.
Nh&#432; v&#7853;y, ch&#7913;ng minh là hàng lo&#7841;t các ho&#7841;t &#273;&#7897;ng
c&#7911;a ng&#432;&#7901;i có th&#7849;m quy&#7873;n x&#7917; ph&#7841;t vi ph&#7841;m
hành chính theo m&#7897;t tr\u0301nh t&#7921; do pháp lu&#7853;t quy &#273;&#7883;nh
&#273;&#7875; xác &#273;&#7883;nh chính xác các &#273;&#7889;i t&#432;&#7907;ng
c&#7847;n ch&#7913;ng minh làm c&#417; s&#7903; cho vi&#7879;c gi&#7843;i quy&#7871;t
&#273;úng &#273;&#7855;n v&#7909; vi&#7879;c vi ph&#7841;m hành chính.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>&#272;&#7889;i t&#432;&#7907;ng ch&#7913;ng
minh trong x&#7917; ph&#7841;t vi ph&#7841;m hành chính bao g&#7891;m:</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>+ Có hành vi vi ph&#7841;m hành chính x&#7843;y
ra hay không? Th&#7901;i gian, &#273;&#7883;a &#273;i&#7875;m và nh&#7919;ng
t\u0301nh ti&#7871;t khác c&#7911;a hành vi &#273;ó.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>+ Ai là ng&#432;&#7901;i th&#7921;c hi&#7879;n
hành vi vi ph&#7841;m hành chính, ng&#432;&#7901;i th&#7921;c hi&#7879;n hành
vi vi ph&#7841;m hành chính có &#273;&#7911; n&#259;ng l&#7921;c trách nhi&#7879;m
hành chính không?</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>+ Ng&#432;&#7901;i th&#7921;c hi&#7879;n
hành vi vi ph&#7841;m hành chính có l&#7895;i hay không có l&#7895;i? Do c&#7889;
\u01b0 hay vô \u01b0? M&#7909;c &#273;ích, &#273;&#7897;ng c&#417; vi ph&#7841;m?</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>+ Nh&#7919;ng t\u0301nh ti&#7871;t t&#259;ng n&#7863;ng,
t\u0301nh ti&#7871;t gi&#7843;m nh&#7865;.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>Ngoài ra c\u0323n xác &#273;&#7883;nh nh&#7919;ng
v&#7845;n &#273;&#7873; có liên quan khác là: Tính ch&#7845;t và m&#7913;c
&#273;&#7897; thi&#7879;t h&#7841;i do vi ph&#7841;m hành chính gây ra, &#273;&#7889;i
t&#432;&#7907;ng c&#7911;a hành vi vi ph&#7841;m hành chính là g\u0301 (ti&#7873;n,
hàng hóa, v&#7853;t...).</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>- Cá nhân, t&#7893; ch&#7913;c b&#7883; x&#7917;
ph&#7841;t có quy&#7873;n t&#7921; m\u0301nh ho&#7863;c thông qua ng&#432;&#7901;i
&#273;&#7841;i di&#7879;n h&#7907;p pháp ch&#7913;ng minh m\u0301nh không vi ph&#7841;m
hành chính.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>N&#7871;u nh&#432; &#273;&#7889;i v&#7899;i
ng&#432;&#7901;i có th&#7849;m quy&#7873;n x&#7917; ph&#7841;t vi ph&#7841;m
hành chính, vi&#7879;c ch&#7913;ng minh vi ph&#7841;m hành chính là trách nhi&#7879;m
mang tính b&#7855;t bu&#7897;c, th\u0301 ng&#432;&#7907;c l&#7841;i, cá nhân, t&#7893;
ch&#7913;c là &#273;&#7889;i t&#432;&#7907;ng b&#7883; x&#7917; ph&#7841;t vi
ph&#7841;m hành chính l&#7841;i có quy&#7873;n ch&#7913;ng minh m\u0301nh không vi
ph&#7841;m hành chính. &#272;i&#7873;u này có ngh&#297;a là lu&#7853;t không b&#7855;t
bu&#7897;c &#273;&#7889;i t&#432;&#7907;ng b&#7883; x&#7917; ph&#7841;t vi ph&#7841;m
hành chính ph&#7843;i ch&#7913;ng minh là h&#7885; có vi ph&#7841;m hành chính
hay không. Lu&#7853;t quy &#273;&#7883;nh vi&#7879;c ch&#7913;ng minh không vi
