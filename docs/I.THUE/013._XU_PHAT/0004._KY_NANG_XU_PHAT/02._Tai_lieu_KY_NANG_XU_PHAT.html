<p class=MsoTitle><a name="_Toc131755321">2.1. X&#7917; ph&#7841;t vi ph&#7841;m
hành chính không l&#7853;p biên b&#7843;n</a></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>X&#7917; ph&#7841;t vi ph&#7841;m hành
chính không l&#7853;p biên b&#7843;n &#273;&#432;&#7907;c áp d&#7909;ng trong
tr&#432;&#7901;ng h&#7907;p x&#7917; ph&#7841;t c&#7843;nh cáo ho&#7863;c ph&#7841;t
ti&#7873;n &#273;&#7871;n 250.000 &#273;&#7891;ng &#273;&#7889;i v&#7899;i cá nhân,</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>500.0 &#273;&#7891;ng &#273;&#7889;i v&#7899;i
t&#7893; ch&#7913;c và ng&#432;&#7901;i có th&#7849;m quy&#7873;n x&#7917; ph&#7841;t
ph&#7843;i ra quy&#7871;t &#273;&#7883;nh x&#7917; ph&#7841;t vi ph&#7841;m
hành chính t&#7841;i ch&#7895; (Tr&#432;&#7901;ng h&#7907;p vi ph&#7841;m hành
chính &#273;&#432;&#7907;c phát hi&#7879;n nh&#7901; s&#7917; d&#7909;ng
ph&#432;&#417;ng ti&#7879;n, thi&#7871;t b&#7883; k&#7929; thu&#7853;t, nghi&#7879;p
v&#7909; th\u0301 ph&#7843;i l&#7853;p biên b&#7843;n).</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>Quy&#7871;t &#273;&#7883;nh x&#7917; ph&#7841;t
vi ph&#7841;m hành chính t&#7841;i ch&#7895; ph&#7843;i ghi r\u01a1 ngày, tháng,
n&#259;m ra quy&#7871;t &#273;&#7883;nh; h&#7885;, tên, &#273;&#7883;a ch&#7881;
c&#7911;a cá nhân vi ph&#7841;m ho&#7863;c tên, &#273;&#7883;a ch&#7881; c&#7911;a
t&#7893; ch&#7913;c vi ph&#7841;m; hành vi vi ph&#7841;m; &#273;&#7883;a
&#273;i&#7875;m x&#7843;y ra vi ph&#7841;m; ch&#7913;ng c&#7913; và t\u0301nh ti&#7871;t
liên quan &#273;&#7871;n vi&#7879;c gi&#7843;i quy&#7871;t vi ph&#7841;m; h&#7885;,
tên, ch&#7913;c v&#7909; c&#7911;a ng&#432;&#7901;i ra quy&#7871;t &#273;&#7883;nh
x&#7917; ph&#7841;t; &#273;i&#7873;u, kho&#7843;n c&#7911;a v&#259;n b&#7843;n
pháp lu&#7853;t &#273;&#432;&#7907;c áp d&#7909;ng. Tr&#432;&#7901;ng h&#7907;p
ph&#7841;t ti&#7873;n th\u0301 trong quy&#7871;t &#273;&#7883;nh ph&#7843;i ghi r\u01a1 m&#7913;c
ti&#7873;n ph&#7841;t.</span></p>

<p class=MsoTitle><a name="_Toc131755322">2.2. X&#7917; ph&#7841;t vi ph&#7841;m
hành chính có l&#7853;p biên b&#7843;n</a></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>X&#7917; ph&#7841;t vi ph&#7841;m hành
chính có l&#7853;p biên b&#7843;n &#273;&#432;&#7907;c áp d&#7909;ng &#273;&#7889;i
v&#7899;i hành vi vi ph&#7841;m hành chính c&#7911;a cá nhân, t&#7893; ch&#7913;c
vi ph&#7841;m hành chính không thu&#7897;c tr&#432;&#7901;ng h&#7907;p x&#7917;
ph&#7841;t vi ph&#7841;m hành chính không l&#7853;p biên b&#7843;n &#7903;
trên.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>Sau khi phát hi&#7879;n hành vi vi ph&#7841;m
hành chính, ng&#432;&#7901;i có th&#7849;m quy&#7873;n bu&#7897;c ch&#7845;m d&#7913;t
hành vi vi ph&#7841;m hành chính, th&#7911; t&#7909;c này &#273;&#432;&#7907;c
th&#7921;c hi&#7879;n b&#7857;ng l&#7901;i nói, c\u0323i, hi&#7879;u l&#7879;nh,
v&#259;n b&#7843;n ho&#7863;c h\u0301nh th&#7913;c khác theo quy &#273;&#7883;nh c&#7911;a
pháp lu&#7853;t (&#272;i&#7873;u 55 Lu&#7853;t X&#7917; l\u01b0 vi ph&#7841;m hành
chính).</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>Biên b&#7843;n vi ph&#7841;m hành chính là
lo&#7841;i v&#259;n b&#7843;n hành chính có giá tr&#7883; pháp l\u01b0 quan tr&#7885;ng,
v\u0301 &#273;ây là c&#417; s&#7903; xác &#273;&#7883;nh có hành vi vi ph&#7841;m
hành chính và áp d&#7909;ng các bi&#7879;n pháp kh&#7855;c ph&#7909;c h&#7853;u
qu&#7843; c&#361;ng nh&#432; áp d&#7909;ng các bi&#7879;n pháp x&#7917; l\u01b0 hành
chính.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>Vi&#7879;c x&#7917; ph&#7841;t vi ph&#7841;m
hành chính có l&#7853;p biên b&#7843;n ph&#7843;i &#273;&#432;&#7907;c ng&#432;&#7901;i
có th&#7849;m quy&#7873;n x&#7917; ph&#7841;t l&#7853;p thành h&#7891; s&#417;
x&#7917; ph&#7841;t vi ph&#7841;m hành chính. H&#7891; s&#417; bao g&#7891;m
biên b&#7843;n vi ph&#7841;m hành chính, quy&#7871;t &#273;&#7883;nh x&#7917;
ph&#7841;t vi ph&#7841;m hành chính, các tài li&#7879;u gi&#7845;y t&#7901;
liên quan và ph&#7843;i &#273;&#432;&#7907;c &#273;ánh bút l&#7909;c. H&#7891;
s&#417; ph&#7843;i &#273;&#432;&#7907;c l&#432;u tr&#7919; theo quy &#273;&#7883;nh
c&#7911;a pháp lu&#7853;t v&#7873; l&#432;u tr&#7919;.</span></p>

<h4><a name="_Toc131755323">2.2.1. L&#7853;p biên b&#7843;n vi ph&#7841;m hành
chính</a></h4>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>- Khi phát hi&#7879;n hành vi vi ph&#7841;m
hành chính thu&#7897;c l&#297;nh v&#7921;c qu&#7843;n l\u01b0 c&#7911;a m\u0301nh,
ng&#432;&#7901;i có th&#7849;m quy&#7873;n &#273;ang thi hành công v&#7909; ph&#7843;i
k&#7883;p th&#7901;i l&#7853;p biên b&#7843;n vi ph&#7841;m hành chính, tr&#7915;
tr&#432;&#7901;ng h&#7907;p x&#7917; ph&#7841;t không l&#7853;p biên b&#7843;n
quy &#273;&#7883;nh t&#7841;i kho&#7843;n 1 &#272;i&#7873;u 56 c&#7911;a Lu&#7853;t
X&#7917; l\u01b0 vi ph&#7841;m hành chính. Vi ph&#7841;m hành chính x&#7843;y ra
trên tàu bay, tàu bi&#7875;n, tàu h&#7887;a th\u0301 ng&#432;&#7901;i ch&#7881; huy
tàu bay, thuy&#7873;n tr&#432;&#7903;ng, tr&#432;&#7903;ng tàu có trách nhi&#7879;m
t&#7893; ch&#7913;c l&#7853;p biên b&#7843;n và chuy&#7875;n ngay cho ng&#432;&#7901;i
có th&#7849;m quy&#7873;n x&#7917; ph&#7841;t vi ph&#7841;m hành chính khi tàu
bay, tàu bi&#7875;n, tàu h&#7887;a v&#7873; &#273;&#7871;n sân bay, b&#7871;n c&#7843;ng,
nhà ga.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>- Biên b&#7843;n vi ph&#7841;m hành chính
ph&#7843;i &#273;&#432;&#7907;c l&#7853;p t&#7841;i n&#417;i x&#7843;y ra hành
vi vi ph&#7841;m hành chính. Tr&#432;&#7901;ng h&#7907;p biên b&#7843;n vi ph&#7841;m
hành chính &#273;&#432;&#7907;c l&#7853;p t&#7841;i tr&#7909; s&#7903; c&#417;
quan c&#7911;a ng&#432;&#7901;i có th&#7849;m quy&#7873;n l&#7853;p biên b&#7843;n
ho&#7863;c &#273;&#7883;a &#273;i&#7875;m khác th\u0301 ph&#7843;i ghi r\u01a1 l\u01b0 do vào
biên b&#7843;n.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>- Biên b&#7843;n vi ph&#7841;m hành chính
có n&#7897;i dung ch&#7911; y&#7871;u sau &#273;ây:</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>+ Th&#7901;i gian, &#273;&#7883;a &#273;i&#7875;m
l&#7853;p biên b&#7843;n;</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>+Thông tin v&#7873; ng&#432;&#7901;i l&#7853;p
biên b&#7843;n, cá nhân, t&#7893; ch&#7913;c vi ph&#7841;m và c&#417; quan, t&#7893;
ch&#7913;c, cá nhân có liên quan;</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>+ Th&#7901;i gian, &#273;&#7883;a &#273;i&#7875;m
x&#7843;y ra vi ph&#7841;m; mô t&#7843; v&#7909; vi&#7879;c, hành vi vi ph&#7841;m;</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>+ L&#7901;i khai c&#7911;a ng&#432;&#7901;i
vi ph&#7841;m ho&#7863;c &#273;&#7841;i di&#7879;n t&#7893; ch&#7913;c vi ph&#7841;m,
ng&#432;&#7901;i ch&#7913;ng ki&#7871;n, ng&#432;&#7901;i b&#7883; thi&#7879;t
h&#7841;i ho&#7863;c &#273;&#7841;i di&#7879;n t&#7893; ch&#7913;c b&#7883; thi&#7879;t
h&#7841;i;</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>+ Bi&#7879;n pháp ng&#259;n ch&#7863;n và
b&#7843;o &#273;&#7843;m x&#7917; l\u01b0 vi ph&#7841;m hành chính;</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>+ Quy&#7873;n và th&#7901;i h&#7841;n gi&#7843;i
tr\u0301nh.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>- Biên b&#7843;n vi ph&#7841;m hành chính
ph&#7843;i &#273;&#432;&#7907;c l&#7853;p thành ít nh&#7845;t 02 b&#7843;n, ph&#7843;i
&#273;&#432;&#7907;c ng&#432;&#7901;i l&#7853;p biên b&#7843;n và ng&#432;&#7901;i
vi ph&#7841;m ho&#7863;c &#273;&#7841;i di&#7879;n t&#7893; ch&#7913;c vi ph&#7841;m
k\u01b0, tr&#7915; tr&#432;&#7901;ng h&#7907;p biên b&#7843;n &#273;&#432;&#7907;c l&#7853;p
theo quy &#273;&#7883;nh t&#7841;i kho&#7843;n 7 &#272;i&#7873;u 58 Lu&#7853;t
X&#7917; l\u01b0 vi ph&#7841;m hành chính.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>Tr&#432;&#7901;ng h&#7907;p ng&#432;&#7901;i
vi ph&#7841;m, &#273;&#7841;i di&#7879;n t&#7893; ch&#7913;c vi ph&#7841;m
không k\u01b0 vào biên b&#7843;n th\u0301 biên b&#7843;n ph&#7843;i có ch&#7919; k\u01b0 c&#7911;a
&#273;&#7841;i di&#7879;n chính quy&#7873;n c&#7845;p x\u0103 n&#417;i x&#7843;y ra
vi ph&#7841;m ho&#7863;c c&#7911;a ít nh&#7845;t 01 ng&#432;&#7901;i ch&#7913;ng
ki&#7871;n xác nh&#7853;n vi&#7879;c cá nhân, t&#7893; ch&#7913;c v i ph&#7841;m
không k\u01b0 vào biên b&#7843;n; tr&#432;&#7901;ng h&#7907;p không có ch&#7919; k\u01b0
c&#7911;a &#273;&#7841;i di&#7879;n chính quy&#7873;n c&#7845;p x\u0103 ho&#7863;c c&#7911;a
ng&#432;&#7901;i ch&#7913;ng ki&#7871;n th\u0301 ph&#7843;i ghi r\u01a1 l\u01b0 do vào biên b&#7843;n.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>- Biên b&#7843;n vi ph&#7841;m hành chính
l&#7853;p xong ph&#7843;i &#273;&#432;&#7907;c giao cho cá nhân, t&#7893; ch&#7913;c
vi ph&#7841;m hành chính 01 b&#7843;n; tr&#432;&#7901;ng h&#7907;p vi ph&#7841;m
hành chính không thu&#7897;c th&#7849;m quy&#7873;n x&#7917; ph&#7841;t c&#7911;a
ng&#432;&#7901;i l&#7853;p biên b&#7843;n th\u0301 biên b&#7843;n và các tài li&#7879;u
khác ph&#7843;i &#273;&#432;&#7907;c chuy&#7875;n cho ng&#432;&#7901;i có th&#7849;m
quy&#7873;n x&#7917; ph&#7841;t trong th&#7901;i h&#7841;n 24 gi&#7901; k&#7875;
t&#7915; khi l&#7853;p biên b&#7843;n, tr&#7915; tr&#432;&#7901;ng h&#7907;p
biên b&#7843;n vi ph&#7841;m hành chính &#273;&#432;&#7907;c l&#7853;p trên tàu
bay, tàu bi&#7875;n, tàu h&#7887;a.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>-Tr&#432;&#7901;ng h&#7907;p biên b&#7843;n
vi ph&#7841;m hành chính có sai sót ho&#7863;c không th&#7875; hi&#7879;n
&#273;&#7847;y &#273;&#7911;, chính xác các n&#7897;i dung quy &#273;&#7883;nh
t&#7841;i kho&#7843;n 3 và kho&#7843;n 4 &#272;i&#7873;u 58 Lu&#7853;t X&#7917;
l\u01b0 vi ph&#7841;m hành chính th\u0301 ph&#7843;i ti&#7871;n hành xác minh t\u0301nh ti&#7871;t
c&#7911;a v&#7909; vi&#7879;c vi ph&#7841;m hành chính theo quy &#273;&#7883;nh
t&#7841;i &#272;i&#7873;u 59 c&#7911;a Lu&#7853;t X&#7917; l\u01b0 vi ph&#7841;m
hành chính &#273;&#7875; làm c&#259;n c&#7913; ra quy&#7871;t &#273;&#7883;nh x&#7917;
ph&#7841;t. Vi&#7879;c xác minh t\u0301nh ti&#7871;t c&#7911;a v&#7909; vi&#7879;c
vi ph&#7841;m hành chính &#273;&#432;&#7907;c l&#7853;p thành biên b&#7843;n
xác minh. Biên b&#7843;n xác minh là tài li&#7879;u g&#7855;n li&#7873;n v&#7899;i
biên b&#7843;n vi ph&#7841;m hành chính và &#273;&#432;&#7907;c l&#432;u trong
h&#7891; s&#417; x&#7917; ph&#7841;t.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>- Biên b&#7843;n vi ph&#7841;m hành chính
có th&#7875; &#273;&#432;&#7907;c l&#7853;p, g&#7917;i b&#7857;ng
ph&#432;&#417;ng th&#7913;c &#273;i&#7879;n t&#7917; &#273;&#7889;i v&#7899;i
tr&#432;&#7901;ng h&#7907;p c&#417; quan c&#7911;a ng&#432;&#7901;i có th&#7849;m
quy&#7873;n x&#7917; ph&#7841;t, cá nhân, t&#7893; ch&#7913;c vi ph&#7841;m
&#273;áp &#7913;ng &#273;i&#7873;u ki&#7879;n v&#7873; c&#417; s&#7903; h&#7841;
t&#7847;ng, k&#7929; thu&#7853;t, thông tin.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>- Biên b&#7843;n vi ph&#7841;m hành chính
ph&#7843;i &#273;&#432;&#7907;c l&#7853;p &#273;úng n&#7897;i dung, h\u0301nh th&#7913;c,
th&#7911; t&#7909;c theo quy &#273;&#7883;nh c&#7911;a Lu&#7853;t này và là
c&#259;n c&#7913; ra quy&#7871;t &#273;&#7883;nh x&#7917; ph&#7841;t vi ph&#7841;m
hành chính, tr&#7915; tr&#432;&#7901;ng h&#7907;p x&#7917; ph&#7841;t vi ph&#7841;m
hành chính không l&#7853;p biên b&#7843;n quy &#273;&#7883;nh t&#7841;i kho&#7843;n
1 &#272;i&#7873;u 56, kho&#7843;n 2 &#272;i&#7873;u 63 c&#7911;a Lu&#7853;t X&#7917;
l\u01b0 vi ph&#7841;m hành chính và tr&#432;&#7901;ng h&#7907;p Lu&#7853;t Qu&#7843;n
l\u01b0 thu&#7871; có quy &#273;&#7883;nh khác.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><b style='font-family:"Times New Roman",serif'>Ngh&#7883;
&#273;&#7883;nh s&#7889; 118/2021/N&#272;-CP quy &#273;&#7883;nh chi ti&#7871;t
nh&#432; sau:</span></b></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><b style='font-family:"Times New Roman",serif'>V&#7873;
th&#7901;i h&#7841;n l&#7853;p biên b&#7843;n vi ph&#7841;m hành chính</span></b></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>Ngh&#7883; &#273;&#7883;nh s&#7889;
118/2021/N&#272;-CP &#273;\u0103 quy &#273;&#7883;nh c&#7909; th&#7875; th&#7901;i h&#7841;n
l&#7853;p biên b&#7843;n vi ph&#7841;m hành chính là 02 ngày làm vi&#7879;c, k&#7875;
t&#7915; khi phát hi&#7879;n hành vi vi ph&#7841;m hành chính. Tr&#432;&#7899;c
&#273;ây, không quy &#273;&#7883;nh c&#7909; th&#7875; th&#7901;i h&#7841;n l&#7853;p
biên b&#7843;n vi ph&#7841;m hành chính nên ng&#432;&#7901;i có th&#7849;m quy&#7873;n
t&#7915; khi phát hi&#7879;n &#273;&#7871;n lúc l&#7853;p biên b&#7843;n th&#7901;i
gian r&#7845;t dài d&#7851;n &#273;&#7871;n hành vi vi ph&#7841;m hành chính ti&#7871;p
di&#7877;n d&#7851;n &#273;&#7871;n h&#7853;u qu&#7843; r&#7845;t l&#7899;n,
khó kh&#7855;c ph&#7909;c, c&#7909; th&#7875; th&#7901;i h&#7841;n l&#7853;p
biên b&#7843;n nh&#432; sau:</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>- Biên b&#7843;n vi ph&#7841;m hành chính
&#273;&#432;&#7907;c l&#7853;p trong th&#7901;i h&#7841;n 02 ngày làm vi&#7879;c,
k&#7875; t&#7915; khi phát hi&#7879;n vi ph&#7841;m hành chính;</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>- Tr&#432;&#7901;ng h&#7907;p v&#7909; vi&#7879;c
có nhi&#7873;u t\u0301nh ti&#7871;t ph&#7913;c t&#7841;p ho&#7863;c có ph&#7841;m vi
r&#7897;ng, &#7843;nh h&#432;&#7903;ng &#273;&#7871;n quy&#7873;n và l&#7907;i
ích h&#7907;p pháp c&#7911;a cá nhân, t&#7893; ch&#7913;c, th\u0301 biên b&#7843;n
vi ph&#7841;m hành chính &#273;&#432;&#7907;c l&#7853;p trong th&#7901;i h&#7841;n
05 ngày làm vi&#7879;c, k&#7875; t&#7915; khi phát hi&#7879;n vi ph&#7841;m
hành chính;</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>- Tr&#432;&#7901;ng h&#7907;p vi ph&#7841;m
hành chính &#273;&#432;&#7907;c phát hi&#7879;n b&#7857;ng ph&#432;&#417;ng ti&#7879;n,
thi&#7871;t b&#7883; k&#7929; thu&#7853;t nghi&#7879;p v&#7909; ho&#7863;c ph&#7843;i
xác &#273;&#7883;nh giá tr&#7883; tang v&#7853;t, ph&#432;&#417;ng ti&#7879;n,
giám &#273;&#7883;nh, ki&#7875;m nghi&#7879;m, ki&#7875;m &#273;&#7883;nh, xét
nghi&#7879;m và xác minh t\u0301nh ti&#7871;t liên quan, th\u0301 biên b&#7843;n vi ph&#7841;m
hành chính &#273;&#432;&#7907;c l&#7853;p trong th&#7901;i h&#7841;n 03 ngày
làm vi&#7879;c, k&#7875; t&#7915; ngày xác &#273;&#7883;nh &#273;&#432;&#7907;c
&#273;&#7889;i t&#432;&#7907;ng vi ph&#7841;m b&#7857;ng ph&#432;&#417;ng ti&#7879;n,
thi&#7871;t b&#7883; k&#7929; thu&#7853;t nghi&#7879;p v&#7909; ho&#7863;c nh&#7853;n
&#273;&#432;&#7907;c k&#7871;t qu&#7843; xác &#273;&#7883;nh giá tr&#7883; tang
v&#7853;t, ph&#432;&#417;ng ti&#7879;n, giám &#273;&#7883;nh, ki&#7875;m nghi&#7879;m,
ki&#7875;m &#273;&#7883;nh, xét nghi&#7879;m và xác minh t\u0301nh ti&#7871;t liên
quan;</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>- Tr&#432;&#7901;ng h&#7907;p vi ph&#7841;m
hành chính x&#7843;y ra trên tàu bay, tàu bi&#7875;n, tàu h&#7887;a, th\u0301
ng&#432;&#7901;i có th&#7849;m quy&#7873;n l&#7853;p biên b&#7843;n vi ph&#7841;m
hành chính ho&#7863;c ng&#432;&#7901;i ch&#7881; huy tàu bay, thuy&#7873;n
tr&#432;&#7903;ng, tr&#432;&#7903;ng tàu có trách nhi&#7879;m l&#7853;p biên b&#7843;n
vi ph&#7841;m hành chính và chuy&#7875;n cho ng&#432;&#7901;i có th&#7849;m quy&#7873;n
x&#7917; ph&#7841;t vi ph&#7841;m hành chính trong th&#7901;i h&#7841;n 02 ngày
làm vi&#7879;c, k&#7875; t&#7915; khi tàu bay, tàu bi&#7875;n, tàu h&#7887;a v&#7873;
&#273;&#7871;n sân bay, b&#7871;n c&#7843;ng, nhà ga;</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>-Tr&#432;&#7901;ng h&#7907;p m&#7897;t v&#7909;
vi&#7879;c có nhi&#7873;u hành vi vi ph&#7841;m hành chính khác nhau, trong
&#273;ó có hành vi &#273;&#432;&#7907;c phát hi&#7879;n b&#7857;ng
ph&#432;&#417;ng ti&#7879;n, thi&#7871;t b&#7883; k&#7929; thu&#7853;t nghi&#7879;p
v&#7909; ho&#7863;c ph&#7843;i xác &#273;&#7883;nh giá tr&#7883; tang v&#7853;t,
ph&#432;&#417;ng ti&#7879;n, giám &#273;&#7883;nh, ki&#7875;m nghi&#7879;m, ki&#7875;m
&#273;&#7883;nh, xét nghi&#7879;m và xác minh t\u0301nh ti&#7871;t liên quan, th\u0301
biên b&#7843;n vi ph&#7841;m hành chính &#273;&#432;&#7907;c l&#7853;p &#273;&#7889;i
v&#7899;i các hành vi trong v&#7909; vi&#7879;c &#273;ó trong th&#7901;i h&#7841;n
03 ngày làm vi&#7879;c, k&#7875; t&#7915; ngày xác &#273;&#7883;nh &#273;&#432;&#7907;c
&#273;&#7889;i t&#432;&#7907;ng vi ph&#7841;m b&#7857;ng ph&#432;&#417;ng ti&#7879;n,
thi&#7871;t b&#7883; k&#7929; thu&#7853;t nghi&#7879;p v&#7909; ho&#7863;c nh&#7853;n
&#273;&#432;&#7907;c &#273;&#7847;y &#273;&#7911; k&#7871;t qu&#7843; xác
&#273;&#7883;nh giá tr&#7883; tang v&#7853;t, ph&#432;&#417;ng ti&#7879;n, giám
&#273;&#7883;nh, ki&#7875;m nghi&#7879;m, ki&#7875;m &#273;&#7883;nh, xét nghi&#7879;m
và xác minh t\u0301nh ti&#7871;t liên quan.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><b style='font-family:"Times New Roman",serif'>V&#7873;
k\u01b0 biên b&#7843;n vi ph&#7841;m hành chính</span></b></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>Biên b&#7843;n vi ph&#7841;m hành chính
&#273;&#432;&#7907;c l&#7853;p ít nh&#7845;t thành 02 b&#7843;n, &#273;&#432;&#7907;c
ng&#432;&#7901;i l&#7853;p biên b&#7843;n và ng&#432;&#7901;i vi ph&#7841;m ho&#7863;c
&#273;&#7841;i di&#7879;n ng&#432;&#7901;i vi ph&#7841;m c&#7911;a t&#7893; ch&#7913;c
k\u01b0, tr&#432;&#7901;ng h&#7907;p ng&#432;&#7901;i vi ph&#7841;m không k\u01b0 th\u0301
&#273;i&#7875;m ch&#7881;, n&#7871;u có ng&#432;&#7901;i ch&#7913;ng ki&#7871;n,
ng&#432;&#7901;i phiên d&#7883;ch, ng&#432;&#7901;i b&#7883; thi&#7879;t h&#7841;i
ho&#7863;c &#273;&#7841;i di&#7879;n t&#7893; ch&#7913;c b&#7883; thi&#7879;t h&#7841;i,
th\u0301 h&#7885; ph&#7843;i cùng k\u01b0 vào biên b&#7843;n; tr&#432;&#7901;ng h&#7907;p
biên b&#7843;n g&#7891;m nhi&#7873;u trang, th\u0301 ph&#7843;i k\u01b0 vào t&#7915;ng
trang biên b&#7843;n.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>Tr&#432;&#7901;ng h&#7907;p ng&#432;&#7901;i
vi ph&#7841;m, &#273;&#7841;i di&#7879;n t&#7893; ch&#7913;c vi ph&#7841;m
không có m&#7863;t t&#7841;i n&#417;i vi ph&#7841;m ho&#7863;c c&#7889; t\u0301nh tr&#7889;n
tránh ho&#7863;c v\u0301 l\u01b0 do khách quan mà không k\u01b0, &#273;i&#7875;m ch&#7881; vào
biên b&#7843;n vi ph&#7841;m hành chính ho&#7863;c có m&#7863;t nh&#432;ng t&#7915;
ch&#7889;i k\u01b0, &#273;i&#7875;m ch&#7881; vào biên b&#7843;n ho&#7863;c tr&#432;&#7901;ng
h&#7907;p không xác &#273;&#7883;nh &#273;&#432;&#7907;c &#273;&#7889;i t&#432;&#7907;ng
vi ph&#7841;m hành chính, th\u0301 biên b&#7843;n ph&#7843;i có ch&#7919; k\u01b0 c&#7911;a
&#273;&#7841;i di&#7879;n chính quy&#7873;n c&#7845;p x\u0103 n&#417;i x&#7843;y ra
vi ph&#7841;m ho&#7863;c c&#7911;a ít nh&#7845;t m&#7897;t ng&#432;&#7901;i ch&#7913;ng
ki&#7871;n xác nh&#7853;n vi&#7879;c cá nhân, t&#7893; ch&#7913;c không k\u01b0 vào
biên b&#7843;n; tr&#432;&#7901;ng h&#7907;p không có ch&#7919; k\u01b0 c&#7911;a
&#273;&#7841;i di&#7879;n chính quy&#7873;n c&#7845;p x\u0103 ho&#7863;c c&#7911;a
ng&#432;&#7901;i ch&#7913;ng ki&#7871;n th\u0301 ph&#7843;i ghi r\u01a1 l\u01b0 do vào biên b&#7843;n.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>Ngh&#7883; &#273;&#7883;nh s&#7889;
118/2021/N&#272;-CP &#273;\u0103 quy &#273;&#7883;nh c&#7909; th&#7875; chính quy&#7873;n
&#273;&#7883;a ph&#432;&#417;ng là c&#7845;p x\u0103 k\u01b0 vào biên b&#7843;n vi ph&#7841;m
hành chính và ch&#7881; c&#7847;n 01 ng&#432;&#7901;i ch&#7913;ng ki&#7871;n,
&#273;&#7891;ng th&#7901;i gi&#7843;i thích r\u01a1 ng&#432;&#7901;i ch&#7913;ng ki&#7871;n
ch&#7881; ch&#7913;ng ki&#7871;n v&#7873; vi&#7879;c cá nhân, t&#7893; ch&#7913;c
không k\u01b0 vào biên b&#7843;n.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><b style='font-family:"Times New Roman",serif'>V&#7873;
giao biên b&#7843;n vi ph&#7841;m hành chính</span></b></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>Biên b&#7843;n vi ph&#7841;m hành chính l&#7853;p
xong ph&#7843;i &#273;&#432;&#7907;c giao cho cá nhân, t&#7893; ch&#7913;c vi
ph&#7841;m hành chính 01 b&#7843;n, tr&#7915; tr&#432;&#7901;ng h&#7907;p không
xác &#273;&#7883;nh &#273;&#432;&#7907;c cá nhân, t&#7893; ch&#7913;c vi ph&#7841;m
hành chính. Tr&#432;&#7901;ng h&#7907;p vi ph&#7841;m hành chính không thu&#7897;c
th&#7849;m quy&#7873;n x&#7917; ph&#7841;t c&#7911;a ng&#432;&#7901;i l&#7853;p
biên b&#7843;n, th\u0301 biên b&#7843;n và các tài li&#7879;u khác ph&#7843;i
&#273;&#432;&#7907;c chuy&#7875;n cho ng&#432;&#7901;i có th&#7849;m quy&#7873;n
x&#7917; ph&#7841;t trong th&#7901;i h&#7841;n 24 gi&#7901;, k&#7875; t&#7915;
khi l&#7853;p biên b&#7843;n.</span></p>

<h4><a name="_Toc131755324">2.2.2. Xác minh t\u0301nh ti&#7871;t c&#7911;a v&#7909;
vi&#7879;c vi ph&#7841;m hành chính</a></h4>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>Trong tr&#432;&#7901;ng h&#7907;p c&#7847;n
thi&#7871;t, ng&#432;&#7901;i có th&#7849;m quy&#7873;n x&#7917; ph&#7841;t có
trách nhi&#7879;m xác minh các t\u0301nh ti&#7871;t v&#7909; vi&#7879;c vi ph&#7841;m
hành chính &#273;&#7875; xác th&#7921;c:</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>+ Có hay không có vi ph&#7841;m hành
chính.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>+ Cá nhân, t&#7893; ch&#7913;c th&#7921;c
hi&#7879;n hành vi vi ph&#7841;m hành chính, l&#7895;i, nhân thân c&#7911;a cá
nhân vi ph&#7841;m hành chính.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>+ T\u0301nh ti&#7871;t t&#259;ng n&#7863;ng, gi&#7843;m
nh&#7865;.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>+ Tính ch&#7845;t, m&#7913;c &#273;&#7897;
thi&#7879;t h&#7841;i do vi ph&#7841;m hành chính gây ra.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>+ Tr&#432;&#7901;ng h&#7907;p không ra quy&#7871;t
&#273;&#7883;nh x&#7917; ph&#7841;t vi ph&#7841;m hành chính theo quy &#273;&#7883;nh
c&#7911;a Lu&#7853;t X&#7917; l\u01b0 vi ph&#7841;m hành chính.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>+ T\u0301nh ti&#7871;t khác có \u01b0 ngh&#297;a
&#273;&#7889;i v&#7899;i vi&#7879;c xem xét, quy&#7871;t &#273;&#7883;nh x&#7917;
ph&#7841;t.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>Trong quá tr\u0301nh xem xét, ra quy&#7871;t
&#273;&#7883;nh x&#7917; ph&#7841;t, ng&#432;&#7901;i có th&#7849;m quy&#7873;n
x&#7917; ph&#7841;t có th&#7875; tr&#432;ng c&#7847;u giám &#273;&#7883;nh. Vi&#7879;c
tr&#432;ng c&#7847;u giám &#273;&#7883;nh &#273;&#432;&#7907;c th&#7921;c hi&#7879;n
theo quy &#273;&#7883;nh c&#7911;a pháp lu&#7853;t v&#7873; giám &#273;&#7883;nh.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>Vi&#7879;c xác minh t\u0301nh ti&#7871;t c&#7911;a
v&#7909;, vi&#7879;c vi ph&#7841;m hành chính ph&#7843;i &#273;&#432;&#7907;c
th&#7875; hi&#7879;n b&#7857;ng v&#259;n b&#7843;n.</span></p>

<h4><a name="_Toc131755325">2.2.3. Xác &#273;&#7883;nh giá tr&#7883; tang v&#7853;t
vi ph&#7841;m hành chính &#273;&#7875; làm c&#259;n c&#7913; xác &#273;&#7883;nh
khung ti&#7873;n ph&#7841;t, th&#7849;m quy&#7873;n x&#7917; ph&#7841;t</a></h4>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>Trong tr&#432;&#7901;ng h&#7907;p c&#7847;n
xác &#273;&#7883;nh giá tr&#7883; tang v&#7853;t, ph&#432;&#417;ng ti&#7879;n
vi ph&#7841;m hành chính &#273;&#7875; làm c&#259;n c&#7913; xác &#273;&#7883;nh
khung ti&#7873;n ph&#7841;t, th&#7849;m quy&#7873;n x&#7917; ph&#7841;t,
ng&#432;&#7901;i có th&#7849;m quy&#7873;n &#273;ang gi&#7843;i quy&#7871;t v&#7909;
vi&#7879;c ph&#7843;i xác &#273;&#7883;nh giá tr&#7883; tang v&#7853;t,
ph&#432;&#417;ng ti&#7879;n và ph&#7843;i ch&#7883;u trách nhi&#7879;m v&#7873;
vi&#7879;c xác &#273;&#7883;nh &#273;ó.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>Ví d&#7909;: X&#7917; ph&#7841;t trong
l&#297;nh v&#7921;c qu&#7843;n l\u01b0 &#273;&#7845;t &#273;ai, trong l&#297;nh v&#7921;c
thu&#7871; (khi m&#7913;c ph&#7841;t tính theo t&#7927; l&#7879; ph&#7847;n
tr&#259;m c&#7911;a giá tr&#7883; ti&#7873;n thu&#7871; c\u0323n thi&#7871;u)...</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>Tùy theo lo&#7841;i tang v&#7853;t,
ph&#432;&#417;ng ti&#7879;n c&#7909; th&#7875;, vi&#7879;c xác &#273;&#7883;nh
giá tr&#7883; d&#7921;a trên m&#7897;t trong các c&#259;n c&#7913; theo th&#7913;
t&#7921; &#432;u tiên sau &#273;ây:</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>- Giá niêm y&#7871;t ho&#7863;c giá ghi
trên h&#7907;p &#273;&#7891;ng ho&#7863;c hóa &#273;&#417;n mua bán ho&#7863;c
t&#7901; khai nh&#7853;p kh&#7849;u;</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>- Giá theo thông báo c&#7911;a c&#417;
quan tài chính &#273;&#7883;a ph&#432;&#417;ng; tr&#432;&#7901;ng h&#7907;p
không có thông báo giá th\u0301 theo giá th&#7883; tr&#432;&#7901;ng c&#7911;a
&#273;&#7883;a ph&#432;&#417;ng t&#7841;i th&#7901;i &#273;i&#7875;m x&#7843;y
ra vi ph&#7841;m hành chính;</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>- Giá thành c&#7911;a tang v&#7853;t,
ph&#432;&#417;ng ti&#7879;n n&#7871;u là hàng hóa ch&#432;a xu&#7845;t bán;</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>- &#272;&#7889;i v&#7899;i tang v&#7853;t,
ph&#432;&#417;ng ti&#7879;n là hàng gi&#7843; th\u0301 giá c&#7911;a tang v&#7853;t,
ph&#432;&#417;ng ti&#7879;n &#273;ó là giá th&#7883; tr&#432;&#7901;ng c&#7911;a
hàng hóa th&#7853;t ho&#7863;c hàng hóa có cùng tính n&#259;ng, k&#7929; thu&#7853;t,
công d&#7909;ng t&#7841;i th&#7901;i &#273;i&#7875;m n&#417;i phát hi&#7879;n
vi ph&#7841;m hành chính.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>- Tr&#432;&#7901;ng h&#7907;p không th&#7875;
áp d&#7909;ng &#273;&#432;&#7907;c c&#259;n c&#7913; quy &#273;&#7883;nh t&#7841;i
kho&#7843;n 2 &#272;i&#7873;u 60 Lu&#7853;t X&#7917; l\u01b0 vi ph&#7841;m hành chính
&#273;&#7875; xác &#273;&#7883;nh giá tr&#7883; tang v&#7853;t,
ph&#432;&#417;ng ti&#7879;n vi ph&#7841;m hành chính làm c&#259;n c&#7913; xác
&#273;&#7883;nh khung ti&#7873;n ph&#7841;t, th&#7849;m quy&#7873;n x&#7917; ph&#7841;t
th\u0301 ng&#432;&#7901;i có th&#7849;m quy&#7873;n &#273;ang gi&#7843;i quy&#7871;t
v&#7909; vi&#7879;c có th&#7875; ra quy&#7871;t &#273;&#7883;nh t&#7841;m gi&#7919;
tang v&#7853;t, ph&#432;&#417;ng ti&#7879;n vi ph&#7841;m và thành l&#7853;p H&#7897;i
&#273;&#7891;ng &#273;&#7883;nh giá. H&#7897;i &#273;&#7891;ng &#273;&#7883;nh
giá g&#7891;m có ng&#432;&#7901;i ra quy&#7871;t &#273;&#7883;nh t&#7841;m gi&#7919;
tang v&#7853;t, ph&#432;&#417;ng ti&#7879;n vi ph&#7841;m hành chính là Ch&#7911;
t&#7883;ch H&#7897;i &#273;&#7891;ng, &#273;&#7841;i di&#7879;n c&#417; quan
tài chính cùng c&#7845;p và &#273;&#7841;i di&#7879;n c&#417; quan chuyên môn
có liên quan là thành viên.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>Th&#7901;i h&#7841;n t&#7841;m gi&#7919;
tang v&#7853;t, ph&#432;&#417;ng ti&#7879;n &#273;&#7875; xác &#273;&#7883;nh
giá tr&#7883; không quá 48 gi&#7901;, k&#7875; t&#7915; th&#7901;i &#273;i&#7875;m
ra quy&#7871;t &#273;&#7883;nh t&#7841;m gi&#7919;, trong tr&#432;&#7901;ng h&#7907;p
th&#7853;t c&#7847;n thi&#7871;t th\u0301 th&#7901;i h&#7841;n có th&#7875; kéo dài
thêm nh&#432;ng t&#7889;i &#273;a không quá 48 gi&#7901;. M&#7885;i chi phí
liên quan &#273;&#7871;n vi&#7879;c t&#7841;m gi&#7919;, &#273;&#7883;nh giá và
thi&#7879;t h&#7841;i do vi&#7879;c t&#7841;m gi&#7919; gây ra do c&#417; quan
c&#7911;a ng&#432;&#7901;i có th&#7849;m quy&#7873;n ra quy&#7871;t &#273;&#7883;nh
t&#7841;m gi&#7919; chi tr&#7843;. Th&#7911; t&#7909;c, biên b&#7843;n t&#7841;m
gi&#7919; &#273;&#432;&#7907;c th&#7921;c hi&#7879;n theo quy &#273;&#7883;nh t&#7841;i
&#272;i&#7873;u 125 c&#7911;a Lu&#7853;t X&#7917; l\u01b0 vi ph&#7841;m hành chính.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>C&#259;n c&#7913; &#273;&#7875; xác &#273;&#7883;nh
giá tr&#7883; và các tài li&#7879;u liên quan &#273;&#7871;n vi&#7879;c xác
&#273;&#7883;nh giá tr&#7883; tang v&#7853;t, ph&#432;&#417;ng ti&#7879;n vi ph&#7841;m
hành chính ph&#7843;i th&#7875; hi&#7879;n trong h&#7891; s&#417; x&#7917; ph&#7841;t
vi ph&#7841;m hành chính.</span></p>

<h4><a name="_Toc131755326">2.2.4. Gi&#7843;i tr\u0301nh</a></h4>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>Gi&#7843;i tr\u0301nh là quy&#7873;n c&#7911;a
các cá nhân, t&#7893; ch&#7913;c vi ph&#7841;m. &#272;&#7875; &#273;&#7843;m b&#7843;o
quy&#7873;n gi&#7843;i tr\u0301nh cho ng&#432;&#7901;i vi ph&#7841;m, ng&#432;&#7901;i
có th&#7849;m quy&#7873;n x&#7917; l\u01b0 c&#7847;n ph&#7843;i gi&#7843;i thích cho
ng&#432;&#7901;i vi ph&#7841;m bi&#7871;t quy&#7873;n c&#7911;a h&#7885;.
&#272;&#7875; th&#7921;c hi&#7879;n vi&#7879;c gi&#7843;i tr\u0301nh, cá nhân, t&#7893;
ch&#7913;c vi ph&#7841;m ph&#7843;i có yêu c&#7847;u gi&#7843;i tr\u0301nh.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>- Th&#7849;m quy&#7873;n xem xét gi&#7843;i
tr\u0301nh:</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>+ Ng&#432;&#7901;i có th&#7849;m quy&#7873;n
x&#7917; ph&#7841;t vi ph&#7841;m hành chính.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>+ Ng&#432;&#7901;i có th&#7849;m quy&#7873;n
x&#7917; ph&#7841;t có trách nhi&#7879;m xem xét \u01b0 ki&#7871;n gi&#7843;i tr\u0301nh
c&#7911;a cá nhân, t&#7893; ch&#7913;c vi ph&#7841;m hành chính &#273;&#7875;
ra quy&#7871;t &#273;&#7883;nh x&#7917; ph&#7841;t, tr&#7915; tr&#432;&#7901;ng
h&#7907;p cá nhân, t&#7893; ch&#7913;c không yêu c&#7847;u gi&#7843;i tr\u0301nh.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><b style='font-family:"Times New Roman",serif'>- &#272;i&#7873;u
ki&#7879;n gi&#7843;i tr\u0301nh:</span></b></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>Theo &#272;i&#7873;u 61 Lu&#7853;t X&#7917;
l\u01b0 vi ph&#7841;m hành chính quy &#273;&#7883;nh nh&#7919;ng tr&#432;&#7901;ng h&#7907;p
sau &#273;&#432;&#7907;c quy&#7873;n gi&#7843;i tr\u0301nh:</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>+ &#272;&#7889;i v&#7899;i hành vi vi ph&#7841;m
hành chính mà pháp lu&#7853;t có quy &#273;&#7883;nh h\u0301nh th&#7913;c x&#7917;
ph&#7841;t t&#432;&#7899;c quy&#7873;n s&#7917; d&#7909;ng gi&#7845;y phép, ch&#7913;ng
ch&#7881; hành ngh&#7873; có th&#7901;i h&#7841;n;</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>+ &#272;\u0301nh ch&#7881; ho&#7841;t &#273;&#7897;ng
có th&#7901;i h&#7841;n;</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>+ Quy &#273;&#7883;nh m&#7913;c t&#7889;i
&#273;a c&#7911;a khung ti&#7873;n ph&#7841;t &#273;&#7889;i v&#7899;i hành vi
&#273;ó t&#7915;</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>15.0. 000 &#273;&#7891;ng tr&#7903; nên
&#273;&#7889;i v&#7899;i cá nhân, t&#7915; 30.000.000 &#273;&#7891;ng tr&#7903;
nên &#273;&#7889;i v&#7899;i t&#7893; ch&#7913;c th\u0301 cá nhân, t&#7893; ch&#7913;c
vi ph&#7841;m</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><b style='font-family:"Times New Roman",serif'>- H\u0301nh
th&#7913;c, th&#7911; t&#7909;c gi&#7843;i tr\u0301nh:</span></b></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>+ Gi&#7843;i tr\u0301nh tr&#7921;c ti&#7871;p:</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>&#272;&#7889;i v&#7899;i tr&#432;&#7901;ng
h&#7907;p gi&#7843;i tr\u0301nh tr&#7921;c ti&#7871;p, cá nhân, t&#7893; ch&#7913;c
vi ph&#7841;m hành chính ph&#7843;i g&#7917;i v&#259;n b&#7843;n yêu c&#7847;u
&#273;&#432;&#7907;c gi&#7843;i tr\u0301nh tr&#7921;c ti&#7871;p &#273;&#7871;n
ng&#432;&#7901;i có th&#7849;m quy&#7873;n x&#7917; ph&#7841;t vi ph&#7841;m
hành chính trong th&#7901;i h&#7841;n 02 ngày làm vi&#7879;c, k&#7875; t&#7915;
ngày l&#7853;p biên b&#7843;n vi ph&#7841;m hành chính.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>Ng&#432;&#7901;i có th&#7849;m quy&#7873;n
x&#7917; ph&#7841;t ph&#7843;i thông báo b&#7857;ng v&#259;n b&#7843;n cho
ng&#432;&#7901;i vi ph&#7841;m v&#7873; th&#7901;i gian và &#273;&#7883;a
&#273;i&#7875;m t&#7893; ch&#7913;c phiên gi&#7843;i tr\u0301nh tr&#7921;c ti&#7871;p
trong th&#7901;i h&#7841;n 05 ngày làm vi&#7879;c, k&#7875; t&#7915; ngày nh&#7853;n
&#273;&#432;&#7907;c yêu c&#7847;u c&#7911;a ng&#432;&#7901;i vi ph&#7841;m.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>Ng&#432;&#7901;i có th&#7849;m quy&#7873;n
x&#7917; ph&#7841;t t&#7893; ch&#7913;c phiên gi&#7843;i tr\u0301nh tr&#7921;c ti&#7871;p
và có trách nhi&#7879;m nêu c&#259;n c&#7913; pháp l\u01b0, t\u0301nh ti&#7871;t, ch&#7913;ng
c&#7913; liên quan &#273;&#7871;n hành vi vi ph&#7841;m hành chính, h\u0301nh th&#7913;c
x&#7917; ph&#7841;t, bi&#7879;n pháp kh&#7855;c ph&#7909;c h&#7853;u qu&#7843;
d&#7921; ki&#7871;n áp d&#7909;ng &#273;&#7889;i v&#7899;i hành vi vi ph&#7841;m.
Cá nhân, t&#7893; ch&#7913;c vi ph&#7841;m hành chính, ng&#432;&#7901;i &#273;&#7841;i
di&#7879;n h&#7907;p pháp c&#7911;a h&#7885; có quy&#7873;n tham gia phiên gi&#7843;i
tr\u0301nh và &#273;&#432;a ra \u01b0 ki&#7871;n, ch&#7913;ng c&#7913; &#273;&#7875; b&#7843;o
v&#7879; quy&#7873;n, l&#7907;i ích h&#7907;p pháp c&#7911;a m\u0301nh.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>Vi&#7879;c gi&#7843;i tr\u0301nh tr&#7921;c ti&#7871;p
&#273;&#432;&#7907;c l&#7853;p thành biên b&#7843;n và ph&#7843;i có ch&#7919;
k\u01b0 c&#7911;a các bên liên quan; tr&#432;&#7901;ng h&#7907;p biên b&#7843;n g&#7891;m
nhi&#7873;u trang th\u0301 các bên ph&#7843;i k\u01b0 vào t&#7915;ng trang biên b&#7843;n.
Biên b&#7843;n ph&#7843;i &#273;&#432;&#7907;c l&#432;u trong h&#7891; s&#417;
x&#7917; ph&#7841;t vi ph&#7841;m hành chính và giao cho cá nhân, t&#7893; ch&#7913;c
vi ph&#7841;m ho&#7863;c ng&#432;&#7901;i &#273;&#7841;i di&#7879;n h&#7907;p
pháp c&#7911;a h&#7885; 01 b&#7843;n.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>- Tr&#432;&#7901;ng h&#7907;p cá nhân, t&#7893;
ch&#7913;c vi ph&#7841;m hành chính không yêu c&#7847;u gi&#7843;i tr\u0301nh
nh&#432;ng tr&#432;&#7899;c khi h&#7871;t th&#7901;i h&#7841;n quy &#273;&#7883;nh
t&#7841;i kho&#7843;n 2 ho&#7863;c kho&#7843;n 3 &#272;i&#7873;u 61 Lu&#7853;t
X&#7917; l\u01b0 vi ph&#7841;m hành chính l&#7841;i có yêu c&#7847;u gi&#7843;i
tr\u0301nh th\u0301 ng&#432;&#7901;i có th&#7849;m quy&#7873;n x&#7917; ph&#7841;t vi ph&#7841;m
hành chính có trách nhi&#7879;m xem xét \u01b0 ki&#7871;n gi&#7843;i tr\u0301nh c&#7911;a
cá nhân, t&#7893; ch&#7913;c vi ph&#7841;m.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>+ Gi&#7843;i tr\u0301nh b&#7857;ng v&#259;n b&#7843;n:</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>&#272;&#7889;i v&#7899;i tr&#432;&#7901;ng
h&#7907;p gi&#7843;i tr\u0301nh b&#7857;ng v&#259;n b&#7843;n, cá nhân, t&#7893; ch&#7913;c
vi ph&#7841;m hành chính ph&#7843;i g&#7917;i v&#259;n b&#7843;n gi&#7843;i
tr\u0301nh cho ng&#432;&#7901;i có th&#7849;m quy&#7873;n x&#7917; ph&#7841;t vi ph&#7841;m
hành chính trong th&#7901;i h&#7841;n 05 ngày làm vi&#7879;c, k&#7875; t&#7915;
ngày l&#7853;p biên b&#7843;n vi ph&#7841;m hành chính.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>Tr&#432;&#7901;ng h&#7907;p v&#7909; vi&#7879;c
có nhi&#7873;u t\u0301nh ti&#7871;t ph&#7913;c t&#7841;p th\u0301 ng&#432;&#7901;i có th&#7849;m
quy&#7873;n x&#7917; ph&#7841;t có th&#7875; gia h&#7841;n nh&#432;ng không quá
05 ngày làm vi&#7879;c theo &#273;&#7873; ngh&#7883; c&#7911;a cá nhân, t&#7893;
ch&#7913;c vi ph&#7841;m. Vi&#7879;c gia h&#7841;n c&#7911;a ng&#432;&#7901;i
có th&#7849;m quy&#7873;n x&#7917; ph&#7841;t ph&#7843;i b&#7857;ng v&#259;n b&#7843;n.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>Cá nhân, t&#7893; ch&#7913;c vi ph&#7841;m
hành chính t&#7921; m\u0301nh ho&#7863;c th&#7911;y quy&#7873;n cho ng&#432;&#7901;i
&#273;&#7841;i di&#7879;n h&#7907;p pháp c&#7911;a m\u0301nh th&#7921;c hi&#7879;n
vi&#7879;c gi&#7843;i tr\u0301nh b&#7857;ng v&#259;n b&#7843;n.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>- Tr&#432;&#7901;ng h&#7907;p cá nhân, t&#7893;
ch&#7913;c vi ph&#7841;m không g&#7917;i v&#259;n b&#7843;n gi&#7843;i tr\u0301nh
cho ng&#432;&#7901;i có th&#7849;m quy&#7873;n x&#7917; ph&#7841;t vi ph&#7841;m
hành chính ho&#7863;c không g&#7917;i v&#259;n b&#7843;n &#273;&#7873; ngh&#7883;
gia h&#7841;n th&#7901;i h&#7841;n gi&#7843;i tr\u0301nh trong th&#7901;i h&#7841;n
quy &#273;&#7883;nh t&#7841;i kho&#7843;n 2 &#272;i&#7873;u 61 Lu&#7853;t X&#7917;
l\u01b0 vi ph&#7841;m hành chính ho&#7863;c ghi r\u01a1 \u01b0 ki&#7871;n trong biên b&#7843;n
vi ph&#7841;m hành chính v&#7873; vi&#7879;c không th&#7921;c hi&#7879;n quy&#7873;n
gi&#7843;i tr\u0301nh, th\u0301 ng&#432;&#7901;i có th&#7849;m quy&#7873;n x&#7917; ph&#7841;t
ban hành quy&#7871;t &#273;&#7883;nh x&#7917; ph&#7841;t trong th&#7901;i h&#7841;n
quy &#273;&#7883;nh t&#7841;i &#273;i&#7875;m a kho&#7843;n 1 &#272;i&#7873;u
66 Lu&#7853;t X&#7917; l\u01b0 vi ph&#7841;m hành chính.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>- Tr&#432;&#7901;ng h&#7907;p cá nhân, t&#7893;
ch&#7913;c vi ph&#7841;m có yêu c&#7847;u gi&#7843;i tr\u0301nh theo quy &#273;&#7883;nh
t&#7841;i các kho&#7843;n 2, 3 và 4 &#272;i&#7873;u 61 Lu&#7853;t X&#7917; l\u01b0
vi ph&#7841;m hành chính, th\u0301 ng&#432;&#7901;i có th&#7849;m quy&#7873;n x&#7917;
ph&#7841;t ban hành quy&#7871;t &#273;&#7883;nh x&#7917; ph&#7841;t trong th&#7901;i
h&#7841;n quy &#273;&#7883;nh t&#7841;i các &#273;i&#7875;m b và c kho&#7843;n
1 &#272;i&#7873;u 66 Lu&#7853;t X&#7917; l\u01b0 vi ph&#7841;m hành chính.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>- Cá nhân, t&#7893; ch&#7913;c vi ph&#7841;m
hành chính không yêu c&#7847;u gi&#7843;i tr\u0301nh nh&#432;ng tr&#432;&#7899;c khi
h&#7871;t th&#7901;i h&#7841;n quy &#273;&#7883;nh t&#7841;i các kho&#7843;n 2
và 3 &#272;i&#7873;u 61 Lu&#7853;t X&#7917; l\u01b0 vi ph&#7841;m hành chính l&#7841;i
có yêu c&#7847;u gi&#7843;i tr\u0301nh, th\u0301 ng&#432;&#7901;i có th&#7849;m quy&#7873;n
x&#7917; ph&#7841;t vi ph&#7841;m hành chính có trách nhi&#7879;m xem xét \u01b0 ki&#7871;n
gi&#7843;i tr\u0301nh c&#7911;a cá nhân, t&#7893; ch&#7913;c vi ph&#7841;m theo th&#7911;
t&#7909;c quy &#273;&#7883;nh t&#7841;i các kho&#7843;n 2 và 3 &#272;i&#7873;u
61 Lu&#7853;t X&#7917; l\u01b0 vi ph&#7841;m hành chính, tr&#7915; tr&#432;&#7901;ng
h&#7907;p ph&#7843;i áp d&#7909;ng ngay bi&#7879;n pháp kh&#7855;c ph&#7909;c h&#7853;u
qu&#7843; bu&#7897;c tiêu h&#7911;y hàng hóa, v&#7853;t ph&#7849;m gây h&#7841;i
cho s&#7913;c kh&#7887;e con ng&#432;&#7901;i, v&#7853;t nuôi, cây tr&#7891;ng
và môi tr&#432;&#7901;ng, bi&#7879;n pháp kh&#7855;c ph&#7909;c t\u0301nh tr&#7841;ng
ô nhi&#7877;m môi tr&#432;&#7901;ng, lây lan d&#7883;ch, b&#7879;nh &#273;&#7889;i
v&#7899;i tang v&#7853;t vi ph&#7841;m hành chính là &#273;&#7897;ng v&#7853;t,
th&#7921;c v&#7853;t s&#7889;ng, hàng hóa, v&#7853;t ph&#7849;m d&#7877;
h&#432; h&#7887;ng, khó b&#7843;o qu&#7843;n ho&#7863;c tang v&#7853;t,
ph&#432;&#417;ng ti&#7879;n vi ph&#7841;m hành chính có nguy c&#417; ho&#7863;c
có kh&#7843; n&#259;ng gây ô nhi&#7877;m môi tr&#432;&#7901;ng, lây lan d&#7883;ch,
b&#7879;nh.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>- Vi&#7879;c gi&#7843;i tr\u0301nh và xem xét \u01b0
ki&#7871;n gi&#7843;i tr\u0301nh &#273;&#432;&#7907;c th&#7875; hi&#7879;n b&#7857;ng
v&#259;n b&#7843;n và l&#432;u trong h&#7891; s&#417; x&#7917; ph&#7841;t.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>- Tr&#432;&#7901;ng h&#7907;p khi l&#7853;p
biên vi ph&#7841;m hành chính ch&#432;a xác &#273;&#7883;nh &#273;&#432;&#7907;c
ng&#432;&#7901;i có th&#7849;m quy&#7873;n x&#7917; ph&#7841;t, th\u0301 cá nhân, t&#7893;
ch&#7913;c vi ph&#7841;m g&#7917;i v&#259;n b&#7843;n gi&#7843;i tr\u0301nh &#273;&#7871;n
ng&#432;&#7901;i có th&#7849;m quy&#7873;n l&#7853;p biên b&#7843;n. Ng&#432;&#7901;i
có th&#7849;m quy&#7873;n l&#7853;p biên b&#7843;n chuy&#7875;n h&#7891;
s&#417; v&#7909; vi&#7879;c cùng v&#259;n b&#7843;n gi&#7843;i tr\u0301nh cho
ng&#432;&#7901;i có th&#7849;m quy&#7873;n ngay khi xác &#273;&#7883;nh &#273;&#432;&#7907;c
th&#7849;m quy&#7873;n x&#7917; ph&#7841;t vi ph&#7841;m hành chính.</span></p>

<h4><a name="_Toc131755327">2.2.5. Chuy&#7875;n h&#7891; s&#417; v&#7909; vi ph&#7841;m
có d&#7845;u hi&#7879;u t&#7897;i ph&#7841;m &#273;&#7875; truy c&#7913;u trách
nhi&#7879;m h\u0301nh s&#7921;</a></h4>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>- Khi xem xét v&#7909; vi ph&#7841;m
&#273;&#7875; quy&#7871;t &#273;&#7883;nh x&#7917; ph&#7841;t vi ph&#7841;m
hành chính, n&#7871;u xét th&#7845;y hành vi vi ph&#7841;m có d&#7845;u hi&#7879;u
t&#7897;i ph&#7841;m, th\u0301 ng&#432;&#7901;i có th&#7849;m quy&#7873;n x&#7917;
ph&#7841;t ph&#7843;i chuy&#7875;n ngay h&#7891; s&#417; v&#7909; vi ph&#7841;m
cho c&#417; quan có th&#7849;m quy&#7873;n ti&#7871;n hành t&#7889; t&#7909;ng
h\u0301nh s&#7921;.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>- Trong quá tr\u0301nh thi hành quy&#7871;t
&#273;&#7883;nh x&#7917; ph&#7841;t vi ph&#7841;m hành chính, n&#7871;u hành vi
vi ph&#7841;m &#273;&#432;&#7907;c phát hi&#7879;n có d&#7845;u hi&#7879;u t&#7897;i
ph&#7841;m mà ch&#432;a h&#7871;t th&#7901;i hi&#7879;u truy c&#7913;u trách
nhi&#7879;m h\u0301nh s&#7921; th\u0301 ng&#432;&#7901;i &#273;\u0103 ra quy&#7871;t &#273;&#7883;nh
x&#7917; ph&#7841;t vi ph&#7841;m hành chính ph&#7843;i ra quy&#7871;t &#273;&#7883;nh
t&#7841;m &#273;\u0301nh ch&#7881; thi hành quy&#7871;t &#273;&#7883;nh &#273;ó và
trong th&#7901;i h&#7841;n 03 ngày, k&#7875; t&#7915; ngày t&#7841;m &#273;\u0301nh
ch&#7881; ph&#7843;i chuy&#7875;n h&#7891; s&#417; v&#7909; vi ph&#7841;m cho
c&#417; quan có th&#7849;m quy&#7873;n ti&#7871;n hành t&#7889; t&#7909;ng h\u0301nh
s&#7921;; tr&#432;&#7901;ng h&#7907;p &#273;\u0103 thi hành xong quy&#7871;t &#273;&#7883;nh
x&#7917; ph&#7841;t th\u0301 ng&#432;&#7901;i &#273;\u0103 ra quy&#7871;t &#273;&#7883;nh
x&#7917; ph&#7841;t vi ph&#7841;m hành chính ph&#7843;i chuy&#7875;n h&#7891;
s&#417; v&#7909; vi ph&#7841;m cho c&#417; quan có th&#7849;m quy&#7873;n ti&#7871;n
hành t&#7889; t&#7909;ng h\u0301nh s&#7921;.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>- C&#417; quan có th&#7849;m quy&#7873;n
ti&#7871;n hành t&#7889; t&#7909;ng h\u0301nh s&#7921; có trách nhi&#7879;m xem xét,
k&#7871;t lu&#7853;n v&#7909; vi&#7879;c và tr&#7843; l&#7901;i k&#7871;t qu&#7843;
gi&#7843;i quy&#7871;t b&#7857;ng v&#259;n b&#7843;n cho ng&#432;&#7901;i có th&#7849;m
quy&#7873;n &#273;\u0103 chuy&#7875;n h&#7891; s&#417; trong th&#7901;i h&#7841;n
theo quy &#273;&#7883;nh c&#7911;a pháp lu&#7853;t t&#7889; t&#7909;ng h\u0301nh s&#7921;;
tr&#432;&#7901;ng h&#7907;p không kh&#7903;i t&#7889; v&#7909; án h\u0301nh s&#7921;
th\u0301 trong th&#7901;i h&#7841;n 03 ngày, k&#7875; t&#7915; ngày có quy&#7871;t
&#273;&#7883;nh không kh&#7903;i t&#7889; v&#7909; án h\u0301nh s&#7921;, c&#417;
quan có th&#7849;m quy&#7873;n ti&#7871;n hành t&#7889; t&#7909;ng ph&#7843;i
tr&#7843; h&#7891; s&#417; v&#7909; vi&#7879;c cho ng&#432;&#7901;i có th&#7849;m
quy&#7873;n x&#7917; ph&#7841;t &#273;\u0103 chuy&#7875;n h&#7891; s&#417; &#273;&#7871;n.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>Tr&#432;&#7901;ng h&#7907;p quy &#273;&#7883;nh
t&#7841;i kho&#7843;n 2 &#272;i&#7873;u 62 Lu&#7853;t x&#7917; l\u01b0 vi ph&#7841;m
hành chính, n&#7871;u c&#417; quan có th&#7849;m quy&#7873;n ti&#7871;n hành t&#7889;
t&#7909;ng h\u0301nh s&#7921; có quy&#7871;t &#273;&#7883;nh kh&#7903;i t&#7889; v&#7909;
án th\u0301 ng&#432;&#7901;i có th&#7849;m quy&#7873;n x&#7917; ph&#7841;t vi ph&#7841;m
hành chính ph&#7843;i h&#7911;y b&#7887; quy&#7871;t &#273;&#7883;nh x&#7917;
ph&#7841;t vi ph&#7841;m hành chính và chuy&#7875;n toàn b&#7897; tang v&#7853;t,
ph&#432;&#417;ng ti&#7879;n vi ph&#7841;m hành chính và tài li&#7879;u v&#7873;
vi&#7879;c thi hành quy&#7871;t &#273;&#7883;nh x&#7917; ph&#7841;t cho c&#417;
quan có th&#7849;m quy&#7873;n ti&#7871;n hành t&#7889; t&#7909;ng h\u0301nh s&#7921;.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>- Vi&#7879;c chuy&#7875;n h&#7891; s&#417;
v&#7909; vi ph&#7841;m có d&#7845;u hi&#7879;u t&#7897;i ph&#7841;m &#273;&#7875;
truy c&#7913;u trách nhi&#7879;m h\u0301nh s&#7921; ph&#7843;i &#273;&#432;&#7907;c
thông báo b&#7857;ng v&#259;n b&#7843;n cho cá nhân, t&#7893; ch&#7913;c vi ph&#7841;m.</span></p>

<h4><a name="_Toc131755328">2.2.6. Chuy&#7875;n h&#7891; s&#417; v&#7909; vi ph&#7841;m
&#273;&#7875; x&#7917; ph&#7841;t hành chính</a></h4>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>- &#272;&#7889;i v&#7899;i v&#7909; vi&#7879;c
do c&#417; quan có th&#7849;m quy&#7873;n ti&#7871;n hành t&#7889; t&#7909;ng
h\u0301nh s&#7921; th&#7909; l\u01b0, gi&#7843;i quy&#7871;t, nh&#432;ng sau &#273;ó l&#7841;i
có m&#7897;t trong các quy&#7871;t &#273;&#7883;nh không kh&#7903;i t&#7889; v&#7909;
án h\u0301nh s&#7921;, quy&#7871;t &#273;&#7883;nh h&#7911;y b&#7887; quy&#7871;t
&#273;&#7883;nh kh&#7903;i t&#7889; v&#7909; án h\u0301nh s&#7921;, quy&#7871;t
&#273;&#7883;nh &#273;\u0301nh ch&#7881; &#273;i&#7873;u tra, quy&#7871;t &#273;&#7883;nh
&#273;\u0301nh ch&#7881; v&#7909; án, quy&#7871;t &#273;&#7883;nh &#273;\u0301nh ch&#7881;
v&#7909; án &#273;&#7889;i v&#7899;i b&#7883; can, mi&#7877;n trách nhi&#7879;m,
h\u0301nh s&#7921; theo b&#7843;n án n&#7871;u hành vi có d&#7845;u hi&#7879;u vi ph&#7841;m
hành chính th\u0301 c&#417; quan có th&#7849;m quy&#7873;n ti&#7871;n hành t&#7889;
t&#7909;ng h\u0301nh s&#7921; ph&#7843;i chuy&#7875;n quy&#7871;t &#273;&#7883;nh
nêu trên kèm theo h&#7891; s&#417;, tang v&#7853;t, ph&#432;&#417;ng ti&#7879;n
c&#7911;a v&#7909; vi ph&#7841;m (n&#7871;u có) và v&#259;n b&#7843;n &#273;&#7873;
ngh&#7883; x&#7917; ph&#7841;t vi ph&#7841;m hành chính &#273;&#7871;n ng&#432;&#7901;i
có th&#7849;m quy&#7873;n x&#7917; ph&#7841;t vi ph&#7841;m hành chính trong th&#7901;i
h&#7841;n 03 ngày làm vi&#7879;c, k&#7875; t&#7915; ngày quy&#7871;t &#273;&#7883;nh
có hi&#7879;u l&#7921;c.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>- Vi&#7879;c x&#7917; ph&#7841;t vi ph&#7841;m
hành chính &#273;&#432;&#7907;c c&#259;n c&#7913; vào h&#7891; s&#417; v&#7909;
vi ph&#7841;m do c&#417; quan (quy &#273;&#7883;nh t&#7841;i kho&#7843;n 1
&#272;i&#7873;u 63 Lu&#7853;t x&#7917; l\u01b0 vi ph&#7841;m hành chính) chuy&#7875;n
&#273;&#7871;n. Tr&#432;&#7901;ng h&#7907;p c&#7847;n thi&#7871;t ph&#7843;i
xác minh thêm t\u0301nh ti&#7871;t &#273;&#7875; có c&#259;n c&#7913; ra quy&#7871;t
&#273;&#7883;nh x&#7917; ph&#7841;t, ng&#432;&#7901;i có th&#7849;m quy&#7873;n
x&#7917; ph&#7841;t có th&#7875; l&#7853;p biên b&#7843;n xác minh t\u0301nh ti&#7871;t
c&#7911;a v&#7909; vi&#7879;c vi ph&#7841;m hành chính theo quy &#273;&#7883;nh
t&#7841;i &#272;i&#7873;u 59 Lu&#7853;t x&#7917; l\u01b0 vi ph&#7841;m hành chính.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>- Th&#7901;i h&#7841;n ra quy&#7871;t
&#273;&#7883;nh x&#7917; ph&#7841;t vi ph&#7841;m hành chính là 30 ngày, k&#7875;
t&#7915; ngày nh&#7853;n &#273;&#432;&#7907;c các quy&#7871;t &#273;&#7883;nh
quy &#273;&#7883;nh t&#7841;i kho&#7843;n 1 &#272;i&#7873;u 63 Lu&#7853;t x&#7917;
l\u01b0 vi ph&#7841;m hành chính kèm theo h&#7891; s&#417; v&#7909; vi ph&#7841;m.
Trong tr&#432;&#7901;ng h&#7907;p c&#7847;n xác minh thêm quy &#273;&#7883;nh t&#7841;i
kho&#7843;n 2 &#272;i&#7873;u 63 Lu&#7853;t x&#7917; l\u01b0 vi ph&#7841;m hành
chính th\u0301 th&#7901;i h&#7841;n t&#7889;i &#273;a không quá 45 ngày.</span></p>

<h4><a name="_Toc131755329">2.2.7. S&#7917; d&#7909;ng ph&#432;&#417;ng ti&#7879;n,
thi&#7871;t b&#7883; k&#7929; thu&#7853;t nghi&#7879;p v&#7909; trong vi&#7879;c
phát hi&#7879;n vi ph&#7841;m hành chính</a></h4>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>- C&#417; quan, ng&#432;&#7901;i có th&#7849;m
quy&#7873;n x&#7917; ph&#7841;t vi ph&#7841;m hành chính, cá nhân, t&#7893; ch&#7913;c
&#273;&#432;&#7907;c giao qu&#7843;n l\u01b0 ph&#432;&#417;ng ti&#7879;n, thi&#7871;t
b&#7883; k&#7929; thu&#7853;t nghi&#7879;p v&#7909; &#273;&#432;&#7907;c s&#7917;
d&#7909;ng ph&#432;&#417;ng ti&#7879;n, thi&#7871;t b&#7883; k&#7929; thu&#7853;t
nghi&#7879;p v&#7909; &#273;&#7875; phát hi&#7879;n vi ph&#7841;m hành chính v&#7873;
tr&#7853;t t&#7921;, an toàn giao thông, b&#7843;o v&#7879; môi tr&#432;&#7901;ng,
ph\u0323ng cháy, ch&#7919;a cháy, c&#7913;u n&#7841;n, c&#7913;u h&#7897;, ph\u0323ng, ch&#7889;ng
ma túy, ph\u0323ng, ch&#7889;ng tác h&#7841;i c&#7911;a r&#432;&#7907;u, bia và
l&#297;nh v&#7921;c khác do Chính ph&#7911; quy &#273;&#7883;nh sau khi
&#273;&#432;&#7907;c s&#7921; &#273;&#7891;ng \u01b0 c&#7911;a &#7910;y ban th&#432;&#7901;ng
v&#7909; Qu&#7889;c h&#7897;i.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>- Vi&#7879;c qu&#7843;n l\u01b0, s&#7917; d&#7909;ng
và quy &#273;&#7883;nh danh m&#7909;c ph&#432;&#417;ng ti&#7879;n, thi&#7871;t
b&#7883; k&#7929; thu&#7853;t nghi&#7879;p v&#7909; ph&#7843;i b&#7843;o &#273;&#7843;m
các yêu c&#7847;u, &#273;i&#7873;u ki&#7879;n sau &#273;ây:</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>+ Tôn tr&#7885;ng quy&#7873;n t&#7921; do,
danh d&#7921;, nhân ph&#7849;m, bí m&#7853;t &#273;&#7901;i t&#432; c&#7911;a
công dân, các quy&#7873;n và l&#7907;i ích h&#7907;p pháp khác c&#7911;a cá
nhân và t&#7893; ch&#7913;c;</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>+ Tuân th&#7911; &#273;úng quy tr\u0301nh, quy
t&#7855;c v&#7873; s&#7917; d&#7909;ng ph&#432;&#417;ng ti&#7879;n, thi&#7871;t
b&#7883; k&#7929; thu&#7853;t nghi&#7879;p v&#7909;;</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>+ K&#7871;t qu&#7843; thu th&#7853;p
&#273;&#432;&#7907;c b&#7857;ng ph&#432;&#417;ng ti&#7879;n, thi&#7871;t b&#7883;
k&#7929; thu&#7853;t nghi&#7879;p v&#7909; ph&#7843;i &#273;&#432;&#7907;c ghi
nh&#7853;n b&#7857;ng v&#259;n b&#7843;n và ch&#7881; &#273;&#432;&#7907;c s&#7917;
d&#7909;ng trong x&#7917; ph&#7841;t vi ph&#7841;m hành chính;</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>+ Ph&#432;&#417;ng ti&#7879;n, thi&#7871;t
b&#7883; k&#7929; thu&#7853;t nghi&#7879;p v&#7909; ph&#7843;i b&#7843;o &#273;&#7843;m
&#273;úng tiêu chu&#7849;n, quy chu&#7849;n k&#7929; thu&#7853;t và &#273;\u0103
&#273;&#432;&#7907;c ki&#7875;m &#273;&#7883;nh, hi&#7879;u chu&#7849;n, th&#7917;
nghi&#7879;m theo quy &#273;&#7883;nh c&#7911;a pháp lu&#7853;t; tiêu chu&#7849;n,
quy chu&#7849;n k&#7929; thu&#7853;t ph&#7843;i &#273;&#432;&#7907;c duy tr\u0301
trong su&#7889;t quá tr\u0301nh s&#7917; d&#7909;ng và gi&#7919;a hai k&#7923; ki&#7875;m
&#273;&#7883;nh, hi&#7879;u chu&#7849;n, th&#7917; nghi&#7879;m.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>- Vi&#7879;c s&#7917; d&#7909;ng, b&#7843;o
qu&#7843;n k&#7871;t qu&#7843; thu th&#7853;p &#273;&#432;&#7907;c b&#7857;ng
ph&#432;&#417;ng ti&#7879;n, thi&#7871;t b&#7883; k&#7929; thu&#7853;t nghi&#7879;p

hành chính có l&#7853;p biên b&#7843;n mà thi&#7871;t k&#7871; theo
ph&#432;&#417;ng pháp lo&#7841;i tr&#7915; và &#273;&#432;&#7907;c quy &#273;&#7883;nh
t&#7841;i &#272;i&#7873;u 57 c&#7911;a Lu&#7853;t XLVPH, theo &#273;ó: X&#7917;
ph&#7841;t vi ph&#7841;m hành chính có l&#7853;p biên b&#7843;n &#273;&#432;&#7907;c
áp d&#7909;ng &#273;&#7889;i v&#7899;i hành vi vi ph&#7841;m hành chính c&#7911;a
cá nhân, t&#7893; ch&#7913;c vi ph&#7841;m hành chính không thu&#7897;c
tr&#432;&#7901;ng h&#7907;p quy &#273;&#7883;nh t&#7841;i &#273;o&#7841;n 1 kho&#7843;n
1 &#272;i&#7873;u 56 c&#7911;a Lu&#7853;t XLVPHC. Cùng v&#7899;i Lu&#7853;t
XLVPH, các v&#259;n b&#7843;n h&#432;&#7899;ng d&#7851;n thi hành c&#361;ng quy
&#273;&#7883;nh vi&#7879;c t&#7893; ch&#7913;c thi hành quy&#7871;t &#273;&#7883;nh
x&#7917; ph&#7841;t vi ph&#7841;m hành chính có l&#7853;p biên b&#7843;n v&#7899;i
các h\u0301nh th&#7913;c x&#7917; ph&#7841;t, bi&#7879;n pháp kh&#7855;c ph&#7909;c
h&#7853;u qu&#7843;, c&#7909; th&#7875;:</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>- &#272;i&#7873;u 57, &#272;i&#7873;u 58,
&#272;i&#7873;u 63; t&#7915; &#272;i&#7873;u 71 &#273;&#7871;n &#272;i&#7873;u
85 c&#7911;a Lu&#7853;t XLVPHC;</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>- &#272;i&#7873;u 19 &#273;&#7871;n
&#272;i&#7873;u 24 c&#7911;a Ngh&#7883; &#273;&#7883;nh s&#7889;
118/2021/N&#272;-CP.</span></p>

<p class=MsoTitle><a name="_Toc131755343">2.2. Cách th&#7913;c, tr\u0301nh t&#7921;
t&#7893; ch&#7913;c th&#7921;c hi&#7879;n</a></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>- Thi hành quy&#7871;t &#273;&#7883;nh x&#7917;
ph&#7841;t vi ph&#7841;m hành chính</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>Cá nhân, t&#7893; ch&#7913;c b&#7883; x&#7917;
ph&#7841;t vi ph&#7841;m hành chính ph&#7843;i ch&#7845;p hành quy&#7871;t
&#273;&#7883;nh x&#7917; ph&#7841;t trong th&#7901;i h&#7841;n 10 ngày, k&#7875;
t&#7915; ngày nh&#7853;n quy&#7871;t &#273;&#7883;nh x&#7917; ph&#7841;t vi ph&#7841;m
hành chính; tr&#432;&#7901;ng h&#7907;p quy&#7871;t &#273;&#7883;nh x&#7917; ph&#7841;t
vi ph&#7841;m hành chính có ghi th&#7901;i h&#7841;n thi hành nhi&#7873;u
h&#417;n 10 ngày th\u0301 th&#7921;c hi&#7879;n theo th&#7901;i h&#7841;n &#273;ó.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>Tr&#432;&#7901;ng h&#7907;p cá nhân, t&#7893;
ch&#7913;c b&#7883; x&#7917; ph&#7841;t khi&#7871;u n&#7841;i, kh&#7903;i ki&#7879;n
&#273;&#7889;i v&#7899;i quy&#7871;t &#273;&#7883;nh x&#7917; ph&#7841;t vi ph&#7841;m
hành chính th\u0301 v&#7851;n ph&#7843;i ch&#7845;p hành quy&#7871;t &#273;&#7883;nh
x&#7917; ph&#7841;t (tr&#7915; tr&#432;&#7901;ng h&#7907;p xét th&#7845;y vi&#7879;c
thi hành quy&#7871;t &#273;&#7883;nh x&#7917; l\u01b0 vi ph&#7841;m hành chính b&#7883;
khi&#7871;u n&#7841;i, kh&#7903;i ki&#7879;n s&#7869; gây h&#7853;u qu&#7843;
khó kh&#7855;c ph&#7909;c th\u0301 ng&#432;&#7901;i gi&#7843;i quy&#7871;t khi&#7871;u
n&#7841;i, kh&#7903;i ki&#7879;n ph&#7843;i ra quy&#7871;t &#273;&#7883;nh t&#7841;m
&#273;\u0301nh ch&#7881; vi&#7879;c thi hành quy&#7871;t &#273;&#7883;nh &#273;ó
theo quy &#273;&#7883;nh c&#7911;a pháp lu&#7853;t). Vi&#7879;c khi&#7871;u n&#7841;i,
kh&#7903;i ki&#7879;n &#273;&#432;&#7907;c gi&#7843;i quy&#7871;t theo quy
&#273;&#7883;nh c&#7911;a pháp lu&#7853;t.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>Ng&#432;&#7901;i có th&#7849;m quy&#7873;n
x&#7917; ph&#7841;t &#273;\u0103 ra quy&#7871;t &#273;&#7883;nh x&#7917; ph&#7841;t
có trách nhi&#7879;m theo d\u01a1i, ki&#7875;m tra vi&#7879;c ch&#7845;p hành quy&#7871;t
&#273;&#7883;nh x&#7917; ph&#7841;t c&#7911;a cá nhân, t&#7893; ch&#7913;c b&#7883;
x&#7917; ph&#7841;t và thông báo k&#7871;t qu&#7843; thi hành xong quy&#7871;t
&#273;&#7883;nh cho c&#417; quan qu&#7843;n l\u01b0 c&#417; s&#7903; d&#7919; li&#7879;u
v&#7873; x&#7917; l\u01b0 vi ph&#7841;m hành chính c&#7911;a B&#7897; T&#432; pháp,
c&#417; quan t&#432; pháp &#273;&#7883;a ph&#432;&#417;ng.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>- Th&#7901;i hi&#7879;u thi hành quy&#7871;t
&#273;&#7883;nh x&#7917; ph&#7841;t vi ph&#7841;m hành chính:</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>Th&#7901;i hi&#7879;u thi hành quy&#7871;t
&#273;&#7883;nh x&#7917; ph&#7841;t vi ph&#7841;m hành chính &#273;&#432;&#7907;c
quy &#273;&#7883;nh t&#7841;i &#272;i&#7873;u 74 Lu&#7853;t XLVPHC, nh&#432;
sau:</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>+ Th&#7901;i hi&#7879;u thi hành quy&#7871;t
&#273;&#7883;nh x&#7917; ph&#7841;t vi ph&#7841;m hành chính là 01 n&#259;m, k&#7875;
t&#7915; ngày ra quy&#7871;t &#273;&#7883;nh, quá th&#7901;i h&#7841;n này th\u0301
không thi hành quy&#7871;t &#273;&#7883;nh &#273;ó n&#7919;a, tr&#7915;
tr&#432;&#7901;ng h&#7907;p quy&#7871;t &#273;&#7883;nh x&#7917; ph&#7841;t có
áp d&#7909;ng h\u0301nh th&#7913;c x&#7917; ph&#7841;t t&#7883;ch thu tang v&#7853;t,
ph&#432;&#417;ng ti&#7879;n vi ph&#7841;m hành chính, bi&#7879;n pháp kh&#7855;c
ph&#7909;c h&#7853;u qu&#7843; th\u0301 v&#7851;n ph&#7843;i t&#7883;ch thu tang v&#7853;t,
ph&#432;&#417;ng ti&#7879;n, áp d&#7909;ng bi&#7879;n pháp kh&#7855;c ph&#7909;c
h&#7853;u qu&#7843;.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>+ Trong tr&#432;&#7901;ng h&#7907;p cá
nhân, t&#7893; ch&#7913;c b&#7883; x&#7917; ph&#7841;t c&#7889; t\u0301nh tr&#7889;n
tránh, tr\u0301 ho\u0103n th\u0301 th&#7901;i hi&#7879;u nói trên &#273;&#432;&#7907;c tính k&#7875;
t&#7915; th&#7901;i &#273;i&#7875;m ch&#7845;m d&#7913;t hành vi tr&#7889;n
tránh, tr\u0301 ho\u0103n.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>Theo quy &#273;&#7883;nh c&#7911;a Lu&#7853;t
XLVPHC th\u0301 vi&#7879;c t&#7893; ch&#7913;c th&#7921;c hi&#7879;n thi hành quy&#7871;t
&#273;&#7883;nh x&#7917; ph&#7841;t vi ph&#7841;m hành chính có l&#7853;p biên
b&#7843;n ph&#7913;c t&#7841;p h&#417;n nhi&#7873;u so v&#7899;i vi&#7879;c t&#7893;
ch&#7913;c thi hành quy&#7871;t &#273;&#7883;nh x&#7917; ph&#7841;t vi ph&#7841;m
hành chính không l&#7853;p biên b&#7843;n do tính ch&#7845;t m&#7895;i h\u0301nh th&#7913;c
x&#7917; ph&#7841;t c&#361;ng nh&#432; các bi&#7879;n pháp kh&#7855;c ph&#7909;c
h&#7853;u qu&#7843; áp d&#7909;ng &#273;&#7889;i v&#7899;i t&#7915;ng hành vi
vi ph&#7841;m hành chính t&#432;&#417;ng &#7913;ng, c&#7909; th&#7875;:</span></p>

<h4><a name="_Toc131755344">2.2.1. T&#7893; ch&#7913;c thi hành quy&#7871;t
&#273;&#7883;nh x&#7917; ph&#7841;t ti&#7873;n</a></h4>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><b style='font-family:"Times New Roman",serif'>a. B&#432;&#7899;c
1: Ban hành quy&#7871;t &#273;&#7883;nh x&#7917; ph&#7841;t vi ph&#7841;m hành
chính</span></b></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>Ban hành quy&#7871;t &#273;&#7883;nh x&#7917;
ph&#7841;t vi ph&#7841;m hành chính và g&#7917;i cho cá nhân, t&#7893; ch&#7913;c
b&#7883; x&#7917; ph&#7841;t, c&#417; quan thu ti&#7873;n ph&#7841;t và c&#417;
quan liên quan khác (n&#7871;u có) &#273;&#7875; thi hành. Th&#7901;i h&#7841;n
02 ngày làm vi&#7879;c, k&#7875; t&#7915; ngày ra quy&#7871;t &#273;&#7883;nh x&#7917;
ph&#7841;t vi ph&#7841;m hành chính có l&#7853;p biên b&#7843;n.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>L&#432;u \u01b0:</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>- Quy&#7871;t &#273;&#7883;nh x&#7917; ph&#7841;t
vi ph&#7841;m hành chính &#273;&#432;&#7907;c giao tr&#7921;c ti&#7871;p ho&#7863;c
g&#7917;i qua b&#432;u &#273;i&#7879;n b&#7857;ng h\u0301nh th&#7913;c b&#7843;o
&#273;&#7843;m và thông báo cho cá nhân, t&#7893; ch&#7913;c b&#7883; x&#7917;
ph&#7841;t bi&#7871;t.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>- &#272;&#7889;i v&#7899;i tr&#432;&#7901;ng
h&#7907;p quy&#7871;t &#273;&#7883;nh &#273;&#432;&#7907;c giao tr&#7921;c ti&#7871;p
mà cá nhân, t&#7893; ch&#7913;c vi ph&#7841;m c&#7889; t\u0301nh không nh&#7853;n
quy&#7871;t &#273;&#7883;nh th\u0301 ng&#432;&#7901;i có th&#7849;m quy&#7873;n l&#7853;p
biên b&#7843;n v&#7873; vi&#7879;c không nh&#7853;n quy&#7871;t &#273;&#7883;nh
có xác nh&#7853;n c&#7911;a chính quy&#7873;n &#273;&#7883;a ph&#432;&#417;ng
và &#273;&#432;&#7907;c coi là quy&#7871;t &#273;&#7883;nh &#273;\u0103 &#273;&#432;&#7907;c
giao.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>- &#272;&#7889;i v&#7899;i tr&#432;&#7901;ng
h&#7907;p g&#7917;i qua b&#432;u &#273;i&#7879;n b&#7857;ng h\u0301nh th&#7913;c b&#7843;o
&#273;&#7843;m, n&#7871;u sau th&#7901;i h&#7841;n 10 ngày, k&#7875; t&#7915;
ngày quy&#7871;t &#273;&#7883;nh x&#7917; ph&#7841;t &#273;\u0103 &#273;&#432;&#7907;c
g&#7917;i qua &#273;&#432;&#7901;ng b&#432;u &#273;i&#7879;n &#273;&#7871;n l&#7847;n
th&#7913; ba mà b&#7883; tr&#7843; l&#7841;i do cá nhân, t&#7893; ch&#7913;c vi
ph&#7841;m c&#7889; t\u0301nh không nh&#7853;n; quy&#7871;t &#273;&#7883;nh x&#7917;
ph&#7841;t &#273;\u0103 &#273;&#432;&#7907;c niêm y&#7871;t t&#7841;i n&#417;i
c&#432; trú c&#7911;a cá nhân, tr&#7909; s&#7903; c&#7911;a t&#7893; ch&#7913;c
b&#7883; x&#7917; ph&#7841;t ho&#7863;c có c&#259;n c&#7913; cho r&#7857;ng
ng&#432;&#7901;i vi ph&#7841;m tr&#7889;n tránh không nh&#7853;n quy&#7871;t
&#273;&#7883;nh x&#7917; ph&#7841;t th\u0301 &#273;&#432;&#7907;c coi là quy&#7871;t
&#273;&#7883;nh &#273;\u0103 &#273;&#432;&#7907;c giao.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><b style='font-family:"Times New Roman",serif'>b. B&#432;&#7899;c
2: N&#7897;p ti&#7873;n ph&#7841;t</span></b></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>- Trong th&#7901;i h&#7841;n 10 ngày, k&#7875;
t&#7915; ngày nh&#7853;n quy&#7871;t &#273;&#7883;nh x&#7917; ph&#7841;t
(tr&#432;&#7901;ng h&#7907;p quy&#7871;t &#273;&#7883;nh x&#7917; ph&#7841;t có
ghi th&#7901;i h&#7841;n thi hành nhi&#7873;u h&#417;n 10 ngày th\u0301 th&#7921;c
hi&#7879;n theo th&#7901;i h&#7841;n &#273;ó), cá nhân, t&#7893; ch&#7913;c b&#7883;
x&#7917; ph&#7841;t ph&#7843;i n&#7897;p ti&#7873;n ph&#7841;t t&#7841;i Kho b&#7841;c
Nhà n&#432;&#7899;c ho&#7863;c n&#7897;p vào tài kho&#7843;n c&#7911;a Kho b&#7841;c
Nhà n&#432;&#7899;c &#273;&#432;&#7907;c ghi trong quy&#7871;t &#273;&#7883;nh
x&#7917; ph&#7841;t, tr&#7915; tr&#432;&#7901;ng h&#7907;p &#273;\u0103 n&#7897;p ti&#7873;n
ph&#7841;t theo quy &#273;&#7883;nh t&#7841;i kho&#7843;n 2 &#272;i&#7873;u 78
c&#7911;a Lu&#7853;t XLVPHC.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>- L&#432;u \u01b0:</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>+ Cá nhân, t&#7893; ch&#7913;c vi ph&#7841;m
hành chính b&#7883; ph&#7841;t ti&#7873;n ph&#7843;i n&#7897;p ti&#7873;n ph&#7841;t
m&#7897;t l&#7847;n, tr&#7915; tr&#432;&#7901;ng h&#7907;p n&#7897;p ti&#7873;n
ph&#7841;t nhi&#7873;u l&#7847;n theo quy &#273;&#7883;nh t&#7841;i &#272;i&#7873;u
79 c&#7911;a c&#7911;a Lu&#7853;t XLVPhC.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>+ N&#7871;u quá th&#7901;i h&#7841;n nêu
trên mà cá nhân, t&#7893; ch&#7913;c b&#7883; x&#7917; ph&#7841;t không n&#7897;p
ti&#7873;n ph&#7841;t s&#7869; b&#7883; c&#432;&#7905;ng ch&#7871; thi hành quy&#7871;t
&#273;&#7883;nh x&#7917; ph&#7841;t và c&#7913; m&#7895;i ngày ch&#7853;m n&#7897;p
ti&#7873;n ph&#7841;t th\u0301 cá nhân, t&#7893; ch&#7913;c vi ph&#7841;m ph&#7843;i
n&#7897;p thêm 0,05% tính trên t&#7893;ng s&#7889; ti&#7873;n ph&#7841;t
ch&#432;a n&#7897;p.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>+ &#272;&#7889;i v&#7899;i vùng sâu, vùng
xa, biên gi&#7899;i, mi&#7873;n núi mà vi&#7879;c &#273;i l&#7841;i g&#7863;p
khó kh&#259;n th\u0301 cá nhân, t&#7893; ch&#7913;c b&#7883; x&#7917; ph&#7841;t có
th&#7875; n&#7897;p ti&#7873;n ph&#7841;t cho ng&#432;&#7901;i có th&#7849;m
quy&#7873;n x&#7917; ph&#7841;t. Ng&#432;&#7901;i có th&#7849;m quy&#7873;n x&#7917;
ph&#7841;t có trách nhi&#7879;m thu ti&#7873;n ph&#7841;t t&#7841;i ch&#7895;
và n&#7897;p t&#7841;i Kho b&#7841;c Nhà n&#432;&#7899;c ho&#7863;c n&#7897;p
vào tài kho&#7843;n c&#7911;a Kho b&#7841;c Nhà n&#432;&#7899;c trong th&#7901;i
h&#7841;n không quá 07 ngày, k&#7875; t&#7915; ngày thu ti&#7873;n ph&#7841;t.</span></p>
