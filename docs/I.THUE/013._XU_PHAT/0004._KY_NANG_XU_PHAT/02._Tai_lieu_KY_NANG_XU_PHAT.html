<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>Trong quá tr\u0301nh gi&#7843;i quy&#7871;t khi&#7871;u
n&#7841;i l&#7847;n hai, ng&#432;&#7901;i xác minh làm vi&#7879;c tr&#7921;c ti&#7871;p
v&#7899;i ng&#432;&#7901;i b&#7883; khi&#7871;u n&#7841;i, yêu c&#7847;u cung c&#7845;p
thông tin, tài li&#7879;u, b&#7857;ng ch&#7913;ng có liên quan &#273;&#7871;n n&#7897;i
dung khi&#7871;u n&#7841;i &#273;&#7889;i v&#7899;i quy&#7871;t &#273;&#7883;nh
x&#7917; ph&#7841;t vi ph&#7841;m hành chính và vi&#7879;c gi&#7843;i quy&#7871;t
khi&#7871;u n&#7841;i l&#7847;n &#273;&#7847;u, gi&#7843;i tr\u0301nh v&#7873; quy&#7871;t
&#273;&#7883;nh x&#7917; ph&#7841;t vi ph&#7841;m hành chính b&#7883; khi&#7871;u
n&#7841;i.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>N&#7897;i dung làm vi&#7879;c &#273;&#432;&#7907;c
l&#7853;p thành biên b&#7843;n, ghi r\u01a1 th&#7901;i gian, &#273;&#7883;a &#273;i&#7875;m,
thành ph&#7847;n, n&#7897;i dung và có ch&#7919; k\u01b0 c&#7911;a các bên. Biên b&#7843;n
&#273;&#432;&#7907;c l&#7853;p thành ít nh&#7845;t hai b&#7843;n, m&#7895;i bên
gi&#7919; m&#7897;t b&#7843;n. Biên b&#7843;n làm vi&#7879;c th&#7921;c hi&#7879;n
theo M&#7851;u s&#7889; 06 ban hành kèm theo Ngh&#7883; &#273;&#7883;nh
124/2020/N&#272;-CP.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>d. Yêu c&#7847;u c&#417; quan, t&#7893; ch&#7913;c
cá nhân có liên quan cung c&#7845;p thông tin, tài li&#7879;u, b&#7857;ng ch&#7913;ng</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>Trong quá tr\u0301nh xác minh n&#7897;i dung
khi&#7871;u n&#7841;i, ng&#432;&#7901;i gi&#7843;i quy&#7871;t khi&#7871;u n&#7841;i
ho&#7863;c ng&#432;&#7901;i có trách nhi&#7879;m xác minh g&#7917;i v&#259;n b&#7843;n
yêu c&#7847;u c&#417; quan, t&#7893; ch&#7913;c, &#273;&#417;n v&#7883;, cá
nhân có liên quan cung c&#7845;p thông tin, tài li&#7879;u, b&#7857;ng ch&#7913;ng
liên quan &#273;&#7871;n n&#7897;i dung khi&#7871;u n&#7841;i. Vi&#7879;c cung
c&#7845;p thông tin, tài li&#7879;u, b&#7857;ng ch&#7913;ng &#273;&#432;&#7907;c
th&#7921;c hi&#7879;n trong th&#7901;i h&#7841;n 07 ngày làm vi&#7879;c, k&#7875;
t&#7915; ngày nh&#7853;n &#273;&#432;&#7907;c v&#259;n b&#7843;n yêu c&#7847;u.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>Trong tr&#432;&#7901;ng h&#7907;p làm vi&#7879;c
tr&#7921;c ti&#7871;p v&#7899;i c&#417; quan, t&#7893; ch&#7913;c,
&#273;&#417;n v&#7883;, cá nhân có liên quan, ng&#432;&#7901;i gi&#7843;i quy&#7871;t
khi&#7871;u n&#7841;i ho&#7863;c ng&#432;&#7901;i có trách nhi&#7879;m xác minh
thông báo tr&#432;&#7899;c th&#7901;i gian, &#273;&#7883;a &#273;i&#7875;m, n&#7897;i
dung làm vi&#7879;c và yêu c&#7847;u cung c&#7845;p các thông tin, tài li&#7879;u,
b&#7857;ng ch&#7913;ng ph&#7909;c v&#7909; cho bu&#7893;i làm vi&#7879;c.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>N&#7897;i dung làm vi&#7879;c &#273;&#432;&#7907;c
l&#7853;p thành biên b&#7843;n ghi r\u01a1 th&#7901;i gian, &#273;&#7883;a &#273;i&#7875;m,
thành ph&#7847;n, n&#7897;i dung, các thông tin, tài li&#7879;u, b&#7857;ng ch&#7913;ng
&#273;&#432;&#7907;c giao, nh&#7853;n t&#7841;i bu&#7893;i làm vi&#7879;c và có
ch&#7919; k\u01b0 c&#7911;a các bên. Biên b&#7843;n &#273;&#432;&#7907;c l&#7853;p
thành ít nh&#7845;t hai b&#7843;n, m&#7895;i bên gi&#7919; m&#7897;t b&#7843;n.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>e. Xác minh th&#7921;c t&#7871;, xác nh&#7853;n
c&#7911;a c&#417; quan có th&#7849;m quy&#7873;n</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>Khi c&#7847;n thi&#7871;t, ng&#432;&#7901;i
gi&#7843;i quy&#7871;t khi&#7871;u n&#7841;i ho&#7863;c ng&#432;&#7901;i có
trách nhi&#7879;m xác minh ti&#7871;n hành xác minh th&#7921;c t&#7871; &#273;&#7875;
thu th&#7853;p, ki&#7875;m tra, xác &#273;&#7883;nh tính chính xác, h&#7907;p
pháp, &#273;&#7847;y &#273;&#7911; c&#7911;a các thông tin, tài li&#7879;u, b&#7857;ng
ch&#7913;ng liên quan &#273;&#7871;n n&#7897;i dung khi&#7871;u n&#7841;i
&#273;&#7889;i v&#7899;i quy&#7871;t &#273;&#7883;nh x&#7917; ph&#7841;t vi ph&#7841;m
hành chính.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>Vi&#7879;c ki&#7875;m tra, &#273;&#7889;i
chi&#7871;u, xem xét c&#7909; th&#7875; h&#7891; s&#417;, tài li&#7879;u liên
quan t&#7841;i n&#417;i có v&#7909; vi&#7879;c là c&#7847;n thi&#7871;t.
&#272;ây là m&#7897;t trong bi&#7879;n pháp có &#273;&#7897; tin c&#7853;y cao
trong xác minh n&#7897;i dung khi&#7871;u n&#7841;i &#273;&#7889;i v&#7899;i
quy&#7871;t &#273;&#7883;nh x&#7917; ph&#7841;t vi ph&#7841;m hành chính. B&#7903;i
v\u0301 nhi&#7873;u tr&#432;&#7901;ng h&#7907;p ng&#432;&#7901;i khi&#7871;u n&#7841;i
cho r&#7857;ng vi&#7879;c l&#7853;p biên b&#7843;n vi ph&#7841;m hành chính
không &#273;úng, ph&#7843;n ánh sai hành vi vi ph&#7841;m c&#7911;a h&#7885;.
Do v&#7853;y, vi&#7879;c ki&#7875;m tra, &#273;&#7889;i chi&#7871;u, xem xét t&#7841;i
n&#417;i x&#7843;y ra hành vi vi ph&#7841;m là c&#417; s&#7903; &#273;&#7875;
&#273;&#7889;i chi&#7871;u m&#7897;t cách khách quan, ghi nh&#7853;n các d&#7845;u
hi&#7879;u c&#7911;a v&#7909; vi&#7879;c t&#7841;i hi&#7879;n tr&#432;&#7901;ng
hi&#7879;n tr&#7841;ng. &#272;ây v&#7915;a là khâu k&#7871;t thúc &#273;ánh giá
ch&#7913;ng c&#7913;, nh&#432;ng c&#361;ng có th&#7875; là khâu kh&#7903;i
&#273;&#7847;u cho vi&#7879;c &#273;&#432;a &#273;&#7871;n thu th&#7853;p thông
tin, xác &#273;&#7883;nh ch&#7913;ng c&#7913; ti&#7871;p theo.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>Vi&#7879;c xác minh th&#7921;c t&#7871; ph&#7843;i
l&#7853;p thành biên b&#7843;n, ghi r\u01a1 th&#7901;i gian, &#273;&#7883;a &#273;i&#7875;m,
thành ph&#7847;n làm vi&#7879;c, n&#7897;i dung, k&#7871;t qu&#7843; xác minh,
\u01b0 ki&#7871;n c&#7911;a nh&#7919;ng ng&#432;&#7901;i tham gia xác minh và nh&#7919;ng
ng&#432;&#7901;i khác có liên quan.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>Có nh&#7919;ng n&#7897;i dung khi&#7871;u
n&#7841;i khi cán b&#7897; xác minh c&#7847;n có xác nh&#7853;n c&#7911;a
c&#417; quan có th&#7849;m quy&#7873;n, nh&#432; vi&#7879;c xác nh&#7853;n tính
h&#7907;p pháp c&#7911;a v&#259;n b&#7857;ng ch&#7913;ng ch&#7881; ngoài vi&#7879;c
giám &#273;&#7883;nh v&#259;n b&#7857;ng có t&#7849;y, xóa h&#7885; tên so v&#7899;i
Ch&#7913;ng minh th&#432; nhân dân, n&#7871;u c\u0323n có &#273;i&#7875;m nghi v&#7845;n
c&#7847;n có xác nh&#7853;n c&#7911;a c&#417; quan &#273;\u0103 c&#7845;p v&#259;n b&#7857;ng
ch&#7913;ng ch&#7881; &#273;ó.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>g. T&#7893; ch&#7913;c làm vi&#7879;c v&#7899;i
các bên có liên quan trong quá tr\u0301nh xác minh n&#7897;i dung khi&#7871;u n&#7841;i</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>Tr&#432;&#7901;ng h&#7907;p k&#7871;t qu&#7843;
xác minh khác v&#7899;i thông tin, tài li&#7879;u, b&#7857;ng ch&#7913;ng do
ng&#432;&#7901;i khi&#7871;u n&#7841;i, ng&#432;&#7901;i b&#7883; khi&#7871;u n&#7841;i
cung c&#7845;p th\u0301 ng&#432;&#7901;i gi&#7843;i quy&#7871;t khi&#7871;u n&#7841;i
ho&#7863;c ng&#432;&#7901;i &#273;&#432;&#7907;c giao nhi&#7879;m v&#7909; xác
minh ph&#7843;i t&#7893; ch&#7913;c làm vi&#7879;c v&#7899;i ng&#432;&#7901;i
khi&#7871;u n&#7841;i, ng&#432;&#7901;i b&#7883; khi&#7871;u n&#7841;i;
tr&#432;&#7901;ng h&#7907;p c&#7847;n thi&#7871;t th\u0301 m&#7901;i c&#417; quan, t&#7893;
ch&#7913;c, &#273;&#417;n v&#7883;, cá nhân có liên quan tham gia làm vi&#7879;c.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>N&#7897;i dung làm vi&#7879;c ph&#7843;i
&#273;&#432;&#7907;c l&#7853;p thành biên b&#7843;n, ghi r\u01a1 th&#7901;i gian,
&#273;&#7883;a &#273;i&#7875;m, thành ph&#7847;n tham gia, n&#7897;i dung, \u01b0 ki&#7871;n
c&#7911;a nh&#7919;ng ng&#432;&#7901;i tham gia, nh&#7919;ng n&#7897;i dung
&#273;\u0103 &#273;&#432;&#7907;c th&#7889;ng nh&#7845;t, nh&#7919;ng v&#7845;n
&#273;&#7873; c\u0323n \u01b0 ki&#7871;n khác nhau và có ch&#7919; k\u01b0 c&#7911;a các bên.
Biên b&#7843;n &#273;&#432;&#7907;c l&#7853;p thành ít nh&#7845;t ba b&#7843;n,
m&#7895;i bên gi&#7919; m&#7897;t b&#7843;n. Biên b&#7843;n làm vi&#7879;c
&#273;&#432;&#7907;c th&#7921;c hi&#7879;n theo M&#7851;u s&#7889; 06 ban hành
kèm theo Ngh&#7883; &#273;&#7883;nh 124/2020/N&#272;-CP.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>h. Tr&#432;ng c&#7847;u giám &#273;&#7883;nh</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>Trong quá tr\u0301nh xác minh, khi xét th&#7845;y
c&#7847;n thi&#7871;t ph&#7843;i có s&#7921; &#273;ánh giá v&#7873; n&#7897;i
dung liên quan &#273;&#7871;n chuyên môn, k&#7929; thu&#7853;t làm c&#259;n c&#7913;
cho vi&#7879;c k&#7871;t lu&#7853;n n&#7897;i dung khi&#7871;u n&#7841;i,
ng&#432;&#7901;i xác minh &#273;&#7873; xu&#7845;t v&#7899;i ng&#432;&#7901;i
giao nhi&#7879;m v&#7909; xác minh &#273;&#7875; báo cáo ng&#432;&#7901;i gi&#7843;i
quy&#7871;t khi&#7871;u n&#7841;i quy&#7871;t &#273;&#7883;nh tr&#432;ng c&#7847;u
giám &#273;&#7883;nh.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>Tr&#432;&#7901;ng h&#7907;p ng&#432;&#7901;i
khi&#7871;u n&#7841;i, ng&#432;&#7901;i b&#7883; khi&#7871;u n&#7841;i và
c&#417; quan, t&#7893; ch&#7913;c có liên quan &#273;&#7873; ngh&#7883; v&#7899;i
T&#7893; xác minh vi&#7879;c tr&#432;ng c&#7847;u giám &#273;&#7883;nh,
ng&#432;&#7901;i xác minh báo cáo l&#7841;i v&#7899;i ng&#432;&#7901;i giao nhi&#7879;m
v&#7909; xác minh &#273;&#7875; báo cáo ng&#432;&#7901;i gi&#7843;i quy&#7871;t
khi&#7871;u n&#7841;i quy&#7871;t &#273;&#7883;nh.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>Ng&#432;&#7901;i gi&#7843;i quy&#7871;t
khi&#7871;u n&#7841;i quy&#7871;t &#273;&#7883;nh tr&#432;ng c&#7847;u giám
&#273;&#7883;nh khi xét th&#7845;y c&#7847;n thi&#7871;t. Quy&#7871;t &#273;&#7883;nh
tr&#432;ng c&#7847;u giám &#273;&#7883;nh th&#7921;c hi&#7879;n theo M&#7851;u
s&#7889; 09 ban hành kèm theo Ngh&#7883; &#273;&#7883;nh 124/2020/N&#272;-CP.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>C&#417; quan &#273;&#432;&#7907;c giao xác
minh khi&#7871;u n&#7841;i g&#7917;i v&#259;n b&#7843;n tr&#432;ng c&#7847;u
giám &#273;&#7883;nh trong &#273;ó nêu r\u01a1 tên c&#417; quan, t&#7893; ch&#7913;c
giám &#273;&#7883;nh, thông tin, tài li&#7879;u c&#7847;n giám &#273;&#7883;nh,
n&#7897;i dung yêu c&#7847;u giám &#273;&#7883;nh, th&#7901;i h&#7841;n có k&#7871;t
lu&#7853;n giám &#273;&#7883;nh.V&#259;n b&#7843;n &#273;&#7873; ngh&#7883;
c&#417; quan, t&#7893; ch&#7913;c giám &#273;&#7883;nh th&#7921;c hi&#7879;n
theo M&#7851;u s&#7889; 10 ban hành kèm theo Ngh&#7883; &#273;&#7883;nh
124/2020/N&#272;-CP.</span></p>

<h4><a name="_Toc131755379">3.2.3. Báo cáo k&#7871;t qu&#7843; xác minh n&#7897;i
dung khi&#7871;u n&#7841;i</a></h4>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>T&#7893; tr&#432;&#7903;ng t&#7893; xác
minh có trách nhi&#7879;m báo cáo k&#7871;t qu&#7843; xác minh n&#7897;i dung
khi&#7871;u n&#7841;i v&#7899;i ng&#432;&#7901;i giao nhi&#7879;m v&#7909; xác
minh. V&#259;n b&#7843;n báo cáo &#273;&#432;&#7907;c các thành viên trong t&#7893;
xác minh th&#7843;o lu&#7853;n, &#273;óng góp \u01b0 ki&#7871;n (trong tr&#432;&#7901;ng
h&#7907;p thành l&#7853;p t&#7893; xác minh).</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>Th&#7911; tr&#432;&#7903;ng c&#417; quan,
t&#7893; ch&#7913;c &#273;&#432;&#7907;c giao nhi&#7879;m v&#7909; xác minh n&#7897;i
dung khi&#7871;u n&#7841;i ph&#7843;i báo cáo b&#7857;ng v&#259;n b&#7843;n v&#7899;i
v&#7899;i ng&#432;&#7901;i gi&#7843;i quy&#7871;t khi&#7871;u n&#7841;i v&#7873;
k&#7871;t qu&#7843; xác minh n&#7897;i dung khi&#7871;u n&#7841;i. Báo cáo ph&#7843;i
ph&#7843;n ánh trung th&#7921;c, khách quan k&#7871;t qu&#7843; xác minh n&#7897;i
dung khi&#7871;u n&#7841;i.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>Báo cáo k&#7871;t qu&#7843; xác minh n&#7897;i
dung khi&#7871;u n&#7841;i g&#7891;m các n&#7897;i dung &#273;&#432;&#7907;c
quy &#273;&#7883;nh t&#7841;i kho&#7843;n 4, &#272;i&#7873;u 29 c&#7911;a Lu&#7853;t
khi&#7871;u n&#7841;i n&#259;m 2011 quy &#273;&#7883;nh v&#7873; vi&#7879;c xác
minh n&#7897;i dung khi&#7871;u n&#7841;i, c&#7909; th&#7875; bao g&#7891;m:</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>- &#272;&#7889;i t&#432;&#7907;ng xác
minh;</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>- Th&#7901;i gian ti&#7871;n hành xác
minh;</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>- Ng&#432;&#7901;i ti&#7871;n hành xác
minh;</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>- N&#7897;i dung xác minh;</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>- K&#7871;t qu&#7843; xác minh;</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>- K&#7871;t lu&#7853;n và ki&#7871;n ngh&#7883;
n&#7897;i dung gi&#7843;i quy&#7871;t khi&#7871;u n&#7841;i.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>Trong báo cáo k&#7871;t qu&#7843; xác minh
n&#7897;i dung khi&#7871;u n&#7841;i quy&#7871;t &#273;&#7883;nh x&#7917; ph&#7841;t
vi ph&#7841;m hành chính ph&#7843;i th&#7875; hi&#7879;n r\u01a1 thông tin v&#7873;
ng&#432;&#7901;i khi&#7871;u n&#7841;i (chính là t&#7893; ch&#7913;c, cá nhân b&#7883;
x&#7917; ph&#7841;t vi ph&#7841;m hành chính &#273;\u0103 th&#7921;c hi&#7879;n vi&#7879;c
khi&#7871;u n&#7841;i), ng&#432;&#7901;i b&#7883; khi&#7871;u n&#7841;i, quy&#7871;t
&#273;&#7883;nh x&#7917; ph&#7841;t vi ph&#7841;m hành chính b&#7883; khi&#7871;u
n&#7841;i, yêu c&#7847;u c&#7911;a ng&#432;&#7901;i khi&#7871;u n&#7841;i,
c&#259;n c&#7913; &#273;&#7875; khi&#7871;u n&#7841;i; k&#7871;t qu&#7843; gi&#7843;i
quy&#7871;t khi&#7871;u n&#7841;i tr&#432;&#7899;c &#273;ó (n&#7871;u có); k&#7871;t
qu&#7843; xác minh &#273;&#7889;i v&#7899;i t&#7915;ng n&#7897;i dung
&#273;&#432;&#7907;c giao xác minh; k&#7871;t lu&#7853;n n&#7897;i dung khi&#7871;u
n&#7841;i &#273;&#432;&#7907;c giao xác minh là &#273;úng toàn b&#7897;, sai
toàn b&#7897; ho&#7863;c &#273;úng m&#7897;t ph&#7847;n; ki&#7871;n ngh&#7883;
gi&#7919; nguyên, h&#7911;y b&#7887; toàn b&#7897; ho&#7863;c s&#7917;a &#273;&#7893;i,
b&#7893; sung m&#7897;t ph&#7847;n quy&#7871;t &#273;&#7883;nh x&#7917; ph&#7841;t
vi ph&#7841;m hành chính b&#7883; khi&#7871;u n&#7841;i; ki&#7871;n ngh&#7883;
v&#7873; vi&#7879;c ban hành quy&#7871;t &#273;&#7883;nh gi&#7843;i quy&#7871;t
khi&#7871;u n&#7841;i.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>Báo cáo k&#7871;t qu&#7843; xác minh th&#7921;c
hi&#7879;n theo M&#7851;u s&#7889; 13 ban hành kèm theo Ngh&#7883; &#273;&#7883;nh
124/2020/N&#272;-CP.</span></p>

<h3><a name="_Toc131755380">4. Ban hành quy&#7871;t &#273;&#7883;nh gi&#7843;i
quy&#7871;t khi&#7871;u n&#7841;i</a></h3>

<p class=MsoTitle><a name="_Toc131755381">4.1. T&#7893; ch&#7913;c &#273;&#7889;i
tho&#7841;i</a></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>Vi&#7879;c t&#7893; ch&#7913;c &#273;&#7889;i
tho&#7841;i &#273;&#432;&#7907;c th&#7921;c hi&#7879;n tr&#432;&#7899;c khi ban
hành quy&#7871;t &#273;&#7883;nh gi&#7843;i quy&#7871;t khi&#7871;u n&#7841;i.
Trong quá tr\u0301nh gi&#7843;i quy&#7871;t khi&#7871;u n&#7841;i l&#7847;n &#273;&#7847;u,
n&#7871;u yêu c&#7847;u c&#7911;a ng&#432;&#7901;i khi&#7871;u n&#7841;i và k&#7871;t
qu&#7843; xác minh n&#7897;i dung khi&#7871;u n&#7841;i c\u0323n khác nhau th\u0301
ng&#432;&#7901;i gi&#7843;i quy&#7871;t khi&#7871;u n&#7841;i t&#7893; ch&#7913;c
&#273;&#7889;i tho&#7841;i. Trong quá tr\u0301nh gi&#7843;i quy&#7871;t khi&#7871;u
n&#7841;i l&#7847;n hai, vi&#7879;c &#273;&#7889;i tho&#7841;i là th&#7911; t&#7909;c
b&#7855;t bu&#7897;c ph&#7843;i th&#7921;c hi&#7879;n. Ng&#432;&#7901;i gi&#7843;i
quy&#7871;t khi&#7871;u n&#7841;i có trách nhi&#7879;m ch&#7911; tr\u0301 &#273;&#7889;i
tho&#7841;i v&#7899;i ng&#432;&#7901;i khi&#7871;u n&#7841;i ho&#7863;c
ng&#432;&#7901;i &#273;&#7841;i di&#7879;n, ng&#432;&#7901;i &#273;&#432;&#7907;c
&#7911;y quy&#7873;n, lu&#7853;t s&#432;, tr&#7907; giúp viên pháp l\u01b0 c&#7911;a
ng&#432;&#7901;i khi&#7871;u n&#7841;i, ng&#432;&#7901;i b&#7883; khi&#7871;u n&#7841;i,
c&#417; quan, t&#7893; ch&#7913;c, &#273;&#417;n v&#7883;, cá nhân có liên
quan. Ng&#432;&#7901;i gi&#7843;i quy&#7871;t khi&#7871;u n&#7841;i có trách
nhi&#7879;m thông báo b&#7857;ng v&#259;n b&#7843;n v&#7899;i ng&#432;&#7901;i
khi&#7871;u n&#7841;i, ng&#432;&#7901;i b&#7883; khi&#7871;u n&#7841;i,
ng&#432;&#7901;i có quy&#7873;n và ngh&#297;a v&#7909; liên quan, c&#417; quan,
t&#7893; ch&#7913;c có liên quan bi&#7871;t th&#7901;i gian, &#273;&#7883;a
&#273;i&#7875;m, n&#7897;i dung &#273;&#7889;i tho&#7841;i.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>&#272;&#7889;i v&#7899;i gi&#7843;i quy&#7871;t
khi&#7871;u n&#7841;i l&#7847;n hai, ng&#432;&#7901;i ch&#7911; tr\u0301 &#273;&#7889;i
tho&#7841;i tr&#7921;c ti&#7871;p &#273;&#432;&#7907;c quy &#273;&#7883;nh t&#7841;i
&#272;i&#7873;u 28 Ngh&#7883; &#273;&#7883;nh 124/2020/N&#272;-CP, c&#7909; th&#7875;
nh&#432; sau:</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>- B&#7897; tr&#432;&#7903;ng, Th&#7911;
tr&#432;&#7903;ng c&#417; quan ngang b&#7897;, Ch&#7911; t&#7883;ch &#7910;y
ban nhân dân c&#7845;p t&#7881;nh ph&#7843;i tr&#7921;c ti&#7871;p &#273;&#7889;i
tho&#7841;i trong tr&#432;&#7901;ng h&#7907;p khi&#7871;u n&#7841;i ph&#7913;c
t&#7841;p (có nhi&#7873;u ng&#432;&#7901;i cùng khi&#7871;u n&#7841;i v&#7873;
m&#7897;t n&#7897;i dung, có nhi&#7873;u \u01b0 ki&#7871;n khác nhau c&#7911;a các
c&#417; quan có th&#7849;m quy&#7873;n v&#7873; bi&#7879;n pháp gi&#7843;i quy&#7871;t,
ng&#432;&#7901;i khi&#7871;u n&#7841;i có thái &#273;&#7897; gay g&#7855;t,
d&#432; lu&#7853;n x\u0103 h&#7897;i quan tâm, v&#7909; vi&#7879;c &#7843;nh h&#432;&#7903;ng
&#273;&#7871; n an ninh chính tr&#7883;, tr&#7853;t t&#7921; an toàn x\u0103 h&#7897;i).</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>&#272;&#7889;i v&#7899;i các tr&#432;&#7901;ng
h&#7907;p khác, ng&#432;&#7901;i gi&#7843;i quy&#7871;t khi&#7871;u n&#7841;i
có th&#7875; phân công c&#7845;p phó c&#7911;a m\u0301nh ho&#7863;c th&#7911;
tr&#432;&#7903;ng c&#417; quan chuyên môn cùng c&#7845;p ho&#7863;c th&#7911;
tr&#432;&#7903;ng c&#417; quan, &#273;&#417;n v&#7883; tr&#7921;c thu&#7897;c
&#273;&#432;&#7907;c giao nhi&#7879;m v&#7909; xác minh &#273;&#7889;i tho&#7841;i
v&#7899;i ng&#432;&#7901;i khi&#7871;u n&#7841;i. Trong quá tr\u0301nh &#273;&#7889;i
tho&#7841;i, ng&#432;&#7901;i &#273;&#432;&#7907;c phân công ph&#7843;i k&#7883;p
th&#7901;i báo cáo v&#7899;i ng&#432;&#7901;i gi&#7843;i quy&#7871;t khi&#7871;u
n&#7841;i v&#7873; nh&#7919;ng n&#7897;i dung ph&#7913;c t&#7841;p, v&#432;&#7907;t
quá th&#7849;m quy&#7873;n; k&#7871;t thúc &#273;&#7889;i tho&#7841;i ph&#7843;i
báo cáo v&#7899;i ng&#432;&#7901;i gi&#7843;i quy&#7871;t khi&#7871;u n&#7841;i
v&#7873; k&#7871;t qu&#7843; &#273;&#7889;i tho&#7841;i và ch&#7883;u trách nhi&#7879;m
v&#7873; n&#7897;i dung báo cáo.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>- Ch&#7911; t&#7883;ch &#7910;y ban nhân
dân c&#7845;p huy&#7879;n, Giám &#273;&#7889;c s&#7903; ho&#7863;c
t&#432;&#417;ng &#273;&#432;&#417;ng ph&#7843;i tr&#7921;c ti&#7871;p ch&#7911;
tr\u0301 &#273;&#7889;i tho&#7841;i v&#7899;i ng&#432;&#7901;i khi&#7871;u n&#7841;i,
không &#7911;y quy&#7873;n cho c&#7845;p d&#432;&#7899;i &#273;&#7889;i tho&#7841;i.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>Ng&#432;&#7901;i ch&#7911; tr\u0301 &#273;&#7889;i
tho&#7841;i ph&#7843;i ti&#7871;n hành &#273;&#7889;i tho&#7841;i tr&#7921;c ti&#7871;p
v&#7899;i ng&#432;&#7901;i khi&#7871;u n&#7841;i, ng&#432;&#7901;i b&#7883; khi&#7871;u
n&#7841;i và ng&#432;&#7901;i có quy&#7873;n, l&#7907;i ích liên quan. Ng&#432;&#7901;i
ch&#7911; tr\u0301 &#273;&#7889;i tho&#7841;i khi &#273;&#7889;i tho&#7841;i ph&#7843;i
nêu r\u01a1 n&#7897;i dung c&#7847;n &#273;&#7889;i tho&#7841;i, k&#7871;t qu&#7843;
xác minh n&#7897;i dung khi&#7871;u n&#7841;i; ng&#432;&#7901;i tham gia &#273;&#7889;i
tho&#7841;i có quy&#7873;n tr\u0301nh bày \u01b0 ki&#7871;n, b&#7893; sung thông tin, tài
li&#7879;u, b&#7857;ng ch&#7913;ng liên quan &#273;&#7871;n khi&#7871;u n&#7841;i
và yêu c&#7847;u c&#7911;a m\u0301nh. Ng&#432;&#7901;i ch&#7911; tr\u0301 &#273;&#7889;i
tho&#7841;i có trách nhi&#7879;m thông báo b&#7857;ng v&#259;n b&#7843;n t&#7899;i
ng&#432;&#7901;i tham gia &#273;&#7889;i tho&#7841;i g&#7891;m ng&#432;&#7901;i
khi&#7871;u n&#7841;i, ng&#432;&#7901;i &#273;&#7841;i di&#7879;n (tr&#432;&#7901;ng
h&#7907;p nhi&#7873;u ng&#432;&#7901;i cùng khi&#7871;u n&#7841;i v&#7873; m&#7897;t
n&#7897;i dung) ng&#432;&#7901;i b&#7883; khi&#7871;u n&#7841;i, ng&#432;&#7901;i
có quy&#7873;n và ngh&#297;a v&#7909; liên quan, c&#417; quan, t&#7893; ch&#7913;c
có liên quan v&#7873; th&#7901;i gian, &#273;&#7883;a &#273;i&#7875;m, n&#7897;i
dung &#273;&#7889;i tho&#7841;i.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>Vi&#7879;c &#273;&#7889;i tho&#7841;i
&#273;&#432;&#7907;c l&#7853;p thành biên b&#7843;n, ghi r\u01a1 th&#7901;i gian,
&#273;&#7883;a &#273;i&#7875;m, thành ph&#7847;n tham gia (ghi r\u01a1 ng&#432;&#7901;i
d&#7921; và ng&#432;&#7901;i v&#7855;ng m&#7863;t; tr&#432;&#7901;ng h&#7907;p
ng&#432;&#7901;i khi&#7871;u n&#7841;i không tham gia &#273;&#7889;i tho&#7841;i
th\u0301 ghi r\u01a1 có l\u01b0 do ho&#7863;c không có l\u01b0 do), n&#7897;i dung, \u01b0 ki&#7871;n c&#7911;a
nh&#7919;ng ng&#432;&#7901;i tham gia, nh&#7919;ng n&#7897;i dung &#273;\u0103
&#273;&#432;&#7907;c th&#7889;ng nh&#7845;t, nh&#361;ng v&#7845;n &#273;&#7873;
c\u0323n có \u01b0 ki&#7871;n khác nhau và có ch&#7919; k\u01b0 c&#7911;a các bên. Biên b&#7843;n
&#273;&#432;&#7907;c l&#7853;p thành ít nh&#7845;t ba b&#7843;n, m&#7895;i bên
gi&#7919; m&#7897;t b&#7843;n. Biên b&#7843;n &#273;&#7889;i tho&#7841;i
&#273;&#432;&#7907;c th&#7921;c hi&#7879;n theo M&#7851;u s&#7889; 14 ban hành
kèm theo Ngh&#7883; &#273;&#7883;nh 124/2020/N&#272;- CP. K&#7871;t qu&#7843;
&#273;&#7889;i tho&#7841;i là m&#7897;t trong nh&#7919;ng c&#259;n c&#7913;
&#273;&#7875; gi&#7843;i quy&#7871;t khi&#7871;u n&#7841;i.</span></p>

<p class=MsoTitle><a name="_Toc131755382">4.2. Ban hành, g&#7917;i quy&#7871;t
&#273;&#7883;nh gi&#7843;i quy&#7871;t khi&#7871;u n&#7841;i</a></p>

<h4><a name="_Toc131755383">a. Ban hành quy&#7871;t &#273;&#7883;nh gi&#7843;i
quy&#7871;t khi&#7871;u n&#7841;i</a></h4>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>C&#259;n c&#7913; quy &#273;&#7883;nh c&#7911;a
pháp lu&#7853;t, k&#7871;t qu&#7843; xác minh n&#7897;i dung khi&#7871;u n&#7841;i,
k&#7871;t qu&#7843; &#273;&#7889;i tho&#7841;i (n&#7871;u có), ng&#432;&#7901;i
gi&#7843;i quy&#7871;t khi&#7871;u n&#7841;i ban hành quy&#7871;t &#273;&#7883;nh
gi&#7843;i quy&#7871;t khi&#7871;u n&#7841;i theo quy &#273;&#7883;nh. Quy&#7871;t
&#273;&#7883;nh gi&#7843;i quy&#7871;t khi&#7871;u n&#7841;i l&#7847;n &#273;&#7847;u
th&#7921;c hi&#7879;n theo quy &#273;&#7883;nh t&#7841;i &#272;i&#7873;u 31 c&#7911;a
Lu&#7853;t Khi&#7871;u n&#7841;i; quy&#7871;t &#273;&#7883;nh gi&#7843;i quy&#7871;t
khi&#7871;u n&#7841;i l&#7847;n hai theo quy &#273;&#7883;nh t&#7841;i &#272;i&#7873;u
40 c&#7911;a Lu&#7853;t Khi&#7871;u n&#7841;i.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>Trong quy&#7871;t &#273;&#7883;nh gi&#7843;i
quy&#7871;t khi&#7871;u n&#7841;i ph&#7843;i th&#7875; hi&#7879;n r\u01a1 &#273;i&#7873;u
ki&#7879;n th&#7909; l\u01b0 gi&#7843;i quy&#7871;t khi&#7871;u n&#7841;i; tên,
&#273;&#7883;a ch&#7881; ng&#432;&#7901;i khi&#7871;u n&#7841;i, ng&#432;&#7901;i
b&#7883; khi&#7871;u n&#7841;i; n&#7897;i dung khi&#7871;u n&#7841;i, l\u01b0 do khi&#7871;u
n&#7841;i, yêu c&#7847;u gi&#7843;i quy&#7871;t c&#7911;a ng&#432;&#7901;i khi&#7871;u
n&#7841;i; k&#7871;t qu&#7843; gi&#7843;i quy&#7871;t khi&#7871;u n&#7841;i
tr&#432;&#7899;c &#273;ó (n&#7871;u có); k&#7871;t qu&#7843; xác minh n&#7897;i
dung khi&#7871;u n&#7841;i; nêu r\u01a1 c&#259;n c&#7913; &#273;&#7875; k&#7871;t lu&#7853;n
n&#7897;i dung khi&#7871;u n&#7841;i là &#273;úng toàn b&#7897;, sai toàn b&#7897;
ho&#7863;c &#273;úng m&#7897;t ph&#7847;n; gi&#7919; nguyên, h&#7911;y b&#7887;
toàn b&#7897; ho&#7863;c s&#7917;a &#273;&#7893;i, b&#7893; sung m&#7897;t ph&#7847;n
quy&#7871;t &#273;&#7883;nh x&#7917; ph&#7841;t vi ph&#7841;m hành chính
(&#273;&#7889;i v&#7899;i quy&#7871;t &#273;&#7883;nh gi&#7843;i quy&#7871;t
khi&#7871;u n&#7841;i l&#7847;n &#273;&#7847;u) ho&#7863;c yêu c&#7847;u
ng&#432;&#7901;i có quy&#7871;t &#273;&#7883;nh quy&#7871;t &#273;&#7883;nh x&#7917;
ph&#7841;t vi ph&#7841;m hành chính b&#7883; khi&#7871;u n&#7841;i s&#7917;a
&#273;&#7893;i, h&#7911;y b&#7887; m&#7897;t ph&#7847;n hay toàn b&#7897; quy&#7871;t
&#273;&#7883;nh x&#7917; ph&#7841;t vi ph&#7841;m hành chính (&#273;&#7889;i v&#7899;i
gi&#7843;i quy&#7871;t khi&#7871;u n&#7841;i l&#7847;n hai); vi&#7879;c b&#7891;i
th&#432;&#7901;ng thi&#7879;t h&#7841;i cho ng&#432;&#7901;i b&#7883; thi&#7879;t
h&#7841;i (n&#7871;u có) và gi&#7843;i quy&#7871;t các v&#7845;n &#273;&#7873;
khác có liên quan; quy&#7873;n khi&#7871;u n&#7841;i l&#7847;n hai, quy&#7873;n

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:

font-family:"Times New Roman",serif'>Trong th&#7901;i h&#7841;n 07 ngày làm vi&#7879;c,
k&#7875; t&#7915; ngày ban hành quy&#7871;t &#273;&#7883;nh gi&#7843;i quy&#7871;t
khi&#7871;u n&#7841;i l&#7847;n hai, ng&#432;&#7901;i gi&#7843;i quy&#7871;t
khi&#7871;u n&#7841;i ph&#7843;i g&#7917;i quy&#7871;t &#273;&#7883;nh gi&#7843;i
quy&#7871;t khi&#7871;u n&#7841;i cho ng&#432;&#7901;i khi&#7871;u n&#7841;i,

quy&#7871;t khi&#7871;u n&#7841;i l&#7847;n &#273;&#7847;u; ng&#432;&#7901;i có

<h4><a name="_Toc131755385">c. Công khai quy&#7871;t &#273;&#7883;nh gi&#7843;i
quy&#7871;t khi&#7871;u n&#7841;i l&#7847;n hai</a></h4>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>Trong th&#7901;i h&#7841;n 15 ngày, k&#7875;
t&#7915; khi có quy&#7871;t &#273;&#7883;nh gi&#7843;i quy&#7871;t khi&#7871;u
n&#7841;i, ng&#432;&#7901;i có th&#7849;m quy&#7873;n gi&#7843;i quy&#7871;t
khi&#7871;u n&#7841;i khi&#7871;u n&#7841;i l&#7847;n hai có trách nhi&#7879;m
công khai quy&#7871;t &#273;&#7883;nh gi&#7843;i quy&#7871;t khi&#7871;u n&#7841;i
l&#7847;n hai theo m&#7897;t trong các h\u0301nh th&#7913;c sau:</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>- Công b&#7889; t&#7841;i cu&#7897;c h&#7885;p
c&#417; quan, t&#7893; ch&#7913;c n&#417;i ng&#432;&#7901;i b&#7883; khi&#7871;u
n&#7841;i công tác.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>Thành ph&#7847;n tham d&#7921; g&#7891;m:
Ng&#432;&#7901;i gi&#7843;i quy&#7871;t khi&#7871;u n&#7841;i, ng&#432;&#7901;i
khi&#7871;u n&#7841;i ho&#7863;c ng&#432;&#7901;i &#273;&#7841;i di&#7879;n th&#7921;c
hi&#7879;n vi&#7879;c khi&#7871;u n&#7841;i, ng&#432;&#7901;i b&#7883; khi&#7871;u
n&#7841;i và c&#417; quan, t&#7893; ch&#7913;c, cá nhân có liên quan. Tr&#432;&#7899;c
khi ti&#7871;n hành cu&#7897;c h&#7885;p công khai, ng&#432;&#7901;i có th&#7849;m
quy&#7873;n gi&#7843;i quy&#7871;t khi&#7871;u n&#7841;i ph&#7843;i có v&#259;n
b&#7843;n thông báo v&#7899;i c&#417; quan, t&#7893; ch&#7913;c, cá nhân có
liên quan bi&#7871;t tr&#432;&#7899;c 03 ngày.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>- Niêm y&#7871;t t&#7841;i tr&#7909; s&#7903;
làm vi&#7879;c ho&#7863;c n&#417;i ti&#7871;p công dân c&#7911;a c&#417; quan,
t&#7893; ch&#7913;c &#273;\u0103 gi&#7843;i quy&#7871;t khi&#7871;u n&#7841;i. Th&#7901;i
gian niêm y&#7871;t quy&#7871;t &#273;&#7883;nh gi&#7843;i quy&#7871;t khi&#7871;u
n&#7841;i ít nh&#7845;t là 15 ngày, k&#7875; t&#7915; ngày niêm y&#7871;t.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>- Thông báo trên ph&#432;&#417;ng ti&#7879;n
thông tin &#273;&#7841;i chúng: Vi&#7879;c thông báo quy&#7871;t &#273;&#7883;nh
gi&#7843;i quy&#7871;t khi&#7871;u n&#7841;i trên các ph&#432;&#417;ng ti&#7879;n
thông tin &#273;&#7841;i chúng g&#7891;m báo nói, báo h\u0301nh, báo in, báo &#273;i&#7879;n
t&#7917;. Ng&#432;&#7901;i có th&#7849;m quy&#7873;n gi&#7843;i quy&#7871;t khi&#7871;u
n&#7841;i có trách nhi&#7879;m l&#7921;a ch&#7885;n m&#7897;t trong các
ph&#432;&#417;ng ti&#7879;n thông tin &#273;&#7841;i chúng &#273;&#7875; th&#7921;c
hi&#7879;n vi&#7879;c thông báo. Tr&#432;&#7901;ng h&#7907;p c&#417; quan c&#7911;a
ng&#432;&#7901;i có th&#7849;m quy&#7873;n gi&#7843;i quy&#7871;t khi&#7871;u n&#7841;i
có c&#7893;ng thông tin &#273;i&#7879;n t&#7917; ho&#7863;c trang thông tin
&#273;i&#7879;n t&#7917; th\u0301 ph&#7843;i công khai trên c&#7893;ng thông tin
&#273;i&#7879;n t&#7917; ho&#7863;c trang thông tin &#273;i&#7879;n t&#7917;. S&#7889;
l&#7847;n thông báo trên báo nói ít nh&#7845;t 02 l&#7847;n phát sóng; trên báo
h\u0301nh ít nh&#7845;t 02 l&#7847;n phát sóng; trên báo in ít nh&#7845;t 02 s&#7889;
phát hành liên t&#7909;c. Th&#7901;i gian &#273;&#259;ng t&#7843;i trên báo
&#273;i&#7879;n t&#7917;, trên c&#7893;ng thông tin &#273;i&#7879;n t&#7917; ho&#7863;c
trên trang thông tin &#273;i&#7879;n t&#7917; ít nh&#7845;t là 15 ngày liên t&#7909;c.</span></p>

<p class=MsoTitle><a name="_Toc131755386">4.3. Thi hành quy&#7871;t &#273;&#7883;nh
gi&#7843;i quy&#7871;t khi&#7871;u n&#7841;i có hi&#7879;u l&#7921;c pháp lu&#7853;t</a></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>Ng&#432;&#7901;i gi&#7843;i quy&#7871;t
khi&#7871;u n&#7841;i trong ph&#7841;m vi nhi&#7879;m v&#7909;, quy&#7873;n h&#7841;n
c&#7911;a m\u0301nh có trách nhi&#7879;m ch&#7881; &#273;&#7841;o c&#417; quan, t&#7893;
ch&#7913;c, cá nhân thu&#7897;c quy&#7873;n qu&#7843;n l\u01b0 t&#7893; ch&#7913;c
thi hành quy&#7871;t &#273;&#7883;nh gi&#7843;i quy&#7871;t khi&#7871;u n&#7841;i
có hi&#7879;u l&#7921;c pháp lu&#7853;t; tr&#432;&#7901;ng h&#7907;p c&#7847;n
thi&#7871;t, yêu c&#7847;u c&#417; quan ch&#7913;c n&#259;ng có bi&#7879;n pháp
&#273;&#7875; b&#7843;o &#273;&#7843;m vi&#7879;c thi hành các quy&#7871;t
&#273;&#7883;nh gi&#7843;i quy&#7871;t khi&#7871;u n&#7841;i có hi&#7879;u l&#7921;c
pháp lu&#7853;t; t&#7893; ch&#7913;c thi hành ho&#7863;c ch&#7911; tr\u0301, ph&#7889;i
h&#7907;p v&#7899;i t&#7893; ch&#7913;c, c&#417; quan h&#7919;u quan th&#7921;c
hi&#7879;n bi&#7879;n pháp nh&#7857;m khôi ph&#7909;c quy&#7873;n, l&#7907;i
ích h&#7907;p pháp c&#7911;a ng&#432;&#7901;i khi&#7871;u n&#7841;i; ki&#7871;n
ngh&#7883; c&#417; quan, t&#7893; ch&#7913;c khác gi&#7843;i quy&#7871;t nh&#7919;ng
v&#7845;n &#273;&#7873; liên quan &#273;&#7871;n vi&#7879;c thi hành quy&#7871;t
&#273;&#7883;nh gi&#7843;i quy&#7871;t khi&#7871;u n&#7841;i (n&#7871;u có).</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>- Tr&#432;&#7901;ng h&#7907;p khi&#7871;u
n&#7841;i sai toàn b&#7897; th\u0301 gi&#7919; nguyên quy&#7871;t &#273;&#7883;nh x&#7917;
ph&#7841;t vi ph&#7841;m hành chính b&#7883; khi&#7871;u n&#7841;i, &#273;&#7891;ng
th&#7901;i yêu c&#7847;u ng&#432;&#7901;i khi&#7871;u n&#7841;i, c&#417; quan,
t&#7893; ch&#7913;c, cá nhân có liên quan th&#7921;c hi&#7879;n quy&#7871;t
&#273;&#7883;nh x&#7917; ph&#7841;t vi ph&#7841;m hành chính.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>- Tr&#432;&#7901;ng h&#7907;p khi&#7871;u
n&#7841;i &#273;úng m&#7897;t ph&#7847;n ho&#7863;c &#273;úng toàn b&#7897; th\u0301
yêu c&#7847;u ng&#432;&#7901;i &#273;\u0103 ban hành quy&#7871;t &#273;&#7883;nh x&#7917;
ph&#7841;t vi ph&#7841;m hành chính s&#7917;a &#273;&#7893;i, b&#7893; sung ho&#7863;c
h&#7911;y b&#7887; m&#7897;t ph&#7847;n hay toàn b&#7897; quy&#7871;t &#273;&#7883;nh
x&#7917; ph&#7841;t vi ph&#7841;m hành chính.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>Theo kho&#7843;n 3, &#272;i&#7873;u 18 Lu&#7853;t
X&#7917; l\u01b0 vi ph&#7841;m hành chính (s&#7917;a &#273;&#7893;i, b&#7893; sung
n&#259;m 2020), th&#7849;m quy&#7873;n h&#7911;y b&#7887;, ban hành quy&#7871;t
&#273;&#7883;nh m&#7899;i trong x&#7917; ph&#7841;t vi ph&#7841;m hành chính
quy &#273;&#7883;nh nh&#432; sau: Trong ph&#7841;m vi nhi&#7879;m v&#7909;, quy&#7873;n
h&#7841;n c&#7911;a m\u0301nh, B&#7897; tr&#432;&#7903;ng, Th&#7911; tr&#432;&#7903;ng
c&#417; quan ngang b&#7897;, Ch&#7911; t&#7883;ch &#7910;y ban nhân dân các c&#7845;p,
th&#7911; tr&#432;&#7903;ng c&#417; quan, &#273;&#417;n v&#7883; c&#7911;a
ng&#432;&#7901;i có th&#7849;m quy&#7873;n x&#7917; l\u01b0 vi ph&#7841;m hành chính
có trách nhi&#7879;m phát hi&#7879;n quy&#7871;t &#273;&#7883;nh v&#7873; x&#7917;
l\u01b0 vi ph&#7841;m hành chính do m\u0301nh ho&#7863;c c&#7845;p d&#432;&#7899;i ban
hành có sai sót và k&#7883;p th&#7901;i &#273;ính chính, s&#7917;a &#273;&#7893;i,
b&#7893; sung ho&#7863;c h&#7911;y b&#7887;, ban hành quy&#7871;t &#273;&#7883;nh
m&#7899;i theo th&#7849;m quy&#7873;n.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>Nh&#432; v&#7853;y, trong tr&#432;&#7901;ng
h&#7907;p quy&#7871;t &#273;&#7883;nh gi&#7843;i quy&#7871;t khi&#7871;u n&#7841;i
có hi&#7879;u l&#7921;c pháp lu&#7853;t yêu c&#7847;u ng&#432;&#7901;i có quy&#7871;t
&#273;&#7883;nh x&#7917; ph&#7841;t vi ph&#7841;m hành chính b&#7883; khi&#7871;u
n&#7841;i h&#7911;y b&#7887; m&#7897;t ph&#7847;n hay toàn b&#7897; quy&#7871;t
&#273;&#7883;nh x&#7917; ph&#7841;t vi ph&#7841;m hành chính th\u0301 ng&#432;&#7901;i
&#273;ó ph&#7843;i th&#7921;c hi&#7879;n.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>- Tr&#432;&#7901;ng h&#7907;p h&#7911;y b&#7887;
toàn b&#7897; n&#7897;i dung quy&#7871;t &#273;&#7883;nh x&#7917; ph&#7841;t vi
ph&#7841;m hành chính b&#7883; khi&#7871;u n&#7841;i.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>C&#259;n c&#7913; kho&#7843;n 1 &#272;i&#7873;u
13 Ngh&#7883; &#273;&#7883;nh 118/2021/N&#272;-CP, ng&#432;&#7901;i &#273;\u0103 ban
hành quy&#7871;t &#273;&#7883;nh t&#7921; m\u0301nh ho&#7863;c theo yêu c&#7847;u c&#7911;a
nh&#7919;ng ng&#432;&#7901;i quy &#273;&#7883;nh t&#7841;i kho&#7843;n 3 &#272;i&#7873;u
18 Lu&#7853;t X&#7917; l\u01b0 vi ph&#7841;m hành chính ph&#7843;i ban hành quy&#7871;t
&#273;&#7883;nh h&#7911;y b&#7887; toàn b&#7897; n&#7897;i dung quy&#7871;t
&#273;&#7883;nh n&#7871;u thu&#7897;c m&#7897;t trong các tr&#432;&#7901;ng h&#7907;p
sau &#273;ây:</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>(1) Không &#273;úng &#273;&#7889;i t&#432;&#7907;ng
vi ph&#7841;m;</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>(2) Vi ph&#7841;m quy &#273;&#7883;nh v&#7873;
th&#7849;m quy&#7873;n ban hành quy&#7871;t &#273;&#7883;nh;</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>(3) Vi ph&#7841;m quy &#273;&#7883;nh v&#7873;
th&#7911; t&#7909;c ban hành quy&#7871;t &#273;&#7883;nh;</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>(4) Tr&#432;&#7901;ng h&#7907;p gi&#7919;
l&#7841;i v&#7909; vi ph&#7841;m có d&#7845;u hi&#7879;u t&#7897;i ph&#7841;m
&#273;&#7875; x&#7917; l\u01b0 vi ph&#7841;m hành chính (kho&#7843;n 1 &#272;i&#7873;u
12 Lu&#7853;t X&#7917; l\u01b0 vi ph&#7841;m hành chính);</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>(5) Tr&#432;&#7901;ng h&#7907;p xác &#273;&#7883;nh

x&#7917; ph&#7841;t, m&#7913;c x&#7917; ph&#7841;t, bi&#7879;n pháp kh&#7855;c
ph&#7909;c h&#7853;u qu&#7843; không &#273;úng, không &#273;&#7847;y &#273;&#7911;
&#273;&#7889;i v&#7899;i hành vi vi ph&#7841;m hành chính (kho&#7843;n 6
&#272;i&#7873;u 12 Lu&#7853;t X&#7917; l\u01b0 vi ph&#7841;m hành chính);</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>(6) Tr&#432;&#7901;ng h&#7907;p gi&#7843;
m&#7841;o, làm sai l&#7879;ch h&#7891; s&#417; x&#7917; ph&#7841;t vi ph&#7841;m
hành chính, h&#7891; s&#417; áp d&#7909;ng bi&#7879;n pháp x&#7917; l\u01b0 hành
chính (kho&#7843;n 10 &#272;i&#7873;u 12 Lu&#7853;t X&#7917; l\u01b0 vi ph&#7841;m
hành chính);</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>(7) Tr&#432;&#7901;ng h&#7907;p có quy&#7871;t
&#273;&#7883;nh kh&#7903;i t&#7889; v&#7909; án c&#7911;a c&#417; quan ti&#7871;n
hành t&#7889; t&#7909;ng h\u0301nh s&#7921; &#273;&#7889;i v&#7899;i v&#7909; vi&#7879;c
vi ph&#7841;m có d&#7845;u hi&#7879;u t&#7897;i ph&#7841;m (kho&#7843;n 3
&#272;i&#7873;u 62 Lu&#7853;t X&#7917; l\u01b0 vi ph&#7841;m hành chính);</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>Ng&#432;&#7901;i b&#7883; x&#7917; ph&#7841;t

ng&#432;&#7901;i &#273;\u0103 ra quy&#7871;t &#273;&#7883;nh x&#7917; ph&#7841;t
&#273;&#7875; &#273;&#7873; ngh&#7883; &#273;&#432;&#7907;c ho\u0103n thi hành quy&#7871;t
&#273;&#7883;nh ph&#7841;t ti&#7873;n.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>V&#7873; th&#7911; t&#7909;c, cá nhân, t&#7893;
ch&#7913;c b&#7883; x&#7917; ph&#7841;t vi ph&#7841;m hành chính ph&#7843;i có

c&#7911;a c&#417; quan, t&#7893; ch&#7913;c có th&#7849;m quy&#7873;n theo quy
&#273;&#7883;nh t&#7841;i kho&#7843;n 1 &#272;i&#7873;u 76 Lu&#7853;t X&#7917;
l\u01b0 vi ph&#7841;m hành chính g&#7917;i ng&#432;&#7901;i &#273;\u0103 ra quy&#7871;t
&#273;&#7883;nh x&#7917; ph&#7841;t trong th&#7901;i h&#7841;n quy &#273;&#7883;nh.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>Ng&#432;&#7901;i &#273;\u0103 ra quy&#7871;t
&#273;&#7883;nh x&#7917; ph&#7841;t có quy&#7873;n xem xét gi&#7843;i quy&#7871;t

ngày nh&#7853;n &#273;&#432;&#7907;c &#273;&#417;n, ng&#432;&#7901;i &#273;\u0103 ra

ho\u0103n thi hành quy&#7871;t &#273;&#7883;nh x&#7917; ph&#7841;t &#273;ó. Vi&#7879;c
ho\u0103n thi hành quy&#7871;t &#273;&#7883;nh ph&#7841;t ti&#7873;n &#273;&#432;&#7907;c
áp d&#7909;ng khi có &#273;&#7911; các &#273;i&#7873;u ki&#7879;n theo quy
&#273;&#7883;nh t&#7841;i kho&#7843;n 1, &#272;i&#7873;u 76 Lu&#7853;t X&#7917;

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>- Cá nhân b&#7883; ph&#7841;t ti&#7873;n t&#7915;

ti&#7873;n t&#7915; 100.000.000 &#273;&#7891;ng tr&#7903; lên;</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>- Cá nhân &#273;ang g&#7863;p khó
kh&#259;n v&#7873; kinh t&#7871; do thiên tai, th&#7843;m h&#7885;a, h&#7887;a
ho&#7841;n, d&#7883;ch b&#7879;nh, m&#7855;c b&#7879;nh hi&#7875;m nghèo, tai n&#7841;n;
t&#7893; ch&#7913;c &#273;ang g&#7863;p khó kh&#259;n &#273;&#7863;c bi&#7879;t
ho&#7863;c &#273;&#7897;t xu&#7845;t v&#7873; kinh t&#7871; do thiên tai, th&#7843;m
h&#7885;a, h&#7887;a ho&#7841;n, d&#7883;ch b&#7879;nh. Tr&#432;&#7901;ng h&#7907;p
cá nhân g&#7863;p khó kh&#259;n v&#7873; kinh t&#7871; do thiên tai, th&#7843;m
h&#7885;a, h&#7887;a ho&#7841;n, d&#7883;ch b&#7879;nh, m&#7855;c b&#7879;nh hi&#7875;m
nghèo, tai n&#7841;n th\u0301 ph&#7843;i có xác nh&#7853;n c&#7911;a &#7910;y ban
nhân dân c&#7845;p x\u0103 n&#417;i ng&#432;&#7901;i &#273;ó c&#432; trú ho&#7863;c
c&#417; quan, t&#7893; ch&#7913;c n&#417;i ng&#432;&#7901;i &#273;ó h&#7885;c t&#7853;p,
làm vi&#7879;c; tr&#432;&#7901;ng h&#7907;p cá nhân g&#7863;p khó kh&#259;n v&#7873;
kinh t&#7871; do m&#7855;c b&#7879;nh hi&#7875;m nghèo, tai n&#7841;n th\u0301 ph&#7843;i
có thêm xác nh&#7853;n c&#7911;a c&#417; s&#7903; khám b&#7879;nh, ch&#7919;a b&#7879;nh
tuy&#7871;n huy&#7879;n tr&#7903; lên.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>Tr&#432;&#7901;ng h&#7907;p t&#7893; ch&#7913;c
&#273;ang g&#7863;p khó kh&#259;n v&#7873; kinh t&#7871; do thiên tai, th&#7843;m
h&#7885;a, h&#7887;a ho&#7841;n, d&#7883;ch b&#7879;nh th\u0301 ph&#7843;i có xác nh&#7853;n

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:

font-family:"Times New Roman",serif'>Th&#7901;i h&#7841;n ho\u0103n thi hành quy&#7871;t
&#273;&#7883;nh x&#7917; ph&#7841;t không quá 03 tháng, k&#7875; t&#7915; ngày

&#273;&#432;&#7907;c nh&#7853;n l&#7841;i gi&#7845;y t&#7901;, tang v&#7853;t,

b&#7897; s&#7889; ti&#7873;n ph&#7841;t. &#272;&#417;n &#273;&#7873; ngh&#7883;
c&#7911;a cá nhân ph&#7843;i &#273;&#432;&#7907;c &#7910;y ban nhân dân c&#7845;p
x\u0103 n&#417;i ng&#432;&#7901;i &#273;ó c&#432; trú ho&#7863;c c&#417; quan, t&#7893;
ch&#7913;c n&#417;i ng&#432;&#7901;i &#273;ó h&#7885;c t&#7853;p, làm vi&#7879;c
xác nh&#7853;n hoàn c&#7843;nh khó kh&#259;n &#273;&#7863;c bi&#7879;t v&#7873;
kinh t&#7871;. &#272;&#417;n &#273;&#7873; ngh&#7883; c&#7911;a t&#7893; ch&#7913;c
ph&#7843;i &#273;&#432;&#7907;c &#7910;y ban nhân dân c&#7845;p x\u0103, Ban qu&#7843;n
l\u01b0 khu công nghi&#7879;p, khu ch&#7871; xu&#7845;t, khu công ngh&#7879; cao,
khu kinh t&#7871;, c&#417; quan Thu&#7871; qu&#7843;n l\u01b0 tr&#7921;c ti&#7871;p
ho&#7863;c c&#417; quan c&#7845;p trên tr&#7921;c ti&#7871;p xác nh&#7853;n
hoàn c&#7843;nh khó kh&#259;n &#273;&#7863;c bi&#7879;t v&#7873; kinh t&#7871;.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>Ng&#432;&#7901;i có th&#7849;m quy&#7873;n
x&#7917; ph&#7841;t nh&#7853;n &#273;&#432;&#7907;c &#273;&#417;n s&#7869; xem
xét gi&#7843;i quy&#7871;t có cho ng&#432;&#7901;i b&#7883; x&#7917; ph&#7841;t
vi ph&#7841;m hành chính n&#7897;p ti&#7873;n ph&#7841;t nhi&#7873;u l&#7847;n
hay không. Ng&#432;&#7901;i có th&#7849;m quy&#7873;n x&#7917; ph&#7841;t s&#7869;
xem xét cá nhân, t&#7893; ch&#7913;c b&#7883; x&#7917; ph&#7841;t vi ph&#7841;m
hành chính có &#273;&#7911; các &#273;i&#7873;u ki&#7879;n &#273;&#7875;
&#273;&#432;&#7907;c n&#7897;p ph&#7841;t nhi&#7873;u l&#7847;n theo quy &#273;&#7883;nh
t&#7841;i kho&#7843;n 1 &#272;i&#7873;u 79 Lu&#7853;t X&#7917; ph&#7841;t vi ph&#7841;m
hành chính n&#259;m 2020 (s&#7917;a &#273;&#7893;i, b&#7893; sung n&#259;m
2020). Vi&#7879;c n&#7897;p ti&#7873;n ph&#7841;t nhi&#7873;u l&#7847;n
&#273;&#432;&#7907;c áp d&#7909;ng khi có &#273;&#7911; các &#273;i&#7873;u ki&#7879;n
sau &#273;ây:</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>- B&#7883; ph&#7841;t ti&#7873;n t&#7915;
15.000.000 &#273;&#7891;ng tr&#7903; lên &#273;&#7889;i v&#7899;i cá nhân và t&#7915;
150.000.000 &#273;&#7891;ng tr&#7903; lên &#273;&#7889;i v&#7899;i t&#7893; ch&#7913;c;</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>- &#272;ang g&#7863;p khó kh&#259;n &#273;&#7863;c
bi&#7879;t v&#7873; kinh t&#7871; và có &#273;&#417;n &#273;&#7873; ngh&#7883;
n&#7897;p ti&#7873;n ph&#7841;t nhi&#7873;u l&#7847;n có xác nh&#7853;n c&#7911;a
c&#417; quan có th&#7849;m quy&#7873;n.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>N&#7871;u xác &#273;&#7883;nh ng&#432;&#7901;i
b&#7883; x&#7917; ph&#7841;t vi ph&#7841;m hành chính có &#273;&#7911; các
&#273;i&#7873;u ki&#7879;n &#273;&#7875; &#273;&#432;&#7907;c n&#7897;p ph&#7841;t
nhi&#7873;u l&#7847;n, ng&#432;&#7901;i &#273;\u0103 ra quy&#7871;t &#273;&#7883;nh
ph&#7841;t ti&#7873;n có quy&#7873;n quy&#7871;t &#273;&#7883;nh vi&#7879;c n&#7897;p
ti&#7873;n ph&#7841;t nhi&#7873;u l&#7847;n. Quy&#7871;t &#273;&#7883;nh v&#7873;
vi&#7879;c n&#7897;p ti&#7873;n ph&#7841;t nhi&#7873;u l&#7847;n ph&#7843;i b&#7857;ng
v&#259;n b&#7843;n. Th&#7901;i h&#7841;n n&#7897;p ti&#7873;n ph&#7841;t nhi&#7873;u
l&#7847;n không quá 06 tháng, k&#7875; t&#7915; ngày quy&#7871;t &#273;&#7883;nh
x&#7917; ph&#7841;t có hi&#7879;u l&#7921;c; s&#7889; l&#7847;n n&#7897;p ti&#7873;n
ph&#7841;t t&#7889;i &#273;a không quá 03 l&#7847;n.M&#7913;c n&#7897;p ph&#7841;t
l&#7847;n th&#7913; nh&#7845;t t&#7889;i thi&#7875;u là 40% t&#7893;ng s&#7889;
ti&#7873;n ph&#7841;t.</span></p>
