<h2></h2>

<h2><a name="_Toc131755367">I. GI&#7842;I QUY&#7870;T KHI&#7870;U N&#7840;I
TRONG X&#7916; PH&#7840;T VI PH&#7840;M HÀNH CHÍNH</a></h2>

<h3><a name="_Toc131755368">1. Các tr&#432;&#7901;ng h&#7907;p khi&#7871;u n&#7841;i
trong x&#7917; ph&#7841;t vi ph&#7841;m hành chính</a></h3>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>&#272;i&#7873;u 15 Lu&#7853;t X&#7917; l\u01b0
vi ph&#7841;m hành chính quy &#273;&#7883;nh \u201cCá nhân, t&#7893; ch&#7913;c b&#7883;
x&#7917; l\u01b0 vi ph&#7841;m hành chính có quy&#7873;n khi&#7871;u n&#7841;i, kh&#7903;i
ki&#7879;n &#273;&#7889;i v&#7899;i quy&#7871;t &#273;&#7883;nh x&#7917; l\u01b0 vi
ph&#7841;m hành chính theo quy &#273;&#7883;nh c&#7911;a pháp lu&#7853;t\u201d.
Nh&#432; v&#7853;y, cá nhân, t&#7893; ch&#7913;c b&#7883; x&#7917; l\u01b0 vi ph&#7841;m
hành chính có quy&#7873;n khi&#7871;u n&#7841;i &#273;&#7889;i v&#7899;i quy&#7871;t
&#273;&#7883;nh x&#7917; ph&#7841;t vi ph&#7841;m hành chính ho&#7863;c quy&#7871;t
&#273;&#7883;nh áp d&#7909;ng bi&#7879;n pháp x&#7917; l\u01b0 hành chính. Vi&#7879;c
khi&#7871;u n&#7841;i, gi&#7843;i quy&#7871;t khi&#7871;u n&#7841;i v&#7873; x&#7917;
ph&#7841;t vi ph&#7841;m hành chính s&#7869; &#273;&#432;&#7907;c th&#7921;c hi&#7879;n
theo quy &#273;&#7883;nh c&#7911;a pháp lu&#7853;t v&#7873; khi&#7871;u n&#7841;i.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>Theo quy &#273;&#7883;nh t&#7841;i kho&#7843;n
1, &#272;i&#7873;u 2 Lu&#7853;t Khi&#7871;u n&#7841;i th\u0301 khi&#7871;u n&#7841;i
là vi&#7879;c công dân, c&#417; quan, t&#7893; ch&#7913;c ho&#7863;c cán b&#7897;,
công ch&#7913;c theo th&#7911; t&#7909;c do Lu&#7853;t Khi&#7871;u n&#7841;i
quy &#273;&#7883;nh, &#273;&#7873; ngh&#7883; c&#417; quan, t&#7893; ch&#7913;c,
cá nhân có th&#7849;m quy&#7873;n xem xét l&#7841;i quy&#7871;t &#273;&#7883;nh
hành chính, hành vi hành chính c&#7911;a c&#417; quan hành chính nhà n&#432;&#7899;c,
c&#7911;a ng&#432;&#7901;i có th&#7849;m quy&#7873;n trong c&#417; quan hành
chính nhà n&#432;&#7899;c ho&#7863;c quy&#7871;t &#273;&#7883;nh k&#7927; lu&#7853;t
cán b&#7897;, công ch&#7913;c khi có c&#259;n c&#7913; cho r&#7857;ng quy&#7871;t
&#273;&#7883;nh ho&#7863;c hành vi &#273;ó là trái pháp lu&#7853;t, xâm ph&#7841;m
quy&#7873;n, l&#7907;i ích h&#7907;p pháp c&#7911;a m\u0301nh. Nh&#432; v&#7853;y,
có th&#7875; hi&#7875;u khi&#7871;u n&#7841;i trong x&#7917; ph&#7841;t vi ph&#7841;m
hành chính là vi&#7879;c công dân, c&#417; quan, t&#7893; ch&#7913;c theo th&#7911;
t&#7909;c do pháp lu&#7853;t quy &#273;&#7883;nh &#273;&#7873; ngh&#7883;
c&#417; quan, t&#7893; ch&#7913;c, cá nhân có th&#7849;m quy&#7873;n xem xét l&#7841;i
quy&#7871;t &#273;&#7883;nh, hành vi trong x&#7917; ph&#7841;t vi ph&#7841;m
hành chính khi có c&#259;n c&#7913; cho r&#7857;ng quy&#7871;t &#273;&#7883;nh
ho&#7863;c hành vi &#273;ó là trái pháp lu&#7853;t, xâm ph&#7841;m quy&#7873;n,
l&#7907;i ích h&#7907;p pháp c&#7911;a m\u0301nh.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>Hi&#7879;n nay, khi&#7871;u n&#7841;i
trong x&#7917; ph&#7841;t vi ph&#7841;m hành chính có nhi&#7873;u d&#7841;ng.
Ng&#432;&#7901;i b&#7883; x&#7917; ph&#7841;t vi ph&#7841;m hành chính có th&#7875;
khi&#7871;u n&#7841;i v&#7873; th&#7849;m quy&#7873;n x&#7917; ph&#7841;t,
tr\u0301nh t&#7921;, th&#7911; t&#7909;c x&#7917; ph&#7841;t, v&#7873; n&#7897;i
dung quy&#7871;t &#273;&#7883;nh, vi&#7879;c áp d&#7909;ng pháp lu&#7853;t
không &#273;úng trong x&#7917; ph&#7841;t vi ph&#7841;m hành chính....</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>&#272;&#7889;i v&#7899;i khi&#7871;u n&#7841;i
v&#7873; th&#7849;m quy&#7873;n x&#7917; ph&#7841;t, ng&#432;&#7901;i khi&#7871;u
n&#7841;i có th&#7875; cho r&#7857;ng ng&#432;&#7901;i x&#7917; ph&#7841;t vi
ph&#7841;m hành chính &#273;\u0103 ra quy&#7871;t &#273;&#7883;nh x&#7917; ph&#7841;t
không &#273;úng th&#7849;m quy&#7873;n. Không &#273;úng th&#7849;m quy&#7873;n
có th&#7875; là v&#432;&#7907;t quá m&#7913;c ph&#7841;t &#273;&#432;&#7907;c
quy &#273;&#7883;nh cho ch&#7911; th&#7875; &#273;\u0103 ra quy&#7871;t &#273;&#7883;nh
x&#7917; ph&#7841;t vi ph&#7841;m hành chính ho&#7863;c hành vi vi ph&#7841;m
không thu&#7897;c th&#7849;m quy&#7873;n x&#7917; ph&#7841;t v&#7873; l&#297;nh
v&#7921;c &#273;\u0103 &#273;&#432;&#7907;c quy &#273;&#7883;nh cho ch&#7911; th&#7875;
x&#7917; ph&#7841;t.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>&#272;&#7889;i v&#7899;i khi&#7871;u n&#7841;i
v&#7873; n&#7897;i dung quy&#7871;t &#273;&#7883;nh, vi&#7879;c áp d&#7909;ng
pháp lu&#7853;t không &#273;úng, ng&#432;&#7901;i khi&#7871;u n&#7841;i có th&#7875;
cho r&#7857;ng h&#7885; b&#7883; x&#7917; ph&#7841;t không &#273;úng v&#7873;
hành vi vi ph&#7841;m; Vi&#7879;c áp d&#7909;ng các h\u0301nh th&#7913;c x&#7917; ph&#7841;t
nh&#432;: ph&#7841;t ti&#7873;n, T&#432;&#7899;c quy&#7873;n s&#7917; d&#7909;ng
gi&#7845;y phép, ch&#7913;ng ch&#7881; hành ngh&#7873; có th&#7901;i h&#7841;n
ho&#7863;c &#273;\u0301nh ch&#7881; ho&#7841;t &#273;&#7897;ng có th&#7901;i h&#7841;n
hay t&#7883;ch thu tang v&#7853;t, ph&#432;&#417;ng ti&#7879;n vi ph&#7841;m
hành chính; Vi&#7879;c áp d&#7909;ng m&#7913;c x&#7917; ph&#7841;t &#273;&#7889;i
v&#7899;i ph&#7841;t ti&#7873;n, áp d&#7909;ng t\u0301nh ti&#7871;t t&#259;ng n&#7863;ng,
gi&#7843;m nh&#7865;; Vi&#7879;c áp d&#7909;ng các bi&#7879;n pháp kh&#7855;c
ph&#7909;c h&#7853;u qu&#7843; nh&#432;: Bu&#7897;c khôi ph&#7909;c l&#7841;i
t\u0301nh tr&#7841;ng ban &#273;&#7847;u; Bu&#7897;c tháo d&#7905; công tr\u0301nh, ph&#7847;n
công tr\u0301nh xây d&#7921;ng không có gi&#7845;y phép ho&#7863;c xây d&#7921;ng
không &#273;úng v&#7899;i gi&#7845;y phép.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>Vi&#7879;c th&#7921;c hi&#7879;n quy&#7873;n
khi&#7871;u n&#7841;i là m&#7897;t ph&#432;&#417;ng th&#7913;c &#273;&#7875; b&#7843;o
v&#7879; các quy&#7873;n, l&#7907;i ích h&#7907;p pháp c&#7911;a ch&#7911; th&#7875;
b&#7883; x&#7917; ph&#7841;t vi ph&#7841;m hành chính. Có th&#7875; ch&#7911;
th&#7875; b&#7883; x&#7917; ph&#7841;t có hành vi vi ph&#7841;m hành chính
nh&#432;ng vi&#7879;c x&#7917; ph&#7841;t ph&#7843;i &#273;&#432;&#7907;c th&#7921;c
hi&#7879;n theo &#273;úng quy &#273;&#7883;nh c&#7911;a pháp lu&#7853;t. Do v&#7853;y,
c&#417; quan, ng&#432;&#7901;i có th&#7849;m quy&#7873;n gi&#7843;i quy&#7871;t
khi&#7871;u n&#7841;i khi nh&#7853;n &#273;&#432;&#7907;c khi&#7871;u n&#7841;i
có trách nhi&#7879;m xem xét gi&#7843;i quy&#7871;t khi&#7871;u n&#7841;i theo
&#273;úng th&#7849;m quy&#7873;n. Gi&#7843;i quy&#7871;t khi&#7871;u n&#7841;i
trong x&#7917; ph&#7841;t vi ph&#7841;m hành chính là quá tr\u0301nh th&#7909; l\u01b0,
xác minh, k&#7871;t lu&#7853;n v&#7873; tính h&#7907;p pháp và tính h&#7907;p
l\u01b0 c&#7911;a quy&#7871;t &#273;&#7883;nh, hành vi trong x&#7917; ph&#7841;t vi
ph&#7841;m hành chính b&#7883; khi&#7871;u n&#7841;i &#273;&#7875; có bi&#7879;n
pháp gi&#7843;i quy&#7871;t theo quy &#273;&#7883;nh c&#7911;a pháp lu&#7853;t
nh&#7857;m b&#7843;o v&#7879; quy&#7873;n và l&#7907;i ích h&#7907;p pháp c&#7911;a
công dân, c&#417; quan, t&#7893; ch&#7913;c. Qua gi&#7843;i quy&#7871;t &#273;&#7875;
làm r\u01a1 &#273;úng, sai trong n&#7897;i dung khi&#7871;u n&#7841;i; gi&#7919;
nguyên, h&#7911;y b&#7887; ho&#7863;c s&#7917;a &#273;&#7893;i, b&#7893; sung
quy&#7871;t &#273;&#7883;nh x&#7917; ph&#7841;t vi ph&#7841;m hành chính ho&#7863;c
ch&#7845;m d&#7913;t hành vi hành chính b&#7883; khi&#7871;u n&#7841;i; b&#7891;i
th&#432;&#7901;ng thi&#7879;t h&#7841;i cho ng&#432;&#7901;i khi&#7871;u n&#7841;i
(n&#7871;u có) và gi&#7843;i quy&#7871;t các v&#7845;n &#273;&#7873; khác có
liên quan.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>M&#7909;c &#273;ích c&#7911;a vi&#7879;c
gi&#7843;i quy&#7871;t khi&#7871;u n&#7841;i là &#273;&#7843;m b&#7843;o cho
quy&#7873;n khi&#7871;u n&#7841;i &#273;&#432;&#7907;c th&#7921;c thi và b&#7843;o
v&#7879; các quy&#7873;n và l&#7907;i ích h&#7907;p pháp c&#7911;a c&#7911;a
c&#417; quan, t&#7893; ch&#7913;c, cá nhân &#273;&#432;&#7907;c pháp lu&#7853;t
ghi nh&#7853;n. Qua &#273;ó, ch&#7845;n ch&#7881;nh sai ph&#7841;m phát sinh
trong ho&#7841;t &#273;&#7897;ng qu&#7843;n l\u01b0 nhà n&#432;&#7899;c và góp ph&#7847;n
hoàn thi&#7879;n chính sách, pháp lu&#7853;t h&#432;&#7899;ng t&#7899;i m&#7909;c
tiêu xây d&#7921;ng nhà n&#432;&#7899;c pháp quy&#7873;n, c&#7911;a dân, do dân
và v\u0301 dân.</span></p>

<h3><a name="_Toc131755369">2. Th&#7849;m quy&#7873;n gi&#7843;i quy&#7871;t
khi&#7871;u n&#7841;i trong x&#7917; ph&#7841;t vi ph&#7841;m hành chính</a></h3>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>Th&#7849;m quy&#7873;n là ph&#7841;m trù
pháp l\u01b0, &#273;&#432;&#7907;c xác &#273;&#7883;nh v&#7899;i n&#7897;i dung là
quy&#7873;n h&#7841;n chung (th&#7849;m quy&#7873;n chung) và quy&#7873;n h&#7841;n
c&#7909; th&#7875; (th&#7849;m quy&#7873;n c&#7909; th&#7875;) c&#7911;a m&#7895;i
ch&#7911; th&#7875;. Lu&#7853;t Khi&#7871;u n&#7841;i quy &#273;&#7883;nh v&#7873;
th&#7849;m quy&#7873;n gi&#7843;i quy&#7871;t khi&#7871;u n&#7841;i và xác
&#273;&#7883;nh gi&#7843;i quy&#7871;t khi&#7871;u n&#7841;i là vi&#7879;c xác
minh, k&#7871;t lu&#7853;n và ra quy&#7871;t &#273;&#7883;nh gi&#7843;i quy&#7871;t
c&#7911;a ng&#432;&#7901;i gi&#7843;i quy&#7871;t khi&#7871;u n&#7841;i.
Ng&#432;&#7901;i gi&#7843;i quy&#7871;t khi&#7871;u n&#7841;i là c&#417; quan,
t&#7893; ch&#7913;c, cá nhân có th&#7849;m quy&#7873;n gi&#7843;i quy&#7871;t
khi&#7871;u n&#7841;i.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>T&#7915; &#273;ó, th&#7849;m quy&#7873;n
gi&#7843;i quy&#7871;t khi&#7871;u n&#7841;i có th&#7875; xác &#273;&#7883;nh
bao g&#7891;m các quy&#7873;n và ngh&#297;a v&#7909; chung, cùng các quy&#7873;n
h&#7841;n c&#7909; th&#7875; nh&#7857;m th&#7921;c hi&#7879;n th&#7849;m tra,
xác minh, k&#7871;t lu&#7853;n, ra quy&#7871;t &#273;&#7883;nh gi&#7843;i quy&#7871;t
khi&#7871;u n&#7841;i và &#273;ôn &#273;&#7889;c thi hành quy&#7871;t &#273;&#7883;nh
gi&#7843;i quy&#7871;t khi&#7871;u n&#7841;i &#273;&#432;&#7907;c pháp lu&#7853;t
quy &#273;&#7883;nh cho c&#417; quan, t&#7893; ch&#7913;c, cá nhân trong ho&#7841;t
&#273;&#7897;ng qu&#7843;n l\u01b0 nhà n&#432;&#7899;c.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>Vi&#7879;c xác &#273;&#7883;nh &#273;úng
th&#7849;m quy&#7873;n và h\u0301nh thành c&#417; ch&#7871; gi&#7843;i quy&#7871;t
là v&#7845;n &#273;&#7873; có \u01b0 ngh&#297;a quan tr&#7885;ng &#273;&#7889;i v&#7899;i
gi&#7843;i quy&#7871;t khi&#7871;u n&#7841;i hành chính. Lu&#7853;t X&#7917; l\u01b0
vi ph&#7841;m hành chính không quy &#273;&#7883;nh v&#7873; th&#7849;m quy&#7873;n
gi&#7843;i quy&#7871;t khi&#7871;u n&#7841;i &#273;&#7889;i v&#7899;i quy&#7871;t
&#273;&#7883;nh x&#7917; ph&#7841;t vi ph&#7841;m hành chính. Vi&#7879;c xác
&#273;&#7883;nh th&#7849;m quy&#7873;n gi&#7843;i quy&#7871;t &#273;&#432;&#7907;c
th&#7921;c hi&#7879;n theo quy &#273;&#7883;nh c&#7911;a Lu&#7853;t Khi&#7871;u
n&#7841;i.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>Theo quy &#273;&#7883;nh t&#7841;i kho&#7843;n
1, &#272;i&#7873;u 7 Lu&#7853;t Khi&#7871;u n&#7841;i:</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>\u201cKhi có c&#259;n c&#7913; cho r&#7857;ng
quy&#7871;t &#273;&#7883;nh hành chính, hành vi hành chính là trái pháp lu&#7853;t,
xâm ph&#7841;m tr&#7921;c ti&#7871;p &#273;&#7871;n quy&#7873;n, l&#7907;i ích
h&#7907;p pháp c&#7911;a m\u0301nh th\u0301 ng&#432;&#7901;i khi&#7871;u n&#7841;i khi&#7871;u
n&#7841;i l&#7847;n &#273;&#7847;u &#273;&#7871;n ng&#432;&#7901;i &#273;\u0103 ra
quy&#7871;t &#273;&#7883;nh hành chính ho&#7863;c c&#417; quan có ng&#432;&#7901;i
có hành vi hành chính ho&#7863;c kh&#7903;i ki&#7879;n v&#7909; án hành chính t&#7841;i
T\u0323a án theo quy &#273;&#7883;nh c&#7911;a Lu&#7853;t t&#7889; t&#7909;ng hành
chính.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>Tr&#432;&#7901;ng h&#7907;p ng&#432;&#7901;i
khi&#7871;u n&#7841;i không &#273;&#7891;ng \u01b0 v&#7899;i quy&#7871;t &#273;&#7883;nh
gi&#7843;i quy&#7871;t khi&#7871;u n&#7841;i l&#7847;n &#273;&#7847;u ho&#7863;c
quá th&#7901;i h&#7841;n quy &#273;&#7883;nh mà khi&#7871;u n&#7841;i không
&#273;&#432;&#7907;c gi&#7843;i quy&#7871;t th\u0301 có quy&#7873;n khi&#7871;u n&#7841;i
l&#7847;n hai &#273;&#7871;n Th&#7911; tr&#432;&#7903;ng c&#7845;p trên tr&#7921;c
ti&#7871;p c&#7911;a ng&#432;&#7901;i có th&#7849;m quy&#7873;n gi&#7843;i quy&#7871;t
khi&#7871;u n&#7841;i l&#7847;n &#273;&#7847;u ho&#7863;c kh&#7903;i ki&#7879;n
v&#7909; án hành chính t&#7841;i T\u0323a án theo quy &#273;&#7883;nh c&#7911;a Lu&#7853;t
t&#7889; t&#7909;ng hành chính.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>Tr&#432;&#7901;ng h&#7907;p ng&#432;&#7901;i
khi&#7871;u n&#7841;i không &#273;&#7891;ng \u01b0 v&#7899;i quy&#7871;t &#273;&#7883;nh
gi&#7843;i quy&#7871;t khi&#7871;u n&#7841;i l&#7847;n hai ho&#7863;c h&#7871;t
th&#7901;i h&#7841;n quy &#273;&#7883;nh mà khi&#7871;u n&#7841;i không
&#273;&#432;&#7907;c gi&#7843;i quy&#7871;t th\u0301 có quy&#7873;n kh&#7903;i ki&#7879;n
v&#7909; án hành chính t&#7841;i T\u0323a án theo quy &#273;&#7883;nh c&#7911;a Lu&#7853;t
t&#7889; t&#7909;ng hành chính.\u201d</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>Nh&#432; v&#7853;y, theo quy &#273;&#7883;nh
hi&#7879;n hành m&#7897;t v&#7909;, vi&#7879;c khi&#7871;u n&#7841;i quy&#7871;t
&#273;&#7883;nh x&#7917; ph&#7841;t vi ph&#7841;m hành chính có th&#7875;
&#273;&#432;&#7907;c gi&#7843;i quy&#7871;t b&#7903;i c&#417; quan hành chính
ho&#7863;c T\u0323a án nhân dân xét x&#7917; v&#7909; án hành chính.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>Th&#7849;m quy&#7873;n gi&#7843;i quy&#7871;t
khi&#7871;u n&#7841;i trong x&#7917; l\u01b0 vi ph&#7841;m hành chính &#273;&#432;&#7907;c
xác &#273;&#7883;nh theo các nguyên t&#7855;c sau:</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>- Th&#7911; tr&#432;&#7903;ng c&#417; quan
có quy&#7871;t &#273;&#7883;nh x&#7917; ph&#7841;t vi ph&#7841;m hành chính ho&#7863;c
hành vi trong x&#7917; ph&#7841;t vi ph&#7841;m hành chính b&#7883; khi&#7871;u
n&#7841;i có th&#7849;m quy&#7873;n gi&#7843;i quy&#7871;t khi&#7871;u n&#7841;i
l&#7847;n &#273;&#7847;u v&#7873; quy&#7871;t &#273;&#7883;nh, hành vi trong x&#7917;
ph&#7841;t vi ph&#7841;m hành chính c&#7911;a chính m\u0301nh;</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>- Th&#7911; tr&#432;&#7903;ng c&#417; quan
có ng&#432;&#7901;i có quy&#7871;t &#273;&#7883;nh x&#7917; ph&#7841;t vi ph&#7841;m
hành chính ho&#7863;c hành vi trong x&#7917; ph&#7841;t vi ph&#7841;m hành chính
b&#7883; khi&#7871;u n&#7841;i có th&#7849;m quy&#7873;n gi&#7843;i quy&#7871;t
khi&#7871;u n&#7841;i l&#7847;n &#273;&#7847;u v&#7873; quy&#7871;t &#273;&#7883;nh,
hành vi trong x&#7917; ph&#7841;t vi ph&#7841;m hành chính c&#7911;a cán b&#7897;,
công ch&#7913;c, viên ch&#7913;c do m\u0301nh tr&#7921;c ti&#7871;p qu&#7843;n l\u01b0;</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>- Th&#7911; tr&#432;&#7903;ng c&#7845;p
trên tr&#7921;c ti&#7871;p c&#7911;a ng&#432;&#7901;i có th&#7849;m quy&#7873;n
gi&#7843;i quy&#7871;t khi&#7871;u n&#7841;i l&#7847;n &#273;&#7847;u gi&#7843;i
quy&#7871;t khi&#7871;u n&#7841;i l&#7847;n hai các khi&#7871;u n&#7841;i mà
ng&#432;&#7901;i gi&#7843;i quy&#7871;t khi&#7871;u n&#7841;i l&#7847;n &#273;&#7847;u
&#273;\u0103 gi&#7843;i quy&#7871;t nh&#432;ng c\u0323n khi&#7871;u n&#7841;i.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>Gi&#7843;i quy&#7871;t b&#7857;ng con
&#273;&#432;&#7901;ng xét x&#7917; hành chính c&#7911;a T\u0323a án nhân dân
&#273;&#432;&#7907;c xác &#273;&#7883;nh th&#7849;m quy&#7873;n theo vùng, l\u0103nh
th&#7893; và c&#7845;p xét x&#7917;. Theo &#273;ó, T\u0323a án nhân dân có th&#7875;
th&#7909; l\u01b0 xét x&#7917; v&#7909; án hành chính không c&#7847;n qua gi&#7843;i
quy&#7871;t c&#7911;a c&#417; quan hành chính ho&#7863;c có th&#7875; sau khi
&#273;\u0103 qua gi&#7843;i quy&#7871;t c&#7911;a c&#417; quan hành chính Nhà
n&#432;&#7899;c. Vi&#7879;c xét x&#7917; v&#7909; án hành chính &#273;&#432;&#7907;c
th&#7921;c hi&#7879;n theo th&#7911; t&#7909;c t&#7889; t&#7909;ng hành chính
&#273;&#432;&#7907;c quy &#273;&#7883;nh t&#7841;i Lu&#7853;t T&#7889; t&#7909;ng
hành chính.</span></p>

<h3><a name="_Toc131755370">3. Quy tr\u0301nh gi&#7843;i quy&#7871;t khi&#7871;u n&#7841;i
quy&#7871;t &#273;&#7883;nh x&#7917; ph&#7841;t vi ph&#7841;m hành chính</a></h3>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>Quy tr\u0301nh là khái ni&#7879;m th&#432;&#7901;ng
&#273;&#432;&#7907;c dùng &#273;&#7875; xác &#273;&#7883;nh nh&#7919;ng vi&#7879;c
c&#7847;n làm v&#7899;i m&#7897;t tr\u0301nh t&#7921;, th&#7911; t&#7909;c nh&#7845;t
&#273;&#7883;nh. Dù ti&#7871;p c&#7853;n &#7903; ph&#7841;m vi nào, ng&#432;&#7901;i
ta &#273;&#7873;u có th&#7875; xem xét quy tr\u0301nh v&#7899;i tính ch&#7845;t là
th&#7913; t&#7921; các b&#432;&#7899;c th&#7921;c hi&#7879;n công vi&#7879;c
&#273;&#7875; &#273;&#7843;m b&#7843;o m&#7909;c tiêu và yêu c&#7847;u &#273;\u0103
&#273;&#432;&#7907;c xác &#273;&#7883;nh &#273;&#7889;i v&#7899;i công vi&#7879;c
&#273;ó. Do v&#7853;y, &#7903; &#273;ây chúng ta hi&#7875;u quy tr\u0301nh gi&#7843;i
quy&#7871;t khi&#7871;u n&#7841;i hành chính là th&#7913; t&#7921; các b&#432;&#7899;c
công vi&#7879;c và n&#7897;i dung công vi&#7879;c ph&#7843;i làm &#273;&#7875;
gi&#7843;i quy&#7871;t khi&#7871;u n&#7841;i trên c&#417; s&#7903; tuân theo
các nguyên t&#7855;c c&#417; b&#7843;n và v&#7853;n d&#7909;ng các
ph&#432;&#417;ng châm ch&#7911; y&#7871;u.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>Quy tr\u0301nh nghi&#7879;p v&#7909; gi&#7843;i
quy&#7871;t khi&#7871;u n&#7841;i &#273;&#7889;i v&#7899;i quy&#7871;t &#273;&#7883;nh
x&#7917; ph&#7841;t vi ph&#7841;m hành chính là tr\u0301nh t&#7921;, th&#7911; t&#7909;c
th&#7921;c hi&#7879;n ho&#7841;t &#273;&#7897;ng nghi&#7879;p v&#7909; c&#7911;a
ng&#432;&#7901;i có th&#7849;m quy&#7873;n gi&#7843;i quy&#7871;t khi&#7871;u n&#7841;i,
ng&#432;&#7901;i &#273;&#432;&#7907;c giao nhi&#7879;m v&#7909; xác minh n&#7897;i
dung khi&#7871;u n&#7841;i nh&#7857;m làm r\u01a1 &#273;úng, sai trong n&#7897;i
dung khi&#7871;u n&#7841;i v&#7873; quy&#7871;t &#273;&#7883;nh x&#7917; ph&#7841;t
vi ph&#7841;m hành chính &#273;&#7875; t&#7915; &#273;ó có bi&#7879;n pháp x&#7917;
l\u01b0 phù h&#7907;p &#273;&#7889;i v&#7899;i quy&#7871;t &#273;&#7883;nh x&#7917;
ph&#7841;t vi ph&#7841;m hành chính b&#7883; khi&#7871;u n&#7841;i, &#273;&#7843;m
b&#7843;o quy&#7873;n và l&#7907;i ích h&#7907;p pháp c&#7911;a ng&#432;&#7901;i
khi&#7871;u n&#7841;i.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>Lu&#7853;t X&#7917; l\u01b0 vi ph&#7841;m hành
chính không &#273;&#432;a ra quy &#273;&#7883;nh v&#7873; quy tr\u0301nh gi&#7843;i
quy&#7871;t khi&#7871;u n&#7841;i trong x&#7917; l\u01b0 vi ph&#7841;m hành chính.
Do v&#7853;y, hi&#7879;n nay quy tr\u0301nh gi&#7843;i quy&#7871;t khi&#7871;u n&#7841;i
quy&#7871;t &#273;&#7883;nh x&#7917; ph&#7841;t vi ph&#7841;m hành chính
&#273;&#432;&#7907;c th&#7921;c hi&#7879;n theo quy tr\u0301nh chung trong gi&#7843;i
quy&#7871;t khi&#7871;u n&#7841;i hành chính. C&#417; s&#7903; pháp l\u01b0 c&#7911;a
quy tr\u0301nh gi&#7843;i quy&#7871;t khi&#7871;u n&#7841;i là Lu&#7853;t Khi&#7871;u
n&#7841;i, Ngh&#7883; &#273;&#7883;nh s&#7889; 124/2020/N&#272;-CP ngày
19/10/2020 c&#7911;a Chính ph&#7911; quy &#273;&#7883;nh chi ti&#7871;t m&#7897;t
s&#7889; &#273;i&#7873;u và bi&#7879;n pháp thi hành Lu&#7853;t Khi&#7871;u n&#7841;i
(sau &#273;ây g&#7885;i t&#7855;t là Ngh&#7883; &#273;&#7883;nh
124/2020/N&#272;-CP).</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>Theo quy &#273;&#7883;nh t&#7841;i &#272;i&#7873;u
4 Lu&#7853;t Khi&#7871;u n&#7841;i, khái ni&#7879;m gi&#7843;i quy&#7871;t khi&#7871;u
n&#7841;i là vi&#7879;c th&#7909; l\u01b0, xác minh, k&#7871;t lu&#7853;n và ra quy&#7871;t
&#273;&#7883;nh gi&#7843;i quy&#7871;t khi&#7871;u n&#7841;i. C&#259;n c&#7913;
khái ni&#7879;m này, quy tr\u0301nh gi&#7843;i quy&#7871;t khi&#7871;u n&#7841;i g&#7891;m
3 b&#432;&#7899;c theo th&#7913; t&#7921;: Th&#7909; l\u01b0 khi&#7871;u n&#7841;i;
xác minh khi&#7871;u n&#7841;i; k&#7871;t lu&#7853;n và ra quy&#7871;t &#273;&#7883;nh
gi&#7843;i quy&#7871;t khi&#7871;u n&#7841;i. N&#7897;i dung các b&#432;&#7899;c
c&#7909; th&#7875; nh&#432; sau:</span></p>

<p class=MsoTitle><a name="_Toc131755371">3.1. Th&#7909; l\u01b0, chu&#7849;n b&#7883;
xác minh n&#7897;i dung khi&#7871;u n&#7841;i</a></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>V&#7899;i \u01b0 ngh&#297;a là m&#7897;t khâu trong
quy tr\u0301nh gi&#7843;i quy&#7871;t, \u201cb&#432;&#7899;c th&#7909; l\u01b0 gi&#7843;i quy&#7871;t
khi&#7871;u n&#7841;i\u201d là các ho&#7841;t &#273;&#7897;ng nghi&#7879;p v&#7909;
t&#7915; lúc ti&#7871;p nh&#7853;n v&#7909; vi&#7879;c, xem xét các &#273;i&#7873;u
ki&#7879;n &#273;&#7875; &#273;&#7843;m b&#7843;o vi&#7879;c th&#7909; l\u01b0
&#273;úng quy &#273;&#7883;nh pháp lu&#7853;t, ra thông báo v&#7873; vi&#7879;c
th&#7909; l\u01b0 hay không th&#7909; l\u01b0 và m&#7897;t s&#7889; ho&#7841;t &#273;&#7897;ng
khác &#273;&#7875; chu&#7849;n b&#7883; cho công tác xác minh n&#7897;i dung
khi&#7871;u n&#7841;i. Tr\u0301nh t&#7921; th&#7921;c hi&#7879;n nh&#432; sau:</span></p>

<h4><a name="_Toc131755372">3.1.1. Ki&#7875;m tra các &#273;i&#7873;u ki&#7879;n
&#273;&#7843;m b&#7843;o vi&#7879;c th&#7909; l\u01b0 khi&#7871;u n&#7841;i</a></h4>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>- Ki&#7875;m tra &#273;&#417;n ho&#7863;c
b&#7843;n ghi n&#7897;i dung khi&#7871;u n&#7841;i và &#273;i&#7873;u ki&#7879;n
v&#7873; ch&#7911; th&#7875; th&#7921;c hi&#7879;n quy&#7873;n khi&#7871;u n&#7841;i.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>+ &#272;&#417;n ph&#7843;i ghi r\u01a1 ngày,
tháng, n&#259;m khi&#7871;u n&#7841;i; h&#7885; tên, &#273;&#7883;a ch&#7881; c&#7911;a
ng&#432;&#7901;i khi&#7871;u n&#7841;i; tên, &#273;&#7883;a ch&#7881; c&#7911;a
c&#417; quan, t&#7893; ch&#7913;c, cá nhân b&#7883; khi&#7871;u n&#7841;i; n&#7897;i
dung, l\u01b0 do khi&#7871;u n&#7841;i trong &#273;ó nêu r\u01a1 khi&#7871;u n&#7841;i
&#273;&#7889;i v&#7899;i quy&#7871;t &#273;&#7883;nh x&#7917; ph&#7841;t vi ph&#7841;m
hành chính nào, c&#7911;a ai và khi&#7871;u n&#7841;i v&#7873; n&#7897;i dung
g\u0301, tài li&#7879;u liên quan &#273;&#7871;n n&#7897;i dung khi&#7871;u n&#7841;i,
yêu c&#7847;u gi&#7843;i quy&#7871;t c&#7911;a ng&#432;&#7901;i khi&#7871;u n&#7841;i
và ph&#7843; i có ch&#7919; k\u01b0 ho&#7863;c &#273;i&#7875;m ch&#7881; c&#7911;a
ng&#432;&#7901;i khi&#7871;u n&#7841;i.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>+ Ng&#432;&#7901;i khi&#7871;u n&#7841;i
ph&#7843;i có n&#259;ng l&#7921;c hành vi dân s&#7921; &#273;&#7847;y &#273;&#7911;
(n&#7871;u không có n&#259;ng l&#7921;c hành vi dân s&#7921; &#273;&#7847;y
&#273;&#7911; th\u0301 ph&#7843;i có ng&#432;&#7901;i &#273;&#7841;i di&#7879;n h&#7907;p
pháp theo quy &#273;&#7883;nh c&#7911;a Lu&#7853;t Dân s&#7921;). Ki&#7875;m
tra các th&#7911; t&#7909;c có liên quan &#273;&#7871;n vi&#7879;c khi&#7871;u
n&#7841;i thông qua &#273;&#7841;i di&#7879;n theo pháp lu&#7853;t (trong
tr&#432;&#7901;ng h&#7907;p ng&#432;&#7901;i khi&#7871;u n&#7841;i là ng&#432;&#7901;i
ch&#432;a thành niên, ng&#432;&#7901;i m&#7845;t n&#259;ng l&#7921;c hành vi
dân s&#7921;) ho&#7863;c ng&#432;&#7901;i &#273;&#432;&#7907;c &#7911;y quy&#7873;n
(lu&#7853;t s&#432;, tr&#7907; giúp viên pháp l\u01b0 ho&#7863;c ng&#432;&#7901;i
khác có n&#259;ng l&#7921;c hành vi dân s&#7921; &#273;&#7847;y &#273;&#7911;
&#273;&#432;&#7907;c &#7911;y quy&#7873;n th&#7921;c hi&#7879;n vi&#7879;c khi&#7871;u
n&#7841;i). Ng&#432;&#7901;i &#7911;y quy&#7873;n &#273;&#432;&#7907;c &#7911;y
quy&#7873;n khi&#7871;u n&#7841;i cho m&#7897;t ng&#432;&#7901;i ho&#7863;c nhi&#7873;u
ng&#432;&#7901;i v&#7873; các n&#7897;i dung &#7911;y quy&#7873;n khác nhau
nh&#432;ng không &#273;&#432;&#7907;c &#7911;y quy&#7873;n m&#7897;t n&#7897;i
dung cho nhi&#7873;u ng&#432;&#7901;i th&#7921;c hi&#7879;n. V&#259;n b&#7843;n
&#7911;y quy&#7873;n khi&#7871;u n&#7841;i &#273;&#432;&#7907;c th&#7921;c hi&#7879;n
theo M&#7851;u s&#7889; 02 ban hành kèm theo Ngh&#7883; &#273;&#7883;nh
124/2020/N&#272;-CP.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>+ C&#417; quan, t&#7893; ch&#7913;c th&#7921;c
hi&#7879;n vi&#7879;c khi&#7871;u n&#7841;i thông qua ng&#432;&#7901;i &#273;&#7841;i
di&#7879;n theo pháp lu&#7853;t. Ng&#432;&#7901;i &#273;&#7841;i di&#7879;n c&#7911;a
c&#417; quan, t&#7893; ch&#7913;c &#273;&#432;&#7907;c &#7911;y quy&#7873;n cho
lu&#7853;t s&#432; ho&#7863;c ng&#432;&#7901;i khác có n&#259;ng l&#7921;c hành
vi dân s&#7921; &#273;&#7847;y &#273;&#7911; th&#7921;c hi&#7879;n vi&#7879;c
khi&#7871;u n&#7841;i.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>- Ki&#7875;m tra &#273;i&#7873;u ki&#7879;n
th&#7909; l\u01b0</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>C&#259;n c&#7913; quy &#273;&#7883;nh
&#272;i&#7873;u 11 c&#7911;a Lu&#7853;t Khi&#7871;u n&#7841;i &#273;&#7875; xác
&#273;&#7883;nh &#273;i&#7873;u ki&#7879;n th&#7909; l\u01b0, theo &#273;ó ph&#7843;i
xác &#273;&#7883;nh quy&#7871;t &#273;&#7883;nh x&#7917; ph&#7841;t vi ph&#7841;m
hành chính b&#7883; khi&#7871;u n&#7841;i ch&#432;a &#273;&#432;&#7907;c T\u0323a án
gi&#7843;i quy&#7871;t và &#273;&#7843;m b&#7843;o quy &#273;&#7883;nh v&#7873;
th&#7901;i h&#7841;n, th&#7901;i hi&#7879;u. C&#7909; th&#7875; nh&#432; sau:</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>+ Quy&#7871;t &#273;&#7883;nh x&#7917; ph&#7841;t
vi ph&#7841;m hành chính b&#7883; khi&#7871;u n&#7841;i ph&#7843;i liên quan tr&#7921;c
ti&#7871;p &#273;&#7871;n quy&#7873;n, l&#7907;i ích h&#7907;p pháp c&#7911;a
ng&#432;&#7901;i khi&#7871;u n&#7841;i.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>+ Khi&#7871;u n&#7841;i &#273;&#7843;m b&#7843;o
y&#7871;u t&#7889; v&#7873; th&#7901;i hi&#7879;u, th&#7901;i h&#7841;n theo
quy &#273;&#7883;nh.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>+ Khi&#7871;u n&#7841;i ch&#432;a có quy&#7871;t
&#273;&#7883;nh gi&#7843;i quy&#7871;t khi&#7871;u n&#7841;i l&#7847;n hai.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>+ Khi&#7871;u n&#7841;i có v&#259;n b&#7843;n
thông báo &#273;\u0301nh ch&#7881; vi&#7879;c gi&#7843;i quy&#7871;t nh&#432;ng
ch&#432;a h&#7871;t th&#7901;i h&#7841;n 30 ngày ng&#432;&#7901;i khi&#7871;u n&#7841;i
ti&#7871;p t&#7909;c khi&#7871;u n&#7841;i.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>+ Khi&#7871;u n&#7841;i &#273;\u0103
&#273;&#432;&#7907;c kh&#7903;i ki&#7879;n nh&#432;ng T\u0323a án ban hành quy&#7871;t
&#273;&#7883;nh &#273;\u0301nh ch&#7881; gi&#7843;i quy&#7871;t v&#7909; án hành
chính (Ng&#432;&#7901;i gi&#7843;i quy&#7871;t không th&#7909; l\u01b0 khi&#7871;u n&#7841;i
&#273;\u0103 &#273;&#432;&#7907;c T\u0323a án th&#7909; l\u01b0 ho&#7863;c &#273;&#432;&#7907;c
gi&#7843;i quy&#7871;t b&#7857;ng b&#7843;n án, quy&#7871;t &#273;&#7883;nh c&#7911;a
T\u0323a án).</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>Quá tr\u0301nh xem xét &#273;i&#7873;u ki&#7879;n
&#273;&#7875; quy&#7871;t &#273;&#7883;nh th&#7909; l\u01b0 hay không th&#7909; l\u01b0
&#273;&#432;&#7907;c th&#7921;c hi&#7879;n trong th&#7901;i h&#7841;n 10 ngày
làm vi&#7879;c, k&#7875; t&#7915; ngày nh&#7853;n &#273;&#432;&#7907;c khi&#7871;u
n&#7841;i, áp d&#7909;ng cho c&#7843; gi&#7843;i quy&#7871;t l&#7847;n &#273;&#7847;u
và l&#7847;n hai &#273;&#7889;i v&#7899;i khi&#7871;u n&#7841;i quy&#7871;t
&#273;&#7883;nh x&#7917; ph&#7841;t vi ph&#7841;m hành chính. H&#7871;t th&#7901;i
h&#7841;n trên ph&#7843;i có v&#259;n b&#7843;n thông báo v&#7873; vi&#7879;c
th&#7909; l\u01b0 hay không th&#7909; l\u01b0; tr&#432;&#7901;ng h&#7907;p không th&#7909;
l\u01b0 gi&#7843;i quy&#7871;t th\u0301 ph&#7843;i nêu r\u01a1 l\u01b0 do trong v&#259;n b&#7843;n
thông báo cho ng&#432;&#7901;i khi&#7871;u n&#7841;i.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>- M&#7897;t s&#7889; l&#432;u \u01b0:</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>+ Vi&#7879;c ki&#7875;m tra &#273;&#417;n
và &#273;i&#7873;u ki&#7879;n th&#7909; l\u01b0 &#273;&#432;&#7907;c áp d&#7909;ng
chung cho c&#7843; gi&#7843;i quy&#7871;t khi&#7871;u n&#7841;i l&#7847;n
&#273;&#7847;u và gi&#7843;i quy&#7871;t khi&#7871;u n&#7841;i l&#7847;n hai.
&#272;&#7889;i v&#7899;i vi&#7879;c th&#7909; l\u01b0 gi&#7843;i quy&#7871;t gi&#7843;i
quy&#7871;t khi&#7871;u n&#7841;i l&#7847;n hai, không ch&#7881; th&#7909; l\u01b0
tr&#432;&#7901;ng h&#7907;p khi&#7871;u n&#7841;i &#273;&#7889;i v&#7899;i quy&#7871;t
&#273;&#7883;nh gi&#7843;i quy&#7871;t l&#7847;n &#273;&#7847;u, k&#7875; c&#7843;
tr&#432;&#7901;ng h&#7907;p quá th&#7901;i h&#7841;n quy &#273;&#7883;nh mà khi&#7871;u
n&#7841;i l&#7847;n &#273;&#7847;u không &#273;&#432;&#7907;c gi&#7843;i quy&#7871;t
c&#361;ng ph&#7843;i th&#7909; l\u01b0.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>+ Vi&#7879;c thông báo th&#7909; l\u01b0:
&#272;&#7889;i v&#7899;i khi&#7871;u n&#7841;i quy&#7871;t &#273;&#7883;nh x&#7917;
ph&#7841;t vi ph&#7841;m hành chính, ng&#432;&#7901;i có th&#7849;m quy&#7873;n
gi&#7843;i quy&#7871;t khi&#7871;u n&#7841;i thông báo vi&#7879;c th&#7909; l\u01b0
ho&#7863;c không th&#7909; l\u01b0 b&#7857;ng v&#259;n b&#7843;n &#273;&#7871;n
ng&#432;&#7901;i khi&#7871;u n&#7841;i, c&#417; quan, t&#7893; ch&#7913;c,
&#273;&#417;n v&#7883;, cá nhân có th&#7849;m quy&#7873;n chuy&#7875;n khi&#7871;u
n&#7841;i &#273;&#7871;n (n&#7871;u có) và c&#417; quan thanh tra nhà n&#432;&#7899;c
cùng c&#7845;p bi&#7871;t. Thông báo vi&#7879;c th&#7909; l\u01b0 gi&#7843;i quy&#7871;t
khi&#7871;u n&#7841;i th&#7921;c hi&#7879;n theo M&#7851;u s&#7889; 03 ban hành
kèm theo Ngh&#7883; &#273;&#7883;nh 124. Thông báo vi&#7879;c không th&#7909;
l\u01b0 gi&#7843;i quy&#7871;t khi&#7871;u n&#7841;i th&#7921;c hi&#7879;n theo M&#7851;u
s&#7889; 04 ban hành kèm theo Ngh&#7883; &#273;&#7883;nh 124/2020/N&#272;-CP.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>+ Th&#7901;i h&#7841;n gi&#7843;i quy&#7871;t
khi&#7871;u n&#7841;i &#273;&#432;&#7907;c tính t&#7915; th&#7901;i &#273;i&#7875;m
thông báo th&#7909; l\u01b0 gi&#7843;i quy&#7871;t khi&#7871;u n&#7841;i, c&#7909;
th&#7875; nh&#432; sau:</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>Th&#7901;i h&#7841;n gi&#7843;i quy&#7871;t
khi&#7871;u n&#7841;i l&#7847;n &#273;&#7847;u không quá 30 ngày, k&#7875; t&#7915;
ngày th&#7909; l\u01b0; &#273;&#7889;i v&#7899;i v&#7909; vi&#7879;c ph&#7913;c t&#7841;p
th\u0301 th&#7901;i h&#7841;n gi&#7843;i quy&#7871;t có th&#7875; kéo dài h&#417;n
nh&#432;ng không quá 45 ngày, k&#7875; t&#7915; ngày th&#7909; l\u01b0. &#7902; vùng
sâu, vùng xa &#273;i l&#7841;i khó kh&#259;n th\u0301 th&#7901;i h&#7841;n gi&#7843;i
quy&#7871;t khi&#7871;u n&#7841;i không quá 45 ngày, k&#7875; t&#7915; ngày th&#7909;
l\u01b0; &#273;&#7889;i v&#7899;i v&#7909; vi&#7879;c ph&#7913;c t&#7841;p th\u0301 th&#7901;i
h&#7841;n gi&#7843;i quy&#7871;t có th&#7875; kéo dài h&#417;n nh&#432;ng không
quá 60 ngày, k&#7875; t&#7915; ngày th&#7909; l\u01b0.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>Th&#7901;i h&#7841;n gi&#7843;i quy&#7871;t
khi&#7871;u n&#7841;i l&#7847;n hai không quá 45 ngày, k&#7875; t&#7915; ngày
th&#7909; l\u01b0; &#273;&#7889;i v&#7899;i v&#7909; vi&#7879;c ph&#7913;c t&#7841;p
th\u0301 th&#7901;i h&#7841;n gi&#7843;i quy&#7871;t khi&#7871;u n&#7841;i có th&#7875;
kéo dài h&#417;n nh&#432;ng không quá 60 ngày, k&#7875; t&#7915; ngày th&#7909;
l\u01b0. &#7902; vùng sâu, vùng xa &#273;i l&#7841;i khó kh&#259;n th\u0301 th&#7901;i h&#7841;n
gi&#7843;i quy&#7871;t khi&#7871;u n&#7841;i không quá 60 ngày, k&#7875; t&#7915;
ngày th&#7909; l\u01b0; &#273;&#7889;i v&#7899;i v&#7909; vi&#7879;c ph&#7913;c t&#7841;p
th\u0301 th&#7901;i h&#7841;n gi&#7843;i quy&#7871;t khi&#7871;u n&#7841;i có th&#7875;
kéo dài h&#417;n, nh&#432;ng không quá 70 ngày, k&#7875; t&#7915; ngày th&#7909;
l\u01b0.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>K&#7875; t&#7915; th&#7901;i &#273;i&#7875;m
th&#7909; l\u01b0 gi&#7843;i quy&#7871;t khi&#7871;u n&#7841;i, n&#7871;u xét th&#7845;y
vi&#7879;c thi hành quy&#7871;t &#273;&#7883;nh x&#7917; ph&#7841;t vi ph&#7841;m
hành chính b&#7883; khi&#7871;u n&#7841;i s&#7869; gây h&#7853;u qu&#7843; khó
kh&#7855;c ph&#7909;c th\u0301 ng&#432;&#7901;i gi&#7843;i quy&#7871;t khi&#7871;u n&#7841;i
ra quy&#7871;t &#273;&#7883;nh t&#7841;m &#273;\u0301nh ch&#7881; vi&#7879;c thi
hành quy&#7871;t &#273;&#7883;nh quy&#7871;t &#273;&#7883;nh x&#7917; ph&#7841;t
vi ph&#7841;m hành chính b&#7883; khi&#7871;u n&#7841;i. Th&#7901;i h&#7841;n t&#7841;m
&#273;\u0301nh ch&#7881; không v&#432;&#7907;t quá th&#7901;i gian c\u0323n l&#7841;i c&#7911;a
th&#7901;i h&#7841;n gi&#7843;i quy&#7871;t khi&#7871;u n&#7841;i. Quy&#7871;t
&#273;&#7883;nh t&#7841;m &#273;\u0301nh ch\u0301 th&#7921;c hi&#7879;n theo M&#7851;u s&#7889;
11 ban hành kèm theo Ngh&#7883; &#273;&#7883;nh 124. Khi xét th&#7845;y l\u01b0 do c&#7911;a
vi&#7879;c t&#7841;m &#273;\u0301nh ch&#7881; không c\u0323n th\u0301 ng&#432;&#7901;i gi&#7843;i
quy&#7871;t khi&#7871;u n&#7841;i ph&#7843;i ra quy&#7871;t &#273;&#7883;nh h&#7911;y
b&#7887; ngay quy&#7871;t &#273;&#7883;nh t&#7841;m &#273;\u0301nh ch&#7881;. Quy&#7871;t
&#273;&#7883;nh h&#7911;y b&#7887; quy&#7871;t &#273;&#7883;nh t&#7841;m
&#273;\u0301nh ch&#7881; th&#7921;c hi&#7879;n theo M&#7851;u s&#7889; 12 b an hành
kèm theo Ngh&#7883; &#273;&#7883;nh 124/2020/N&#272;-CP.</span></p>

<h4><a name="_Toc131755373">3.1.2. Ki&#7875;m tra l&#7841;i quy&#7871;t &#273;&#7883;nh
x&#7917; ph&#7841;t vi ph&#7841;m hành chính (ch&#7881; áp d&#7909;ng trong
tr&#432;&#7901;ng h&#7907;p th&#7909; l\u01b0 gi&#7843;i quy&#7871;t khi&#7871;u n&#7841;i
l&#7847;n &#273;&#7847;u)</a></h4>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>- Sau khi th&#7909; l\u01b0 gi&#7843;i quy&#7871;t
khi&#7871;u n&#7841;i, ng&#432;&#7901;i có th&#7849;m quy&#7873;n gi&#7843;i
quy&#7871;t khi&#7871;u n&#7841;i l&#7847;n &#273;&#7847;u ki&#7875;m tra l&#7841;i
quy&#7871;t &#273;&#7883;nh x&#7917; ph&#7841;t vi ph&#7841;m hành chính b&#7883;
khi&#7871;u n&#7841;i.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>- N&#7897;i dung ki&#7875;m tra l&#7841;i
bao g&#7891;m:</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>+ C&#259;n c&#7913; pháp l\u01b0 ban hành quy&#7871;t
&#273;&#7883;nh x&#7917; ph&#7841;t vi ph&#7841;m hành chính.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>+ Th&#7849;m quy&#7873;n ban hành quy&#7871;t
&#273;&#7883;nh quy&#7871;t &#273;&#7883;nh x&#7917; ph&#7841;t vi ph&#7841;m
hành</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>chính.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>+ N&#7897;i dung c&#7911;a quy&#7871;t
&#273;&#7883;nh x&#7917; ph&#7841;t vi ph&#7841;m hành chính.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>+ Tr\u0301nh t&#7921;, th&#7911; t&#7909;c ban
hành, th&#7875; th&#7913;c và k&#7929; thu&#7853;t tr\u0301nh bày quy&#7871;t &#273;&#7883;nh
x&#7917; ph&#7841;t vi ph&#7841;m hành chính.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>+ Các n&#7897;i dung khác (n&#7871;u có).</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>- Sau khi ki&#7875;m tra l&#7841;i, n&#7871;u
th&#7845;y khi&#7871;u n&#7841;i là &#273;úng th\u0301 ng&#432;&#7901;i có th&#7849;m
quy&#7873;n gi&#7843;i quy&#7871;t khi&#7871;u n&#7841;i l&#7847;n &#273;&#7847;u
ra quy&#7871;t &#273;&#7883;nh gi&#7843;i quy&#7871;t khi&#7871;u n&#7841;i
ngay. N&#7871;u th&#7845;y ch&#432;a có c&#417; s&#7903; k&#7871;t lu&#7853;n n&#7897;i
dung khi&#7871;u n&#7841;i th\u0301 ng&#432;&#7901;i có th&#7849;m quy&#7873;n gi&#7843;i
quy&#7871;t khi&#7871;u n&#7841;i ti&#7871;n hành xác minh.</span></p>

<h4><a name="_Toc131755374">3.1.3. Giao nhi&#7879;m v&#7909; xác minh và ban
hành quy&#7871;t &#273;&#7883;nh xác minh n&#7897;i dung khi&#7871;u n&#7841;i</a></h4>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>Ng&#432;&#7901;i gi&#7843;i quy&#7871;t
khi&#7871;u n&#7841;i ban hành quy&#7871;t &#273;&#7883;nh xác minh ho&#7863;c
giao c&#417; quan thanh tra nhà n&#432;&#7899;c cùng c&#7845;p ho&#7863;c
c&#417; quan, t&#7893; ch&#7913;c, &#273;&#417;n v&#7883;, cá nhân thu&#7897;c
quy&#7873;n qu&#7843;n l\u01b0 c&#7911;a m\u0301nh ti&#7871;n hành xác minh n&#7897;i
dung khi&#7871;u n&#7841;i. Ng&#432;&#7901;i gi&#7843;i quy&#7871;t khi&#7871;u
n&#7841;i ho&#7863;c c&#417; quan, t&#7893; ch&#7913;c, &#273;&#417;n v&#7883;
&#273;&#432;&#7907;c giao nhi&#7879;m v&#7909; xác minh ban hành quy&#7871;t
&#273;&#7883;nh xác minh n&#7897;i dung khi&#7871;u n&#7841;i, trong &#273;ó
xác &#273;&#7883;nh r\u01a1 ng&#432;&#7901;i th&#7921;c hi&#7879;n xác minh, quy&#7873;n
và ngh&#297;a v&#7909; c&#7911;a ng&#432;&#7901;i th&#7921;c hi&#7879;n xác
minh, th&#7901;i gian, n&#7897;i dung xác minh. Quy&#7871;t &#273;&#7883;nh xác
minh n&#7897;i dung khi&#7871;u n&#7841;i &#273;&#432;&#7907;c th&#7921;c hi&#7879;n
theo M&#7851;u s&#7889; 05 ban hành kèm theo Ngh&#7883; &#273;&#7883;nh
124/2020/N&#272;-CP.</span></p>

<h4><a name="_Toc131755375">3.1.4. K&#7871; ho&#7841;ch xác minh n&#7897;i dung
khi&#7871;u n&#7841;i</a></h4>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>&#272;&#7875; &#273;&#7843;m b&#7843;o ti&#7871;n
&#273;&#7897; và m&#7909;c tiêu vi&#7879;c th&#7921;c hi&#7879;n nhi&#7879;m v&#7909;
xác minh, tr&#432;&#7901;ng h&#7907;p c&#7847;n thi&#7871;t Tr&#432;&#7903;ng
&#273;oàn xác minh ho&#7863;c T&#7893; tr&#432;&#7903;ng T&#7893; xác minh c&#7847;n
xây d&#7921;ng K&#7871; ho&#7841;ch xác minh n&#7897;i dung khi&#7871;u n&#7841;i
v&#7899;i các n&#7897;i dung c&#7909; th&#7875; sau &#273;ây:</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>- C&#259;n c&#7913; pháp l\u01b0 &#273;&#7875;
ti&#7871;n hành xác minh.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>- M&#7909;c &#273;ích, yêu c&#7847;u c&#7911;a
vi&#7879;c xác minh.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>- N&#7897;i dung xác minh.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>- C&#417; quan, t&#7893; ch&#7913;c,
&#273;&#417;n v&#7883;, cá nhân ph&#7843;i làm vi&#7879;c &#273;&#7875; thu th&#7853;p,
xác minh các thông tin, tài li&#7879;u, b&#7857;ng ch&#7913;ng.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>- Các &#273;i&#7873;u ki&#7879;n,
ph&#432;&#417;ng ti&#7879;n ph&#7909;c v&#7909; cho vi&#7879;c xác minh.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>- D&#7921; ki&#7871;n th&#7901;i gian th&#7921;c
hi&#7879;n t&#7915;ng công vi&#7879;c, nhi&#7879;m v&#7909; c&#7909; th&#7875;
c&#7911;a t&#7915;ng thành viên; th&#7901;i gian d&#7921; ph\u0323ng &#273;&#7875; x&#7917;
l\u01b0 các công vi&#7879;c phát sinh.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>- Vi&#7879;c báo cáo ti&#7871;n &#273;&#7897;
th&#7921;c hi&#7879;n.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>- Các n&#7897;i dung khác có liên quan (n&#7871;u
có).</span></p>

<p class=MsoTitle><a name="_Toc131755376">3.2. Ti&#7871;n hành xác minh n&#7897;i
dung khi&#7871;u n&#7841;i</a></p>

<h4><a name="_Toc131755377">3.2.1. M&#7897;t s&#7889; yêu c&#7847;u trong ho&#7841;t
&#273;&#7897;ng xác minh</a></h4>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>Ng&#432;&#7901;i th&#7921;c hi&#7879;n nhi&#7879;m
v&#7909; xác minh khi&#7871;u n&#7841;i ngoài vi&#7879;c n&#7855;m r\u01a1 quy&#7873;n
và ngh&#297;a v&#7909; c&#7911;a m\u0301nh trong quá tr\u0301nh xác minh c\u0323n ph&#7843;i n&#7855;m
r\u01a1 yêu c&#7847;u khi thu th&#7853;p, x&#7917; l\u01b0 thông tin, tài li&#7879;u, b&#7857;ng
ch&#7913;ng liên quan &#273;&#7871;n n&#7897;i dung khi&#7871;u n&#7841;i
&#273;&#7889;i v&#7899;i quy&#7871;t &#273;&#7883;nh x&#7917; ph&#7841;t vi ph&#7841;m
hành chính:</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>- Khi ti&#7871;p nh&#7853;n thông tin, tài
li&#7879;u, b&#7857;ng ch&#7913;ng do ng&#432;&#7901;i khi&#7871;u n&#7841;i ho&#7863;c
ng&#432;&#7901;i &#273;&#7841;i di&#7879;n, ng&#432;&#7901;i &#273;&#432;&#7907;c
&#7911;y quy&#7873;n, lu&#7853;t s&#432;, tr&#7907; giúp viên pháp l\u01b0 c&#7911;a
ng&#432;&#7901;i khi&#7871;u n&#7841;i, ng&#432;&#7901;i b&#7883; khi&#7871;u n&#7841;i,
c&#417; quan, t&#7893; ch&#7913;c, &#273;&#417;n v&#7883;, cá nhân cung c&#7845;p
tr&#7921;c ti&#7871;p ph&#7843;i l&#7853;p biên b&#7843;n giao nh&#7853;n trong
&#273;ó ghi r\u01a1 t\u0301nh tr&#7841;ng, ngu&#7891;n g&#7889;c c&#7911;a thông tin, tài
li&#7879;u, m&#7889;i liên quan t&#7899;i n&#7897;i dung h&#7885; khi&#7871;u n&#7841;i
&#273;&#7889;i v&#7899;i quy&#7871;t &#273;&#7883;nh x&#7917; ph&#7841;t vi ph&#7841;m
hành chính.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>- Ph&#7843;i ki&#7875;m tra tính xác th&#7921;c
c&#7911;a thông tin, tài li&#7879;u, b&#7857;ng ch&#7913;ng &#273;\u0103 thu th&#7853;p
&#273;&#432;&#7907;c, &#273;&#7843;m b&#7843;o r\u01a1 ngu&#7891;n g&#7889;c, có
tính khách quan và tính liên quan &#273;&#7889;i v&#7899;i n&#7897;i dung khi&#7871;u
n&#7841;i &#273;&#7889;i v&#7899;i quy&#7871;t &#273;&#7883;nh x&#7917; ph&#7841;t
vi ph&#7841;m hành chính; &#273;ánh giá, nh&#7853;n &#273;&#7883;nh v&#7873;
giá tr&#7883; ch&#7913;ng minh c&#7911;a nh&#7919;ng thông tin, tài li&#7879;u,
b&#7857;ng ch&#7913;ng &#273;ó trên c&#417; s&#7903; tuân th&#7911; các quy
&#273;&#7883;nh c&#7911;a pháp lu&#7853;t.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>- Trong quá tr\u0301nh xác minh, n&#7871;u xét
th&#7845;y vi&#7879;c thi hành quy&#7871;t &#273;&#7883;nh x&#7917; ph&#7841;t
vi ph&#7841;m hành chính b&#7883; khi&#7871;u n&#7841;i s&#7869; gây h&#7853;u
qu&#7843; khó kh&#7855;c ph&#7909;c ho&#7863;c nh&#7853;n th&#7845;y c&#7847;n
thi&#7871;t tr&#432;ng c&#7847;u giám &#273;&#7883;nh th\u0301 ng&#432;&#7901;i
&#273;&#432;&#7907;c giao nhi&#7879;m v&#7909; xác minh k&#7883;p th&#7901;i
báo cáo v&#7899;i ng&#432;&#7901;i ra quy&#7871;t &#273;&#7883;nh xác minh n&#7897;i
dung khi&#7871;u n&#7841;i &#273;&#7875; &#273;&#7873; xu&#7845;t ng&#432;&#7901;i
gi&#7843;i quy&#7871;t khi&#7871;u n&#7841;i quy&#7871;t &#273;&#7883;nh.</span></p>

<h4><a name="_Toc131755378">3.2.2. Thu th&#7853;p, x&#7917; l\u01b0 thông tin, tài
li&#7879;u, b&#7857;ng ch&#7913;ng liên quan &#273;&#7871;n n&#7897;i dung khi&#7871;u
n&#7841;i</a></h4>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>&#272;ây là quá tr\u0301nh thu th&#7853;p và
khai thác thông tin t&#7915; phía ng&#432;&#7901;i khi&#7871;u n&#7841;i,
ng&#432;&#7901;i có quy&#7873;n, l&#7907;i ích liên quan, ng&#432;&#7901;i b&#7883;
khi&#7871;u n&#7841;i, ng&#432;&#7901;i th&#7921;c hi&#7879;n nhi&#7879;m v&#7909;
xác minh ph&#7843;i ti&#7871;n hành các bi&#7879;n pháp c&#7847;n thi&#7871;t
&#273;&#7875; thu th&#7853;p thông tin, tài li&#7879;u, b&#7857;ng ch&#7913;ng
liên quan &#273;&#7871;n n&#7897;i dung khi&#7871;u n&#7841;i. &#272;&#7875;
&#273;&#7841;t hi&#7879;u qu&#7843;, tr&#432;&#7899;c &#273;ó ng&#432;&#7901;i
xác minh c&#7847;n ph&#7843;i nghiên c&#7913;u k&#7929; h&#7891; s&#417;
&#273;&#417;n, các v&#259;n b&#7843;n pháp lu&#7853;t có liên quan &#273;&#7871;n
x&#7917; l\u01b0 vi ph&#7841;m hành chính, các v&#259;n b&#7843;n pháp lu&#7853;t
chuyên ngành v&#7873; l&#297;nh v&#7921;c x&#7917; ph&#7841;t vi ph&#7841;m
hành chính, xác &#273;&#7883;nh c&#7909; th&#7875; nh&#7919;ng &#273;i&#7875;m
m&#7845;u ch&#7889;t c&#7847;n thu th&#7853;p thông tin, v&#7853;n d&#7909;ng h&#7907;p
l\u01b0 các k&#7929; n&#259;ng nghi&#7879;p v&#7909; &#273;&#7875; các &#273;&#7889;i
t&#432;&#7907;ng giao ti&#7871;p tích c&#7921;c ph&#7889;i h&#7907;p.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>a. Làm vi&#7879;c tr&#7921;c ti&#7871;p v&#7899;i
ng&#432;&#7901;i khi&#7871;u n&#7841;i, ng&#432;&#7901;i &#273;&#7841;i di&#7879;n,
ng&#432;&#7901;i &#273;&#432;&#7907;c &#7911;y quy&#7873;n, lu&#7853;t s&#432;,
tr&#7907; giúp viên pháp l\u01b0 c&#7911;a ng&#432;&#7901;i khi&#7871;u n&#7841;i</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>Ng&#432;&#7901;i xác minh khi&#7871;u n&#7841;i
xác &#273;&#7883;nh &#273;&#7883;a &#273;i&#7875;m làm vi&#7879;c, g&#7917;i gi&#7845;y
m&#7901;i ho&#7863;c các h\u0301nh th&#7913;c liên h&#7879; khác &#273;&#7875; làm
vi&#7879;c v&#7899;i ng&#432;&#7901;i khi&#7871;u n&#7841;i. Tr&#432;&#7899;c
khi làm vi&#7879;c th&#7921;c hi&#7879;n th&#7911; t&#7909;c ki&#7875;m tra gi&#7845;y
t&#7901; tùy thân &#273;&#7875; xác &#273;&#7883;nh &#273;ang làm vi&#7879;c tr&#7921;c
ti&#7871;p v&#7899;i ng&#432;&#7901;i khi&#7871;u n&#7841;i (tr&#432;&#7901;ng
h&#7907;p ng&#432;&#7901;i &#273;&#7841;i di&#7879;n, ng&#432;&#7901;i
&#273;&#432;&#7907;c &#7911;y quy&#7873;n, lu&#7853;t s&#432;, tr&#7907; giúp
viên pháp l\u01b0 c&#7911;a ng&#432;&#7901;i khi&#7871;u n&#7841;i làm vi&#7879;c
th\u0301 ki&#7875;m tra gi&#7845;y &#7911;y quy&#7873;n và các gi&#7845;y t&#7901;
khác ch&#7913;ng minh nhân thân). Sau khi gi&#7899;i thi&#7879;u thành ph&#7847;n
làm vi&#7879;c, nêu l\u01b0 do bu&#7893;i làm vi&#7879;c, ng&#432;&#7901;i xác minh
nêu n&#7897;i dung khi&#7871;u n&#7841;i &#273;\u0103 &#273;&#432;&#7907;c th&#7875;
hi&#7879;n trong quy&#7871;t &#273;&#7883;nh xác minh, yêu c&#7847;u ng&#432;&#7901;i
khi&#7871;u làm r\u01a1 các n&#7897;i dung và ch&#7889;t t&#7915;ng n&#7897;i dung
khi&#7871;u n&#7841;i c&#7909; th&#7875;. Ngoài nh&#7919;ng tài li&#7879;u
&#273;\u0103 ti&#7871;p nh&#7853;n &#273;&#432;&#7907;c g&#7917;i kèm theo
&#273;&#417;n khi&#7871;u n&#7841;i mà ng&#432;&#7901;i xác minh &#273;\u0103 có,
yêu c&#7847;u ng&#432;&#7901;i khi&#7871;u n&#7841;i ho&#7863;c ng&#432;&#7901;i
&#273;&#7841;i di&#7879;n, ng&#432;&#7901;i &#273;&#432;&#7907;c &#7911;y quy&#7873;n,
lu&#7853;t s&#432;, tr&#7907; giúp viên pháp l\u01b0 c&#7911;a ng&#432;&#7901;i khi&#7871;u
n&#7841;i cung c&#7845;p b&#7893; sung thông tin, tài li&#7879;u, b&#7857;ng ch&#7913;ng
có liên quan &#273;&#7871;n n&#7897;i dung khi&#7871;u n&#7841;i &#273;&#7889;i
v&#7899;i quy&#7871;t &#273;&#7883;nh x&#7917; ph&#7841;t vi ph&#7841;m hành
chính.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>N&#7897;i dung làm vi&#7879;c &#273;&#432;&#7907;c
l&#7853;p thành biên b&#7843;n, ghi r\u01a1 th&#7901;i gian, &#273;&#7883;a &#273;i&#7875;m,
thành ph&#7847;n, n&#7897;i dung và có ch&#7919; k\u01b0 c&#7911;a các bên. Tr&#432;&#7901;ng
h&#7907;p ng&#432;&#7901;i khi&#7871;u n&#7841;i không h&#7907;p tác, không làm
vi&#7879;c, không k\u01b0 vào biên b&#7843;n làm vi&#7879;c th\u0301 biên b&#7843;n
&#273;&#432;&#7907;c l&#7845;y ch&#7919; k\u01b0 c&#7911;a ng&#432;&#7901;i làm ch&#7913;ng
ho&#7863;c &#273;&#7841;i di&#7879;n chính quy&#7873;n &#273;&#7883;a
ph&#432;&#417;ng. Biên b&#7843;n &#273;&#432;&#7907;c l&#7853;p thành ít nh&#7845;t
hai b&#7843;n, m&#7895;i bên gi&#7919; m&#7897;t b&#7843;n. Biên b&#7843;n làm
vi&#7879;c th&#7921;c hi&#7879;n theo M&#7851;u s&#7889; 06 ban hành kèm theo
Ngh&#7883; &#273;&#7883;nh 124/2020/N&#272;- CP.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>b. Làm vi&#7879;c tr&#7921;c ti&#7871;p v&#7899;i
ng&#432;&#7901;i có quy&#7873;n, l&#7907;i ích liên quan</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>Ng&#432;&#7901;i xác minh th&#7921;c hi&#7879;n
th&#7911; t&#7909;c c&#7911;a bu&#7893;i làm vi&#7879;c v&#7899;i ng&#432;&#7901;i
có quy&#7873;n, l&#7907;i ích liên quan t&#432;&#417;ng t&#7921; nh&#432; làm
vi&#7879;c v&#7899;i ng&#432;&#7901;i khi&#7871;u n&#7841;i. Yêu c&#7847;u
ng&#432;&#7901;i có quy&#7873;n, l&#7907;i ích liên quan cung c&#7845;p thông
tin, tài li&#7879;u, b&#7857;ng ch&#7913;ng liên quan &#273;&#7871;n n&#7897;i
dung khi&#7871;u n&#7841;i.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:

font-family:"Times New Roman",serif'>c. Làm vi&#7879;c v&#7899;i ng&#432;&#7901;i
