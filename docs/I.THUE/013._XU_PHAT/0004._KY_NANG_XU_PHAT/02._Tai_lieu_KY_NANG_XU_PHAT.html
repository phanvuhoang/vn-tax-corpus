<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>Tr&#432;&#7901;ng h&#7907;p x&#7917; ph&#7841;t
trên bi&#7875;n ho&#7863;c ngoài gi&#7901; hành chính, ng&#432;&#7901;i có th&#7849;m
quy&#7873;n x&#7917; ph&#7841;t &#273;&#432;&#7907;c thu ti&#7873;n ph&#7841;t
tr&#7921;c ti&#7871;p và ph&#7843;i n&#7897;p t&#7841;i Kho b&#7841;c Nhà
n&#432;&#7899;c ho&#7863;c n&#7897;p vào tài kho&#7843;n c&#7911;a Kho b&#7841;c
Nhà n&#432;&#7899;c trong th&#7901;i h&#7841;n 02 ngày làm vi&#7879;c, k&#7875;
t&#7915; ngày vào &#273;&#7871;n b&#7901; ho&#7863;c ngày thu ti&#7873;n ph&#7841;t.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>Chính ph&#7911; quy &#273;&#7883;nh chi ti&#7871;t
h\u0301nh th&#7913;c, th&#7911; t&#7909;c thu, n&#7897;p ti&#7873;n ph&#7841;t t&#7841;i
&#272;i&#7873;u 20 c&#7911;a Ngh&#7883; &#273;&#7883;nh s&#7889;
118/2021/N&#272;-CP, nh&#432; sau:</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>- Cá nhân, t&#7893; ch&#7913;c vi ph&#7841;m
th&#7921;c hi&#7879;n vi&#7879;c n&#7897;p ti&#7873;n ph&#7841;t theo m&#7897;t
trong các h\u0301nh th&#7913;c sau &#273;ây:</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>+ N&#7897;p ti&#7873;n m&#7863;t tr&#7921;c
ti&#7871;p t&#7841;i Kho b&#7841;c Nhà n&#432;&#7899;c ho&#7863;c t&#7841;i
ngân hàng th&#432;&#417;ng m&#7841;i n&#417;i Kho b&#7841;c nhà n&#432;&#7899;c
m&#7903; tài kho&#7843;n &#273;&#432;&#7907;c ghi trong quy&#7871;t &#273;&#7883;nh
x&#7917; ph&#7841;t;</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>+ Chuy&#7875;n kho&#7843;n vào tài kho&#7843;n
c&#7911;a Kho b&#7841;c nhà n&#432;&#7899;c &#273;&#432;&#7907;c ghi trong quy&#7871;t
&#273;&#7883;nh x&#7917; ph&#7841;t thông qua C&#7893;ng D&#7883;ch v&#7909;
công Qu&#7889;c gia ho&#7863;c d&#7883;ch v&#7909; thanh toán &#273;i&#7879;n t&#7917;
c&#7911;a ngân hàng ho&#7863;c t&#7893; ch&#7913;c cung &#7913;ng d&#7883;ch v&#7909;
trung gian thanh toán;</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>+ N&#7897;p ph&#7841;t tr&#7921;c ti&#7871;p
cho ng&#432;&#7901;i có th&#7849;m quy&#7873;n x&#7917; ph&#7841;t theo quy
&#273;&#7883;nh t&#7841;i kho&#7843;n 1 &#272;i&#7873;u 56, kho&#7843;n 2
&#272;i&#7873;u 78 Lu&#7853;t XLVPHC ho&#7863;c n&#7897;p tr&#7921;c ti&#7871;p
cho c&#7843;ng v&#7909; ho&#7863;c &#273;&#7841;i di&#7879;n c&#7843;ng v&#7909;
hàng không &#273;&#7889;i v&#7899;i tr&#432;&#7901;ng h&#7907;p ng&#432;&#7901;i
b&#7883; x&#7917; ph&#7841;t là hành khách quá c&#7843;nh qua l\u0103nh th&#7893; Vi&#7879;t
Nam &#273;&#7875; th&#7921;c hi&#7879;n chuy&#7871;n bay qu&#7889;c t&#7871; xu&#7845;t
phát t&#7915; l\u0103nh th&#7893; Vi&#7879;t Nam; thành viên t&#7893; bay làm nhi&#7879;m
v&#7909; trên chuy&#7871;n bay quá c&#7843;nh qua l\u0103nh th&#7893; Vi&#7879;t
Nam; thành viên t&#7893; bay c&#7911;a h\u0103ng hàng không n&#432;&#7899;c ngoài th&#7921;c
hi&#7879;n chuy&#7871;n bay qu&#7889;c t&#7871; xu&#7845;t phát t&#7915; l\u0103nh
th&#7893; Vi&#7879;t Nam;</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>+ N&#7897;p ti&#7873;n ph&#7841;t vi ph&#7841;m
hành chính trong l&#297;nh v&#7921;c giao thông &#273;&#432;&#7901;ng b&#7897;
vào Kho b&#7841;c nhà n&#432;&#7899;c theo quy &#273;&#7883;nh t&#7841;i các
&#273;i&#7875;m a, b và c kho&#7843;n 1 &#272;i&#7873;u 20 Ngh&#7883; &#273;&#7883;nh
s&#7889; 118/2021/N&#272;-CP ho&#7863;c thông qua d&#7883;ch v&#7909; b&#432;u
chính công ích.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>- Th&#7911; t&#7909;c n&#7897;p ti&#7873;n
ph&#7841;t:</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>+ Trong tr&#432;&#7901;ng h&#7907;p quy&#7871;t
&#273;&#7883;nh x&#7917; ph&#7841;t ch&#7881; áp d&#7909;ng h\u0301nh th&#7913;c ph&#7841;t
ti&#7873;n mà cá nhân b&#7883; x&#7917; ph&#7841;t không c&#432; trú, t&#7893;
ch&#7913;c b&#7883; x&#7917; ph&#7841;t không &#273;óng tr&#7909; s&#7903; t&#7841;i
n&#417;i x&#7843;y ra hành vi vi ph&#7841;m, th\u0301 theo &#273;&#7873; ngh&#7883;
c&#7911;a cá nhân, t&#7893; ch&#7913;c b&#7883; x&#7917; ph&#7841;t, ng&#432;&#7901;i
có th&#7849;m quy&#7873;n x&#7917; ph&#7841;t quy&#7871;t &#273;&#7883;nh n&#7897;p
ti&#7873;n ph&#7841;t theo h\u0301nh th&#7913;c n&#7897;p ph&#7841;t quy &#273;&#7883;nh
t&#7841;i &#273;i&#7875;m b kho&#7843;n 1 &#272;i&#7873;u 20 Ngh&#7883; &#273;&#7883;nh
s&#7889; 118/2021/N&#272;-CP và g&#7917;i quy&#7871;t &#273;&#7883;nh x&#7917;
ph&#7841;t cho cá nhân, t&#7893; ch&#7913;c vi ph&#7841;m qua b&#432;u &#273;i&#7879;n
b&#7857;ng h\u0301nh th&#7913;c b&#7843;o &#273;&#7843;m trong th&#7901;i h&#7841;n
02 ngày làm vi&#7879;c, k&#7875; t&#7915; ngày ra quy&#7871;t &#273;&#7883;nh x&#7917;
ph&#7841;t;</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>+ Cá nhân, t&#7893; ch&#7913;c b&#7883; x&#7917;
ph&#7841;t n&#7897;p ph&#7841;t vào tài kho&#7843;n Kho b&#7841;c nhà n&#432;&#7899;c
ghi trong quy&#7871;t &#273;&#7883;nh x&#7917; ph&#7841;t trong th&#7901;i h&#7841;n
quy &#273;&#7883;nh t&#7841;i kho&#7843;n 1 &#272;i&#7873;u 73 Lu&#7853;t
XLVPHC;</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>+ Trong th&#7901;i h&#7841;n 05 ngày làm
vi&#7879;c, k&#7875; t&#7915; ngày ti&#7873;n ph&#7841;t &#273;&#432;&#7907;c n&#7897;p
tr&#7921;c ti&#7871;p vào tài kho&#7843;n c&#7911;a Kho b&#7841;c nhà n&#432;&#7899;c
ho&#7863;c gián ti&#7871;p thông qua d&#7883;ch b&#432;u chính công ích,
ng&#432;&#7901;i t&#7841;m gi&#7919; các gi&#7845;y t&#7901; &#273;&#7875; b&#7843;o
&#273;&#7843;m cho vi&#7879;c x&#7917; ph&#7841;t theo quy &#273;&#7883;nh t&#7841;i
kho&#7843;n 6 &#272;i&#7873;u 125 Lu&#7853;t XLVPHC ph&#7843;i g&#7917;i tr&#7843;
l&#7841;i cá nhân, t&#7893; ch&#7913;c b&#7883; x&#7917; ph&#7841;t các gi&#7845;y
t&#7901; &#273;\u0103 t&#7841;m gi&#7919; qua b&#432;u &#273;i&#7879;n b&#7857;ng
h\u0301nh th&#7913;c b&#7843;o &#273;&#7843;m &#273;&#7889;i v&#7899;i tr&#432;&#7901;ng
h&#7907;p n&#7897;p tr&#7921;c ti&#7871;p ho&#7863;c g&#7917;i qua d&#7883;ch
b&#432;u chính công ích &#273;&#7889;i v&#7899;i tr&#432;&#7901;ng h&#7907;p n&#7897;p
gián ti&#7871;p. Chi phí g&#7917;i quy&#7871;t &#273;&#7883;nh x&#7917; ph&#7841;t
và chi phí g&#7917;i tr&#7843; l&#7841;i gi&#7845;y t&#7901; do cá nhân, t&#7893;
ch&#7913;c b&#7883; x&#7917; ph&#7841;t chi tr&#7843;;</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>+ Cá nhân, t&#7893; ch&#7913;c b&#7883; x&#7917;
ph&#7841;t có th&#7875; tr&#7921;c ti&#7871;p nh&#7853;n l&#7841;i gi&#7845;y t&#7901;
&#273;\u0103 b&#7883; t&#7841;m gi&#7919; ho&#7863;c thông qua ng&#432;&#7901;i
&#273;&#7841;i di&#7879;n theo pháp lu&#7853;t ho&#7863;c &#273;&#7841;i di&#7879;n
theo &#7911;y quy&#7873;n.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>- Tr&#432;&#7901;ng h&#7907;p n&#7897;p ch&#7853;m
ti&#7873;n ph&#7841;t theo quy &#273;&#7883;nh t&#7841;i kho&#7843;n 1 &#272;i&#7873;u
7 8 Lu&#7853;t XLVPHC, th\u0301 c&#417; quan thu ti&#7873;n ph&#7841;t c&#259;n c&#7913;
vào quy&#7871;t &#273;&#7883;nh x&#7917; ph&#7841;t &#273;&#7875; tính và thu
ti&#7873;n ch&#7853;m n&#7897;p ph&#7841;t.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><b style='font-family:"Times New Roman",serif'>c. B&#432;&#7899;c
3: Ng&#432;&#7901;i thu ti&#7873;n ph&#7841;t có trách nhi&#7879;m giao ch&#7913;ng
t&#7915; thu ti&#7873;n ph&#7841;t cho cá nhân, t&#7893; ch&#7913;c n&#7897;p
ti&#7873;n ph&#7841;t.</span></b></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>L&#432;u \u01b0: M&#7885;i tr&#432;&#7901;ng h&#7907;p
thu ti&#7873;n ph&#7841;t, ng&#432;&#7901;i thu ti&#7873;n ph&#7841;t có trách
nhi&#7879;m giao ch&#7913;ng t&#7915; thu ti&#7873;n ph&#7841;t cho cá nhân, t&#7893;
ch&#7913;c n&#7897;p ti&#7873;n ph&#7841;t.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>Chính ph&#7911; quy &#273;&#7883;nh chi ti&#7871;t
v&#7873; ch&#7913;ng t&#7915; thu, n&#7897;p ti&#7873;n ph&#7841;t và ti&#7873;n
ch&#7853;m n&#7897;p ph&#7841;t vi ph&#7841;m hành chính t&#7841;i &#272;i&#7873;u
21 c&#7911;a Ngh&#7883; &#273;&#7883;nh s&#7889; 118/2021/N&#272;-CP, nh&#432;
sau:</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>- Ch&#7913;ng t&#7915; thu, n&#7897;p ti&#7873;n
ph&#7841;t, ti&#7873;n ch&#7853;m n&#7897;p ph&#7841;t &#273;&#432;&#7907;c in,
phát hành, qu&#7843;n l\u01b0, s&#7917; d&#7909;ng th&#7889;ng nh&#7845;t trong ph&#7841;m
vi toàn qu&#7889;c ho&#7863;c ch&#7913;ng t&#7915; &#273;i&#7879;n t&#7917; n&#7897;p
ngân sách nhà n&#432;&#7899;c theo quy &#273;&#7883;nh c&#7911;a pháp lu&#7853;t
&#273;&#7875; xác nh&#7853;n s&#7889; ti&#7873;n mà cá nhân, t&#7893; ch&#7913;c
b&#7883; x&#7917; ph&#7841;t vi ph&#7841;m hành chính &#273;\u0103 n&#7897;p cho
c&#417; quan thu ti&#7873;n ph&#7841;t. Ch&#7913;ng t&#7915; thu, n&#7897;p ti&#7873;n
ph&#7841;t, ti&#7873;n ch&#7853;m n&#7897;p ph&#7841;t vi ph&#7841;m hành chính
ph&#7843;i &#273;&#432;&#7907;c l&#432;u trong h&#7891; s&#417; x&#7917; ph&#7841;t
vi ph&#7841;m hành chính theo quy &#273;&#7883;nh c&#7911;a pháp lu&#7853;t v&#7873;
l&#432;u tr&#7919;.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>- Ch&#7913;ng t&#7915; thu, n&#7897;p ti&#7873;n
ph&#7841;t và ti&#7873;n ch&#7853;m n&#7897;p ph&#7841;t bao g&#7891;m:</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>+ Biên lai thu ti&#7873;n ph&#7841;t không
in s&#7861;n m&#7879;nh giá &#273;&#432;&#7907;c s&#7917; d&#7909;ng &#273;&#7875;
thu ti&#7873;n x&#7917; ph&#7841;t vi ph&#7841;m hành chính c\u0323n l&#7841;i và
thu ti&#7873;n ch&#7853;m n&#7897;p ph&#7841;t;</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>+ Gi&#7845;y n&#7897;p ti&#7873;n, ch&#7913;ng
t&#7915; &#273;i&#7879;n t&#7917; n&#7897;p ngân sách nhà n&#432;&#7899;c (n&#7871;u
có);</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>+ Gi&#7845;y ch&#7913;ng nh&#7853;n n&#7897;p
ti&#7873;n ph&#7841;t trong l&#297;nh v&#7921;c giao thông &#273;&#432;&#7901;ng
b&#7897; c&#7911;a doanh nghi&#7879;p cung &#7913;ng d&#7883;ch v&#7909;
b&#432;u chính công ích (n&#7871;u có);</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>+ Các ch&#7913;ng t&#7915; khác theo quy
&#273;&#7883;nh c&#7911;a pháp lu&#7853;t.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>- Vi&#7879;c phát hành biên lai thu ti&#7873;n
ph&#7841;t &#273;&#432;&#7907;c th&#7921;c hi&#7879;n nh&#432; sau:</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>+ B&#7897; Tài chính có trách nhi&#7879;m
t&#7893; ch&#7913;c c&#7845;p biên lai thu ti&#7873;n ph&#7841;t cho c&#417;
quan, &#273;&#417;n v&#7883; c&#7911;a ng&#432;&#7901;i có th&#7849;m quy&#7873;n
x&#7917; ph&#7841;t vi ph&#7841;m hành chính và các c&#417; quan, t&#7893; ch&#7913;c
thu ti&#7873;n ph&#7841;t vi ph&#7841;m hành chính theo quy &#273;&#7883;nh c&#7911;a
pháp lu&#7853;t.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>Doanh nghi&#7879;p cung &#7913;ng d&#7883;ch
v&#7909; b&#432;u chính có trách nhi&#7879;m t&#7893; ch&#7913;c vi&#7879;c in
và qu&#7843;n l\u01b0 gi&#7845;y ch&#7913;ng nh&#7853;n n&#7897;p ti&#7873;n ph&#7841;t
trong l&#297;nh v&#7921;c giao thông &#273;&#432;&#7901;ng b&#7897; thông qua d&#7883;ch
v&#7909; b&#432;u chính công ích;</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>+ C&#417; quan, t&#7893; ch&#7913;c phát
hành ph&#7843;i có thông báo phát hành b&#7857;ng v&#259;n b&#7843;n tr&#432;&#7899;c
khi &#273;&#432;a ra s&#7917; d&#7909;ng l&#7847;n &#273;&#7847;u m&#7851;u
biên lai thu ti&#7873;n ph&#7841;t vi ph&#7841;m hành chính ho&#7863;c gi&#7845;y
ch&#7913;ng nh&#7853;n n&#7897;p ti&#7873;n ph&#7841;t trong l&#297;nh v&#7921;c
giao thông &#273;&#432;&#7901;ng b&#7897;;</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>+ Cá nhân, t&#7893; ch&#7913;c
&#273;&#432;&#7907;c c&#7845;p biên lai thu ti&#7873;n ph&#7841;t vi ph&#7841;m
hành chính, gi&#7845;y ch&#7913;ng nh&#7853;n n&#7897;p ti&#7873;n ph&#7841;t
trong l&#297;nh v&#7921;c giao thông &#273;&#432;&#7901;ng b&#7897; ph&#7843;i
qu&#7843;n l\u01b0 và s&#7917; d&#7909;ng biên lai thu ti&#7873;n ph&#7841;t, gi&#7845;y
ch&#7913;ng nh&#7853;n n&#7897;p ti&#7873;n ph&#7841;t theo quy &#273;&#7883;nh
t&#7841;i Ngh&#7883; &#273;&#7883;nh s&#7889; 118/2021/N&#272;-CP và các quy
&#273;&#7883;nh pháp lu&#7853;t khác có liên quan.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>- S&#7917; d&#7909;ng ch&#7913;ng t&#7915;
thu, n&#7897;p ti&#7873;n ph&#7841;t và ti&#7873;n ch&#7853;m n&#7897;p ph&#7841;t:</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>+ Cá nhân, t&#7893; ch&#7913;c thu ti&#7873;n
ph&#7841;t khi s&#7917; d&#7909;ng biên lai thu ti&#7873;n ph&#7841;t ph&#7843;i
&#273;&#7889;i chi&#7871;u các thông tin ghi trên quy&#7871;t &#273;&#7883;nh x&#7917;
ph&#7841;t vi ph&#7841;m hành chính và các n&#7897;i dung ghi trên biên lai thu
ti&#7873;n ph&#7841;t theo &#273;úng quy &#273;&#7883;nh. T&#7893;ng s&#7889;
ti&#7873;n trên các biên lai thu ti&#7873;n ph&#7841;t ph&#7843;i &#273;úng v&#7899;i
s&#7889; ti&#7873;n ph&#7841;t ghi trong quy&#7871;t &#273;&#7883;nh x&#7917;
ph&#7841;t;</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>+ Tr&#432;&#7901;ng h&#7907;p thu ti&#7873;n
ch&#7853;m n&#7897;p ph&#7841;t vi ph&#7841;m hành chính theo quy &#273;&#7883;nh
t&#7841;i kho&#7843;n 1 &#272;i&#7873;u 78 Lu&#7853;t XLVPHC, th\u0301 n&#7897;i
dung biên lai ph&#7843;i ghi r\u01a1 s&#7889; ti&#7873;n &#273;\u0103 thu và vi&#7879;c
thu thu&#7897;c tr&#432;&#7901;ng h&#7907;p thu ti&#7873;n ch&#7853;m n&#7897;p
ph&#7841;t;</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>+ Cá nhân, t&#7893; ch&#7913;c n&#7897;p
ti&#7873;n ph&#7841;t vi ph&#7841;m hành chính có quy&#7873;n t&#7915; ch&#7889;i
n&#7897;p ti&#7873;n ho&#7863;c yêu c&#7847;u hoàn tr&#7843; s&#7889; ti&#7873;n
ph&#7841;t &#273;\u0103 n&#7897;p n&#7871;u phát hi&#7879;n biên lai thu ti&#7873;n
ph&#7841;t ho&#7863;c ch&#7913;ng t&#7915; thu ti&#7873;n không &#273;úng m&#7851;u
quy &#273;&#7883;nh, ghi không &#273;úng v&#7899;i quy&#7871;t &#273;&#7883;nh
x&#7917; ph&#7841;t vi ph&#7841;m hành chính, ghi không &#273;úng s&#7889; ti&#7873;n
ph&#7841;t, ch&#7853;m n&#7897;p ph&#7841;t (n&#7871;u có) và báo cho c&#417;
quan qu&#7843;n l\u01b0 ng&#432;&#7901;i có th&#7849;m quy&#7873;n thu ti&#7873;n ph&#7841;t
bi&#7871;t &#273;&#7875; x&#7917; l\u01b0 k&#7883;p th&#7901;i.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>- Qu&#7843;n l\u01b0 biên lai thu ti&#7873;n ph&#7841;t:</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>+ Vi&#7879;c qu&#7843;n l\u01b0 biên lai thu ti&#7873;n
ph&#7841;t vi ph&#7841;m hành chính th&#7921;c hi&#7879;n theo ch&#7871; &#273;&#7897;
qu&#7843;n l\u01b0 hi&#7879;n hành phù h&#7907;p v&#7899;i t&#7915;ng lo&#7841;i
biên lai;</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>+ C&#417; quan, t&#7893; ch&#7913;c
&#273;&#432;&#7907;c c&#7845;p biên lai &#273;&#7875; thu ti&#7873;n ph&#7841;t
vi ph&#7841;m hành chính có trách nhi&#7879;m m&#7903; s&#7893; sách theo d\u01a1i
nh&#7853;p, xu&#7845;t, b&#7843;o qu&#7843;n, l&#432;u gi&#7919; biên lai theo
ch&#7871; &#273;&#7897; k&#7871; toán hi&#7879;n hành; h&#7857;ng tháng, h&#7857;ng
qu\u01b0 l&#7853;p báo cáo t\u0301nh h\u0301nh s&#7917; d&#7909;ng biên lai thu ti&#7873;n ph&#7841;t
vi ph&#7841;m hành chính; h&#7857;ng n&#259;m th&#7921;c hi&#7879;n quy&#7871;t
toán biên lai thu ti&#7873;n ph&#7841;t vi ph&#7841;m hành chính theo quy
&#273;&#7883;nh c&#7911;a pháp lu&#7853;t;</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>+ Vi&#7879;c h&#7911;y biên lai thu ti&#7873;n
ph&#7841;t th&#7921;c hi&#7879;n theo quy &#273;&#7883;nh c&#7911;a pháp lu&#7853;t
phù h&#7907;p v&#7899;i t&#7915;ng ch&#7911;ng lo&#7841;i biên lai.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>- Ch&#7913;ng t&#7915; &#273;i&#7879;n t&#7917;
n&#7897;p ngân sách nhà n&#432;&#7899;c &#273;&#432;&#7907;c phát hành và s&#7917;
d&#7909;ng theo quy &#273;&#7883;nh c&#7911;a pháp lu&#7853;t.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>- B&#7897; tr&#432;&#7903;ng B&#7897; Tài
chính quy &#273;&#7883;nh c&#7909; th&#7875; n&#7897;i dung, h\u0301nh th&#7913;c
biên lai thu ti&#7873;n ph&#7841;t và các ch&#7913;ng t&#7915; thu ti&#7873;n
ph&#7841;t khác; t&#7893; ch&#7913;c in, phát hành và qu&#7843;n l\u01b0, s&#7917; d&#7909;ng
biên lai thu ti&#7873;n ph&#7841;t và ti&#7873;n ch&#7853;m n&#7897;p ph&#7841;t
vi ph&#7841;m hành chính, tr&#7915; gi&#7845;y ch&#7913;ng nh&#7853;n n&#7897;p
ti&#7873;n ph&#7841;t trong l&#297;nh v&#7921;c giao thông &#273;&#432;&#7901;ng
b&#7897; thông qua d&#7883;ch v&#7909; b&#432;u chính công ích quy &#273;&#7883;nh
t&#7841;i kho&#7843;n 3 &#272;i&#7873;u 21 c&#7911;a Lu&#7853;t XLVPHC.</span></p>

<h4><a name="_Toc131755345"><span class=Heading4Char><span style='font-style:normal'>2.2.2. T&#7893; ch&#7913;c thi hành quy&#7871;t
&#273;&#7883;nh x&#7917; ph&#7841;t t&#432;&#7899;c quy&#7873;n s&#7917; d&#7909;ng
gi&#7845;y</span></span> phép, ch&#7913;ng ch&#7881; hành ngh&#7873; có th&#7901;i
h&#7841;n ho&#7863;c &#273;\u0301nh ch&#7881; ho&#7841;t &#273;&#7897;ng có th&#7901;i
h&#7841;n</a></h4>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><b style='font-family:"Times New Roman",serif'>a. B&#432;&#7899;c
1: Ng&#432;&#7901;i có th&#7849;m quy&#7873;n x&#7917; ph&#7841;t thu gi&#7919;,
b&#7843;o qu&#7843;n gi&#7845;y phép, ch&#7913;ng ch&#7881; hành ngh&#7873; ho&#7863;c
ra quy&#7871;t &#273;&#7883;nh &#273;\u0301nh ch&#7881; ho&#7841;t &#273;&#7897;ng
có th&#7901;i h&#7841;n.</span></b></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>Cá nhân, t&#7893; ch&#7913;c vi ph&#7841;m
hành chính ph&#7843;i n&#7897;p gi&#7845;y phép, ch&#7913;ng ch&#7881; hành ngh&#7873;
cho ng&#432;&#7901;i có th&#7849;m quy&#7873;n trong th&#7901;i h&#7841;n 10
ngày, k&#7875; t&#7915; ngày nh&#7853;n quy&#7871;t &#273;&#7883;nh x&#7917; ph&#7841;t.
Tr&#432;&#7901;ng h&#7907;p quy&#7871;t &#273;&#7883;nh x&#7917; ph&#7841;t có
ghi th&#7901;i h&#7841;n thi hành nhi&#7873;u h&#417;n 10 ngày th\u0301 th&#7921;c
hi&#7879;n theo th&#7901;i h&#7841;n &#273;ó.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>Tr&#432;&#7901;ng h&#7907;p &#273;\u0301nh ch&#7881;
ho&#7841;t &#273;&#7897;ng có th&#7901;i h&#7841;n, cá nhân, t&#7893; ch&#7913;c
vi ph&#7841;m ph&#7843;i &#273;\u0301nh ch&#7881; ngay m&#7897;t ph&#7847;n ho&#7863;c
toàn b&#7897; ho&#7841;t &#273;&#7897;ng s&#7843;n xu&#7845;t, kinh doanh, d&#7883;ch
v&#7909; ho&#7863;c các ho&#7841;t &#273;&#7897;ng khác &#273;&#432;&#7907;c
ghi trong quy&#7871;t &#273;&#7883;nh x&#7917; ph&#7841;t.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>Trong th&#7901;i gian b&#7883; t&#432;&#7899;c
quy&#7873;n s&#7917; d&#7909;ng gi&#7845;y phép, ch&#7913;ng ch&#7881; hành ngh&#7873;
ho&#7863;c &#273;\u0301nh ch&#7881; ho&#7841;t &#273;&#7897;ng có th&#7901;i h&#7841;n,
c&#417; s&#7903; s&#7843;n xu&#7845;t, kinh doanh, d&#7883;ch v&#7909; không
&#273;&#432;&#7907;c ti&#7871;n hành các ho&#7841;t &#273;&#7897;ng ghi trong
quy&#7871;t &#273;&#7883;nh x&#7917; ph&#7841;t.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>T&#432;&#7899;c quy&#7873;n s&#7917; d&#7909;ng
gi&#7845;y phép, ch&#7913;ng ch&#7881; hành ngh&#7873; có th&#7901;i h&#7841;n
là h\u0301nh th&#7913;c x&#7917; ph&#7841;t &#273;&#432;&#7907;c áp d&#7909;ng
&#273;&#7889;i v&#7899;i cá nhân, t&#7893; ch&#7913;c vi ph&#7841;m nghiêm tr&#7885;ng
các ho&#7841;t &#273;&#7897;ng &#273;&#432;&#7907;c ghi trong gi&#7845;y phép,
ch&#7913;ng ch&#7881; hành ngh&#7873;. Trong th&#7901;i gian b&#7883; t&#432;&#7899;c
quy&#7873;n s&#7917; d&#7909;ng gi&#7845;y phép, ch&#7913;ng ch&#7881; hành ngh&#7873;,
cá nhân, t&#7893; ch&#7913;c không &#273;&#432;&#7907;c ti&#7871;n hành các ho&#7841;t
&#273;&#7897;ng ghi trong gi&#7845;y phép, ch&#7913;ng ch&#7881; hành ngh&#7873;.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>&#272;\u0301nh ch&#7881; ho&#7841;t &#273;&#7897;ng
có th&#7901;i h&#7841;n là h\u0301nh th&#7913;c x&#7917; ph&#7841;t &#273;&#432;&#7907;c
áp d&#7909;ng &#273;&#7889;i v&#7899;i cá nhân, t&#7893; ch&#7913;c vi ph&#7841;m
hành chính trong các tr&#432;&#7901;ng h&#7907;p sau:</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>+ &#272;\u0301nh ch&#7881; m&#7897;t ph&#7847;n
ho&#7841;t &#273;&#7897;ng gây h&#7853;u qu&#7843; nghiêm tr&#7885;ng ho&#7863;c
có kh&#7843; n&#259;ng th&#7921;c t&#7871; gây h&#7853;u qu&#7843; nghiêm tr&#7885;ng
&#273;&#7889;i v&#7899;i tính m&#7841;ng, s&#7913;c kh&#7887;e con ng&#432;&#7901;i,
môi tr&#432;&#7901;ng c&#7911;a c&#417; s&#7903; s&#7843;n xu&#7845;t, kinh
doanh, d&#7883;ch v&#7909; mà theo quy &#273;&#7883;nh c&#7911;a pháp lu&#7853;t
ph&#7843;i có gi&#7845;y phép;</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>+ &#272;\u0301nh ch&#7881; m&#7897;t ph&#7847;n
ho&#7863;c toàn b&#7897; ho&#7841;t &#273;&#7897;ng s&#7843;n xu&#7845;t, kinh
doanh, d&#7883;ch v&#7909; ho&#7863;c ho&#7841;t &#273;&#7897;ng khác mà theo
quy &#273;&#7883;nh c&#7911;a pháp lu&#7853;t không ph&#7843;i có gi&#7845;y
phép và ho&#7841;t &#273;&#7897;ng &#273;ó gây h&#7853;u qu&#7843; nghiêm tr&#7885;ng
ho&#7863;c có kh&#7843; n&#259;ng th&#7921;c t&#7871; gây h&#7853;u qu&#7843;
nghiêm tr&#7885;ng &#273;&#7889;i v&#7899;i tính m&#7841;ng, s&#7913;c kh&#7887;e
con ng&#432;&#7901;i, môi tr&#432;&#7901;ng và tr&#7853;t t&#7921;, an toàn x\u0103
h&#7897;i.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>+ Th&#7901;i h&#7841;n t&#432;&#7899;c quy&#7873;n
s&#7917; d&#7909;ng gi&#7845;y phép, ch&#7913;ng ch&#7881; hành ngh&#7873;,
&#273;\u0301nh ch&#7881; ho&#7841;t &#273;&#7897;ng quy &#273;&#7883;nh t&#7841;i
kho&#7843;n 1 và kho&#7843;n 2 &#272;i&#7873;u 25 Lu&#7853;t XLVPHC t&#7915; 01
tháng &#273;&#7871;n 24 tháng, k&#7875; t&#7915; ngày quy&#7871;t &#273;&#7883;nh
x&#7917; ph&#7841;t có hi&#7879;u l&#7921;c thi hành. Ng&#432;&#7901;i có th&#7849;m
quy&#7873;n x&#7917; ph&#7841;t gi&#7919; gi&#7845;y phép, ch&#7913;ng ch&#7881;
hành ngh&#7873; trong th&#7901;i h&#7841;n t&#432;&#7899;c quy&#7873;n s&#7917;
d&#7909;ng gi&#7845;y phép, ch&#7913;ng ch&#7881; hành ngh&#7873;.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>Th&#7901;i h&#7841;n t&#432;&#7899;c quy&#7873;n
s&#7917; d&#7909;ng gi&#7845;y phép, ch&#7913;ng ch&#7881; hành ngh&#7873;,
&#273;\u0301nh ch&#7881; ho&#7841;t &#273;&#7897;ng c&#7909; th&#7875; &#273;&#7889;i
v&#7899;i m&#7897;t hành vi vi ph&#7841;m hành chính là m&#7913;c trung b\u0301nh c&#7911;a
khung th&#7901;i gian t&#432;&#7899;c, &#273;\u0301nh ch&#7881; &#273;&#432;&#7907;c
quy &#273;&#7883;nh &#273;&#7889;i v&#7899;i hành vi &#273;ó; n&#7871;u có t\u0301nh
ti&#7871;t gi&#7843;m nh&#7865; th\u0301 th&#7901;i h&#7841;n t&#432;&#7899;c,
&#273;\u0301nh ch&#7881; có th&#7875; gi&#7843;m xu&#7889;ng nh&#432;ng không
&#273;&#432;&#7907;c th&#7845;p h&#417;n m&#7913;c t&#7889;i thi&#7875;u c&#7911;a
khung th&#7901;i gian t&#432;&#7899;c, &#273;\u0301nh ch&#7881;; n&#7871;u có t\u0301nh
ti&#7871;t t&#259;ng n&#7863;ng th\u0301 th&#7901;i h&#7841;n t&#432;&#7899;c,
&#273;\u0301nh ch&#7881; có th&#7875; t&#259;ng lên nh&#432;ng không &#273;&#432;&#7907;c
v&#432;&#7907;t quá m&#7913;c t&#7889;i &#273;a c&#7911;a khung th&#7901;i gian
t&#432;&#7899;c, &#273;\u0301nh ch&#7881;.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><b style='font-family:"Times New Roman",serif'>b. B&#432;&#7899;c
2: Thông báo ngay cho c&#417; quan &#273;\u0103 c&#7845;p gi&#7845;y phép, ch&#7913;ng
ch&#7881; hành ngh&#7873; &#273;ó bi&#7871;t.</span></b></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>Ng&#432;&#7901;i có th&#7849;m quy&#7873;n
ra quy&#7871;t &#273;&#7883;nh t&#432;&#7899;c quy&#7873;n s&#7917; d&#7909;ng
gi&#7845;y phép, ch&#7913;ng ch&#7881; hành ngh&#7873; có th&#7901;i h&#7841;n
ho&#7863;c &#273;\u0301nh ch&#7881; ho&#7841;t &#273;&#7897;ng có th&#7901;i h&#7841;n
ph&#7843;i thông bào b&#7857;ng v&#259;n b&#7843;n cho c&#417; quan &#273;\u0103 c&#7845;p
gi&#7845;y phép, ch&#7913;ng ch&#7881; hành ngh&#7873; &#273;ó bi&#7871;t theo
d\u01a1i, qu&#7843;n l\u01b0.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>&#272;&#7889;i v&#7899;i các tr&#432;&#7901;ng
h&#7907;p quy &#273;&#7883;nh t&#7841;i kho&#7843;n 1 và kho&#7843;n 2 &#272;i&#7873;u
80 c&#7911;a lu&#7853;t XLVPHC, n&#7871;u c&#417; s&#7903; s&#7843;n xu&#7845;t,
kinh doanh, d&#7883;ch v&#7909; có kh&#7843; n&#259;ng th&#7921;c t&#7871; gây
h&#7853;u qu&#7843; t&#7899;i tính m&#7841;ng, s&#7913;c kh&#7887;e con
ng&#432;&#7901;i, môi tr&#432;&#7901;ng th\u0301 ng&#432;&#7901;i có th&#7849;m quy&#7873;n
ph&#7843;i thông báo b&#7857;ng v&#259;n b&#7843;n vi&#7879;c t&#432;&#7899;c
gi&#7845;y phép, ch&#7913;ng ch&#7881; hành ngh&#7873; có th&#7901;i h&#7841;n
ho&#7863;c &#273;\u0301nh ch&#7881; ho&#7841;t &#273;&#7897;ng có th&#7901;i h&#7841;n
cho các c&#417; quan có liên quan.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>Tr&#432;&#7901;ng h&#7907;p phát hi&#7879;n
gi&#7845;y phép, ch&#7913;ng ch&#7881; hành ngh&#7873; &#273;&#432;&#7907;c c&#7845;p
không &#273;úng th&#7849;m quy&#7873;n ho&#7863;c có n&#7897;i dung trái pháp
lu&#7853;t th\u0301 ng&#432;&#7901;i có th&#7849;m quy&#7873;n x&#7917; ph&#7841;t
ph&#7843;i t&#7841;m gi&#7919; và ra quy&#7871;t &#273;&#7883;nh thu h&#7891;i
ngay theo th&#7849;m quy&#7873;n; tr&#432;&#7901;ng h&#7907;p không thu&#7897;c
th&#7849;m quy&#7873;n thu h&#7891;i th\u0301 t&#7841;m gi&#7919; và trong th&#7901;i
h&#7841;n 02 ngày làm vi&#7879;c, k&#7875; t&#7915; ngày phát hi&#7879;n, ph&#7843;i
chuy&#7875;n gi&#7845;y phép, ch&#7913;ng ch&#7881; hành ngh&#7873; &#273;ó cho
c&#417; quan, ng&#432;&#7901;i có th&#7849;m quy&#7873;n &#273;\u0103 c&#7845;p
&#273;&#7875; x&#7917; l\u01b0 theo quy &#273;&#7883;nh c&#7911;a pháp lu&#7853;t và
thông báo cho cá nhân, t&#7893; ch&#7913;c vi ph&#7841;m bi&#7871;t.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><b style='font-family:"Times New Roman",serif'>c. B&#432;&#7899;c
3: Giao l&#7841;i gi&#7845;y phép, ch&#7913;ng ch&#7881; hành ngh&#7873; cho cá
nhân, t&#7893; ch&#7913;c &#273;\u0103 b&#7883; t&#432;&#7899;c gi&#7845;y phép, ch&#7913;ng
ch&#7881; hành ngh&#7873;</span></b></p>

<h4><a name="_Toc131755346">2.2.3. T&#7893; ch&#7913;c thi hành quy&#7871;t
&#273;&#7883;nh x&#7917; ph&#7841;t t&#7883;ch thu tang v&#7853;t vi ph&#7841;m
hành chính, ph&#432;&#417;ng ti&#7879;n &#273;&#432;&#7907;c s&#7917; d&#7909;ng
&#273;&#7875; vi ph&#7841;m hành chính (sau &#273;ây g&#7885;i chung là tang v&#7853;t,
ph&#432;&#417;ng ti&#7879;n vi ph&#7841;m hành chính)</a></h4>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><b style='font-family:"Times New Roman",serif'>a. B&#432;&#7899;c
1: L&#7853;p biên b&#7843;n t&#7883;ch thu tang v&#7853;t, ph&#432;&#417;ng ti&#7879;n
vi ph&#7841;m hành chính</span></b></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>T&#7883;ch thu tang v&#7853;t,
ph&#432;&#417;ng ti&#7879;n vi ph&#7841;m hành chính là vi&#7879;c sung vào
ngân sách nhà n&#432;&#7899;c v&#7853;t, ti&#7873;n, hàng hóa, ph&#432;&#417;ng
ti&#7879;n có liên quan tr&#7921;c ti&#7871;p &#273;&#7871;n vi ph&#7841;m hành
chính, &#273;&#432;&#7907;c áp d&#7909;ng &#273;&#7889;i v&#7899;i vi ph&#7841;m
hành chính nghiêm tr&#7885;ng do l&#7895;i c&#7889; \u01b0 c&#7911;a cá nhân, t&#7893;
ch&#7913;c.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>Biên b&#7843;n v&#7873; vi&#7879;c t&#7883;ch
thu tang v&#7853;t, ph&#432;&#417;ng ti&#7879;n vi ph&#7841;m hành chính
&#273;&#432;&#7907;c áp d&#7909;ng trong tr&#432;&#7901;ng h&#7907;p ng&#432;&#7901;i
có th&#7849;m quy&#7873;n không ra quy&#7871;t &#273;&#7883;nh x&#7917; ph&#7841;t
vi ph&#7841;m hành chính nh&#432;ng v&#7851;n ph&#7843;i ra quy&#7871;t &#273;&#7883;nh
t&#7883;ch thu tang v&#7853;t, ph&#432;&#417;ng ti&#7879;n vi ph&#7841;m hành
chính n&#7871;u tang v&#7853;t, ph&#432;&#417;ng ti&#7879;n vi ph&#7841;m hành
chính thu&#7897;c lo&#7841;i c&#7845;m tàng tr&#7919;, c&#7845;m l&#432;u hành
ho&#7863;c tang v&#7853;t, ph&#432;&#417;ng ti&#7879;n mà pháp lu&#7853;t có
quy &#273;&#7883;nh h\u0301nh th&#7913;c x&#7917; ph&#7841;t t&#7883;ch thu và áp d&#7909;ng
bi&#7879;n pháp kh&#7855;c ph&#7909;c h&#7853;u qu&#7843; &#273;&#432;&#7907;c
quy &#273;&#7883;nh &#273;&#7889;i v&#7899;i hành vi vi ph&#7841;m hành chính
&#273;ó. N&#7897;i dung biên b&#7843;n này ph&#7843;i có n&#7897;i dung c&#417;
b&#7843;n sau:</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>- Ghi r\u01a1 tên, s&#7889; l&#432;&#7907;ng,
ch&#7911;ng lo&#7841;i, s&#7889; &#273;&#259;ng k\u01b0 (n&#7871;u có), t\u0301nh tr&#7841;ng,
ch&#7845;t l&#432;&#7907;ng c&#7911;a v&#7853;t, ti&#7873;n, hàng hóa,
ph&#432;&#417;ng ti&#7879;n vi ph&#7841;m hành chính b&#7883; t&#7883;ch thu;</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>- Ph&#7843;i có ch&#7919; k\u01b0 c&#7911;a
ng&#432;&#7901;i ti&#7871;n hành t&#7883;ch thu, ng&#432;&#7901;i b&#7883; x&#7917;
ph&#7841;t ho&#7863;c &#273;&#7841;i di&#7879;n t&#7893; ch&#7913;c b&#7883; x&#7917;
ph&#7841;t và ng&#432;&#7901;i ch&#7913;ng ki&#7871;n; tr&#432;&#7901;ng h&#7907;p
ng&#432;&#7901;i b&#7883; x&#7917; ph&#7841;t ho&#7863;c &#273;&#7841;i di&#7879;n
t&#7893; ch&#7913;c b&#7883; x&#7917; ph&#7841;t v&#7855;ng m&#7863;t th\u0301 ph&#7843;i
có hai ng&#432;&#7901;i ch&#7913;ng ki&#7871;n.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>L&#432;u \u01b0:</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>- &#272;&#7889;i v&#7899;i tang v&#7853;t,
ph&#432;&#417;ng ti&#7879;n vi ph&#7841;m hành chính c&#7847;n &#273;&#432;&#7907;c
niêm phong th\u0301 ph&#7843;i niêm phong ngay tr&#432;&#7899;c m&#7863;t ng&#432;&#7901;i
b&#7883; x&#7917; ph&#7841;t, &#273;&#7841;i di&#7879;n t&#7893; ch&#7913;c b&#7883;
x&#7917; ph&#7841;t ho&#7863;c ng&#432;&#7901;i ch&#7913;ng ki&#7871;n. Vi&#7879;c
niêm phong ph&#7843;i &#273;&#432;&#7907;c ghi nh&#7853;n vào biên b&#7843;n.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>- &#272;&#7889;i v&#7899;i tang v&#7853;t,
ph&#432;&#417;ng ti&#7879;n vi ph&#7841;m hành chính &#273;ang b&#7883; t&#7841;m
gi&#7919;, ng&#432;&#7901;i có th&#7849;m quy&#7873;n x&#7917; ph&#7841;t th&#7845;y
t\u0301nh tr&#7841;ng tang v&#7853;t, ph&#432;&#417;ng ti&#7879;n có thay &#273;&#7893;i
so v&#7899;i th&#7901;i &#273;i&#7875;m ra quy&#7871;t &#273;&#7883;nh t&#7841;m
gi&#7919; th\u0301 ph&#7843;i l&#7853;p biên b&#7843;n v&#7873; nh&#7919;ng thay
&#273;&#7893;i này; biên b&#7843;n ph&#7843;i có ch&#7919; k\u01b0 c&#7911;a
ng&#432;&#7901;i l&#7853;p biên b&#7843;n, ng&#432;&#7901;i có trách nhi&#7879;m
t&#7841;m gi&#7919; và ng&#432;&#7901;i ch&#7913;ng ki&#7871;n.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>- M&#7851;u biên b&#7843;n t&#7883;ch thu
tang v&#7853;t, ph&#432;&#417;ng ti&#7879;n vi ph&#7841;m hành chính
&#273;&#432;&#7907;c quy &#273;&#7883;nh t&#7841;i MBB15 c&#7911;a Ph&#7909; l&#7909;c
Ngh&#7883; &#273;&#7883;nh s&#7889; 118/2021/N&#272;-CP</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><b style='font-family:"Times New Roman",serif'>b. B&#432;&#7899;c
2: Qu&#7843;n l\u01b0 và b&#7843;o qu&#7843;n tang v&#7853;t, ph&#432;&#417;ng ti&#7879;n
vi ph&#7841;m hành chính b&#7883; t&#7883;ch thu.</span></b></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>Vi&#7879;c qu&#7843;n l\u01b0 và b&#7843;o qu&#7843;n
tang v&#7853;t, ph&#432;&#417;ng ti&#7879;n vi ph&#7841;m hành chính b&#7883; t&#7883;ch
thu th&#7921;c hi&#7879;n theo Ngh&#7883; &#273;&#7883;nh s&#7889;
138/2021/N&#272;-CP ngày 31/12/2021 quy &#273;&#7883;nh v&#7873; qu&#7843;n l\u01b0,
b&#7843;o qu&#7843;n tang v&#7853;t, ph&#432;&#417;ng ti&#7879;n vi ph&#7841;m
hành chính b&#7883; t&#7841;m gi&#7919;, t&#7883;ch thu theo th&#7911; t&#7909;c
hành chính (Ngh&#7883; &#273;&#7883;nh s&#7889; 138/2021/N&#272;-CP). Theo &#273;ó,
trách nhi&#7879;m trong qu&#7843;n l\u01b0, b&#7843;o qu&#7843;n tang v&#7853;t,
ph&#432;&#417;ng ti&#7879;n b&#7883; t&#7841;m gi&#7919;, t&#7883;ch thu
nh&#432; sau:</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>- Ng&#432;&#7901;i l&#7853;p biên b&#7843;n
t&#7883;ch thu có trách nhi&#7879;m qu&#7843;n l\u01b0, b&#7843;o qu&#7843;n tang v&#7853;t,
ph&#432;&#417;ng ti&#7879;n cho &#273;&#7871;n khi bàn giao tang v&#7853;t,
ph&#432;&#417;ng ti&#7879;n cho ng&#432;&#7901;i qu&#7843;n l\u01b0, b&#7843;o qu&#7843;n.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>- Ng&#432;&#7901;i ra quy&#7871;t &#273;&#7883;nh
t&#7883;ch thu có trách nhi&#7879;m qu&#7843;n l\u01b0, b&#7843;o qu&#7843;n tang v&#7853;t,
ph&#432;&#417;ng ti&#7879;n b&#7883; t&#7883;ch thu. Tr&#432;&#7901;ng h&#7907;p
tang v&#7853;t b&#7883; m&#7845;t, bán trái quy &#273;&#7883;nh, &#273;ánh
tráo, h&#432; h&#7887;ng, m&#7845;t linh ki&#7879;n, thay th&#7871; th\u0301
ng&#432;&#7901;i ra quy&#7871;t &#273;&#7883;nh t&#7883;ch thu ch&#7883;u trách
nhi&#7879;m b&#7891;i th&#432;&#7901;ng và b&#7883; x&#7917; l\u01b0 theo quy &#273;&#7883;nh
c&#7911;a pháp lu&#7853;t.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>- Ng&#432;&#7901;i qu&#7843;n l\u01b0, b&#7843;o
qu&#7843;n tang v&#7853;t, ph&#432;&#417;ng ti&#7879;n có trách nhi&#7879;m tr&#7921;c
ti&#7871;p qu&#7843;n l\u01b0, b&#7843;o qu&#7843;n tang v&#7853;t, ph&#432;&#417;ng
ti&#7879;n b&#7883; t&#7883;ch thu. Tr&#432;&#7901;ng h&#7907;p tang v&#7853;t,
ph&#432;&#417;ng ti&#7879;n b&#7883; m&#7845;t, bán trái quy &#273;&#7883;nh,
&#273;ánh tráo, h&#432; h&#7887;ng, m&#7845;t linh ki&#7879;n, thay th&#7871;
th\u0301 ph&#7843;i ch&#7883;u trách nhi&#7879;m tr&#432;&#7899;c pháp lu&#7853;t và
ng&#432;&#7901;i ra quy&#7871;t &#273;&#7883;nh t&#7883;ch thu v&#7873; vi&#7879;c
qu&#7843;n l\u01b0, b&#7843;o qu&#7843;n tang v&#7853;t, ph&#432;&#417;ng ti&#7879;n.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>- Tr&#432;&#7901;ng h&#7907;p
ph&#432;&#417;ng ti&#7879;n giao thông vi ph&#7841;m hành chính &#273;&#432;&#7907;c
giao cho t&#7893; ch&#7913;c, cá nhân vi ph&#7841;m gi&#7919;, b&#7843;o qu&#7843;n
theo quy &#273;&#7883;nh t&#7841;i &#272;i&#7873;u 14 và &#272;i&#7873;u 15 Ngh&#7883;
&#273;&#7883;nh s&#7889; 138/2021/N&#272;-CP th\u0301 ng&#432;&#7901;i có th&#7849;m
quy&#7873;n t&#7841;m gi&#7919; ph&#432;&#417;ng ti&#7879;n có trách nhi&#7879;m
qu&#7843;n l\u01b0, b&#7843;o qu&#7843;n ph&#432;&#417;ng ti&#7879;n giao thông vi
ph&#7841;m hành chính t&#7915; khi t&#7841;m gi&#7919; ph&#432;&#417;ng ti&#7879;n
cho &#273;&#7871;n khi giao ph&#432;&#417;ng ti&#7879;n cho t&#7893; ch&#7913;c,
cá nhân vi ph&#7841;m gi&#7919;, b&#7843;o qu&#7843;n.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><b style='font-family:"Times New Roman",serif'>c. B&#432;&#7899;c
3: X&#7917; l\u01b0 tang v&#7853;t, ph&#432;&#417;ng ti&#7879;n s&#7917; d&#7909;ng
trái phép &#273;&#7875; vi ph&#7841;m hành chính thu&#7897;c tr&#432;&#7901;ng
h&#7907;p b&#7883; t&#7883;ch thu</span></b></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>Vi&#7879;c x&#7917; l\u01b0 tang v&#7853;t,
ph&#432;&#417;ng ti&#7879;n b&#7883; chi&#7871;m &#273;o&#7841;t, s&#7917; d&#7909;ng
trái phép &#273;&#7875; vi ph&#7841;m hành chính thu&#7897;c tr&#432;&#7901;ng
h&#7907;p b&#7883; t&#7883;ch thu t&#7841;i &#272;i&#7873;u 23 c&#7911;a Ngh&#7883;
&#273;&#7883;nh s&#7889; 118/2021/N&#272;-CP, c&#7909; th&#7875;:</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>- &#272;&#7889;i v&#7899;i tang v&#7853;t,
ph&#432;&#417;ng ti&#7879;n &#273;ang b&#7883; t&#7841;m gi&#7919; do b&#7883;
chi&#7871;m &#273;o&#7841;t, s&#7917; d&#7909;ng trái phép &#273;&#7875; vi ph&#7841;m
hành chính thu&#7897;c tr&#432;&#7901;ng h&#7907;p b&#7883; t&#7883;ch thu, th\u0301
th&#7921;c hi&#7879;n theo quy &#273;&#7883;nh t&#7841;i kho&#7843;n 1 &#272;i&#7873;u
126 Lu&#7853;t XLVPHC. Trong tr&#432;&#7901;ng h&#7907;p này, cá nhân, t&#7893;
ch&#7913;c vi ph&#7841;m ph&#7843;i n&#7897;p m&#7897;t kho&#7843;n ti&#7873;n
t&#432;&#417;ng &#273;&#432;&#417;ng tr&#7883; giá tang v&#7853;t,
ph&#432;&#417;ng ti&#7879;n vi ph&#7841;m vào ngân sách nhà n&#432;&#7899;c.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>Tr&#432;&#7901;ng h&#7907;p ph&#7843;i n&#7897;p
m&#7897;t kho&#7843;n ti&#7873;n t&#432;&#417;ng &#273;&#432;&#417;ng tr&#7883;
giá tang v&#7853;t, ph&#432;&#417;ng ti&#7879;n vi ph&#7841;m trong v&#7909; vi&#7879;c
có nhi&#7873;u cá nhân, t&#7893; ch&#7913;c vi ph&#7841;m, th\u0301 các cá nhân, t&#7893;
ch&#7913;c vi ph&#7841;m &#273;&#7873;u có trách nhi&#7879;m trong vi&#7879;c n&#7897;p
kho&#7843;n ti&#7873;n t&#432;&#417;ng &#273;&#432;&#417;ng tr&#7883; giá tang
v&#7853;t, ph&#432;&#417;ng ti&#7879;n vi ph&#7841;m hành chính vào ngân sách
nhà n&#432;&#7899;c theo t&#7927; l&#7879; do ng&#432;&#7901;i có th&#7849;m
quy&#7873;n x&#7917; ph&#7841;t quy&#7871;t &#273;&#7883;nh, tr&#7915; tr&#432;&#7901;ng
h&#7907;p cá nhân, t&#7893; ch&#7913;c vi ph&#7841;m có s&#7921; th&#7889;ng nh&#7845;t,
th&#7887;a thu&#7853;n b&#7857;ng v&#259;n b&#7843;n g&#7917;i &#273;&#7871;n
ng&#432;&#7901;i có th&#7849;m quy&#7873;n x&#7917; ph&#7841;t trong th&#7901;i
h&#7841;n ra quy&#7871;t &#273;&#7883;nh x&#7917; ph&#7841;t vi ph&#7841;m hành
chính quy &#273;&#7883;nh t&#7841;i &#272;i&#7873;u 66 Lu&#7853;t XLVPHC.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>- &#272;&#7889;i v&#7899;i tang v&#7853;t,
ph&#432;&#417;ng ti&#7879;n vi ph&#7841;m hành chính thu&#7897;c tr&#432;&#7901;ng
h&#7907;p b&#7883; t&#7883;ch thu nh&#432;ng &#273;\u0103 &#273;&#259;ng k\u01b0 bi&#7879;n
pháp b&#7843;o &#273;&#7843;m th&#7871; ch&#7845;p tài s&#7843;n theo quy
&#273;&#7883;nh c&#7911;a pháp lu&#7853;t dân s&#7921;, th\u0301 x&#7917; l\u01b0
nh&#432; sau:</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>+ Bên nh&#7853;n th&#7871; ch&#7845;p
&#273;&#432;&#7907;c nh&#7853;n l&#7841;i tang v&#7853;t, ph&#432;&#417;ng ti&#7879;n
ho&#7863;c tr&#7883; giá t&#432;&#417;ng &#7913;ng v&#7899;i ngh&#297;a v&#7909;
&#273;&#432;&#7907;c b&#7843;o &#273;&#7843;m; cá nhân, t&#7893; ch&#7913;c vi
ph&#7841;m ph&#7843;i n&#7897;p m&#7897;t kho&#7843;n ti&#7873;n t&#432;&#417;ng
&#273;&#432;&#417;ng tr&#7883; giá tang v&#7853;t, ph&#432;&#417;ng ti&#7879;n
vi ph&#7841;m hành chính vào ngân sách nhà n&#432;&#7899;c;</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>+ Bên nh&#7853;n th&#7871; ch&#7845;p có
ngh&#297;a v&#7909; thông báo b&#7857;ng v&#259;n b&#7843;n k&#7871;t qu&#7843;
x&#7917; l\u01b0 tài s&#7843;n b&#7843;o &#273;&#7843;m cho ng&#432;&#7901;i có th&#7849;m
quy&#7873;n x&#7917; ph&#7841;t vi ph&#7841;m hành chính trong th&#7901;i h&#7841;n
03 ngày làm vi&#7879;c, k&#7875; t&#7915; ngày có k&#7871;t qu&#7843; x&#7917;
l\u01b0 tài s&#7843;n b&#7843;o &#273;&#7843;m là tang v&#7853;t, ph&#432;&#417;ng
ti&#7879;n vi ph&#7841;m hành chính thu&#7897;c tr&#432;&#7901;ng h&#7907;p t&#7883;ch
thu. Tr&#432;&#7901;ng h&#7907;p tài s&#7843;n b&#7843;o &#273;&#7843;m sau khi
&#273;&#432;&#7907;c x&#7917; l\u01b0 có giá tr&#7883; l&#7899;n h&#417;n giá tr&#7883;
ngh&#297;a v&#7909; &#273;&#432;&#7907;c b&#7843;o &#273;&#7843;m, mà cá nhân,
t&#7893; ch&#7913;c vi ph&#7841;m hành chính ch&#432;a n&#7897;p &#273;&#7911; kho&#7843;n
ti&#7873;n t&#432;&#417;ng &#273;&#432;&#417;ng tr&#7883; giá tang v&#7853;t,
ph&#432;&#417;ng ti&#7879;n vi ph&#7841;m hành chính vào ngân sách nhà n&#432;&#7899;c,
th\u0301 bên nh&#7853;n th&#7871; ch&#7845;p có ngh&#297;a v&#7909; chuy&#7875;n ph&#7847;n
giá tr&#7883; chênh l&#7879;ch c&#7911;a tài s&#7843;n b&#7843;o &#273;&#7843;m
vào ngân sách nhà n&#432;&#7899;c trong th&#7901;i h&#7841;n 05 ngày làm vi&#7879;c,
k&#7875; t&#7915; ngày có thông báo b&#7857;ng v&#259;n b&#7843;n k&#7871;t qu&#7843;
x&#7917; l\u01b0 tài s&#7843;n b&#7843;o &#273;&#7843;m;</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>+ Bên nh&#7853;n th&#7871; ch&#7845;p
không th&#7921;c hi&#7879;n ngh&#297;a v&#7909; chuy&#7875;n ph&#7847;n giá tr&#7883;
chênh l&#7879;ch c&#7911;a tài s&#7843;n b&#7843;o &#273;&#7843;m là tang v&#7853;t,
ph&#432;&#417;ng ti&#7879;n vi ph&#7841;m hành chính thu&#7897;c tr&#432;&#7901;ng
h&#7907;p t&#7883;ch thu trong th&#7901;i h&#7841;n quy &#273;&#7883;nh, th\u0301 b&#7883;
x&#7917; ph&#7841;t theo quy &#273;&#7883;nh c&#7911;a pháp lu&#7853;t v&#7873;
x&#7917; ph&#7841;t vi ph&#7841;m hành chính trong l&#297;nh v&#7921;c ti&#7873;n
t&#7879; và ngân hàng ho&#7863;c l&#297;nh v&#7921;c khác có liên quan.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>- Tùy theo lo&#7841;i tang v&#7853;t,
ph&#432;&#417;ng ti&#7879;n c&#7909; th&#7875;, vi&#7879;c xác &#273;&#7883;nh
giá tr&#7883; tang v&#7853;t, ph&#432;&#417;ng ti&#7879;n vi ph&#7841;m &#273;&#7875;
xác &#273;&#7883;nh kho&#7843;n ti&#7873;n t&#432;&#417;ng &#273;&#432;&#417;ng
mà cá nhân, t&#7893; ch&#7913;c vi ph&#7841;m ph&#7843;i n&#7897;p vào ngân
sách nhà n&#432;&#7899;c d&#7921;a trên m&#7897;t trong các c&#259;n c&#7913;
theo quy &#273;&#7883;nh t&#7841;i kho&#7843;n 2 &#272;i&#7873;u 60 Lu&#7853;t
XLVPHC. Ng&#432;&#7901;i có th&#7849;m quy&#7873;n &#273;ang gi&#7843;i quy&#7871;t
v&#7909; vi&#7879;c có trách nhi&#7879;m xác &#273;&#7883;nh giá tr&#7883; tang
v&#7853;t, ph&#432;&#417;ng ti&#7879;n vi ph&#7841;m.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>Tr&#432;&#7901;ng h&#7907;p không th&#7875;
áp d&#7909;ng &#273;&#432;&#7907;c c&#259;n c&#7913; quy &#273;&#7883;nh t&#7841;i
kho&#7843;n 2 &#272;i&#7873;u 60 Lu&#7853;t XLVPHC, th\u0301 ng&#432;&#7901;i có th&#7849;m
quy&#7873;n &#273;ang gi&#7843;i quy&#7871;t v&#7909; vi&#7879;c ph&#7843;i
thành l&#7853;p H&#7897;i &#273;&#7891;ng &#273;&#7883;nh giá. Vi&#7879;c thành
l&#7853;p H&#7897;i &#273;&#7891;ng &#273;&#7883;nh giá &#273;&#432;&#7907;c th&#7921;c
hi&#7879;n theo quy &#273;&#7883;nh t&#7841;i kho&#7843;n 3 &#272;i&#7873;u 60
Lu&#7853;t XLVPHC.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>- H\u0301nh th&#7913;c, th&#7911; t&#7909;c
thu, n&#7897;p kho&#7843;n ti&#7873;n t&#432;&#417;ng &#273;&#432;&#417;ng tr&#7883;
giá tang v&#7853;t, ph&#432;&#417;ng ti&#7879;n vi ph&#7841;m vào ngân sách nhà
n&#432;&#7899;c &#273;&#432;&#7907;c th&#7921;c hi&#7879;n theo quy &#273;&#7883;nh
t&#7841;i &#272;i&#7873;u 21 Ngh&#7883; &#273;&#7883;nh s&#7889;
118/2021/N&#272;-CP.</span></p>

<h4><a name="_Toc131755347">2.2.4. T&#7893; ch&#7913;c thi hành quy&#7871;t
&#273;&#7883;nh x&#7917; ph&#7841;t tr&#7909;c xu&#7845;t</a></h4>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><b style='font-family:"Times New Roman",serif'>a. B&#432;&#7899;c
1: G&#7917;i quy&#7871;t &#273;&#7883;nh tr&#7909;c xu&#7845;t cho ng&#432;&#7901;i
n&#432;&#7899;c ngoài có hành vi vi ph&#7841;m hành chính t&#7841;i Vi&#7879;t
Nam</span></b></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>G&#7917;i quy&#7871;t &#273;&#7883;nh tr&#7909;c
xu&#7845;t cho ng&#432;&#7901;i n&#432;&#7899;c ngoài có hành vi vi ph&#7841;m
hành chính t&#7841;i Vi&#7879;t Nam và ph&#7843;i &#273;&#432;&#7907;c thông
báo tr&#432;&#7899;c khi thi hành cho B&#7897; Ngo&#7841;i giao, c&#417; quan
&#273;&#7841;i di&#7879;n ngo&#7841;i giao, c&#417; quan l\u0103nh s&#7921; c&#7911;a
n&#432;&#7899;c mà ng&#432;&#7901;i b&#7883; tr&#7909;c xu&#7845;t là công dân
ho&#7863;c n&#432;&#7899;c mà ng&#432;&#7901;i &#273;ó c&#432; trú tr&#432;&#7899;c
khi &#273;&#7871;n Vi&#7879;t Nam. Quy&#7871;t &#273;&#7883;nh tr&#7909;c xu&#7845;t
ph&#7843;i th&#7875; hi&#7879;n c&#7843; ti&#7871;ng Vi&#7879;t và ti&#7871;ng
Anh. Ng&#432;&#7901;i b&#7883; tr&#7909;c xu&#7845;t ph&#7843;i nh&#7853;n quy&#7871;t
&#273;&#7883;nh tr&#7909;c xu&#7845;t ch&#7845;m nh&#7845;t tr&#432;&#7899;c 48
gi&#7901; tr&#432;&#7899;c khi thi hành.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>Tr&#7909;c xu&#7845;t là h\u0301nh th&#7913;c x&#7917;
ph&#7841;t bu&#7897;c ng&#432;&#7901;i n&#432;&#7899;c ngoài có hành vi vi ph&#7841;m
hành chính t&#7841;i Vi&#7879;t Nam ph&#7843;i r&#7901;i kh&#7887;i l\u0103nh th&#7893;
n&#432;&#7899;c C&#7897;ng h\u0323a x\u0103 h&#7897;i ch&#7911; ngh&#297;a Vi&#7879;t
Nam.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>Cá nhân là ng&#432;&#7901;i n&#432;&#7899;c
ngoài có hành vi vi ph&#7841;m hành chính trong ph&#7841;m vi l\u0103nh th&#7893;,
vùng ti&#7871;p giáp l\u0103nh h&#7843;i, vùng &#273;&#7863;c quy&#7873;n kinh t&#7871;
và th&#7873;m l&#7909;c &#273;&#7883;a c&#7911;a n&#432;&#7899;c C&#7897;ng h\u0323a
x\u0103 h&#7897;i ch&#7911; ngh&#297;a Vi&#7879;t Nam; trên tàu bay mang qu&#7889;c
t&#7883;ch Vi&#7879;t Nam, tàu bi&#7875;n mang c&#7901; qu&#7889;c t&#7883;ch
Vi&#7879;t Nam th\u0301 tùy theo m&#7913;c &#273;&#7897; c&#7911;a hành vi vi ph&#7841;m
s&#7869; b&#7883; áp d&#7909;ng h\u0301nh th&#7913;c b&#7883; x&#7917; ph&#7841;t tr&#7909;c
xu&#7845;t theo quy &#273;&#7883;nh t&#7841;i &#272;i&#7873;u 27 Lu&#7853;t
XLVPHC.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>Giám &#273;&#7889;c Công an c&#7845;p t&#7881;nh,
C&#7909;c tr&#432;&#7903;ng C&#7909;c Qu&#7843;n l\u01b0 xu&#7845;t nh&#7853;p c&#7843;nh
có th&#7849;m quy&#7873;n x&#7917; ph&#7841;t tr&#7909;c xu&#7845;t theo quy
&#273;&#7883;nh t&#7841;i &#273;i&#7875;m &#273; kho&#7843;n 5, kho&#7843;n 7
&#272;i&#7873;u 39 Lu&#7853;t XLVPHC.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><b style='font-family:"Times New Roman",serif'>b. B&#432;&#7899;c
2: Qu&#7843;n l\u01b0 ng&#432;&#7901;i n&#432;&#7899;c ngoài trong th&#7901;i gian
tr&#7909;c xu&#7845;t</span></b></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>Tr&#7909;c xu&#7845;t và qu&#7843;n l\u01b0
ng&#432;&#7901;i n&#432;&#7899;c ngoài vi ph&#7841;m pháp lu&#7853;t Vi&#7879;t
Nam trong th&#7901;i gian làm th&#7911; t&#7909;c tr&#7909;c xu&#7845;t
&#273;&#432;&#7907;c quy &#273;&#7883;nh t&#7841;i Ngh&#7883; &#273;&#7883;nh s&#7889;
142/2021/N&#272;-CP quy &#273;&#7883;nh h\u0301nh th&#7913;c x&#7917; ph&#7841;t tr&#7909;c
xu&#7845;t, bi&#7879;n pháp t&#7841;m gi&#7919; ng&#432;&#7901;i, áp gi&#7843;i
ng&#432;&#7901;i vi ph&#7841;m theo th&#7911; t&#7909;c hành chính và qu&#7843;n
l\u01b0 ng&#432;&#7901;i n&#432;&#7899;c ngoài vi ph&#7841;m pháp lu&#7853;t Vi&#7879;t
Nam trong th&#7901;i gian làm th&#7911; t&#7909;c tr&#7909;c xu&#7845;t
(d&#432;&#7899;i &#273;ây g&#7885;i t&#7855;t là Ngh&#7883; &#273;&#7883;nh s&#7889;
142/2021/N&#272;-CP).</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>c. B&#432;&#7899;c 3: Tr&#7909;c xu&#7845;t
ng&#432;&#7901;i n&#432;&#7899;c ngoài có hành vi vi ph&#7841;m hành chính t&#7841;i
Vi&#7879;t Nam ph&#7843;i r&#7901;i kh&#7887;i l\u0103nh th&#7893; n&#432;&#7899;c C&#7897;ng
h\u0323a x\u0103 h&#7897;i ch&#7911; ngh&#297;a Vi&#7879;t Nam</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>L&#432;u \u01b0: Theo quy &#273;&#7883;nh t&#7841;i
Ngh&#7883; &#273;&#7883;nh s&#7889; 142/2021/N&#272;-CP, quy&#7873;n,
ngh&#297;a v&#7909; c&#7911;a ng&#432;&#7901;i b&#7883; áp d&#7909;ng h\u0301nh th&#7913;c
x&#7917; ph&#7841;t tr&#7909;c xu&#7845;t:</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>Ng&#432;&#7901;i b&#7883; áp d&#7909;ng
h\u0301nh th&#7913;c x&#7917; ph&#7841;t tr&#7909;c xu&#7845;t có quy&#7873;n:
&#272;&#432;&#7907;c bi&#7871;t l\u01b0 do b&#7883; tr&#7909;c xu&#7845;t, nh&#7853;n
quy&#7871;t &#273;&#7883;nh tr&#7909;c xu&#7845;t ch&#7853;m nh&#7845;t 48 gi&#7901;
tr&#432;&#7899;c khi thi hành; &#272;&#432;&#7907;c yêu c&#7847;u có ng&#432;&#7901;i
phiên d&#7883;ch khi làm vi&#7879;c v&#7899;i c&#417; quan, ng&#432;&#7901;i có
th&#7849;m quy&#7873;n; &#272;&#432;&#7907;c th&#7921;c hi&#7879;n các ch&#7871;
&#273;&#7897; quy &#273;&#7883;nh t&#7841;i Ngh&#7883; &#273;&#7883;nh s&#7889;
65/2020/N&#272;-CP ngày 10 tháng 6 n&#259;m 2020 quy &#273;&#7883;nh v&#7873; t&#7893;
ch&#7913;c và các ch&#7871; &#273;&#7897; &#273;&#7889;i v&#7899;i ng&#432;&#7901;i
l&#432;u trú t&#7841;i c&#417; s&#7903; l&#432;u trú trong th&#7901;i gian ch&#7901;
xu&#7845;t c&#7843;nh; &#272;&#432;&#7907;c mang theo tài s&#7843;n h&#7907;p
pháp c&#7911;a m\u0301nh ra kh&#7887;i l\u0103nh th&#7893; Vi&#7879;t Nam; &#272;&#432;&#7907;c
khi&#7871;u n&#7841;i, t&#7889; cáo theo quy &#273;&#7883;nh c&#7911;a pháp lu&#7853;t
v&#7873; gi&#7843;i quy&#7871;t khi&#7871;u n&#7841;i, t&#7889; cáo.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>Ngh&#297;a v&#7909; c&#7911;a ng&#432;&#7901;i
b&#7883; tr&#7909;c xu&#7845;t: Th&#7921;c hi&#7879;n &#273;&#7847;y &#273;&#7911;
các quy &#273;&#7883;nh ghi trong quy&#7871;t &#273;&#7883;nh x&#7917; ph&#7841;t
vi ph&#7841;m hành chính có áp d&#7909;ng h\u0301nh th&#7913;c x&#7917; ph&#7841;t
tr&#7909;c xu&#7845;t; Xu&#7845;t tr\u0301nh gi&#7845;y t&#7901; tùy thân theo yêu c&#7847;u
c&#7911;a c&#417; quan qu&#7843;n l\u01b0 xu&#7845;t nh&#7853;p c&#7843;nh; Tuân th&#7911;
các quy &#273;&#7883;nh c&#7911;a pháp lu&#7853;t Vi&#7879;t Nam, ch&#7883;u s&#7921;
qu&#7843;n l\u01b0 c&#7911;a c&#417; quan Công an trong th&#7901;i gian làm th&#7911;
t&#7909;c tr&#7909;c xu&#7845;t; Nhanh chóng ch&#7845;p hành &#273;&#7847;y
&#273;&#7911; các ngh&#297;a v&#7909; v&#7873; dân s&#7921;, hành chính, kinh t&#7871;
theo quy &#273;&#7883;nh c&#7911;a pháp lu&#7853;t (n&#7871;u có); Hoàn thành
các th&#7911; t&#7909;c c&#7847;n thi&#7871;t &#273;&#7875; r&#7901;i kh&#7887;i
l\u0103nh th&#7893; Vi&#7879;t Nam.</span></p>

<h4><a name="_Toc131755348">2.2.5. T&#7893; ch&#7913;c thi hành bi&#7879;n pháp
kh&#7855;c ph&#7909;c h&#7853;u qu&#7843;</a></h4>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><b style='font-family:"Times New Roman",serif'>a. B&#432;&#7899;c
1: Xác &#273;&#7883;nh bi&#7879;n pháp kh&#7855;c ph&#7909;c h&#7853;u qu&#7843;
&#273;&#432;&#7907;c th&#7921;c hi&#7879;n theo quy&#7871;t &#273;&#7883;nh x&#7917;
ph&#7841;t vi ph&#7841;m hành chính ho&#7863;c trong quy&#7871;t &#273;&#7883;nh
áp d&#7909;ng bi&#7879;n pháp kh&#7855;c ph&#7909;c h&#7853;u qu&#7843;.</span></b></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>Th&#7901;i h&#7841;n thi hành bi&#7879;n
pháp kh&#7855;c ph&#7909;c h&#7853;u qu&#7843; &#273;&#432;&#7907;c th&#7921;c
hi&#7879;n theo quy&#7871;t &#273;&#7883;nh x&#7917; ph&#7841;t vi ph&#7841;m
hành chính ho&#7863;c trong quy&#7871;t &#273;&#7883;nh áp d&#7909;ng bi&#7879;n
pháp kh&#7855;c ph&#7909;c h&#7853;u qu&#7843; theo quy &#273;&#7883;nh t&#7841;i
&#273;i&#7875;m b kho&#7843;n 2 &#272;i&#7873;u 28 c&#7911;a Lu&#7853;t XLVPHC.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>Bi&#7879;n pháp kh&#7855;c ph&#7909;c h&#7853;u
qu&#7843; c&#7909; th&#7875; và th&#7901;i h&#7841;n thi hành bi&#7879;n pháp
kh&#7855;c ph&#7909;c h&#7853;u qu&#7843; &#273;&#432;&#7907;c th&#7921;c hi&#7879;n
theo quy&#7871;t &#273;&#7883;nh x&#7917; ph&#7841;t vi ph&#7841;m hành chính
(MQ&#272;02 c&#7911;a ph&#7909; l&#7909;c Ngh&#7883; &#273;&#7883;nh s&#7889;
118/2021/N&#272;-CP).</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><b style='font-family:"Times New Roman",serif'>b. B&#432;&#7899;c
2: Xác &#273;&#7883;nh cá nhân, c&#417; quan, t&#7893; ch&#7913;c th&#7921;c hi&#7879;n
bi&#7879;n pháp kh&#7855;c ph&#7909;c h&#7853;u qu&#7843;.</span></b></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>Cá nhân, t&#7893; ch&#7913;c vi ph&#7841;m
hành chính có trách nhi&#7879;m th&#7921;c hi&#7879;n bi&#7879;n pháp kh&#7855;c
ph&#7909;c h&#7853;u qu&#7843; &#273;&#432;&#7907;c ghi trong quy&#7871;t
&#273;&#7883;nh theo quy &#273;&#7883;nh c&#7911;a pháp lu&#7853;t và ph&#7843;i
ch&#7883;u m&#7885;i chi phí cho vi&#7879;c th&#7921;c hi&#7879;n bi&#7879;n
pháp kh&#7855;c ph&#7909;c h&#7853;u qu&#7843; &#273;ó.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>Tr&#432;&#7901;ng h&#7907;p không xác
&#273;&#7883;nh &#273;&#432;&#7907;c &#273;&#7889;i t&#432;&#7907;ng vi ph&#7841;m
hành chính theo quy &#273;&#7883;nh t&#7841;i kho&#7843;n 2 &#272;i&#7873;u 65
c&#7911;a Lu&#7853;t XLVPHC ho&#7863;c cá nhân ch&#7871;t, m&#7845;t tích ho&#7863;c
t&#7893; ch&#7913;c b&#7883; gi&#7843;i th&#7875;, phá s&#7843;n mà không có t&#7893;
ch&#7913;c nào ti&#7871;p nh&#7853;n chuy&#7875;n giao quy&#7873;n và
ngh&#297;a v&#7909; theo quy &#273;&#7883;nh t&#7841;i &#272;i&#7873;u 75 c&#7911;a
Lu&#7853;t XLVPHC th\u0301 c&#417; quan n&#417;i ng&#432;&#7901;i có th&#7849;m quy&#7873;n
x&#7917; ph&#7841;t &#273;ang th&#7909; l\u01b0 h&#7891; s&#417; v&#7909; vi ph&#7841;m
hành chính ph&#7843;i t&#7893; ch&#7913;c th&#7921;c hi&#7879;n các bi&#7879;n
pháp kh&#7855;c ph&#7909;c h&#7853;u qu&#7843; quy &#273;&#7883;nh t&#7841;i
kho&#7843;n 1 &#272;i&#7873;u 28 c&#7911;a Lu&#7853;t XLVPHC.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>Chi phí cho vi&#7879;c t&#7893; ch&#7913;c
thi hành bi&#7879;n pháp kh&#7855;c ph&#7909;c h&#7853;u qu&#7843; do c&#417;
quan c&#7911;a ng&#432;&#7901;i có th&#7849;m quy&#7873;n x&#7917; ph&#7841;t
ra quy&#7871;t &#273;&#7883;nh th&#7921;c hi&#7879;n &#273;&#432;&#7907;c l&#7845;y
t&#7915; ngu&#7891;n ngân sách d&#7921; ph\u0323ng c&#7845;p cho c&#417; quan
&#273;ó.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>Trong tr&#432;&#7901;ng h&#7907;p kh&#7849;n
c&#7845;p, c&#7847;n kh&#7855;c ph&#7909;c ngay h&#7853;u qu&#7843; &#273;&#7875;
k&#7883;p th&#7901;i b&#7843;o v&#7879; môi tr&#432;&#7901;ng, b&#7843;o &#273;&#7843;m
giao thông th\u0301 c&#417; quan n&#417;i ng&#432;&#7901;i có th&#7849;m quy&#7873;n
x&#7917; ph&#7841;t &#273;ang th&#7909; l\u01b0 h&#7891; s&#417; v&#7909; vi ph&#7841;m
hành chính t&#7893; ch&#7913;c thi hành bi&#7879;n pháp kh&#7855;c ph&#7909;c h&#7853;u
qu&#7843;. Cá nhân, t&#7893; ch&#7913;c vi ph&#7841;m hành chính ph&#7843;i
hoàn tr&#7843; kinh phí cho c&#417; quan &#273;\u0103 th&#7921;c hi&#7879;n bi&#7879;n
pháp kh&#7855;c ph&#7909;c h&#7853;u qu&#7843;, n&#7871;u không hoàn tr&#7843;
th\u0301 b&#7883; c&#432;&#7905;ng ch&#7871; th&#7921;c hi&#7879;n.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><b style='font-family:"Times New Roman",serif'>c. B&#432;&#7899;c
3: Ng&#432;&#7901;i có th&#7849;m quy&#7873;n ra quy&#7871;t &#273;&#7883;nh có
trách nhi&#7879;m theo d\u01a1i, &#273;ôn &#273;&#7889;c và ki&#7875;m tra vi&#7879;c
thi hành bi&#7879;n pháp kh&#7855;c ph&#7909;c h&#7853;u qu&#7843; do cá nhân,
t&#7893; ch&#7913;c th&#7921;c hi&#7879;n.</span></b></p>

<h4><a name="_Toc131755349">2.2.6. T&#7893; ch&#7913;c thi hành hành quy&#7871;t
&#273;&#7883;nh x&#7917; ph&#7841;t vi ph&#7841;m hành chính trong m&#7897;t s&#7889;
tr&#432;&#7901;ng h&#7907;p c&#7909; th&#7875;</a></h4>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><b style='font-family:"Times New Roman",serif'>a. T&#7893;
ch&#7913;c thi hành hành quy&#7871;t &#273;&#7883;nh x&#7917; ph&#7841;t vi ph&#7841;m
hành chính trong tr&#432;&#7901;ng h&#7907;p ng&#432;&#7901;i b&#7883; x&#7917;
ph&#7841;t ch&#7871;t, m&#7845;t tích, t&#7893; ch&#7913;c b&#7883; x&#7917; ph&#7841;t
gi&#7843;i th&#7875;, phá s&#7843;n</span></b></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>Theo quy &#273;&#7883;nh t&#7841;i &#272;i&#7873;u
19 Ngh&#7883; &#273;&#7883;nh s&#7889; 118/2021/N&#272;-CP, thi hành quy&#7871;t
&#273;&#7883;nh x&#7917; ph&#7841;t vi ph&#7841;m hành chính trong tr&#432;&#7901;ng
h&#7907;p ng&#432;&#7901;i b&#7883; x&#7917; ph&#7841;t ch&#7871;t, m&#7845;t
tích, t&#7893; ch&#7913;c b&#7883; x&#7917; ph&#7841;t gi&#7843;i th&#7875;,
phá s&#7843;n &#273;&#432;&#7907;c th&#7921;c hi&#7879;n nh&#432; sau:</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>- Tr&#432;&#7901;ng h&#7907;p ng&#432;&#7901;i
b&#7883; x&#7917; ph&#7841;t ch&#7871;t, m&#7845;t tích, t&#7893; ch&#7913;c b&#7883;
x&#7917; ph&#7841;t gi&#7843;i th&#7875;, phá s&#7843;n theo quy &#273;&#7883;nh
t&#7841;i &#272;i&#7873;u 75 Lu&#7853;t XLVPHC, mà quy&#7871;t &#273;&#7883;nh
x&#7917; ph&#7841;t v&#7851;n c\u0323n th&#7901;i hi&#7879;u thi hành, th\u0301 ng&#432;&#7901;i
&#273;\u0103 ra quy&#7871;t &#273;&#7883;nh x&#7917; ph&#7841;t ph&#7843;i ra quy&#7871;t
&#273;&#7883;nh thi hành m&#7897;t ph&#7847;n quy&#7871;t &#273;&#7883;nh x&#7917;
ph&#7841;t vi ph&#7841;m hành chính trong th&#7901;i h&#7841;n 60 ngày, k&#7875;
t&#7915; ngày ng&#432;&#7901;i b&#7883; x&#7917; ph&#7841;t ch&#7871;t
&#273;&#432;&#7907;c ghi trong gi&#7845;y ch&#7913;ng t&#7917;; ng&#432;&#7901;i
b&#7883; m&#7845;t tích &#273;&#432;&#7907;c ghi trong quy&#7871;t &#273;&#7883;nh
tuyên b&#7889; m&#7845;t tích; k&#7875; t&#7915; th&#7901;i &#273;i&#7875;m
c&#417; quan &#273;&#259;ng k\u01b0 kinh doanh thông báo v&#7873; vi&#7879;c doanh
nghi&#7879;p gi&#7843;i th&#7875;; th&#7901;i &#273;i&#7875;m quy&#7871;t
&#273;&#7883;nh tuyên b&#7889; phá s&#7843;n có hi&#7879;u l&#7921;c. Quy&#7871;t
&#273;&#7883;nh thi hành g&#7891;m các n&#7897;i dung sau &#273;ây:</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>+ &#272;\u0301nh ch&#7881; thi hành các h\u0301nh th&#7913;c
x&#7917; ph&#7841;t, l\u01b0 do &#273;\u0301nh ch&#7881;; tr&#7915; tr&#432;&#7901;ng h&#7907;p
quy &#273;&#7883;nh t&#7841;i &#273;i&#7875;m b kho&#7843;n này;</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>+ H\u0301nh th&#7913;c x&#7917; ph&#7841;t t&#7883;ch
thu tang v&#7853;t, ph&#432;&#417;ng ti&#7879;n vi ph&#7841;m hành chính và bi&#7879;n
pháp kh&#7855;c ph&#7909;c h&#7853;u qu&#7843; ti&#7871;p t&#7909;c thi hành.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>- Trách nhi&#7879;m thi hành h\u0301nh th&#7913;c
x&#7917; ph&#7841;t t&#7883;ch thu tang v&#7853;t, ph&#432;&#417;ng ti&#7879;n
vi ph&#7841;m hành chính và áp d&#7909;ng bi&#7879;n pháp kh&#7855;c ph&#7909;c
h&#7853;u qu&#7843; trong tr&#432;&#7901;ng h&#7907;p ng&#432;&#7901;i b&#7883;
x&#7917; ph&#7841;t ch&#7871;t, m&#7845;t tích, t&#7893; ch&#7913;c b&#7883; x&#7917;
ph&#7841;t gi&#7843;i th&#7875;, phá s&#7843;n:</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>+ Cá nhân, t&#7893; ch&#7913;c &#273;ang
qu&#7843;n l\u01b0 tang v&#7853;t, ph&#432;&#417;ng ti&#7879;n vi ph&#7841;m hành
chính có trách nhi&#7879;m thi hành h\u0301nh th&#7913;c x&#7917; ph&#7841;t t&#7883;ch
thu tang v&#7853;t, ph&#432;&#417;ng ti&#7879;n vi ph&#7841;m hành chính;</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>+ Cá nhân là ng&#432;&#7901;i &#273;&#432;&#7907;c
h&#432;&#7903;ng di s&#7843;n th&#7915;a k&#7871; &#273;&#432;&#7907;c xác
&#273;&#7883;nh theo quy &#273;&#7883;nh c&#7911;a pháp lu&#7853;t dân s&#7921;
v&#7873; th&#7915;a k&#7871; có trách nhi&#7879;m ti&#7871;p t&#7909;c thi hành
bi&#7879;n pháp kh&#7855;c ph&#7909;c h&#7853;u qu&#7843; trong ph&#7841;m vi
di s&#7843;n th&#7915;a k&#7871;.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>- G&#7917;i quy&#7871;t &#273;&#7883;nh
thi hành m&#7897;t ph&#7847;n quy&#7871;t &#273;&#7883;nh x&#7917; ph&#7841;t
vi ph&#7841;m hành chính:</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>+ Quy&#7871;t &#273;&#7883;nh thi hành m&#7897;t
ph&#7847;n quy&#7871;t &#273;&#7883;nh x&#7917; ph&#7841;t vi ph&#7841;m hành
chính trong tr&#432;&#7901;ng h&#7907;p t&#7893; ch&#7913;c b&#7883; x&#7917;
ph&#7841;t gi&#7843;i th&#7875;, phá s&#7843;n ph&#7843;i &#273;&#432;&#7907;c
g&#7917;i cho c&#417; quan, t&#7893; ch&#7913;c, cá nhân có th&#7849;m quy&#7873;n
gi&#7843;i quy&#7871;t vi&#7879;c gi&#7843;i th&#7875;, phá s&#7843;n; ng&#432;&#7901;i
&#273;&#7841;i di&#7879;n theo pháp lu&#7853;t c&#7911;a t&#7893; ch&#7913;c b&#7883;
gi&#7843;i th&#7875;, phá s&#7843;n &#273;&#7875; thi hành;</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>+ Quy&#7871;t &#273;&#7883;nh thi hành m&#7897;t
ph&#7847;n quy&#7871;t &#273;&#7883;nh x&#7917; ph&#7841;t vi ph&#7841;m hành
chính ph&#7843;i &#273;&#432;&#7907;c g&#7917;i cho cá nhân, t&#7893; ch&#7913;c
quy &#273;&#7883;nh t&#7841;i kho&#7843;n 2 &#272;i&#7873;u này và &#273;i&#7875;m
a kho&#7843;n này trong th&#7901;i h&#7841;n 03 ngày làm vi&#7879;c, k&#7875; t&#7915;
ngày ra quy&#7871;t &#273;&#7883;nh.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>- Th&#7911; t&#7909;c thi hành m&#7897;t ph&#7847;n
quy&#7871;t &#273;&#7883;nh x&#7917; ph&#7841;t vi ph&#7841;m hành chính:</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>+ Th&#7911; t&#7909;c thi hành m&#7897;t
ph&#7847;n quy&#7871;t &#273;&#7883;nh x&#7917; ph&#7841;t vi ph&#7841;m hành
chính quy &#273;&#7883;nh t&#7841;i &#273;i&#7875;m b kho&#7843;n 1 &#272;i&#7873;u
19 Ngh&#7883; &#273;&#7883;nh s&#7889; 118/2021/N&#272;-CP th&#7921;c hi&#7879;n
theo quy &#273;&#7883;nh t&#7841;i M&#7909;c 2 Ch&#432;&#417;ng III Ph&#7847;n
th&#7913; hai Lu&#7853;t XLVPHC;</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>+ Tr&#432;&#7901;ng h&#7907;p quá th&#7901;i
h&#7841;n thi hành quy&#7871;t &#273;&#7883;nh mà cá nhân, t&#7893; ch&#7913;c
quy &#273;&#7883;nh t&#7841;i kho&#7843;n 2 &#272;i&#7873;u 19 Ngh&#7883;
&#273;&#7883;nh s&#7889; 118/2021/N&#272;-CP không th&#7921;c hi&#7879;n các bi&#7879;n
pháp kh&#7855;c ph&#7909;c h&#7853;u qu&#7843;, th\u0301 c&#417; quan c&#7911;a
ng&#432;&#7901;i có th&#7849;m quy&#7873;n x&#7917; ph&#7841;t &#273;ang th&#7909;
l\u01b0 h&#7891; s&#417; v&#7909; vi&#7879;c vi ph&#7841;m hành chính ph&#7843;i t&#7893;
ch&#7913;c th&#7921;c hi&#7879;n.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>Chi phí th&#7921;c hi&#7879;n các bi&#7879;n
pháp kh&#7855;c ph&#7909;c h&#7853;u qu&#7843; &#273;&#432;&#7907;c kh&#7845;u
tr&#7915; t&#7915; di s&#7843;n th&#7915;a k&#7871; mà ng&#432;&#7901;i b&#7883;
x&#7917; ph&#7841;t &#273;&#7875; l&#7841;i ho&#7863;c tài s&#7843;n c\u0323n l&#7841;i
c&#7911;a t&#7893; ch&#7913;c b&#7883; x&#7917; ph&#7841;t gi&#7843;i th&#7875;,
phá s&#7843;n và &#273;&#432;&#7907;c coi là m&#7897;t trong nh&#7919;ng kho&#7843;n
chi phí &#432;u tiên thanh toán (n&#7871;u có).</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>- Tr&#432;&#7901;ng h&#7907;p ng&#432;&#7901;i
b&#7883; x&#7917; ph&#7841;t ch&#7871;t không &#273;&#7875; l&#7841;i di s&#7843;n
th&#7915;a k&#7871;, t&#7893; ch&#7913;c b&#7883; x&#7917; ph&#7841;t gi&#7843;i
th&#7875;, phá s&#7843;n không c\u0323n tài s&#7843;n, th\u0301 vi&#7879;c thi hành bi&#7879;n
pháp kh&#7855;c ph&#7909;c h&#7853;u qu&#7843; &#273;&#432;&#7907;c th&#7921;c
hi&#7879;n theo quy &#273;&#7883;nh t&#7841;i kho&#7843;n 4 &#272;i&#7873;u 85
Lu&#7853;t XLVPHC.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>- Ng&#432;&#7901;i th&#7915;a k&#7871; c&#7911;a
ng&#432;&#7901;i b&#7883; x&#7917; ph&#7841;t ch&#7871;t, m&#7845;t tích,
ng&#432;&#7901;i &#273;&#7841;i di&#7879;n theo pháp lu&#7853;t c&#7911;a t&#7893;
ch&#7913;c b&#7883; x&#7917; ph&#7841;t gi&#7843;i th&#7875;, phá s&#7843;n có
quy&#7873;n giám sát, khi&#7871;u n&#7841;i kh&#7903;i ki&#7879;n &#273;&#7889;i
v&#7899;i các chi phí t&#7893; ch&#7913;c th&#7921;c hi&#7879;n và vi&#7879;c
thanh toán chi phí th&#7921;c hi&#7879;n các bi&#7879;n pháp kh&#7855;c ph&#7909;c
h&#7853;u qu&#7843; quy &#273;&#7883;nh t&#7841;i kho&#7843;n 4 &#272;i&#7873;u
19 Ngh&#7883; &#273;&#7883;nh s&#7889; 118/2021/N&#272;-CP.</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><b style='font-family:"Times New Roman",serif'>b. T&#7893;
ch&#7913;c thi hành quy&#7871;t &#273;&#7883;nh x&#7917; ph&#7841;t ti&#7873;n
trong tr&#432;&#7901;ng h&#7907;p ho\u0103n, gi&#7843;m, mi&#7877;n ti&#7873;n ph&#7841;t,
n&#7897;p ti&#7873;n ph&#7841;t nhi&#7873;u l&#7847;n</span></b></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>- Ho\u0103n thi hành quy&#7871;t &#273;&#7883;nh
ph&#7841;t ti&#7873;n</span></p>

<p class=MsoNormal style='margin-bottom:0cm;margin-bottom:.0001pt;text-align:
justify;text-indent:1.0cm;line-height:normal'><span style='font-size:14.0pt;
font-family:"Times New Roman",serif'>Vi&#7879;c ho\u0103n thi hành quy&#7871;t
&#273;&#7883;nh ph&#7841;t ti&#7873;n &#273;&#432;&#7907;c quy &#273;&#7883;nh
