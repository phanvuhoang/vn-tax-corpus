c&#417; quan thu&#7871; qu&aacute; th&#7901;i h&#7841;n quy &#273;&#7883;nh t&#7915;
05 ng&agrave;y tr&#7903; l&ecirc;n.</span></p>

<p class=MsoNormal style='margin-top:2.0pt;text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>2. Ph&#7841;t ti&#7873;n t&#7915; 6.000.000 &#273;&#7891;ng
&#273;&#7871;n 16.000.000 &#273;&#7891;ng &#273;&#7889;i v&#7899;i m&#7897;t
trong c&aacute;c h&agrave;nh vi sau &#273;&acirc;y:</span></p>

<p class=MsoNormal style='margin-top:2.0pt;text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>a) Th&ocirc;ng &#273;&#7891;ng, bao che ng&#432;&#7901;i
n&#7897;p thu&#7871; tr&#7889;n thu&#7871;, kh&ocirc;ng th&#7921;c hi&#7879;n
quy&#7871;t &#273;&#7883;nh c&#432;&#7905;ng ch&#7871; h&agrave;nh ch&iacute;nh
thu&#7871;, tr&#7915; h&agrave;nh vi kh&ocirc;ng tr&iacute;ch chuy&#7875;n ti&#7873;n
t&#7915; t&agrave;i kho&#7843;n c&#7911;a ng&#432;&#7901;i n&#7897;p thu&#7871;
quy &#273;&#7883;nh t&#7841;i &#272;i&#7873;u 18 Ngh&#7883; &#273;&#7883;nh
n&agrave;y;</span></p>

<p class=MsoNormal style='margin-top:2.0pt;text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>b) Kh&ocirc;ng cung c&#7845;p ho&#7863;c cung c&#7845;p
kh&ocirc;ng ch&iacute;nh x&aacute;c th&ocirc;ng tin li&ecirc;n quan &#273;&#7871;n
t&agrave;i s&#7843;n, quy&#7873;n, ngh&#297;a v&#7909; v&#7873; t&agrave;i s&#7843;n
c&#7911;a ng&#432;&#7901;i n&#7897;p thu&#7871; do m&igrave;nh n&#7855;m gi&#7919;;
t&agrave;i kho&#7843;n c&#7911;a ng&#432;&#7901;i n&#7897;p thu&#7871; t&#7841;i
t&#7893; ch&#7913;c t&iacute;n d&#7909;ng, kho b&#7841;c nh&agrave; n&#432;&#7899;c.</span></p>

<p class=MsoNormal style='margin-top:2.0pt;text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>3. M&#7913;c ph&#7841;t ti&#7873;n quy &#273;&#7883;nh
t&#7841;i kho&#7843;n 1, kho&#7843;n 2 &#272;i&#7873;u n&agrave;y l&agrave; m&#7913;c
ph&#7841;t ti&#7873;n &aacute;p d&#7909;ng &#273;&#7889;i v&#7899;i t&#7893; ch&#7913;c.
<s>M&#7913;c ph&#7841;t ti&#7873;n &#273;&#7889;i v&#7899;i c&aacute;
nh&acirc;n &aacute;p d&#7909;ng theo nguy&ecirc;n t&#7855;c quy &#273;&#7883;nh
t&#7841;i kho&#7843;n 5 &#272;i&#7873;u 4 Ngh&#7883; &#273;&#7883;nh n&agrave;y</s>.
</span><span lang=VI style='font-size:14.0pt;c ph&#7841;t
ti&#7873;n &#273;&#7889;i v&#7899;i c&aacute; nh&acirc;n &aacute;p d&#7909;ng
theo nguy&ecirc;n t&#7855;c quy &#273;&#7883;nh t&#7841;i kho&#7843;n 5 &#272;i&#7873;u
5 Ngh&#7883; &#273;&#7883;nh n&agrave;y</span><span style='font-size:14.0pt'> (<i

21 ng&agrave;y tr&#7903; l&ecirc;n, k&#7875; t&#7915; ng&agrave;y b&#7855;t
&#273;&#7847;u s&#7917; d&#7909;ng h&oacute;a &#273;&#417;n t&#7841;i &#273;&#7883;a
ch&#7881; m&#7899;i.</span></p>

<p class=MsoNormal style='margin-top:2.0pt;text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>3. Ph&#7841;t ti&#7873;n t&#7915; 6.000.000 &#273;&#7891;ng
&#273;&#7871;n 18.000.000 &#273;&#7891;ng &#273;&#7889;i v&#7899;i h&agrave;nh
vi kh&ocirc;ng l&#7853;p th&ocirc;ng b&aacute;o ph&aacute;t h&agrave;nh
h&oacute;a &#273;&#417;n tr&#432;&#7899;c khi h&oacute;a &#273;&#417;n
&#273;&#432;&#7907;c &#273;&#432;a v&agrave;o s&#7917; d&#7909;ng n&#7871;u
c&aacute;c h&oacute;a &#273;&#417;n n&agrave;y g&#7855;n v&#7899;i nghi&#7879;p
v&#7909; kinh t&#7871; ph&aacute;t sinh v&agrave; &#273;&atilde; khai, n&#7897;p
thu&#7871; ho&#7863;c ch&#432;a &#273;&#7871;n k&#7923; k&ecirc; khai, n&#7897;p
thu&#7871; theo quy &#273;&#7883;nh.</span></p>

<p class=MsoNormal style='margin-top:2.0pt;text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>Tr&#432;&#7901;ng h&#7907;p kh&ocirc;ng l&#7853;p
th&ocirc;ng b&aacute;o ph&aacute;t h&agrave;nh h&oacute;a &#273;&#417;n
tr&#432;&#7899;c khi h&oacute;a &#273;&#417;n &#273;&#432;&#7907;c
&#273;&#432;a v&agrave;o s&#7917; d&#7909;ng n&#7871;u c&aacute;c h&oacute;a &#273;&#417;n
n&agrave;y kh&ocirc;ng g&#7855;n v&#7899;i nghi&#7879;p v&#7909; kinh t&#7871;
ph&aacute;t sinh ho&#7863;c qu&aacute; th&#7901;i h&#7841;n khai thu&#7871;
m&agrave; ch&#432;a &#273;&#432;&#7907;c khai, n&#7897;p thu&#7871; theo quy
&#273;&#7883;nh th&igrave; b&#7883; x&#7917; ph&#7841;t theo quy &#273;&#7883;nh
t&#7841;i &#272;i&#7873;u 28 Ngh&#7883; &#273;&#7883;nh n&agrave;y ho&#7863;c
&#272;i&#7873;u 16, &#272;i&#7873;u 17 Ch&#432;&#417;ng II Ngh&#7883; &#273;&#7883;nh
n&agrave;y.</span></p>

<p class=MsoNormal style='margin-top:2.0pt;text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>4. Bi&#7879;n ph&aacute;p kh&#7855;c ph&#7909;c h&#7853;u
qu&#7843;: Bu&#7897;c th&#7921;c hi&#7879;n th&#7911; t&#7909;c ph&aacute;t
h&agrave;nh h&oacute;a &#273;&#417;n theo quy &#273;&#7883;nh &#273;&#7889;i v&#7899;i
h&agrave;nh vi quy &#273;&#7883;nh t&#7841;i &#273;i&#7875;m a, b kho&#7843;n 2
v&agrave; kho&#7843;n 3 &#272;i&#7873;u n&agrave;y.</span></p>

<h2><a name="dieu_24"></a><a name="_Toc114664902"></a><b
style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>1. Ph&#7841;t c&#7843;nh c&aacute;o &#273;&#7889;i v&#7899;i
m&#7897;t trong c&aacute;c h&agrave;nh vi sau &#273;&acirc;y:</span></p>

<p class=MsoNormal style='margin-top:2.0pt;text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>a) L&#7853;p h&oacute;a &#273;&#417;n kh&ocirc;ng
&#273;&uacute;ng th&#7901;i &#273;i&#7875;m nh&#432;ng kh&ocirc;ng d&#7851;n
&#273;&#7871;n ch&#7853;m th&#7921;c hi&#7879;n ngh&#297;a v&#7909; thu&#7871;
v&agrave; c&oacute; t&igrave;nh ti&#7871;t gi&#7843;m nh&#7865;;</span></p>

<p class=MsoNormal style='margin-top:2.0pt;text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>b) L&#7853;p h&oacute;a &#273;&#417;n li&ecirc;n t&#7909;c
t&#7915; s&#7889; nh&#7887; &#273;&#7871;n s&#7889; l&#7899;n nh&#432;ng
kh&aacute;c quy&#7875;n (d&ugrave;ng quy&#7875;n c&oacute; s&#7889; th&#7913; t&#7921;
l&#7899;n h&#417;n v&agrave; ch&#432;a d&ugrave;ng quy&#7875;n c&oacute; s&#7889;
th&#7913; t&#7921; nh&#7887; h&#417;n) v&agrave; t&#7893; ch&#7913;c, c&aacute;
nh&acirc;n sau khi ph&aacute;t hi&#7879;n ra &#273;&atilde; h&#7911;y
c&aacute;c quy&#7875;n h&oacute;a &#273;&#417;n c&oacute; s&#7889; th&#7913; t&#7921;
nh&#7887; h&#417;n;</span></p>

<p class=MsoNormal style='margin-top:2.0pt;text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>c) L&#7853;p sai lo&#7841;i h&oacute;a &#273;&#417;n
theo quy &#273;&#7883;nh &#273;&atilde; giao cho ng&#432;&#7901;i mua ho&#7863;c
&#273;&atilde; k&ecirc; khai thu&#7871;, b&ecirc;n b&aacute;n v&agrave;
b&ecirc;n mua ph&aacute;t hi&#7879;n vi&#7879;c l&#7853;p sai lo&#7841;i
h&oacute;a &#273;&#417;n v&agrave; l&#7853;p l&#7841;i lo&#7841;i h&oacute;a
&#273;&#417;n &#273;&uacute;ng theo quy &#273;&#7883;nh tr&#432;&#7899;c khi
c&#417; quan c&oacute; th&#7849;m quy&#7873;n c&ocirc;ng b&#7889; quy&#7871;t
&#273;&#7883;nh thanh tra, ki&#7875;m tra t&#7841;i tr&#7909; s&#7903; ng&#432;&#7901;i
n&#7897;p thu&#7871; v&agrave; kh&ocirc;ng &#7843;nh h&#432;&#7903;ng &#273;&#7871;n
vi&#7879;c x&aacute;c &#273;&#7883;nh ngh&#297;a v&#7909; thu&#7871;.</span></p>

<p class=MsoNormal style='margin-top:2.0pt;text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>2. Ph&#7841;t ti&#7873;n t&#7915; 500.000 &#273;&#7891;ng
&#273;&#7871;n 1.500.000 &#273;&#7891;ng &#273;&#7889;i v&#7899;i m&#7897;t
trong c&aacute;c h&agrave;nh vi sau &#273;&acirc;y:</span></p>

<p class=MsoNormal style='margin-top:2.0pt;text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>a) Kh&ocirc;ng l&#7853;p h&oacute;a &#273;&#417;n t&#7893;ng
h&#7907;p theo quy &#273;&#7883;nh c&#7911;a ph&aacute;p lu&#7853;t v&#7873;
h&oacute;a &#273;&#417;n b&aacute;n h&agrave;ng h&oacute;a, cung &#7913;ng d&#7883;ch
v&#7909;;</span></p>

<p class=MsoNormal style='margin-top:2.0pt;text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>b) Kh&ocirc;ng l&#7853;p h&oacute;a &#273;&#417;n
&#273;&#7889;i v&#7899;i c&aacute;c h&agrave;ng h&oacute;a, d&#7883;ch v&#7909;
d&ugrave;ng &#273;&#7875; khuy&#7871;n m&#7841;i, qu&#7843;ng c&aacute;o,
h&agrave;ng m&#7851;u; h&agrave;ng h&oacute;a, d&#7883;ch v&#7909; d&ugrave;ng
&#273;&#7875; cho, bi&#7871;u, t&#7863;ng, trao &#273;&#7893;i, tr&#7843; thay
l&#432;&#417;ng cho ng&#432;&#7901;i lao &#273;&#7897;ng, tr&#7915; h&agrave;ng
h&oacute;a lu&acirc;n chuy&#7875;n n&#7897;i b&#7897;, ti&ecirc;u d&ugrave;ng n&#7897;i
b&#7897; &#273;&#7875; ti&#7871;p t&#7909;c qu&aacute; tr&igrave;nh s&#7843;n
xu&#7845;t.</span></p>

<p class=MsoNormal style='margin-top:2.0pt;text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>3. Ph&#7841;t ti&#7873;n t&#7915; 3.000.000 &#273;&#7891;ng
&#273;&#7871;n 5.000.000 &#273;&#7891;ng &#273;&#7889;i v&#7899;i h&agrave;nh
vi l&#7853;p h&oacute;a &#273;&#417;n kh&ocirc;ng &#273;&uacute;ng th&#7901;i
&#273;i&#7875;m nh&#432;ng kh&ocirc;ng d&#7851;n &#273;&#7871;n ch&#7853;m th&#7921;c
hi&#7879;n ngh&#297;a v&#7909; thu&#7871;, tr&#7915; tr&#432;&#7901;ng h&#7907;p
quy &#273;&#7883;nh t&#7841;i &#273;i&#7875;m a kho&#7843;n 1 &#272;i&#7873;u
n&agrave;y.</span></p>

<p class=MsoNormal style='margin-top:2.0pt;text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>4. Ph&#7841;t ti&#7873;n t&#7915; 4.000.000 &#273;&#7891;ng
&#273;&#7871;n 8.000.000 &#273;&#7891;ng &#273;&#7889;i v&#7899;i m&#7897;t
trong c&aacute;c h&agrave;nh vi sau &#273;&acirc;y: </span></p>

<p class=MsoNormal style='margin-top:2.0pt;text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>a) L&#7853;p h&oacute;a &#273;&#417;n kh&ocirc;ng
&#273;&uacute;ng th&#7901;i &#273;i&#7875;m theo quy &#273;&#7883;nh c&#7911;a
ph&aacute;p lu&#7853;t v&#7873; h&oacute;a &#273;&#417;n b&aacute;n h&agrave;ng
h&oacute;a, cung &#7913;ng d&#7883;ch v&#7909;, tr&#7915; tr&#432;&#7901;ng h&#7907;p
quy &#273;&#7883;nh t&#7841;i &#273;i&#7875;m a kho&#7843;n 1, kho&#7843;n 3
&#272;i&#7873;u n&agrave;y;</span></p>

<p class=MsoNormal style='margin-top:2.0pt;text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>b) L&#7853;p h&oacute;a &#273;&#417;n kh&ocirc;ng theo
th&#7913; t&#7921; t&#7915; s&#7889; nh&#7887; &#273;&#7871;n s&#7889; l&#7899;n
theo quy &#273;&#7883;nh, tr&#7915; tr&#432;&#7901;ng h&#7907;p ph&#7841;t c&#7843;nh
c&aacute;o theo &#273;i&#7875;m b kho&#7843;n 1 &#272;i&#7873;u n&agrave;y;</span></p>

<p class=MsoNormal style='margin-top:2.0pt;text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>c) L&#7853;p h&oacute;a &#273;&#417;n ghi ng&agrave;y
tr&ecirc;n h&oacute;a &#273;&#417;n tr&#432;&#7899;c ng&agrave;y mua h&oacute;a
&#273;&#417;n c&#7911;a c&#417; quan thu&#7871;;</span></p>

<p class=MsoNormal style='margin-top:2.0pt;text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>d) L&#7853;p sai lo&#7841;i h&oacute;a &#273;&#417;n
theo quy &#273;&#7883;nh c&#7911;a ph&aacute;p lu&#7853;t v&#7873; h&oacute;a
&#273;&#417;n b&aacute;n h&agrave;ng h&oacute;a, cung &#7913;ng d&#7883;ch v&#7909;
v&agrave; &#273;&atilde; giao cho ng&#432;&#7901;i mua ho&#7863;c
&#273;&atilde; k&ecirc; khai thu&#7871;, tr&#7915; tr&#432;&#7901;ng h&#7907;p
ph&#7841;t c&#7843;nh c&aacute;o theo &#273;i&#7875;m c kho&#7843;n 1 &#272;i&#7873;u
n&agrave;y;</span></p>

<p class=MsoNormal style='margin-top:2.0pt;text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>&#273;) L&#7853;p h&oacute;a &#273;&#417;n &#273;i&#7879;n
t&#7917; khi ch&#432;a c&oacute; th&ocirc;ng b&aacute;o ch&#7845;p thu&#7853;n
c&#7911;a c&#417; quan thu&#7871; ho&#7863;c tr&#432;&#7899;c ng&agrave;y
c&#417; quan thu&#7871; ch&#7845;p nh&#7853;n vi&#7879;c s&#7917; d&#7909;ng
h&oacute;a &#273;&#417;n &#273;i&#7879;n t&#7917; c&oacute; m&atilde; ho&#7863;c
kh&ocirc;ng c&oacute; m&atilde; c&#7911;a c&#417; quan thu&#7871;;</span></p>

<p class=MsoNormal style='margin-top:2.0pt;text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>e) L&#7853;p h&oacute;a &#273;&#417;n b&aacute;n
h&agrave;ng h&oacute;a, d&#7883;ch v&#7909; trong th&#7901;i gian t&#7841;m ng&#7915;ng
ho&#7841;t &#273;&#7897;ng kinh doanh, tr&#7915; tr&#432;&#7901;ng h&#7907;p l&#7853;p
h&oacute;a &#273;&#417;n giao cho kh&aacute;ch h&agrave;ng &#273;&#7875; th&#7921;c
hi&#7879;n c&aacute;c h&#7907;p &#273;&#7891;ng &#273;&atilde; k&yacute;
tr&#432;&#7899;c ng&agrave;y th&ocirc;ng b&aacute;o t&#7841;m ng&#7915;ng kinh
doanh;</span></p>

<p class=MsoNormal style='margin-top:2.0pt;text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>g) L&#7853;p h&oacute;a &#273;&#417;n &#273;i&#7879;n
t&#7917; t&#7915; m&aacute;y t&iacute;nh ti&#7873;n kh&ocirc;ng c&oacute; k&#7871;t
n&#7889;i, chuy&#7875;n d&#7919; li&#7879;u &#273;i&#7879;n t&#7917; v&#7899;i
c&#417; quan thu&#7871;.</span></p>

<p class=MsoNormal><span style='font-size:14.0pt;background:yellow;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; </span>(N&#272;
</span><span style='background:yellow;-CP
s&#7917;a:</span><span lang=VI style='font-size:14.0pt;background:yellow;
h) L&#7853;p h&oacute;a &#273;&#417;n kh&ocirc;ng ghi &#273;&#7847;y
&#273;&#7911; c&aacute;c n&#7897;i dung b&#7855;t bu&#7897;c tr&ecirc;n
h&oacute;a &#273;&#417;n theo quy &#273;&#7883;nh.&#8221;</span></p>

<p class=MsoNormal style='margin-top:2.0pt;text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>5. Ph&#7841;t ti&#7873;n t&#7915; 10.000.000 &#273;&#7891;ng
&#273;&#7871;n 20.000.000 &#273;&#7891;ng &#273;&#7889;i v&#7899;i h&agrave;nh
vi kh&ocirc;ng l&#7853;p h&oacute;a &#273;&#417;n khi b&aacute;n h&agrave;ng
h&oacute;a, cung c&#7845;p d&#7883;ch v&#7909; cho ng&#432;&#7901;i mua theo
quy &#273;&#7883;nh, tr&#7915; h&agrave;nh vi quy &#273;&#7883;nh t&#7841;i
&#273;i&#7875;m b kho&#7843;n 2 &#272;i&#7873;u n&agrave;y.</span></p>

<p class=MsoNormal style='margin-top:2.0pt;text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>6. Bi&#7879;n ph&aacute;p kh&#7855;c ph&#7909;c h&#7853;u
qu&#7843;: Bu&#7897;c l&#7853;p h&oacute;a &#273;&#417;n theo quy &#273;&#7883;nh
&#273;&#7889;i v&#7899;i h&agrave;nh vi quy &#273;&#7883;nh t&#7841;i &#273;i&#7875;m
d kho&#7843;n 4, kho&#7843;n 5 &#272;i&#7873;u n&agrave;y khi ng&#432;&#7901;i
mua c&oacute; y&ecirc;u c&#7847;u.</span></p>

<h2><a name="dieu_25"></a><a name="_Toc114664903"></a><b style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>1. Ph&#7841;t c&#7843;nh c&aacute;o &#273;&#7889;i v&#7899;i
h&agrave;nh vi khai b&aacute;o m&#7845;t, ch&aacute;y, h&#7887;ng h&oacute;a
&#273;&#417;n qu&aacute; th&#7901;i h&#7841;n t&#7915; 01 ng&agrave;y &#273;&#7871;n
05 ng&agrave;y, k&#7875; t&#7915; ng&agrave;y h&#7871;t th&#7901;i h&#7841;n
khai b&aacute;o theo quy &#273;&#7883;nh v&agrave; c&oacute; t&igrave;nh ti&#7871;t
gi&#7843;m nh&#7865;.</span></p>

<p class=MsoNormal style='margin-top:2.0pt;text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>2. Ph&#7841;t ti&#7873;n t&#7915; 1.000.000 &#273;&#7891;ng
&#273;&#7871;n 4.000.000 &#273;&#7891;ng &#273;&#7889;i v&#7899;i h&agrave;nh
vi khai b&aacute;o m&#7845;t, ch&aacute;y, h&#7887;ng h&oacute;a &#273;&#417;n
qu&aacute; th&#7901;i h&#7841;n t&#7915; 01 ng&agrave;y &#273;&#7871;n 05
ng&agrave;y, k&#7875; t&#7915; ng&agrave;y h&#7871;t th&#7901;i h&#7841;n khai
b&aacute;o theo quy &#273;&#7883;nh, tr&#7915; tr&#432;&#7901;ng h&#7907;p quy
&#273;&#7883;nh t&#7841;i kho&#7843;n 1 &#272;i&#7873;u n&agrave;y.</span></p>

<p class=MsoNormal style='margin-top:2.0pt;text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>3. Ph&#7841;t ti&#7873;n t&#7915; 4.000.000 &#273;&#7891;ng
&#273;&#7871;n 8.000.000 &#273;&#7891;ng &#273;&#7889;i v&#7899;i m&#7897;t
trong c&aacute;c h&agrave;nh vi sau &#273;&acirc;y:</span></p>

<p class=MsoNormal style='margin-top:2.0pt;text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>a) Khai b&aacute;o m&#7845;t, ch&aacute;y, h&#7887;ng
h&oacute;a &#273;&#417;n qu&aacute; th&#7901;i h&#7841;n t&#7915; 06
ng&agrave;y tr&#7903; l&ecirc;n, k&#7875; t&#7915; ng&agrave;y h&#7871;t th&#7901;i
h&#7841;n khai b&aacute;o theo quy &#273;&#7883;nh;</span></p>

<p class=MsoNormal style='margin-top:2.0pt;text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>b) Kh&ocirc;ng khai b&aacute;o m&#7845;t, ch&aacute;y,
h&#7887;ng h&oacute;a &#273;&#417;n.</span></p>

<h2><a name="dieu_26"></a><a name="_Toc114664904"></a><b style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>1. Ph&#7841;t c&#7843;nh c&aacute;o &#273;&#7889;i v&#7899;i
m&#7897;t trong c&aacute;c h&agrave;nh vi sau &#273;&acirc;y:</span></p>

<p class=MsoNormal style='margin-top:2.0pt;text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>a) L&agrave;m m&#7845;t, ch&aacute;y, h&#7887;ng
h&oacute;a &#273;&#417;n &#273;&atilde; l&#7853;p (tr&#7915; li&ecirc;n giao
cho kh&aacute;ch h&agrave;ng) trong qu&aacute; tr&igrave;nh s&#7917; d&#7909;ng,
&#273;&atilde; k&ecirc; khai, n&#7897;p thu&#7871;, c&oacute; h&#7891; s&#417;
ch&#7913;ng t&#7915; ch&#7913;ng minh vi&#7879;c mua b&aacute;n h&agrave;ng
h&oacute;a, d&#7883;ch v&#7909; v&agrave; c&oacute; t&igrave;nh ti&#7871;t gi&#7843;m
nh&#7865;;</span></p>

<p class=MsoNormal style='margin-top:2.0pt;text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>b) L&agrave;m m&#7845;t, ch&aacute;y, h&#7887;ng
h&oacute;a &#273;&#417;n &#273;&atilde; l&#7853;p sai, &#273;&atilde;
x&oacute;a b&#7887; v&agrave; ng&#432;&#7901;i b&aacute;n &#273;&atilde; l&#7853;p
h&oacute;a &#273;&#417;n kh&aacute;c thay th&#7871; cho h&oacute;a
&#273;&#417;n l&#7853;p sai, x&oacute;a b&#7887; n&agrave;y.</span></p>

<p class=MsoNormal style='margin-top:2.0pt;text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>2. Ph&#7841;t ti&#7873;n t&#7915; 3.000.000 &#273;&#7891;ng
&#273;&#7871;n 5.000.000 &#273;&#7891;ng &#273;&#7889;i v&#7899;i h&agrave;nh
vi l&agrave;m m&#7845;t, ch&aacute;y, h&#7887;ng h&oacute;a &#273;&#417;n
&#273;&atilde; l&#7853;p (li&ecirc;n giao cho kh&aacute;ch h&agrave;ng) trong
qu&aacute; tr&igrave;nh s&#7917; d&#7909;ng, ng&#432;&#7901;i b&aacute;n

&#273;i&#7879;n t&#7917; trong l&#297;nh v&#7921;c thu&#7871; l&agrave; c&#417;
s&#7903; &#273;&#7875; c&#417; quan thu&#7871; ban h&agrave;nh quy&#7871;t
&#273;&#7883;nh x&#7917; ph&#7841;t vi ph&#7841;m h&agrave;nh ch&iacute;nh.</span></p>

<p class=MsoNormal style='margin-top:2.0pt;text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>Bi&ecirc;n b&#7843;n vi ph&#7841;m h&agrave;nh
ch&iacute;nh &#273;i&#7879;n t&#7917; ph&#7843;i ghi r&otilde; ng&agrave;y,
th&aacute;ng, n&#259;m, &#273;&#7883;a &#273;i&#7875;m l&#7853;p bi&ecirc;n b&#7843;n;
h&#7885;, t&ecirc;n, ch&#7913;c v&#7909; ng&#432;&#7901;i l&#7853;p bi&ecirc;n
b&#7843;n; ch&#7919; k&yacute; s&#7889; c&#7911;a ng&#432;&#7901;i l&#7853;p
bi&ecirc;n b&#7843;n; h&#7885;, t&ecirc;n, &#273;&#7883;a ch&#7881;, m&atilde;
s&#7889; thu&#7871;, s&#7889; ch&#7913;ng minh nh&acirc;n d&acirc;n ho&#7863;c
s&#7889; th&#7867; c&#259;n c&#432;&#7899;c c&#7911;a ng&#432;&#7901;i vi ph&#7841;m
ho&#7863;c t&ecirc;n, &#273;&#7883;a ch&#7881;, m&atilde; s&#7889; thu&#7871; c&#7911;a
t&#7893; ch&#7913;c vi ph&#7841;m; gi&#7901;, ng&agrave;y, th&aacute;ng,
n&#259;m th&#7921;c hi&#7879;n vi ph&#7841;m; h&agrave;nh vi vi ph&#7841;m
h&agrave;nh ch&iacute;nh; quy&#7873;n v&agrave; th&#7901;i h&#7841;n gi&#7843;i
tr&igrave;nh v&#7873; vi ph&#7841;m h&agrave;nh ch&iacute;nh c&#7911;a ng&#432;&#7901;i
vi ph&#7841;m; c&#417; quan ti&#7871;p nh&#7853;n gi&#7843;i tr&igrave;nh.
Bi&ecirc;n b&#7843;n vi ph&#7841;m h&agrave;nh ch&iacute;nh &#273;i&#7879;n t&#7917;
kh&ocirc;ng b&#7855;t bu&#7897;c ph&#7843;i c&oacute; ch&#7919; k&yacute; c&#7911;a
t&#7893; ch&#7913;c, c&aacute; nh&acirc;n vi ph&#7841;m.</span></p>

<p class=MsoNormal style='margin-top:2.0pt;text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>C&#417; quan thu&#7871; c&oacute; tr&aacute;ch nhi&#7879;m
x&acirc;y d&#7921;ng h&#7879; th&#7889;ng c&ocirc;ng ngh&#7879; th&ocirc;ng tin
&#273;&aacute;p &#7913;ng vi&#7879;c l&#7853;p v&agrave; g&#7917;i bi&ecirc;n b&#7843;n
vi ph&#7841;m h&agrave;nh ch&iacute;nh &#273;i&#7879;n t&#7917;. Khi h&#7879;
th&#7889;ng c&ocirc;ng ngh&#7879; th&ocirc;ng tin &#273;&aacute;p &#7913;ng
&#273;i&#7873;u ki&#7879;n l&#7853;p, g&#7917;i bi&ecirc;n b&#7843;n vi ph&#7841;m
h&agrave;nh ch&iacute;nh &#273;i&#7879;n t&#7917; &#273;&#7889;i v&#7899;i
c&aacute;c h&agrave;nh vi vi ph&#7841;m v&#7873; th&#7911; t&#7909;c thu&#7871;,
h&oacute;a &#273;&#417;n kh&aacute;c, B&#7897; tr&#432;&#7903;ng B&#7897;
T&agrave;i ch&iacute;nh quy &#273;&#7883;nh vi&#7879;c l&#7853;p v&agrave; g&#7917;i
bi&ecirc;n b&#7843;n vi ph&#7841;m h&agrave;nh ch&iacute;nh &#273;i&#7879;n t&#7917;.</span></p>

<h2><a name="dieu_37"></a><a name="_Toc114664917"></a><b style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>1. C&aacute;c tr&#432;&#7901;ng h&#7907;p gi&#7843;i
tr&igrave;nh vi ph&#7841;m h&agrave;nh ch&iacute;nh v&#7873; thu&#7871;,

<p class=MsoNormal style='margin-top:2.0pt;text-align:justify;text-indent:1.0cm'><span

ch&iacute;nh v&#7873; thu&#7871;, h&oacute;a &#273;&#417;n &#273;&#432;&#7907;c

bi&ecirc;n b&#7843;n vi ph&#7841;m h&agrave;nh ch&iacute;nh &#273;i&#7879;n t&#7917;;</span></p>

<p class=MsoNormal style='margin-top:2.0pt;text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>b) H&agrave;nh vi vi ph&#7841;m h&agrave;nh
ch&iacute;nh quy &#273;&#7883;nh t&#7841;i &#272;i&#7873;u 16, 17, 18; kho&#7843;n
3 &#272;i&#7873;u 20; kho&#7843;n 7 &#272;i&#7873;u 21; &#272;i&#7873;u 22
v&agrave; &#272;i&#7873;u 28 Ngh&#7883; &#273;&#7883;nh n&agrave;y.</span></p>

<p class=MsoNormal style='margin-top:2.0pt;text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>2. Vi&#7879;c gi&#7843;i tr&igrave;nh vi ph&#7841;m
h&agrave;nh ch&iacute;nh v&#7873; thu&#7871;, h&oacute;a &#273;&#417;n th&#7921;c
hi&#7879;n theo quy &#273;&#7883;nh c&#7911;a ph&aacute;p lu&#7853;t v&#7873; x&#7917;
l&yacute; vi ph&#7841;m h&agrave;nh ch&iacute;nh.</span></p>

<h2><a name="dieu_38"></a><a name="_Toc114664918"></a><b style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>1. Kh&ocirc;ng ra quy&#7871;t &#273;&#7883;nh x&#7917;

h&oacute;a &#273;&#417;n trong c&aacute;c tr&#432;&#7901;ng h&#7907;p sau
&#273;&acirc;y:</span></p>

<p class=MsoNormal style='margin-top:2.0pt;text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>a) Tr&#432;&#7901;ng h&#7907;p quy &#273;&#7883;nh t&#7841;i
&#272;i&#7873;u 9 Ngh&#7883; &#273;&#7883;nh n&agrave;y;</span></p>

<p class=MsoNormal style='margin-top:2.0pt;text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>b) Kh&ocirc;ng x&aacute;c &#273;&#7883;nh &#273;&#432;&#7907;c
&#273;&#7889;i t&#432;&#7907;ng vi ph&#7841;m h&agrave;nh ch&iacute;nh v&#7873;
thu&#7871;, h&oacute;a &#273;&#417;n;</span></p>

<p class=MsoNormal style='margin-top:2.0pt;text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>c) &#272;&atilde; h&#7871;t th&#7901;i hi&#7879;u x&#7917;
ph&#7841;t vi ph&#7841;m h&agrave;nh ch&iacute;nh v&#7873; thu&#7871;,
h&oacute;a &#273;&#417;n quy &#273;&#7883;nh t&#7841;i &#272;i&#7873;u 8 Ngh&#7883;
&#273;&#7883;nh n&agrave;y ho&#7863;c h&#7871;t th&#7901;i h&#7841;n ra quy&#7871;t
&#273;&#7883;nh x&#7917; ph&#7841;t theo quy &#273;&#7883;nh c&#7911;a
ph&aacute;p lu&#7853;t v&#7873; x&#7917; l&yacute; vi ph&#7841;m h&agrave;nh
ch&iacute;nh;</span></p>

<p class=MsoNormal style='margin-top:2.0pt;text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>d) C&aacute; nh&acirc;n vi ph&#7841;m h&agrave;nh
ch&iacute;nh v&#7873; thu&#7871;, h&oacute;a &#273;&#417;n &#273;&atilde; ch&#7871;t,
m&#7845;t t&iacute;ch; t&#7893; ch&#7913;c vi ph&#7841;m h&agrave;nh
ch&iacute;nh &#273;&atilde; b&#7883; gi&#7843;i th&#7875;, ph&aacute; s&#7843;n
trong th&#7901;i gian xem x&eacute;t ra quy&#7871;t &#273;&#7883;nh x&#7917; ph&#7841;t,
tr&#7915; tr&#432;&#7901;ng h&#7907;p quy &#273;&#7883;nh t&#7841;i &#273;i&#7875;m
c kho&#7843;n 4 &#272;i&#7873;u 41 Ngh&#7883; &#273;&#7883;nh n&agrave;y.</span></p>

<p class=MsoNormal style='margin-top:2.0pt;text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>C&#259;n c&#7913; x&aacute;c &#273;&#7883;nh c&aacute;
nh&acirc;n ch&#7871;t, m&#7845;t t&iacute;ch; t&#7893; ch&#7913;c b&#7883; gi&#7843;i
th&#7875;, ph&aacute; s&#7843;n theo quy &#273;&#7883;nh t&#7841;i kho&#7843;n
2 &#272;i&#7873;u 41 Ngh&#7883; &#273;&#7883;nh n&agrave;y;</span></p>

<p class=MsoNormal style='margin-top:2.0pt;text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>&#273;) Chuy&#7875;n h&#7891; s&#417; v&#7909; vi ph&#7841;m
c&oacute; d&#7845;u hi&#7879;u t&#7897;i ph&#7841;m &#273;&#7875; truy c&#7913;u
tr&aacute;ch nhi&#7879;m h&igrave;nh s&#7921;.</span></p>

<p class=MsoNormal style='margin-top:2.0pt;text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>2. Tr&#432;&#7901;ng h&#7907;p kh&ocirc;ng ra quy&#7871;t
&#273;&#7883;nh x&#7917; ph&#7841;t vi ph&#7841;m h&agrave;nh ch&iacute;nh theo
quy &#273;&#7883;nh t&#7841;i &#273;i&#7875;m a, b, c, d kho&#7843;n 1 &#272;i&#7873;u
n&agrave;y th&igrave; ng&#432;&#7901;i c&oacute; th&#7849;m quy&#7873;n x&#7917;
ph&#7841;t kh&ocirc;ng ra quy&#7871;t &#273;&#7883;nh x&#7917; ph&#7841;t
nh&#432;ng ph&#7843;i &aacute;p d&#7909;ng bi&#7879;n ph&aacute;p kh&#7855;c ph&#7909;c
h&#7853;u qu&#7843; theo quy &#273;&#7883;nh (n&#7871;u c&oacute;). Quy&#7871;t
&#273;&#7883;nh &aacute;p d&#7909;ng bi&#7879;n ph&aacute;p kh&#7855;c ph&#7909;c
h&#7853;u qu&#7843; ph&#7843;i ghi r&otilde; l&yacute; do kh&ocirc;ng ra quy&#7871;t
&#273;&#7883;nh x&#7917; ph&#7841;t vi ph&#7841;m h&agrave;nh ch&iacute;nh; bi&#7879;n
ph&aacute;p kh&#7855;c ph&#7909;c h&#7853;u qu&#7843; &#273;&#432;&#7907;c
&aacute;p d&#7909;ng, tr&aacute;ch nhi&#7879;m v&agrave; th&#7901;i h&#7841;n
th&#7921;c hi&#7879;n.</span></p>

<h2><a name="dieu_39"></a><a name="_Toc114664919"></a><b
style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>1. Trong th&#7901;i h&#7841;n 02 ng&agrave;y
l&agrave;m vi&#7879;c, k&#7875; t&#7915; ng&agrave;y ra quy&#7871;t &#273;&#7883;nh
x&#7917; ph&#7841;t vi ph&#7841;m h&agrave;nh ch&iacute;nh, ng&#432;&#7901;i
c&oacute; th&#7849;m quy&#7873;n &#273;&atilde; ra quy&#7871;t &#273;&#7883;nh
x&#7917; ph&#7841;t ph&#7843;i g&#7917;i ho&#7863;c giao quy&#7871;t &#273;&#7883;nh
x&#7917; ph&#7841;t cho c&aacute; nh&acirc;n, t&#7893; ch&#7913;c b&#7883; x&#7917;
ph&#7841;t, c&#417; quan thu ti&#7873;n ph&#7841;t v&agrave; c&#417; quan
li&ecirc;n quan kh&aacute;c (n&#7871;u c&oacute;) &#273;&#7875; thi
h&agrave;nh.</span></p>

<p class=MsoNormal style='margin-top:2.0pt;text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>2. Quy&#7871;t &#273;&#7883;nh x&#7917; ph&#7841;t
&#273;&#432;&#7907;c g&#7917;i b&#7857;ng ph&#432;&#417;ng th&#7913;c &#273;i&#7879;n
t&#7917; theo &#273;&#7883;a ch&#7881; ng&#432;&#7901;i n&#7897;p thu&#7871;
&#273;&atilde; &#273;&#259;ng k&yacute; v&#7899;i c&#417; quan thu&#7871;
&#273;&#7889;i v&#7899;i tr&#432;&#7901;ng h&#7907;p c&aacute; nh&acirc;n, t&#7893;
ch&#7913;c b&#7883; x&#7917; ph&#7841;t &#273;&#7911; &#273;i&#7873;u ki&#7879;n
th&#7921;c hi&#7879;n giao d&#7883;ch &#273;i&#7879;n t&#7917; trong l&#297;nh
v&#7921;c thu&#7871;, tr&#432;&#7901;ng h&#7907;p ch&#432;a &#273;&#7911;
&#273;i&#7873;u ki&#7879;n th&#7921;c hi&#7879;n giao d&#7883;ch &#273;i&#7879;n
t&#7917; trong l&#297;nh v&#7921;c thu&#7871; th&igrave; quy&#7871;t &#273;&#7883;nh
x&#7917; ph&#7841;t &#273;&#432;&#7907;c giao tr&#7921;c ti&#7871;p ho&#7863;c
g&#7917;i b&#7857;ng th&#432; b&#7843;o &#273;&#7843;m qua &#273;&#432;&#7901;ng
b&#432;u ch&iacute;nh theo kho&#7843;n 3 kho&#7843;n 4 &#272;i&#7873;u
n&agrave;y.</span></p>

<p class=MsoNormal style='margin-top:2.0pt;text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>3. Tr&#432;&#7901;ng h&#7907;p quy&#7871;t &#273;&#7883;nh
x&#7917; ph&#7841;t &#273;&#432;&#7907;c giao tr&#7921;c ti&#7871;p th&igrave;
c&ocirc;ng ch&#7913;c giao quy&#7871;t &#273;&#7883;nh x&#7917; ph&#7841;t ph&#7843;i
l&#7853;p bi&ecirc;n b&#7843;n v&#7873; vi&#7879;c giao quy&#7871;t &#273;&#7883;nh
x&#7917; ph&#7841;t. Tr&#432;&#7901;ng h&#7907;p quy&#7871;t &#273;&#7883;nh
&#273;&#432;&#7907;c giao tr&#7921;c ti&#7871;p m&agrave; c&aacute; nh&acirc;n,
t&#7893; ch&#7913;c vi ph&#7841;m c&#7889; t&igrave;nh kh&ocirc;ng nh&#7853;n
quy&#7871;t &#273;&#7883;nh th&igrave; ng&#432;&#7901;i c&oacute; th&#7849;m
quy&#7873;n l&#7853;p bi&ecirc;n b&#7843;n v&#7873; vi&#7879;c kh&ocirc;ng nh&#7853;n
quy&#7871;t &#273;&#7883;nh c&oacute; x&aacute;c nh&#7853;n c&#7911;a
ch&iacute;nh quy&#7873;n &#273;&#7883;a ph&#432;&#417;ng v&agrave; &#273;&#432;&#7907;c
coi l&agrave; quy&#7871;t &#273;&#7883;nh &#273;&atilde; &#273;&#432;&#7907;c
giao.</span></p>

<p class=MsoNormal style='margin-top:2.0pt;text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>4. Tr&#432;&#7901;ng h&#7907;p quy&#7871;t &#273;&#7883;nh
x&#7917; ph&#7841;t &#273;&#432;&#7907;c g&#7917;i qua &#273;&#432;&#7901;ng
b&#432;u ch&iacute;nh b&#7857;ng h&igrave;nh th&#7913;c b&#7843;o &#273;&#7843;m,
n&#7871;u sau th&#7901;i h&#7841;n 10 ng&agrave;y, k&#7875; t&#7915;
ng&agrave;y quy&#7871;t &#273;&#7883;nh x&#7917; ph&#7841;t &#273;&atilde;
&#273;&#432;&#7907;c g&#7917;i qua &#273;&#432;&#7901;ng b&#432;u &#273;i&#7879;n
&#273;&#7871;n l&#7847;n th&#7913; ba m&agrave; b&#7883; tr&#7843; l&#7841;i do
c&aacute; nh&acirc;n, t&#7893; ch&#7913;c vi ph&#7841;m c&#7889; t&igrave;nh
kh&ocirc;ng nh&#7853;n; quy&#7871;t &#273;&#7883;nh x&#7917; ph&#7841;t
&#273;&atilde; &#273;&#432;&#7907;c ni&ecirc;m y&#7871;t t&#7841;i n&#417;i
c&#432; tr&uacute; c&#7911;a c&aacute; nh&acirc;n, tr&#7909; s&#7903; c&#7911;a
t&#7893; ch&#7913;c b&#7883; x&#7917; ph&#7841;t ho&#7863;c c&oacute; c&#259;n
c&#7913; cho r&#7857;ng ng&#432;&#7901;i vi ph&#7841;m tr&#7889;n tr&aacute;nh
kh&ocirc;ng nh&#7853;n quy&#7871;t &#273;&#7883;nh x&#7917; ph&#7841;t
th&igrave; &#273;&#432;&#7907;c coi l&agrave; quy&#7871;t &#273;&#7883;nh
&#273;&atilde; &#273;&#432;&#7907;c giao.</span></p>

<p class=MsoNormal style='margin-top:2.0pt;text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>Tr&#432;&#7901;ng h&#7907;p c&#417; quan thu&#7871; g&#7917;i
quy&#7871;t &#273;&#7883;nh x&#7917; ph&#7841;t qua &#273;&#432;&#7901;ng
b&#432;u ch&iacute;nh th&igrave; gi&#7845;y b&aacute;o ph&aacute;t c&#7911;a
b&ecirc;n b&#432;u ch&iacute;nh (x&aacute;c nh&#7853;n &#273;&atilde; giao quy&#7871;t
&#273;&#7883;nh x&#7917; ph&#7841;t cho t&#7893; ch&#7913;c, c&aacute;
nh&acirc;n b&#7883; x&#7917; ph&#7841;t) &#273;&#432;&#7907;c l&#432;u
v&agrave;o h&#7891; s&#417; x&#7917; ph&#7841;t.</span></p>

<h2><a name="dieu_40"></a><a name="_Toc114664920"></a><b style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>1. Th&#7901;i hi&#7879;u thi h&agrave;nh quy&#7871;t
&#273;&#7883;nh x&#7917; ph&#7841;t vi ph&#7841;m h&agrave;nh ch&iacute;nh v&#7873;
thu&#7871;, h&oacute;a &#273;&#417;n l&agrave; 01 n&#259;m, k&#7875; t&#7915;
ng&agrave;y ra quy&#7871;t &#273;&#7883;nh x&#7917; ph&#7841;t. Qu&aacute; th&#7901;i
hi&#7879;u thi h&agrave;nh n&ecirc;u tr&ecirc;n m&agrave; c&#417; quan thu&#7871;
ch&#432;a th&#7921;c hi&#7879;n giao, g&#7917;i quy&#7871;t &#273;&#7883;nh x&#7917;
ph&#7841;t vi ph&#7841;m h&agrave;nh ch&iacute;nh cho t&#7893; ch&#7913;c,
c&aacute; nh&acirc;n vi ph&#7841;m theo quy &#273;&#7883;nh t&#7841;i &#272;i&#7873;u
39 Ngh&#7883; &#273;&#7883;nh n&agrave;y th&igrave; kh&ocirc;ng thi h&agrave;nh
quy&#7871;t &#273;&#7883;nh x&#7917; ph&#7841;t.</span></p>

<p class=MsoNormal style='margin-top:2.0pt;text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>Tr&#432;&#7901;ng h&#7907;p quy&#7871;t &#273;&#7883;nh
x&#7917; ph&#7841;t c&oacute; &aacute;p d&#7909;ng bi&#7879;n ph&aacute;p kh&#7855;c
ph&#7909;c h&#7853;u qu&#7843; th&igrave; v&#7851;n &aacute;p d&#7909;ng bi&#7879;n
ph&aacute;p kh&#7855;c ph&#7909;c h&#7853;u qu&#7843;.</span></p>

<p class=MsoNormal style='margin-top:2.0pt;text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>2. Tr&#432;&#7901;ng h&#7907;p c&aacute; nh&acirc;n, t&#7893;
ch&#7913;c b&#7883; x&#7917; ph&#7841;t c&#7889; t&igrave;nh tr&#7889;n
tr&aacute;nh, tr&igrave; ho&atilde;n th&igrave; th&#7901;i hi&#7879;u thi
h&agrave;nh quy&#7871;t &#273;&#7883;nh x&#7917; ph&#7841;t &#273;&#432;&#7907;c
t&iacute;nh k&#7875; t&#7915; th&#7901;i &#273;i&#7875;m ch&#7845;m d&#7913;t
h&agrave;nh vi tr&#7889;n tr&aacute;nh, tr&igrave; ho&atilde;n.</span></p>

<p class=MsoNormal style='margin-top:2.0pt;text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>3. Tr&#432;&#7901;ng h&#7907;p c&#417; quan thu&#7871;
&#273;&atilde; giao, g&#7917;i quy&#7871;t &#273;&#7883;nh x&#7917; ph&#7841;t
vi ph&#7841;m h&agrave;nh ch&iacute;nh cho t&#7893; ch&#7913;c, c&aacute;
nh&acirc;n vi ph&#7841;m theo quy &#273;&#7883;nh t&#7841;i &#272;i&#7873;u 39
Ngh&#7883; &#273;&#7883;nh n&agrave;y nh&#432;ng c&aacute; nh&acirc;n, t&#7893;
ch&#7913;c b&#7883; x&#7917; ph&#7841;t ch&#432;a n&#7897;p ho&#7863;c
ch&#432;a n&#7897;p &#273;&#7911; ti&#7873;n ph&#7841;t, ti&#7873;n thu&#7871;
truy thu, ti&#7873;n ch&#7853;m n&#7897;p th&igrave; c&#417; quan thu&#7871; ph&#7843;i
theo d&otilde;i c&aacute;c kho&#7843;n ti&#7873;n ch&#432;a n&#7897;p
tr&ecirc;n h&#7879; th&#7889;ng qu&#7843;n l&yacute; thu&#7871; v&agrave;
&aacute;p d&#7909;ng c&aacute;c bi&#7879;n ph&aacute;p c&#432;&#7905;ng ch&#7871;
n&#7907; thu&#7871; theo quy &#273;&#7883;nh &#273;&#7875; thu &#273;&#7911; s&#7889;
ti&#7873;n ph&#7843;i n&#7897;p v&agrave;o ng&acirc;n s&aacute;ch nh&agrave;
n&#432;&#7899;c.</span></p>

<h2><a name="dieu_41"></a><a name="_Toc114664921"></a><b style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>1. Tr&#432;&#7901;ng h&#7907;p ng&#432;&#7901;i b&#7883;
x&#7917; ph&#7841;t &#273;&atilde; ch&#7871;t, m&#7845;t t&iacute;ch; t&#7893;
ch&#7913;c b&#7883; x&#7917; ph&#7841;t gi&#7843;i th&#7875;, ph&aacute; s&#7843;n
th&igrave; kh&ocirc;ng thi h&agrave;nh n&#7897;i dung ph&#7841;t ti&#7873;n t&#7841;i
quy&#7871;t &#273;&#7883;nh x&#7917; ph&#7841;t nh&#432;ng v&#7851;n &aacute;p
d&#7909;ng bi&#7879;n ph&aacute;p kh&#7855;c ph&#7909;c h&#7853;u qu&#7843;
&#273;&#432;&#7907;c ghi trong quy&#7871;t &#273;&#7883;nh.</span></p>

<p class=MsoNormal style='margin-top:2.0pt;text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>Ng&#432;&#7901;i &#273;&atilde; ra quy&#7871;t &#273;&#7883;nh
x&#7917; ph&#7841;t ph&#7843;i ra quy&#7871;t &#273;&#7883;nh thi h&agrave;nh m&#7897;t
ph&#7847;n quy&#7871;t &#273;&#7883;nh x&#7917; ph&#7841;t vi ph&#7841;m
h&agrave;nh ch&iacute;nh trong th&#7901;i h&#7841;n 60 ng&agrave;y, k&#7875; t&#7915;
ng&agrave;y nh&#7853;n &#273;&#432;&#7907;c th&ocirc;ng b&aacute;o ng&#432;&#7901;i
b&#7883; x&#7917; ph&#7841;t ch&#7871;t, m&#7845;t t&iacute;ch; t&#7893; ch&#7913;c
b&#7883; x&#7917; ph&#7841;t gi&#7843;i th&#7875;, ph&aacute; s&#7843;n.</span></p>

<p class=MsoNormal style='margin-top:2.0pt;text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>Tr&#432;&#7901;ng h&#7907;p quy&#7871;t &#273;&#7883;nh
x&#7917; ph&#7841;t kh&ocirc;ng c&oacute; n&#7897;i dung &aacute;p d&#7909;ng
bi&#7879;n ph&aacute;p kh&#7855;c ph&#7909;c h&#7853;u qu&#7843; th&igrave;
ng&#432;&#7901;i c&oacute; th&#7849;m quy&#7873;n x&#7917; ph&#7841;t ra quy&#7871;t
&#273;&#7883;nh &#273;&igrave;nh ch&#7881; thi h&agrave;nh quy&#7871;t &#273;&#7883;nh
x&#7917; ph&#7841;t.</span></p>

<p class=MsoNormal style='margin-top:2.0pt;text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>2. C&#259;n c&#7913; x&aacute;c &#273;&#7883;nh
c&aacute; nh&acirc;n ch&#7871;t, m&#7845;t t&iacute;ch; t&#7893; ch&#7913;c b&#7883;
gi&#7843;i th&#7875;, ph&aacute; s&#7843;n:</span></p>

<p class=MsoNormal style='margin-top:2.0pt;text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>a) Gi&#7845;y ch&#7913;ng t&#7917; ho&#7863;c gi&#7845;y
b&aacute;o t&#7917; ho&#7863;c c&aacute;c gi&#7845;y t&#7901; thay cho gi&#7845;y
b&aacute;o t&#7917; theo quy &#273;&#7883;nh c&#7911;a ph&aacute;p lu&#7853;t v&#7873;
h&#7897; t&#7883;ch ho&#7863;c quy&#7871;t &#273;&#7883;nh c&#7911;a t&ograve;a
&aacute;n tuy&ecirc;n b&#7889; m&#7897;t ng&#432;&#7901;i l&agrave;
&#273;&atilde; ch&#7871;t, m&#7845;t t&iacute;ch (b&#7843;n ch&iacute;nh ho&#7863;c
b&#7843;n sao theo quy &#273;&#7883;nh) &#273;&#7889;i v&#7899;i tr&#432;&#7901;ng
h&#7907;p c&aacute; nh&acirc;n ch&#7871;t, m&#7845;t t&iacute;ch;</span></p>

<p class=MsoNormal style='margin-top:2.0pt;text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>b) Th&ocirc;ng b&aacute;o v&#7873; vi&#7879;c doanh
nghi&#7879;p, h&#7907;p t&aacute;c x&atilde; gi&#7843;i th&#7875; c&#7911;a
c&#417; quan &#273;&#259;ng k&yacute; kinh doanh, c&#417; quan &#273;&#259;ng
k&yacute; h&#7907;p t&aacute;c x&atilde; &#273;&#7889;i v&#7899;i tr&#432;&#7901;ng
h&#7907;p doanh nghi&#7879;p, h&#7907;p t&aacute;c x&atilde; b&#7883; gi&#7843;i
th&#7875;; th&ocirc;ng b&aacute;o ch&#7845;m d&#7913;t m&atilde; s&#7889; thu&#7871;
c&#7911;a c&#417; quan thu&#7871; &#273;&#7889;i v&#7899;i tr&#432;&#7901;ng h&#7907;p
t&#7893; ch&#7913;c b&#7883; gi&#7843;i th&#7875; kh&ocirc;ng ph&#7843;i
l&agrave; doanh nghi&#7879;p, h&#7907;p t&aacute;c x&atilde; (b&#7843;n
ch&iacute;nh ho&#7863;c b&#7843;n sao theo quy &#273;&#7883;nh);</span></p>

<p class=MsoNormal style='margin-top:2.0pt;text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>c) Quy&#7871;t &#273;&#7883;nh tuy&ecirc;n b&#7889;
ph&aacute; s&#7843;n &#273;&#7889;i v&#7899;i doanh nghi&#7879;p, h&#7907;p
t&aacute;c x&atilde; b&#7883; ph&aacute; s&#7843;n (b&#7843;n ch&iacute;nh ho&#7863;c
b&#7843;n sao theo quy &#273;&#7883;nh).</span></p>

<p class=MsoNormal style='margin-top:2.0pt;text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>3. Quy&#7871;t &#273;&#7883;nh thi h&agrave;nh m&#7897;t
ph&#7847;n quy&#7871;t &#273;&#7883;nh x&#7917; ph&#7841;t g&#7891;m n&#7897;i
dung sau: &#273;&igrave;nh ch&#7881; thi h&agrave;nh h&igrave;nh th&#7913;c ph&#7841;t
ti&#7873;n, l&yacute; do &#273;&igrave;nh ch&#7881;; n&#7897;i dung quy&#7871;t
&#273;&#7883;nh x&#7917; ph&#7841;t ti&#7871;p t&#7909;c ph&#7843;i thi
h&agrave;nh, t&ecirc;n t&#7893; ch&#7913;c, c&aacute; nh&acirc;n c&oacute;
tr&aacute;ch nhi&#7879;m ti&#7871;p t&#7909;c thi h&agrave;nh; th&#7901;i h&#7841;n
thi h&agrave;nh.</span></p>

<p class=MsoNormal style='margin-top:2.0pt;text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>4. Vi&#7879;c k&#7871; th&#7915;a ngh&#297;a v&#7909;
th&#7921;c hi&#7879;n bi&#7879;n ph&aacute;p kh&#7855;c ph&#7909;c h&#7853;u qu&#7843;
c&#7911;a c&aacute; nh&acirc;n &#273;&atilde; ch&#7871;t, m&#7845;t
t&iacute;ch, t&#7893; ch&#7913;c b&#7883; x&#7917; ph&#7841;t gi&#7843;i th&#7875;,
ph&aacute; s&#7843;n</span></p>

<p class=MsoNormal style='margin-top:2.0pt;text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>a) Nh&#7919;ng ng&#432;&#7901;i nh&#7853;n th&#7915;a
k&#7871; c&oacute; tr&aacute;ch nhi&#7879;m thi h&agrave;nh ph&#7847;n
c&ograve;n l&#7841;i c&#7911;a quy&#7871;t &#273;&#7883;nh x&#7917; ph&#7841;t
v&#7873; bi&#7879;n ph&aacute;p kh&#7855;c ph&#7909;c h&#7853;u qu&#7843; trong
ph&#7841;m vi di s&#7843;n do ng&#432;&#7901;i ch&#7871;t &#273;&#7875; l&#7841;i.</span></p>

<p class=MsoNormal style='margin-top:2.0pt;text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>Tr&#432;&#7901;ng h&#7907;p di s&#7843;n th&#7915;a k&#7871;
ch&#432;a &#273;&#432;&#7907;c chia th&igrave; vi&#7879;c ti&#7871;p t&#7909;c
thi h&agrave;nh ph&#7847;n c&ograve;n l&#7841;i c&#7911;a quy&#7871;t &#273;&#7883;nh
x&#7917; ph&#7841;t v&#7873; bi&#7879;n ph&aacute;p kh&#7855;c ph&#7909;c h&#7853;u
qu&#7843; do ng&#432;&#7901;i ch&#7871;t &#273;&#7875; l&#7841;i &#273;&#432;&#7907;c
ng&#432;&#7901;i qu&#7843;n l&yacute; di s&#7843;n th&#7921;c hi&#7879;n.</span></p>

<p class=MsoNormal style='margin-top:2.0pt;text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>Tr&#432;&#7901;ng h&#7907;p di s&#7843;n
&#273;&atilde; &#273;&#432;&#7907;c chia th&igrave; m&#7895;i ng&#432;&#7901;i
th&#7915;a k&#7871; thi h&agrave;nh ph&#7847;n c&ograve;n l&#7841;i c&#7911;a
quy&#7871;t &#273;&#7883;nh x&#7917; ph&#7841;t v&#7873; bi&#7879;n ph&aacute;p
kh&#7855;c ph&#7909;c h&#7853;u qu&#7843; do ng&#432;&#7901;i ch&#7871;t &#273;&#7875;
l&#7841;i t&#432;&#417;ng &#7913;ng nh&#432;ng kh&ocirc;ng v&#432;&#7907;t
qu&aacute; ph&#7847;n t&agrave;i s&#7843;n m&agrave; m&igrave;nh &#273;&atilde;
nh&#7853;n, tr&#7915; tr&#432;&#7901;ng h&#7907;p c&oacute; th&#7887;a thu&#7853;n
kh&aacute;c.</span></p>

<p class=MsoNormal style='margin-top:2.0pt;text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>Tr&#432;&#7901;ng h&#7907;p Nh&agrave; n&#432;&#7899;c,
c&#417; quan, t&#7893; ch&#7913;c nh&#7853;n di s&#7843;n theo di ch&uacute;c
th&igrave; c&oacute; tr&aacute;ch nhi&#7879;m thi h&agrave;nh ph&#7847;n
c&ograve;n l&#7841;i c&#7911;a quy&#7871;t &#273;&#7883;nh x&#7917; ph&#7841;t
v&#7873; bi&#7879;n ph&aacute;p kh&#7855;c ph&#7909;c h&#7853;u qu&#7843; do
ng&#432;&#7901;i ch&#7871;t &#273;&#7875; l&#7841;i nh&#432; ng&#432;&#7901;i
th&#7915;a k&#7871; l&agrave; c&aacute; nh&acirc;n.</span></p>

<p class=MsoNormal style='margin-top:2.0pt;text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>Tr&#432;&#7901;ng h&#7907;p kh&ocirc;ng c&oacute;
ng&#432;&#7901;i th&#7915;a k&#7871; theo di ch&uacute;c ho&#7863;c theo
ph&aacute;p lu&#7853;t ho&#7863;c c&oacute; nh&#432;ng t&#7915; ch&#7889;i nh&#7853;n
di s&#7843;n th&#7915;a k&#7871; th&igrave; th&#7921;c hi&#7879;n theo quy
&#273;&#7883;nh c&#7911;a ph&aacute;p lu&#7853;t d&acirc;n s&#7921;.</span></p>

<p class=MsoNormal style='margin-top:2.0pt;text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>b) Ng&#432;&#7901;i &#273;&#432;&#7907;c T&ograve;a
&aacute;n giao qu&#7843;n l&yacute; t&agrave;i s&#7843;n c&#7911;a ng&#432;&#7901;i
b&#7883; tuy&ecirc;n b&#7889; m&#7845;t t&iacute;ch c&oacute; tr&aacute;ch nhi&#7879;m
thi h&agrave;nh ph&#7847;n c&ograve;n l&#7841;i c&#7911;a quy&#7871;t &#273;&#7883;nh
x&#7917; ph&#7841;t (bi&#7879;n ph&aacute;p kh&#7855;c ph&#7909;c h&#7853;u qu&#7843;)
trong ph&#7841;m vi t&agrave;i s&#7843;n &#273;&#432;&#7907;c giao qu&#7843;n
l&yacute; thay cho ng&#432;&#7901;i m&#7845;t t&iacute;ch.</span></p>

<p class=MsoNormal style='margin-top:2.0pt;text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>c) T&#7893; ch&#7913;c b&#7883; gi&#7843;i th&#7875;
l&agrave; &#273;&#417;n v&#7883; ph&#7909; thu&#7897;c, &#273;&#7883;a &#273;i&#7875;m
kinh doanh c&#7911;a doanh nghi&#7879;p ho&#7863;c gi&#7843;i th&#7875; do t&#7893;
ch&#7913;c l&#7841;i doanh nghi&#7879;p, h&#7907;p t&aacute;c x&atilde;, t&#7893;
ch&#7913;c kh&aacute;c ho&#7863;c gi&#7843;i th&#7875; chi nh&aacute;nh,
v&#259;n ph&ograve;ng &#273;&#7841;i di&#7879;n c&#7911;a th&#432;&#417;ng
nh&acirc;n n&#432;&#7899;c ngo&agrave;i, v&#259;n ph&ograve;ng &#273;i&#7873;u
h&agrave;nh c&#7911;a nh&agrave; th&#7847;u n&#432;&#7899;c ngo&agrave;i t&#7841;i
Vi&#7879;t Nam th&igrave; t&#7893; ch&#7913;c b&#7883; gi&#7843;i th&#7875;
kh&ocirc;ng &#273;&#432;&#7907;c mi&#7877;n thi h&agrave;nh h&igrave;nh th&#7913;c
ph&#7841;t ti&#7873;n t&#7841;i quy&#7871;t &#273;&#7883;nh x&#7917; ph&#7841;t.</span></p>

<h2><a name="dieu_42"></a><a name="_Toc114664922"></a><b
style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>1. T&iacute;nh ti&#7873;n ch&#7853;m n&#7897;p ti&#7873;n
ph&#7841;t</span></p>

<p class=MsoNormal style='margin-top:2.0pt;text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>a) T&#7893; ch&#7913;c, c&aacute; nh&acirc;n ch&#7853;m
n&#7897;p ti&#7873;n ph&#7841;t vi ph&#7841;m h&agrave;nh ch&iacute;nh v&#7873;
thu&#7871;, h&oacute;a &#273;&#417;n th&igrave; b&#7883; t&iacute;nh ti&#7873;n
ch&#7853;m n&#7897;p ti&#7873;n ph&#7841;t theo m&#7913;c 0,05%/ng&agrave;y
t&iacute;nh tr&ecirc;n s&#7889; ti&#7873;n ph&#7841;t ch&#7853;m n&#7897;p.</span></p>

<p class=MsoNormal style='margin-top:2.0pt;text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>b) S&#7889; ng&agrave;y ch&#7853;m n&#7897;p ti&#7873;n
ph&#7841;t bao g&#7891;m c&#7843; ng&agrave;y l&#7877;, ng&agrave;y ngh&#7881;
theo ch&#7871; &#273;&#7897; quy &#273;&#7883;nh v&agrave; &#273;&#432;&#7907;c
t&iacute;nh t&#7915; ng&agrave;y k&#7871; ti&#7871;p ng&agrave;y h&#7871;t th&#7901;i
h&#7841;n n&#7897;p ti&#7873;n ph&#7841;t &#273;&#7871;n ng&agrave;y li&#7873;n
k&#7873; tr&#432;&#7899;c ng&agrave;y t&#7893; ch&#7913;c, c&aacute; nh&acirc;n
n&#7897;p ti&#7873;n ph&#7841;t v&agrave;o ng&acirc;n s&aacute;ch nh&agrave;
n&#432;&#7899;c.</span></p>

<p class=MsoNormal style='margin-top:2.0pt;text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>2. Kh&ocirc;ng t&iacute;nh ti&#7873;n ch&#7853;m n&#7897;p
ti&#7873;n ph&#7841;t trong c&aacute;c tr&#432;&#7901;ng h&#7907;p sau:</span></p>

<p class=MsoNormal style='margin-top:2.0pt;text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>a) Trong th&#7901;i gian &#273;&#432;&#7907;c
ho&atilde;n thi h&agrave;nh quy&#7871;t &#273;&#7883;nh ph&#7841;t ti&#7873;n;</span></p>

<p class=MsoNormal style='margin-top:2.0pt;text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>b) Trong th&#7901;i gian xem x&eacute;t, quy&#7871;t
&#273;&#7883;nh mi&#7877;n ti&#7873;n ph&#7841;t;</span></p>

<p class=MsoNormal><span style='font-size:14.0pt;background:yellow; </span><span style='background:yellow;-CP
s&#7917;a:</span><span lang=VI style='font-size:14.0pt;background:yellow;
b) Trong th&#7901;i gian xem x&eacute;t, quy&#7871;t &#273;&#7883;nh
gi&#7843;m, mi&#7877;n ti&#7873;n ph&#7841;t;&#8221;</span></p>

<p class=MsoNormal style='margin-top:2.0pt;text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>c) S&#7889; ti&#7873;n ph&#7841;t ch&#432;a &#273;&#7871;n
h&#7841;n n&#7897;p trong tr&#432;&#7901;ng h&#7907;p &#273;&#432;&#7907;c n&#7897;p
ti&#7873;n ph&#7841;t nhi&#7873;u l&#7847;n.</span></p>

<p class=MsoNormal style='margin-top:2.0pt;text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>3. Tr&#432;&#7901;ng h&#7907;p t&#7893; ch&#7913;c,
c&aacute; nh&acirc;n kh&ocirc;ng t&#7921; gi&aacute;c n&#7897;p ti&#7873;n ph&#7841;t,
ti&#7873;n ch&#7853;m n&#7897;p ti&#7873;n ph&#7841;t v&agrave;o ng&acirc;n
s&aacute;ch nh&agrave; n&#432;&#7899;c th&igrave; c&#417; quan thu&#7871; qu&#7843;n
l&yacute; tr&#7921;c ti&#7871;p t&#7893; ch&#7913;c, c&aacute; nh&acirc;n
&#273;&oacute; c&oacute; tr&aacute;ch nhi&#7879;m th&ocirc;ng b&aacute;o,
&#273;&ocirc;n &#273;&#7889;c t&#7893; ch&#7913;c, c&aacute; nh&acirc;n n&#7897;p
ti&#7873;n ph&#7841;t, ti&#7873;n ch&#7853;m n&#7897;p ti&#7873;n ph&#7841;t
theo quy &#273;&#7883;nh.</span></p>

<h2><a name="dieu_43"></a><a name="_Toc114664923"></a><b style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>1. Ng&#432;&#7901;i n&#7897;p thu&#7871; b&#7883; x&#7917;
ph&#7841;t vi ph&#7841;m h&agrave;nh ch&iacute;nh v&#7873; thu&#7871;,
h&oacute;a &#273;&#417;n b&#7883; thi&#7879;t h&#7841;i v&#7873; v&#7853;t ch&#7845;t
trong tr&#432;&#7901;ng h&#7907;p b&#7845;t kh&#7843; kh&aacute;ng quy &#273;&#7883;nh
t&#7841;i <a name="dc_8">kho&#7843;n 27 &#272;i&#7873;u 3 c&#7911;a Lu&#7853;t
Qu&#7843;n l&yacute; thu&#7871;</a> &#273;&#432;&#7907;c mi&#7877;n ti&#7873;n
ph&#7841;t.</span></p>

<p class=MsoNormal style='margin-top:2.0pt;text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>2. M&#7913;c mi&#7877;n ti&#7873;n ph&#7841;t t&#7889;i
&#273;a b&#7857;ng s&#7889; ti&#7873;n ph&#7841;t c&ograve;n l&#7841;i trong
quy&#7871;t &#273;&#7883;nh x&#7917; ph&#7841;t v&agrave; kh&ocirc;ng
qu&aacute; gi&aacute; tr&#7883; t&agrave;i s&#7843;n, h&agrave;ng h&oacute;a b&#7883;
thi&#7879;t h&#7841;i, sau khi tr&#7915; &#273;i gi&aacute; tr&#7883;
&#273;&#432;&#7907;c b&#7843;o hi&#7875;m, b&#7891;i th&#432;&#7901;ng (n&#7871;u
c&oacute;).</span></p>

<p class=MsoNormal style='margin-top:2.0pt;text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>3. H&#7891; s&#417; &#273;&#7873; ngh&#7883; mi&#7877;n
ti&#7873;n ph&#7841;t vi ph&#7841;m h&agrave;nh ch&iacute;nh v&#7873; thu&#7871;,
h&oacute;a &#273;&#417;n bao g&#7891;m:</span></p>

<p class=MsoNormal style='margin-top:2.0pt;text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>a) &#272;&#417;n &#273;&#7873; ngh&#7883; mi&#7877;n
ti&#7873;n ph&#7841;t, trong &#273;&oacute; n&ecirc;u r&otilde; l&yacute; do
&#273;&#7873; ngh&#7883; mi&#7877;n ti&#7873;n ph&#7841;t; x&aacute;c &#273;&#7883;nh
gi&aacute; tr&#7883; t&agrave;i s&#7843;n, h&agrave;ng h&oacute;a b&#7883; thi&#7879;t
h&#7841;i; s&#7889; ti&#7873;n ph&#7841;t, s&#7889; ti&#7873;n ch&#7853;m n&#7897;p
ti&#7873;n ph&#7841;t (n&#7871;u c&oacute;) &#273;&#7873; ngh&#7883;
&#273;&#432;&#7907;c mi&#7877;n;</span></p>

<p class=MsoNormal style='margin-top:2.0pt;text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>b) V&#259;n b&#7843;n &#273;&#7873; ngh&#7883; mi&#7877;n
ti&#7873;n ph&#7841;t c&#7911;a ng&#432;&#7901;i c&oacute; th&#7849;m quy&#7873;n
&#273;&atilde; ra quy&#7871;t &#273;&#7883;nh x&#7917; ph&#7841;t ho&#7863;c
c&#417; quan c&#7911;a ng&#432;&#7901;i c&oacute; th&#7849;m quy&#7873;n
&#273;&atilde; ra quy&#7871;t &#273;&#7883;nh x&#7917; ph&#7841;t, trong
&#273;&oacute; n&ecirc;u r&otilde; l&yacute; do &#273;&#7873; ngh&#7883; mi&#7877;n
ti&#7873;n ph&#7841;t; s&#7889; ti&#7873;n ph&#7841;t, ti&#7873;n ch&#7853;m n&#7897;p
ti&#7873;n ph&#7841;t (n&#7871;u c&oacute;) &#273;&#7873; ngh&#7883; ng&#432;&#7901;i
c&oacute; th&#7849;m quy&#7873;n ra quy&#7871;t &#273;&#7883;nh mi&#7873;n ti&#7873;n
ph&#7841;t;</span></p>

<p class=MsoNormal style='margin-top:2.0pt;text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>c) V&#259;n b&#7843;n x&aacute;c nh&#7853;n ng&#432;&#7901;i
n&#7897;p thu&#7871; b&#7883; thi&ecirc;n tai, th&#7843;m h&#7885;a, d&#7883;ch
b&#7879;nh, h&#7887;a ho&#7841;n, tai n&#7841;n b&#7845;t ng&#7901; ho&#7863;c
c&aacute;c tr&#432;&#7901;ng h&#7907;p b&#7845;t kh&#7843; kh&aacute;ng
kh&aacute;c theo quy &#273;&#7883;nh c&#7911;a Ch&iacute;nh ph&#7911; v&agrave;
th&#7901;i gian, &#273;&#7883;a &#273;i&#7875;m x&#7843;y ra s&#7921; ki&#7879;n
b&#7845;t kh&#7843; kh&aacute;ng c&#7911;a m&#7897;t trong c&aacute;c c&#417;
quan, t&#7893; ch&#7913;c sau: C&ocirc;ng an x&atilde;, ph&#432;&#7901;ng, th&#7883;
tr&#7845;n; &#7910;y ban nh&acirc;n d&acirc;n x&atilde;, ph&#432;&#7901;ng, th&#7883;
tr&#7845;n; Ban qu&#7843;n l&yacute; Khu c&ocirc;ng nghi&#7879;p, Khu ch&#7871;
xu&#7845;t, Khu kinh t&#7871; n&#417;i x&#7843;y ra s&#7921; ki&#7879;n b&#7845;t
kh&#7843; kh&aacute;ng; t&#7893; ch&#7913;c c&#7913;u h&#7897;, c&#7913;u n&#7841;n;
c&#417; quan c&oacute; th&#7849;m quy&#7873;n c&ocirc;ng b&#7889; d&#7883;ch b&#7879;nh
(b&#7843;n ch&iacute;nh ho&#7863;c b&#7843;n sao c&oacute; x&aacute;c nh&#7853;n
c&ocirc;ng ch&#7913;ng ho&#7863;c ch&#7913;ng th&#7921;c);</span></p>

<p class=MsoNormal style='margin-top:2.0pt;text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>d) Bi&ecirc;n b&#7843;n ki&#7875;m k&ecirc;,
x&aacute;c &#273;&#7883;nh gi&aacute; tr&#7883; thi&#7879;t h&#7841;i v&#7853;t
ch&#7845;t do ng&#432;&#7901;i n&#7897;p thu&#7871; ho&#7863;c ng&#432;&#7901;i
&#273;&#7841;i di&#7879;n h&#7907;p ph&aacute;p c&#7911;a ng&#432;&#7901;i n&#7897;p
thu&#7871; l&#7853;p;</span></p>

<p class=MsoNormal style='margin-top:2.0pt;text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>&#273;) Bi&ecirc;n b&#7843;n x&aacute;c &#273;&#7883;nh
gi&aacute; tr&#7883; thi&#7879;t h&#7841;i v&#7853;t ch&#7845;t c&#7911;a t&#7893;
ch&#7913;c c&oacute; ch&#7913;c n&#259;ng &#273;&#7883;nh gi&aacute; theo quy
&#273;&#7883;nh c&#7911;a ph&aacute;p lu&#7853;t (b&#7843;n ch&iacute;nh ho&#7863;c
b&#7843;n sao c&oacute; x&aacute;c nh&#7853;n c&ocirc;ng ch&#7913;ng ho&#7863;c
ch&#7913;ng th&#7921;c), tr&#7915; tr&#432;&#7901;ng h&#7907;p c&oacute; h&#7891;
s&#417; b&#7891;i th&#432;&#7901;ng quy &#273;&#7883;nh t&#7841;i &#273;i&#7875;m
g kho&#7843;n n&agrave;y;</span></p>

<p class=MsoNormal style='margin-top:2.0pt;text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>e) Quy&#7871;t &#273;&#7883;nh x&#7917; ph&#7841;t vi
ph&#7841;m h&agrave;nh ch&iacute;nh ho&#7863;c Th&ocirc;ng b&aacute;o c&#7911;a
c&#417; quan thu&#7871; v&#7873; s&#7889; ti&#7873;n ph&#7841;t c&ograve;n n&#7907;
t&#7841;i th&#7901;i &#273;i&#7875;m x&#7843;y ra s&#7921; ki&#7879;n b&#7845;t
kh&#7843; kh&aacute;ng v&agrave; t&#7841;i th&#7901;i &#273;i&#7875;m n&#7897;p
h&#7891; s&#417; &#273;&#7873; ngh&#7883; mi&#7877;n ti&#7873;n ph&#7841;t;</span></p>

<p class=MsoNormal style='margin-top:2.0pt;text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>g) H&#7891; s&#417; b&#7891;i th&#432;&#7901;ng thi&#7879;t
h&#7841;i v&#7853;t ch&#7845;t &#273;&#432;&#7907;c c&#417; quan b&#7843;o hi&#7875;m
ch&#7845;p nh&#7853;n b&#7891;i th&#432;&#7901;ng theo quy &#273;&#7883;nh c&#7911;a
ph&aacute;p lu&#7853;t (b&#7843;n ch&iacute;nh ho&#7863;c b&#7843;n sao
c&oacute; x&aacute;c nh&#7853;n c&ocirc;ng ch&#7913;ng ho&#7863;c ch&#7913;ng th&#7921;c)
(n&#7871;u c&oacute;);</span></p>

<p class=MsoNormal style='margin-top:2.0pt;text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>h) H&#7891; s&#417; tr&aacute;ch nhi&#7879;m b&#7891;i
th&#432;&#7901;ng c&#7911;a t&#7893; ch&#7913;c, c&aacute; nh&acirc;n ph&#7843;i
b&#7891;i th&#432;&#7901;ng theo quy &#273;&#7883;nh c&#7911;a ph&aacute;p lu&#7853;t
(b&#7843;n ch&iacute;nh ho&#7863;c b&#7843;n sao c&oacute; x&aacute;c nh&#7853;n
c&ocirc;ng ch&#7913;ng ho&#7863;c ch&#7913;ng th&#7921;c) (n&#7871;u
c&oacute;).</span></p>

<p class=MsoNormal style='margin-top:2.0pt;text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>4. Th&#7849;m quy&#7873;n mi&#7877;n ti&#7873;n ph&#7841;t</span></p>

<p class=MsoNormal style='margin-top:2.0pt;text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>a) Chi c&#7909;c tr&#432;&#7903;ng Chi c&#7909;c Thu&#7871;
trong ph&#7841;m vi &#273;&#7883;a b&agrave;n qu&#7843;n l&yacute; c&#7911;a
m&igrave;nh c&oacute; th&#7849;m quy&#7873;n mi&#7877;n ti&#7873;n ph&#7841;t
&#273;&#7889;i v&#7899;i c&aacute;c quy&#7871;t &#273;&#7883;nh x&#7917; ph&#7841;t
vi ph&#7841;m h&agrave;nh ch&iacute;nh do &#272;&#7897;i tr&#432;&#7903;ng
&#272;&#7897;i thu&#7871; ban h&agrave;nh;</span></p>

<p class=MsoNormal style='margin-top:2.0pt;text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>b) C&#7909;c tr&#432;&#7903;ng C&#7909;c Thu&#7871;
trong ph&#7841;m vi &#273;&#7883;a b&agrave;n qu&#7843;n l&yacute; c&#7911;a
m&igrave;nh c&oacute; th&#7849;m quy&#7873;n mi&#7877;n ti&#7873;n ph&#7841;t
&#273;&#7889;i v&#7899;i c&aacute;c quy&#7871;t &#273;&#7883;nh x&#7917; ph&#7841;t
vi ph&#7841;m h&agrave;nh ch&iacute;nh do Chi c&#7909;c tr&#432;&#7903;ng Chi c&#7909;c
Thu&#7871;, Tr&#432;&#7903;ng &#273;o&agrave;n thanh tra C&#7909;c Thu&#7871;
ban h&agrave;nh;</span></p>

<p class=MsoNormal style='margin-top:2.0pt;text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>c) T&#7893;ng c&#7909;c tr&#432;&#7903;ng T&#7893;ng c&#7909;c
Thu&#7871; c&oacute; th&#7849;m quy&#7873;n mi&#7877;n ti&#7873;n ph&#7841;t
&#273;&#7889;i v&#7899;i c&aacute;c quy&#7871;t &#273;&#7883;nh x&#7917; ph&#7841;t
vi ph&#7841;m h&agrave;nh ch&iacute;nh do C&#7909;c tr&#432;&#7903;ng C&#7909;c
thu&#7871;, Tr&#432;&#7903;ng &#273;o&agrave;n thanh tra T&#7893;ng c&#7909;c
Thu&#7871; ban h&agrave;nh;</span></p>

<p class=MsoNormal style='margin-top:2.0pt;text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>d) B&#7897; Tr&#432;&#7903;ng B&#7897; T&agrave;i
ch&iacute;nh c&oacute; th&#7849;m quy&#7873;n mi&#7877;n ti&#7873;n ph&#7841;t
&#273;&#7889;i v&#7899;i c&aacute;c quy&#7871;t &#273;&#7883;nh x&#7917; ph&#7841;t
vi ph&#7841;m h&agrave;nh ch&iacute;nh do T&#7893;ng c&#7909;c tr&#432;&#7903;ng
T&#7893;ng c&#7909;c Thu&#7871;, Ch&aacute;nh Thanh tra B&#7897; T&agrave;i
ch&iacute;nh ban h&agrave;nh;</span></p>

<p class=MsoNormal style='margin-top:2.0pt;text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>&#273;) Gi&aacute;m &#273;&#7889;c S&#7903; T&agrave;i
ch&iacute;nh c&oacute; th&#7849;m quy&#7873;n mi&#7877;n ti&#7873;n ph&#7841;t
&#273;&#7889;i v&#7899;i c&aacute;c quy&#7871;t &#273;&#7883;nh x&#7917; ph&#7841;t
vi ph&#7841;m h&agrave;nh ch&iacute;nh do Ch&aacute;nh Thanh tra S&#7903;
T&agrave;i ch&iacute;nh ban h&agrave;nh;</span></p>

<p class=MsoNormal style='margin-top:2.0pt;text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>e) Ch&aacute;nh Thanh tra B&#7897; T&agrave;i
ch&iacute;nh c&oacute; th&#7849;m quy&#7873;n mi&#7877;n ti&#7873;n ph&#7841;t
&#273;&#7889;i v&#7899;i c&aacute;c quy&#7871;t &#273;&#7883;nh x&#7917; ph&#7841;t
vi ph&#7841;m h&agrave;nh ch&iacute;nh do Tr&#432;&#7903;ng &#273;o&agrave;n
thanh tra B&#7897; T&agrave;i ch&iacute;nh ban h&agrave;nh;</span></p>

<p class=MsoNormal style='margin-top:2.0pt;text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>g) Ch&#7911; t&#7883;ch &#7910;y ban nh&acirc;n
d&acirc;n c&#7845;p t&#7881;nh c&oacute; th&#7849;m quy&#7873;n mi&#7877;n ti&#7873;n
ph&#7841;t &#273;&#7889;i v&#7899;i c&aacute;c quy&#7871;t &#273;&#7883;nh x&#7917;
ph&#7841;t vi ph&#7841;m h&agrave;nh ch&iacute;nh do Ch&#7911; t&#7883;ch &#7910;y
ban nh&acirc;n d&acirc;n c&#7845;p huy&#7879;n v&agrave; do m&igrave;nh ban
h&agrave;nh.</span></p>

<p class=MsoNormal style='margin-top:2.0pt;text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>5. Tr&igrave;nh t&#7921;, th&#7911; t&#7909;c mi&#7877;n
ti&#7873;n ph&#7841;t</span></p>

<p class=MsoNormal style='margin-top:2.0pt;text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>Ng&#432;&#7901;i n&#7897;p thu&#7871; quy &#273;&#7883;nh
t&#7841;i kho&#7843;n 1 &#272;i&#7873;u n&agrave;y ph&#7843;i c&oacute;
&#273;&#417;n &#273;&#7873; ngh&#7883; mi&#7877;n ph&#7847;n c&ograve;n l&#7841;i
ho&#7863;c to&agrave;n b&#7897; ti&#7873;n ph&#7841;t v&agrave; h&#7891;
s&#417; k&egrave;m theo g&#7917;i ng&#432;&#7901;i/c&#417; quan &#273;&atilde;
ra quy&#7871;t &#273;&#7883;nh x&#7917; ph&#7841;t.</span></p>

<p class=MsoNormal style='margin-top:2.0pt;text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>Trong th&#7901;i h&#7841;n 03 ng&agrave;y l&agrave;m
vi&#7879;c, k&#7875; t&#7915; ng&agrave;y nh&#7853;n &#273;&#432;&#7907;c
&#273;&#417;n &#273;&#7873; ngh&#7883; mi&#7877;n ti&#7873;n ph&#7841;t,
ng&#432;&#7901;i &#273;&atilde; ra quy&#7871;t &#273;&#7883;nh x&#7917; ph&#7841;t
vi ph&#7841;m h&agrave;nh ch&iacute;nh ph&#7843;i chuy&#7875;n &#273;&#417;n
k&egrave;m theo h&#7891; s&#417; v&#7909; vi&#7879;c &#273;&#7871;n ng&#432;&#7901;i
c&oacute; th&#7849;m quy&#7873;n &#273;&#7883;nh mi&#7877;n ti&#7873;n ph&#7841;t
v&agrave; th&ocirc;ng b&aacute;o cho ng&#432;&#7901;i &#273;&#7873; ngh&#7883;
mi&#7877;n ti&#7873;n ph&#7841;t bi&#7871;t.</span></p>

<p class=MsoNormal style='margin-top:2.0pt;text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>Trong th&#7901;i h&#7841;n 30 ng&agrave;y, k&#7875; t&#7915;
ng&agrave;y nh&#7853;n &#273;&#432;&#7907;c &#273;&#417;n v&agrave; h&#7891;
s&#417; &#273;&#7873; ngh&#7883; mi&#7877;n ti&#7873;n ph&#7841;t, ng&#432;&#7901;i
c&oacute; th&#7849;m quy&#7873;n mi&#7877;n ti&#7873;n ph&#7841;t ph&#7843;i
ban h&agrave;nh Quy&#7871;t &#273;&#7883;nh mi&#7877;n ti&#7873;n ph&#7841;t ho&#7863;c
Th&ocirc;ng b&aacute;o kh&ocirc;ng &#273;&#432;&#7907;c mi&#7877;n ti&#7873;n
ph&#7841;t v&agrave; g&#7917;i cho ng&#432;&#7901;i c&oacute; &#273;&#417;n
&#273;&#7873; ngh&#7883; mi&#7877;n ti&#7873;n ph&#7841;t, ng&#432;&#7901;i
&#273;&atilde; ra quy&#7871;t &#273;&#7883;nh x&#7917; ph&#7841;t. Tr&#432;&#7901;ng
h&#7907;p ng&#432;&#7901;i c&oacute; th&#7849;m quy&#7873;n mi&#7877;n ti&#7873;n
ph&#7841;t kh&ocirc;ng &#273;&#7891;ng &yacute; v&#7899;i vi&#7879;c mi&#7877;n
ti&#7873;n ph&#7841;t th&igrave; ph&#7843;i n&ecirc;u r&otilde; l&yacute; do.</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt;background:yellow; </span><span
style='background:yellow;-CP s&#7917;a:</span><span
lang=VI style='font-size:14.0pt;background:yellow;
c tr&#432;&#7901;ng h&#7907;p mi&#7877;n, gi&#7843;m ti&#7873;n ph&#7841;t
vi ph&#7841;m h&agrave;nh ch&iacute;nh v&#7873; thu&#7871;, h&oacute;a
&#273;&#417;n; th&#7849;m quy&#7873;n, tr&igrave;nh t&#7921;, th&#7911; t&#7909;c
mi&#7877;n, gi&#7843;m ti&#7873;n ph&#7841;t vi ph&#7841;m h&agrave;nh
ch&iacute;nh v&#7873; thu&#7871;, h&oacute;a &#273;&#417;n th&#7921;c hi&#7879;n
theo quy &#273;&#7883;nh t&#7841;i &#272;i&#7873;u 77 Lu&#7853;t X&#7917;
l&yacute; vi ph&#7841;m h&agrave;nh ch&iacute;nh v&agrave; kho&#7843;n 38
&#272;i&#7873;u 1 Lu&#7853;t s&#7917;a &#273;&#7893;i, b&#7893; sung m&#7897;t
s&#7889; &#273;i&#7873;u c&#7911;a Lu&#7853;t X&#7917; l&yacute; vi ph&#7841;m
h&agrave;nh ch&iacute;nh v&agrave; c&aacute;c kho&#7843;n 2, 3, 4, 5 &#272;i&#7873;u
n&agrave;y.</span><span style='font-size:14.0pt;background:yellow;text-align:justify;text-indent:1.0cm'><span
lang=VI style='font-size:14.0pt;background:yellow;
c
mi&#7877;n, gi&#7843;m ti&#7873;n ph&#7841;t t&#7889;i &#273;a b&#7857;ng s&#7889;
ti&#7873;n ph&#7841;t trong quy&#7871;t &#273;&#7883;nh x&#7917; ph&#7841;t
v&agrave; kh&ocirc;ng qu&aacute; gi&aacute; tr&#7883; t&agrave;i s&#7843;n,
h&agrave;ng h&oacute;a b&#7883; thi&#7879;t h&#7841;i, sau khi tr&#7915;
&#273;i gi&aacute; tr&#7883; &#273;&#432;&#7907;c b&#7843;o hi&#7875;m, b&#7891;i
th&#432;&#7901;ng (n&#7871;u c&oacute;).</span><span style='font-size:14.0pt;
background:yellow;text-align:justify;text-indent:1.0cm'><span
lang=VI style='font-size:14.0pt;background:yellow;
&#7901;i
n&#7897;p thu&#7871; b&#7883; thi&#7879;t h&#7841;i trong tr&#432;&#7901;ng h&#7907;p
b&#7845;t kh&#7843; kh&aacute;ng quy &#273;&#7883;nh t&#7841;i Lu&#7853;t Qu&#7843;n
l&yacute; thu&#7871; th&igrave; h&#7891; s&#417; ch&#7913;ng minh gi&aacute; tr&#7883;
t&agrave;i s&#7843;n, h&agrave;ng h&oacute;a b&#7883; thi&#7879;t h&#7841;i
v&agrave; gi&aacute; tr&#7883; &#273;&#432;&#7907;c b&#7843;o hi&#7875;m, b&#7891;i
th&#432;&#7901;ng nh&#432; sau:</span><span style='font-size:14.0pt;background:
yellow;text-align:justify;text-indent:1.0cm'><span
lang=VI style='font-size:14.0pt;background:yellow;
n b&#7843;n ki&#7875;m k&ecirc;, x&aacute;c &#273;&#7883;nh gi&aacute;
tr&#7883; thi&#7879;t h&#7841;i v&#7853;t ch&#7845;t do ng&#432;&#7901;i n&#7897;p
thu&#7871; ho&#7863;c ng&#432;&#7901;i &#273;&#7841;i di&#7879;n h&#7907;p
ph&aacute;p c&#7911;a ng&#432;&#7901;i n&#7897;p thu&#7871; l&#7853;p;</span><span
style='font-size:14.0pt;background:yellow;text-align:justify;text-indent:1.0cm'><span
lang=VI style='font-size:14.0pt;background:yellow;
n b&#7843;n x&aacute;c &#273;&#7883;nh gi&aacute; tr&#7883; thi&#7879;t
h&#7841;i v&#7853;t ch&#7845;t c&#7911;a t&#7893; ch&#7913;c c&oacute; ch&#7913;c
n&#259;ng &#273;&#7883;nh gi&aacute; theo quy &#273;&#7883;nh c&#7911;a
ph&aacute;p lu&#7853;t (b&#7843;n ch&iacute;nh ho&#7863;c b&#7843;n sao c&oacute;
x&aacute;c nh&#7853;n c&ocirc;ng ch&#7913;ng ho&#7863;c ch&#7913;ng th&#7921;c),
tr&#7915; tr&#432;&#7901;ng h&#7907;p c&oacute; h&#7891; s&#417; b&#7891;i
th&#432;&#7901;ng quy &#273;&#7883;nh t&#7841;i &#273;i&#7875;m c kho&#7843;n
n&agrave;y;</span><span style='font-size:14.0pt;background:yellow;text-align:justify;text-indent:1.0cm'><span
lang=VI style='font-size:14.0pt;background:yellow;

s&#417; b&#7891;i th&#432;&#7901;ng thi&#7879;t h&#7841;i v&#7853;t ch&#7845;t
&#273;&#432;&#7907;c c&#417; quan b&#7843;o hi&#7875;m ch&#7845;p nh&#7853;n b&#7891;i

<p class=MsoNormal style='margin-top:2.0pt;text-align:justify;text-indent:1.0cm'><span

<p class=MsoNormal style='margin-top:2.0pt;text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>7. Tr&#432;&#7901;ng h&#7907;p &#273;&#432;&#7907;c mi&#7877;n

<p class=MsoNormal style='margin-top:2.0pt;text-align:justify;text-indent:1.0cm'><span

th&igrave; ng&#432;&#7901;i c&oacute; th&#7849;m quy&#7873;n mi&#7877;n ti&#7873;n

ph&#7841;t &#273;&atilde; &#273;&#432;&#7907;c mi&#7877;n kh&ocirc;ng
&#273;&uacute;ng quy &#273;&#7883;nh v&agrave; t&iacute;nh ti&#7873;n ch&#7853;m
n&#7897;p tr&ecirc;n s&#7889; ti&#7873;n ph&#7841;t &#273;&#432;&#7907;c mi&#7877;n
kh&ocirc;ng &#273;&uacute;ng quy &#273;&#7883;nh theo quy &#273;&#7883;nh t&#7841;i
&#272;i&#7873;u 42 Ngh&#7883; &#273;&#7883;nh n&agrave;y. Ng&agrave;y b&#7855;t
&#273;&#7847;u t&iacute;nh ti&#7873;n ch&#7853;m n&#7897;p ti&#7873;n ph&#7841;t

ng&agrave;y t&#7893; ch&#7913;c, c&aacute; nh&acirc;n b&#7883; x&#7917; ph&#7841;t
n&#7897;p &#273;&#7847;y &#273;&#7911; h&#7891; s&#417; &#273;&#7873; ngh&#7883;
mi&#7877;n ti&#7873;n ph&#7841;t.</span></p>

<h2><a name="dieu_45"></a><a name="_Toc114664927"></a><b style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>1. &Aacute;p d&#7909;ng quy &#273;&#7883;nh t&#7841;i

Ch&iacute;nh ph&#7911; quy &#273;&#7883;nh v&#7873; x&#7917; ph&#7841;t vi ph&#7841;m
h&agrave;nh ch&iacute;nh v&#7873; thu&#7871; v&agrave; c&#432;&#7905;ng ch&#7871;
thi h&agrave;nh quy&#7871;t &#273;&#7883;nh h&agrave;nh ch&iacute;nh thu&#7871;;
Ngh&#7883; &#273;&#7883;nh s&#7889; 109/2013/N&#272;-CP ng&agrave;y 24
th&aacute;ng 9 n&#259;m 2013 c&#7911;a Ch&iacute;nh ph&#7911; quy &#273;&#7883;nh
x&#7917; ph&#7841;t vi ph&#7841;m h&agrave;nh ch&iacute;nh trong l&#297;nh v&#7921;c

&#273;&#417;n v&agrave; Ngh&#7883; &#273;&#7883;nh s&#7889; 49/2016/N&#272;-CP

&#273;&#7893;i, b&#7893; sung m&#7897;t s&#7889; &#273;i&#7873;u c&#7911;a Ngh&#7883;
&#273;&#7883;nh s&#7889; 109/2013/N&#272;-CP &#273;&#7889;i v&#7899;i
h&agrave;nh vi vi ph&#7841;m h&agrave;nh ch&iacute;nh v&#7873; thu&#7871;,
h&oacute;a &#273;&#417;n x&#7843;y ra t&#7915; ng&agrave;y 01 th&aacute;ng 7
n&#259;m 2020 &#273;&#7871;n tr&#432;&#7899;c ng&agrave;y Ngh&#7883; &#273;&#7883;nh
n&agrave;y c&oacute; hi&#7879;u l&#7921;c.</span></p>

<p class=MsoNormal style='margin-top:2.0pt;text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>Tr&#432;&#7901;ng h&#7907;p h&agrave;nh vi vi ph&#7841;m
h&agrave;nh ch&iacute;nh v&#7873; thu&#7871;, h&oacute;a &#273;&#417;n th&#7921;c
hi&#7879;n tr&#432;&#7899;c ng&agrave;y Ngh&#7883; &#273;&#7883;nh n&agrave;y

n&agrave;y c&oacute; hi&#7879;u l&#7921;c th&igrave; &aacute;p d&#7909;ng quy
&#273;&#7883;nh t&#7841;i v&#259;n b&#7843;n quy ph&#7841;m ph&aacute;p lu&#7853;t
v&#7873; x&#7917; ph&#7841;t vi ph&#7841;m h&agrave;nh ch&iacute;nh v&#7873;
thu&#7871;, h&oacute;a &#273;&#417;n c&oacute; hi&#7879;u l&#7921;c t&#7841;i
th&#7901;i &#273;i&#7875;m th&#7921;c hi&#7879;n h&agrave;nh vi vi ph&#7841;m
&#273;&oacute;.</span></p>

<p class=MsoNormal style='margin-top:2.0pt;text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>2. C&aacute;c quy &#273;&#7883;nh v&#7873; x&#7917; ph&#7841;t
t&#7841;i Ch&#432;&#417;ng I, II, III Ngh&#7883; &#273;&#7883;nh n&agrave;y,
quy &#273;&#7883;nh v&#7873; ho&atilde;n, mi&#7877;n thi h&agrave;nh quy&#7871;t
&#273;&#7883;nh x&#7917; ph&#7841;t c&oacute; l&#7907;i cho c&aacute;
nh&acirc;n, t&#7893; ch&#7913;c vi ph&#7841;m h&agrave;nh ch&iacute;nh v&#7873;
thu&#7871;, h&oacute;a &#273;&#417;n &#273;&#432;&#7907;c &aacute;p d&#7909;ng
&#273;&#7889;i v&#7899;i h&agrave;nh vi x&#7843;y ra tr&#432;&#7899;c
ng&agrave;y Ngh&#7883; &#273;&#7883;nh n&agrave;y c&oacute; hi&#7879;u l&#7921;c
thi h&agrave;nh m&agrave; sau &#273;&oacute; m&#7899;i b&#7883; ph&aacute;t hi&#7879;n
ho&#7863;c &#273;ang xem x&eacute;t, gi&#7843;i quy&#7871;t.</span></p>

<p class=MsoNormal style='margin-top:2.0pt;text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>3. &#272;&#7889;i v&#7899;i c&aacute;c h&agrave;nh vi
vi ph&#7841;m h&agrave;nh ch&iacute;nh v&#7873; thu&#7871;, h&oacute;a
&#273;&#417;n &#273;&atilde; b&#7883; x&#7917; ph&#7841;t tr&#432;&#7899;c
ng&agrave;y Ngh&#7883; &#273;&#7883;nh n&agrave;y c&oacute; hi&#7879;u l&#7921;c
m&agrave; c&aacute; nh&acirc;n, t&#7893; ch&#7913;c c&ograve;n khi&#7871;u n&#7841;i,
kh&#7903;i ki&#7879;n th&igrave; &#273;&#432;&#7907;c gi&#7843;i quy&#7871;t
theo quy &#273;&#7883;nh c&#7911;a ph&aacute;p lu&#7853;t x&#7917; ph&#7841;t
vi ph&#7841;m h&agrave;nh ch&iacute;nh v&#7873; thu&#7871; v&agrave; h&oacute;a
&#273;&#417;n v&agrave; c&aacute;c quy &#273;&#7883;nh ph&aacute;p lu&#7853;t
li&ecirc;n quan c&oacute; hi&#7879;u l&#7921;c t&#7841;i th&#7901;i &#273;i&#7875;m
th&#7921;c hi&#7879;n h&agrave;nh vi vi ph&#7841;m.</span></p>

<p class=MsoNormal style='margin-top:2.0pt;text-align:justify;text-indent:1.0cm'><a
name="dieu_46"><b><span style='font-size:14.0pt'>&#272;i&#7873;u 46. M&#7851;u
bi&ecirc;n b&#7843;n v&agrave; quy&#7871;t &#273;&#7883;nh s&#7917; d&#7909;ng
trong x&#7917; ph&#7841;t vi ph&#7841;m h&agrave;nh ch&iacute;nh v&#7873; thu&#7871;,
h&oacute;a &#273;&#417;n</span></b></a><span style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>Ban h&agrave;nh k&egrave;m theo Ngh&#7883; &#273;&#7883;nh
n&agrave;y Ph&#7909; l&#7909;c m&#7851;u bi&ecirc;n b&#7843;n v&agrave; m&#7851;u
quy&#7871;t &#273;&#7883;nh x&#7917; ph&#7841;t s&#7917; d&#7909;ng trong x&#7917;
ph&#7841;t vi ph&#7841;m h&agrave;nh ch&iacute;nh v&#7873; thu&#7871;,
h&oacute;a &#273;&#417;n. T&ugrave;y theo t&#7915;ng tr&#432;&#7901;ng h&#7907;p
c&#7909; th&#7875; m&agrave; c&oacute; th&#7875; b&#7893; sung th&ecirc;m
d&ograve;ng, ch&#7881; ti&ecirc;u &#273;&#7843;m b&#7843;o ph&#7843;n
&aacute;nh &#273;&#7911; c&aacute;c n&#7897;i dung h&agrave;nh vi vi ph&#7841;m
trong qu&aacute; tr&igrave;nh l&#7853;p bi&ecirc;n b&#7843;n v&agrave; ra quy&#7871;t
&#273;&#7883;nh x&#7917; ph&#7841;t nh&#432;ng b&#7843;o &#273;&#7843;m
ph&ugrave; h&#7907;p v&#7899;i quy &#273;&#7883;nh c&#7911;a ph&aacute;p lu&#7853;t.</span></p>

<p class=MsoNormal style='margin-top:2.0pt;text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>Trong tr&#432;&#7901;ng h&#7907;p c&#7847;n thi&#7871;t,
&#273;&#7875; &#273;&aacute;p &#7913;ng y&ecirc;u c&#7847;u c&#7911;a
c&ocirc;ng t&aacute;c qu&#7843;n l&yacute; nh&agrave; n&#432;&#7899;c, B&#7897;

h&agrave;nh m&#7851;u bi&ecirc;n b&#7843;n, quy&#7871;t &#273;&#7883;nh
v&agrave; c&aacute;c m&#7851;u bi&#7875;u c&#7847;n thi&#7871;t kh&aacute;c sau
khi th&#7889;ng nh&#7845;t v&#7899;i B&#7897; tr&#432;&#7903;ng B&#7897;
T&#432; ph&aacute;p.</span></p>
