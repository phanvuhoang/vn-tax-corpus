thu&#7871; c&ograve;n l&#7841;i sau khi tr&iacute;ch l&#7853;p c&aacute;c qu&#7929;
c&#7911;a doanh nghi&#7879;p do Nh&agrave; n&#432;&#7899;c n&#7855;m gi&#7919;
100% v&#7889;n &#273;i&#7873;u l&#7879;; c&#7893; t&#7913;c, l&#7907;i nhu&#7853;n
&#273;&#432;&#7907;c chia cho ph&#7847;n v&#7889;n nh&agrave; n&#432;&#7899;c
&#273;&#7847;u t&#432; t&#7841;i c&ocirc;ng ty c&#7893; ph&#7847;n, c&ocirc;ng
ty tr&aacute;ch nhi&#7879;m h&#7919;u h&#7841;n hai th&agrave;nh vi&ecirc;n tr&#7903;
l&ecirc;n) m&agrave; kh&ocirc;ng ph&#7843;i l&agrave; t&#7897;i ph&#7841;m
v&agrave; theo quy &#273;&#7883;nh c&#7911;a ph&aacute;p lu&#7853;t ph&#7843;i
b&#7883; x&#7917; ph&#7841;t vi ph&#7841;m h&agrave;nh ch&iacute;nh.</span></p>

<p class=MsoNormal style='margin-top:2.0pt;text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>2. Vi ph&#7841;m h&agrave;nh ch&iacute;nh v&#7873;
h&oacute;a &#273;&#417;n l&agrave; h&agrave;nh vi c&oacute; l&#7895;i do t&#7893;
ch&#7913;c, c&aacute; nh&acirc;n th&#7921;c hi&#7879;n vi ph&#7841;m quy &#273;&#7883;nh
c&#7911;a ph&aacute;p lu&#7853;t v&#7873; h&oacute;a &#273;&#417;n m&agrave;
kh&ocirc;ng ph&#7843;i l&agrave; t&#7897;i ph&#7841;m v&agrave; theo quy &#273;&#7883;nh
c&#7911;a ph&aacute;p lu&#7853;t ph&#7843;i b&#7883; x&#7917; ph&#7841;t vi ph&#7841;m
h&agrave;nh ch&iacute;nh.</span></p>

<p class=MsoNormal style='margin-top:2.0pt;text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>3. S&#7889; ti&#7873;n thu&#7871; tr&#7889;n l&agrave;
s&#7889; ti&#7873;n thu&#7871; ph&#7843;i n&#7897;p ng&acirc;n s&aacute;ch
nh&agrave; n&#432;&#7899;c theo quy &#273;&#7883;nh c&#7911;a ph&aacute;p lu&#7853;t
v&#7873; thu&#7871; m&agrave; ng&#432;&#7901;i n&#7897;p thu&#7871; b&#7883;
c&#417; quan c&oacute; th&#7849;m quy&#7873;n ph&aacute;t hi&#7879;n v&agrave;
x&aacute;c &#273;&#7883;nh trong bi&ecirc;n b&#7843;n vi ph&#7841;m h&agrave;nh
ch&iacute;nh, bi&ecirc;n b&#7843;n thanh tra (ki&#7875;m tra) thu&#7871;.</span></p>

<p class=MsoNormal style='margin-top:2.0pt;text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>4. V&#259;n b&#7843;n h&#432;&#7899;ng d&#7851;n c&#7911;a
c&#417; quan thu&#7871; li&ecirc;n quan &#273;&#7871;n n&#7897;i dung
x&aacute;c &#273;&#7883;nh ngh&#297;a v&#7909; thu&#7871; l&agrave; v&#259;n b&#7843;n
h&agrave;nh ch&iacute;nh do c&#417; quan thu&#7871; c&aacute;c c&#7845;p ban
h&agrave;nh &#273;&#7875; h&#432;&#7899;ng d&#7851;n m&#7897;t ho&#7863;c nhi&#7873;u
ng&#432;&#7901;i n&#7897;p thu&#7871; th&#7921;c hi&#7879;n ngh&#297;a v&#7909;
thu&#7871; trong m&#7897;t t&igrave;nh hu&#7889;ng c&#7909; th&#7875;.</span></p>

<p class=MsoNormal style='margin-top:2.0pt;text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>5. Quy&#7871;t &#273;&#7883;nh x&#7917; l&yacute; c&#7911;a
c&#417; quan thu&#7871; li&ecirc;n quan &#273;&#7871;n n&#7897;i dung
x&aacute;c &#273;&#7883;nh ngh&#297;a v&#7909; thu&#7871; c&#7911;a ng&#432;&#7901;i
n&#7897;p thu&#7871; l&agrave; quy&#7871;t &#273;&#7883;nh x&#7917; l&yacute; v&#7873;
ho&agrave;n thu&#7871; &#273;&#7889;i v&#7899;i tr&#432;&#7901;ng h&#7907;p ki&#7875;m
tra tr&#432;&#7899;c ho&agrave;n thu&#7871;; quy&#7871;t &#273;&#7883;nh mi&#7877;n,
gi&#7843;m thu&#7871;; quy&#7871;t &#273;&#7883;nh v&#7873; gia h&#7841;n n&#7897;p
h&#7891; s&#417; khai thu&#7871;; x&#7917; l&yacute; s&#7889; thu&#7871;
gi&aacute; tr&#7883; gia t&#259;ng &#273;&#432;&#7907;c kh&#7845;u tr&#7915; ho&#7863;c
&#273;&#432;&#7907;c ho&agrave;n ho&#7863;c s&#7889; l&#7895; chuy&#7875;n k&#7923;
sau tr&ecirc;n quy&#7871;t &#273;&#7883;nh x&#7917; ph&#7841;t vi ph&#7841;m
h&agrave;nh ch&iacute;nh ho&#7863;c quy&#7871;t &#273;&#7883;nh &aacute;p d&#7909;ng
bi&#7879;n ph&aacute;p kh&#7855;c ph&#7909;c h&#7853;u qu&#7843;.</span></p>

<p class=MsoNormal style='margin-top:2.0pt;text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>6. Ng&agrave;y b&#7855;t &#273;&#7847;u t&iacute;nh
qu&aacute; th&#7901;i h&#7841;n t&#7841;i &#272;i&#7873;u 10, 11, 13, 14
v&agrave; 19 Ngh&#7883; &#273;&#7883;nh n&agrave;y l&agrave; ng&agrave;y &#273;&#7847;u
ti&ecirc;n sau ng&agrave;y k&#7871;t th&uacute;c th&#7901;i h&#7841;n ph&#7843;i
th&#7921;c hi&#7879;n tr&aacute;ch nhi&#7879;m, ngh&#297;a v&#7909; c&#7911;a t&#7893;
ch&#7913;c, c&aacute; nh&acirc;n theo quy &#273;&#7883;nh c&#7911;a ph&aacute;p
lu&#7853;t v&#7873; qu&#7843;n l&yacute; thu&#7871;. Tr&#432;&#7901;ng h&#7907;p
&#273;&#432;&#7907;c gia h&#7841;n, ng&agrave;y b&#7855;t &#273;&#7847;u
t&iacute;nh qu&aacute; th&#7901;i h&#7841;n l&agrave; ng&agrave;y &#273;&#7847;u
ti&ecirc;n sau ng&agrave;y k&#7871;t th&uacute;c th&#7901;i h&#7841;n gia h&#7841;n.</span></p>

<p class=MsoNormal style='margin-top:2.0pt;text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>7. V&#7909; vi&#7879;c c&oacute; nhi&#7873;u
t&igrave;nh ti&#7871;t ph&#7913;c t&#7841;p l&agrave; v&#7909; vi&#7879;c
&#273;&#432;&#7907;c ph&aacute;t hi&#7879;n qua thanh tra, ki&#7875;m tra thu&#7871;
t&#7841;i tr&#7909; s&#7903; ng&#432;&#7901;i n&#7897;p thu&#7871;; v&#7909; vi&#7879;c
c&#7847;n tham v&#7845;n t&#7915; c&aacute;c c&#417; quan, t&#7893; ch&#7913;c
chuy&ecirc;n ng&agrave;nh; v&#7909; vi&#7879;c c&oacute; h&agrave;nh vi khai
sai d&#7851;n &#273;&#7871;n thi&#7871;u s&#7889; ti&#7873;n thu&#7871; ph&#7843;i
n&#7897;p ho&#7863;c t&#259;ng s&#7889; ti&#7873;n thu&#7871; &#273;&#432;&#7907;c
mi&#7877;n, gi&#7843;m, ho&agrave;n ho&#7863;c h&agrave;nh vi tr&#7889;n thu&#7871;.</span></p>

<p class=MsoNormal style='margin-top:2.0pt;text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>8. V&#7909; vi&#7879;c &#273;&#7863;c bi&#7879;t
nghi&ecirc;m tr&#7885;ng l&agrave; v&#7909; vi&#7879;c c&oacute; h&agrave;nh vi
khai sai d&#7851;n &#273;&#7871;n thi&#7871;u s&#7889; ti&#7873;n thu&#7871; ph&#7843;i
n&#7897;p ho&#7863;c t&#259;ng s&#7889; ti&#7873;n thu&#7871; &#273;&#432;&#7907;c
ho&agrave;n ho&#7863;c h&agrave;nh vi tr&#7889;n thu&#7871; li&ecirc;n ti&#7871;p
t&#7915; ba k&#7923; t&iacute;nh thu&#7871; tr&#7903; l&ecirc;n.</span></p>

<p class=MsoNormal style='margin-top:2.0pt;text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>9. Ng&agrave;y ph&aacute;t hi&#7879;n h&agrave;nh vi
vi ph&#7841;m l&agrave; ng&agrave;y ng&#432;&#7901;i c&oacute; th&#7849;m quy&#7873;n
&#273;ang thi h&agrave;nh c&ocirc;ng v&#7909; l&#7853;p bi&ecirc;n b&#7843;n
ghi nh&#7853;n h&agrave;nh vi vi ph&#7841;m h&agrave;nh ch&iacute;nh c&#7911;a
&#273;&#7889;i t&#432;&#7907;ng b&#7883; x&#7917; ph&#7841;t vi ph&#7841;m
h&agrave;nh ch&iacute;nh v&#7873; thu&#7871;, h&oacute;a &#273;&#417;n.</span></p>

<h2><a name="dieu_3"></a><a name="_Toc114664875"></a><b
style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>1. &#272;&#7889;i t&#432;&#7907;ng b&#7883; x&#7917;
ph&#7841;t vi ph&#7841;m h&agrave;nh ch&iacute;nh v&#7873; thu&#7871;,
h&oacute;a &#273;&#417;n bao g&#7891;m:</span></p>

<p class=MsoNormal style='margin-top:2.0pt;text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>a) Ng&#432;&#7901;i n&#7897;p thu&#7871; c&oacute;
h&agrave;nh vi vi ph&#7841;m h&agrave;nh ch&iacute;nh v&#7873; thu&#7871;,
h&oacute;a &#273;&#417;n.</span></p>

<p class=MsoNormal style='margin-top:2.0pt;text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>Tr&#432;&#7901;ng h&#7907;p ng&#432;&#7901;i n&#7897;p
thu&#7871; &#7911;y quy&#7873;n cho t&#7893; ch&#7913;c, c&aacute; nh&acirc;n
kh&aacute;c th&#7921;c hi&#7879;n c&aacute;c ngh&#297;a v&#7909; v&#7873; thu&#7871;
m&agrave; ph&aacute;p lu&#7853;t v&#7873; thu&#7871;, qu&#7843;n l&yacute; thu&#7871;
quy &#273;&#7883;nh ngh&#297;a v&#7909;, tr&aacute;ch nhi&#7879;m c&#7911;a
b&ecirc;n &#273;&#432;&#7907;c &#7911;y quy&#7873;n ph&#7843;i th&#7921;c hi&#7879;n
thay ng&#432;&#7901;i n&#7897;p thu&#7871; th&igrave; n&#7871;u b&ecirc;n
&#273;&#432;&#7907;c &#7911;y quy&#7873;n c&oacute; h&agrave;nh vi vi ph&#7841;m
h&agrave;nh ch&iacute;nh quy &#273;&#7883;nh t&#7841;i Ngh&#7883; &#273;&#7883;nh
n&agrave;y th&igrave; t&#7893; ch&#7913;c, c&aacute; nh&acirc;n &#273;&#432;&#7907;c
&#7911;y quy&#7873;n b&#7883; x&#7917; ph&#7841;t theo Ngh&#7883; &#273;&#7883;nh
n&agrave;y.</span></p>

<p class=MsoNormal style='margin-top:2.0pt;text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>Tr&#432;&#7901;ng h&#7907;p theo quy &#273;&#7883;nh c&#7911;a
ph&aacute;p lu&#7853;t v&#7873; thu&#7871; v&agrave; qu&#7843;n l&yacute; thu&#7871;,
t&#7893; ch&#7913;c, c&aacute; nh&acirc;n c&oacute; ngh&#297;a v&#7909;
&#273;&#259;ng k&yacute; thu&#7871;, khai, n&#7897;p thu&#7871; thay ng&#432;&#7901;i
n&#7897;p thu&#7871; m&agrave; t&#7893; ch&#7913;c, c&aacute; nh&acirc;n khai,
n&#7897;p thu&#7871; thay c&oacute; h&agrave;nh vi vi ph&#7841;m h&agrave;nh
ch&iacute;nh quy &#273;&#7883;nh t&#7841;i Ngh&#7883; &#273;&#7883;nh
n&agrave;y th&igrave; t&#7893; ch&#7913;c, c&aacute; nh&acirc;n khai, n&#7897;p
thu&#7871; thay b&#7883; x&#7917; ph&#7841;t vi ph&#7841;m h&agrave;nh
ch&iacute;nh v&#7873; thu&#7871; theo quy &#273;&#7883;nh t&#7841;i Ngh&#7883;
&#273;&#7883;nh n&agrave;y.</span></p>

<p class=MsoNormal style='margin-top:2.0pt;text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>b) T&#7893; ch&#7913;c, c&aacute; nh&acirc;n
li&ecirc;n quan vi ph&#7841;m h&agrave;nh ch&iacute;nh v&#7873; thu&#7871;,
h&oacute;a &#273;&#417;n.</span></p>

<p class=MsoNormal style='margin-top:2.0pt;text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>2. Ng&#432;&#7901;i n&#7897;p thu&#7871; l&agrave; t&#7893;
ch&#7913;c b&#7883; x&#7917; ph&#7841;t vi ph&#7841;m h&agrave;nh ch&iacute;nh
v&#7873; thu&#7871;, h&oacute;a &#273;&#417;n bao g&#7891;m:</span></p>

<p class=MsoNormal style='margin-top:2.0pt;text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>a) Doanh nghi&#7879;p &#273;&#432;&#7907;c
th&agrave;nh l&#7853;p v&agrave; ho&#7841;t &#273;&#7897;ng theo Lu&#7853;t
Doanh nghi&#7879;p, Lu&#7853;t &#272;&#7847;u t&#432;, Lu&#7853;t C&aacute;c t&#7893;
ch&#7913;c t&iacute;n d&#7909;ng, Lu&#7853;t Kinh doanh b&#7843;o hi&#7875;m,
Lu&#7853;t Ch&#7913;ng kho&aacute;n, Lu&#7853;t D&#7847;u kh&iacute;, Lu&#7853;t
Th&#432;&#417;ng m&#7841;i v&agrave; c&aacute;c v&#259;n b&#7843;n quy ph&#7841;m
ph&aacute;p lu&#7853;t kh&aacute;c; &#273;&#417;n v&#7883; ph&#7909; thu&#7897;c
c&#7911;a doanh nghi&#7879;p, &#273;&#7883;a &#273;i&#7875;m kinh doanh tr&#7921;c
ti&#7871;p k&ecirc; khai, n&#7897;p thu&#7871;, s&#7917; d&#7909;ng h&oacute;a
&#273;&#417;n;</span></p>

<p class=MsoNormal style='margin-top:2.0pt;text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>b) &#272;&#417;n v&#7883; s&#7921; nghi&#7879;p
c&ocirc;ng l&#7853;p, ngo&agrave;i c&ocirc;ng l&#7853;p;</span></p>

<p class=MsoNormal style='margin-top:2.0pt;text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>c) T&#7893; ch&#7913;c &#273;&#432;&#7907;c
th&agrave;nh l&#7853;p v&agrave; ho&#7841;t &#273;&#7897;ng theo Lu&#7853;t H&#7907;p
t&aacute;c x&atilde;;</span></p>

<p class=MsoNormal style='margin-top:2.0pt;text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>d) T&#7893; ch&#7913;c, doanh nghi&#7879;p n&#432;&#7899;c
ngo&agrave;i, chi nh&aacute;nh, v&#259;n ph&ograve;ng &#273;&#7841;i di&#7879;n
c&#7911;a th&#432;&#417;ng nh&acirc;n n&#432;&#7899;c ngo&agrave;i, v&#259;n
ph&ograve;ng &#273;i&#7873;u h&agrave;nh c&#7911;a nh&agrave; th&#7847;u
n&#432;&#7899;c ngo&agrave;i t&#7841;i Vi&#7879;t Nam kinh doanh ho&#7863;c
c&oacute; thu nh&#7853;p ph&aacute;t sinh t&#7841;i Vi&#7879;t Nam;</span></p>

<p class=MsoNormal style='margin-top:2.0pt;text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>&#273;) C&#417; quan nh&agrave; n&#432;&#7899;c
c&oacute; h&agrave;nh vi vi ph&#7841;m h&agrave;nh ch&iacute;nh v&#7873; thu&#7871;,
h&oacute;a &#273;&#417;n m&agrave; h&agrave;nh vi &#273;&oacute; kh&ocirc;ng
thu&#7897;c nhi&#7879;m v&#7909; qu&#7843;n l&yacute; nh&agrave; n&#432;&#7899;c
&#273;&#432;&#7907;c giao;</span></p>

<p class=MsoNormal style='margin-top:2.0pt;text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>e) T&#7893; h&#7907;p t&aacute;c v&agrave; c&aacute;c
t&#7893; ch&#7913;c kh&aacute;c &#273;&#432;&#7907;c th&agrave;nh l&#7853;p
theo quy &#273;&#7883;nh c&#7911;a ph&aacute;p lu&#7853;t.</span></p>

<h2><a name="dieu_4"></a><a name="_Toc114664876"></a><b
style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>1. S&#7917; d&#7909;ng h&oacute;a &#273;&#417;n, ch&#7913;ng
t&#7915; trong c&aacute;c tr&#432;&#7901;ng h&#7907;p sau &#273;&acirc;y
l&agrave; h&agrave;nh vi s&#7917; d&#7909;ng h&oacute;a &#273;&#417;n, ch&#7913;ng
t&#7915; kh&ocirc;ng h&#7907;p ph&aacute;p:</span></p>

<p class=MsoNormal style='margin-top:2.0pt;text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>a) H&oacute;a &#273;&#417;n, ch&#7913;ng t&#7915; gi&#7843;;</span></p>

<p class=MsoNormal style='margin-top:2.0pt;text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>b) H&oacute;a &#273;&#417;n, ch&#7913;ng t&#7915;
ch&#432;a c&oacute; gi&aacute; tr&#7883; s&#7917; d&#7909;ng, h&#7871;t
gi&aacute; tr&#7883; s&#7917; d&#7909;ng;</span></p>

<p class=MsoNormal style='margin-top:2.0pt;text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>c) H&oacute;a &#273;&#417;n b&#7883; ng&#7915;ng s&#7917;
d&#7909;ng trong th&#7901;i gian b&#7883; c&#432;&#7905;ng ch&#7871; b&#7857;ng
bi&#7879;n ph&aacute;p ng&#7915;ng s&#7917; d&#7909;ng h&oacute;a
&#273;&#417;n, tr&#7915; tr&#432;&#7901;ng h&#7907;p &#273;&#432;&#7907;c
ph&eacute;p s&#7917; d&#7909;ng theo th&ocirc;ng b&aacute;o c&#7911;a c&#417;
quan thu&#7871;;</span></p>

<p class=MsoNormal style='margin-top:2.0pt;text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>d) H&oacute;a &#273;&#417;n &#273;i&#7879;n t&#7917;
kh&ocirc;ng &#273;&#259;ng k&yacute; s&#7917; d&#7909;ng v&#7899;i c&#417; quan
thu&#7871;;</span></p>

<p class=MsoNormal style='margin-top:2.0pt;text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>&#273;) H&oacute;a &#273;&#417;n &#273;i&#7879;n t&#7917;
ch&#432;a c&oacute; m&atilde; c&#7911;a c&#417; quan thu&#7871; &#273;&#7889;i
v&#7899;i tr&#432;&#7901;ng h&#7907;p s&#7917; d&#7909;ng h&oacute;a
&#273;&#417;n &#273;i&#7879;n t&#7917; c&oacute; m&atilde; c&#7911;a c&#417;
quan thu&#7871;;</span></p>

<p class=MsoNormal style='margin-top:2.0pt;text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>e) H&oacute;a &#273;&#417;n mua h&agrave;ng
h&oacute;a, d&#7883;ch v&#7909; c&oacute; ng&agrave;y l&#7853;p tr&ecirc;n
h&oacute;a &#273;&#417;n t&#7915; ng&agrave;y c&#417; quan thu&#7871;
x&aacute;c &#273;&#7883;nh b&ecirc;n b&aacute;n kh&ocirc;ng ho&#7841;t &#273;&#7897;ng
t&#7841;i &#273;&#7883;a ch&#7881; kinh doanh &#273;&atilde; &#273;&#259;ng
k&yacute; v&#7899;i c&#417; quan nh&agrave; n&#432;&#7899;c c&oacute; th&#7849;m
quy&#7873;n;</span></p>

<p class=MsoNormal style='margin-top:2.0pt;text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>g) H&oacute;a &#273;&#417;n, ch&#7913;ng t&#7915; mua
h&agrave;ng h&oacute;a, d&#7883;ch v&#7909; c&oacute; ng&agrave;y l&#7853;p
tr&ecirc;n h&oacute;a &#273;&#417;n, ch&#7913;ng t&#7915; tr&#432;&#7899;c
ng&agrave;y x&aacute;c &#273;&#7883;nh b&ecirc;n l&#7853;p h&oacute;a
&#273;&#417;n, ch&#7913;ng t&#7915; kh&ocirc;ng ho&#7841;t &#273;&#7897;ng t&#7841;i
&#273;&#7883;a ch&#7881; kinh doanh &#273;&atilde; &#273;&#259;ng k&yacute; v&#7899;i
c&#417; quan nh&agrave; n&#432;&#7899;c c&oacute; th&#7849;m quy&#7873;n ho&#7863;c
ch&#432;a c&oacute; th&ocirc;ng b&aacute;o c&#7911;a c&#417; quan thu&#7871; v&#7873;
vi&#7879;c b&ecirc;n l&#7853;p h&oacute;a &#273;&#417;n, ch&#7913;ng t&#7915;
kh&ocirc;ng ho&#7841;t &#273;&#7897;ng t&#7841;i &#273;&#7883;a ch&#7881; kinh
doanh &#273;&atilde; &#273;&#259;ng k&yacute; v&#7899;i c&#417; quan c&oacute;
th&#7849;m quy&#7873;n nh&#432;ng c&#417; quan thu&#7871; ho&#7863;c c&#417;
quan c&ocirc;ng an ho&#7863;c c&aacute;c c&#417; quan ch&#7913;c n&#259;ng
kh&aacute;c &#273;&atilde; c&oacute; k&#7871;t lu&#7853;n &#273;&oacute;
l&agrave; h&oacute;a &#273;&#417;n, ch&#7913;ng t&#7915; kh&ocirc;ng h&#7907;p
ph&aacute;p.</span></p>

<p class=MsoNormal style='margin-top:2.0pt;text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>2. S&#7917; d&#7909;ng h&oacute;a &#273;&#417;n, ch&#7913;ng
t&#7915; trong c&aacute;c tr&#432;&#7901;ng h&#7907;p sau &#273;&acirc;y
l&agrave; h&agrave;nh vi s&#7917; d&#7909;ng kh&ocirc;ng h&#7907;p ph&aacute;p
h&oacute;a &#273;&#417;n, ch&#7913;ng t&#7915;:</span></p>

<p class=MsoNormal style='margin-top:2.0pt;text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>a) H&oacute;a &#273;&#417;n, ch&#7913;ng t&#7915;
kh&ocirc;ng ghi &#273;&#7847;y &#273;&#7911; c&aacute;c n&#7897;i dung b&#7855;t
bu&#7897;c theo quy &#273;&#7883;nh; h&oacute;a &#273;&#417;n t&#7849;y
x&oacute;a, s&#7917;a ch&#7919;a kh&ocirc;ng &#273;&uacute;ng quy &#273;&#7883;nh;</span></p>

<p class=MsoNormal style='margin-top:2.0pt;text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>b) H&oacute;a &#273;&#417;n, ch&#7913;ng t&#7915; kh&#7889;ng
(h&oacute;a &#273;&#417;n, ch&#7913;ng t&#7915; &#273;&atilde; ghi c&aacute;c
ch&#7881; ti&ecirc;u, n&#7897;i dung nghi&#7879;p v&#7909; kinh t&#7871;
nh&#432;ng vi&#7879;c mua b&aacute;n h&agrave;ng h&oacute;a, d&#7883;ch v&#7909;
kh&ocirc;ng c&oacute; th&#7853;t m&#7897;t ph&#7847;n ho&#7863;c to&agrave;n b&#7897;);
h&oacute;a &#273;&#417;n ph&#7843;n &aacute;nh kh&ocirc;ng &#273;&uacute;ng
gi&aacute; tr&#7883; th&#7921;c t&#7871; ph&aacute;t sinh ho&#7863;c l&#7853;p
h&oacute;a &#273;&#417;n kh&#7889;ng, l&#7853;p h&oacute;a &#273;&#417;n gi&#7843;;</span></p>

<p class=MsoNormal style='margin-top:2.0pt;text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>c) H&oacute;a &#273;&#417;n c&oacute; s&#7921;
ch&ecirc;nh l&#7879;ch v&#7873; gi&aacute; tr&#7883; h&agrave;ng h&oacute;a, d&#7883;ch
v&#7909; ho&#7863;c sai l&#7879;ch c&aacute;c ti&ecirc;u th&#7913;c b&#7855;t
bu&#7897;c gi&#7919;a c&aacute;c li&ecirc;n c&#7911;a h&oacute;a &#273;&#417;n;</span></p>

<p class=MsoNormal style='margin-top:2.0pt;text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>d) H&oacute;a &#273;&#417;n &#273;&#7875; quay
v&ograve;ng khi v&#7853;n chuy&#7875;n h&agrave;ng h&oacute;a trong kh&acirc;u
l&#432;u th&ocirc;ng ho&#7863;c d&ugrave;ng h&oacute;a &#273;&#417;n c&#7911;a
h&agrave;ng h&oacute;a, d&#7883;ch v&#7909; n&agrave;y &#273;&#7875; ch&#7913;ng
minh cho h&agrave;ng h&oacute;a, d&#7883;ch v&#7909; kh&aacute;c;</span></p>

<p class=MsoNormal style='margin-top:2.0pt;text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>&#273;) H&oacute;a &#273;&#417;n, ch&#7913;ng t&#7915;
c&#7911;a t&#7893; ch&#7913;c, c&aacute; nh&acirc;n kh&aacute;c (tr&#7915;
h&oacute;a &#273;&#417;n c&#7911;a c&#417; quan thu&#7871; v&agrave; tr&#432;&#7901;ng
h&#7907;p &#273;&#432;&#7907;c &#7911;y nhi&#7879;m l&#7853;p h&oacute;a
&#273;&#417;n) &#273;&#7875; h&#7907;p th&#7913;c h&oacute;a h&agrave;ng
h&oacute;a, d&#7883;ch v&#7909; mua v&agrave;o ho&#7863;c h&agrave;ng
h&oacute;a, d&#7883;ch v&#7909; b&aacute;n ra;</span></p>

<p class=MsoNormal style='margin-top:2.0pt;text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>e) H&oacute;a &#273;&#417;n, ch&#7913;ng t&#7915;
m&agrave; c&#417; quan thu&#7871; ho&#7863;c c&#417; quan c&ocirc;ng an ho&#7863;c
c&aacute;c c&#417; quan ch&#7913;c n&#259;ng kh&aacute;c &#273;&atilde; k&#7871;t
lu&#7853;n l&agrave; s&#7917; d&#7909;ng kh&ocirc;ng h&#7907;p ph&aacute;p
h&oacute;a &#273;&#417;n, ch&#7913;ng t&#7915;.</span></p>

<h2><a name="dieu_5"></a><a name="_Toc114664877"></a><b style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>1. Vi&#7879;c x&#7917; ph&#7841;t vi ph&#7841;m
h&agrave;nh ch&iacute;nh v&#7873; thu&#7871;, h&oacute;a &#273;&#417;n
&#273;&#432;&#7907;c th&#7921;c hi&#7879;n theo quy &#273;&#7883;nh c&#7911;a
ph&aacute;p lu&#7853;t v&#7873; qu&#7843;n l&yacute; thu&#7871; v&agrave;
ph&aacute;p lu&#7853;t v&#7873; x&#7917; l&yacute; vi ph&#7841;m h&agrave;nh
ch&iacute;nh.</span></p>

<p class=MsoNormal style='margin-top:2.0pt;text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>2. T&#7893; ch&#7913;c, c&aacute; nh&acirc;n ch&#7881;
b&#7883; x&#7917; ph&#7841;t vi ph&#7841;m h&agrave;nh ch&iacute;nh v&#7873;
thu&#7871;, h&oacute;a &#273;&#417;n khi c&oacute; h&agrave;nh vi vi ph&#7841;m
h&agrave;nh ch&iacute;nh v&#7873; thu&#7871;, h&oacute;a &#273;&#417;n theo quy
&#273;&#7883;nh t&#7841;i Ngh&#7883; &#273;&#7883;nh n&agrave;y.</span></p>

<p class=MsoNormal style='margin-top:2.0pt;text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>3. T&#7893; ch&#7913;c, c&aacute; nh&acirc;n th&#7921;c
hi&#7879;n nhi&#7873;u h&agrave;nh vi vi ph&#7841;m h&agrave;nh ch&iacute;nh
th&igrave; b&#7883; x&#7917; ph&#7841;t v&#7873; t&#7915;ng h&agrave;nh vi vi
ph&#7841;m, tr&#7915; c&aacute;c tr&#432;&#7901;ng h&#7907;p sau:</span></p>

<p class=MsoNormal style='margin-top:2.0pt;text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>a) Tr&#432;&#7901;ng h&#7907;p c&ugrave;ng m&#7897;t
th&#7901;i &#273;i&#7875;m ng&#432;&#7901;i n&#7897;p thu&#7871; khai sai m&#7897;t
ho&#7863;c nhi&#7873;u ch&#7881; ti&ecirc;u tr&ecirc;n c&aacute;c h&#7891;
s&#417; thu&#7871; c&#7911;a c&ugrave;ng m&#7897;t s&#7855;c thu&#7871;
th&igrave; h&agrave;nh vi khai sai thu&#7897;c tr&#432;&#7901;ng h&#7907;p x&#7917;
ph&#7841;t v&#7873; th&#7911; t&#7909;c thu&#7871; ch&#7881; b&#7883; x&#7917;
ph&#7841;t v&#7873; m&#7897;t h&agrave;nh vi khai sai ch&#7881; ti&ecirc;u
tr&ecirc;n h&#7891; s&#417; thu&#7871; c&oacute; khung ph&#7841;t ti&#7873;n
cao nh&#7845;t trong s&#7889; c&aacute;c h&agrave;nh vi &#273;&atilde; th&#7921;c
hi&#7879;n theo quy &#273;&#7883;nh t&#7841;i Ngh&#7883; &#273;&#7883;nh
n&agrave;y v&agrave; &aacute;p d&#7909;ng t&igrave;nh ti&#7871;t t&#259;ng n&#7863;ng
vi ph&#7841;m nhi&#7873;u l&#7847;n;</span></p>

<p class=MsoNormal style='margin-top:2.0pt;text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>b) Tr&#432;&#7901;ng h&#7907;p c&ugrave;ng m&#7897;t
th&#7901;i &#273;i&#7875;m ng&#432;&#7901;i n&#7897;p thu&#7871; ch&#7853;m n&#7897;p
nhi&#7873;u h&#7891; s&#417; khai thu&#7871; c&#7911;a nhi&#7873;u k&#7923;
t&iacute;nh thu&#7871; nh&#432;ng c&ugrave;ng m&#7897;t s&#7855;c thu&#7871;
th&igrave; ch&#7881; b&#7883; x&#7917; ph&#7841;t v&#7873; m&#7897;t
h&agrave;nh vi ch&#7853;m n&#7897;p h&#7891; s&#417; khai thu&#7871; c&oacute;
khung ph&#7841;t ti&#7873;n cao nh&#7845;t trong s&#7889; c&aacute;c
h&agrave;nh vi &#273;&atilde; th&#7921;c hi&#7879;n theo quy &#273;&#7883;nh t&#7841;i
Ngh&#7883; &#273;&#7883;nh n&agrave;y v&agrave; &aacute;p d&#7909;ng
t&igrave;nh ti&#7871;t t&#259;ng n&#7863;ng vi ph&#7841;m nhi&#7873;u l&#7847;n.</span></p>

<p class=MsoNormal style='margin-top:2.0pt;text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>Tr&#432;&#7901;ng h&#7907;p trong s&#7889; h&#7891;
s&#417; khai thu&#7871; ch&#7853;m n&#7897;p c&oacute; h&#7891; s&#417; khai
thu&#7871; ch&#7853;m n&#7897;p thu&#7897;c tr&#432;&#7901;ng h&#7907;p tr&#7889;n
thu&#7871; th&igrave; t&aacute;ch ri&ecirc;ng &#273;&#7875; x&#7917; ph&#7841;t
v&#7873; h&agrave;nh vi tr&#7889;n thu&#7871;;</span></p>

<p class=MsoNormal style='margin-top:2.0pt;text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>c) Tr&#432;&#7901;ng h&#7907;p c&ugrave;ng m&#7897;t
th&#7901;i &#273;i&#7875;m ng&#432;&#7901;i n&#7897;p thu&#7871; ch&#7853;m n&#7897;p
nhi&#7873;u th&ocirc;ng b&aacute;o, b&aacute;o c&aacute;o c&ugrave;ng lo&#7841;i
v&#7873; h&oacute;a &#273;&#417;n th&igrave; ng&#432;&#7901;i n&#7897;p thu&#7871;
b&#7883; x&#7917; ph&#7841;t v&#7873; m&#7897;t h&agrave;nh vi ch&#7853;m n&#7897;p
th&ocirc;ng b&aacute;o, b&aacute;o c&aacute;o v&#7873; h&oacute;a &#273;&#417;n
c&oacute; khung ph&#7841;t ti&#7873;n cao nh&#7845;t trong s&#7889; c&aacute;c
h&agrave;nh vi &#273;&atilde; th&#7921;c hi&#7879;n quy &#273;&#7883;nh t&#7841;i
Ngh&#7883; &#273;&#7883;nh n&agrave;y v&agrave; &aacute;p d&#7909;ng
t&igrave;nh ti&#7871;t t&#259;ng n&#7863;ng vi ph&#7841;m nhi&#7873;u l&#7847;n;</span></p>

<p class=MsoNormal style='margin-top:2.0pt;text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>d) H&agrave;nh vi vi ph&#7841;m v&#7873; s&#7917; d&#7909;ng
h&oacute;a &#273;&#417;n kh&ocirc;ng h&#7907;p ph&aacute;p, s&#7917; d&#7909;ng
kh&ocirc;ng h&#7907;p ph&aacute;p h&oacute;a &#273;&#417;n thu&#7897;c tr&#432;&#7901;ng
h&#7907;p b&#7883; x&#7917; ph&#7841;t theo &#272;i&#7873;u 16, &#272;i&#7873;u
17 Ngh&#7883; &#273;&#7883;nh n&agrave;y th&igrave; kh&ocirc;ng b&#7883; x&#7917;
ph&#7841;t theo &#272;i&#7873;u 28 Ngh&#7883; &#273;&#7883;nh n&agrave;y.</span></p>

<p class=MsoNormal style='margin-top:2.0pt;text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>4. Tr&#432;&#7901;ng h&#7907;p trong m&#7897;t th&#7911;
t&#7909;c h&agrave;nh ch&iacute;nh c&oacute; nhi&#7873;u th&agrave;nh ph&#7847;n
h&#7891; s&#417; &#273;&#432;&#7907;c quy &#273;&#7883;nh nhi&#7873;u h&#417;n
m&#7897;t h&agrave;nh vi vi ph&#7841;m h&agrave;nh ch&iacute;nh t&#7841;i Ngh&#7883;
&#273;&#7883;nh n&agrave;y th&igrave; t&#7893; ch&#7913;c, c&aacute; nh&acirc;n
vi ph&#7841;m b&#7883; x&#7917; ph&#7841;t &#273;&#7889;i v&#7899;i t&#7915;ng
h&agrave;nh vi vi ph&#7841;m.</span></p>

<p class=MsoNormal style='margin-top:2.0pt;text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>5. &#272;&#7889;i v&#7899;i c&ugrave;ng m&#7897;t
h&agrave;nh vi vi ph&#7841;m h&agrave;nh ch&iacute;nh v&#7873; thu&#7871;,
h&oacute;a &#273;&#417;n th&igrave; m&#7913;c ph&#7841;t ti&#7873;n &#273;&#7889;i
v&#7899;i <b style=' ch&#7913;c b&#7857;ng
02 l&#7847;n m&#7913;c ph&#7841;t ti&#7873;n &#273;&#7889;i v&#7899;i c&aacute;
nh&acirc;n</b>, tr&#7915; m&#7913;c ph&#7841;t ti&#7873;n &#273;&#7889;i v&#7899;i
h&agrave;nh vi quy &#273;&#7883;nh t&#7841;i &#272;i&#7873;u 16, &#272;i&#7873;u
17 v&agrave; &#272;i&#7873;u 18 Ngh&#7883; &#273;&#7883;nh n&agrave;y.</span></p>

<h2><a name="dieu_6"></a><a name="_Toc114664878"></a><b
style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>1. T&igrave;nh ti&#7871;t t&#259;ng n&#7863;ng,
t&igrave;nh ti&#7871;t gi&#7843;m nh&#7865; theo quy &#273;&#7883;nh c&#7911;a
ph&aacute;p lu&#7853;t v&#7873; x&#7917; l&yacute; vi ph&#7841;m h&agrave;nh
ch&iacute;nh.</span></p>

<p class=MsoNormal style='margin-top:2.0pt;text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>2. Vi ph&#7841;m h&agrave;nh ch&iacute;nh v&#7899;i s&#7889;
ti&#7873;n thu&#7871; (s&#7889; ti&#7873;n thu&#7871; thi&#7871;u, s&#7889; ti&#7873;n
thu&#7871; tr&#7889;n ho&#7863;c s&#7889; ti&#7873;n thu&#7871; &#273;&#432;&#7907;c
mi&#7877;n, gi&#7843;m, ho&agrave;n cao h&#417;n) t&#7915; 100.000.000 &#273;&#7891;ng
tr&#7903; l&ecirc;n ho&#7863;c gi&aacute; tr&#7883; h&agrave;ng h&oacute;a, d&#7883;ch
v&#7909; t&#7915; 500.000.000 &#273;&#7891;ng tr&#7903; l&ecirc;n &#273;&#432;&#7907;c
x&aacute;c &#273;&#7883;nh l&agrave; vi ph&#7841;m h&agrave;nh ch&iacute;nh v&#7873;
thu&#7871; c&oacute; quy m&ocirc; l&#7899;n theo quy &#273;&#7883;nh t&#7841;i <a
name="dc_1">&#273;i&#7875;m 1 kho&#7843;n 1 &#272;i&#7873;u 10 Lu&#7853;t X&#7917;
l&yacute; vi ph&#7841;m h&agrave;nh ch&iacute;nh</a>. Vi ph&#7841;m h&agrave;nh
ch&iacute;nh t&#7915; 10 s&#7889; h&oacute;a &#273;&#417;n tr&#7903; l&ecirc;n
&#273;&#432;&#7907;c x&aacute;c &#273;&#7883;nh l&agrave; vi ph&#7841;m
h&agrave;nh ch&iacute;nh v&#7873; h&oacute;a &#273;&#417;n c&oacute; quy
m&ocirc; l&#7899;n theo quy &#273;&#7883;nh t&#7841;i <a name="dc_2">&#273;i&#7875;m
1 kho&#7843;n 1 &#272;i&#7873;u 10 Lu&#7853;t X&#7917; l&yacute; vi ph&#7841;m
h&agrave;nh ch&iacute;nh</a>.</span></p>

<h2><a name="dieu_7"></a><a name="_Toc114664879"></a><b style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>1. H&igrave;nh th&#7913;c x&#7917; ph&#7841;t
ch&iacute;nh</span></p>

<p class=MsoNormal style='margin-top:2.0pt;text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>a) C&#7843;nh c&aacute;o</span></p>

<p class=MsoNormal style='margin-top:2.0pt;text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>Ph&#7841;t c&#7843;nh c&aacute;o &aacute;p d&#7909;ng
&#273;&#7889;i v&#7899;i h&agrave;nh vi vi ph&#7841;m th&#7911; t&#7909;c thu&#7871;,
h&oacute;a &#273;&#417;n kh&ocirc;ng nghi&ecirc;m tr&#7885;ng, c&oacute;
t&igrave;nh ti&#7871;t gi&#7843;m nh&#7865; v&agrave; thu&#7897;c tr&#432;&#7901;ng
h&#7907;p &aacute;p d&#7909;ng h&igrave;nh th&#7913;c x&#7917; ph&#7841;t c&#7843;nh
c&aacute;o theo quy &#273;&#7883;nh t&#7841;i Ngh&#7883; &#273;&#7883;nh
n&agrave;y.</span></p>

<p class=MsoNormal style='margin-top:2.0pt;text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>b) Ph&#7841;t ti&#7873;n</span></p>

<p class=MsoNormal style='margin-top:2.0pt;text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>Ph&#7841;t ti&#7873;n t&#7889;i &#273;a kh&ocirc;ng
qu&aacute; 100.000.000 &#273;&#7891;ng &#273;&#7889;i v&#7899;i t&#7893; ch&#7913;c
th&#7921;c hi&#7879;n h&agrave;nh vi vi ph&#7841;m h&agrave;nh ch&iacute;nh v&#7873;
h&oacute;a &#273;&#417;n. Ph&#7841;t ti&#7873;n t&#7889;i &#273;a kh&ocirc;ng
qu&aacute; 50.000.000 &#273;&#7891;ng &#273;&#7889;i v&#7899;i c&aacute;
nh&acirc;n th&#7921;c hi&#7879;n h&agrave;nh vi vi ph&#7841;m h&agrave;nh
ch&iacute;nh v&#7873; h&oacute;a &#273;&#417;n.</span></p>

<p class=MsoNormal style='margin-top:2.0pt;text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>Ph&#7841;t ti&#7873;n t&#7889;i &#273;a kh&ocirc;ng
qu&aacute; 200.000.000 &#273;&#7891;ng &#273;&#7889;i v&#7899;i ng&#432;&#7901;i
n&#7897;p thu&#7871; l&agrave; t&#7893; ch&#7913;c th&#7921;c hi&#7879;n
h&agrave;nh vi vi ph&#7841;m th&#7911; t&#7909;c thu&#7871;. Ph&#7841;t ti&#7873;n
t&#7889;i &#273;a kh&ocirc;ng qu&aacute; 100.000.000 &#273;&#7891;ng &#273;&#7889;i
v&#7899;i ng&#432;&#7901;i n&#7897;p thu&#7871; l&agrave; c&aacute; nh&acirc;n
th&#7921;c hi&#7879;n h&agrave;nh vi vi ph&#7841;m th&#7911; t&#7909;c thu&#7871;.</span></p>

<p class=MsoNormal style='margin-top:2.0pt;text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>Ph&#7841;t 20% s&#7889; ti&#7873;n thu&#7871; thi&#7871;u
ho&#7863;c s&#7889; ti&#7873;n thu&#7871; &#273;&atilde; &#273;&#432;&#7907;c
mi&#7877;n, gi&#7843;m, ho&agrave;n cao h&#417;n quy &#273;&#7883;nh &#273;&#7889;i
v&#7899;i h&agrave;nh vi khai sai d&#7851;n &#273;&#7871;n thi&#7871;u s&#7889;
ti&#7873;n thu&#7871; ph&#7843;i n&#7897;p ho&#7863;c t&#259;ng s&#7889; ti&#7873;n
thu&#7871; &#273;&#432;&#7907;c mi&#7877;n, gi&#7843;m, ho&agrave;n.</span></p>

<p class=MsoNormal style='margin-top:2.0pt;text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>Ph&#7841;t t&#7915; 1 &#273;&#7871;n 3 l&#7847;n s&#7889;
ti&#7873;n thu&#7871; tr&#7889;n &#273;&#7889;i v&#7899;i h&agrave;nh vi tr&#7889;n
thu&#7871;.</span></p>

<p class=MsoNormal style='margin-top:2.0pt;text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>Ph&#7841;t ti&#7873;n t&#432;&#417;ng &#7913;ng v&#7899;i
s&#7889; ti&#7873;n kh&ocirc;ng tr&iacute;ch v&agrave;o t&agrave;i kho&#7843;n
c&#7911;a ng&acirc;n s&aacute;ch nh&agrave; n&#432;&#7899;c &#273;&#7889;i v&#7899;i
h&agrave;nh vi vi ph&#7841;m theo quy &#273;&#7883;nh t&#7841;i kho&#7843;n <a
style='mso-comment-reference:"HDTH\(Tt-K_1";i&#7873;u 18 </a></span><span class=MsoCommentReference><span
style='font-size:8.0pt'><![if !supportAnnotations]><a class=msocomanchor
id="_anchor_1" onmouseover="msoCommentShow('_anchor_1','_com_1')"
onmouseout="msoCommentHide('_com_1')" href="#_msocom_1" language=JavaScript
name="_msoanchor_1">[HDTH(Tt-K1]</a><![endif]></span><span style='font-size:14.0pt'>Ngh&#7883;
&#273;&#7883;nh n&agrave;y.</span></p>

<p class=MsoNormal style='margin-top:2.0pt;text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>2. H&igrave;nh th&#7913;c x&#7917; ph&#7841;t b&#7893;
sung: &#273;&igrave;nh ch&#7881; ho&#7841;t &#273;&#7897;ng in h&oacute;a
&#273;&#417;n c&oacute; th&#7901;i h&#7841;n.</span></p>

<p class=MsoNormal style='margin-top:2.0pt;text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>3. Bi&#7879;n ph&aacute;p kh&#7855;c ph&#7909;c h&#7853;u
qu&#7843;</span></p>

<p class=MsoNormal style='margin-top:2.0pt;text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>a) Bu&#7897;c n&#7897;p &#273;&#7911; s&#7889; ti&#7873;n
thu&#7871; thi&#7871;u, s&#7889; ti&#7873;n thu&#7871; &#273;&#432;&#7907;c mi&#7877;n,
gi&#7843;m, ho&agrave;n cao h&#417;n quy &#273;&#7883;nh, s&#7889; ti&#7873;n
thu&#7871; tr&#7889;n, ti&#7873;n ch&#7853;m n&#7897;p ti&#7873;n thu&#7871;
v&agrave;o ng&acirc;n s&aacute;ch nh&agrave; n&#432;&#7899;c.</span></p>

<p class=MsoNormal style='margin-top:2.0pt;text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>b) Bu&#7897;c &#273;i&#7873;u ch&#7881;nh l&#7841;i s&#7889;
l&#7895;, s&#7889; thu&#7871; gi&aacute; tr&#7883; gia t&#259;ng &#273;&#7847;u
v&agrave;o &#273;&#432;&#7907;c kh&#7845;u tr&#7915; chuy&#7875;n k&#7923; sau.</span></p>

<p class=MsoNormal style='margin-top:2.0pt;text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>c) Bu&#7897;c n&#7897;p h&#7891; s&#417; thay &#273;&#7893;i
n&#7897;i dung &#273;&#259;ng k&yacute; thu&#7871;; khai l&#7841;i v&agrave; n&#7897;p
b&#7893; sung c&aacute;c t&agrave;i li&#7879;u trong h&#7891; s&#417; thu&#7871;;
n&#7897;p h&#7891; s&#417; khai thu&#7871;, ph&#7909; l&#7909;c k&egrave;m theo
h&#7891; s&#417; khai thu&#7871;; cung c&#7845;p th&ocirc;ng tin.</span></p>

<p class=MsoNormal style='margin-top:2.0pt;text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>d) Bu&#7897;c th&#7921;c hi&#7879;n th&#7911; t&#7909;c
ph&aacute;t h&agrave;nh h&oacute;a &#273;&#417;n.</span></p>

<p class=MsoNormal style='margin-top:2.0pt;text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>d) Bu&#7897;c l&#7853;p h&oacute;a &#273;&#417;n theo
quy &#273;&#7883;nh.</span></p>

<p class=MsoNormal style='margin-top:2.0pt;text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>e) Bu&#7897;c h&#7911;y, ti&ecirc;u h&#7911;y
h&oacute;a &#273;&#417;n, c&aacute;c s&#7843;n ph&#7849;m in.</span></p>

<p class=MsoNormal style='margin-top:2.0pt;text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>g) Bu&#7897;c l&#7853;p v&agrave; g&#7917;i
th&ocirc;ng b&aacute;o, b&aacute;o c&aacute;o v&#7873; h&oacute;a
&#273;&#417;n.</span></p>

<p class=MsoNormal style='margin-top:2.0pt;text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>h) Bu&#7897;c chuy&#7875;n d&#7919; li&#7879;u
h&oacute;a &#273;&#417;n &#273;i&#7879;n t&#7917;.</span></p>

<p class=MsoNormal style='margin-top:2.0pt;text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>i) Bu&#7897;c n&#7897;p l&#7841;i s&#7889; l&#7907;i b&#7845;t
h&#7907;p ph&aacute;p c&oacute; &#273;&#432;&#7907;c do th&#7921;c hi&#7879;n
h&agrave;nh vi vi ph&#7841;m h&agrave;nh ch&iacute;nh.</span></p>

<p class=MsoNormal style='margin-top:2.0pt;text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>4. Nguy&ecirc;n t&#7855;c &aacute;p d&#7909;ng m&#7913;c
ph&#7841;t ti&#7873;n</span></p>

<p class=MsoNormal style='margin-top:2.0pt;text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>a) M&#7913;c ph&#7841;t ti&#7873;n quy &#273;&#7883;nh
t&#7841;i &#272;i&#7873;u 10, 11, 12, 13, 14, 15, kho&#7843;n 1, 2 &#272;i&#7873;u
19 v&agrave; Ch&#432;&#417;ng III Ngh&#7883; &#273;&#7883;nh n&agrave;y <b
style=' m&#7913;c
ph&#7841;t ti&#7873;n &aacute;p d&#7909;ng &#273;&#7889;i v&#7899;i t&#7893; ch&#7913;c.</span></b></span></p>

<p class=MsoNormal style='margin-top:2.0pt;text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>&#272;&#7889;i v&#7899;i ng&#432;&#7901;i n&#7897;p
thu&#7871; l&agrave; h&#7897; gia &#273;&igrave;nh, h&#7897; kinh doanh
&aacute;p d&#7909;ng m&#7913;c ph&#7841;t ti&#7873;n nh&#432; &#273;&#7889;i v&#7899;i
c&aacute; nh&acirc;n.</span></p>

<p class=MsoNormal style='margin-top:2.0pt;text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>b) Khi x&aacute;c &#273;&#7883;nh m&#7913;c ph&#7841;t
ti&#7873;n &#273;&#7889;i v&#7899;i ng&#432;&#7901;i n&#7897;p thu&#7871; vi ph&#7841;m
v&#7915;a c&oacute; t&igrave;nh ti&#7871;t t&#259;ng n&#7863;ng, v&#7915;a
c&oacute; t&igrave;nh ti&#7871;t gi&#7843;m nh&#7865; th&igrave; &#273;&#432;&#7907;c
gi&#7843;m tr&#7915; t&igrave;nh ti&#7871;t t&#259;ng n&#7863;ng theo
nguy&ecirc;n t&#7855;c m&#7897;t t&igrave;nh ti&#7871;t gi&#7843;m nh&#7865;
&#273;&#432;&#7907;c gi&#7843;m tr&#7915; m&#7897;t t&igrave;nh ti&#7871;t
t&#259;ng n&#7863;ng.</span></p>

<p class=MsoNormal style='margin-top:2.0pt;text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>c) C&aacute;c t&igrave;nh ti&#7871;t gi&#7843;m nh&#7865;
ho&#7863;c t&#259;ng n&#7863;ng &#273;&atilde; &#273;&#432;&#7907;c s&#7917; d&#7909;ng
&#273;&#7875; x&aacute;c &#273;&#7883;nh khung ti&#7873;n ph&#7841;t th&igrave;
kh&ocirc;ng &#273;&#432;&#7907;c s&#7917; d&#7909;ng khi x&aacute;c &#273;&#7883;nh
s&#7889; ti&#7873;n ph&#7841;t c&#7909; th&#7875; theo &#273;i&#7875;m d kho&#7843;n
n&agrave;y.</span></p>

<p class=MsoNormal style='margin-top:2.0pt;text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>d) Khi ph&#7841;t ti&#7873;n, m&#7913;c ph&#7841;t ti&#7873;n
c&#7909; th&#7875; &#273;&#7889;i v&#7899;i m&#7897;t h&agrave;nh vi vi ph&#7841;m
th&#7911; t&#7909;c thu&#7871;, h&oacute;a &#273;&#417;n v&agrave; h&agrave;nh
vi t&#7841;i &#272;i&#7873;u 19 Ngh&#7883; &#273;&#7883;nh n&agrave;y l&agrave;
m&#7913;c trung b&igrave;nh c&#7911;a khung ph&#7841;t ti&#7873;n &#273;&#432;&#7907;c
quy &#273;&#7883;nh &#273;&#7889;i v&#7899;i h&agrave;nh vi &#273;&oacute;. N&#7871;u
c&oacute; t&igrave;nh ti&#7871;t gi&#7843;m nh&#7865;, th&igrave; m&#7895;i
t&igrave;nh ti&#7871;t &#273;&#432;&#7907;c gi&#7843;m 10% m&#7913;c ti&#7873;n
ph&#7841;t trung b&igrave;nh c&#7911;a khung ti&#7873;n ph&#7841;t nh&#432;ng m&#7913;c
ph&#7841;t ti&#7873;n &#273;&#7889;i v&#7899;i h&agrave;nh vi &#273;&oacute;
kh&ocirc;ng &#273;&#432;&#7907;c gi&#7843;m qu&aacute; m&#7913;c t&#7889;i thi&#7875;u
c&#7911;a khung ti&#7873;n ph&#7841;t; n&#7871;u c&oacute; t&igrave;nh ti&#7871;t
t&#259;ng n&#7863;ng th&igrave; m&#7895;i t&igrave;nh ti&#7871;t t&#259;ng n&#7863;ng
&#273;&#432;&#7907;c t&iacute;nh t&#259;ng 10% m&#7913;c ti&#7873;n ph&#7841;t
trung b&igrave;nh c&#7911;a khung ti&#7873;n ph&#7841;t nh&#432;ng m&#7913;c ph&#7841;t
ti&#7873;n &#273;&#7889;i v&#7899;i h&agrave;nh vi &#273;&oacute; kh&ocirc;ng
&#273;&#432;&#7907;c v&#432;&#7907;t qu&aacute; m&#7913;c t&#7889;i &#273;a c&#7911;a
khung ti&#7873;n ph&#7841;t.</span></p>

</span><span style='background:yellow;-CP

text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>1. Th&#7901;i hi&#7879;u x&#7917; ph&#7841;t vi ph&#7841;m
h&agrave;nh ch&iacute;nh v&#7873; h&oacute;a &#273;&#417;n </span></p>

<p class=MsoNormal style='margin-top:2.0pt;text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>a) Th&#7901;i hi&#7879;u x&#7917; ph&#7841;t vi ph&#7841;m
h&agrave;nh ch&iacute;nh v&#7873; h&oacute;a &#273;&#417;n l&agrave; 01
n&#259;m. <span
style='background:yellow;-CP s&#7917;a:</span><span
lang=VI style='font-size:14.0pt;background:yellow;
a)
Th&#7901;i hi&#7879;u x&#7917; ph&#7841;t vi ph&#7841;m h&agrave;nh
ch&iacute;nh v&#7873; h&oacute;a &#273;&#417;n l&agrave; 02 n&#259;m.&#8221;</span></p>

<p class=MsoNormal style='margin-top:2.0pt;text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>b) Th&#7901;i &#273;i&#7875;m t&iacute;nh th&#7901;i
hi&#7879;u x&#7917; ph&#7841;t vi ph&#7841;m h&agrave;nh ch&iacute;nh v&#7873;
h&oacute;a &#273;&#417;n &#273;&#432;&#7907;c quy &#273;&#7883;nh nh&#432; sau:</span></p>

<p class=MsoNormal style='margin-top:2.0pt;text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>&#272;&#7889;i v&#7899;i h&agrave;nh vi vi ph&#7841;m
h&agrave;nh ch&iacute;nh &#273;ang &#273;&#432;&#7907;c th&#7921;c hi&#7879;n
quy &#273;&#7883;nh t&#7841;i &#273;i&#7875;m c kho&#7843;n n&agrave;y
th&igrave; th&#7901;i hi&#7879;u &#273;&#432;&#7907;c t&iacute;nh t&#7915;
ng&agrave;y ng&#432;&#7901;i c&oacute; th&#7849;m quy&#7873;n thi h&agrave;nh
c&ocirc;ng v&#7909; ph&aacute;t hi&#7879;n h&agrave;nh vi vi ph&#7841;m.</span></p>

<p class=MsoNormal style='margin-top:2.0pt;text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>&#272;&#7889;i v&#7899;i h&agrave;nh vi vi ph&#7841;m
h&agrave;nh ch&iacute;nh &#273;&atilde; k&#7871;t th&uacute;c quy &#273;&#7883;nh
t&#7841;i &#273;i&#7875;m d kho&#7843;n n&agrave;y th&igrave; th&#7901;i hi&#7879;u
&#273;&#432;&#7907;c t&iacute;nh t&#7915; ng&agrave;y ch&#7845;m d&#7913;t
h&agrave;nh vi vi ph&#7841;m.</span></p>

<p class=MsoNormal style='margin-top:2.0pt;text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>c) H&agrave;nh vi vi ph&#7841;m h&agrave;nh
ch&iacute;nh v&#7873; h&oacute;a &#273;&#417;n &#273;ang &#273;&#432;&#7907;c
th&#7921;c hi&#7879;n l&agrave; c&aacute;c h&agrave;nh vi quy &#273;&#7883;nh t&#7841;i
kho&#7843;n 4 &#272;i&#7873;u 21; &#273;i&#7875;m b kho&#7843;n 2 v&agrave; kho&#7843;n
3 &#272;i&#7873;u 23; kho&#7843;n 2, kho&#7843;n 5 &#272;i&#7873;u 24; &#273;i&#7875;m
b kho&#7843;n 3 &#272;i&#7873;u 25; &#273;i&#7875;m b kho&#7843;n 2 v&agrave;
&#273;i&#7875;m b, c, d kho&#7843;n 3 &#272;i&#7873;u 27; &#273;i&#7875;m b kho&#7843;n
5 &#272;i&#7873;u 29; &#273;i&#7875;m b kho&#7843;n 3 &#272;i&#7873;u 30 Ngh&#7883;
&#273;&#7883;nh n&agrave;y.</span></p>

<p class=MsoNormal style='margin-top:2.0pt;text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>d) H&agrave;nh vi vi ph&#7841;m h&agrave;nh
ch&iacute;nh v&#7873; h&oacute;a &#273;&#417;n kh&ocirc;ng thu&#7897;c tr&#432;&#7901;ng
h&#7907;p quy &#273;&#7883;nh t&#7841;i &#273;i&#7875;m c kho&#7843;n
n&agrave;y l&agrave; h&agrave;nh vi vi ph&#7841;m h&agrave;nh ch&iacute;nh
&#273;&atilde; k&#7871;t th&uacute;c. Th&#7901;i &#273;i&#7875;m ch&#7845;m d&#7913;t
h&agrave;nh vi vi ph&#7841;m l&agrave; ng&agrave;y th&#7921;c hi&#7879;n
h&agrave;nh vi vi ph&#7841;m &#273;&oacute;.</span></p>

<p class=MsoNormal style='margin-top:2.0pt;text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>&#272;&#7889;i v&#7899;i h&agrave;nh vi m&#7845;t,
ch&aacute;y, h&#7887;ng h&oacute;a &#273;&#417;n n&#7871;u kh&ocirc;ng
x&aacute;c &#273;&#7883;nh &#273;&#432;&#7907;c ng&agrave;y m&#7845;t, ch&aacute;y,
h&#7887;ng h&oacute;a &#273;&#417;n th&igrave; th&#7901;i &#273;i&#7875;m ch&#7845;m
d&#7913;t h&agrave;nh vi vi ph&#7841;m l&agrave; ng&agrave;y ph&aacute;t hi&#7879;n
h&oacute;a &#273;&#417;n b&#7883; m&#7845;t, ch&aacute;y, h&#7887;ng.</span></p>

<p class=MsoNormal style='margin-top:2.0pt;text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>&#272;&#7889;i v&#7899;i h&agrave;nh vi vi ph&#7841;m
v&#7873; th&#7901;i h&#7841;n th&ocirc;ng b&aacute;o, b&aacute;o c&aacute;o v&#7873;
h&oacute;a &#273;&#417;n quy &#273;&#7883;nh t&#7841;i kho&#7843;n 1, 3 &#272;i&#7873;u
21; &#273;i&#7875;m a, b kho&#7843;n 1 v&agrave; &#273;i&#7875;m c, d kho&#7843;n
2 &#272;i&#7873;u 23; kho&#7843;n 1, 2 v&agrave; &#273;i&#7875;m a kho&#7843;n
3 &#272;i&#7873;u 25; kho&#7843;n 1, &#273;i&#7875;m a kho&#7843;n 2, kho&#7843;n
3, kho&#7843;n 4 v&agrave; &#273;i&#7875;m a kho&#7843;n 5 &#272;i&#7873;u 29
Ngh&#7883; &#273;&#7883;nh n&agrave;y th&igrave; th&#7901;i &#273;i&#7875;m ch&#7845;m
d&#7913;t h&agrave;nh vi vi ph&#7841;m l&agrave; ng&agrave;y ng&#432;&#7901;i n&#7897;p
thu&#7871; n&#7897;p th&ocirc;ng b&aacute;o, b&aacute;o c&aacute;o v&#7873;
h&oacute;a &#273;&#417;n.</span></p>

<p class=MsoNormal style='margin-top:2.0pt;text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>2. Th&#7901;i hi&#7879;u x&#7917; ph&#7841;t vi ph&#7841;m
h&agrave;nh ch&iacute;nh v&#7873; thu&#7871;</span></p>

<p class=MsoNormal style='margin-top:2.0pt;text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>a) Th&#7901;i hi&#7879;u x&#7917; ph&#7841;t &#273;&#7889;i
v&#7899;i h&agrave;nh vi vi ph&#7841;m th&#7911; t&#7909;c thu&#7871; l&agrave;
02 n&#259;m, k&#7875; t&#7915; ng&agrave;y th&#7921;c hi&#7879;n h&agrave;nh vi
vi ph&#7841;m.</span></p>

<p class=MsoNormal style='margin-top:2.0pt;text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>Ng&agrave;y th&#7921;c hi&#7879;n h&agrave;nh vi vi ph&#7841;m
h&agrave;nh ch&iacute;nh v&#7873; th&#7911; t&#7909;c thu&#7871; l&agrave;
ng&agrave;y k&#7871; ti&#7871;p ng&agrave;y k&#7871;t th&uacute;c th&#7901;i h&#7841;n
ph&#7843;i th&#7921;c hi&#7879;n th&#7911; t&#7909;c v&#7873; thu&#7871; theo
quy &#273;&#7883;nh c&#7911;a ph&aacute;p lu&#7853;t v&#7873; qu&#7843;n
l&yacute; thu&#7871;, tr&#7915; c&aacute;c tr&#432;&#7901;ng h&#7907;p sau

<p class=MsoNormal style='margin-top:2.0pt;text-align:justify;text-indent:1.0cm'><span

<p class=MsoNormal style='margin-top:2.0pt;text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>b) Th&#7901;i hi&#7879;u x&#7917; ph&#7841;t &#273;&#7889;i

n&#7897;p ho&#7863;c t&#259;ng s&#7889; ti&#7873;n thu&#7871; &#273;&#432;&#7907;c
mi&#7877;n, gi&#7843;m, ho&agrave;n l&agrave; 05 n&#259;m, k&#7875; t&#7915;
ng&agrave;y th&#7921;c hi&#7879;n h&agrave;nh vi vi ph&#7841;m.</span></p>

<p class=MsoNormal style='margin-top:2.0pt;text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>Ng&agrave;y th&#7921;c hi&#7879;n h&agrave;nh vi khai
sai d&#7851;n &#273;&#7871;n thi&#7871;u s&#7889; ti&#7873;n thu&#7871; ph&#7843;i
n&#7897;p ho&#7863;c t&#259;ng s&#7889; ti&#7873;n thu&#7871; &#273;&#432;&#7907;c
mi&#7877;n, gi&#7843;m ho&agrave;n ho&#7863;c h&agrave;nh vi tr&#7889;n thu&#7871;
(tr&#7915; h&agrave;nh vi t&#7841;i &#273;i&#7875;m a kho&#7843;n 1 &#272;i&#7873;u
17 Ngh&#7883; &#273;&#7883;nh n&agrave;y) l&agrave; ng&agrave;y ti&#7871;p theo
ng&agrave;y cu&#7889;i c&ugrave;ng c&#7911;a th&#7901;i h&#7841;n n&#7897;p h&#7891;
s&#417; khai thu&#7871; c&#7911;a k&#7923; t&iacute;nh thu&#7871; m&agrave;
ng&#432;&#7901;i n&#7897;p thu&#7871; th&#7921;c hi&#7879;n khai thi&#7871;u
thu&#7871;, tr&#7889;n thu&#7871; ho&#7863;c ng&agrave;y ti&#7871;p theo
ng&agrave;y c&#417; quan c&oacute; th&#7849;m quy&#7873;n ra quy&#7871;t &#273;&#7883;nh
ho&agrave;n thu&#7871;, mi&#7877;n thu&#7871;, gi&#7843;m thu&#7871;.</span></p>

<p class=MsoNormal style='margin-top:2.0pt;text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>&#272;&#7889;i v&#7899;i h&agrave;nh vi kh&ocirc;ng n&#7897;p
h&#7891; s&#417; &#273;&#259;ng k&yacute; thu&#7871;, kh&ocirc;ng n&#7897;p h&#7891;

17 </a></span><span class=MsoCommentReference><span style='font-size:8.0pt'><![if !supportAnnotations]><a

&#273;&#7883;nh n&agrave;y, ng&agrave;y th&#7921;c hi&#7879;n h&agrave;nh vi vi
ph&#7841;m &#273;&#7875; t&iacute;nh th&#7901;i hi&#7879;u l&agrave;
ng&agrave;y ng&#432;&#7901;i c&oacute; th&#7849;m quy&#7873;n thi h&agrave;nh
c&ocirc;ng v&#7909; ph&aacute;t hi&#7879;n h&agrave;nh vi vi ph&#7841;m. &#272;&#7889;i
v&#7899;i h&agrave;nh vi n&#7897;p h&#7891; s&#417; khai thu&#7871; sau 90
ng&agrave;y quy &#273;&#7883;nh t&#7841;i &#273;i&#7875;m a kho&#7843;n 1
&#272;i&#7873;u 17 Ngh&#7883; &#273;&#7883;nh n&agrave;y th&igrave; ng&agrave;y
th&#7921;c hi&#7879;n h&agrave;nh vi vi ph&#7841;m &#273;&#7875; t&iacute;nh th&#7901;i
hi&#7879;u l&agrave; ng&agrave;y ng&#432;&#7901;i n&#7897;p thu&#7871; n&#7897;p
h&#7891; s&#417; khai thu&#7871;.</span></p>

<p class=MsoNormal style='margin-top:2.0pt;text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>3. &#272;&#7889;i v&#7899;i v&#7909; vi&#7879;c do
c&#417; quan ti&#7871;n h&agrave;nh t&#7889; t&#7909;ng h&igrave;nh s&#7921; th&#7909;
l&yacute;, gi&#7843;i quy&#7871;t, nh&#432;ng sau &#273;&oacute; c&oacute; quy&#7871;t
&#273;&#7883;nh kh&ocirc;ng kh&#7903;i t&#7889; v&#7909; &aacute;n h&igrave;nh
s&#7921;, quy&#7871;t &#273;&#7883;nh h&#7911;y b&#7887; quy&#7871;t &#273;&#7883;nh
kh&#7903;i t&#7889; v&#7909; &aacute;n, quy&#7871;t &#273;&#7883;nh
&#273;&igrave;nh ch&#7881; &#273;i&#7873;u tra ho&#7863;c &#273;&igrave;nh ch&#7881;
v&#7909; &aacute;n n&#7871;u h&agrave;nh vi vi ph&#7841;m c&oacute; d&#7845;u
hi&#7879;u vi ph&#7841;m h&agrave;nh ch&iacute;nh v&#7873; thu&#7871;,
h&oacute;a &#273;&#417;n th&igrave; trong th&#7901;i h&#7841;n 03 ng&agrave;y,
k&#7875; t&#7915; ng&agrave;y ra quy&#7871;t &#273;&#7883;nh, c&#417; quan ti&#7871;n
h&agrave;nh t&#7889; t&#7909;ng h&igrave;nh s&#7921; ph&#7843;i chuy&#7875;n
c&aacute;c quy&#7871;t &#273;&#7883;nh n&ecirc;u tr&ecirc;n k&egrave;m theo h&#7891;
s&#417;, tang v&#7853;t, ph&#432;&#417;ng ti&#7879;n c&#7911;a v&#7909; vi ph&#7841;m
v&agrave; &#273;&#7873; ngh&#7883; x&#7917; ph&#7841;t vi ph&#7841;m
h&agrave;nh ch&iacute;nh &#273;&#7871;n ng&#432;&#7901;i c&oacute; th&#7849;m
quy&#7873;n x&#7917; ph&#7841;t vi ph&#7841;m h&agrave;nh ch&iacute;nh v&#7873;
thu&#7871;, h&oacute;a &#273;&#417;n. Th&#7901;i hi&#7879;u x&#7917; ph&#7841;t
vi ph&#7841;m &aacute;p d&#7909;ng theo quy &#273;&#7883;nh t&#7841;i kho&#7843;n
1, 2 &#272;i&#7873;u n&agrave;y. Th&#7901;i gian c&#417; quan ti&#7871;n
h&agrave;nh t&#7889; t&#7909;ng th&#7909; l&yacute;, xem x&eacute;t
&#273;&#432;&#7907;c t&iacute;nh v&agrave;o th&#7901;i hi&#7879;u x&#7917; ph&#7841;t
vi ph&#7841;m h&agrave;nh ch&iacute;nh.</span></p>

<p class=MsoNormal style='margin-top:2.0pt;text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>4. Trong th&#7901;i h&#7841;n quy &#273;&#7883;nh t&#7841;i
kho&#7843;n 1, 2 &#272;i&#7873;u n&agrave;y m&agrave; t&#7893; ch&#7913;c,
c&aacute; nh&acirc;n c&#7889; t&igrave;nh tr&#7889;n tr&aacute;nh, c&#7843;n tr&#7903;
vi&#7879;c x&#7917; ph&#7841;t th&igrave; th&#7901;i hi&#7879;u x&#7917; ph&#7841;t
vi ph&#7841;m h&agrave;nh ch&iacute;nh &#273;&#432;&#7907;c t&iacute;nh l&#7841;i
k&#7875; t&#7915; th&#7901;i &#273;i&#7875;m ch&#7845;m d&#7913;t h&agrave;nh
vi tr&#7889;n tr&aacute;nh c&#7843;n tr&#7903; vi&#7879;c x&#7917; ph&#7841;t.</span></p>

<p class=MsoNormal style='margin-top:2.0pt;text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>5. Th&#7901;i h&#7841;n &#273;&#432;&#7907;c coi
l&agrave; ch&#432;a b&#7883; x&#7917; ph&#7841;t vi ph&#7841;m h&agrave;nh
ch&iacute;nh v&#7873; thu&#7871;, h&oacute;a &#273;&#417;n</span></p>

<p class=MsoNormal style='margin-top:2.0pt;text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>T&#7893; ch&#7913;c, c&aacute; nh&acirc;n b&#7883; x&#7917;
ph&#7841;t vi ph&#7841;m h&agrave;nh ch&iacute;nh v&#7873; thu&#7871;,
h&oacute;a &#273;&#417;n n&#7871;u trong th&#7901;i h&#7841;n 06 th&aacute;ng,
k&#7875; t&#7915; ng&agrave;y ch&#7845;p h&agrave;nh xong quy&#7871;t &#273;&#7883;nh
x&#7917; ph&#7841;t c&#7843;nh c&aacute;o ho&#7863;c 01 n&#259;m k&#7875; t&#7915;
ng&agrave;y ch&#7845;p h&agrave;nh xong quy&#7871;t &#273;&#7883;nh x&#7917; ph&#7841;t
h&agrave;nh ch&iacute;nh kh&aacute;c ho&#7863;c k&#7875; t&#7915; ng&agrave;y h&#7871;t
th&#7901;i hi&#7879;u thi h&agrave;nh quy&#7871;t &#273;&#7883;nh x&#7917; ph&#7841;t
m&agrave; kh&ocirc;ng t&aacute;i ph&#7841;m th&igrave; &#273;&#432;&#7907;c coi
l&agrave; ch&#432;a b&#7883; x&#7917; ph&#7841;t vi ph&#7841;m h&agrave;nh
ch&iacute;nh v&#7873; h&agrave;nh vi &#273;&oacute;.</span></p>

<p class=MsoNormal style='margin-top:2.0pt;text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>Ng&agrave;y ch&#7845;p h&agrave;nh xong quy&#7871;t
&#273;&#7883;nh x&#7917; ph&#7841;t c&#7843;nh c&aacute;o l&agrave; ng&agrave;y
quy&#7871;t &#273;&#7883;nh x&#7917; ph&#7841;t vi ph&#7841;m h&agrave;nh
ch&iacute;nh &#273;&#432;&#7907;c giao, g&#7917;i cho t&#7893; ch&#7913;c,
c&aacute; nh&acirc;n b&#7883; x&#7917; ph&#7841;t theo quy &#273;&#7883;nh t&#7841;i
&#272;i&#7873;u 39 Ngh&#7883; &#273;&#7883;nh n&agrave;y.</span></p>

<p class=MsoNormal style='margin-top:2.0pt;text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>6. Th&#7901;i h&#7841;n truy thu thu&#7871;</span></p>

<p class=MsoNormal style='margin-top:2.0pt;text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>a) Qu&aacute; th&#7901;i hi&#7879;u x&#7917; ph&#7841;t
vi ph&#7841;m h&agrave;nh ch&iacute;nh v&#7873; thu&#7871; th&igrave; ng&#432;&#7901;i
n&#7897;p thu&#7871; kh&ocirc;ng b&#7883; x&#7917; ph&#7841;t nh&#432;ng v&#7851;n
ph&#7843;i n&#7897;p &#273;&#7911; ti&#7873;n thu&#7871; truy thu (s&#7889; ti&#7873;n
thu&#7871; thi&#7871;u, s&#7889; ti&#7873;n thu&#7871; tr&#7889;n, s&#7889; ti&#7873;n
thu&#7871; &#273;&#432;&#7907;c mi&#7877;n, gi&#7843;m, ho&agrave;n cao
h&#417;n quy &#273;&#7883;nh, ti&#7873;n ch&#7853;m n&#7897;p ti&#7873;n thu&#7871;)
v&agrave;o ng&acirc;n s&aacute;ch nh&agrave; n&#432;&#7899;c trong th&#7901;i h&#7841;n
m&#432;&#7901;i n&#259;m tr&#7903; v&#7873; tr&#432;&#7899;c, k&#7875; t&#7915;
ng&agrave;y ph&aacute;t hi&#7879;n h&agrave;nh vi vi ph&#7841;m. Tr&#432;&#7901;ng
h&#7907;p ng&#432;&#7901;i n&#7897;p thu&#7871; kh&ocirc;ng &#273;&#259;ng
k&yacute; thu&#7871; th&igrave; ph&#7843;i n&#7897;p &#273;&#7911; s&#7889; ti&#7873;n
thu&#7871; thi&#7871;u, s&#7889; ti&#7873;n thu&#7871; tr&#7889;n, ti&#7873;n
ch&#7853;m n&#7897;p ti&#7873;n thu&#7871; cho to&agrave;n b&#7897; th&#7901;i
gian tr&#7903; v&#7873; tr&#432;&#7899;c, k&#7875; t&#7915; ng&agrave;y
ph&aacute;t hi&#7879;n h&agrave;nh vi vi ph&#7841;m.</span></p>

<p class=MsoNormal style='margin-top:2.0pt;text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>b) Th&#7901;i h&#7841;n truy thu thu&#7871; t&#7841;i
&#273;i&#7875;m a kho&#7843;n n&agrave;y ch&#7881; &aacute;p d&#7909;ng &#273;&#7889;i
v&#7899;i c&aacute;c kho&#7843;n thu&#7871; theo ph&aacute;p lu&#7853;t v&#7873;
thu&#7871; v&agrave; kho&#7843;n thu kh&aacute;c do t&#7893; ch&#7913;c,
c&aacute; nh&acirc;n t&#7921; khai, t&#7921; n&#7897;p v&agrave;o ng&acirc;n
s&aacute;ch nh&agrave; n&#432;&#7899;c.</span></p>

<p class=MsoNormal style='margin-top:2.0pt;text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>&#272;&#7889;i v&#7899;i c&aacute;c kho&#7843;n thu t&#7915;
&#273;&#7845;t &#273;ai ho&#7863;c kho&#7843;n thu kh&aacute;c do c&#417; quan
c&oacute; th&#7849;m quy&#7873;n x&aacute;c &#273;&#7883;nh ngh&#297;a v&#7909;
t&agrave;i ch&iacute;nh c&#7911;a t&#7893; ch&#7913;c, c&aacute; nh&acirc;n

<p class=MsoNormal style='margin-top:2.0pt;text-align:justify;text-indent:1.0cm'><span

<p class=MsoNormal style='margin-top:2.0pt;text-align:justify;text-indent:1.0cm'><span

quy&#7871;t to&aacute;n thu&#7871; thu nh&#7853;p c&aacute; nh&acirc;n
&#273;&#432;&#7907;c c&#7845;p th&#7867; c&#259;n c&#432;&#7899;c c&ocirc;ng
d&acirc;n;</span></p>

<p class=MsoNormal style='margin-top:2.0pt;text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>c) Th&ocirc;ng b&aacute;o thay &#273;&#7893;i
th&ocirc;ng tin tr&ecirc;n h&#7891; s&#417; &#273;&#259;ng k&yacute; thu&#7871;
v&#7873; &#273;&#7883;a ch&#7881; ng&#432;&#7901;i n&#7897;p thu&#7871;

Ngh&#7883; quy&#7871;t c&#7911;a Qu&#7889;c h&#7897;i.</span></p>

<p class=MsoNormal style='margin-top:2.0pt;text-align:justify;text-indent:1.0cm'><span

&#273;&#259;ng k&yacute; thu&#7871; theo th&ocirc;ng b&aacute;o c&#7911;a

<p class=MsoNormal style='margin-top:2.0pt;text-align:justify;text-indent:1.0cm'><span

<p class=MsoNormal style='margin-top:2.0pt;text-align:justify;text-indent:1.0cm'><span

<p class=MsoNormal style='margin-top:2.0pt;text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>a) Kh&ocirc;ng cung c&#7845;p ho&#7863;c cung c&#7845;p
kh&ocirc;ng &#273;&#7847;y &#273;&#7911;, kh&ocirc;ng ch&iacute;nh x&aacute;c
c&aacute;c th&ocirc;ng tin, t&agrave;i li&#7879;u, ch&#7913;ng t&#7915;,
h&oacute;a &#273;&#417;n, s&#7893; k&#7871; to&aacute;n li&ecirc;n quan &#273;&#7871;n

ngh&#297;a v&#7909; thu&#7871; ph&#7843;i &#273;&#259;ng k&yacute; theo quy
&#273;&#7883;nh nh&#432;ng kh&ocirc;ng l&agrave;m gi&#7843;m ngh&#297;a v&#7909;
thu&#7871; v&#7899;i ng&acirc;n s&aacute;ch nh&agrave; n&#432;&#7899;c;</span></p>

Nh&agrave; n&#432;&#7899;c, c&ocirc;ng n&#7907; b&ecirc;n th&#7913; ba

<p class=MsoNormal style='margin-top:2.0pt;text-align:justify;text-indent:1.0cm'><span

<p class=MsoNormal style='margin-top:2.0pt;text-align:justify;text-indent:1.0cm'><span

<p class=MsoNormal style='margin-top:2.0pt;text-align:justify;text-indent:1.0cm'><span

&#273;&#7883;nh ngh&#297;a v&#7909; thu&#7871; theo y&ecirc;u c&#7847;u c&#7911;a

thu&#7871;;</span></p>

<p class=MsoNormal style='margin-top:2.0pt;text-align:justify;text-indent:1.0cm'><span

<p class=MsoNormal style='margin-top:2.0pt;text-align:justify;text-indent:1.0cm'><span

<p class=MsoNormal style='margin-top:2.0pt;text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>c) T&#7921; &yacute; th&aacute;o b&#7887;, thay &#273;&#7893;i

&#273;&atilde; t&#7841;o l&#7853;p h&#7907;p ph&aacute;p.</span></p>

<p class=MsoNormal style='margin-top:2.0pt;text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>3. Bi&#7879;n ph&aacute;p kh&#7855;c ph&#7909;c h&#7853;u

&#273;&#7883;nh ngh&#297;a v&#7909; thu&#7871; &#273;&#7889;i v&#7899;i

<h2><a name="dieu_16"></a><a name="_Toc114664891"></a><b
style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>1. Ph&#7841;t 20% s&#7889; ti&#7873;n thu&#7871; khai
thi&#7871;u ho&#7863;c s&#7889; ti&#7873;n thu&#7871; &#273;&atilde;
&#273;&#432;&#7907;c mi&#7877;n, gi&#7843;m, ho&agrave;n cao h&#417;n so v&#7899;i
quy &#273;&#7883;nh &#273;&#7889;i v&#7899;i m&#7897;t trong c&aacute;c
h&agrave;nh vi sau &#273;&acirc;y:</span></p>

<p class=MsoNormal style='margin-top:2.0pt;text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>a) Khai sai c&#259;n c&#7913; t&iacute;nh thu&#7871;
ho&#7863;c s&#7889; ti&#7873;n thu&#7871; &#273;&#432;&#7907;c kh&#7845;u tr&#7915;
ho&#7863;c x&aacute;c &#273;&#7883;nh sai tr&#432;&#7901;ng h&#7907;p
&#273;&#432;&#7907;c mi&#7877;n, gi&#7843;m, ho&agrave;n thu&#7871; d&#7851;n
&#273;&#7871;n thi&#7871;u s&#7889; ti&#7873;n thu&#7871; ph&#7843;i n&#7897;p
ho&#7863;c t&#259;ng s&#7889; ti&#7873;n thu&#7871; &#273;&#432;&#7907;c mi&#7877;n,
gi&#7843;m, ho&agrave;n nh&#432;ng c&aacute;c nghi&#7879;p v&#7909; kinh t&#7871;
&#273;&atilde; &#273;&#432;&#7907;c ph&#7843;n &aacute;nh &#273;&#7847;y &#273;&#7911;
tr&ecirc;n h&#7879; th&#7889;ng s&#7893; k&#7871; to&aacute;n, h&oacute;a
&#273;&#417;n, ch&#7913;ng t&#7915; h&#7907;p ph&aacute;p;</span></p>

<p class=MsoNormal style='margin-top:2.0pt;text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>b) Khai sai l&agrave;m gi&#7843;m s&#7889; ti&#7873;n
thu&#7871; ph&#7843;i n&#7897;p ho&#7863;c t&#259;ng s&#7889; ti&#7873;n thu&#7871;
&#273;&#432;&#7907;c ho&agrave;n, s&#7889; ti&#7873;n thu&#7871; &#273;&#432;&#7907;c
mi&#7877;n, gi&#7843;m kh&ocirc;ng thu&#7897;c tr&#432;&#7901;ng h&#7907;p quy
&#273;&#7883;nh t&#7841;i &#273;i&#7875;m a kho&#7843;n n&agrave;y nh&#432;ng
ng&#432;&#7901;i n&#7897;p thu&#7871; &#273;&atilde; t&#7921; gi&aacute;c
k&ecirc; khai b&#7893; sung v&agrave; n&#7897;p &#273;&#7911; s&#7889; ti&#7873;n
thu&#7871; thi&#7871;u v&agrave;o ng&acirc;n s&aacute;ch nh&agrave; n&#432;&#7899;c
tr&#432;&#7899;c th&#7901;i &#273;i&#7875;m c&#417; quan thu&#7871; k&#7871;t
th&uacute;c th&#7901;i h&#7841;n thanh tra, ki&#7875;m tra thu&#7871; t&#7841;i
tr&#7909; s&#7903; ng&#432;&#7901;i n&#7897;p thu&#7871;;</span></p>

<p class=MsoNormal style='margin-top:2.0pt;text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>c) Khai sai l&agrave;m gi&#7843;m s&#7889; ti&#7873;n
thu&#7871; ph&#7843;i n&#7897;p ho&#7863;c t&#259;ng s&#7889; ti&#7873;n thu&#7871;
&#273;&#432;&#7907;c ho&agrave;n, s&#7889; thu&#7871; &#273;&#432;&#7907;c mi&#7877;n,
gi&#7843;m &#273;&atilde; b&#7883; c&#417; quan c&oacute; th&#7849;m quy&#7873;n
l&#7853;p bi&ecirc;n b&#7843;n thanh tra, ki&#7875;m tra thu&#7871;, bi&ecirc;n
b&#7843;n vi ph&#7841;m h&agrave;nh ch&iacute;nh x&aacute;c &#273;&#7883;nh
l&agrave; h&agrave;nh vi tr&#7889;n thu&#7871; nh&#432;ng ng&#432;&#7901;i n&#7897;p
thu&#7871; vi ph&#7841;m h&agrave;nh ch&iacute;nh l&#7847;n &#273;&#7847;u v&#7873;
h&agrave;nh vi tr&#7889;n thu&#7871;, &#273;&atilde; khai b&#7893; sung
v&agrave; n&#7897;p &#273;&#7911; s&#7889; ti&#7873;n thu&#7871; v&agrave;o
ng&acirc;n s&aacute;ch nh&agrave; n&#432;&#7899;c tr&#432;&#7899;c th&#7901;i
&#273;i&#7875;m c&#417; quan c&oacute; th&#7849;m quy&#7873;n ra quy&#7871;t
&#273;&#7883;nh x&#7917; ph&#7841;t v&agrave; c&#417; quan thu&#7871;
&#273;&atilde; l&#7853;p bi&ecirc;n b&#7843;n ghi nh&#7853;n &#273;&#7875;
x&aacute;c &#273;&#7883;nh l&agrave; h&agrave;nh vi khai sai d&#7851;n &#273;&#7871;n
thi&#7871;u thu&#7871;;</span></p>

<p class=MsoNormal style='margin-top:2.0pt;text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>d) Khai sai d&#7851;n &#273;&#7871;n thi&#7871;u s&#7889;
ti&#7873;n thu&#7871; ph&#7843;i n&#7897;p ho&#7863;c t&#259;ng s&#7889; ti&#7873;n
thu&#7871; &#273;&#432;&#7907;c mi&#7877;n, gi&#7843;m, ho&agrave;n &#273;&#7889;i
v&#7899;i giao d&#7883;ch li&ecirc;n k&#7871;t nh&#432;ng ng&#432;&#7901;i n&#7897;p
thu&#7871; &#273;&atilde; l&#7853;p h&#7891; s&#417; x&aacute;c &#273;&#7883;nh
gi&aacute; th&#7883; tr&#432;&#7901;ng ho&#7863;c &#273;&atilde; l&#7853;p
v&agrave; g&#7917;i c&#417; quan thu&#7871; c&aacute;c ph&#7909; l&#7909;c theo
quy &#273;&#7883;nh v&#7873; qu&#7843;n l&yacute; thu&#7871; &#273;&#7889;i v&#7899;i
doanh nghi&#7879;p c&oacute; giao d&#7883;ch li&ecirc;n k&#7871;t;</span></p>

<p class=MsoNormal style='margin-top:2.0pt;text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>&#273;) S&#7917; d&#7909;ng h&oacute;a &#273;&#417;n,
ch&#7913;ng t&#7915; kh&ocirc;ng h&#7907;p ph&aacute;p &#273;&#7875; h&#7841;ch
to&aacute;n gi&aacute; tr&#7883; h&agrave;ng h&oacute;a, d&#7883;ch v&#7909;
mua v&agrave;o l&agrave;m gi&#7843;m s&#7889; ti&#7873;n thu&#7871; ph&#7843;i
n&#7897;p ho&#7863;c l&agrave;m t&#259;ng s&#7889; ti&#7873;n thu&#7871;
&#273;&#432;&#7907;c ho&agrave;n, s&#7889; ti&#7873;n thu&#7871; &#273;&#432;&#7907;c
mi&#7877;n, gi&#7843;m nh&#432;ng khi c&#417; quan thu&#7871; thanh tra, ki&#7875;m
tra ph&aacute;t hi&#7879;n, ng&#432;&#7901;i mua ch&#7913;ng minh &#273;&#432;&#7907;c
l&#7895;i vi ph&#7841;m s&#7917; d&#7909;ng h&oacute;a &#273;&#417;n, ch&#7913;ng
t&#7915; kh&ocirc;ng h&#7907;p ph&aacute;p thu&#7897;c v&#7873; b&ecirc;n
b&aacute;n h&agrave;ng v&agrave; ng&#432;&#7901;i mua &#273;&atilde; h&#7841;ch
to&aacute;n k&#7871; to&aacute;n &#273;&#7847;y &#273;&#7911; theo quy &#273;&#7883;nh.</span></p>

<p class=MsoNormal style='margin-top:2.0pt;text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>2. Bi&#7879;n ph&aacute;p kh&#7855;c ph&#7909;c h&#7853;u
qu&#7843;:</span></p>

<p class=MsoNormal style='margin-top:2.0pt;text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>a) Bu&#7897;c n&#7897;p &#273;&#7911; s&#7889; ti&#7873;n
thu&#7871; thi&#7871;u, s&#7889; ti&#7873;n thu&#7871; &#273;&#432;&#7907;c
ho&agrave;n, mi&#7877;n, gi&#7843;m cao h&#417;n quy &#273;&#7883;nh v&agrave;
ti&#7873;n ch&#7853;m n&#7897;p ti&#7873;n thu&#7871; v&agrave;o ng&acirc;n
s&aacute;ch nh&agrave; n&#432;&#7899;c &#273;&#7889;i v&#7899;i h&agrave;nh vi
quy &#273;&#7883;nh t&#7841;i kho&#7843;n 1 &#272;i&#7873;u n&agrave;y.</span></p>

<p class=MsoNormal style='margin-top:2.0pt;text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>Tr&#432;&#7901;ng h&#7907;p &#273;&atilde; qu&aacute;
th&#7901;i hi&#7879;u x&#7917; ph&#7841;t th&igrave; ng&#432;&#7901;i n&#7897;p
thu&#7871; kh&ocirc;ng b&#7883; x&#7917; ph&#7841;t theo quy &#273;&#7883;nh t&#7841;i
kho&#7843;n 1 &#272;i&#7873;u n&agrave;y nh&#432;ng ng&#432;&#7901;i n&#7897;p
thu&#7871; ph&#7843;i n&#7897;p &#273;&#7911; s&#7889; ti&#7873;n thu&#7871;
thi&#7871;u, s&#7889; ti&#7873;n thu&#7871; &#273;&#432;&#7907;c ho&agrave;n,
mi&#7877;n, gi&#7843;m cao h&#417;n quy &#273;&#7883;nh v&agrave; ti&#7873;n ch&#7853;m
n&#7897;p ti&#7873;n thu&#7871; v&agrave;o ng&acirc;n s&aacute;ch nh&agrave;
n&#432;&#7899;c theo th&#7901;i h&#7841;n quy &#273;&#7883;nh t&#7841;i kho&#7843;n
6 &#272;i&#7873;u 8 Ngh&#7883; &#273;&#7883;nh n&agrave;y;</span></p>

<p class=MsoNormal style='margin-top:2.0pt;text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>b) Bu&#7897;c &#273;i&#7873;u ch&#7881;nh l&#7841;i s&#7889;
l&#7895;, s&#7889; thu&#7871; gi&aacute; tr&#7883; gia t&#259;ng &#273;&#7847;u
v&agrave;o &#273;&#432;&#7907;c kh&#7845;u tr&#7915; chuy&#7875;n k&#7923; sau
(n&#7871;u c&oacute;) &#273;&#7889;i v&#7899;i h&agrave;nh vi quy &#273;&#7883;nh
t&#7841;i kho&#7843;n 1 &#272;i&#7873;u n&agrave;y.</span></p>

<p class=MsoNormal style='margin-top:2.0pt;text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>3. Tr&#432;&#7901;ng h&#7907;p ng&#432;&#7901;i n&#7897;p
thu&#7871; c&oacute; h&agrave;nh vi khai sai theo quy &#273;&#7883;nh t&#7841;i
&#273;i&#7875;m a, b, d kho&#7843;n 1 &#272;i&#7873;u n&agrave;y nh&#432;ng
kh&ocirc;ng d&#7851;n &#273;&#7871;n thi&#7871;u s&#7889; thu&#7871; ph&#7843;i
n&#7897;p, t&#259;ng s&#7889; thu&#7871; &#273;&#432;&#7907;c mi&#7877;n, gi&#7843;m
ho&#7863;c ch&#432;a &#273;&#432;&#7907;c ho&agrave;n thu&#7871; th&igrave;
kh&ocirc;ng b&#7883; x&#7917; ph&#7841;t theo quy &#273;&#7883;nh t&#7841;i
&#272;i&#7873;u n&agrave;y m&agrave; x&#7917; ph&#7841;t theo quy &#273;&#7883;nh
t&#7841;i kho&#7843;n 3 &#272;i&#7873;u 12 Ngh&#7883; &#273;&#7883;nh
n&agrave;y.</span></p>

<h2><a name="dieu_17"></a><a name="_Toc114664892"></a><b style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>1. Ph&#7841;t ti&#7873;n 1 l&#7847;n s&#7889; thu&#7871;

<p class=MsoNormal style='margin-top:2.0pt;text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>a) Kh&ocirc;ng n&#7897;p h&#7891; s&#417;
&#273;&#259;ng k&yacute; thu&#7871;; kh&ocirc;ng n&#7897;p h&#7891; s&#417;
khai thu&#7871; ho&#7863;c n&#7897;p h&#7891; s&#417; khai thu&#7871; sau 90
ng&agrave;y, k&#7875; t&#7915; ng&agrave;y h&#7871;t th&#7901;i h&#7841;n n&#7897;p
h&#7891; s&#417; khai thu&#7871; ho&#7863;c k&#7875; t&#7915; ng&agrave;y h&#7871;t
th&#7901;i h&#7841;n gia h&#7841;n n&#7897;p h&#7891; s&#417; khai thu&#7871;,
tr&#7915; tr&#432;&#7901;ng h&#7907;p quy &#273;&#7883;nh t&#7841;i &#273;i&#7875;m
b, c kho&#7843;n 4 v&agrave; kho&#7843;n 5 &#272;i&#7873;u 13 Ngh&#7883; &#273;&#7883;nh
n&agrave;y;</span></p>

<p class=MsoNormal style='margin-top:2.0pt;text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>b) Kh&ocirc;ng ghi ch&eacute;p trong s&#7893; k&#7871;
to&aacute;n c&aacute;c kho&#7843;n thu li&ecirc;n quan &#273;&#7871;n vi&#7879;c
x&aacute;c &#273;&#7883;nh s&#7889; ti&#7873;n thu&#7871; ph&#7843;i n&#7897;p,
kh&ocirc;ng khai, khai sai d&#7851;n &#273;&#7871;n thi&#7871;u s&#7889; ti&#7873;n
thu&#7871; ph&#7843;i n&#7897;p ho&#7863;c t&#259;ng s&#7889; ti&#7873;n thu&#7871;
&#273;&#432;&#7907;c ho&agrave;n, &#273;&#432;&#7907;c mi&#7877;n, gi&#7843;m
thu&#7871;, tr&#7915; h&agrave;nh vi quy &#273;&#7883;nh t&#7841;i &#272;i&#7873;u
16 Ngh&#7883; &#273;&#7883;nh n&agrave;y;</span></p>

<p class=MsoNormal style='margin-top:2.0pt;text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>c) Kh&ocirc;ng l&#7853;p h&oacute;a &#273;&#417;n khi
b&aacute;n h&agrave;ng h&oacute;a, d&#7883;ch v&#7909;, tr&#7915; tr&#432;&#7901;ng
h&#7907;p ng&#432;&#7901;i n&#7897;p thu&#7871; &#273;&atilde; khai thu&#7871;
&#273;&#7889;i v&#7899;i gi&aacute; tr&#7883; h&agrave;ng h&oacute;a, d&#7883;ch
v&#7909; &#273;&atilde; b&aacute;n, &#273;&atilde; cung &#7913;ng v&agrave;o k&#7923;
t&iacute;nh thu&#7871; t&#432;&#417;ng &#7913;ng; l&#7853;p h&oacute;a
&#273;&#417;n b&aacute;n h&agrave;ng h&oacute;a, d&#7883;ch v&#7909; sai v&#7873;
s&#7889; l&#432;&#7907;ng, gi&aacute; tr&#7883; h&agrave;ng h&oacute;a, d&#7883;ch
v&#7909; &#273;&#7875; khai thu&#7871; th&#7845;p h&#417;n th&#7921;c t&#7871;
v&agrave; b&#7883; ph&aacute;t hi&#7879;n sau th&#7901;i h&#7841;n n&#7897;p h&#7891;
s&#417; khai thu&#7871;;</span></p>

<p class=MsoNormal style='margin-top:2.0pt;text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>d) S&#7917; d&#7909;ng h&oacute;a &#273;&#417;n
kh&ocirc;ng h&#7907;p ph&aacute;p; s&#7917; d&#7909;ng kh&ocirc;ng h&#7907;p
ph&aacute;p h&oacute;a &#273;&#417;n &#273;&#7875; khai thu&#7871; l&agrave;m
gi&#7843;m s&#7889; thu&#7871; ph&#7843;i n&#7897;p ho&#7863;c t&#259;ng s&#7889;
ti&#7873;n thu&#7871; &#273;&#432;&#7907;c ho&agrave;n, s&#7889; ti&#7873;n thu&#7871;
&#273;&#432;&#7907;c mi&#7877;n, gi&#7843;m;</span></p>

<p class=MsoNormal style='margin-top:2.0pt;text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>&#273;) S&#7917; d&#7909;ng ch&#7913;ng t&#7915;
kh&ocirc;ng h&#7907;p ph&aacute;p; s&#7917; d&#7909;ng kh&ocirc;ng h&#7907;p
ph&aacute;p ch&#7913;ng t&#7915;; s&#7917; d&#7909;ng ch&#7913;ng t&#7915;,
t&agrave;i li&#7879;u kh&ocirc;ng ph&#7843;n &aacute;nh &#273;&uacute;ng b&#7843;n
ch&#7845;t giao d&#7883;ch ho&#7863;c gi&aacute; tr&#7883; giao d&#7883;ch th&#7921;c
t&#7871; &#273;&#7875; x&aacute;c &#273;&#7883;nh sai s&#7889; ti&#7873;n thu&#7871;
ph&#7843;i n&#7897;p, s&#7889; ti&#7873;n thu&#7871; &#273;&#432;&#7907;c mi&#7877;n,
gi&#7843;m, s&#7889; ti&#7873;n thu&#7871; &#273;&#432;&#7907;c ho&agrave;n; l&#7853;p
th&#7911; t&#7909;c, h&#7891; s&#417; h&#7911;y v&#7853;t t&#432;, h&agrave;ng
h&oacute;a kh&ocirc;ng &#273;&uacute;ng th&#7921;c t&#7871; l&agrave;m gi&#7843;m
s&#7889; thu&#7871; ph&#7843;i n&#7897;p ho&#7863;c l&agrave;m t&#259;ng s&#7889;
thu&#7871; &#273;&#432;&#7907;c ho&agrave;n, &#273;&#432;&#7907;c mi&#7877;n,
gi&#7843;m;</span></p>

<p class=MsoNormal style='margin-top:2.0pt;text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>e) S&#7917; d&#7909;ng h&agrave;ng h&oacute;a thu&#7897;c
&#273;&#7889;i t&#432;&#7907;ng kh&ocirc;ng ch&#7883;u thu&#7871;, mi&#7877;n
thu&#7871;, x&eacute;t mi&#7877;n thu&#7871; kh&ocirc;ng &#273;&uacute;ng m&#7909;c
&#273;&iacute;ch quy &#273;&#7883;nh m&agrave; kh&ocirc;ng khai b&aacute;o vi&#7879;c
chuy&#7875;n &#273;&#7893;i m&#7909;c &#273;&iacute;ch s&#7917; d&#7909;ng,
khai thu&#7871; v&#7899;i c&#417; quan thu&#7871;;</span></p>

<p class=MsoNormal style='margin-top:2.0pt;text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>g) Ng&#432;&#7901;i n&#7897;p thu&#7871; c&oacute; ho&#7841;t
&#273;&#7897;ng kinh doanh trong th&#7901;i gian xin ng&#7915;ng, t&#7841;m ng&#7915;ng
ho&#7841;t &#273;&#7897;ng kinh doanh nh&#432;ng kh&ocirc;ng th&ocirc;ng
b&aacute;o v&#7899;i c&#417; quan thu&#7871;, tr&#7915; tr&#432;&#7901;ng h&#7907;p
quy &#273;&#7883;nh t&#7841;i &#273;i&#7875;m b kho&#7843;n 4 &#272;i&#7873;u
10 Ngh&#7883; &#273;&#7883;nh n&agrave;y.</span></p>

<p class=MsoNormal style='margin-top:2.0pt;text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>2. Ph&#7841;t ti&#7873;n 1,5 l&#7847;n s&#7889; ti&#7873;n
thu&#7871; tr&#7889;n &#273;&#7889;i v&#7899;i ng&#432;&#7901;i n&#7897;p thu&#7871;
th&#7921;c hi&#7879;n m&#7897;t trong c&aacute;c h&agrave;nh vi quy &#273;&#7883;nh
t&#7841;i kho&#7843;n 1 &#272;i&#7873;u n&agrave;y m&agrave; kh&ocirc;ng
c&oacute; t&igrave;nh ti&#7871;t t&#259;ng n&#7863;ng, gi&#7843;m nh&#7865;.</span></p>

<p class=MsoNormal style='margin-top:2.0pt;text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>3. Ph&#7841;t ti&#7873;n 2 l&#7847;n s&#7889; thu&#7871;
tr&#7889;n &#273;&#7889;i v&#7899;i ng&#432;&#7901;i n&#7897;p thu&#7871; th&#7921;c
hi&#7879;n m&#7897;t trong c&aacute;c h&agrave;nh vi quy &#273;&#7883;nh t&#7841;i
kho&#7843;n 1 &#272;i&#7873;u n&agrave;y m&agrave; c&oacute; m&#7897;t
t&igrave;nh ti&#7871;t t&#259;ng n&#7863;ng.</span></p>

<p class=MsoNormal style='margin-top:2.0pt;text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>4. Ph&#7841;t ti&#7873;n 2,5 l&#7847;n s&#7889; ti&#7873;n
thu&#7871; tr&#7889;n &#273;&#7889;i v&#7899;i ng&#432;&#7901;i n&#7897;p thu&#7871;
th&#7921;c hi&#7879;n m&#7897;t trong c&aacute;c h&agrave;nh vi quy &#273;&#7883;nh
t&#7841;i kho&#7843;n 1 &#272;i&#7873;u n&agrave;y c&oacute; hai t&igrave;nh ti&#7871;t
t&#259;ng n&#7863;ng.</span></p>

<p class=MsoNormal style='margin-top:2.0pt;text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>5. Ph&#7841;t ti&#7873;n 3 l&#7847;n s&#7889; ti&#7873;n
thu&#7871; tr&#7889;n &#273;&#7889;i v&#7899;i ng&#432;&#7901;i n&#7897;p thu&#7871;
th&#7921;c hi&#7879;n m&#7897;t trong c&aacute;c h&agrave;nh vi quy &#273;&#7883;nh
t&#7841;i kho&#7843;n 1 &#272;i&#7873;u n&agrave;y c&oacute; t&#7915; ba
t&igrave;nh ti&#7871;t t&#259;ng n&#7863;ng tr&#7903; l&ecirc;n.</span></p>

<p class=MsoNormal style='margin-top:2.0pt;text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>6. Bi&#7879;n ph&aacute;p kh&#7855;c ph&#7909;c h&#7853;u
qu&#7843;:</span></p>

<p class=MsoNormal style='margin-top:2.0pt;text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>a) Bu&#7897;c n&#7897;p &#273;&#7911; s&#7889; ti&#7873;n
thu&#7871; tr&#7889;n v&agrave;o ng&acirc;n s&aacute;ch nh&agrave; n&#432;&#7899;c
&#273;&#7889;i v&#7899;i c&aacute;c h&agrave;nh vi vi ph&#7841;m quy &#273;&#7883;nh
t&#7841;i c&aacute;c kho&#7843;n 1, 2, 3, 4, 5 &#272;i&#7873;u n&agrave;y.</span></p>

<p class=MsoNormal style='margin-top:2.0pt;text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>Tr&#432;&#7901;ng h&#7907;p h&agrave;nh vi tr&#7889;n
thu&#7871; theo quy &#273;&#7883;nh t&#7841;i c&aacute;c kho&#7843;n 1, 2, 3
,4, 5 &#272;i&#7873;u n&agrave;y &#273;&atilde; qu&aacute; th&#7901;i hi&#7879;u
x&#7917; ph&#7841;t th&igrave; ng&#432;&#7901;i n&#7897;p thu&#7871;
kh&ocirc;ng b&#7883; x&#7917; ph&#7841;t v&#7873; h&agrave;nh vi tr&#7889;n thu&#7871;
nh&#432;ng ng&#432;&#7901;i n&#7897;p thu&#7871; ph&#7843;i n&#7897;p &#273;&#7911;
s&#7889; ti&#7873;n thu&#7871; tr&#7889;n, ti&#7873;n ch&#7853;m n&#7897;p
t&iacute;nh tr&ecirc;n s&#7889; ti&#7873;n thu&#7871; tr&#7889;n v&agrave;o
ng&acirc;n s&aacute;ch nh&agrave; n&#432;&#7899;c theo th&#7901;i h&#7841;n quy
&#273;&#7883;nh t&#7841;i kho&#7843;n 6 &#272;i&#7873;u 8 Ngh&#7883; &#273;&#7883;nh
n&agrave;y.</span></p>

<p class=MsoNormal style='margin-top:2.0pt;text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>b) Bu&#7897;c &#273;i&#7873;u ch&#7881;nh l&#7841;i s&#7889;
l&#7895;, s&#7889; thu&#7871; gi&aacute; tr&#7883; gia t&#259;ng &#273;&#7847;u
v&agrave;o &#273;&#432;&#7907;c kh&#7845;u tr&#7915; tr&ecirc;n h&#7891;
s&#417; thu&#7871; (n&#7871;u c&oacute;) &#273;&#7889;i v&#7899;i h&agrave;nh
vi quy &#273;&#7883;nh t&#7841;i kho&#7843;n 1, 2, 3, 4, 5 &#272;i&#7873;u
n&agrave;y.</span></p>

<p class=MsoNormal style='margin-top:2.0pt;text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>7. C&aacute;c h&agrave;nh vi vi ph&#7841;m quy &#273;&#7883;nh
t&#7841;i &#273;i&#7875;m b, &#273;, e kho&#7843;n 1 &#272;i&#7873;u n&agrave;y
b&#7883; ph&aacute;t hi&#7879;n sau th&#7901;i h&#7841;n n&#7897;p h&#7891;
s&#417; khai thu&#7871; nh&#432;ng kh&ocirc;ng l&agrave;m gi&#7843;m s&#7889;
ti&#7873;n thu&#7871; ph&#7843;i n&#7897;p ho&#7863;c ch&#432;a &#273;&#432;&#7907;c
ho&agrave;n thu&#7871;, kh&ocirc;ng l&agrave;m t&#259;ng s&#7889; ti&#7873;n
thu&#7871; &#273;&#432;&#7907;c mi&#7877;n, gi&#7843;m th&igrave; b&#7883; x&#7917;
ph&#7841;t vi ph&#7841;m h&agrave;nh ch&iacute;nh theo quy &#273;&#7883;nh t&#7841;i
kho&#7843;n 3 &#272;i&#7873;u 12 Ngh&#7883; &#273;&#7883;nh n&agrave;y.</span></p>

<p class=MsoNormal style='margin-top:2.0pt;text-align:justify;text-indent:1.0cm'></p>

<h3><a name="muc_2"></a><a name="_Toc114664893"></a><b
style='"dieu_18"></a><a name="_Toc114664894"></a><b style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>1. Ph&#7841;t ti&#7873;n t&#432;&#417;ng &#7913;ng v&#7899;i
s&#7889; ti&#7873;n thu&#7871;, ti&#7873;n ch&#7853;m n&#7897;p, ti&#7873;n ph&#7841;t
kh&ocirc;ng tr&iacute;ch chuy&#7875;n v&agrave;o t&agrave;i kho&#7843;n c&#7911;a
ng&acirc;n s&aacute;ch nh&agrave; n&#432;&#7899;c (tr&#7915; s&#7889; d&#432; t&#7889;i
thi&#7875;u tr&ecirc;n t&agrave;i kho&#7843;n thanh to&aacute;n theo quy &#273;&#7883;nh
c&#7911;a ng&acirc;n h&agrave;ng th&#432;&#417;ng m&#7841;i cung &#7913;ng d&#7883;ch
v&#7909; thanh to&aacute;n cho ng&#432;&#7901;i n&#7897;p thu&#7871;) &#273;&#7889;i
v&#7899;i ng&acirc;n h&agrave;ng th&#432;&#417;ng m&#7841;i kh&ocirc;ng th&#7921;c
hi&#7879;n tr&aacute;ch nhi&#7879;m tr&iacute;ch chuy&#7875;n ti&#7873;n t&#7915;
t&agrave;i kho&#7843;n c&#7911;a ng&#432;&#7901;i n&#7897;p thu&#7871;
v&agrave;o t&agrave;i kho&#7843;n c&#7911;a ng&acirc;n s&aacute;ch nh&agrave;
n&#432;&#7899;c theo y&ecirc;u c&#7847;u c&#7911;a c&#417; quan thu&#7871;, tr&#7915;
tr&#432;&#7901;ng h&#7907;p c&aacute;c t&agrave;i kho&#7843;n c&#7911;a
ng&#432;&#7901;i n&#7897;p thu&#7871; t&#7841;i ng&acirc;n h&agrave;ng
th&#432;&#417;ng m&#7841;i &#273;&oacute; kh&ocirc;ng c&ograve;n s&#7889;
d&#432; ho&#7863;c &#273;&atilde; tr&iacute;ch chuy&#7875;n to&agrave;n b&#7897;
s&#7889; d&#432; t&agrave;i kho&#7843;n c&#7911;a ng&#432;&#7901;i n&#7897;p
thu&#7871; v&agrave;o t&agrave;i kho&#7843;n c&#7911;a ng&acirc;n s&aacute;ch
nh&agrave; n&#432;&#7899;c nh&#432;ng v&#7851;n kh&ocirc;ng &#273;&#7911; s&#7889;
ti&#7873;n m&agrave; ng&#432;&#7901;i n&#7897;p thu&#7871; ph&#7843;i n&#7897;p.</span></p>

<p class=MsoNormal style='margin-top:2.0pt;text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>2. Ng&#432;&#7901;i b&#7843;o l&atilde;nh ph&#7843;i n&#7897;p
thay ti&#7873;n thu&#7871;, ti&#7873;n ch&#7853;m n&#7897;p ti&#7873;n thu&#7871;,
ti&#7873;n ph&#7841;t, ti&#7873;n ch&#7853;m n&#7897;p ti&#7873;n ph&#7841;t (n&#7871;u
c&oacute;) cho ng&#432;&#7901;i n&#7897;p thu&#7871; theo n&#7897;i dung cam k&#7871;t
t&#7841;i v&#259;n b&#7843;n b&#7843;o l&atilde;nh trong tr&#432;&#7901;ng h&#7907;p
ng&#432;&#7901;i n&#7897;p thu&#7871; kh&ocirc;ng n&#7897;p v&agrave;o
ng&acirc;n s&aacute;ch nh&agrave; n&#432;&#7899;c.</span></p>

<p class=MsoNormal style='margin-top:2.0pt;text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>N&#7871;u qu&aacute; th&#7901;i h&#7841;n b&#7843;o
l&atilde;nh m&agrave; ng&#432;&#7901;i n&#7897;p thu&#7871; ch&#432;a n&#7897;p
ho&#7863;c ch&#432;a n&#7897;p &#273;&#7911; ti&#7873;n thu&#7871; n&#7907;, ti&#7873;n
ch&#7853;m n&#7897;p ti&#7873;n thu&#7871;, ti&#7873;n ph&#7841;t, ti&#7873;n
ch&#7853;m n&#7897;p ti&#7873;n ph&#7841;t m&agrave; ng&#432;&#7901;i b&#7843;o
l&atilde;nh ch&#432;a th&#7921;c hi&#7879;n ngh&#297;a v&#7909; b&#7843;o
l&atilde;nh th&igrave; ng&#432;&#7901;i b&#7843;o l&atilde;nh b&#7883;
t&iacute;nh ti&#7873;n ch&#7853;m n&#7897;p do ch&#7853;m n&#7897;p ti&#7873;n
thu&#7871;, ti&#7873;n ph&#7841;t v&agrave; b&#7883; c&#432;&#7905;ng ch&#7871;
theo quy &#273;&#7883;nh c&#7911;a Lu&#7853;t Qu&#7843;n l&yacute; thu&#7871;.</span></p>

<h2><a name="dieu_19"></a><a name="_Toc114664895"></a><b
style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>1. Ph&#7841;t ti&#7873;n t&#7915; 2.000.000 &#273;&#7891;ng
&#273;&#7871;n 6.000.000 &#273;&#7891;ng &#273;&#7889;i v&#7899;i h&agrave;nh
