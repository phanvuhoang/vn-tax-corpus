<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><i><span
style='font-size:14.0pt'>C&#259;n c&#7913; <a name="tvpllink_khhhnejlqt">Hi&#7871;n

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><i><span
style='font-size:14.0pt'>Qu&#7889;c h&#7897;i ban h&agrave;nh Lu&#7853;t Thanh
tra.</span></i></p>

<h1 style='text-align:justify;text-indent:1.0cm'><a name="_Toc144884046"></a><a
name="chuong_1"></a><span
style='text-indent:1.0cm'><a name="_Toc144884047"></a><a
name="chuong_1_name"></a><span
style='text-indent:1.0cm'><a name="_Toc144884048"></a><a
name="dieu_1"><span style='i&#7873;u 1.
Ph&#7841;m vi &#273;i&#7873;u ch&#7881;nh</span></a></h2>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>Lu&#7853;t n&agrave;y quy &#273;&#7883;nh v&#7873;
t&#7893; ch&#7913;c v&agrave; ho&#7841;t &#273;&#7897;ng thanh tra.</span></p>

<h2 style='text-align:justify;text-indent:1.0cm'><a name="_Toc144884049"></a><a
name="dieu_2"><span style='i&#7873;u 2.
Gi&#7843;i th&iacute;ch t&#7915; ng&#7919;</span></a></h2>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>Trong Lu&#7853;t n&agrave;y, c&aacute;c t&#7915;
ng&#7919; d&#432;&#7899;i &#273;&acirc;y &#273;&#432;&#7907;c hi&#7875;u
nh&#432; sau:</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>1. <i>Thanh tra</i> l&agrave; ho&#7841;t
&#273;&#7897;ng xem x&eacute;t, &#273;&aacute;nh gi&aacute;, x&#7917; l&yacute;
theo tr&igrave;nh t&#7921;, th&#7911; t&#7909;c do ph&aacute;p lu&#7853;t quy
&#273;&#7883;nh c&#7911;a c&#417; quan th&#7921;c hi&#7879;n ch&#7913;c n&#259;ng
thanh tra &#273;&#7889;i v&#7899;i vi&#7879;c th&#7921;c hi&#7879;n
ch&iacute;nh s&aacute;ch, ph&aacute;p lu&#7853;t, nhi&#7879;m v&#7909;,
quy&#7873;n h&#7841;n c&#7911;a c&#417; quan, t&#7893; ch&#7913;c, c&aacute;
nh&acirc;n. Ho&#7841;t &#273;&#7897;ng thanh tra bao g&#7891;m thanh tra
h&agrave;nh ch&iacute;nh v&agrave; thanh tra chuy&ecirc;n ng&agrave;nh.</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>2. <i>Thanh tra h&agrave;nh ch&iacute;nh</i> l&agrave;
thanh tra vi&#7879;c th&#7921;c hi&#7879;n ch&iacute;nh s&aacute;ch,
ph&aacute;p lu&#7853;t, nhi&#7879;m v&#7909;, quy&#7873;n h&#7841;n
&#273;&#432;&#7907;c giao c&#7911;a c&#417; quan, t&#7893; ch&#7913;c,
c&aacute; nh&acirc;n thu&#7897;c quy&#7873;n qu&#7843;n l&yacute; c&#7911;a
c&#417; quan qu&#7843;n l&yacute; nh&agrave; n&#432;&#7899;c.</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>3. <i>Thanh tra chuy&ecirc;n ng&agrave;nh</i>
l&agrave; thanh tra vi&#7879;c ch&#7845;p h&agrave;nh ph&aacute;p lu&#7853;t
chuy&ecirc;n ng&agrave;nh, quy &#273;&#7883;nh v&#7873; chuy&ecirc;n m&ocirc;n
- k&#7929; thu&#7853;t, quy t&#7855;c qu&#7843;n l&yacute; c&#7911;a c&#417;
quan, t&#7893; ch&#7913;c, c&aacute; nh&acirc;n thu&#7897;c ph&#7841;m vi
qu&#7843;n l&yacute; theo ng&agrave;nh, l&#297;nh v&#7921;c.</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>4. <i>&#272;&#7883;nh h&#432;&#7899;ng
ch&#432;&#417;ng tr&igrave;nh thanh tra</i> l&agrave; v&#259;n b&#7843;n
x&aacute;c &#273;&#7883;nh ph&#432;&#417;ng h&#432;&#7899;ng v&agrave;
tr&#7885;ng t&acirc;m ho&#7841;t &#273;&#7897;ng thanh tra trong 01 n&#259;m do
Th&#7911; t&#432;&#7899;ng Ch&iacute;nh ph&#7911; ph&ecirc; duy&#7879;t theo
&#273;&#7873; ngh&#7883; c&#7911;a T&#7893;ng Thanh tra Ch&iacute;nh ph&#7911;.</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>5. <i>K&#7871; ho&#7841;ch thanh tra</i> l&agrave;
v&#259;n b&#7843;n x&aacute;c &#273;&#7883;nh nhi&#7879;m v&#7909; ch&#7911;
y&#7871;u v&#7873; thanh tra trong 01 n&#259;m do c&#417; quan nh&agrave;
n&#432;&#7899;c c&oacute; th&#7849;m quy&#7873;n ban h&agrave;nh &#273;&#7875;
th&#7921;c hi&#7879;n &#272;&#7883;nh h&#432;&#7899;ng ch&#432;&#417;ng
tr&igrave;nh thanh tra v&agrave; ph&#7909;c v&#7909; y&ecirc;u c&#7847;u
qu&#7843;n l&yacute;.</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>6. <i>K&#7871; ho&#7841;ch ti&#7871;n h&agrave;nh
thanh tra</i> l&agrave; k&#7871; ho&#7841;ch ti&#7871;n h&agrave;nh m&#7897;t
cu&#7897;c thanh tra do Tr&#432;&#7903;ng &#273;o&agrave;n thanh tra x&acirc;y
d&#7921;ng v&agrave; &#273;&#432;&#7907;c ng&#432;&#7901;i ra quy&#7871;t
&#273;&#7883;nh thanh tra ph&ecirc; duy&#7879;t.</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>7. <i>Ph&#7841;m vi thanh tra</i> l&agrave; gi&#7899;i
h&#7841;n c&#7909; th&#7875; v&#7873; n&#7897;i dung thanh tra, &#273;&#7889;i
t&#432;&#7907;ng thanh tra v&agrave; th&#7901;i k&#7923; thanh tra
&#273;&#432;&#7907;c x&aacute;c &#273;&#7883;nh trong quy&#7871;t
&#273;&#7883;nh thanh tra.</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>8. <i>N&#7897;i dung thanh tra</i> l&agrave;
vi&#7879;c th&#7921;c hi&#7879;n ch&iacute;nh s&aacute;ch, ph&aacute;p
lu&#7853;t, nhi&#7879;m v&#7909;, quy&#7873;n h&#7841;n &#273;&#432;&#7907;c
giao, quy &#273;&#7883;nh v&#7873; chuy&ecirc;n m&ocirc;n - k&#7929;
thu&#7853;t, quy t&#7855;c qu&#7843;n l&yacute; thu&#7897;c ng&agrave;nh,
l&#297;nh v&#7921;c c&#7911;a &#273;&#7889;i t&#432;&#7907;ng thanh tra
v&agrave; c&#7911;a c&#417; quan, t&#7893; ch&#7913;c, c&aacute; nh&acirc;n
c&oacute; li&ecirc;n quan.</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>9. <i>&#272;&#7889;i t&#432;&#7907;ng thanh tra</i>
l&agrave; c&#417; quan, t&#7893; ch&#7913;c, c&aacute; nh&acirc;n ch&#7883;u
s&#7921; thanh tra &#273;&#432;&#7907;c x&aacute;c &#273;&#7883;nh trong
quy&#7871;t &#273;&#7883;nh thanh tra.</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>10. <i>Th&#7901;i k&#7923; thanh tra</i> l&agrave;
kho&#7843;ng th&#7901;i gian th&#7921;c hi&#7879;n ch&iacute;nh s&aacute;ch,
ph&aacute;p lu&#7853;t, nhi&#7879;m v&#7909;, quy&#7873;n h&#7841;n
&#273;&#432;&#7907;c giao, quy &#273;&#7883;nh v&#7873; chuy&ecirc;n m&ocirc;n
- k&#7929; thu&#7853;t, quy t&#7855;c qu&#7843;n l&yacute; thu&#7897;c
ng&agrave;nh, l&#297;nh v&#7921;c c&#7911;a &#273;&#7889;i t&#432;&#7907;ng
thanh tra &#273;&#432;&#7907;c xem x&eacute;t, &#273;&aacute;nh gi&aacute;
trong m&#7897;t cu&#7897;c thanh tra.</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>11. <i>Th&#7901;i h&#7841;n thanh tra</i> l&agrave;
kho&#7843;ng th&#7901;i gian &#273;&#432;&#7907;c t&iacute;nh t&#7915;
ng&agrave;y c&ocirc;ng b&#7889; quy&#7871;t &#273;&#7883;nh thanh tra
&#273;&#7871;n ng&agrave;y k&#7871;t th&uacute;c vi&#7879;c ti&#7871;n
h&agrave;nh thanh tra tr&#7921;c ti&#7871;p.</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>12. <i>K&#7871;t lu&#7853;n thanh tra</i> l&agrave;
v&#259;n b&#7843;n do Th&#7911; tr&#432;&#7903;ng c&#417; quan th&#7921;c
hi&#7879;n ch&#7913;c n&#259;ng thanh tra k&yacute; ban h&agrave;nh
&#273;&#7875; &#273;&aacute;nh gi&aacute;, k&#7871;t lu&#7853;n v&agrave;
ki&#7871;n ngh&#7883; v&#7873; n&#7897;i dung &#273;&atilde; thanh tra.</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>13. <i>Th&#7849;m &#273;&#7883;nh d&#7921; th&#7843;o
k&#7871;t lu&#7853;n thanh tra</i> l&agrave; vi&#7879;c xem x&eacute;t,
&#273;&aacute;nh gi&aacute; &#273;&#7875; &#273;&#432;a ra nh&#7853;n
x&eacute;t, ki&#7871;n ngh&#7883; nh&#7857;m ho&agrave;n thi&#7879;n d&#7921;
th&#7843;o k&#7871;t lu&#7853;n thanh tra.</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>14. <i>Gi&aacute;m s&aacute;t ho&#7841;t
&#273;&#7897;ng c&#7911;a &#272;o&agrave;n thanh tra</i> l&agrave; vi&#7879;c
theo d&otilde;i, xem x&eacute;t, &#273;&aacute;nh gi&aacute; vi&#7879;c
ch&#7845;p h&agrave;nh ph&aacute;p lu&#7853;t, tu&acirc;n th&#7911; chu&#7849;n
m&#7921;c &#273;&#7841;o &#273;&#7913;c, quy t&#7855;c &#7913;ng x&#7917;, &yacute;
th&#7913;c k&yacute; lu&#7853;t v&agrave; vi&#7879;c th&#7921;c hi&#7879;n
nhi&#7879;m v&#7909; &#273;&#432;&#7907;c giao c&#7911;a Tr&#432;&#7903;ng
&#273;o&agrave;n thanh tra, th&agrave;nh vi&ecirc;n kh&aacute;c c&#7911;a
&#272;o&agrave;n thanh tra trong th&#7901;i h&#7841;n thanh tra.</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>15. <i>Quy&#7871;t &#273;&#7883;nh x&#7917; l&yacute;
v&#7873; thanh tra</i> bao g&#7891;m quy&#7871;t &#273;&#7883;nh c&#7911;a
ng&#432;&#7901;i ti&#7871;n h&agrave;nh thanh tra &#273;&#7875; th&#7921;c
hi&#7879;n quy&#7873;n trong ho&#7841;t &#273;&#7897;ng thanh tra v&agrave;
quy&#7871;t &#273;&#7883;nh c&#7911;a Th&#7911; tr&#432;&#7903;ng c&#417; quan
qu&#7843;n l&yacute; nh&agrave; n&#432;&#7899;c c&oacute; th&#7849;m
quy&#7873;n, Th&#7911; tr&#432;&#7903;ng c&#417; quan th&#7921;c hi&#7879;n
ch&#7913;c n&#259;ng thanh tra &#273;&#7875; th&#7921;c hi&#7879;n k&#7871;t
lu&#7853;n thanh tra.</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>16. <i>Ng&#432;&#7901;i ti&#7871;n h&agrave;nh thanh
tra</i> bao g&#7891;m ng&#432;&#7901;i ra quy&#7871;t &#273;&#7883;nh thanh
tra, Tr&#432;&#7903;ng &#273;o&agrave;n thanh tra v&agrave; th&agrave;nh
vi&ecirc;n kh&aacute;c c&#7911;a &#272;o&agrave;n thanh tra.</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>17. <i>C&#417; quan th&#7921;c hi&#7879;n ch&#7913;c
n&#259;ng thanh tra</i> bao g&#7891;m c&#417; quan thanh tra v&agrave; c&#417;
quan &#273;&#432;&#7907;c giao th&#7921;c hi&#7879;n ch&#7913;c n&#259;ng thanh
tra chuy&ecirc;n ng&agrave;nh.</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>18. <i>C&#417; quan thanh tra</i> l&agrave; c&#417;
quan &#273;&#432;&#7907;c th&agrave;nh l&#7853;p theo quy &#273;&#7883;nh
c&#7911;a Lu&#7853;t n&agrave;y v&agrave; quy &#273;&#7883;nh kh&aacute;c
c&#7911;a ph&aacute;p lu&#7853;t c&oacute; li&ecirc;n quan, th&#7921;c
hi&#7879;n nhi&#7879;m v&#7909; thanh tra, ti&#7871;p c&ocirc;ng d&acirc;n,
gi&#7843;i quy&#7871;t khi&#7871;u n&#7841;i, t&#7889; c&aacute;o v&agrave;
ph&ograve;ng, ch&#7889;ng tham nh&#361;ng, ti&ecirc;u c&#7921;c theo quy
&#273;&#7883;nh c&#7911;a ph&aacute;p lu&#7853;t.</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>19. <i>C&#417; quan &#273;&#432;&#7907;c giao
th&#7921;c hi&#7879;n ch&#7913;c n&#259;ng thanh tra chuy&ecirc;n ng&agrave;nh</i>
l&agrave; c&#417; quan th&#7921;c hi&#7879;n nhi&#7879;m v&#7909; qu&#7843;n
l&yacute; nh&agrave; n&#432;&#7899;c theo ng&agrave;nh, l&#297;nh v&#7921;c
&#273;&#432;&#7907;c giao th&#7921;c hi&#7879;n ch&#7913;c n&#259;ng thanh tra
chuy&ecirc;n ng&agrave;nh.</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>20. <i>Ng&#432;&#7901;i &#273;&#432;&#7907;c giao
th&#7921;c hi&#7879;n nhi&#7879;m v&#7909; thanh tra chuy&ecirc;n ng&agrave;nh</i>
l&agrave; ng&#432;&#7901;i &#273;&#432;&#7907;c ph&acirc;n c&ocirc;ng
th&#7921;c hi&#7879;n nhi&#7879;m v&#7909; thanh tra c&#7911;a c&#417; quan
&#273;&#432;&#7907;c giao th&#7921;c hi&#7879;n ch&#7913;c n&#259;ng thanh tra
chuy&ecirc;n ng&agrave;nh.</span></p>

<h2 style='text-align:justify;text-indent:1.0cm'><a name="_Toc144884050"></a><a
name="dieu_3"><span style='i&#7873;u 3.
M&#7909;c &#273;&iacute;ch ho&#7841;t &#273;&#7897;ng thanh tra</span></a></h2>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>Ho&#7841;t &#273;&#7897;ng thanh tra nh&#7857;m
ph&aacute;t hi&#7879;n h&#7841;n ch&#7871;, b&#7845;t c&#7853;p trong c&#417;
ch&#7871; qu&#7843;n l&yacute;, ch&iacute;nh s&aacute;ch, ph&aacute;p
lu&#7853;t &#273;&#7875; ki&#7871;n ngh&#7883; v&#7899;i c&#417; quan
nh&agrave; n&#432;&#7899;c c&oacute; th&#7849;m quy&#7873;n c&oacute;
gi&#7843;i ph&aacute;p, bi&#7879;n ph&aacute;p kh&#7855;c ph&#7909;c;
ph&ograve;ng ng&#7915;a, ph&aacute;t hi&#7879;n v&agrave; x&#7917; l&yacute;
h&agrave;nh vi vi ph&#7841;m ph&aacute;p lu&#7853;t; gi&uacute;p c&#417; quan,
t&#7893; ch&#7913;c, c&aacute; nh&acirc;n th&#7921;c hi&#7879;n
&#273;&uacute;ng quy &#273;&#7883;nh c&#7911;a ph&aacute;p lu&#7853;t;
ph&aacute;t huy nh&acirc;n t&#7889; t&iacute;ch c&#7921;c; g&oacute;p
ph&#7847;n n&acirc;ng cao hi&#7879;u l&#7921;c, hi&#7879;u qu&#7843; ho&#7841;t
&#273;&#7897;ng qu&#7843;n l&yacute; nh&agrave; n&#432;&#7899;c; b&#7843;o v&#7879;
l&#7907;i &iacute;ch c&#7911;a Nh&agrave; n&#432;&#7899;c, quy&#7873;n
v&agrave; l&#7907;i &iacute;ch h&#7907;p ph&aacute;p c&#7911;a c&#417; quan,
t&#7893; ch&#7913;c, c&aacute; nh&acirc;n.</span></p>

<h2 style='text-align:justify;text-indent:1.0cm'><a name="_Toc144884051"></a><a
name="dieu_4"><span style='i&#7873;u 4.
Nguy&ecirc;n t&#7855;c ho&#7841;t &#273;&#7897;ng thanh tra</span></a></h2>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>1. Tu&acirc;n theo ph&aacute;p lu&#7853;t, d&acirc;n
ch&#7911;, c&ocirc;ng khai, kh&aacute;ch quan, k&#7883;p th&#7901;i,
ch&iacute;nh x&aacute;c.</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>2. Kh&ocirc;ng l&agrave;m c&#7843;n tr&#7903;
ho&#7841;t &#273;&#7897;ng b&igrave;nh th&#432;&#7901;ng c&#7911;a
&#273;&#7889;i t&#432;&#7907;ng thanh tra v&agrave; c&#417; quan, t&#7893;
ch&#7913;c, c&aacute; nh&acirc;n kh&aacute;c.</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>3. Kh&ocirc;ng tr&ugrave;ng l&#7863;p v&#7873;
ph&#7841;m vi, th&#7901;i gian gi&#7919;a c&aacute;c c&#417; quan thanh tra,
gi&#7919;a c&#417; quan thanh tra v&#7899;i c&#417; quan ki&#7875;m to&aacute;n
nh&agrave; n&#432;&#7899;c; kh&ocirc;ng tr&ugrave;ng l&#7863;p trong vi&#7879;c
th&#7921;c hi&#7879;n quy&#7873;n khi ti&#7871;n h&agrave;nh thanh tra.</span></p>

<h2 style='text-align:justify;text-indent:1.0cm'><a name="_Toc144884052"></a><a
name="dieu_5"><span style='i&#7873;u 5.
Ch&#7913;c n&#259;ng c&#7911;a c&#417; quan thanh tra</span></a></h2>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>Trong ph&#7841;m vi nhi&#7879;m v&#7909;, quy&#7873;n
h&#7841;n c&#7911;a m&igrave;nh, c&#417; quan thanh tra gi&uacute;p c&#417;
quan nh&agrave; n&#432;&#7899;c c&oacute; th&#7849;m quy&#7873;n th&#7921;c
hi&#7879;n qu&#7843;n l&yacute; nh&agrave; n&#432;&#7899;c v&#7873; c&ocirc;ng
t&aacute;c thanh tra, ti&#7871;p c&ocirc;ng d&acirc;n, gi&#7843;i quy&#7871;t
khi&#7871;u n&#7841;i, t&#7889; c&aacute;o v&agrave; ph&ograve;ng, ch&#7889;ng
tham nh&#361;ng, ti&ecirc;u c&#7921;c; ti&#7871;n h&agrave;nh thanh tra, <span
style='color:red'>ti&#7871;p c&ocirc;ng d&acirc;n</span>, gi&#7843;i
quy&#7871;t khi&#7871;u n&#7841;i, t&#7889; c&aacute;o v&agrave; ph&ograve;ng,
ch&#7889;ng tham nh&#361;ng, <span style='color:red'>ti&ecirc;u c&#7921;c</span>
theo quy &#273;&#7883;nh c&#7911;a ph&aacute;p lu&#7853;t.</span></p>

<h2 style='text-align:justify;text-indent:1.0cm'><a name="_Toc144884053"></a><a
name="dieu_6"><span style='i&#7873;u 6.
Tr&aacute;ch nhi&#7879;m c&#7911;a Th&#7911; tr&#432;&#7903;ng c&#417; quan
qu&#7843;n l&yacute; nh&agrave; n&#432;&#7899;c trong c&ocirc;ng t&aacute;c
thanh tra, ki&#7875;m tra</span></a></h2>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>1. Trong ph&#7841;m vi nhi&#7879;m v&#7909;,
quy&#7873;n h&#7841;n c&#7911;a m&igrave;nh, Th&#7911; tr&#432;&#7903;ng
c&#417; quan qu&#7843;n l&yacute; nh&agrave; n&#432;&#7899;c c&oacute;
tr&aacute;ch nhi&#7879;m t&#7893; ch&#7913;c, ch&#7881; &#273;&#7841;o
ho&#7841;t &#273;&#7897;ng thanh tra, ki&#7875;m tra &#273;&#7875; b&#7843;o
&#273;&#7843;m hi&#7879;u l&#7921;c, hi&#7879;u qu&#7843; c&#7911;a c&ocirc;ng t&aacute;c
qu&#7843;n l&yacute; nh&agrave; n&#432;&#7899;c.</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>2. Th&#7911; tr&#432;&#7903;ng c&#417; quan qu&#7843;n
l&yacute; nh&agrave; n&#432;&#7899;c ph&#7843;i th&#432;&#7901;ng xuy&ecirc;n
t&#7893; ch&#7913;c ki&#7875;m tra vi&#7879;c th&#7921;c hi&#7879;n nhi&#7879;m
v&#7909;, quy&#7873;n h&#7841;n &#273;&#432;&#7907;c giao c&#7911;a c&#417;
quan, t&#7893; ch&#7913;c, c&aacute; nh&acirc;n thu&#7897;c quy&#7873;n
qu&#7843;n l&yacute;; vi&#7879;c ch&#7845;p h&agrave;nh ch&iacute;nh
s&aacute;ch, ph&aacute;p lu&#7853;t c&#7911;a c&#417; quan, t&#7893; ch&#7913;c,
c&aacute; nh&acirc;n thu&#7897;c ng&agrave;nh, l&#297;nh v&#7921;c do
m&igrave;nh ph&#7909; tr&aacute;ch &#273;&#7875; b&#7843;o &#273;&#7843;m
hi&#7879;u l&#7921;c, hi&#7879;u qu&#7843; c&#7911;a c&ocirc;ng t&aacute;c
qu&#7843;n l&yacute; nh&agrave; n&#432;&#7899;c.</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>Trong qu&aacute; tr&igrave;nh ki&#7875;m tra,
n&#7871;u ph&aacute;t hi&#7879;n vi ph&#7841;m th&igrave; &aacute;p d&#7909;ng
ho&#7863;c ki&#7871;n ngh&#7883; c&#417; quan nh&agrave; n&#432;&#7899;c
c&oacute; th&#7849;m quy&#7873;n &aacute;p d&#7909;ng bi&#7879;n ph&aacute;p
theo quy &#273;&#7883;nh c&#7911;a ph&aacute;p lu&#7853;t &#273;&#7875;
x&#7917; l&yacute; k&#7883;p th&#7901;i h&agrave;nh vi vi ph&#7841;m;
tr&#432;&#7901;ng h&#7907;p c&#7847;n thi&#7871;t th&igrave; y&ecirc;u
c&#7847;u ho&#7863;c &#273;&#7873; ngh&#7883; c&#417; quan c&oacute; th&#7849;m
quy&#7873;n ti&#7871;n h&agrave;nh thanh tra; n&#7871;u c&oacute; d&#7845;u
hi&#7879;u t&#7897;i ph&#7841;m th&igrave; ki&#7871;n ngh&#7883; kh&#7903;i
t&#7889; v&agrave; chuy&#7875;n h&#7891; s&#417; v&#7909; vi&#7879;c,
t&agrave;i li&#7879;u c&oacute; li&ecirc;n quan &#273;&#7871;n c&#417; quan
&#273;i&#7873;u tra &#273;&#7875; xem x&eacute;t, quy&#7871;t &#273;&#7883;nh
vi&#7879;c kh&#7903;i t&#7889; v&#7909; &aacute;n h&igrave;nh s&#7921; theo quy
&#273;&#7883;nh c&#7911;a ph&aacute;p lu&#7853;t.</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><a
name="khoan_3_6"><span style='font-size:14.0pt'>3. Th&#7911; t&#432;&#7899;ng
Ch&iacute;nh ph&#7911;, B&#7897; tr&#432;&#7903;ng v&agrave; Th&#7911;
tr&#432;&#7903;ng c&#417; quan ngang B&#7897; (sau &#273;&acirc;y g&#7885;i
chung l&agrave; B&#7897; tr&#432;&#7903;ng), Th&#7911; tr&#432;&#7903;ng c&#417;
quan thu&#7897;c Ch&iacute;nh ph&#7911;, Ch&#7911; t&#7883;ch &#7910;y ban
nh&acirc;n d&acirc;n c&#7845;p t&#7881;nh, ng&#432;&#7901;i &#273;&#7913;ng
&#273;&#7847;u c&#417; quan chuy&ecirc;n m&ocirc;n thu&#7897;c &#7910;y ban
nh&acirc;n d&acirc;n c&#7845;p t&#7881;nh, Ch&#7911; t&#7883;ch &#7910;y ban
nh&acirc;n d&acirc;n c&#7845;p huy&#7879;n v&agrave; Th&#7911;
tr&#432;&#7903;ng c&#417; quan qu&#7843;n l&yacute; nh&agrave; n&#432;&#7899;c
kh&aacute;c, trong ph&#7841;m vi nhi&#7879;m v&#7909;, quy&#7873;n h&#7841;n
c&#7911;a m&igrave;nh, c&oacute; tr&aacute;ch nhi&#7879;m t&#7893; ch&#7913;c,
ch&#7881; &#273;&#7841;o ho&#7841;t &#273;&#7897;ng thanh tra, x&#7917;
l&yacute; k&#7883;p th&#7901;i k&#7871;t lu&#7853;n, ki&#7871;n ngh&#7883;
v&#7873; n&#7897;i dung thanh tra v&agrave; ch&#7883;u tr&aacute;ch nhi&#7879;m
tr&#432;&#7899;c ph&aacute;p lu&#7853;t v&#7873; quy&#7871;t &#273;&#7883;nh
c&#7911;a m&igrave;nh.</span></a></p>

<h2 style='text-align:justify;text-indent:1.0cm'><a name="_Toc144884054"></a><a
name="dieu_7"><span style='i&#7873;u 7.
Tr&aacute;ch nhi&#7879;m ph&#7889;i h&#7907;p gi&#7919;a c&#417; quan
th&#7921;c hi&#7879;n ch&#7913;c n&#259;ng thanh tra v&#7899;i c&#417; quan,
t&#7893; ch&#7913;c, c&aacute; nh&acirc;n c&oacute; li&ecirc;n quan</span></a></h2>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>1. Trong ph&#7841;m vi nhi&#7879;m v&#7909;,
quy&#7873;n h&#7841;n c&#7911;a m&igrave;nh, c&#417; quan th&#7921;c hi&#7879;n
ch&#7913;c n&#259;ng thanh tra c&oacute; tr&aacute;ch nhi&#7879;m ph&#7889;i
h&#7907;p v&#7899;i c&#417; quan c&ocirc;ng an, Vi&#7879;n ki&#7875;m
s&aacute;t nh&acirc;n d&acirc;n, c&#417; quan ki&#7875;m to&aacute;n nh&agrave;
n&#432;&#7899;c, c&#417; quan, t&#7893; ch&#7913;c c&oacute; li&ecirc;n quan,
ng&#432;&#7901;i c&oacute; th&#7849;m quy&#7873;n trong ph&ograve;ng
ng&#7915;a, ph&aacute;t hi&#7879;n v&agrave; x&#7917; l&yacute; h&agrave;nh vi
vi ph&#7841;m ph&aacute;p lu&#7853;t.</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>2. Trong ph&#7841;m vi nhi&#7879;m v&#7909;,
quy&#7873;n h&#7841;n c&#7911;a m&igrave;nh, c&#417; quan &#273;i&#7873;u tra,
Vi&#7879;n ki&#7875;m s&aacute;t nh&acirc;n d&acirc;n c&oacute; tr&aacute;ch
nhi&#7879;m xem x&eacute;t ki&#7871;n ngh&#7883; kh&#7903;i t&#7889; v&#7909; &aacute;n
h&igrave;nh s&#7921; do c&#417; quan th&#7921;c hi&#7879;n ch&#7913;c n&#259;ng
thanh tra chuy&#7875;n &#273;&#7871;n v&agrave; tr&#7843; l&#7901;i b&#7857;ng
v&#259;n b&#7843;n v&#7873; vi&#7879;c x&#7917; l&yacute; ki&#7871;n ngh&#7883;
&#273;&oacute;.</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>3. C&#417; quan, t&#7893; ch&#7913;c, c&aacute;
nh&acirc;n c&oacute; li&ecirc;n quan c&oacute; tr&aacute;ch nhi&#7879;m
th&#7921;c hi&#7879;n y&ecirc;u c&#7847;u, ki&#7871;n ngh&#7883; c&#7911;a
c&#417; quan th&#7921;c hi&#7879;n ch&#7913;c n&#259;ng thanh tra, quy&#7871;t
&#273;&#7883;nh x&#7917; l&yacute; v&#7873; thanh tra v&agrave; tr&#7843;
l&#7901;i b&#7857;ng v&#259;n b&#7843;n v&#7873; vi&#7879;c th&#7921;c
hi&#7879;n y&ecirc;u c&#7847;u, ki&#7871;n ngh&#7883;, quy&#7871;t
&#273;&#7883;nh x&#7917; l&yacute; &#273;&oacute;.</span></p>

<h2 style='text-align:justify;text-indent:1.0cm'><a name="_Toc144884055"></a><a
name="dieu_8"><span style='i&#7873;u 8.
C&aacute;c h&agrave;nh vi b&#7883; nghi&ecirc;m c&#7845;m trong ho&#7841;t
&#273;&#7897;ng thanh tra</span></a></h2>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>1. L&#7907;i d&#7909;ng ch&#7913;c v&#7909;,
quy&#7873;n h&#7841;n thanh tra &#273;&#7875; th&#7921;c hi&#7879;n h&agrave;nh
vi tr&aacute;i ph&aacute;p lu&#7853;t, s&aacute;ch nhi&#7877;u, g&acirc;y
kh&oacute; kh&#259;n, phi&#7873;n h&agrave; cho &#273;&#7889;i t&#432;&#7907;ng
thanh tra v&agrave; c&#417; quan, t&#7893; ch&#7913;c, c&aacute; nh&acirc;n
kh&aacute;c; l&#7841;m quy&#7873;n trong qu&aacute; tr&igrave;nh ti&#7871;n
h&agrave;nh thanh tra.</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>2. Thanh tra kh&ocirc;ng &#273;&uacute;ng th&#7849;m
quy&#7873;n, kh&ocirc;ng &#273;&uacute;ng v&#7899;i n&#7897;i dung quy&#7871;t
&#273;&#7883;nh thanh tra, k&#7871; ho&#7841;ch ti&#7871;n h&agrave;nh thanh
tra &#273;&atilde; &#273;&#432;&#7907;c ph&ecirc; duy&#7879;t.</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>3. C&#7889; &yacute; kh&ocirc;ng ra quy&#7871;t
&#273;&#7883;nh thanh tra khi ph&aacute;t hi&#7879;n c&oacute; d&#7845;u
hi&#7879;u vi ph&#7841;m ph&aacute;p lu&#7853;t m&agrave; theo quy
&#273;&#7883;nh c&#7911;a ph&aacute;p lu&#7853;t ph&#7843;i ti&#7871;n
h&agrave;nh thanh tra; bao che cho &#273;&#7889;i t&#432;&#7907;ng thanh tra;
c&#7889; &yacute; k&#7871;t lu&#7853;n sai s&#7921; th&#7853;t; k&#7871;t
lu&#7853;n, quy&#7871;t &#273;&#7883;nh, x&#7917; l&yacute; tr&aacute;i
ph&aacute;p lu&#7853;t; kh&ocirc;ng ki&#7871;n ngh&#7883; kh&#7903;i t&#7889;
v&agrave; chuy&#7875;n h&#7891; s&#417; v&#7909; vi&#7879;c c&oacute; d&#7845;u
hi&#7879;u t&#7897;i ph&#7841;m &#273;&#432;&#7907;c ph&aacute;t hi&#7879;n qua
thanh tra &#273;&#7871;n c&#417; quan &#273;i&#7873;u tra &#273;&#7875; xem x&eacute;t,
quy&#7871;t &#273;&#7883;nh vi&#7879;c kh&#7903;i t&#7889; v&#7909; &aacute;n
h&igrave;nh s&#7921; theo quy &#273;&#7883;nh c&#7911;a ph&aacute;p lu&#7853;t.</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>4. &#272;&#432;a h&#7889;i l&#7897;, nh&#7853;n
h&#7889;i l&#7897;, m&ocirc;i gi&#7899;i h&#7889;i l&#7897; trong ho&#7841;t
&#273;&#7897;ng thanh tra.</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>5. Ti&#7871;t l&#7897; th&ocirc;ng tin, t&agrave;i
li&#7879;u li&ecirc;n quan &#273;&#7871;n cu&#7897;c thanh tra khi k&#7871;t
lu&#7853;n thanh tra ch&#432;a &#273;&#432;&#7907;c c&ocirc;ng khai.</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>6. Can thi&#7879;p tr&aacute;i ph&aacute;p lu&#7853;t
v&agrave;o ho&#7841;t &#273;&#7897;ng thanh tra; t&aacute;c &#273;&#7897;ng
l&agrave;m sai l&#7879;ch k&#7871;t qu&#7843; thanh tra, k&#7871;t lu&#7853;n,
ki&#7871;n ngh&#7883; thanh tra.</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>7. Kh&ocirc;ng cung c&#7845;p th&ocirc;ng tin,
t&agrave;i li&#7879;u ho&#7863;c cung c&#7845;p kh&ocirc;ng k&#7883;p
th&#7901;i, kh&ocirc;ng &#273;&#7847;y &#273;&#7911;, kh&ocirc;ng trung
th&#7921;c, thi&#7871;u ch&iacute;nh x&aacute;c; chi&#7871;m &#273;o&#7841;t,
ti&ecirc;u h&#7911;y t&agrave;i li&#7879;u, v&#7853;t ch&#7913;ng li&ecirc;n
quan &#273;&#7871;n n&#7897;i dung thanh tra.</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>8. Ch&#7889;ng &#273;&#7889;i, c&#7843;n tr&#7903;,
mua chu&#7897;c, &#273;e d&#7885;a, tr&#7843; th&ugrave;, tr&ugrave; d&#7853;p
ng&#432;&#7901;i ti&#7871;n h&agrave;nh thanh tra, ng&#432;&#7901;i th&#7921;c
hi&#7879;n gi&aacute;m s&aacute;t, ng&#432;&#7901;i th&#7921;c hi&#7879;n
th&#7849;m &#273;&#7883;nh, ng&#432;&#7901;i cung c&#7845;p th&ocirc;ng tin,
t&agrave;i li&#7879;u cho c&#417; quan th&#7921;c hi&#7879;n ch&#7913;c
n&#259;ng thanh tra; g&acirc;y kh&oacute; kh&#259;n cho ho&#7841;t
&#273;&#7897;ng thanh tra.</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>9. H&agrave;nh vi kh&aacute;c b&#7883; nghi&ecirc;m
c&#7845;m theo quy &#273;&#7883;nh c&#7911;a lu&#7853;t.</span></p>

<h1 style='text-align:justify;text-indent:1.0cm'><a name="_Toc144884056"></a><a
name="chuong_2"></a><span
style='text-indent:1.0cm'><a name="_Toc144884057"></a><a
name="chuong_2_name"></a><span style='text-indent:1.0cm'><a name="_Toc144884058"></a><a
name="dieu_9"><span style='i&#7873;u 9.
C&#417; quan th&#7921;c hi&#7879;n ch&#7913;c n&#259;ng thanh tra</span></a></h2>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>1. C&#417; quan thanh tra theo c&#7845;p h&agrave;nh
ch&iacute;nh bao g&#7891;m:</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>a) Thanh tra Ch&iacute;nh ph&#7911;;</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>b) Thanh tra t&#7881;nh, th&agrave;nh ph&#7889;
tr&#7921;c thu&#7897;c trung &#432;&#417;ng (sau &#273;&acirc;y g&#7885;i chung
l&agrave; Thanh tra t&#7881;nh);</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>c) Thanh tra qu&#7853;n, huy&#7879;n, th&#7883;
x&atilde;, th&agrave;nh ph&#7889; thu&#7897;c t&#7881;nh, th&agrave;nh
ph&#7889; thu&#7897;c th&agrave;nh ph&#7889; tr&#7921;c thu&#7897;c trung
&#432;&#417;ng (sau &#273;&acirc;y g&#7885;i chung l&agrave; Thanh tra
huy&#7879;n);</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>d) C&#417; quan thanh tra t&#7841;i &#273;&#417;n
v&#7883; h&agrave;nh ch&iacute;nh - kinh t&#7871; &#273;&#7863;c bi&#7879;t do
Qu&#7889;c h&#7897;i quy &#273;&#7883;nh.</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>2. C&#417; quan thanh tra theo ng&agrave;nh, l&#297;nh
v&#7921;c bao g&#7891;m:</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>a) Thanh tra B&#7897;, c&#417; quan ngang B&#7897;
(sau &#273;&acirc;y g&#7885;i chung l&agrave; Thanh tra B&#7897;);</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>b) Thanh tra T&#7893;ng c&#7909;c, C&#7909;c
thu&#7897;c B&#7897; v&agrave; t&#432;&#417;ng &#273;&#432;&#417;ng (sau
&#273;&acirc;y g&#7885;i chung l&agrave; Thanh tra T&#7893;ng c&#7909;c,
C&#7909;c);</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>c) Thanh tra s&#7903;.</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>3. C&#417; quan thanh tra &#7903; c&#417; quan
thu&#7897;c Ch&iacute;nh ph&#7911;.</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>4. C&#417; quan thanh tra trong Qu&acirc;n
&#273;&#7897;i nh&acirc;n d&acirc;n, C&ocirc;ng an nh&acirc;n d&acirc;n,
Ng&acirc;n h&agrave;ng Nh&agrave; n&#432;&#7899;c Vi&#7879;t Nam, c&#417; quan
c&#417; y&#7871;u Ch&iacute;nh ph&#7911;.</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>5. C&#417; quan &#273;&#432;&#7907;c giao th&#7921;c
hi&#7879;n ch&#7913;c n&#259;ng thanh tra chuy&ecirc;n ng&agrave;nh.</span></p>

<h4 style='text-align:justify;text-indent:1.0cm'><a name="muc_1_1">M&#7909;c 1.
THANH TRA CH&Iacute;NH PH&#7910;</a></h4>

<h2 style='text-align:justify;text-indent:1.0cm'><a name="_Toc144884059"></a><a
name="dieu_10"><span style='i&#7873;u 10.
V&#7883; tr&iacute;, ch&#7913;c n&#259;ng c&#7911;a Thanh tra Ch&iacute;nh
ph&#7911;</span></a></h2>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>Thanh tra Ch&iacute;nh ph&#7911; l&agrave; c&#417;
quan c&#7911;a Ch&iacute;nh ph&#7911;, gi&uacute;p Ch&iacute;nh ph&#7911;
th&#7921;c hi&#7879;n qu&#7843;n l&yacute; nh&agrave; n&#432;&#7899;c v&#7873;
c&ocirc;ng t&aacute;c thanh tra, ti&#7871;p c&ocirc;ng d&acirc;n, gi&#7843;i
quy&#7871;t khi&#7871;u n&#7841;i, t&#7889; c&aacute;o v&agrave; ph&ograve;ng,
ch&#7889;ng tham nh&#361;ng, ti&ecirc;u c&#7921;c trong ph&#7841;m vi c&#7843;
n&#432;&#7899;c; th&#7921;c hi&#7879;n nhi&#7879;m v&#7909; thanh tra,
ti&#7871;p c&ocirc;ng d&acirc;n, gi&#7843;i quy&#7871;t khi&#7871;u n&#7841;i,
t&#7889; c&aacute;o v&agrave; ph&ograve;ng, ch&#7889;ng tham nh&#361;ng,
ti&ecirc;u c&#7921;c theo quy &#273;&#7883;nh c&#7911;a ph&aacute;p lu&#7853;t.</span></p>

<h2 style='text-align:justify;text-indent:1.0cm'><a name="_Toc144884060"></a><a
name="dieu_11"><span style='i&#7873;u 11.
Nhi&#7879;m v&#7909;, quy&#7873;n h&#7841;n c&#7911;a Thanh tra Ch&iacute;nh
ph&#7911;</span></a></h2>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>1. Trong l&#297;nh v&#7921;c thanh tra, Thanh tra
Ch&iacute;nh ph&#7911; gi&uacute;p Ch&iacute;nh ph&#7911; th&#7921;c hi&#7879;n
qu&#7843;n l&yacute; nh&agrave; n&#432;&#7899;c v&#7873; c&ocirc;ng t&aacute;c
thanh tra v&agrave; c&oacute; nhi&#7879;m v&#7909;, quy&#7873;n h&#7841;n sau
&#273;&acirc;y:</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>a) X&acirc;y d&#7921;ng ch&iacute;nh s&aacute;ch,
ph&aacute;p lu&#7853;t v&#7873; thanh tra;</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>b) X&acirc;y d&#7921;ng &#272;&#7883;nh
h&#432;&#7899;ng ch&#432;&#417;ng tr&igrave;nh thanh tra tr&igrave;nh Th&#7911;
t&#432;&#7899;ng Ch&iacute;nh ph&#7911; ph&ecirc; duy&#7879;t;</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>c) X&acirc;y d&#7921;ng k&#7871; ho&#7841;ch thanh tra
c&#7911;a Thanh tra Ch&iacute;nh ph&#7911;; h&#432;&#7899;ng d&#7851;n
B&#7897;, c&#417; quan ngang B&#7897; (sau &#273;&acirc;y g&#7885;i chung
l&agrave; B&#7897;), c&#417; quan thu&#7897;c Ch&iacute;nh ph&#7911;, &#7910;y
ban nh&acirc;n d&acirc;n c&#7845;p t&#7881;nh x&acirc;y d&#7921;ng k&#7871;
ho&#7841;ch thanh tra;</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>d) T&#7893; ch&#7913;c th&#7921;c hi&#7879;n v&agrave;
h&#432;&#7899;ng d&#7851;n B&#7897;, c&#417; quan thu&#7897;c Ch&iacute;nh
ph&#7911;, &#7910;y ban nh&acirc;n d&acirc;n c&#7845;p t&#7881;nh t&#7893;
ch&#7913;c th&#7921;c hi&#7879;n k&#7871; ho&#7841;ch thanh tra;</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>&#273;) Thanh tra vi&#7879;c th&#7921;c hi&#7879;n
ch&iacute;nh s&aacute;ch, ph&aacute;p lu&#7853;t, nhi&#7879;m v&#7909;,
quy&#7873;n h&#7841;n c&#7911;a B&#7897;, c&#417; quan thu&#7897;c Ch&iacute;nh
ph&#7911;, &#7910;y ban nh&acirc;n d&acirc;n c&#7845;p t&#7881;nh;</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>e) Thanh tra vi&#7879;c qu&#7843;n l&yacute; v&#7889;n
v&agrave; t&agrave;i s&#7843;n nh&agrave; n&#432;&#7899;c l&#7841;i doanh
nghi&#7879;p nh&agrave; n&#432;&#7899;c khi &#273;&#432;&#7907;c Th&#7911;
t&#432;&#7899;ng Ch&iacute;nh ph&#7911; giao;</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>g) Thanh tra v&#7909; vi&#7879;c ph&#7913;c t&#7841;p,
li&ecirc;n quan &#273;&#7871;n tr&aacute;ch nhi&#7879;m qu&#7843;n l&yacute;
c&#7911;a nhi&#7873;u B&#7897;, c&#417; quan thu&#7897;c Ch&iacute;nh
ph&#7911;, &#7910;y ban nh&acirc;n d&acirc;n c&#7845;p t&#7881;nh;</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>h) Thanh tra v&#7909; vi&#7879;c kh&aacute;c khi
&#273;&#432;&#7907;c Th&#7911; t&#432;&#7899;ng Ch&iacute;nh ph&#7911; giao;</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>i) Thanh tra l&#7841;i v&#7909; vi&#7879;c
&#273;&atilde; c&oacute; k&#7871;t lu&#7853;n c&#7911;a Thanh tra B&#7897;,
c&#417; quan thanh tra c&#7911;a c&#417; quan thu&#7897;c Ch&iacute;nh
ph&#7911; ho&#7863;c Thanh tra t&#7881;nh nh&#432;ng ph&aacute;t hi&#7879;n
c&oacute; d&#7845;u hi&#7879;u vi ph&#7841;m ph&aacute;p lu&#7853;t;</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>k) Theo d&otilde;i, &#273;&ocirc;n &#273;&#7889;c,
ki&#7875;m tra vi&#7879;c th&#7921;c hi&#7879;n k&#7871;t lu&#7853;n,
ki&#7871;n ngh&#7883;, quy&#7871;t &#273;&#7883;nh x&#7917; l&yacute; v&#7873;
thanh tra c&#7911;a Th&#7911; t&#432;&#7899;ng Ch&iacute;nh ph&#7911;, Thanh
tra Ch&iacute;nh ph&#7911;;</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>l) Ki&#7875;m tra t&iacute;nh ch&iacute;nh x&aacute;c,
h&#7907;p ph&aacute;p c&#7911;a k&#7871;t lu&#7853;n thanh tra c&#7911;a Thanh
tra B&#7897;, c&#417; quan thanh tra c&#7911;a c&#417; quan thu&#7897;c
Ch&iacute;nh ph&#7911;, Thanh tra t&#7881;nh v&agrave; quy&#7871;t
&#273;&#7883;nh x&#7917; l&yacute; sau thanh tra c&#7911;a B&#7897; tr&#432;&#7903;ng,
Th&#7911; tr&#432;&#7903;ng c&#417; quan thu&#7897;c Ch&iacute;nh ph&#7911;,
Ch&#7911; t&#7883;ch &#7910;y ban nh&acirc;n d&acirc;n c&#7845;p t&#7881;nh khi
c&#7847;n thi&#7871;t;</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>m) Ph&#7889;i h&#7907;p v&#7899;i Ki&#7875;m
to&aacute;n nh&agrave; n&#432;&#7899;c &#273;&#7875; x&#7917; l&yacute;
ch&#7891;ng ch&eacute;o, tr&ugrave;ng l&#7863;p gi&#7919;a ho&#7841;t
&#273;&#7897;ng thanh tra v&agrave; ho&#7841;t &#273;&#7897;ng ki&#7875;m
to&aacute;n nh&agrave; n&#432;&#7899;c; h&#432;&#7899;ng d&#7851;n Thanh tra
B&#7897;, Thanh tra t&#7881;nh trong vi&#7879;c x&#7917; l&yacute; ch&#7891;ng
ch&eacute;o, tr&ugrave;ng l&#7863;p gi&#7919;a ho&#7841;t &#273;&#7897;ng thanh
tra v&agrave; ho&#7841;t &#273;&#7897;ng ki&#7875;m to&aacute;n nh&agrave;
n&#432;&#7899;c;</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>n) Ch&#7881; &#273;&#7841;o c&ocirc;ng t&aacute;c
thanh tra, b&#7891;i d&#432;&#7905;ng, h&#432;&#7899;ng d&#7851;n nghi&#7879;p
v&#7909; thanh tra, c&#7845;p ch&#7913;ng ch&#7881; nghi&#7879;p v&#7909;
ng&#7841;ch thanh tra vi&ecirc;n;</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>o) T&#7893;ng h&#7907;p, b&aacute;o c&aacute;o
k&#7871;t qu&#7843; c&ocirc;ng t&aacute;c thanh tra.</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>2. Gi&uacute;p Ch&iacute;nh ph&#7911; th&#7921;c
hi&#7879;n qu&#7843;n l&yacute; nh&agrave; n&#432;&#7899;c v&#7873; c&ocirc;ng
t&aacute;c ti&#7871;p c&ocirc;ng d&acirc;n, gi&#7843;i quy&#7871;t khi&#7871;u
n&#7841;i, t&#7889; c&aacute;o; th&#7921;c hi&#7879;n nhi&#7879;m v&#7909;,
quy&#7873;n h&#7841;n trong c&ocirc;ng t&aacute;c ti&#7871;p c&ocirc;ng
d&acirc;n, gi&#7843;i quy&#7871;t khi&#7871;u n&#7841;i, t&#7889; c&aacute;o
theo quy &#273;&#7883;nh c&#7911;a ph&aacute;p lu&#7853;t.</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>3. Gi&uacute;p Ch&iacute;nh ph&#7911; th&#7921;c
hi&#7879;n qu&#7843;n l&yacute; nh&agrave; n&#432;&#7899;c v&#7873; c&ocirc;ng
t&aacute;c ph&ograve;ng, ch&#7889;ng tham nh&#361;ng, ti&ecirc;u c&#7921;c;
th&#7921;c hi&#7879;n nhi&#7879;m v&#7909;, quy&#7873;n h&#7841;n trong
c&ocirc;ng t&aacute;c ph&ograve;ng, ch&#7889;ng tham nh&#361;ng, ti&ecirc;u
c&#7921;c theo quy &#273;&#7883;nh c&#7911;a ph&aacute;p lu&#7853;t.</span></p>

<h2 style='text-align:justify;text-indent:1.0cm'><a name="_Toc144884061"></a><a
name="dieu_12"><span style='i&#7873;u 12.
Nhi&#7879;m v&#7909;, quy&#7873;n h&#7841;n c&#7911;a T&#7893;ng Thanh tra
Ch&iacute;nh ph&#7911;</span></a></h2>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>1. T&#7893;ng Thanh tra Ch&iacute;nh ph&#7911;
l&agrave; th&agrave;nh vi&ecirc;n Ch&iacute;nh ph&#7911;, ch&#7883;u
tr&aacute;ch nhi&#7879;m tr&#432;&#7899;c Qu&#7889;c h&#7897;i, Ch&iacute;nh
ph&#7911;, Th&#7911; t&#432;&#7899;ng Ch&iacute;nh ph&#7911; v&#7873;
c&ocirc;ng t&aacute;c thanh tra, ti&#7871;p c&ocirc;ng d&acirc;n, gi&#7843;i
quy&#7871;t khi&#7871;u n&#7841;i, t&#7889; c&aacute;o v&agrave; ph&ograve;ng,
ch&#7889;ng tham nh&#361;ng, ti&ecirc;u c&#7921;c.</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>C&aacute;c Ph&oacute; T&#7893;ng Thanh tra
Ch&iacute;nh ph&#7911; gi&uacute;p T&#7893;ng Thanh tra Ch&iacute;nh ph&#7911;
th&#7921;c hi&#7879;n nhi&#7879;m v&#7909; theo s&#7921; ph&acirc;n c&ocirc;ng
c&#7911;a T&#7893;ng Thanh tra Ch&iacute;nh ph&#7911;.</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>2. Trong l&#297;nh v&#7921;c thanh tra, T&#7893;ng
Thanh tra Ch&iacute;nh ph&#7911; c&oacute; nhi&#7879;m v&#7909;, quy&#7873;n
h&#7841;n sau &#273;&acirc;y:</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>a) L&atilde;nh &#273;&#7841;o, ch&#7881;
&#273;&#7841;o, ki&#7875;m tra c&ocirc;ng t&aacute;c thanh tra trong ph&#7841;m
vi qu&#7843;n l&yacute; nh&agrave; n&#432;&#7899;c c&#7911;a Ch&iacute;nh
ph&#7911;; l&atilde;nh &#273;&#7841;o Thanh tra Ch&iacute;nh ph&#7911;
th&#7921;c hi&#7879;n nhi&#7879;m v&#7909;, quy&#7873;n h&#7841;n theo quy
&#273;&#7883;nh c&#7911;a Lu&#7853;t n&agrave;y v&agrave; quy &#273;&#7883;nh
kh&aacute;c c&#7911;a ph&aacute;p lu&#7853;t c&oacute; li&ecirc;n quan;</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>b) Ban h&agrave;nh v&#259;n b&#7843;n quy ph&#7841;m
ph&aacute;p lu&#7853;t theo th&#7849;m quy&#7873;n;</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>c) Tr&igrave;nh Th&#7911; t&#432;&#7899;ng
Ch&iacute;nh ph&#7911; ph&ecirc; duy&#7879;t &#272;&#7883;nh h&#432;&#7899;ng
ch&#432;&#417;ng tr&igrave;nh thanh tra; ban h&agrave;nh k&#7871; ho&#7841;ch
thanh tra c&#7911;a Thanh tra Ch&iacute;nh ph&#7911; v&agrave; t&#7893;
ch&#7913;c, ch&#7881; &#273;&#7841;o vi&#7879;c th&#7921;c hi&#7879;n;</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>d) Quy&#7871;t &#273;&#7883;nh vi&#7879;c thanh tra
khi ph&aacute;t hi&#7879;n c&oacute; d&#7845;u hi&#7879;u vi ph&#7841;m
ph&aacute;p lu&#7853;t;</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>&#273;) &#272;&#7873; ngh&#7883; B&#7897;
tr&#432;&#7903;ng, Th&#7911; tr&#432;&#7903;ng c&#417; quan thu&#7897;c
Ch&iacute;nh ph&#7911;, Ch&#7911; t&#7883;ch &#7910;y ban nh&acirc;n d&acirc;n
c&#7845;p t&#7881;nh quy&#7871;t &#273;&#7883;nh vi&#7879;c thanh tra
&#273;&#7889;i v&#7899;i v&#7909; vi&#7879;c c&oacute; d&#7845;u hi&#7879;u vi
ph&#7841;m ph&aacute;p lu&#7853;t; tr&#432;&#7901;ng h&#7907;p B&#7897;
tr&#432;&#7903;ng, Th&#7911; tr&#432;&#7903;ng c&#417; quan thu&#7897;c
Ch&iacute;nh ph&#7911;, Ch&#7911; t&#7883;ch &#7910;y ban nh&acirc;n d&acirc;n
c&#7845;p t&#7881;nh kh&ocirc;ng th&#7921;c hi&#7879;n th&igrave; ra
quy&#7871;t &#273;&#7883;nh thanh tra ho&#7863;c b&aacute;o c&aacute;o
Th&#7911; t&#432;&#7899;ng Ch&iacute;nh ph&#7911; ch&#7881; &#273;&#7841;o;</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>e) Quy&#7871;t &#273;&#7883;nh thanh tra l&#7841;i
v&#7909; vi&#7879;c &#273;&atilde; c&oacute; k&#7871;t lu&#7853;n c&#7911;a
Thanh tra B&#7897;, c&#417; quan thanh tra c&#7911;a c&#417; quan thu&#7897;c
Ch&iacute;nh ph&#7911; ho&#7863;c Thanh tra t&#7881;nh nh&#432;ng ph&aacute;t
hi&#7879;n c&oacute; d&#7845;u hi&#7879;u vi ph&#7841;m ph&aacute;p lu&#7853;t;</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>g) X&#7917; l&yacute; ch&#7891;ng ch&eacute;o,
tr&ugrave;ng l&#7863;p gi&#7919;a ho&#7841;t &#273;&#7897;ng thanh tra
v&agrave; ho&#7841;t &#273;&#7897;ng ki&#7875;m to&aacute;n nh&agrave;
n&#432;&#7899;c, gi&#7919;a ho&#7841;t &#273;&#7897;ng c&#7911;a c&aacute;c
c&#417; quan thanh tra theo quy &#273;&#7883;nh t&#7841;i <a name="tc_1">kho&#7843;n
1, &#273;i&#7875;m b, &#273;i&#7875;m d kho&#7843;n 2 v&agrave; kho&#7843;n 3
&#272;i&#7873;u 55 c&#7911;a Lu&#7853;t n&agrave;y</a>;</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>h) Xem x&eacute;t, x&#7917; l&yacute; nh&#7919;ng
v&#7845;n &#273;&#7873; li&ecirc;n quan &#273;&#7871;n c&ocirc;ng t&aacute;c
thanh tra m&agrave; Ch&aacute;nh Thanh tra B&#7897; kh&ocirc;ng nh&#7845;t
tr&iacute; v&#7899;i ch&#7881; &#273;&#7841;o c&#7911;a B&#7897; t&#432;&#7903;ng,
Ch&aacute;nh Thanh tra t&#7881;nh kh&ocirc;ng nh&#7845;t tr&iacute; v&#7899;i
ch&#7881; &#273;&#7841;o c&#7911;a Ch&#7911; t&#7883;ch &#7910;y ban nh&acirc;n
d&acirc;n c&#7845;p t&#7881;nh. Tr&#432;&#7901;ng h&#7907;p B&#7897;
tr&#432;&#7903;ng, Ch&#7911; t&#7883;ch &#7910;y ban nh&acirc;n d&acirc;n
c&#7845;p t&#7881;nh kh&ocirc;ng &#273;&#7891;ng &yacute; th&igrave; T&#7893;ng
Thanh tra Ch&iacute;nh ph&#7911; b&aacute;o c&aacute;o Th&#7911;
t&#432;&#7899;ng Ch&iacute;nh ph&#7911; xem x&eacute;t, quy&#7871;t
&#273;&#7883;nh;</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>i) Ki&#7871;n ngh&#7883; B&#7897; tr&#432;&#7903;ng,
&#7910;y ban nh&acirc;n d&acirc;n c&#7845;p t&#7881;nh &#273;&igrave;nh
ch&#7881; vi&#7879;c thi h&agrave;nh ho&#7863;c b&atilde;i b&#7887; v&#259;n
b&#7843;n quy ph&#7841;m ph&aacute;p lu&#7853;t do B&#7897; tr&#432;&#7903;ng,
&#7910;y ban nh&acirc;n d&acirc;n c&#7845;p t&#7881;nh ban h&agrave;nh
tr&aacute;i v&#7899;i <a name="tvpllink_khhhnejlqt_1">Hi&#7871;n ph&aacute;p</a>,
lu&#7853;t, v&#259;n b&#7843;n quy ph&#7841;m ph&aacute;p lu&#7853;t c&#7911;a
c&#417; quan nh&agrave; n&#432;&#7899;c c&#7845;p tr&ecirc;n, v&#259;n
b&#7843;n quy ph&#7841;m ph&aacute;p lu&#7853;t c&#7911;a T&#7893;ng Thanh tra
Ch&iacute;nh ph&#7911; &#273;&#432;&#7907;c ph&aacute;t hi&#7879;n qua thanh
tra; tr&#432;&#7901;ng h&#7907;p ki&#7871;n ngh&#7883; kh&ocirc;ng
&#273;&#432;&#7907;c ch&#7845;p thu&#7853;n th&igrave; tr&igrave;nh Th&#7911;
t&#432;&#7899;ng Ch&iacute;nh ph&#7911; xem x&eacute;t, quy&#7871;t
&#273;&#7883;nh;</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>k) Ki&#7871;n ngh&#7883; Th&#7911; t&#432;&#7899;ng
Ch&iacute;nh ph&#7911; &#273;&igrave;nh ch&#7881; vi&#7879;c thi h&agrave;nh
m&#7897;t ph&#7847;n ho&#7863;c to&agrave;n b&#7897; ngh&#7883; quy&#7871;t
c&#7911;a H&#7897;i &#273;&#7891;ng nh&acirc;n d&acirc;n c&#7845;p t&#7881;nh
tr&aacute;i v&#7899;i <a name="tvpllink_khhhnejlqt_2">Hi&#7871;n ph&aacute;p</a>,
lu&#7853;t v&agrave; v&#259;n b&#7843;n quy ph&#7841;m ph&aacute;p lu&#7853;t
c&#7911;a c&#417; quan nh&agrave; n&#432;&#7899;c c&#7845;p tr&ecirc;n
&#273;&#432;&#7907;c ph&aacute;t hi&#7879;n qua thanh tra; b&aacute;o
c&aacute;o Th&#7911; t&#432;&#7899;ng Ch&iacute;nh ph&#7911; &#273;&#7873;
ngh&#7883; &#7910;y ban Th&#432;&#7901;ng v&#7909; Qu&#7889;c h&#7897;i
b&atilde;i b&#7887; m&#7897;t ph&#7847;n ho&#7863;c to&agrave;n b&#7897;
ngh&#7883; quy&#7871;t c&#7911;a H&#7897;i &#273;&#7891;ng nh&acirc;n d&acirc;n
c&#7845;p t&#7881;nh c&oacute; n&#7897;i dung tr&aacute;i v&#7899;i <a
name="tvpllink_khhhnejlqt_3">Hi&#7871;n ph&aacute;p</a>, lu&#7853;t v&agrave;
v&#259;n b&#7843;n quy ph&#7841;m ph&aacute;p lu&#7853;t c&#7911;a c&#417; quan
nh&agrave; n&#432;&#7899;c c&#7845;p tr&ecirc;n &#273;&#432;&#7907;c
ph&aacute;t hi&#7879;n qua thanh tra;</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span

style='font-size:14.0pt'>1. Thanh tra T&#7893;ng c&#7909;c, C&#7909;c c&oacute;
Ch&aacute;nh Thanh tra, Ph&oacute; Ch&aacute;nh Thanh tra, Thanh tra vi&ecirc;n
v&agrave; c&ocirc;ng ch&#7913;c kh&aacute;c.</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>Ch&aacute;nh Thanh tra T&#7893;ng c&#7909;c, C&#7909;c
do T&#7893;ng C&#7909;c tr&#432;&#7903;ng, C&#7909;c tr&#432;&#7903;ng b&#7893;
nhi&#7879;m, mi&#7877;n nhi&#7879;m, c&aacute;ch ch&#7913;c, &#273;i&#7873;u
&#273;&#7897;ng, lu&acirc;n chuy&#7875;n, bi&#7879;t ph&aacute;i sau khi tham
kh&#7843;o &yacute; ki&#7871;n c&#7911;a Ch&aacute;nh Thanh tra B&#7897;.</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>2. T&#7893; ch&#7913;c c&#7911;a Thanh tra T&#7893;ng
c&#7909;c, C&#7909;c &#273;&#432;&#7907;c th&#7921;c hi&#7879;n theo quy
&#273;&#7883;nh c&#7911;a ph&aacute;p lu&#7853;t v&#7873; t&#7893; ch&#7913;c
Ch&iacute;nh ph&#7911; v&agrave; quy &#273;&#7883;nh kh&aacute;c c&#7911;a
ph&aacute;p lu&#7853;t c&oacute; li&ecirc;n quan.</span></p>

<h4><a name="muc_4">M&#7909;c 4. THANH TRA T&#7880;NH</a></h4>

<h2><a name="_Toc144884071"></a><a name="dieu_22"><span style='i&#7873;u 22. V&#7883; tr&iacute;, ch&#7913;c n&#259;ng
c&#7911;a Thanh tra t&#7881;nh</span></a></h2>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>1. Thanh tra t&#7881;nh l&agrave; c&#417; quan
chuy&ecirc;n m&ocirc;n thu&#7897;c &#7910;y ban nh&acirc;n d&acirc;n c&#7845;p
t&#7881;nh, gi&uacute;p &#7910;y ban nh&acirc;n d&acirc;n c&ugrave;ng c&#7845;p
qu&#7843;n l&yacute; nh&agrave; n&#432;&#7899;c v&#7873; c&ocirc;ng t&aacute;c
thanh tra, ti&#7871;p c&ocirc;ng d&acirc;n, gi&#7843;i quy&#7871;t khi&#7871;u
n&#7841;i, t&#7889; c&aacute;o v&agrave; ph&ograve;ng, ch&#7889;ng tham
nh&#361;ng, ti&ecirc;u c&#7921;c; th&#7921;c hi&#7879;n nhi&#7879;m v&#7909;
thanh tra trong ph&#7841;m vi qu&#7843;n l&yacute; nh&agrave; n&#432;&#7899;c
c&#7911;a &#7910;y ban nh&acirc;n d&acirc;n c&#7845;p t&#7881;nh; th&#7921;c
hi&#7879;n nhi&#7879;m v&#7909; ti&#7871;p c&ocirc;ng d&acirc;n, gi&#7843;i
quy&#7871;t khi&#7871;u n&#7841;i, t&#7889; c&aacute;o v&agrave; ph&ograve;ng,
ch&#7889;ng tham nh&#361;ng, ti&ecirc;u c&#7921;c theo quy &#273;&#7883;nh
c&#7911;a ph&aacute;p lu&#7853;t.</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>2. Thanh tra t&#7881;nh ch&#7883;u s&#7921; ch&#7881;
&#273;&#7841;o, &#273;i&#7873;u h&agrave;nh c&#7911;a Ch&#7911; t&#7883;ch
&#7910;y ban nh&acirc;n d&acirc;n c&#7845;p t&#7881;nh v&agrave; ch&#7883;u
s&#7921; ch&#7881; &#273;&#7841;o v&#7873; c&ocirc;ng t&aacute;c thanh tra,
h&#432;&#7899;ng d&#7851;n nghi&#7879;p v&#7909; c&#7911;a Thanh tra
Ch&iacute;nh ph&#7911;.</span></p>

<h2><a name="_Toc144884072"></a><a name="dieu_23"><span style='i&#7873;u 23. Nhi&#7879;m v&#7909;, quy&#7873;n h&#7841;n
c&#7911;a Thanh tra t&#7881;nh</span></a></h2>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>1. Trong l&#297;nh v&#7921;c thanh tra, Thanh tra
t&#7881;nh gi&uacute;p &#7910;y ban nh&acirc;n d&acirc;n c&ugrave;ng c&#7845;p
qu&#7843;n l&yacute; nh&agrave; n&#432;&#7899;c v&#7873; c&ocirc;ng t&aacute;c
thanh tra v&agrave; c&oacute; nhi&#7879;m v&#7909;, quy&#7873;n h&#7841;n sau
&#273;&acirc;y:</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>a) X&acirc;y d&#7921;ng d&#7921; th&#7843;o k&#7871;
ho&#7841;ch thanh tra c&#7911;a t&#7881;nh, th&agrave;nh ph&#7889; tr&#7921;c
thu&#7897;c trung &#432;&#417;ng (sau &#273;&acirc;y g&#7885;i chung l&agrave;
k&#7871; ho&#7841;ch thanh tra c&#7911;a t&#7881;nh), h&#432;&#7899;ng
d&#7851;n Thanh tra s&#7903;, Thanh tra huy&#7879;n x&acirc;y d&#7921;ng
d&#7921; th&#7843;o k&#7871; ho&#7841;ch thanh tra &#273;&#7875; t&#7893;ng
h&#7907;p v&agrave;o k&#7871; ho&#7841;ch thanh tra c&#7911;a t&#7881;nh
tr&igrave;nh Ch&#7911; t&#7883;ch &#7910;y ban nh&acirc;n d&acirc;n c&#7845;p
t&#7881;nh ban h&agrave;nh;</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>b) T&#7893; ch&#7913;c th&#7921;c hi&#7879;n k&#7871;
ho&#7841;ch thanh tra c&#7911;a Thanh tra t&#7881;nh; theo d&otilde;i,
&#273;&ocirc;n &#273;&#7889;c, ki&#7875;m tra vi&#7879;c th&#7921;c hi&#7879;n
k&#7871; ho&#7841;ch thanh tra c&#7911;a Thanh tra s&#7903;, Thanh tra
huy&#7879;n;</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>c) Thanh tra vi&#7879;c th&#7921;c hi&#7879;n
ch&iacute;nh s&aacute;ch, ph&aacute;p lu&#7853;t v&agrave; nhi&#7879;m
v&#7909;, quy&#7873;n h&#7841;n c&#7911;a c&#417; quan, &#273;&#417;n v&#7883;
thu&#7897;c &#7910;y ban nh&acirc;n d&acirc;n c&#7845;p t&#7881;nh, &#7910;y
ban nh&acirc;n d&acirc;n c&#7845;p huy&#7879;n;</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>d) Thanh tra vi&#7879;c qu&#7843;n l&yacute; v&#7889;n
v&agrave; t&agrave;i s&#7843;n nh&agrave; n&#432;&#7899;c t&#7841;i doanh
nghi&#7879;p nh&agrave; n&#432;&#7899;c do &#7910;y ban nh&acirc;n d&acirc;n
c&#7845;p t&#7881;nh l&agrave; &#273;&#7841;i di&#7879;n ch&#7911; s&#7903;
h&#7919;u khi &#273;&#432;&#7907;c Ch&#7911; t&#7883;ch &#7910;y ban nh&acirc;n
d&acirc;n c&#7845;p t&#7881;nh giao;</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>&#273;) Thanh tra h&agrave;nh ch&iacute;nh, thanh tra
chuy&ecirc;n ng&agrave;nh &#273;&#7889;i v&#7899;i c&#417; quan, t&#7893;
ch&#7913;c, c&aacute; nh&acirc;n thu&#7897;c ph&#7841;m vi qu&#7843;n l&yacute;
c&#7911;a c&aacute;c s&#7903; kh&ocirc;ng th&agrave;nh l&#7853;p c&#417; quan
thanh tra;</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>e) Thanh tra v&#7909; vi&#7879;c kh&aacute;c khi
&#273;&#432;&#7907;c Ch&#7911; t&#7883;ch &#7910;y ban nh&acirc;n d&acirc;n
c&#7845;p t&#7881;nh giao;</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>g) Thanh tra l&#7841;i v&#7909; vi&#7879;c thanh tra
h&agrave;nh ch&iacute;nh &#273;&atilde; c&oacute; k&#7871;t lu&#7853;n
c&#7911;a Thanh tra s&#7903;, Thanh tra huy&#7879;n nh&#432;ng ph&aacute;t
hi&#7879;n c&oacute; d&#7845;u hi&#7879;u vi ph&#7841;m ph&aacute;p lu&#7853;t;</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>h) Theo d&otilde;i, &#273;&ocirc;n &#273;&#7889;c,
ki&#7875;m tra vi&#7879;c th&#7921;c hi&#7879;n k&#7871;t lu&#7853;n,
ki&#7871;n ngh&#7883; c&#7911;a Thanh tra t&#7881;nh, quy&#7871;t
&#273;&#7883;nh x&#7917; l&yacute; v&#7873; thanh tra c&#7911;a Ch&#7911;
t&#7883;ch &#7910;y ban nh&acirc;n d&acirc;n c&#7845;p t&#7881;nh;</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>i) Ki&#7875;m tra t&iacute;nh ch&iacute;nh x&aacute;c,
h&#7907;p ph&aacute;p c&#7911;a k&#7871;t lu&#7853;n thanh tra c&#7911;a Thanh
tra s&#7903;, Thanh tra huy&#7879;n v&agrave; quy&#7871;t &#273;&#7883;nh
x&#7917; l&yacute; sau thanh tra c&#7911;a Gi&aacute;m &#273;&#7889;c s&#7903;,
Ch&#7911; t&#7883;ch &#7910;y ban nh&acirc;n d&acirc;n c&#7845;p huy&#7879;n
khi c&#7847;n thi&#7871;t;</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>k) H&#432;&#7899;ng d&#7851;n nghi&#7879;p v&#7909;
thanh tra &#273;&#7889;i v&#7899;i Thanh tra s&#7903;, Thanh tra huy&#7879;n;
t&#7893; ch&#7913;c b&#7891;i d&#432;&#7905;ng nghi&#7879;p v&#7909; cho
c&ocirc;ng ch&#7913;c thanh tra c&#7911;a t&#7881;nh, th&agrave;nh ph&#7889;
tr&#7921;c thu&#7897;c trung &#432;&#417;ng;</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>l) T&#7893;ng h&#7907;p, b&aacute;o c&aacute;o
k&#7871;t qu&#7843; c&ocirc;ng t&aacute;c thanh tra.</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>2. Gi&uacute;p &#7910;y ban nh&acirc;n d&acirc;n
c&#7845;p t&#7881;nh th&#7921;c hi&#7879;n qu&#7843;n l&yacute; nh&agrave;
n&#432;&#7899;c v&#7873; c&ocirc;ng t&aacute;c ti&#7871;p c&ocirc;ng d&acirc;n,
gi&#7843;i quy&#7871;t khi&#7871;u n&#7841;i, t&#7889; c&aacute;o; th&#7921;c
hi&#7879;n nhi&#7879;m v&#7909;, quy&#7873;n h&#7841;n trong c&ocirc;ng
t&aacute;c ti&#7871;p c&ocirc;ng d&acirc;n, gi&#7843;i quy&#7871;t khi&#7871;u
n&#7841;i, t&#7889; c&aacute;o theo quy &#273;&#7883;nh c&#7911;a ph&aacute;p
lu&#7853;t.</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>3. Gi&uacute;p &#7910;y ban nh&acirc;n d&acirc;n
c&#7845;p t&#7881;nh th&#7921;c hi&#7879;n qu&#7843;n l&yacute; nh&agrave;
n&#432;&#7899;c v&#7873; c&ocirc;ng t&aacute;c ph&ograve;ng, ch&#7889;ng tham
nh&#361;ng, ti&ecirc;u c&#7921;c; th&#7921;c hi&#7879;n nhi&#7879;m v&#7909;,
quy&#7873;n h&#7841;n trong c&ocirc;ng t&aacute;c ph&ograve;ng, ch&#7889;ng
tham nh&#361;ng, ti&ecirc;u c&#7921;c theo quy &#273;&#7883;nh c&#7911;a
ph&aacute;p lu&#7853;t.</span></p>

<h2><a name="_Toc144884073"></a><a name="dieu_24"><span style='i&#7873;u 24. Nhi&#7879;m v&#7909;, quy&#7873;n h&#7841;n
c&#7911;a Ch&aacute;nh Thanh tra t&#7881;nh</span></a></h2>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>Trong l&#297;nh v&#7921;c thanh tra, Ch&aacute;nh
Thanh tra t&#7881;nh c&oacute; nhi&#7879;m v&#7909;, quy&#7873;n h&#7841;n sau
&#273;&acirc;y:</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>1. L&atilde;nh &#273;&#7841;o, ch&#7881;
&#273;&#7841;o, ki&#7875;m tra c&ocirc;ng t&aacute;c thanh tra trong ph&#7841;m
vi qu&#7843;n l&yacute; nh&agrave; n&#432;&#7899;c c&#7911;a &#7910;y ban
nh&acirc;n d&acirc;n c&#7845;p t&#7881;nh; l&atilde;nh &#273;&#7841;o Thanh tra
t&#7881;nh th&#7921;c hi&#7879;n nhi&#7879;m v&#7909;, quy&#7873;n h&#7841;n
theo quy &#273;&#7883;nh c&#7911;a Lu&#7853;t n&agrave;y v&agrave; quy
&#273;&#7883;nh kh&aacute;c c&#7911;a ph&aacute;p lu&#7853;t c&oacute;
li&ecirc;n quan;</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>2. Quy&#7871;t &#273;&#7883;nh vi&#7879;c thanh tra
khi ph&aacute;t hi&#7879;n c&oacute; d&#7845;u hi&#7879;u vi ph&#7841;m
ph&aacute;p lu&#7853;t;</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>3. &#272;&#7873; ngh&#7883; Gi&aacute;m &#273;&#7889;c
s&#7903;, Ch&#7911; t&#7883;ch &#7910;y ban nh&acirc;n d&acirc;n c&#7845;p
huy&#7879;n ch&#7881; &#273;&#7841;o Thanh tra s&#7903;, Thanh tra huy&#7879;n
ti&#7871;n h&agrave;nh thanh tra khi ph&aacute;t hi&#7879;n c&oacute; d&#7845;u
hi&#7879;u vi ph&#7841;m ph&aacute;p lu&#7853;t; tr&#432;&#7901;ng h&#7907;p
Gi&aacute;m &#273;&#7889;c s&#7903;, Ch&#7911; t&#7883;ch &#7910;y ban
nh&acirc;n d&acirc;n c&#7845;p huy&#7879;n kh&ocirc;ng th&#7921;c hi&#7879;n ho&#7863;c
s&#7903; kh&ocirc;ng c&oacute; c&#417; quan thanh tra th&igrave; ra quy&#7871;t
&#273;&#7883;nh thanh tra ho&#7863;c b&aacute;o c&aacute;o Ch&#7911; t&#7883;ch
&#7910;y ban nh&acirc;n d&acirc;n c&#7845;p t&#7881;nh xem x&eacute;t,
quy&#7871;t &#273;&#7883;nh;</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>4. Quy&#7871;t &#273;&#7883;nh thanh tra l&#7841;i
v&#7909; vi&#7879;c &#273;&atilde; c&oacute; k&#7871;t lu&#7853;n c&#7911;a
Thanh tra s&#7903;, Thanh tra huy&#7879;n nh&#432;ng ph&aacute;t hi&#7879;n
c&oacute; d&#7845;u hi&#7879;u vi ph&#7841;m ph&aacute;p lu&#7853;t;</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>5. X&#7917; ph&#7841;t vi ph&#7841;m h&agrave;nh
ch&iacute;nh ho&#7863;c ki&#7871;n ngh&#7883; ng&#432;&#7901;i c&oacute;
th&#7849;m quy&#7873;n x&#7917; ph&#7841;t vi ph&#7841;m h&agrave;nh
ch&iacute;nh theo quy &#273;&#7883;nh c&#7911;a ph&aacute;p lu&#7853;t v&#7873;
x&#7917; l&yacute; vi ph&#7841;m h&agrave;nh ch&iacute;nh;</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>6. &#272;&#7873; ngh&#7883; Gi&aacute;m &#273;&#7889;c
s&#7903;, Ch&#7911; t&#7883;ch &#7910;y ban nh&acirc;n d&acirc;n c&#7845;p
huy&#7879;n xem x&eacute;t, ch&#7845;n ch&#7881;nh, kh&#7855;c ph&#7909;c sai
ph&#7841;m trong ng&agrave;nh, l&#297;nh v&#7921;c, &#273;&#7883;a b&agrave;n
thu&#7897;c ph&#7841;m vi qu&#7843;n l&yacute; do Thanh tra t&#7881;nh
ph&aacute;t hi&#7879;n qua thanh tra;</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>7. X&#7917; l&yacute; ch&#7891;ng ch&eacute;o,
tr&ugrave;ng l&#7863;p gi&#7919;a ho&#7841;t &#273;&#7897;ng c&#7911;a
c&aacute;c Thanh tra s&#7903; theo quy &#273;&#7883;nh t&#7841;i <a name="tc_4">&#273;i&#7875;m
i kho&#7843;n 2 &#272;i&#7873;u 55 c&#7911;a Lu&#7853;t n&agrave;y</a>;</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>8. Xem x&eacute;t, x&#7917; l&yacute; nh&#7919;ng
v&#7845;n &#273;&#7873; li&ecirc;n quan &#273;&#7871;n c&ocirc;ng t&aacute;c
thanh tra h&agrave;nh ch&iacute;nh m&agrave; Ch&aacute;nh Thanh tra s&#7903;
kh&ocirc;ng nh&#7845;t tr&iacute; v&#7899;i Gi&aacute;m &#273;&#7889;c
s&#7903;, Ch&aacute;nh Thanh tra huy&#7879;n kh&ocirc;ng nh&#7845;t tr&iacute;
v&#7899;i Ch&#7911; t&#7883;ch &#7910;y ban nh&acirc;n d&acirc;n c&#7845;p
huy&#7879;n; tr&#432;&#7901;ng h&#7907;p Gi&aacute;m &#273;&#7889;c s&#7903;,
Ch&#7911; t&#7883;ch &#7910;y ban nh&acirc;n d&acirc;n c&#7845;p huy&#7879;n
kh&ocirc;ng &#273;&#7891;ng &yacute; v&#7899;i vi&#7879;c x&#7917; l&yacute;
c&#7911;a Ch&aacute;nh Thanh tra t&#7881;nh th&igrave; b&aacute;o c&aacute;o
Ch&#7911; t&#7883;ch &#7910;y ban nh&acirc;n d&acirc;n c&#7845;p t&#7881;nh xem
x&eacute;t, quy&#7871;t &#273;&#7883;nh;</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>9. Ki&#7871;n ngh&#7883; Ch&#7911; t&#7883;ch &#7910;y
ban nh&acirc;n d&acirc;n c&#7845;p t&#7881;nh gi&#7843;i quy&#7871;t v&#7845;n
&#273;&#7873; li&ecirc;n quan &#273;&#7871;n c&ocirc;ng t&aacute;c thanh tra;</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>10. Ki&#7871;n ngh&#7883; c&#417; quan nh&agrave;
n&#432;&#7899;c c&oacute; th&#7849;m quy&#7873;n s&#7917;a &#273;&#7893;i,
b&#7893; sung, ban h&agrave;nh quy &#273;&#7883;nh cho ph&ugrave; h&#7907;p
v&#7899;i y&ecirc;u c&#7847;u qu&#7843;n l&yacute;; ki&#7871;n ngh&#7883;
&#273;&igrave;nh ch&#7881;, h&#7911;y b&#7887; ho&#7863;c b&atilde;i b&#7887;
quy &#273;&#7883;nh tr&aacute;i ph&aacute;p lu&#7853;t &#273;&#432;&#7907;c
ph&aacute;t hi&#7879;n qua thanh tra;</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>11. Ki&#7871;n ngh&#7883; Ch&#7911; t&#7883;ch
&#7910;y ban nh&acirc;n d&acirc;n c&#7845;p t&#7881;nh xem x&eacute;t
tr&aacute;ch nhi&#7879;m, x&#7917; l&yacute; ng&#432;&#7901;i thu&#7897;c
quy&#7873;n qu&#7843;n l&yacute; c&#7911;a Ch&#7911; t&#7883;ch &#7910;y ban nh&acirc;n
d&acirc;n c&#7845;p t&#7881;nh c&oacute; h&agrave;nh vi vi ph&#7841;m
ph&aacute;p lu&#7853;t &#273;&#432;&#7907;c ph&aacute;t hi&#7879;n qua thanh
tra ho&#7863;c kh&ocirc;ng th&#7921;c hi&#7879;n k&#7871;t lu&#7853;n,

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
