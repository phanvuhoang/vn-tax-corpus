h&agrave;nh thanh tra tr&#7921;c ti&#7871;p, Tr&#432;&#7903;ng &#273;o&agrave;n
thanh tra c&oacute; tr&aacute;ch nhi&#7879;m x&acirc;y d&#7921;ng b&aacute;o
c&aacute;o k&#7871;t qu&#7843; thanh tra g&#7917;i &#273;&#7871;n
ng&#432;&#7901;i ra quy&#7871;t &#273;&#7883;nh thanh tra. B&aacute;o
c&aacute;o k&#7871;t qu&#7843; thanh tra ph&#7843;i c&oacute; c&aacute;c
n&#7897;i dung sau &#273;&acirc;y:</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>a) K&#7871;t lu&#7853;n c&#7909; th&#7875; v&#7873;
t&#7915;ng n&#7897;i dung &#273;&atilde; ti&#7871;n h&agrave;nh thanh tra;</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>b) X&aacute;c &#273;&#7883;nh r&otilde; t&iacute;nh
ch&#7845;t, m&#7913;c &#273;&#7897;, h&#7853;u qu&#7843; c&#7911;a h&agrave;nh
vi vi ph&#7841;m; nguy&ecirc;n nh&acirc;n, tr&aacute;ch nhi&#7879;m c&#7911;a
c&#417; quan, t&#7893; ch&#7913;c, c&aacute; nh&acirc;n c&oacute; h&agrave;nh
vi vi ph&#7841;m ph&aacute;p lu&#7853;t (n&#7871;u c&oacute;);</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>c) &Yacute; ki&#7871;n kh&aacute;c nhau (n&#7871;u
c&oacute;) gi&#7919;a th&agrave;nh vi&ecirc;n kh&aacute;c c&#7911;a
&#272;o&agrave;n thanh tra v&#7899;i Tr&#432;&#7903;ng &#273;o&agrave;n thanh
tra v&#7873; n&#7897;i dung b&aacute;o c&aacute;o k&#7871;t qu&#7843; thanh
tra;</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>d) Bi&#7879;n ph&aacute;p x&#7917; l&yacute;
&#273;&atilde; &#273;&#432;&#7907;c &aacute;p d&#7909;ng v&agrave; ki&#7871;n
ngh&#7883; gi&#7843;i ph&aacute;p, bi&#7879;n ph&aacute;p x&#7917; l&yacute;,
kh&#7855;c ph&#7909;c h&#7853;u qu&#7843; (n&#7871;u c&oacute;).</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>2. Tr&#432;&#7901;ng h&#7907;p qua thanh tra
ph&aacute;t hi&#7879;n c&oacute; h&agrave;nh vi tham nh&#361;ng, ti&ecirc;u
c&#7921;c th&igrave; trong b&aacute;o c&aacute;o k&#7871;t qu&#7843; thanh tra
c&ograve;n ph&#7843;i n&ecirc;u r&otilde; tr&aacute;ch nhi&#7879;m c&#7911;a
ng&#432;&#7901;i &#273;&#7913;ng &#273;&#7847;u c&#417; quan, t&#7893;
ch&#7913;c &#273;&#7875; x&#7843;y ra h&agrave;nh vi tham nh&#361;ng,
ti&ecirc;u c&#7921;c theo c&aacute;c m&#7913;c &#273;&#7897; sau
&#273;&acirc;y:</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>a) Y&#7871;u k&eacute;m v&#7873; n&#259;ng l&#7921;c
qu&#7843;n l&yacute;;</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>b) Thi&#7871;u tr&aacute;ch nhi&#7879;m trong
qu&#7843;n l&yacute;;</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>c) Bao che cho ng&#432;&#7901;i c&oacute; h&agrave;nh
vi tham nh&#361;ng, ti&ecirc;u c&#7921;c.</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>3. B&aacute;o c&aacute;o k&#7871;t qu&#7843; thanh tra
ph&#7843;i n&ecirc;u r&otilde; quy &#273;&#7883;nh c&#7911;a ph&aacute;p
lu&#7853;t l&agrave;m c&#259;n c&#7913; &#273;&#7875; x&aacute;c
&#273;&#7883;nh t&iacute;nh ch&#7845;t, m&#7913;c &#273;&#7897; vi ph&#7841;m,
ki&#7871;n ngh&#7883; gi&#7843;i ph&aacute;p, bi&#7879;n ph&aacute;p x&#7917;
l&yacute;, kh&#7855;c ph&#7909;c h&#7853;u qu&#7843;.</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>4. Th&#7901;i gian x&acirc;y d&#7921;ng b&aacute;o
c&aacute;o k&#7871;t qu&#7843; thanh tra &#273;&#432;&#7907;c t&iacute;nh
t&#7915; ng&agrave;y &#272;o&agrave;n thanh tra k&#7871;t th&uacute;c
vi&#7879;c ti&#7871;n h&agrave;nh thanh tra tr&#7921;c ti&#7871;p v&agrave;
&#273;&#432;&#7907;c quy &#273;&#7883;nh nh&#432; sau:</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>a) &#272;&#7889;i v&#7899;i cu&#7897;c thanh tra do
Thanh tra Ch&iacute;nh ph&#7911; ti&#7871;n h&agrave;nh, th&#7901;i gian
x&acirc;y d&#7921;ng b&aacute;o c&aacute;o k&#7871;t qu&#7843; thanh tra
kh&ocirc;ng qu&aacute; 30 ng&agrave;y, tr&#432;&#7901;ng h&#7907;p ph&#7913;c
t&#7841;p th&igrave; c&oacute; th&#7875; k&eacute;o d&agrave;i nh&#432;ng
kh&ocirc;ng qu&aacute; 45 ng&agrave;y;</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>b) &#272;&#7889;i v&#7899;i cu&#7897;c thanh tra do
Thanh tra B&#7897;, Thanh tra T&#7893;ng c&#7909;c, C&#7909;c, Thanh tra
t&#7881;nh ti&#7871;n h&agrave;nh, th&#7901;i gian x&acirc;y d&#7921;ng
b&aacute;o c&aacute;o k&#7871;t qu&#7843; thanh tra kh&ocirc;ng qu&aacute; 20
ng&agrave;y, tr&#432;&#7901;ng h&#7907;p ph&#7913;c t&#7841;p th&igrave;
c&oacute; th&#7875; k&eacute;o d&agrave;i nh&#432;ng kh&ocirc;ng qu&aacute; 30 ng&agrave;y;</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>c) &#272;&#7889;i v&#7899;i cu&#7897;c thanh tra do
Thanh tra s&#7903;, Thanh tra huy&#7879;n ti&#7871;n h&agrave;nh, th&#7901;i
gian x&acirc;y d&#7921;ng b&aacute;o c&aacute;o k&#7871;t qu&#7843; thanh tra
kh&ocirc;ng qu&aacute; 15 ng&agrave;y, tr&#432;&#7901;ng h&#7907;p ph&#7913;c
t&#7841;p th&igrave; c&oacute; th&#7875; k&eacute;o d&agrave;i nh&#432;ng
kh&ocirc;ng qu&aacute; 20 ng&agrave;y.</span></p>

<h2><a name="_Toc144884127"></a><a name="dieu_74"><span style='i&#7873;u 74. Xem x&eacute;t b&aacute;o c&aacute;o
k&#7871;t qu&#7843; thanh tra</span></a></h2>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>Ng&#432;&#7901;i ra quy&#7871;t &#273;&#7883;nh thanh
tra xem x&eacute;t, &#273;&aacute;nh gi&aacute; c&aacute;c n&#7897;i dung trong
b&aacute;o c&aacute;o k&#7871;t qu&#7843; thanh tra c&#7911;a &#272;o&agrave;n
thanh tra.</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>Tr&#432;&#7901;ng h&#7907;p c&#7847;n thi&#7871;t,
ng&#432;&#7901;i ra quy&#7871;t &#273;&#7883;nh thanh tra y&ecirc;u c&#7847;u
Tr&#432;&#7903;ng &#273;o&agrave;n thanh tra l&agrave;m r&otilde; ho&#7863;c
b&#7893; sung n&#7897;i dung trong b&aacute;o c&aacute;o k&#7871;t qu&#7843;
thanh tra.</span></p>

<h2><a name="_Toc144884128"></a><a name="dieu_75"><span style='i&#7873;u 75. X&acirc;y d&#7921;ng d&#7921; th&#7843;o
k&#7871;t lu&#7853;n thanh tra</span></a></h2>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>1. Trong th&#7901;i h&#7841;n 05 ng&agrave;y
l&agrave;m vi&#7879;c k&#7875; t&#7915; ng&agrave;y nh&#7853;n
&#273;&#432;&#7907;c b&aacute;o c&aacute;o k&#7871;t qu&#7843; thanh tra,
ng&#432;&#7901;i ra quy&#7871;t &#273;&#7883;nh thanh tra giao
Tr&#432;&#7903;ng &#273;o&agrave;n thanh tra x&acirc;y d&#7921;ng d&#7921;
th&#7843;o k&#7871;t lu&#7853;n thanh tra. D&#7921; th&#7843;o k&#7871;t
lu&#7853;n thanh tra bao g&#7891;m c&aacute;c n&#7897;i dung quy
&#273;&#7883;nh t&#7841;i <a name="tc_19">kho&#7843;n 2 &#272;i&#7873;u 78
c&#7911;a Lu&#7853;t n&agrave;y</a>.</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>2. Trong qu&aacute; tr&igrave;nh x&acirc;y d&#7921;ng
d&#7921; th&#7843;o k&#7871;t lu&#7853;n thanh tra, ng&#432;&#7901;i ra
quy&#7871;t &#273;&#7883;nh thanh tra c&oacute; quy&#7873;n y&ecirc;u c&#7847;u
Tr&#432;&#7903;ng &#273;o&agrave;n thanh tra, th&agrave;nh vi&ecirc;n
kh&aacute;c c&#7911;a &#272;o&agrave;n thanh tra b&aacute;o c&aacute;o,
y&ecirc;u c&#7847;u &#273;&#7889;i t&#432;&#7907;ng thanh tra ho&#7863;c
c&#417; quan, t&#7893; ch&#7913;c, c&aacute; nh&acirc;n c&oacute; li&ecirc;n
quan gi&#7843;i tr&igrave;nh, l&agrave;m r&otilde; th&ecirc;m nh&#7919;ng
v&#7845;n &#273;&#7873; d&#7921; ki&#7871;n k&#7871;t lu&#7853;n v&#7873;
n&#7897;i dung thanh tra.</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>3. Vi&#7879;c gi&#7843;i tr&igrave;nh ph&#7843;i
th&#7921;c hi&#7879;n b&#7857;ng v&#259;n b&#7843;n k&egrave;m theo th&ocirc;ng
tin, t&agrave;i li&#7879;u, ch&#7913;ng c&#7913; &#273;&#7875; ch&#7913;ng minh
cho n&#7897;i dung gi&#7843;i tr&igrave;nh. Tr&#432;&#7903;ng &#273;o&agrave;n
thanh tra c&oacute; tr&aacute;ch nhi&#7879;m nghi&ecirc;n c&#7913;u,
&#273;&#7873; xu&#7845;t v&#7899;i ng&#432;&#7901;i ra quy&#7871;t
&#273;&#7883;nh thanh tra x&#7917; l&yacute; n&#7897;i dung gi&#7843;i
tr&igrave;nh c&#7911;a &#273;&#7889;i t&#432;&#7907;ng thanh tra.</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>4. D&#7921; th&#7843;o k&#7871;t lu&#7853;n thanh tra
&#273;&#432;&#7907;c g&#7917;i &#273;&#7871;n th&agrave;nh vi&ecirc;n
kh&aacute;c c&#7911;a &#272;o&agrave;n thanh tra &#273;&#7875; tham gia
&yacute; ki&#7871;n tr&#432;&#7899;c khi tr&igrave;nh ng&#432;&#7901;i ra
quy&#7871;t &#273;&#7883;nh thanh tra.</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>Th&agrave;nh vi&ecirc;n kh&aacute;c c&#7911;a
&#272;o&agrave;n thanh tra c&oacute; quy&#7873;n b&#7843;o l&#432;u &yacute;
ki&#7871;n v&#7873; n&#7897;i dung d&#7921; th&#7843;o k&#7871;t lu&#7853;n
thanh tra. Tr&#432;&#7903;ng &#273;o&agrave;n thanh tra c&oacute; quy&#7873;n b&#7843;o
l&#432;u &yacute; ki&#7871;n v&#7873; n&#7897;i dung trong k&#7871;t lu&#7853;n
thanh tra tr&#432;&#7899;c ng&#432;&#7901;i ra quy&#7871;t &#273;&#7883;nh
thanh tra. &Yacute; ki&#7871;n b&#7843;o l&#432;u &#273;&#432;&#7907;c
th&#7875; hi&#7879;n b&#7857;ng v&#259;n b&#7843;n g&#7917;i k&egrave;m theo
d&#7921; th&#7843;o k&#7871;t lu&#7853;n thanh tra.</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>5. Th&#7901;i gian x&acirc;y d&#7921;ng d&#7921;
th&#7843;o k&#7871;t lu&#7853;n thanh tra &#273;&#432;&#7907;c t&iacute;nh
t&#7915; ng&agrave;y ng&#432;&#7901;i ra quy&#7871;t &#273;&#7883;nh thanh tra
giao x&acirc;y d&#7921;ng d&#7921; th&#7843;o k&#7871;t lu&#7853;n thanh tra
v&agrave; &#273;&#432;&#7907;c quy &#273;&#7883;nh nh&#432; sau:</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>a) &#272;&#7889;i v&#7899;i cu&#7897;c thanh tra do
Thanh tra Ch&iacute;nh ph&#7911; ti&#7871;n h&agrave;nh, th&#7901;i gian
x&acirc;y d&#7921;ng d&#7921; th&#7843;o k&#7871;t lu&#7853;n thanh tra
kh&ocirc;ng qu&aacute; 30 ng&agrave;y, tr&#432;&#7901;ng h&#7907;p ph&#7913;c
t&#7841;p th&igrave; c&oacute; th&#7875; k&eacute;o d&agrave;i nh&#432;ng
kh&ocirc;ng qu&aacute; 45 ng&agrave;y;</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>b) &#272;&#7889;i v&#7899;i cu&#7897;c thanh tra do
Thanh tra B&#7897;, Thanh tra T&#7893;ng c&#7909;c, C&#7909;c, Thanh tra
t&#7881;nh ti&#7871;n h&agrave;nh, th&#7901;i gian x&acirc;y d&#7921;ng
d&#7921; th&#7843;o k&#7871;t lu&#7853;n thanh tra kh&ocirc;ng qu&aacute; 20
ng&agrave;y, tr&#432;&#7901;ng h&#7907;p ph&#7913;c t&#7841;p th&igrave;
c&oacute; th&#7875; k&eacute;o d&agrave;i nh&#432;ng kh&ocirc;ng qu&aacute; 30
ng&agrave;y;</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>c) &#272;&#7889;i v&#7899;i cu&#7897;c thanh tra do
Thanh tra s&#7903;, Thanh tra huy&#7879;n ti&#7871;n h&agrave;nh, th&#7901;i
gian x&acirc;y d&#7921;ng d&#7921; th&#7843;o k&#7871;t lu&#7853;n thanh tra
kh&ocirc;ng qu&aacute; 15 ng&agrave;y, tr&#432;&#7901;ng h&#7907;p ph&#7913;c
t&#7841;p th&igrave; c&oacute; th&#7875; k&eacute;o d&agrave;i nh&#432;ng
kh&ocirc;ng qu&aacute; 20 ng&agrave;y.</span></p>

<h2><a name="_Toc144884129"></a><a name="dieu_76"><span style='i&#7873;u 76. Tham kh&#7843;o &yacute; ki&#7871;n v&#7873;
d&#7921; th&#7843;o k&#7871;t lu&#7853;n thanh tra</span></a></h2>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>Trong qu&aacute; tr&igrave;nh x&acirc;y d&#7921;ng
d&#7921; th&#7843;o k&#7871;t lu&#7853;n thanh tra, ng&#432;&#7901;i ra
quy&#7871;t &#273;&#7883;nh thanh tra c&oacute; th&#7875; quy&#7871;t
&#273;&#7883;nh vi&#7879;c xin &yacute; ki&#7871;n c&#7911;a c&#417; quan,
t&#7893; ch&#7913;c, c&aacute; nh&acirc;n c&oacute; li&ecirc;n quan v&#7873;
m&#7897;t ho&#7863;c m&#7897;t s&#7889; n&#7897;i dung c&#7911;a d&#7921;
th&#7843;o k&#7871;t lu&#7853;n thanh tra. C&#417; quan, t&#7893; ch&#7913;c,
c&aacute; nh&acirc;n &#273;&#432;&#7907;c &#273;&#7873; ngh&#7883; c&oacute;
v&#259;n b&#7843;n tr&#7843; l&#7901;i v&#7873; n&#7897;i dung
&#273;&#432;&#7907;c xin &yacute; ki&#7871;n trong th&#7901;i h&#7841;n theo
&#273;&#7873; ngh&#7883; c&#7911;a ng&#432;&#7901;i ra quy&#7871;t
&#273;&#7883;nh thanh tra.</span></p>

<h2><a name="_Toc144884130"></a><a name="dieu_77"><span style='i&#7873;u 77. Th&#7849;m &#273;&#7883;nh d&#7921;
th&#7843;o k&#7871;t lu&#7853;n thanh tra</span></a></h2>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>1. D&#7921; th&#7843;o k&#7871;t lu&#7853;n thanh tra
c&#7911;a Thanh tra Ch&iacute;nh ph&#7911;, d&#7921; th&#7843;o k&#7871;t
lu&#7853;n thanh tra h&agrave;nh ch&iacute;nh c&#7911;a Thanh tra B&#7897;
v&agrave; Thanh tra t&#7881;nh ph&#7843;i &#273;&#432;&#7907;c th&#7849;m
&#273;&#7883;nh tr&#432;&#7899;c khi k&yacute; ban h&agrave;nh. Vi&#7879;c
th&#7849;m &#273;&#7883;nh d&#7921; th&#7843;o k&#7871;t lu&#7853;n thanh tra
chuy&ecirc;n ng&agrave;nh c&#7911;a Thanh tra B&#7897; v&agrave; Thanh tra
t&#7881;nh, d&#7921; th&#7843;o k&#7871;t lu&#7853;n thanh tra c&#7911;a
c&aacute;c c&#417; quan thanh tra kh&aacute;c &#273;&#432;&#7907;c th&#7921;c
hi&#7879;n khi c&#7847;n thi&#7871;t.</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>2. Ng&#432;&#7901;i ra quy&#7871;t &#273;&#7883;nh thanh
tra xem x&eacute;t, quy&#7871;t &#273;&#7883;nh vi&#7879;c ph&acirc;n
c&ocirc;ng &#273;&#417;n v&#7883;, c&aacute; nh&acirc;n th&#7921;c hi&#7879;n
vi&#7879;c th&#7849;m &#273;&#7883;nh d&#7921; th&#7843;o k&#7871;t lu&#7853;n
thanh tra (sau &#273;&acirc;y g&#7885;i chung l&agrave; ng&#432;&#7901;i
th&#7921;c hi&#7879;n th&#7849;m &#273;&#7883;nh) &#273;&#7875; b&#7843;o
&#273;&#7843;m m&#7909;c &#273;&iacute;ch, y&ecirc;u c&#7847;u v&agrave;
c&aacute;c n&#7897;i dung theo quy&#7871;t &#273;&#7883;nh thanh tra v&agrave;
k&#7871; ho&#7841;ch ti&#7871;n h&agrave;nh thanh tra &#273;&#432;&#7907;c
ph&ecirc; duy&#7879;t. Vi&#7879;c ph&acirc;n c&ocirc;ng th&#7849;m
&#273;&#7883;nh d&#7921; th&#7843;o k&#7871;t lu&#7853;n thanh tra ph&#7843;i
b&#7857;ng v&#259;n b&#7843;n, trong &#273;&oacute; ghi r&otilde; n&#7897;i
dung v&agrave; th&#7901;i h&#7841;n th&#7849;m &#273;&#7883;nh.</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>3. Ng&#432;&#7901;i th&#7921;c hi&#7879;n th&#7849;m
&#273;&#7883;nh c&oacute; quy&#7873;n y&ecirc;u c&#7847;u &#272;o&agrave;n
thanh tra cung c&#7845;p th&ocirc;ng tin, t&agrave;i li&#7879;u c&#7847;n
thi&#7871;t &#273;&#7875; th&#7849;m &#273;&#7883;nh; x&acirc;y d&#7921;ng
b&aacute;o c&aacute;o k&#7871;t qu&#7843; th&#7849;m &#273;&#7883;nh v&agrave;
ch&#7883;u tr&aacute;ch nhi&#7879;m tr&#432;&#7899;c ng&#432;&#7901;i ra
quy&#7871;t &#273;&#7883;nh thanh tra v&#7873; k&#7871;t qu&#7843; th&#7849;m &#273;&#7883;nh.</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>4. Ng&#432;&#7901;i ra quy&#7871;t &#273;&#7883;nh
thanh tra c&oacute; tr&aacute;ch nhi&#7879;m ch&#7881; &#273;&#7841;o
vi&#7879;c xem x&eacute;t, ti&#7871;p thu &yacute; ki&#7871;n th&#7849;m
&#273;&#7883;nh v&agrave; ho&agrave;n thi&#7879;n d&#7921; th&#7843;o k&#7871;t
lu&#7853;n thanh tra.</span></p>

<h2><a name="_Toc144884131"></a><a name="dieu_78"><span style='i&#7873;u 78. Ban h&agrave;nh k&#7871;t lu&#7853;n thanh
tra</span></a></h2>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>1. Trong th&#7901;i h&#7841;n 15 ng&agrave;y k&#7875;
t&#7915; ng&agrave;y nh&#7853;n &#273;&#432;&#7907;c d&#7921; th&#7843;o
k&#7871;t lu&#7853;n thanh tra, ng&#432;&#7901;i ra quy&#7871;t &#273;&#7883;nh
thanh tra k&yacute; ban h&agrave;nh k&#7871;t lu&#7853;n thanh tra v&agrave;
ch&#7883;u tr&aacute;ch nhi&#7879;m v&#7873; k&#7871;t lu&#7853;n, ki&#7871;n
ngh&#7883; c&#7911;a m&igrave;nh. Th&#7911; tr&#432;&#7903;ng c&#417; quan
qu&#7843;n l&yacute; nh&agrave; n&#432;&#7899;c c&ugrave;ng c&#7845;p c&oacute;
tr&aacute;ch nhi&#7879;m &#273;&ocirc;n &#273;&#7889;c, ki&#7875;m tra
&#273;&#7875; b&#7843;o &#273;&#7843;m vi&#7879;c ban h&agrave;nh k&#7871;t
lu&#7853;n thanh tra &#273;&uacute;ng th&#7901;i h&#7841;n theo quy &#273;&#7883;nh.</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>&#272;&#7889;i v&#7899;i d&#7921; th&#7843;o k&#7871;t
lu&#7853;n thanh tra v&#7873; v&#7909; vi&#7879;c li&ecirc;n quan
&#273;&#7871;n an ninh, qu&#7889;c ph&ograve;ng, v&#7909; vi&#7879;c quan
tr&#7885;ng, ph&#7913;c t&#7841;p thu&#7897;c di&#7879;n ch&#7881;
&#273;&#7841;o, theo d&otilde;i c&#7911;a Ban Ch&#7881; &#273;&#7841;o Trung
&#432;&#417;ng v&#7873; ph&ograve;ng, ch&#7889;ng tham nh&#361;ng, ti&ecirc;u
c&#7921;c, Ban Ch&#7881; &#273;&#7841;o ph&ograve;ng, ch&#7889;ng tham
nh&#361;ng, ti&ecirc;u c&#7921;c c&#7845;p t&#7881;nh ho&#7863;c c&oacute;
y&ecirc;u c&#7847;u c&#7911;a Th&#7911; tr&#432;&#7903;ng c&#417; quan
qu&#7843;n l&yacute; nh&agrave; n&#432;&#7899;c c&ugrave;ng c&#7845;p
th&igrave; ng&#432;&#7901;i ra quy&#7871;t &#273;&#7883;nh thanh tra ph&#7843;i
c&oacute; v&#259;n b&#7843;n b&aacute;o c&aacute;o Th&#7911; tr&#432;&#7903;ng
c&#417; quan qu&#7843;n l&yacute; nh&agrave; n&#432;&#7899;c c&ugrave;ng
c&#7845;p.</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>Ch&#7853;m nh&#7845;t l&agrave; 30 ng&agrave;y
k&#7875; t&#7915; ng&agrave;y nh&#7853;n &#273;&#432;&#7907;c v&#259;n
b&#7843;n b&aacute;o c&aacute;o, Th&#7911; tr&#432;&#7903;ng c&#417; quan
qu&#7843;n l&yacute; nh&agrave; n&#432;&#7899;c c&ugrave;ng c&#7845;p c&oacute;
&yacute; ki&#7871;n b&#7857;ng v&#259;n b&#7843;n v&#7873; n&#7897;i dung
&#273;&#432;&#7907;c b&aacute;o c&aacute;o; tr&#432;&#7901;ng h&#7907;p
Th&#7911; tr&#432;&#7903;ng c&#417; quan qu&#7843;n l&yacute; nh&agrave;
n&#432;&#7899;c kh&ocirc;ng tr&#7843; l&#7901;i ho&#7863;c kh&ocirc;ng
c&oacute; &yacute; ki&#7871;n kh&aacute;c v&#7899;i d&#7921; th&#7843;o
k&#7871;t lu&#7853;n thanh tra th&igrave; ng&#432;&#7901;i ra quy&#7871;t
&#273;&#7883;nh thanh tra ban h&agrave;nh ngay k&#7871;t lu&#7853;n thanh tra.
Tr&#432;&#7901;ng h&#7907;p Th&#7911; tr&#432;&#7903;ng c&#417; quan qu&#7843;n
l&yacute; nh&agrave; n&#432;&#7899;c c&ugrave;ng c&#7845;p c&oacute; &yacute;
ki&#7871;n b&#7857;ng v&#259;n b&#7843;n y&ecirc;u c&#7847;u b&#7893; sung,
l&agrave;m r&otilde; v&#7873; n&#7897;i dung d&#7921; th&#7843;o k&#7871;t
lu&#7853;n thanh tra th&igrave; ch&#7853;m nh&#7845;t l&agrave; 30 ng&agrave;y
k&#7875; t&#7915; ng&agrave;y nh&#7853;n &#273;&#432;&#7907;c v&#259;n
b&#7843;n &#273;&oacute;, ng&#432;&#7901;i ra quy&#7871;t &#273;&#7883;nh thanh
tra ph&#7843;i ho&agrave;n thi&#7879;n, ban h&agrave;nh k&#7871;t lu&#7853;n
thanh tra.</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>2. K&#7871;t lu&#7853;n thanh tra ph&#7843;i b&#7843;o
&#273;&#7843;m t&iacute;nh ch&iacute;nh x&aacute;c, kh&aacute;ch quan,
kh&#7843; thi v&agrave; bao g&#7891;m c&aacute;c n&#7897;i dung ch&#7911;
y&#7871;u sau &#273;&acirc;y:</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>a) &#272;&aacute;nh gi&aacute; vi&#7879;c th&#7921;c
hi&#7879;n ch&iacute;nh s&aacute;ch, ph&aacute;p lu&#7853;t, nhi&#7879;m
v&#7909;, quy&#7873;n h&#7841;n &#273;&#432;&#7907;c giao c&#7911;a
&#273;&#7889;i t&#432;&#7907;ng thanh tra &#273;&#7889;i v&#7899;i cu&#7897;c
thanh tra h&agrave;nh ch&iacute;nh; &#273;&aacute;nh gi&aacute; vi&#7879;c
ch&#7845;p h&agrave;nh ph&aacute;p lu&#7853;t chuy&ecirc;n ng&agrave;nh, quy
&#273;&#7883;nh v&#7873; chuy&ecirc;n m&ocirc;n - k&#7929; thu&#7853;t, quy
t&#7855;c qu&#7843;n l&yacute; c&#7911;a &#273;&#7889;i t&#432;&#7907;ng thanh
tra &#273;&#7889;i v&#7899;i cu&#7897;c thanh tra chuy&ecirc;n ng&agrave;nh;</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>b) K&#7871;t lu&#7853;n v&#7873; n&#7897;i dung thanh
tra;</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>c) X&aacute;c &#273;&#7883;nh r&otilde; t&iacute;nh
ch&#7845;t, m&#7913;c &#273;&#7897;, h&#7853;u qu&#7843; c&#7911;a h&agrave;nh
vi vi ph&#7841;m; nguy&ecirc;n nh&acirc;n, tr&aacute;ch nhi&#7879;m c&#7911;a
c&#417; quan, t&#7893; ch&#7913;c, c&aacute; nh&acirc;n c&oacute; h&agrave;nh
vi vi ph&#7841;m ph&aacute;p lu&#7853;t (n&#7871;u c&oacute;);</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>d) Bi&#7879;n ph&aacute;p x&#7917; l&yacute; theo
th&#7849;m quy&#7873;n v&agrave; ki&#7871;n ngh&#7883; gi&#7843;i ph&aacute;p,
bi&#7879;n ph&aacute;p x&#7917; l&yacute;, kh&#7855;c ph&#7909;c h&#7853;u
qu&#7843; (n&#7871;u c&oacute;) &#273;&#7875; b&#7843;o &#273;&#7843;m
l&#7907;i &iacute;ch c&#7911;a Nh&agrave; n&#432;&#7899;c, quy&#7873;n
v&agrave; l&#7907;i &iacute;ch h&#7907;p ph&aacute;p c&#7911;a &#273;&#7889;i
t&#432;&#7907;ng thanh tra, c&#7911;a c&#417; quan, t&#7893; ch&#7913;c,
c&aacute; nh&acirc;n c&oacute; li&ecirc;n quan;</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>&#273;) H&#7841;n ch&#7871;, b&#7845;t c&#7853;p
c&#7911;a c&#417; ch&#7871; qu&#7843;n l&yacute;, ch&iacute;nh s&aacute;ch, ph&aacute;p
lu&#7853;t c&oacute; li&ecirc;n quan v&agrave; ki&#7871;n ngh&#7883; kh&#7855;c
ph&#7909;c.</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>3. Trong qu&aacute; tr&igrave;nh ti&#7871;n
h&agrave;nh thanh tra, ng&#432;&#7901;i ra quy&#7871;t &#273;&#7883;nh thanh
tra c&oacute; th&#7875; ban h&agrave;nh k&#7871;t lu&#7853;n thanh tra
&#273;&#7889;i v&#7899;i c&aacute;c n&#7897;i dung &#273;&atilde;
&#273;&#432;&#7907;c ki&#7875;m tra, x&aacute;c minh, &#273;&#7911; c&#417;
s&#7903; &#273;&#7875; k&#7871;t lu&#7853;n v&agrave; ti&#7871;p t&#7909;c
ti&#7871;n h&agrave;nh thanh tra c&aacute;c n&#7897;i dung kh&aacute;c trong
quy&#7871;t &#273;&#7883;nh thanh tra. M&#7897;t cu&#7897;c thanh tra c&oacute;
th&#7875; ban h&agrave;nh nhi&#7873;u k&#7871;t lu&#7853;n thanh tra nh&#7857;m
ph&#7909;c v&#7909; k&#7883;p th&#7901;i y&ecirc;u c&#7847;u qu&#7843;n
l&yacute; nh&agrave; n&#432;&#7899;c.</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>4. Tr&#432;&#7899;c khi c&ocirc;ng khai k&#7871;t
lu&#7853;n thanh tra, ng&#432;&#7901;i ra quy&#7871;t &#273;&#7883;nh thanh tra
c&oacute; th&#7875; s&#7917;a &#273;&#7893;i, b&#7893; sung k&#7871;t
lu&#7853;n thanh tra &#273;&atilde; ban h&agrave;nh &#273;&#7875; b&#7843;o
&#273;&#7843;m t&iacute;nh ch&iacute;nh x&aacute;c, kh&aacute;ch quan,
kh&#7843; thi.</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>5. K&#7871;t lu&#7853;n thanh tra sau khi c&ocirc;ng
khai &#273;&#432;&#7907;c g&#7917;i &#273;&#7871;n Th&#7911; tr&#432;&#7903;ng
c&#417; quan qu&#7843;n l&yacute; nh&agrave; n&#432;&#7899;c c&ugrave;ng
c&#7845;p, c&#417; quan thanh tra c&#7845;p tr&ecirc;n, &#273;&#7889;i
t&#432;&#7907;ng thanh tra v&agrave; c&#417; quan, t&#7893; ch&#7913;c,
c&aacute; nh&acirc;n kh&aacute;c c&oacute; li&ecirc;n quan.</span></p>

<h2><a name="_Toc144884132"></a><a name="dieu_79"><span style='i&#7873;u 79. C&ocirc;ng khai k&#7871;t lu&#7853;n thanh
tra</span></a></h2>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>1. Ch&#7853;m nh&#7845;t l&agrave; 10 ng&agrave;y
k&#7875; t&#7915; ng&agrave;y k&yacute; ban h&agrave;nh k&#7871;t lu&#7853;n
thanh tra, ng&#432;&#7901;i ra quy&#7871;t &#273;&#7883;nh thanh tra c&oacute;
tr&aacute;ch nhi&#7879;m c&ocirc;ng khai k&#7871;t lu&#7853;n thanh tra theo
h&igrave;nh th&#7913;c quy &#273;&#7883;nh t&#7841;i &#273;i&#7875;m a
kho&#7843;n 3 &#272;i&#7873;u n&agrave;y v&agrave; m&#7897;t trong c&aacute;c
h&igrave;nh th&#7913;c quy &#273;&#7883;nh t&#7841;i c&aacute;c &#273;i&#7875;m
b, c v&agrave; d kho&#7843;n 3 &#272;i&#7873;u n&agrave;y.</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>2. K&#7871;t lu&#7853;n thanh tra ph&#7843;i
&#273;&#432;&#7907;c c&ocirc;ng khai to&agrave;n v&#259;n, tr&#7915; n&#7897;i
dung thu&#7897;c b&iacute; m&#7853;t nh&agrave; n&#432;&#7899;c ho&#7863;c
b&iacute; m&#7853;t kh&aacute;c theo quy &#273;&#7883;nh c&#7911;a lu&#7853;t.</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>3. H&igrave;nh th&#7913;c c&ocirc;ng khai k&#7871;t
lu&#7853;n thanh tra bao g&#7891;m:</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>a) &#272;&#259;ng t&#7843;i tr&ecirc;n C&#7893;ng
th&ocirc;ng tin &#273;i&#7879;n t&#7917; c&#7911;a c&#417; quan thanh tra
ho&#7863;c c&#417; quan qu&#7843;n l&yacute; nh&agrave; n&#432;&#7899;c
c&ugrave;ng c&#7845;p;</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>b) T&#7893; ch&#7913;c cu&#7897;c h&#7885;p c&ocirc;ng
b&#7889; k&#7871;t lu&#7853;n thanh tra v&#7899;i th&agrave;nh ph&#7847;n bao
g&#7891;m ng&#432;&#7901;i ra quy&#7871;t &#273;&#7883;nh thanh tra,
&#272;o&agrave;n thanh tra, &#273;&#7889;i t&#432;&#7907;ng thanh tra, c&#417;
quan, t&#7893; ch&#7913;c, c&aacute; nh&acirc;n c&oacute; li&ecirc;n quan
ho&#7863;c t&#7893; ch&#7913;c h&#7885;p b&aacute;o;</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>c) Th&ocirc;ng b&aacute;o tr&ecirc;n &iacute;t
nh&#7845;t m&#7897;t ph&#432;&#417;ng ti&#7879;n th&ocirc;ng tin &#273;&#7841;i
ch&uacute;ng. &#272;&#7889;i v&#7899;i cu&#7897;c thanh tra do Thanh tra
Ch&iacute;nh ph&#7911;, Thanh tra B&#7897;, Thanh tra T&#7893;ng c&#7909;c,
C&#7909;c ti&#7871;n h&agrave;nh th&igrave; th&ocirc;ng b&aacute;o tr&ecirc;n
m&#7897;t ph&#432;&#417;ng ti&#7879;n th&ocirc;ng tin &#273;&#7841;i
ch&uacute;ng &#7903; trung &#432;&#417;ng; &#273;&#7889;i v&#7899;i cu&#7897;c
thanh tra do Thanh tra t&#7881;nh, Thanh tra s&#7903;, Thanh tra huy&#7879;n
ti&#7871;n h&agrave;nh th&igrave; th&ocirc;ng b&aacute;o tr&ecirc;n m&#7897;t
ph&#432;&#417;ng ti&#7879;n th&ocirc;ng tin &#273;&#7841;i ch&uacute;ng &#7903;
&#273;&#7883;a ph&#432;&#417;ng;</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>d) Ni&ecirc;m y&#7871;t t&#7841;i tr&#7909; s&#7903;
l&agrave;m vi&#7879;c c&#7911;a c&#417; quan, t&#7893; ch&#7913;c l&agrave;
&#273;&#7889;i t&#432;&#7907;ng thanh tra.</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>4. Ch&iacute;nh ph&#7911; quy &#273;&#7883;nh chi ti&#7871;t
&#272;i&#7873;u n&agrave;y.</span></p>

<h4><a name="muc_5_1">M&#7909;c 5. NHI&#7878;M V&#7908;, QUY&#7872;N H&#7840;N
C&#7910;A NG&#431;&#7900;I TI&#7870;N H&Agrave;NH THANH TRA</a></h4>

<h2><a name="_Toc144884133"></a><a name="dieu_80"><span style='i&#7873;u 80. Nhi&#7879;m v&#7909;, quy&#7873;n h&#7841;n
c&#7911;a ng&#432;&#7901;i ra quy&#7871;t &#273;&#7883;nh thanh tra</span></a></h2>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>1. Ng&#432;&#7901;i ra quy&#7871;t &#273;&#7883;nh
thanh tra c&oacute; nhi&#7879;m v&#7909;, quy&#7873;n h&#7841;n sau
&#273;&acirc;y:</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>a) Ch&#7881; &#273;&#7841;o, ki&#7875;m tra,
gi&aacute;m s&aacute;t &#272;o&agrave;n thanh tra th&#7921;c hi&#7879;n
&#273;&uacute;ng n&#7897;i dung quy&#7871;t &#273;&#7883;nh thanh tra;</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>b) Y&ecirc;u c&#7847;u &#273;&#7889;i t&#432;&#7907;ng
thanh tra cung c&#7845;p th&ocirc;ng tin, t&agrave;i li&#7879;u v&agrave;
b&aacute;o c&aacute;o, gi&#7843;i tr&igrave;nh v&#7873; v&#7845;n &#273;&#7873;
li&ecirc;n quan &#273;&#7871;n n&#7897;i dung thanh tra; y&ecirc;u c&#7847;u
c&#417; quan, t&#7893; ch&#7913;c, c&aacute; nh&acirc;n c&oacute; li&ecirc;n
quan cung c&#7845;p th&ocirc;ng tin, t&agrave;i li&#7879;u v&#7873; n&#7897;i
dung thanh tra;</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>c) Quy&#7871;t &#273;&#7883;nh vi&#7879;c tr&#432;ng
c&#7847;u gi&aacute;m &#273;&#7883;nh v&#7873; v&#7845;n &#273;&#7873;
li&ecirc;n quan &#273;&#7871;n n&#7897;i dung thanh tra;</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>d) Quy&#7871;t &#273;&#7883;nh ho&#7863;c y&ecirc;u
c&#7847;u ng&#432;&#7901;i c&oacute; th&#7849;m quy&#7873;n quy&#7871;t
&#273;&#7883;nh t&#7841;m gi&#7919; t&agrave;i s&#7843;n, gi&#7845;y
ph&eacute;p, ch&#7913;ng ch&#7881; h&agrave;nh ngh&#7873; b&#7883; s&#7917;
d&#7909;ng tr&aacute;i ph&aacute;p lu&#7853;t;</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>&#273;) &#272;&igrave;nh ch&#7881; ho&#7863;c
ki&#7871;n ngh&#7883; ng&#432;&#7901;i c&oacute; th&#7849;m quy&#7873;n
&#273;&igrave;nh ch&#7881; h&agrave;nh vi vi ph&#7841;m;</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>e) Y&ecirc;u c&#7847;u t&#7893; ch&#7913;c t&iacute;n
d&#7909;ng phong t&#7887;a t&agrave;i kho&#7843;n c&#7911;a &#273;&#7889;i
t&#432;&#7907;ng thanh tra; &#273;&#7873; ngh&#7883; c&#417; quan ki&#7875;m
so&aacute;t t&agrave;i s&#7843;n, thu nh&#7853;p, c&#417; quan kh&aacute;c
c&oacute; th&#7849;m quy&#7873;n c&oacute; bi&#7879;n ph&aacute;p &#273;&#7875;
ng&#259;n ch&#7863;n k&#7883;p th&#7901;i &#273;&#7889;i t&#432;&#7907;ng thanh
tra c&oacute; h&agrave;nh vi h&#7911;y ho&#7841;i, t&#7849;u t&aacute;n
t&agrave;i s&#7843;n ho&#7863;c &#273;&#7875; b&#7843;o &#273;&#7843;m
th&#7921;c hi&#7879;n quy&#7871;t &#273;&#7883;nh thu h&#7891;i t&agrave;i
s&#7843;n c&#7911;a Th&#7911; tr&#432;&#7903;ng c&#417; quan thanh tra,
Th&#7911; tr&#432;&#7903;ng c&#417; quan qu&#7843;n l&yacute; nh&agrave;
n&#432;&#7899;c;</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>g) Quy&#7871;t &#273;&#7883;nh ki&#7875;m k&ecirc;
t&agrave;i s&#7843;n;</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>h) Quy&#7871;t &#273;&#7883;nh thu h&#7891;i
t&agrave;i s&#7843;n b&#7883; chi&#7871;m &#273;o&#7841;t, chi&#7871;m
gi&#7919;, s&#7917; d&#7909;ng tr&aacute;i ph&aacute;p lu&#7853;t ho&#7863;c
