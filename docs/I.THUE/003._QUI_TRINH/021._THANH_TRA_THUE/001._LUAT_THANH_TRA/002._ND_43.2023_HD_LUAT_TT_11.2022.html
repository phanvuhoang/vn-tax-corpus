style='font-size:14.0pt'>4. H&#7891; s&#417; &#273;&#7873; ngh&#7883; b&#7893;
nhi&#7879;m v&agrave;o ng&#7841;ch Thanh tra vi&ecirc;n, ng&#7841;ch Thanh tra
vi&ecirc;n ch&iacute;nh g&#7891;m:</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>a) H&#7891; s&#417; c&aacute; nh&acirc;n theo quy
&#273;&#7883;nh t&#7841;i kho&#7843;n 3 &#272;i&#7873;u n&agrave;y;</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>b) Bi&ecirc;n b&#7843;n h&#7885;p H&#7897;i
&#273;&#7891;ng x&eacute;t chuy&#7875;n ng&#7841;ch;</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>c) V&#259;n b&#7843;n c&#7911;a H&#7897;i
&#273;&#7891;ng x&eacute;t chuy&#7875;n ng&#7841;ch &#273;&#7873; ngh&#7883;
B&#7897; tr&#432;&#7903;ng, Th&#7911; tr&#432;&#7903;ng c&#417; quan ngang
b&#7897;, Th&#7911; tr&#432;&#7903;ng c&#417; quan thu&#7897;c Ch&iacute;nh
ph&#7911;, Ch&#7911; t&#7883;ch &#7910;y ban nh&acirc;n d&acirc;n c&#7845;p
t&#7881;nh b&#7893; nhi&#7879;m v&agrave;o ng&#7841;ch Thanh tra vi&ecirc;n,
ng&#7841;ch Thanh tra vi&ecirc;n ch&iacute;nh theo th&#7849;m quy&#7873;n.</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>5. H&#7891; s&#417; &#273;&#7873; ngh&#7883; b&#7893;
nhi&#7879;m v&agrave;o ng&#7841;ch Thanh tra vi&ecirc;n cao c&#7845;p
g&#7891;m:</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>a) H&#7891; s&#417; c&aacute; nh&acirc;n theo quy
&#273;&#7883;nh t&#7841;i kho&#7843;n 3 &#272;i&#7873;u n&agrave;y;</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>b) Bi&ecirc;n b&#7843;n h&#7885;p H&#7897;i
&#273;&#7891;ng x&eacute;t chuy&#7875;n ng&#7841;ch;</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>c) V&#259;n b&#7843;n &#273;&#7873; ngh&#7883;
b&#7893; nhi&#7879;m v&agrave;o ng&#7841;ch Thanh tra vi&ecirc;n cao c&#7845;p
c&#7911;a H&#7897;i &#273;&#7891;ng x&eacute;t chuy&#7875;n ng&#7841;ch;</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>d) V&#259;n b&#7843;n th&#7889;ng nh&#7845;t c&#7911;a
B&#7897; N&#7897;i v&#7909; v&#7873; vi&#7879;c b&#7893; nhi&#7879;m Thanh tra
vi&ecirc;n cao c&#7845;p.</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>6. Th&#7849;m quy&#7873;n b&#7893; nhi&#7879;m
v&agrave;o c&aacute;c ng&#7841;ch thanh tra th&#7921;c hi&#7879;n theo quy
&#273;&#7883;nh t&#7841;i <a name="tc_1">&#272;i&#7873;u 6 Ngh&#7883;
&#273;&#7883;nh n&agrave;y</a>.</span></p>

<h3><a name="_Toc146375727"></a><a name="dieu_9"><span style='i&#7873;u 9. &#272;i&#7873;u ki&#7879;n d&#7921; thi
n&acirc;ng ng&#7841;ch Thanh tra vi&ecirc;n</span></a></h3>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>1. Y&ecirc;u c&#7847;u &#273;&#7889;i v&#7899;i Thanh
tra vi&ecirc;n d&#7921; thi n&acirc;ng ng&#7841;ch l&ecirc;n Thanh tra
vi&ecirc;n ch&iacute;nh:</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>a) &#272;&#432;&#7907;c x&#7871;p lo&#7841;i
ch&#7845;t l&#432;&#7907;ng &#7903; m&#7913;c ho&agrave;n th&agrave;nh
t&#7889;t nhi&#7879;m v&#7909; tr&#7903; l&ecirc;n trong n&#259;m c&ocirc;ng
t&aacute;c li&#7873;n k&#7873; tr&#432;&#7899;c n&#259;m d&#7921; thi
n&acirc;ng ng&#7841;ch; c&oacute; ph&#7849;m ch&#7845;t ch&iacute;nh tr&#7883;,
&#273;&#7841;o &#273;&#7913;c t&#7889;t; kh&ocirc;ng trong th&#7901;i h&#7841;n
x&#7917; l&yacute; k&#7927; lu&#7853;t, kh&ocirc;ng trong th&#7901;i gian th&#7921;c
hi&#7879;n c&aacute;c quy &#273;&#7883;nh li&ecirc;n quan &#273;&#7871;n
k&#7927; lu&#7853;t theo quy &#273;&#7883;nh c&#7911;a <a
name="tvpllink_gumcmwraco">Lu&#7853;t C&aacute;n b&#7897;, c&ocirc;ng
ch&#7913;c</a>;</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>b) C&oacute; n&#259;ng l&#7921;c, tr&igrave;nh
&#273;&#7897; chuy&ecirc;n m&ocirc;n, nghi&#7879;p v&#7909; &#273;&#7875;
&#273;&#7843;m nh&#7853;n v&#7883; tr&iacute; vi&#7879;c l&agrave;m
t&#432;&#417;ng &#7913;ng v&#7899;i ng&#7841;ch c&ocirc;ng ch&#7913;c cao
h&#417;n ng&#7841;ch c&ocirc;ng ch&#7913;c hi&#7879;n gi&#7919;;</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>c) C&oacute; th&#7901;i gian c&ocirc;ng t&aacute;c
&#7903; ng&#7841;ch Thanh tra vi&ecirc;n v&agrave; t&#432;&#417;ng
&#273;&#432;&#417;ng t&#7889;i thi&#7875;u t&#7915; 09 n&#259;m tr&#7903;
l&ecirc;n, tr&#7915; tr&#432;&#7901;ng h&#7907;p l&agrave; c&aacute;n b&#7897;,
c&ocirc;ng ch&#7913;c, vi&ecirc;n ch&#7913;c, s&#297; quan Qu&acirc;n
&#273;&#7897;i nh&acirc;n d&acirc;n, s&#297; quan C&ocirc;ng an nh&acirc;n
d&acirc;n, ng&#432;&#7901;i l&agrave;m c&ocirc;ng t&aacute;c c&#417; y&#7871;u
c&ocirc;ng t&aacute;c &#7903; c&#417; quan, t&#7893; ch&#7913;c, &#273;&#417;n
v&#7883; kh&aacute;c v&agrave; &#273;ang gi&#7919; ng&#7841;ch c&ocirc;ng
ch&#7913;c, vi&ecirc;n ch&#7913;c, c&#7845;p h&agrave;m t&#432;&#417;ng
&#273;&#432;&#417;ng ng&#7841;ch Thanh tra vi&ecirc;n ch&iacute;nh chuy&#7875;n
sang c&#417; quan thanh tra. Tr&#432;&#7901;ng h&#7907;p c&oacute; th&#7901;i
gian t&#432;&#417;ng &#273;&#432;&#417;ng v&#7899;i ng&#7841;ch Thanh tra
vi&ecirc;n th&igrave; th&#7901;i gian gi&#7919; ng&#7841;ch Thanh tra
vi&ecirc;n t&#7889;i thi&#7875;u l&agrave; 01 n&#259;m (&#273;&#7911; 12
th&aacute;ng);</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>d) Trong th&#7901;i gian gi&#7919; ng&#7841;ch Thanh
tra vi&ecirc;n v&agrave; t&#432;&#417;ng &#273;&#432;&#417;ng &#273;&atilde;
tham gia x&acirc;y d&#7921;ng, th&#7849;m &#273;&#7883;nh &iacute;t nh&#7845;t
01 v&#259;n b&#7843;n quy ph&#7841;m ph&aacute;p lu&#7853;t ho&#7863;c
&#273;&#7873; t&agrave;i, &#273;&#7873; &aacute;n, d&#7921; &aacute;n,
ch&#432;&#417;ng tr&igrave;nh nghi&ecirc;n c&#7913;u khoa h&#7885;c t&#7915;
c&#7845;p c&#417; s&#7903; tr&#7903; l&ecirc;n m&agrave; c&#417; quan s&#7917;
d&#7909;ng, qu&#7843;n l&yacute; Thanh tra vi&ecirc;n &#273;&#432;&#7907;c giao
ch&#7911; tr&igrave; nghi&ecirc;n c&#7913;u, x&acirc;y d&#7921;ng
&#273;&atilde; &#273;&#432;&#7907;c c&#7845;p c&oacute; th&#7849;m quy&#7873;n
ban h&agrave;nh ho&#7863;c nghi&#7879;m thu;</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>&#273;) C&oacute; b&#7857;ng &#273;&#7841;i h&#7885;c
tr&#7903; l&ecirc;n; c&oacute; ch&#7913;ng ch&#7881; b&#7891;i d&#432;&#7905;ng
nghi&#7879;p v&#7909; Thanh tra vi&ecirc;n ch&iacute;nh; c&oacute; ch&#7913;ng
ch&#7881; b&#7891;i d&#432;&#7905;ng ki&#7871;n th&#7913;c qu&#7843;n l&yacute;
nh&agrave; n&#432;&#7899;c theo ti&ecirc;u chu&#7849;n ng&#7841;ch chuy&ecirc;n
vi&ecirc;n ch&iacute;nh ho&#7863;c c&oacute; b&#7857;ng cao c&#7845;p l&yacute;
lu&#7853;n ch&iacute;nh tr&#7883; - h&agrave;nh ch&iacute;nh;</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>e) C&oacute; k&#7929; n&#259;ng s&#7917; d&#7909;ng
c&ocirc;ng ngh&#7879; th&ocirc;ng tin c&#417; b&#7843;n, s&#7917; d&#7909;ng
ngo&#7841;i ng&#7919; &#7903; tr&igrave;nh &#273;&#7897; t&#432;&#417;ng
&#273;&#432;&#417;ng b&#7853;c 3 khung n&#259;ng l&#7921;c ngo&#7841;i
ng&#7919; Vi&#7879;t Nam ho&#7863;c s&#7917; d&#7909;ng &#273;&#432;&#7907;c
ti&#7871;ng d&acirc;n t&#7897;c thi&#7875;u s&#7889; &#273;&#7889;i v&#7899;i
c&ocirc;ng ch&#7913;c c&ocirc;ng t&aacute;c &#7903; v&ugrave;ng d&acirc;n
t&#7897;c thi&#7875;u s&#7889; theo y&ecirc;u c&#7847;u c&#7911;a v&#7883;
tr&iacute; vi&#7879;c l&agrave;m.</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>2. Y&ecirc;u c&#7847;u &#273;&#7889;i v&#7899;i Thanh
tra vi&ecirc;n ch&iacute;nh d&#7921; thi n&acirc;ng ng&#7841;ch l&ecirc;n Thanh
tra vi&ecirc;n cao c&#7845;p:</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>a) &#272;&aacute;p &#7913;ng &#273;i&#7873;u
ki&#7879;n, ti&ecirc;u chu&#7849;n t&#7841;i &#273;i&#7875;m a, &#273;i&#7875;m
b kho&#7843;n 1 &#272;i&#7873;u n&agrave;y;</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>b) C&oacute; th&#7901;i gian c&ocirc;ng t&aacute;c
&#7903; ng&#7841;ch Thanh tra vi&ecirc;n ch&iacute;nh v&agrave; t&#432;&#417;ng
&#273;&#432;&#417;ng t&#7889;i thi&#7875;u l&agrave; 06 n&#259;m, tr&#7915;
tr&#432;&#7901;ng h&#7907;p l&agrave; c&aacute;n b&#7897;, c&ocirc;ng
ch&#7913;c, vi&ecirc;n ch&#7913;c, s&#297; quan Qu&acirc;n &#273;&#7897;i
nh&acirc;n d&acirc;n, s&#297; quan C&ocirc;ng an nh&acirc;n d&acirc;n,
ng&#432;&#7901;i l&agrave;m c&ocirc;ng t&aacute;c c&#417; y&#7871;u c&ocirc;ng
t&aacute;c &#7903; c&#417; quan, t&#7893; ch&#7913;c, &#273;&#417;n v&#7883;
kh&aacute;c v&agrave; &#273;ang gi&#7919; ng&#7841;ch c&ocirc;ng ch&#7913;c,
vi&ecirc;n ch&#7913;c, c&#7845;p h&agrave;m t&#432;&#417;ng
&#273;&#432;&#417;ng ng&#7841;ch Thanh tra vi&ecirc;n cao c&#7845;p
chuy&#7875;n sang c&#417; quan thanh tra;</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>c) Trong th&#7901;i gian gi&#7919; ng&#7841;ch Thanh
tra vi&ecirc;n ch&iacute;nh v&agrave; t&#432;&#417;ng &#273;&#432;&#417;ng
&#273;&atilde; ch&#7911; tr&igrave; x&acirc;y d&#7921;ng, th&#7849;m
&#273;&#7883;nh &iacute;t nh&#7845;t 02 v&#259;n b&#7843;n quy ph&#7841;m
ph&aacute;p lu&#7853;t ho&#7863;c &#273;&#7873; t&agrave;i, &#273;&#7873;
&aacute;n, d&#7921; &aacute;n, ch&#432;&#417;ng tr&igrave;nh nghi&ecirc;n
c&#7913;u khoa h&#7885;c c&#7845;p nh&agrave; n&#432;&#7899;c, c&#7845;p
b&#7897;, ng&agrave;nh ho&#7863;c c&#7845;p t&#7881;nh m&agrave; c&#417; quan
s&#7917; d&#7909;ng Thanh tra vi&ecirc;n ch&iacute;nh &#273;&#432;&#7907;c giao
ch&#7911; tr&igrave; nghi&ecirc;n c&#7913;u, x&acirc;y d&#7921;ng
&#273;&atilde; &#273;&#432;&#7907;c c&#7845;p c&oacute; th&#7849;m quy&#7873;n
ban h&agrave;nh ho&#7863;c nghi&#7879;m thu;</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>d) C&oacute; b&#7857;ng &#273;&#7841;i h&#7885;c
tr&#7903; l&ecirc;n; c&oacute; b&#7857;ng t&#7889;t nghi&#7879;p cao c&#7845;p
l&yacute; lu&#7853;n ch&iacute;nh tr&#7883; ho&#7863;c b&#7857;ng cao c&#7845;p
l&yacute; lu&#7853;n ch&iacute;nh tr&#7883; - h&agrave;nh ch&iacute;nh;
c&oacute; ch&#7913;ng ch&#7881; b&#7891;i d&#432;&#7905;ng nghi&#7879;p
v&#7909; Thanh tra vi&ecirc;n cao c&#7845;p; c&oacute; ch&#7913;ng ch&#7881;
b&#7891;i d&#432;&#7905;ng ki&#7871;n th&#7913;c qu&#7843;n l&yacute;
nh&agrave; n&#432;&#7899;c theo ti&ecirc;u chu&#7849;n ng&#7841;ch chuy&ecirc;n
vi&ecirc;n cao c&#7845;p;</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>&#273;) C&oacute; k&#7929; n&#259;ng s&#7917;
d&#7909;ng c&ocirc;ng ngh&#7879; th&ocirc;ng tin c&#417; b&#7843;n, s&#7917;
d&#7909;ng ngo&#7841;i ng&#7919; &#7903; tr&igrave;nh &#273;&#7897;
t&#432;&#417;ng &#273;&#432;&#417;ng b&#7853;c 4 khung n&#259;ng l&#7921;c
ngo&#7841;i ng&#7919; Vi&#7879;t Nam ho&#7863;c s&#7917; d&#7909;ng
&#273;&#432;&#7907;c ti&#7871;ng d&acirc;n t&#7897;c thi&#7875;u s&#7889;
&#273;&#7889;i v&#7899;i c&ocirc;ng ch&#7913;c c&ocirc;ng t&aacute;c &#7903;
v&ugrave;ng d&acirc;n t&#7897;c thi&#7875;u s&#7889; theo y&ecirc;u c&#7847;u
c&#7911;a v&#7883; tr&iacute; vi&#7879;c l&agrave;m.</span></p>

<h3><a name="_Toc146375728"></a><a name="dieu_10"><span style='i&#7873;u 10. B&#7893; nhi&#7879;m v&agrave;o ng&#7841;ch
thanh tra khi tr&uacute;ng tuy&#7875;n k&#7923; thi n&acirc;ng ng&#7841;ch</span></a></h3>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>1. C&ocirc;ng ch&#7913;c l&agrave; Thanh tra
vi&ecirc;n, Thanh tra vi&ecirc;n ch&iacute;nh &#273;&#7911; &#273;i&#7873;u
ki&#7879;n, ti&ecirc;u chu&#7849;n &#273;&#432;&#7907;c B&#7897;
tr&#432;&#7903;ng, Th&#7911; tr&#432;&#7903;ng c&#417; quan ngang b&#7897;,
Ch&#7911; t&#7883;ch &#7910;y ban nh&acirc;n d&acirc;n c&#7845;p t&#7881;nh
c&#7917; &#273;i d&#7921; thi n&acirc;ng ng&#7841;ch, n&#7871;u tr&uacute;ng
tuy&#7875;n k&#7923; thi n&acirc;ng ng&#7841;ch th&igrave; &#273;&#432;&#7907;c
xem x&eacute;t b&#7893; nhi&#7879;m v&agrave;o ng&#7841;ch t&#432;&#417;ng &#7913;ng.</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>2. Th&#7849;m quy&#7873;n b&#7893; nhi&#7879;m
v&agrave;o ng&#7841;ch Thanh tra vi&ecirc;n ch&iacute;nh, ng&#7841;ch Thanh tra
vi&ecirc;n cao c&#7845;p cho Thanh tra vi&ecirc;n, Thanh tra vi&ecirc;n
ch&iacute;nh tr&uacute;ng tuy&#7875;n k&#7923; thi n&acirc;ng ng&#7841;ch
th&#7921;c hi&#7879;n theo quy &#273;&#7883;nh t&#7841;i <a name="tc_2">&#272;i&#7873;u
6 c&#7911;a Ngh&#7883; &#273;&#7883;nh n&agrave;y</a>.</span></p>

<h3><a name="_Toc146375729"></a><a name="dieu_11"><span style='i&#7873;u 11. B&#7893; nhi&#7879;m s&#297; quan trong
Qu&acirc;n &#273;&#7897;i nh&acirc;n d&acirc;n, C&ocirc;ng an nh&acirc;n
d&acirc;n v&agrave; ng&#432;&#7901;i l&agrave;m c&ocirc;ng t&aacute;c c&#417; y&#7871;u
v&agrave;o c&aacute;c ng&#7841;ch thanh tra</span></a></h3>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>1. S&#297; quan Qu&acirc;n &#273;&#7897;i nh&acirc;n
d&acirc;n, s&#297; quan C&ocirc;ng an nh&acirc;n d&acirc;n c&ocirc;ng
t&aacute;c trong c&aacute;c c&#417; quan Thanh tra Qu&#7889;c ph&ograve;ng,
Thanh tra C&ocirc;ng an, ng&#432;&#7901;i l&agrave;m c&ocirc;ng t&aacute;c
c&#417; y&#7871;u &#273;&#7911; &#273;i&#7873;u ki&#7879;n, ti&ecirc;u
chu&#7849;n c&#7911;a c&aacute;c ng&#7841;ch thanh tra theo quy &#273;&#7883;nh
t&#7841;i c&aacute;c <a name="dc_15">&#272;i&#7873;u 39, 40 v&agrave; 41
c&#7911;a Lu&#7853;t Thanh tra</a> th&igrave; &#273;&#432;&#7907;c xem
x&eacute;t, b&#7893; nhi&#7879;m v&agrave;o ng&#7841;ch thanh tra
t&#432;&#417;ng &#7913;ng theo &#273;i&#7873;u ki&#7879;n, ti&ecirc;u
chu&#7849;n v&agrave; nhu c&#7847;u v&#7883; tr&iacute; c&ocirc;ng t&aacute;c.</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>2. H&#7897;i &#273;&#7891;ng x&eacute;t b&#7893;
nhi&#7879;m s&#297; quan Qu&acirc;n &#273;&#7897;i nh&acirc;n d&acirc;n,
s&#297; quan C&ocirc;ng an nh&acirc;n d&acirc;n, ng&#432;&#7901;i l&agrave;m
c&ocirc;ng t&aacute;c c&#417; y&#7871;u v&agrave;o c&aacute;c ng&#7841;ch thanh
tra do B&#7897; tr&#432;&#7903;ng B&#7897; Qu&#7889;c ph&ograve;ng, B&#7897;
tr&#432;&#7903;ng B&#7897; C&ocirc;ng an th&agrave;nh l&#7853;p.</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>H&#7897;i &#273;&#7891;ng x&eacute;t b&#7893;
nhi&#7879;m c&oacute; 05 th&agrave;nh vi&ecirc;n, l&agrave;m vi&#7879;c theo
nguy&ecirc;n t&#7855;c t&#7853;p th&#7875;, bi&#7875;u quy&#7871;t
&#273;&#7875; quy&#7871;t &#273;&#7883;nh theo &#273;a s&#7889;. Th&agrave;nh
ph&#7847;n H&#7897;i &#273;&#7891;ng g&#7891;m:</span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
style='font-size:14.0pt'>a) Ch&#7911; t&#7883;ch H&#7897;i &#273;&#7891;ng
l&agrave; &#273;&#7841;i di&#7879;n l&atilde;nh &#273;&#7841;o b&#7897;; </span></p>

<p class=MsoNormal style='text-align:justify;text-indent:1.0cm'><span
